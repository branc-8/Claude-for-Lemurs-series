    hat(b);
    if(bi===3||bi===7||bi===11) lick(b,rHz);
  }

  return { node:master, oscs, stopAt:now+52*4*Q+0.5 };
}

body: `
<div class="lesson-intro">Hi-NRG is disco distilled to pure kinetic energy. Giorgio Moroder invented the template in the late 70s; Patrick Cowley and Bobby O refined it into something relentless. Eurobeat is Hi-NRG amplified to absurdity — faster, brighter, more frantic — and became the soundtrack of Japanese racing game culture. Both genres share the same DNA: four-on-floor kick, pumping 8th-note bass, and a running lead that never stops moving.</div>

<div class="step-card"><span class="step-num">BPM + FEEL</span>
<strong>Hi-NRG: 130–145 BPM. Eurobeat: 150–165+ BPM.</strong> No swing — everything is straight. The energy comes entirely from density and tempo, not rhythmic displacement. At 155 BPM with 8th-note bass pumping on every hit, the track is essentially a continuous stream of transients. The straight grid is the point: it's mechanical, relentless, unstoppable.
</div>

<div class="step-card"><span class="step-num">THE PUMPING BASS — THE GENRE ENGINE</span>
The Hi-NRG bass is not a walking bass, not a long-held note, not a pattern. It <strong>pumps on every 8th note</strong> with a filter envelope that opens and snaps closed on each hit: the low-cut filter sweeps from 2.5× the base frequency down to 0.5× in 80ms, creating a percussive "dum" on each attack. Root note on the beat, perfect fifth on the offbeat, alternating.<br><br>
At 155 BPM this means the bass fires 8 times per bar — almost as fast as the 16th-note hi-hat in slower genres. This density, combined with the filter envelope, is what makes Hi-NRG feel physically aggressive. It's a body experience as much as a listening one.
</div>

<div class="step-card"><span class="step-num">SONG STRUCTURE + THE KEY CHANGE</span>
<div class="structure-bar">
  <div class="section-block intro">INTRO<br><span style="font-size:.55rem">lead only<br>4–8 bars</span></div>
  <div class="section-block verse">VERSE<br><span style="font-size:.55rem">full groove<br>16 bars</span></div>
  <div class="section-block drop">CHORUS<br><span style="font-size:.55rem">dense stabs<br>16 bars</span></div>
  <div class="section-block break">BREAK<br><span style="font-size:.55rem">kick+bass<br>8 bars</span></div>
  <div class="section-block chorus">KEY CHANGE<br><span style="font-size:.55rem">+2 semitones<br>16 bars</span></div>
  <div class="section-block outro">OUTRO<br><span style="font-size:.55rem">4 bars</span></div>
</div>
The key change is obligatory in Eurobeat. The final chorus transposes up a whole tone (2 semitones) — everything shifts: bass, stabs, lead. The sudden brightness of the new key, combined with the listener's familiarity with the groove by that point, creates an energy spike. It's the genre's equivalent of a climax.
</div>

<div class="step-card"><span class="step-num">THE RUNNING LEAD</span>
The Eurobeat lead is a rapid 16th-note melodic pattern running continuously — not a chord, not a bass line, but a single voice running up and down the scale in a repeating pattern. The pattern in the demo uses major scale degrees (0-4-7-12-11-7-4-0-2-5-9-14-12-9-5-2) — it ascends an arpeggio, drops, then climbs a chord extension, drops again. It loops every bar but never feels static because at 155 BPM the individual notes blur into a continuous shimmer.
</div>

<div class="step-card"><span class="step-num">CHORD PROGRESSIONS</span>
Hi-NRG uses simple major key progressions — this is not a sophisticated harmony genre. I-IV-V-IV is the most common (home → away → tension → away → home). The emotional content comes from tempo and texture, not harmonic complexity.
<div class="chord-row" data-root="110" data-mode="major">

<strong>E♭, B♭, F, C.</strong> Hi-NRG inherited its key centers from disco, which was performed by live orchestras and horn sections. Brass and wind instruments are built in B♭ and E♭ — playing in those concert keys means reading in C and F (no accidentals). Electronic producers who emerged from that scene kept working in flat keys out of habit and because their sample libraries were in those keys. Eurobeat (made in Italy for Japan) tends more toward C, G, and Am — keyboard-natural keys.

  for(let b=48;b<64;b++){

    kick(b,p.kickVol); clap(b,p.clapVol*1.1); hat(b,p.hatVol*1.15);

    kick(b,p.kickVol); bass(b,r);
  }

  return { node:master, oscs, stopAt:now+68*16*S+0.5 };
}

{
title: "Hi-NRG / Eurobeat -- Sound Design",
subtitle: "08 -- Synth Brass, Power Bass, Running Lead",
body: `
<div class="lesson-intro">Hi-NRG and Eurobeat sound design is about efficiency — every element serves the energy. The bass pumps, the stabs stab, the lead runs, the kick anchors. Nothing is textural or ambient. Here's exactly how each element works and why.</div>

<div class="step-card"><span class="step-num">THE PUMPING BASS — FILTER ENVELOPE SYNTHESIS</span>
Sawtooth oscillator through a resonant lowpass with a snappy filter envelope. The envelope is key: the cutoff starts at 2.5× the base frequency (bright, present) and ramps exponentially down to 0.5× in 80ms. This means each bass hit starts bright and immediately goes dark — that's the "dum" character. Without the envelope the bass is just a constant buzzy tone. The filter envelope <em>is</em> the bass sound.<br><br>
Root on every beat (steps 0,4,8,12), perfect fifth on every offbeat (steps 2,6,10,14). The fifth is higher in frequency, which makes the alternation audible as movement — the bass appears to "bounce" up and down with each pair of notes.
</div>

<div class="step-card"><span class="step-num">THE SYNTH BRASS STAB — ATTACK SWEEP</span>
Three sawtooth oscillators (root, M3, P5) feeding a shared lowpass. The lowpass sweeps from 4000Hz down to 1200Hz in 40ms — this is the "wah" of the attack, mimicking a brass player's embouchure brightening on the note onset then settling. Amplitude decay of 85ms (very short — a stab is a stab, not a chord). The brightness of the sawtooth combined with the sweep gives the characteristic synth-brass "blat."
</div>

<div class="step-card"><span class="step-num">THE RUNNING LEAD — SAWTOOTH WITH CUTOFF</span>
Single sawtooth oscillator per note, lowpass at ~2800Hz. Each note is 85% of one 16th-note duration — slightly shorter than the step to create articulation (small silence between notes). Without this articulation the lead sounds like a glissando. With it, the notes are individually audible even at high speed.<br><br>
The pattern [0,4,7,12,11,7,4,0,2,5,9,14,12,9,5,2] uses major chord tones (0,4,7) and their octaves (12) as landing points, with scale passing tones (2,5,9) for movement. This is why the lead sounds melodic rather than random — it gravitates toward stable chord tones on the metric accents.
</div>

<div class="step-card"><span class="step-num">THE KICK — TIGHT AND DRY</span>
Same sine sweep as boom bap but shorter decay (260ms vs 500ms) and lower starting frequency (140Hz vs 145Hz). Hi-NRG kicks are dry and punchy — they don't rumble or sustain. The shorter decay means the kick is out of the way by the time the next hit arrives (at 155 BPM the 8th note duration is 193ms — barely longer than the kick decay). This creates a tight, staccato quality.
</div>

<div class="step-card"><span class="step-num">THE KEY CHANGE MECHANISM</span>

body: `
<div class="lesson-intro">Hi-NRG and Eurobeat are mix-first genres — the production decisions are mostly about density management. Everything is fighting for the same space. Here's how the arrangement solves that, and what each structural choice accomplishes.</div>

<div class="step-card"><span class="step-num">ENERGY CURVE — HOW THE ARRANGEMENT ESCALATES</span>
<p>The demo builds energy through density escalation: intro (lead only) → verse (lead every other bar) → chorus (lead every bar + dense stabs) → break (kick + bass only) → key change (everything at maximum). Each section adds or removes elements to control the energy level.</p>
<p>The break at bars 40–47 is critical. After 32 bars of full density, stripping to kick + bass creates contrast that makes the key change feel enormous when it arrives. This is the same technique as every genre in the course — contrast, not just escalation.</p>
</div>

<div class="step-card"><span class="step-num">STAB DENSITY — VERSE VS CHORUS</span>
<p>In the verse, stabs fire on 3 of 8 possible 8th-note positions (steps 2, 6, 10). In the chorus they fire on 5 positions (steps 2, 6, 8, 10, 14). This 3-to-5 increase is the production signal for "this is the chorus" — no other element changes. The listener's ear hears the increased density as excitement without needing a melody change or tempo shift.</p>
</div>

<div class="step-card"><span class="step-num">THE LEAD SCHEDULING — EVERY OTHER BAR IN VERSE</span>
<p>The verse only runs the lead on even bars (<code>if(b%2===0)</code>). This creates a 2-bar alternation: lead bar → no lead bar → lead bar. The silence of the non-lead bar makes the lead bars feel like a statement rather than wallpaper. When the chorus locks the lead in on every bar, the continuous presence is a noticeable step up.</p>
</div>

<div class="step-card"><span class="step-num">BASS FILTER CUTOFF — THE KEY PARAMETER</span>
<p>The bassFilter parameter controls the base frequency for the filter envelope's ramp target. Higher values (600–800Hz) = brighter, more present bass. Lower values (200–400Hz) = darker, more subby. For Hi-NRG the bass should sit in the low-mid range — present enough to feel punchy, dark enough not to clash with the stabs in the 1000–2000Hz range.</p>
<p>If the bass and stabs are fighting: lower bassFilter. If the bass is disappearing on small speakers: raise bassFilter slightly and reduce stabVol.</p>
</div>

<div class="step-card"><span class="step-num">COMMON PROBLEMS + FIXES</span>
<p><strong>"It doesn't sound like Hi-NRG — it sounds too modern/EDM"</strong> — Check the lead pattern. The 16th-note arpeggio pattern is what gives it the genre character. If leadVol is too low the track sounds like house music.</p>
<p><strong>"The bass is muddy"</strong> — The pumping bass fires 8 times per bar at 155 BPM. If the decay is too long (bassFilter ramp too slow), the hits blur into each other. The filter should snap down quickly — 80ms maximum.</p>
<p><strong>"The key change doesn't feel exciting"</strong> — Check that the break (bars 40–47) is genuinely stripped down. The key change only works if it's returning from emptiness. If the break has stabs or lead, the contrast is lost.</p>
</div>

// 155 BPM. Four-on-floor kick. Pumping 8th-note synth bass.

// The bass PUMPS — every 8th note alternates root and fifth.

function makeSynth(ctx, p) {

    clapVol:0.68,clapFreq:1200,rimFreq:800,stabNote:196,stabBP:900,stabDetune:8,stabVol:0.55,
    riffRoot:220,riffNote:220,riffVol:0.50,riffCutoff:2800,padRoot:110,padNote:110,padVol:0.38,padCutoff:1200,
    leadNote:440,leadVol:0.48,pianoNote:220,pianoVol:0.45,pianoFilter:2200,
    acidNote:55,acidBase:300,acidReso:8,crunchVol:0.12,crunchLP:4000,

    pluckVol:0.38,pluckDecay:0.3,pluckReso:4,pluckDetune:0,arpCutoff:400,arpReso:3,
    modCutoff:1200,preset:5,openHatDecay:0.4,hatOpen:0.4,vocalVol:0.35,bassVol2:0.5};
  for(const k in _d) if(p[k]===undefined||isNaN(p[k])||!isFinite(p[k])) p[k]=_d[k];

  const now=ctx.currentTime, S=60/p.bpm/4;
  const master=ctx.createGain(); master.gain.value=0.78;
  const oscs=[];
  function stT(bar,s){ return now+(bar*16+s)*S; }

  // ── KICK: four-on-floor, tight and punchy ─────────────────────
  function kick(bar,vol){
    for(let s=0;s<16;s+=4){
      const t=stT(bar,s);
      const k=ctx.createOscillator(),ke=ctx.createGain();
      k.type='sine';
      k.frequency.setValueAtTime(p.kickFreq,t);
      k.frequency.exponentialRampToValueAtTime(38,t+0.06);
      ke.gain.setValueAtTime(vol,t); ke.gain.exponentialRampToValueAtTime(0.001,t+0.26);

      cl.connect(ce); ce.connect(master); cl.start(t); cl.stop(t+0.007); oscs.push(cl);
    }
  }

  // ── CLAP: on 2 and 4 ─────────────────────────────────────────
  function clap(bar,vol){
    [4,12].forEach(s=>{
      const t=stT(bar,s);
      const len=Math.ceil(ctx.sampleRate*0.12);
      const buf=ctx.createBuffer(1,len,ctx.sampleRate);
      const d=buf.getChannelData(0); for(let j=0;j<d.length;j++) d[j]=Math.random()*2-1;
      const cl=ctx.createBufferSource(); cl.buffer=buf;
      const hp=ctx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=900;
      const ce=ctx.createGain();
      ce.gain.setValueAtTime(vol,t); ce.gain.exponentialRampToValueAtTime(0.001,t+0.12);
      cl.connect(hp); hp.connect(ce); ce.connect(master); cl.start(t); cl.stop(t+0.14); oscs.push(cl);
    });

  // ── HI-HAT: 8th notes, tight ─────────────────────────────────
  function hat(bar,vol){
    for(let s=0;s<16;s+=2){
      const t=stT(bar,s);
      const len=Math.ceil(ctx.sampleRate*0.025);
      const buf=ctx.createBuffer(1,len,ctx.sampleRate);
      const d=buf.getChannelData(0); for(let j=0;j<d.length;j++) d[j]=Math.random()*2-1;
      const h=ctx.createBufferSource(); h.buffer=buf;
      const hp=ctx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=p.hatHP;
      const he=ctx.createGain();

  // ── PUMPING BASS: 8th notes, root↔fifth alternation ──────────
  // This is THE Hi-NRG bass: every 8th note pumps, alternating root and P5.
  // Short decay makes it percussive — "dum dum dum dum" not a held note.
  function bass(bar, rootHz){

    for(let s=0;s<16;s+=2){
      const t=stT(bar,s);
      const freq=rootHz*(s%4===0?1:P5); // root on beats, fifth on offbeats

  function stabs(bar, rootHz, dense){

        const o=ctx.createOscillator(); o.type='sawtooth'; o.frequency.value=rootHz*2*r;

  // 16th-note melodic pattern. The "Eurobeat lead" — relentless and energetic.
  // Pattern: runs up the scale, falls back, repeats with variation.
  function lead(bar, rootHz, transposed){
    const r=transposed?rootHz*Math.pow(2,2/12):rootHz; // whole step up for key change
    // 16-step melodic pattern (scale degrees in semitones)
    const PATTERN=[0,4,7,12, 11,7,4,0, 2,5,9,14, 12,9,5,2];
    for(let s=0;s<16;s++){
      const t=stT(bar,s);
      const freq=r*2*Math.pow(2,PATTERN[s]/12);

      e.gain.setValueAtTime(0,t); e.gain.linearRampToValueAtTime(p.leadVol,t+0.006);
      e.gain.exponentialRampToValueAtTime(0.001,t+S*0.85);
      o.connect(f); f.connect(e); e.connect(master); o.start(t); o.stop(t+S); oscs.push(o);
    }
  }

  const PROG=[0,5,7,5];
  const ROOT=p.bassRoot;

  // INTRO (0-7): lead alone sets the melodic identity
  for(let b=0;b<8;b++){
    const r=ROOT*Math.pow(2,PROG[b%4]/12);
    lead(b,r,false);
    if(b>=4){ kick(b,p.kickVol*0.6); bass(b,r); }

  for(let b=8;b<24;b++){
    const r=ROOT*Math.pow(2,PROG[b%4]/12);
    kick(b,p.kickVol); clap(b,p.clapVol); hat(b,p.hatVol);
    bass(b,r); stabs(b,r,false);
    if(b%2===0) lead(b,r,false);

  for(let b=24;b<40;b++){

  for(let b=48;b<64;b++){

title: "Eurodance -- Composition",
subtitle: "10 -- The Sound of a Continent Dancing",
body: `
<div class="lesson-intro">Eurodance is the sound of a continent losing its mind on the dancefloor. Haddaway, Ace of Base, 2 Unlimited, Cascada. It's simpler than Hi-NRG but more emotionally direct: minor key riff + driving beat + that specific kind of wistful-but-energetic melody that makes you feel nostalgic for a party you've never been to. The riff is everything. It IS the chorus.</div>

<div class="step-card"><span class="step-num">BPM + FEEL</span>
<strong>128–140 BPM</strong>. Slower and more open than Hi-NRG. The space between elements matters in Eurodance — it's dancefloor music that breathes, not a wall of sound. Everything is straight (no swing), four-on-floor kick, quarter-note bass. At 132 BPM there's just enough room between the kick hits to feel the groove.
</div>

<div class="step-card"><span class="step-num">THE RIFF — THE TRACK'S IDENTITY</span>
Every memorable Eurodance track has a 2-bar melodic riff that is immediately recognizable. Not an arpeggio pattern — a <em>melody</em>. It rises, moves, falls to the root. The riff plays in the chorus and drops out in the verse — this alternation IS the song structure.<br><br>
Classic Eurodance riff characteristics: minor tonality (usually natural minor or Dorian), starting above the root and descending, ending on or near the root. The riff uses two slightly detuned oscillators (8 cents apart) for the "fat" quality that defines the sound — one oscillator sounds thin, two slightly detuned sound like a full synth section.
</div>

<div class="step-card"><span class="step-num">SONG STRUCTURE — RIFF IN, RIFF OUT</span>
<div class="structure-bar">
  <div class="section-block intro">INTRO<br><span style="font-size:.55rem">riff only<br>8 bars</span></div>
  <div class="section-block verse">VERSE<br><span style="font-size:.55rem">no riff<br>16 bars</span></div>
  <div class="section-block drop">CHORUS<br><span style="font-size:.55rem">riff returns<br>16 bars</span></div>
  <div class="section-block break">BREAK<br><span style="font-size:.55rem">4 bars</span></div>
  <div class="section-block chorus">FINALE<br><span style="font-size:.55rem">full riff<br>20 bars</span></div>
</div>
The verse has no riff — just kick, bass, clap, and pad. The riff's absence creates space for the vocal (rap verse in classic Eurodance). When the riff returns in the chorus it signals the emotional peak. The listener has been waiting for it to come back.
</div>

<div class="step-card"><span class="step-num">CHORD PROGRESSION</span>
Minor key, simple. The most common Eurodance progression is <strong>i-VI-III-VII</strong> — a cycle that moves through the relative major and back, creating a sense of both weight (minor i) and openness (major VI). It loops endlessly without resolving — the track doesn't want to stop.
<div class="chord-row" data-root="110" data-mode="minor">
  <span class="chord root" data-chord="minor" data-degree="i">i</span>
  <span class="chord" data-chord="major" data-degree="VI">VI</span>
  <span class="chord" data-chord="major" data-degree="III">III</span>
  <span class="chord" data-chord="major" data-degree="VII">VII</span>
</div>
</div>

<div class="step-card"><span class="step-num">COMMON KEYS</span>
<strong>A minor, D minor, E minor.</strong> Eurodance uses minor keys almost universally — the emotional weight of the minor riff is the genre's identity. A minor is by far the most common: it's the natural minor scale on a keyboard (no sharps or flats), it's the first minor key beginners learn, and an enormous portion of the pop-electronic canon is in Am. D minor and E minor appear frequently because they're the P4 and P5 relative to Am — producers often transpose between related keys.
</div>
<div class="artists">
Haddaway — "What Is Love" (the riff-as-chorus principle in its purest form) / 2 Unlimited — "No Limit" (the rap verse / riff chorus structure) / Ace of Base — "The Sign" (slower, proves the template scales down) / Cascada — "Everytime We Touch" / Darude — "Sandstorm" (the riff that launched a meme but was always genuinely great)
</div>

// 132 BPM. Four-on-floor kick. The RIFF is the identity — it enters and exits to mark structure.
// In Eurodance the riff IS the chorus. When it plays = chorus. When it drops = verse.
// Bass pumps on beats, clap on 2+4. Pad underneath for warmth.

    snareVol:0.70,snareFreq:220,snareHiss:3,hatVol:0.16,hatHP:9200,hatDecay:0.4,
    clapVol:0.65,clapFreq:1200,rimFreq:800,stabNote:196,stabBP:900,stabDetune:8,stabVol:0.4,
    riffRoot:220,riffNote:220,riffVol:0.52,riffCutoff:2400,padRoot:110,padNote:110,padVol:0.28,padCutoff:900,
    leadNote:440,leadVol:0.5,pianoNote:220,pianoVol:0.45,pianoFilter:2200,
    acidNote:55,acidBase:300,acidReso:8,crunchVol:0.12,crunchLP:4000,
    cowVol:0.2,cowDecay:0.35,tomNote:110,tomDecay:0.4,vocoderVol:0.35,vocoderBP:800,vocoderQ:3,
    swing:0.0,slapDelay:0.08,scRelease:0.28,sawVol:0.45,sawCutoff:800,
    pluckVol:0.38,pluckDecay:0.3,pluckReso:4,pluckDetune:0,arpCutoff:400,arpReso:3,
    modCutoff:1200,preset:5,openHatDecay:0.4,hatOpen:0.4,vocalVol:0.35,bassVol2:0.5};
  for(const k in _d) if(p[k]===undefined||isNaN(p[k])||!isFinite(p[k])) p[k]=_d[k];

  const now=ctx.currentTime, S=60/p.bpm/4;
  const master=ctx.createGain(); master.gain.value=0.76;
  const oscs=[];
  function stT(bar,s){ return now+(bar*16+s)*S; }

  // ── KICK ─────────────────────────────────────────────────────
  function kick(bar,vol){
    for(let s=0;s<16;s+=4){
      const t=stT(bar,s);
      const k=ctx.createOscillator(),ke=ctx.createGain();
      k.type='sine';
      k.frequency.setValueAtTime(p.kickFreq,t);
      k.frequency.exponentialRampToValueAtTime(38,t+0.062);
      ke.gain.setValueAtTime(vol,t); ke.gain.exponentialRampToValueAtTime(0.001,t+0.28);
      k.connect(ke); ke.connect(master); k.start(t); k.stop(t+0.32); oscs.push(k);
      // click
      const cl=ctx.createBufferSource();
      const cb=ctx.createBuffer(1,Math.ceil(ctx.sampleRate*0.005),ctx.sampleRate);
      const cd=cb.getChannelData(0); for(let j=0;j<cd.length;j++) cd[j]=Math.random()*2-1;
      cl.buffer=cb;
      const ce=ctx.createGain(); ce.gain.setValueAtTime(vol*0.38,t); ce.gain.exponentialRampToValueAtTime(0.001,t+0.005);
      cl.connect(ce); ce.connect(master); cl.start(t); cl.stop(t+0.007); oscs.push(cl);
    }
  }

  // ── CLAP ─────────────────────────────────────────────────────
  function clap(bar,vol){
    [4,12].forEach(s=>{
      const t=stT(bar,s);
      const len=Math.ceil(ctx.sampleRate*0.10);
      const buf=ctx.createBuffer(1,len,ctx.sampleRate);
      const d=buf.getChannelData(0); for(let j=0;j<d.length;j++) d[j]=Math.random()*2-1;
      const cl=ctx.createBufferSource(); cl.buffer=buf;
      const hp=ctx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=800;
      const ce=ctx.createGain();
      ce.gain.setValueAtTime(vol,t); ce.gain.exponentialRampToValueAtTime(0.001,t+0.10);
      cl.connect(hp); hp.connect(ce); ce.connect(master); cl.start(t); cl.stop(t+0.12); oscs.push(cl);
    });
  }

  // ── 16TH HAT ─────────────────────────────────────────────────
  function hat(bar,vol){
    for(let s=0;s<16;s+=2){
      const t=stT(bar,s);
      const len=Math.ceil(ctx.sampleRate*0.018);
      const buf=ctx.createBuffer(1,len,ctx.sampleRate);
      const d=buf.getChannelData(0); for(let j=0;j<d.length;j++) d[j]=Math.random()*2-1;
      const h=ctx.createBufferSource(); h.buffer=buf;
      const hp=ctx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=p.hatHP;
      const he=ctx.createGain();
      he.gain.setValueAtTime(vol,t); he.gain.exponentialRampToValueAtTime(0.001,t+0.016);
      h.connect(hp); hp.connect(he); he.connect(master); h.start(t); h.stop(t+0.020); oscs.push(h);
    }
  }

  // ── BASS: beat-driven, short ──────────────────────────────────
  function bass(bar, rootHz){
    // Quarter-note bass — punches on every beat, not every 8th
    for(let s=0;s<16;s+=4){
      const t=stT(bar,s);
      const o=ctx.createOscillator(),f=ctx.createBiquadFilter(),e=ctx.createGain();
      o.type='sawtooth'; o.frequency.value=rootHz;
      f.type='lowpass'; f.frequency.value=p.bassFilter; f.Q.value=p.bassReso;
      e.gain.setValueAtTime(p.bassVol,t);
      e.gain.exponentialRampToValueAtTime(0.001,t+0.22);
      o.connect(f); f.connect(e); e.connect(master); o.start(t); o.stop(t+0.25); oscs.push(o);
    }
  }

  // ── THE RIFF — 2-bar melodic figure, the track's identity ────
  // A real melody, not an arpeggio. Minor tonality, resolves on root.
  // This is the element that IS the chorus. Riff present = chorus. Riff absent = verse.
  function riff(bar, rootHz, vol){
    // 2-bar riff pattern (semitones from root): rises, falls, resolves
    const STEPS_A=[0,3,5,7, 5,3,0,7]; // bar 1: 8 8th-note positions
    const STEPS_B=[8,7,5,3, 0,0,0,0]; // bar 2: falls to root, holds
    const steps=((bar%2===0)?STEPS_A:STEPS_B);
    const noteDur=S*1.6; // slightly longer than 8th for legato
    for(let i=0;i<8;i++){
      const t=stT(bar,i*2);
      const semi=steps[i];

      const freq=rootHz*2*Math.pow(2,semi/12);
      const o=ctx.createOscillator(),f=ctx.createBiquadFilter(),e=ctx.createGain();

      // Slight detune for fatness (classic Eurodance: two detuned oscs)
      const o2=ctx.createOscillator(); o2.type='sawtooth'; o2.frequency.value=freq*1.008;

      e.gain.setValueAtTime(vol/2,t+noteDur-0.015); e.gain.exponentialRampToValueAtTime(0.001,t+noteDur);
      o.connect(f); o2.connect(f); f.connect(e); e.connect(master);
      o.start(t); o.stop(t+noteDur+0.01); oscs.push(o);
      o2.start(t); o2.stop(t+noteDur+0.01); oscs.push(o2);
    }
  }

  // ── PAD: sustained warmth under everything ────────────────────
  function pad(bar, rootHz){
    const M3=Math.pow(2,3/12), P5=Math.pow(2,7/12); // minor chord
    [1,M3,P5].forEach((r,ci)=>{
      const t=stT(bar,0);
      const o=ctx.createOscillator(),f=ctx.createBiquadFilter(),e=ctx.createGain();
      o.type='sawtooth'; o.frequency.value=rootHz*r;
      f.type='lowpass'; f.frequency.value=p.padCutoff; f.Q.value=0.5;
      e.gain.setValueAtTime(0,t); e.gain.linearRampToValueAtTime(p.padVol/3,t+0.3);
      e.gain.setValueAtTime(p.padVol/3,t+16*S-0.3); e.gain.linearRampToValueAtTime(0,t+16*S);
      o.connect(f); f.connect(e); e.connect(master); o.start(t); o.stop(t+16*S); oscs.push(o);
    });
  }

  // Chord progression: i-VI-III-VII (minor key, classic Eurodance)
  const PROG=[0,8,3,10]; // Am-F-C-G in Am
  const ROOT=p.bassRoot;

  // INTRO (0-7): riff alone, then kick enters
  for(let b=0;b<8;b++){
    const r=ROOT*Math.pow(2,PROG[b%4]/12);
    riff(b,r,p.riffVol);
    pad(b,r);
    if(b>=4){ kick(b,p.kickVol*0.7); bass(b,r); }
  }

  // VERSE (8-23): kick+bass+clap+hat, NO riff (just pad)
  for(let b=8;b<24;b++){
    const r=ROOT*Math.pow(2,PROG[b%4]/12);
    kick(b,p.kickVol); clap(b,p.clapVol); hat(b,p.hatVol);
    bass(b,r); pad(b,r);
  }

  // CHORUS (24-39): RIFF RETURNS — this IS the chorus
  for(let b=24;b<40;b++){
    const r=ROOT*Math.pow(2,PROG[b%4]/12);
    kick(b,p.kickVol); clap(b,p.clapVol*1.05); hat(b,p.hatVol*1.1);

  for(let b=40;b<44;b++){
    const r=ROOT*Math.pow(2,PROG[b%4]/12);
    kick(b,p.kickVol*0.8); bass(b,r);
  }

  }

  return { node:master, oscs, stopAt:now+64*16*S+0.5 };
}

body: `
<div class="lesson-intro">Eurodance sound design is about the riff. Everything else supports it. Here's how the synthesis choices create the specific timbral identity of each element, and why the detuned oscillator technique is the single most important production choice.</div>

<div class="step-card"><span class="step-num">THE RIFF SYNTHESIS — DETUNED DUAL OSCILLATORS</span>
Two sawtooth oscillators per note: one at the exact pitch, one at pitch × 1.008 (approximately 14 cents sharp). This creates a chorus effect from first principles — when two near-identical frequencies play simultaneously, they produce periodic beating (amplitude modulation at the difference frequency) that the ear reads as "width" and "richness."<br><br>
At 440Hz, 1.008 = 443.5Hz. The beating frequency is 3.5Hz — slow enough to hear as shimmer, fast enough to feel alive. One oscillator alone sounds thin. Both together sound like a synth section. This is the core technique of all 80s and 90s dance music production: simple synthesis, doubled and detuned.
</div>

<div class="step-card"><span class="step-num">THE RIFF MELODY — MINOR SCALE VOCABULARY</span>
The demo riff uses semitone offsets [0,3,5,7,5,3,0,7] in bar 1 and [8,7,5,3,0] in bar 2 — natural minor scale degrees. The riff opens by outlining the minor triad (0-3-5-7), touches the b7 degree for color, then resolves to root. This is the melodic vocabulary of Eurodance: minor scale, triadic movement, resolving cadences.<br><br>
The notes use a slightly extended duration (S × 1.6) with a deliberate gap before the next note (exponential decay to near-zero). This legato-but-articulated quality is what gives the riff its singing character — it sounds like a voice, not a drum.
</div>

<div class="step-card"><span class="step-num">THE PAD — SUSTAINED MINOR CHORD</span>
Three sawtooth oscillators (root, minor 3rd, perfect 5th) through a tight lowpass at ~900Hz. Very low cutoff makes the pad warm and dark — it sits in the background providing harmonic context without competing with the riff in the midrange. The pad fades in over 300ms and out over 300ms at each bar boundary so it doesn't click.
</div>

<div class="step-card"><span class="step-num">BASS AND DRUMS — SUPPORT ONLY</span>
The bass plays quarter notes (one hit per beat) rather than 8th-note pumping. This is intentionally less aggressive than Hi-NRG — Eurodance needs space for the riff, and a pumping 8th-note bass fills the midrange in a way that competes with it. Quarter-note bass hits are punchy but brief (220ms), leaving room between them.<br><br>
The hat plays 8th notes at moderate volume — present but not dominant. In Eurodance the hats are textural, not the primary rhythmic information. The clap on 2 and 4 provides the backbeat.
</div>

For free Eurodance samples: Looperman.com (90s dance packs) / Freesound.org ("trance lead", "90s synth", "eurodance stab") / splice.com (90s rave/dance packs). The actual instruments used in classic Eurodance: Roland D-50, Korg M1 (famous "M1 organ"), Oberheim Matrix-1000, Akai S1000 sampler. The M1 piano preset appears on hundreds of 90s dance tracks.

        const o=ctx.createOscillator(),f=ctx.createBiquadFilter(),e=ctx.createGain();
        o.type='sawtooth'; o.frequency.value=note;
        f.type='lowpass'; f.frequency.value=p.riffCutoff; f.Q.value=1.8;
        e.gain.setValueAtTime(p.riffVol,st); e.gain.exponentialRampToValueAtTime(0.001,st+S*1.6);
        o.connect(f); f.connect(e); e.connect(master); o.start(st); o.stop(st+S*2); oscs.push(o);
      }
    }
    // CLAP (preset 2 or 5)
    if(pr===2||pr===5){
      [4,12].forEach(s=>{
        const st=now+(bar*16+s)*S;
        [[1,0],[1,0.01],[0.7,0.022]].forEach(([v,off])=>{
          const buf=ctx.createBuffer(1,ctx.sampleRate*0.1,ctx.sampleRate);
          const d=buf.getChannelData(0); for(let j=0;j<d.length;j++) d[j]=Math.random()*2-1;
          const cl=ctx.createBufferSource(); cl.buffer=buf;
          const cf=ctx.createBiquadFilter(); cf.type='bandpass'; cf.frequency.value=p.clapFreq; cf.Q.value=1.5;
          const ce=ctx.createGain(); ce.gain.setValueAtTime(p.clapVol*v,st+off); ce.gain.exponentialRampToValueAtTime(0.001,st+off+0.09);
          cl.connect(cf); cf.connect(ce); ce.connect(master); cl.start(st+off); cl.stop(st+off+0.12); oscs.push(cl);
        });
      });
    }
    // STRING PAD (preset 3 or 5)
    if(pr===3||pr===5){
      const bs=now+bar*16*S, be=bs+16*S;
      const padMix=ctx.createGain(); padMix.gain.value=0.45;
      const padFilt=ctx.createBiquadFilter(); padFilt.type='lowpass'; padFilt.frequency.value=1200; padFilt.Q.value=0.7;
      const padEnv=ctx.createGain();
      padEnv.gain.setValueAtTime(0,bs); padEnv.gain.linearRampToValueAtTime(p.padVol,bs+0.6);
      padEnv.gain.setValueAtTime(p.padVol,be-0.2); padEnv.gain.exponentialRampToValueAtTime(0.001,be+0.1);
      [0,3,7].forEach(semi=>{
        const o=ctx.createOscillator(); o.type='sawtooth'; o.frequency.value=p.padNote*Math.pow(2,semi/12);
        o.connect(padMix); o.start(bs); o.stop(be+0.2); oscs.push(o);
      });
      padMix.connect(padFilt); padFilt.connect(padEnv); padEnv.connect(master);
    }
  }
  return { node:master, oscs, stopAt:now+BARS*16*S+0.5 };
}

title: "Eurodance -- In the Studio",
subtitle: "12 -- How to Build a Eurodance Track",
body: `
<div class="lesson-intro">Eurodance production logic is about the riff's arrival and absence. The structure is built around one question: when does the listener get to hear the riff? Here's how each production decision serves that question.</div>

<div class="step-card"><span class="step-num">THE RIFF AS STRUCTURAL SIGNAL</span>
<p>In the demo, the riff plays in bars 0–7 (intro), drops for bars 8–23 (verse), returns at bar 24 (chorus), drops again briefly at bar 40, then returns for the final section. Every structural boundary in the track is marked by the riff appearing or disappearing — not by changing BPM, not by adding drums, not by a key change.</p>
<p>This is the fundamental Eurodance production technique: <strong>the riff is the arrangement</strong>. The verse exists to make you miss it. The chorus exists to give it back to you.</p>
</div>

<div class="step-card"><span class="step-num">THE 2-BAR RIFF PATTERN CYCLING</span>
<p>The riff function uses <code>bar%2</code> to alternate between two bar patterns — STEPS_A for even bars, STEPS_B for odd bars. This creates a 2-bar phrase that repeats every 2 bars. The result is a melodic loop that never sounds exactly the same two bars in a row but follows a regular 2-bar cycle — the ear hears repetition with slight variation, which is the basis of all dance music hooks.</p>
</div>

<div class="step-card"><span class="step-num">THE DETUNING — HOW MUCH IS RIGHT</span>
<p>The second oscillator is tuned to <code>freq × 1.008</code> — about 14 cents. This is a deliberate choice in the middle of the audible range for detuning effects: less than 5 cents sounds like a single slightly-out-of-tune oscillator. More than 30 cents starts to sound like two distinct notes. At 14 cents the beating is fast enough to feel like shimmer (3–7Hz depending on the note) and slow enough not to feel like chorus.</p>
<p>If the riff sounds too thin: increase to 1.012 or 1.015. If it sounds too wobbly/chorused: reduce to 1.005.</p>
</div>

<div class="step-card"><span class="step-num">VERSE DENSITY VS CHORUS DENSITY</span>
<p>The verse has kick + clap + hat + bass + pad. No riff. The pad provides harmonic warmth so the verse doesn't feel completely empty — just stripped of its hook. The chorus adds the riff and slightly increases hat and clap volume.</p>
<p>The finale section (bars 56–63) further increases hat volume (× 1.3) and riff volume (× 1.08). This subtle escalation makes the track feel like it's building to something even after the hook has been present for several sections.</p>
</div>

<div class="step-card"><span class="step-num">COMMON PROBLEMS + FIXES</span>
<p><strong>"The riff doesn't sound like Eurodance"</strong> — The detuning and the minor key melody are both essential. If riffCutoff is too low the riff sounds too dark. Try 2400–3000Hz. If too high it sounds harsh.</p>
<p><strong>"The verse feels too empty"</strong> — Raise padVol slightly. The pad should be subtle but audible during the verse to maintain harmonic context. If the pad disappears, the verse has no tonal center.</p>
<p><strong>"The chorus doesn't feel like a lift"</strong> — The riff must be clearly louder than the pad during the chorus. Check that riffVol is meaningfully higher than padVol. The contrast between verse (pad only) and chorus (riff + pad) drives the energy lift.</p>
</div>

<div class="artists">
Listen and map: Haddaway — "What Is Love" (count exactly how many bars the verse runs before the riff returns; the patience is the technique) / 2 Unlimited — "Tribal Dance" (the riff enters and exits more frequently — shows variations on the template) / Scooter — "How Much Is the Fish?" (high-energy end of the genre).
</div>

code: `// EURODANCE -- FULL ARRANGEMENT (~68s)
// 132 BPM. Four-on-floor kick. The RIFF is the identity — it enters and exits to mark structure.
// In Eurodance the riff IS the chorus. When it plays = chorus. When it drops = verse.
// Bass pumps on beats, clap on 2+4. Pad underneath for warmth.
// Think: "What Is Love" (Haddaway), "Better Off Alone" (Alice DJ), "Sandstorm" (Darude).

function makeSynth(ctx, p) {
  const _d={bpm:132,root:220,bassRoot:110,bassNote:65,bassVol:0.68,bassCutoff:300,bassFilter:500,bassReso:3,
    kickVol:0.88,kickFreq:138,kickNote:55,kickStart:155,kickSub:50,kickDecay:0.30,
    snareVol:0.70,snareFreq:220,snareHiss:3,hatVol:0.16,hatHP:9200,hatDecay:0.4,
    clapVol:0.65,clapFreq:1200,rimFreq:800,stabNote:196,stabBP:900,stabDetune:8,stabVol:0.4,
    riffRoot:220,riffNote:220,riffVol:0.52,riffCutoff:2400,padRoot:110,padNote:110,padVol:0.28,padCutoff:900,
    leadNote:440,leadVol:0.5,pianoNote:220,pianoVol:0.45,pianoFilter:2200,
    acidNote:55,acidBase:300,acidReso:8,crunchVol:0.12,crunchLP:4000,
    cowVol:0.2,cowDecay:0.35,tomNote:110,tomDecay:0.4,vocoderVol:0.35,vocoderBP:800,vocoderQ:3,
    swing:0.0,slapDelay:0.08,scRelease:0.28,sawVol:0.45,sawCutoff:800,
    pluckVol:0.38,pluckDecay:0.3,pluckReso:4,pluckDetune:0,arpCutoff:400,arpReso:3,
    modCutoff:1200,preset:5,openHatDecay:0.4,hatOpen:0.4,vocalVol:0.35,bassVol2:0.5};
  for(const k in _d) if(p[k]===undefined||isNaN(p[k])||!isFinite(p[k])) p[k]=_d[k];

  const now=ctx.currentTime, S=60/p.bpm/4;
  const master=ctx.createGain(); master.gain.value=0.76;
  const oscs=[];
  function stT(bar,s){ return now+(bar*16+s)*S; }

  // ── KICK ─────────────────────────────────────────────────────
  function kick(bar,vol){
    for(let s=0;s<16;s+=4){
      const t=stT(bar,s);
      const k=ctx.createOscillator(),ke=ctx.createGain();
      k.type='sine';
      k.frequency.setValueAtTime(p.kickFreq,t);
      k.frequency.exponentialRampToValueAtTime(38,t+0.062);
      ke.gain.setValueAtTime(vol,t); ke.gain.exponentialRampToValueAtTime(0.001,t+0.28);
      k.connect(ke); ke.connect(master); k.start(t); k.stop(t+0.32); oscs.push(k);
      // click
      const cl=ctx.createBufferSource();
      const cb=ctx.createBuffer(1,Math.ceil(ctx.sampleRate*0.005),ctx.sampleRate);
      const cd=cb.getChannelData(0); for(let j=0;j<cd.length;j++) cd[j]=Math.random()*2-1;
      cl.buffer=cb;
      const ce=ctx.createGain(); ce.gain.setValueAtTime(vol*0.38,t); ce.gain.exponentialRampToValueAtTime(0.001,t+0.005);
      cl.connect(ce); ce.connect(master); cl.start(t); cl.stop(t+0.007); oscs.push(cl);
    }
  }

  // ── CLAP ─────────────────────────────────────────────────────
  function clap(bar,vol){
    [4,12].forEach(s=>{
      const t=stT(bar,s);
      const len=Math.ceil(ctx.sampleRate*0.10);
      const buf=ctx.createBuffer(1,len,ctx.sampleRate);
      const d=buf.getChannelData(0); for(let j=0;j<d.length;j++) d[j]=Math.random()*2-1;
      const cl=ctx.createBufferSource(); cl.buffer=buf;
      const hp=ctx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=800;
      const ce=ctx.createGain();
      ce.gain.setValueAtTime(vol,t); ce.gain.exponentialRampToValueAtTime(0.001,t+0.10);
      cl.connect(hp); hp.connect(ce); ce.connect(master); cl.start(t); cl.stop(t+0.12); oscs.push(cl);
    });
  }

  // ── 16TH HAT ─────────────────────────────────────────────────
  function hat(bar,vol){
    for(let s=0;s<16;s+=2){
      const t=stT(bar,s);
      const len=Math.ceil(ctx.sampleRate*0.018);
      const buf=ctx.createBuffer(1,len,ctx.sampleRate);
      const d=buf.getChannelData(0); for(let j=0;j<d.length;j++) d[j]=Math.random()*2-1;
      const h=ctx.createBufferSource(); h.buffer=buf;
      const hp=ctx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=p.hatHP;
      const he=ctx.createGain();
      he.gain.setValueAtTime(vol,t); he.gain.exponentialRampToValueAtTime(0.001,t+0.016);
      h.connect(hp); hp.connect(he); he.connect(master); h.start(t); h.stop(t+0.020); oscs.push(h);
    }
  }

  // ── BASS: beat-driven, short ──────────────────────────────────
  function bass(bar, rootHz){
    // Quarter-note bass — punches on every beat, not every 8th
    for(let s=0;s<16;s+=4){
      const t=stT(bar,s);
      const o=ctx.createOscillator(),f=ctx.createBiquadFilter(),e=ctx.createGain();
      o.type='sawtooth'; o.frequency.value=rootHz;
      f.type='lowpass'; f.frequency.value=p.bassFilter; f.Q.value=p.bassReso;
      e.gain.setValueAtTime(p.bassVol,t);
      e.gain.exponentialRampToValueAtTime(0.001,t+0.22);
      o.connect(f); f.connect(e); e.connect(master); o.start(t); o.stop(t+0.25); oscs.push(o);
    }
  }

  // ── THE RIFF — 2-bar melodic figure, the track's identity ────
  // A real melody, not an arpeggio. Minor tonality, resolves on root.
  // This is the element that IS the chorus. Riff present = chorus. Riff absent = verse.
  function riff(bar, rootHz, vol){
    // 2-bar riff pattern (semitones from root): rises, falls, resolves
    const STEPS_A=[0,3,5,7, 5,3,0,7]; // bar 1: 8 8th-note positions
    const STEPS_B=[8,7,5,3, 0,0,0,0]; // bar 2: falls to root, holds
    const steps=((bar%2===0)?STEPS_A:STEPS_B);
    const noteDur=S*1.6; // slightly longer than 8th for legato
    for(let i=0;i<8;i++){
      const t=stT(bar,i*2);
      const semi=steps[i];
      if(semi===0 && i>4 && bar%2===1) continue; // held root: single long note
      const freq=rootHz*2*Math.pow(2,semi/12);
      const o=ctx.createOscillator(),f=ctx.createBiquadFilter(),e=ctx.createGain();
      o.type='sawtooth'; o.frequency.value=freq;
      // Slight detune for fatness (classic Eurodance: two detuned oscs)
      const o2=ctx.createOscillator(); o2.type='sawtooth'; o2.frequency.value=freq*1.008;
      f.type='lowpass'; f.frequency.value=p.riffCutoff; f.Q.value=0.8;
      e.gain.setValueAtTime(0,t); e.gain.linearRampToValueAtTime(vol/2,t+0.008);
      e.gain.setValueAtTime(vol/2,t+noteDur-0.015); e.gain.exponentialRampToValueAtTime(0.001,t+noteDur);
      o.connect(f); o2.connect(f); f.connect(e); e.connect(master);
      o.start(t); o.stop(t+noteDur+0.01); oscs.push(o);
      o2.start(t); o2.stop(t+noteDur+0.01); oscs.push(o2);
    }
  }

  // ── PAD: sustained warmth under everything ────────────────────
  function pad(bar, rootHz){
    const M3=Math.pow(2,3/12), P5=Math.pow(2,7/12); // minor chord
    [1,M3,P5].forEach((r,ci)=>{
      const t=stT(bar,0);
      const o=ctx.createOscillator(),f=ctx.createBiquadFilter(),e=ctx.createGain();
      o.type='sawtooth'; o.frequency.value=rootHz*r;
      f.type='lowpass'; f.frequency.value=p.padCutoff; f.Q.value=0.5;
      e.gain.setValueAtTime(0,t); e.gain.linearRampToValueAtTime(p.padVol/3,t+0.3);
      e.gain.setValueAtTime(p.padVol/3,t+16*S-0.3); e.gain.linearRampToValueAtTime(0,t+16*S);
      o.connect(f); f.connect(e); e.connect(master); o.start(t); o.stop(t+16*S); oscs.push(o);
    });
  }

  // Chord progression: i-VI-III-VII (minor key, classic Eurodance)
  const PROG=[0,8,3,10]; // Am-F-C-G in Am
  const ROOT=p.bassRoot;

  // INTRO (0-7): riff alone, then kick enters
  for(let b=0;b<8;b++){
    const r=ROOT*Math.pow(2,PROG[b%4]/12);
    riff(b,r,p.riffVol);
    pad(b,r);
    if(b>=4){ kick(b,p.kickVol*0.7); bass(b,r); }
  }

  // VERSE (8-23): kick+bass+clap+hat, NO riff (just pad)
  for(let b=8;b<24;b++){
    const r=ROOT*Math.pow(2,PROG[b%4]/12);
    kick(b,p.kickVol); clap(b,p.clapVol); hat(b,p.hatVol);
    bass(b,r); pad(b,r);
  }

  // CHORUS (24-39): RIFF RETURNS — this IS the chorus
  for(let b=24;b<40;b++){
    const r=ROOT*Math.pow(2,PROG[b%4]/12);
    kick(b,p.kickVol); clap(b,p.clapVol*1.05); hat(b,p.hatVol*1.1);
    bass(b,r); riff(b,r,p.riffVol); pad(b,r);
  }

  // BREAK (40-43): kick + bass only. Space before final section.
  for(let b=40;b<44;b++){
    const r=ROOT*Math.pow(2,PROG[b%4]/12);
    kick(b,p.kickVol*0.8); bass(b,r);
  }

  // OUTRO CHORUS (44-63): full riff returns, builds with hat density
  for(let b=44;b<64;b++){
    const r=ROOT*Math.pow(2,PROG[b%4]/12);
    kick(b,p.kickVol); clap(b,p.clapVol); hat(b,p.hatVol*(b>=56?1.3:1.0));
    bass(b,r); riff(b,r,p.riffVol*(b>=56?1.08:1.0)); pad(b,r);
  }

  return { node:master, oscs, stopAt:now+64*16*S+0.5 };
}
function updateParams(n,p){}`,

{
title: "Electro Swing -- Composition",
subtitle: "13 -- Charleston Meets Club",
body: `
<div class="lesson-intro">Electro swing is club music that samples jazz — not jazz with a beat added. Caravan Palace, Parov Stelar, Jamie Berry. The genius is the <em>collision</em>: a straight four-on-floor kick underneath a swung Charleston hat, 1930s horn stabs landing on the electronic offbeats. It sounds like a time machine crashed into a nightclub — and the dancefloor loves it.</div>

<div class="step-card"><span class="step-num">THE CORE TENSION: TWO GROOVES, ONE TRACK</span>
The entire genre lives in the friction between two rhythmic worlds playing simultaneously.<br><br>
<strong>Electronic world (straight):</strong> The kick lands exactly on beats 1, 2, 3, 4 — mechanical, grid-locked, unswung. This is the club element.<br>
<strong>Jazz world (swung):</strong> Every other 8th note is pushed slightly back in time. The Charleston hat goes <em>long-short, long-short</em>. The bass bounces between beats. The horn stabs land on the swung offbeats — between the kick hits.<br><br>
This isn't a subtle production choice. It's the structural premise. At 130 BPM with a swing ratio of about 60:40, the gap between where the kick lands (exact 8th) and where the stabs land (swung "and") is what makes electro swing feel like it's about to tip over but never quite does.
</div>

<div class="step-card"><span class="step-num">BPM + FEEL</span>
<strong>125–135 BPM</strong> is the sweet spot. Too slow (under 120) and the energy sags. Too fast (over 140) and the swing feel compresses until the long-short difference becomes inaudible.<br><br>
<strong>Swing ratio:</strong> 60:40 is light swing — the offbeat note is pushed back by 20% of the beat duration. 67:33 is heavy swing. Most electro swing sits around 62:38. In Web Audio, this means every odd-numbered 16th step gets a timing offset of roughly <code>0.22 × stepDuration</code>.
</div>

<div class="step-card"><span class="step-num">SONG STRUCTURE</span>
<div class="structure-bar">
  <div class="section-block intro">INTRO<br><span style="font-size:.55rem">Jazz trio<br>no kick<br>8 bars</span></div>
  <div class="section-block verse">PRE-DROP<br><span style="font-size:.55rem">stab teases<br>4 bars</span></div>
  <div class="section-block drop">DROP<br><span style="font-size:.55rem">kick lands<br>16 bars</span></div>
  <div class="section-block chorus">GROOVE<br><span style="font-size:.55rem">stabs rotate<br>16 bars</span></div>
  <div class="section-block break">BREAK<br><span style="font-size:.55rem">kick out<br>8 bars</span></div>
  <div class="section-block outro">BUILD<br><span style="font-size:.55rem">stripped<br>4 bars</span></div>
  <div class="section-block drop">FINALE<br><span style="font-size:.55rem">everything<br>8 bars</span></div>
</div>
The structural key: the <strong>intro establishes the jazz world before the electronic world exists</strong>. The first kick hit is a genuine surprise. Then the break strips back to the jazz world again, reminding you what it sounded like before — and the final drop hits harder because of that contrast.
</div>

<div class="step-card"><span class="step-num">THE CHARLESTON HAT PATTERN</span>
The hi-hat is the genre's signature rhythm. Not a straight four-on-the-floor hat, not a regular 8th-note hat — the <strong>Charleston pattern</strong>: closed hat on every 8th note (swung), but the "and" beats are <em>open hats</em> that ring slightly longer and sit at a lower highpass frequency.
<div style="font-family:'Space Mono',monospace;font-size:.65rem;margin:.8rem 0;line-height:2.2;">
STEP:  1  +  2  +  3  +  4  +<br>
HAT:   ×  o  ×  o  ×  o  ×  o   (× = closed, o = open, all swung)<br>
KICK:  ×  .  ×  .  ×  .  ×  .   (straight grid)<br>
STAB:  .  ×  .  .  .  ×  .  .   (swung "and of 1" and "and of 3")
</div>
The kick is straight. The hats and stabs are swung. The gap between them — that's electro swing.
</div>

<div class="step-card"><span class="step-num">THE HORN STAB — THE HOOK, NOT DECORATION</span>
In electro swing, the horn stab <em>is</em> the melody. It's not an accent or a fill. It's a short, punchy dom7 chord — root + major 3rd + flat 7th — that fires on the swung offbeats and carries the track's energy.<br><br>
<strong>Three stab variants</strong> create the arrangement's texture:<br>
— <strong>Variant A:</strong> "and of 1" + "and of 3" — the standard pattern, two hits per bar<br>
— <strong>Variant B:</strong> "and of 1" + beat 3 + "and of 3" — denser, used in the chorus<br>
— <strong>Variant C:</strong> beat 1 + "and of 2" + beat 4 — displaced, call-and-response feel<br><br>
The arrangement rotates these variants to prevent the groove from feeling static over 64 bars.
</div>

<div class="step-card"><span class="step-num">CHORD PROGRESSIONS</span>
Jazz harmony is richer than pop harmony — chords have 4+ notes, with 7ths built in. The most common electro swing progressions are the <strong>ii-V-I</strong> (the fundamental jazz cadence) and the <strong>I-VI-ii-V</strong> turnaround (what most Tin Pan Alley songs are built on).
<div class="chord-row" data-root="131" data-mode="major">
  <span class="chord" data-chord="min7" data-degree="ii">ii7</span>
  <span class="chord" data-chord="dom7" data-degree="V">V7</span>
  <span class="chord root" data-chord="maj7" data-degree="I">Imaj7</span>
  <span class="chord root" data-chord="maj7" data-degree="I">Imaj7</span>
</div>
<div class="chord-row" data-root="131" data-mode="major">
  <span class="chord root" data-chord="maj7" data-degree="I">Imaj7</span>
  <span class="chord" data-chord="dom7" data-degree="VI">VI7</span>
  <span class="chord" data-chord="min7" data-degree="ii">ii7</span>
  <span class="chord" data-chord="dom7" data-degree="V">V7</span>
</div>
Notice how different each chord quality feels: maj7 = floating/dreamy, V7 = urgent/wants to resolve, min7 = melancholy/cool. The dom7 stab chord (V7 quality) has built-in tension — it always wants to land somewhere. That restless quality is part of why the stabs feel propulsive.
</div>

<div class="step-card"><span class="step-num">COMMON KEYS</span>
<strong>D minor, G minor, A minor, C major.</strong> Electro swing draws from jazz standard repertoire, which lives in the horn-friendly flat keys. D minor and G minor are the most common because the ii-V-I progressions in Dm (Em7♭5–A7–Dm) and Gm sit naturally in the middle register of a piano keyboard. Many electro swing tracks are based on specific vintage jazz recordings that were in these keys — the sample dictates the key. C major appears frequently for the same keyboard-natural reason as Am.
</div>

// Caravan Palace / Parov Stelar / Jamie Berry approach:
// Jazz trio grooves the intro, four-on-floor kick DROPS hard,
// dom7 horn stabs ARE the hook (not decoration), bass syncopated not walking.
// 130 BPM. Swing on hats + horn stabs only (not bass or kick).

  function hats(bar,vol){

  function snare(bar,vol){
    [4,12].forEach(s=>{

      const buf=ctx.createBuffer(1,len,ctx.sampleRate);

  // Pattern: root on 1, root (swung) on "and of 1", P5 on 3, root on "and of 3"

  function bass(bar,rootHz){

    // Variant A: "and of 1" + "and of 3" (standard)

    const hits={
      A:[{s:3,dur:0.11},{s:11,dur:0.11}],
      B:[{s:3,dur:0.09},{s:8,dur:0.14},{s:11,dur:0.09}],

    });

        o.start(t); o.stop(t+dur+0.01); oscs.push(o);
      });
    });

  // ═══════════════════════════════════════════════════════
  for(let b=0;b<8;b++){

    bass(b,R);

  // ═══════════════════════════════════════════════════════
  for(let b=8;b<12;b++){

    bass(b,R);
    comp(b,R);
    if(b%2===0) stab(b,R,p.stabVol*0.55,'A');  // sparse tease
  }

  // ═══════════════════════════════════════════════════════
  // SECTION C — DROP (bars 12-27): Kick lands HARD.
  // Standard stab pattern A. Snare on 2+4. Full energy.
  // ═══════════════════════════════════════════════════════
  for(let b=12;b<28;b++){
    kick(b,p.kickVol);
    snare(b,p.snareVol*0.65);
    hats(b,p.hatVol);
    bass(b,R);
    stab(b,R,p.stabVol,'A');
    if(b%2===0) comp(b,R);  // comp on even bars only — space
  }

  // ═══════════════════════════════════════════════════════
  // SECTION D — GROOVE (bars 28-43): Stab patterns rotate.
  // Variant B and C add density and call-response.
  // ═══════════════════════════════════════════════════════
  for(let b=28;b<44;b++){
    kick(b,p.kickVol);
    snare(b,p.snareVol*0.68);
    hats(b,p.hatVol);
    bass(b,R);
    const v=['A','B','A','C'][b%4];
    stab(b,R,p.stabVol,v);
    comp(b,R);
  }

  // ═══════════════════════════════════════════════════════
  // SECTION E — BREAK (bars 44-51): Kick drops out.
  // Jazz trio + sparse stab hints. Woodwind ornament.
  // ═══════════════════════════════════════════════════════
  for(let b=44;b<52;b++){
    hats(b,p.hatVol*0.78);
    bass(b,R);
    if(b%4===0) woodwind(b,R);    // woodwind every 4 bars
    if(b%2===0) stab(b,R,p.stabVol*0.45,'A');  // sparse stabs
    if(b>=50) comp(b,R);  // comp creeps back in last 2 bars
  }

  // ═══════════════════════════════════════════════════════
  // SECTION F — FINALE BUILD (bars 52-55): Kick + bass only.
  // Strip back to just the pulse. Tension before the final drop.
  // ═══════════════════════════════════════════════════════
  for(let b=52;b<56;b++){
    kick(b,p.kickVol*0.85);
    bass(b,R);
  }

  // ═══════════════════════════════════════════════════════
  // SECTION G — OUTRO DROP (bars 56-63): Everything returns.
  // Stab variant B on every bar — maximum density.
  // Ends with a final stab figure + silence.
  // ═══════════════════════════════════════════════════════
  for(let b=56;b<64;b++){
    kick(b,p.kickVol);
    snare(b,p.snareVol*0.72);
    hats(b,p.hatVol*1.15);
    bass(b,R);
    stab(b,R,p.stabVol*1.08,b%2===0?'B':'C');
    comp(b,R);
  }

  return { node:master, oscs, stopAt:now+64*16*S+0.5 };
}
function updateParams(n,p){}`,

{
title: "Electro Swing -- Sound Design",
subtitle: "14 -- Clarinets Never Sounded Like This",
body: `
<div class="lesson-intro">Every sound in the demo track is synthesized from scratch using Web Audio oscillators and noise — no samples. This lesson explains exactly how each instrument is built and why those specific synthesis choices produce something that reads as "jazz-adjacent" rather than just another synth patch.</div>

<div class="step-card"><span class="step-num">THE KICK — SUB SINE + NOISE CLICK</span>
The kick is a sine oscillator with a steep frequency sweep: it starts at ~148Hz and exponentially ramps down to 36Hz in about 68ms. That downward sweep is what gives it the characteristic "thud" — your ear hears the pitch drop as physical mass.<br><br>
A short noise burst (6ms) fires simultaneously for the attack transient — the physical click of the beater hitting the drum head. Without this, the kick feels like it's heard through a wall. With it, it punches through even on small speakers.<br><br>
<strong>Key parameter:</strong> the kick runs on a <em>straight grid</em> — no swing offset. It's the electronic anchor. Everything jazz is swung around it.
</div>

<div class="step-card"><span class="step-num">THE CHARLESTON HAT — NOISE + HIGHPASS, TWO CHARACTERS</span>
The hat is white noise through a highpass filter — but with two distinct versions playing in alternation to create the Charleston rhythm:<br><br>
<strong>Closed hat:</strong> Highpass at 9800Hz (very bright, tight), 18ms decay. Fires on every 8th note position.<br>
<strong>Open hat:</strong> Highpass at 7200Hz (slightly warmer), 140ms decay. Fires only on the swung "and" beats (steps 3, 7, 11, 15).<br><br>
The open hat's longer decay creates a shimmer that overlaps the next closed hat. This overlap — closed cutting through the open's tail — is the Charleston feel. The alternating brightness also helps your ear track two rhythmic layers at once.
</div>

<div class="step-card"><span class="step-num">THE SNARE — TUNED NOISE</span>
Bandpass-filtered noise centered at 220Hz (Q=0.9) run through a secondary highpass at 200Hz. The bandpass gives it its tuned "crack" quality; the highpass removes the low-frequency rumble that makes noise sound more like a kick. Placed 4ms behind beats 2 and 4 — the "lazy" timing that reads as human.<br><br>
This 4ms delay is a deliberate feel choice: jazz drummers play slightly behind the beat, especially on the snare. It creates a loping, relaxed quality even at 130 BPM.
</div>

<div class="step-card"><span class="step-num">THE SYNCOPATED BASS — SAWTOOTH WITH SWING TIMING</span>
A sawtooth through a lowpass filter (700Hz, Q=1.5) — the lowpass removes the upper harmonics that would clash with the horn stabs in the midrange.<br><br>
The syncopation is in the <strong>timing pattern</strong>, not the pitch: root note on beat 1, root again on the swung "and of 1", P5 on beat 3, root on the swung "and of 3". The "and" hits are swung back in time, creating a bounce between the straight kick hits. This is what makes the bass feel alive rather than locked to a grid.<br><br>
<strong>This is not a walking bass line.</strong> A walking bass changes pitch on every quarter note. This bass is syncopated — fewer hits, timed for maximum bounce against the kick.
</div>

<div class="step-card"><span class="step-num">THE HORN STAB — THE HARDEST SOUND TO GET RIGHT</span>
This took the most iterations to get right. The key insight is that brass instruments have <strong>all harmonics</strong> (not just odd ones), with a spectrum that peaks in the 800–1200Hz "presence" region — not at the fundamental. A plain sawtooth wave doesn't capture this because its spectrum falls off too smoothly.<br><br>

</div>

Four sawtooth oscillators tuned to root, M3, P5, and b7 (a dominant 7th chord), each through a shared lowpass at 1800Hz. They fire with a tiny cascade stagger (2ms apart) — so the chord "spreads" slightly like a pianist's fingers rather than snapping on exactly the same sample.<br><br>

</div>

<div class="step-card"><span class="step-num">THE WOODWIND ORNAMENT — ADDITIVE SYNTHESIS + CHIFF</span>
The woodwind only plays in the break section (every 4 bars, 3-note figures). It uses a synthesis approach derived from how a clarinet actually works:<br><br>
A clarinet's cylindrical bore with one closed end produces only <strong>odd harmonics</strong>. The actual amplitude ratios in a real clarinet are approximately: 1f = 1.0, 3f = 0.70, 5f = 0.28, 7f = 0.10. The demo uses three sine oscillators at 1f, 3f, and 5f with those proportions — not a square wave (which has odd harmonics at equal amplitude, which sounds more like a Game Boy than a clarinet).<br><br>
<strong>Chiff attack:</strong> a 20ms noise burst through a 1400Hz bandpass fires on the note onset. This is the sound of the reed beginning to vibrate — without it the note appears from nothing and sounds synthetic.<br><br>
<strong>Vibrato:</strong> implemented via direct frequency scheduling rather than an LFO oscillator (which would add an extra node per note). Four <code>setValueAtTime</code> calls at 5.5Hz intervals starting at 110ms approximate one vibrato cycle and begin the characteristic wobble after the attack settles.
</div>

<div class="artists">
The clarinet in electro swing is almost always a real instrument — sampled, not synthesized. Caravan Palace's players actually perform on vintage instruments. The synthesis here is an approximation; the real thing is always richer. But understanding why the additive approach works better than a square wave tells you something real about how timbre is constructed from harmonics.
</div>

body: `
<div class="lesson-intro">Everything in this demo is built from the same synthesis primitives — oscillators, noise, filters, gain envelopes. This lesson walks through the production decisions: what each element does for the track, why the arrangement is structured the way it is, and what to adjust when something isn't working.</div>

<div class="step-card"><span class="step-num">THE PRODUCTION PREMISE: ESTABLISH BEFORE YOU COLLIDE</span>
<p>The most important structural decision in electro swing is <strong>letting the jazz world exist alone before introducing the electronic world</strong>. The demo's intro (bars 0–7) has no kick — just bass, Charleston hats, and piano comp. This isn't padding; it's context-setting.</p>
<p>When the kick enters in the pre-drop section, it feels like an intrusion. That's intentional. The listener has been living in the jazz world, and the kick arriving on the straight grid is a genuine surprise. If both elements start together, the collision never happens — you just have a track with two elements in it.</p>
<p><strong>Rule:</strong> always establish one world before introducing the other. The jazz/electronic contrast is only audible if the listener knows what pure-jazz sounds like first.</p>
</div>

<div class="step-card"><span class="step-num">THE 7-SECTION ARRANGEMENT</span>
<div style="font-family:'Space Mono',monospace;font-size:.62rem;margin:.6rem 0;line-height:2.4;">
A  INTRO      (bars  0– 7)  Bass + hats + piano. No kick. Jazz world alone.<br>
B  PRE-DROP   (bars  8–11)  Sparse stab teases. Building expectation.<br>
C  DROP       (bars 12–27)  Kick lands hard. Stab pattern A. Full collision.<br>
D  GROOVE     (bars 28–43)  Stab variants rotate: A→B→A→C. Call-response.<br>
E  BREAK      (bars 44–51)  Kick out. Woodwind ornament. Sparse stabs.<br>
F  BUILD      (bars 52–55)  Kick + bass only. Strip-back tension.<br>
G  FINALE     (bars 56–63)  Everything returns. Maximum density.
</div>
<p>The break (E) is the emotional center of the track. After 44 bars of kick, the sudden silence of just hats and bass is visceral. The woodwind ornament fills the space without replacing what was lost. Section F then strips even further — just kick and bass, the two most skeletal elements — which makes the finale feel enormous when everything returns simultaneously.</p>
</div>

<div class="step-card"><span class="step-num">BALANCING THE TWO WORLDS</span>
<p>The mix balance between electronic and jazz elements determines whether a track reads as electro swing or just "a dance track with some jazz." Target balance points:</p>
<p><strong>Kick vs. bass:</strong> the syncopated bass should be audible at roughly 70% of the kick's level. The bass provides harmonic and rhythmic information; if it's buried under the kick, the swing bounce disappears.</p>
<p><strong>Horn stab vs. kick:</strong> in the drop, the stabs should sit 6–10dB below the kick peak but be the most prominent melodic element. They're the hook — they need presence without masking the kick's sub.</p>
<p><strong>Piano comp vs. horns:</strong> keep the comp at about half the stab volume. Its job is harmonic support, not presence. If it's too loud, it fills the midrange space that the stabs need.</p>
<p><strong>Charleston hats:</strong> the open hat's 140ms decay overlaps the next closed hat. If the hat volume is too high, this overlap creates a washy shimmer that obscures the stab rhythm. The hats should be audible but not dominant — their job is carrying the swing feel, not defining the mix level.</p>
</div>

<div class="step-card"><span class="step-num">THE HORN STAB FILTER CHAIN — WHY EACH STAGE EXISTS</span>
<p>The stab synthesis uses a four-stage filter chain that took multiple iterations to arrive at. Understanding each stage helps you adjust it:</p>
<p><strong>Highpass at 160Hz:</strong> removes sub energy that makes three sawtooth oscillators sound muddy together. Without this, the stabs conflict with the kick and bass in the low end.</p>
<p><strong>Peaking EQ at 1100Hz (+14dB, Q=1.6):</strong> this is the "brass formant" — the frequency region where real brass instruments project most of their energy. Without this, the stab sounds like a buzzy synth chord. With it, the ear reads "horn section." This single EQ stage is what makes the stab sound like electro swing rather than Eurodance.</p>
<p><strong>Lowpass sweep (4500Hz → 1400Hz → 900Hz):</strong> models the brightness arc of a real brass attack. When a trumpet player starts a note, the high harmonics are briefly present then settle as the embouchure stabilizes. The fast sweep (32ms to 1400Hz) captures this. Without it the stab is uniformly bright, which sounds electronic rather than acoustic.</p>
<p><strong>Amplitude envelope (4ms attack, sustain at 70%, exponential release):</strong> the 4ms attack is very fast — real brass speaks immediately. A 10ms+ attack sounds like a pad or organ, not a stab.</p>
</div>

<div class="step-card"><span class="step-num">THE SWING PARAMETER — ADJUSTING THE GROOVE FEEL</span>
<p>The swing slider controls the timing offset applied to all odd-numbered 16th steps. At 0 the track is fully straight — it sounds like house music. At 0.38 (maximum) the swing is so heavy it starts to sound like a comedy cartoon. The working range is 0.18–0.30.</p>
<p><strong>0.18:</strong> light swing, more modern/electronic feel. Works at faster BPMs (130+).<br>
<strong>0.22:</strong> default. Standard electro swing ratio — feels human without being exaggerated.<br>
<strong>0.28–0.30:</strong> heavy swing. More 1930s-jazz feel. Works better at slower BPMs (118–124).</p>
<p>The kick is explicitly exempt from swing (<code>stT</code> function vs. <code>swT</code>). If you accidentally apply swing to the kick it loses its role as the straight-grid anchor and the collision disappears.</p>
</div>

<div class="step-card"><span class="step-num">COMMON PROBLEMS + FIXES</span>
<p><strong>"It sounds too electronic, not jazzy enough"</strong> — Lower the kick volume, raise the bass. Increase the swing ratio. Make sure the hats are clearly audible and differentiated (open vs. closed).</p>
<p><strong>"The stabs don't sound like brass"</strong> — The peaking EQ boost at 1100Hz is the key. Also check the LP sweep timing — if it's too slow the brightness arc disappears. Attack should be 4ms or less.</p>
<p><strong>"The groove feels static"</strong> — Rotate through stab variants A, B, and C across the sections rather than using pattern A throughout. The call-and-response quality of variant C against pattern A is what gives the groove its conversation.</p>
<p><strong>"The break doesn't feel like a release"</strong> — The break only works if the sections before it are dense enough. If the drop sections are already sparse, removing the kick in the break doesn't create contrast — it just makes the track quieter.</p>
<p><strong>"The finale doesn't hit hard enough"</strong> — The build section (F) does the work. Four bars of kick + bass only is the tension that makes the finale feel like a release. If you shorten the build or fill it with other elements, the finale loses its impact.</p>
</div>

<div class="artists">
Listen and map: Caravan Palace — "Lone Digger" (count bars from the first kick hit to the break; note how long they sustain the groove before giving you the release) / Parov Stelar — "Booty Swing" (listen to the bass pattern against the kick — straight kick, bouncy bass) / Jamie Berry — "Deluded" (the stab pattern rotation across sections)
</div>

      const len=Math.ceil(ctx.sampleRate*0.11);

      const d=buf.getChannelData(0); for(let j=0;j<d.length;j++) d[j]=Math.random()*2-1;
      const sn=ctx.createBufferSource(); sn.buffer=buf;
      const bp=ctx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=220; bp.Q.value=0.9;
      const hp=ctx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=200;
      const se=ctx.createGain();
      se.gain.setValueAtTime(vol,t); se.gain.exponentialRampToValueAtTime(0.001,t+0.10);
      sn.connect(bp); bp.connect(hp); hp.connect(se); se.connect(master);
      sn.start(t); sn.stop(t+0.12); oscs.push(sn);
    });
  }

  // ─── SYNCOPATED BASS — bouncy, not walking ────────────────────────────
  // Pattern: root on 1, root (swung) on "and of 1", P5 on 3, root on "and of 3"
  // The swing timing on the "and" hits creates the bounce.
  function bass(bar,rootHz){
    [[0,0,3.5],[3,0,2.0],[8,7,3.5],[11,0,2.0]].forEach(([s,semi,len])=>{
      const t=swT(bar,s);
      const freq=rootHz*Math.pow(2,semi/12)/2;
      const o=ctx.createOscillator(),f=ctx.createBiquadFilter(),e=ctx.createGain();
      o.type='sawtooth'; o.frequency.value=freq;
      f.type='lowpass'; f.frequency.value=700; f.Q.value=1.5;
      e.gain.setValueAtTime(p.bassVol,t);
      e.gain.exponentialRampToValueAtTime(0.001,t+len*S);
      o.connect(f); f.connect(e); e.connect(master); o.start(t); o.stop(t+len*S+0.01); oscs.push(o);
    });

  // ─── HORN STAB — dom7 chord, THE HOOK ────────────────────────────────
  // Three sawtooth oscs (root, M3, b7) through shared filter chain.
  // Filter chain: HP → peaking EQ (brass formant at 1100Hz) → LP sweep (attack brightness).
  // Rhythm: hits on the swung "and of 1" (step 3) and "and of 3" (step 11).
  // This is the classic electro swing stab figure — syncopated, punchy, chordal.
  function stab(bar,rootHz,vol,variant){
    const M3=Math.pow(2,4/12), b7=Math.pow(2,10/12);
    // Variant A: "and of 1" + "and of 3" (standard)
    // Variant B: "and of 1" + beat 3 + "and of 3" (denser)
    // Variant C: beat 1 + "and of 2" + beat 4 (displaced, call-response)
    const hits={
      A:[{s:3,dur:0.11},{s:11,dur:0.11}],
      B:[{s:3,dur:0.09},{s:8,dur:0.14},{s:11,dur:0.09}],
      C:[{s:0,dur:0.11},{s:6,dur:0.14},{s:12,dur:0.11}],
    }[variant||'A'];
    hits.forEach(({s,dur})=>{
      const t=swT(bar,s);
      const root=rootHz*2;
      const mix=ctx.createGain(); mix.gain.value=0.36;
      const hp=ctx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=160;
      const pk=ctx.createBiquadFilter();
      pk.type='peaking'; pk.frequency.value=1100; pk.Q.value=1.6; pk.gain.value=14;
      const lp=ctx.createBiquadFilter(); lp.type='lowpass'; lp.Q.value=1.0;
      lp.frequency.setValueAtTime(4500,t);
      lp.frequency.exponentialRampToValueAtTime(1400,t+0.032);
      lp.frequency.exponentialRampToValueAtTime(900,t+dur);
      const eg=ctx.createGain();
      eg.gain.setValueAtTime(0,t);
      eg.gain.linearRampToValueAtTime(vol,t+0.004);
      eg.gain.setValueAtTime(vol*0.70,t+0.028);
      eg.gain.exponentialRampToValueAtTime(0.001,t+dur);
      mix.connect(hp); hp.connect(pk); pk.connect(lp); lp.connect(eg); eg.connect(master);
      [1,M3,b7].forEach(r=>{
        const o=ctx.createOscillator();
        o.type='sawtooth'; o.frequency.value=root*r;
        o.connect(mix); o.start(t); o.stop(t+dur+0.01); oscs.push(o);
      });
    });
  }

  // ─── PIANO COMP — offbeat chord stabs, support role ──────────────────
  // Sawtooth, short staccato chords on swing offbeats.
  // Volume low — textural support, not competing with horns.
  function comp(bar,rootHz){
    const M3=Math.pow(2,4/12),P5=Math.pow(2,7/12),b7=Math.pow(2,10/12);
    // Comp on "and of 2" and "and of 4" — classic jazz piano comping position
    [6,14].forEach(s=>{
      const t=swT(bar,s);
      [1,M3,P5,b7].forEach((r,ci)=>{
        const o=ctx.createOscillator(),lp=ctx.createBiquadFilter(),e=ctx.createGain();

        e.gain.linearRampToValueAtTime(0.13,t+ci*0.002+0.004);
        e.gain.exponentialRampToValueAtTime(0.001,t+0.13);
        o.connect(lp); lp.connect(e); e.connect(master);
        o.start(t+ci*0.002); o.stop(t+0.15); oscs.push(o);

  // ─── WOODWIND ORNAMENT — break-only, very sparse ──────────────────────
  // Two sines (1f + 3f) for reed quality. Short 2-note figures only.
  // Plays in the break to fill the space where the kick dropped out.
  // WOODWIND ORNAMENT — break only, 2-3 note figures

  // vibrato via frequency scheduling (no LFO osc = mobile safe)
  function woodwind(bar,rootHz){

      const t=swT(bar,s);

      const dur=len*S*0.68;

      const nd=nbuf.getChannelData(0); for(let j=0;j<nd.length;j++) nd[j]=Math.random()*2-1;
      const nb=ctx.createBufferSource(); nb.buffer=nbuf;
      const nbp=ctx.createBiquadFilter(); nbp.type='bandpass';
      nbp.frequency.value=1400; nbp.Q.value=1.4;
      const ne=ctx.createGain();
      ne.gain.setValueAtTime(0.07,t); ne.gain.exponentialRampToValueAtTime(0.001,t+0.020);
      nb.connect(nbp); nbp.connect(ne); ne.connect(master); nb.start(t); nb.stop(t+0.022); oscs.push(nb);
      // Odd harmonics: 1f (full), 3f (strong), 5f (present)
      [[1,0.22],[3,0.15],[5,0.06]].forEach(([mult,amp])=>{
        const freq=f1*mult;
        if(freq>5200) return;
        const o=ctx.createOscillator(),e=ctx.createGain();
        o.type='sine'; o.frequency.setValueAtTime(freq,t);
        // Vibrato via freq scheduling — kicks in at 110ms, ±0.6% at ~5.5Hz
        // 4 setValueAtTime calls approximates one vibrato cycle per partial
        if(mult===1 && dur>0.18){
          const vd=freq*0.006;
          [0,1,2,3].forEach(vi=>{
            const vt=t+0.11+vi*(1/5.5)/4;
            if(vt<t+dur-0.02)

          });
        }
        const lp=ctx.createBiquadFilter(); lp.type='lowpass';
        lp.frequency.value=Math.min(freq*2.2,3200);
        e.gain.setValueAtTime(0,t);
        e.gain.linearRampToValueAtTime(amp,t+0.014);      // snappy reed attack
        e.gain.setValueAtTime(amp*0.90,t+dur-0.018);
        e.gain.exponentialRampToValueAtTime(0.001,t+dur);
        o.connect(lp); lp.connect(e); e.connect(master);
        o.start(t); o.stop(t+dur+0.01); oscs.push(o);
      });
    });
  }

  const R=p.root;

  // ═══════════════════════════════════════════════════════
  // SECTION A — INTRO (bars 0-7): Jazz trio only, no kick
  // Bass + Charleston hats + piano comp on offbeats.
  // Energy from groove, not from density.
  // ═══════════════════════════════════════════════════════
  for(let b=0;b<8;b++){
    hats(b,p.hatVol*0.80);
    bass(b,R);
    if(b>=2) comp(b,R);  // piano comp enters at bar 2
  }

  // ═══════════════════════════════════════════════════════
  // SECTION B — PRE-DROP TEASE (bars 8-11): Horn stab teases in
  // Just one hit per 2 bars, sparse, to signal the drop coming.
  // ═══════════════════════════════════════════════════════
  for(let b=8;b<12;b++){
    hats(b,p.hatVol*0.90);
    bass(b,R);
    comp(b,R);
    if(b%2===0) stab(b,R,p.stabVol*0.55,'A');  // sparse tease
  }

  // ═══════════════════════════════════════════════════════
  // SECTION C — DROP (bars 12-27): Kick lands HARD.
  // Standard stab pattern A. Snare on 2+4. Full energy.
  // ═══════════════════════════════════════════════════════
  for(let b=12;b<28;b++){
    kick(b,p.kickVol);
    snare(b,p.snareVol*0.65);
    hats(b,p.hatVol);
    bass(b,R);
    stab(b,R,p.stabVol,'A');
    if(b%2===0) comp(b,R);  // comp on even bars only — space
  }

  // ═══════════════════════════════════════════════════════
  // SECTION D — GROOVE (bars 28-43): Stab patterns rotate.
  // Variant B and C add density and call-response.
  // ═══════════════════════════════════════════════════════
  for(let b=28;b<44;b++){
    kick(b,p.kickVol);
    snare(b,p.snareVol*0.68);
    hats(b,p.hatVol);
    bass(b,R);
    const v=['A','B','A','C'][b%4];
    stab(b,R,p.stabVol,v);
    comp(b,R);
  }

  // ═══════════════════════════════════════════════════════
  // SECTION E — BREAK (bars 44-51): Kick drops out.
  // Jazz trio + sparse stab hints. Woodwind ornament.
  // ═══════════════════════════════════════════════════════
  for(let b=44;b<52;b++){
    hats(b,p.hatVol*0.78);
    bass(b,R);
    if(b%4===0) woodwind(b,R);    // woodwind every 4 bars
    if(b%2===0) stab(b,R,p.stabVol*0.45,'A');  // sparse stabs
    if(b>=50) comp(b,R);  // comp creeps back in last 2 bars
  }

  // ═══════════════════════════════════════════════════════
  // SECTION F — FINALE BUILD (bars 52-55): Kick + bass only.
  // Strip back to just the pulse. Tension before the final drop.
  // ═══════════════════════════════════════════════════════
  for(let b=52;b<56;b++){
    kick(b,p.kickVol*0.85);
    bass(b,R);
  }

  // ═══════════════════════════════════════════════════════
  // SECTION G — OUTRO DROP (bars 56-63): Everything returns.
  // Stab variant B on every bar — maximum density.
  // Ends with a final stab figure + silence.
  // ═══════════════════════════════════════════════════════
  for(let b=56;b<64;b++){
    kick(b,p.kickVol);
    snare(b,p.snareVol*0.72);
    hats(b,p.hatVol*1.15);
    bass(b,R);
    stab(b,R,p.stabVol*1.08,b%2===0?'B':'C');
    comp(b,R);
  }

  return { node:master, oscs, stopAt:now+64*16*S+0.5 };
}
