<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Theory & Composition for Lemurs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;700;800&display=swap');

  --text:#e0e0f0; --muted:#666688; --code-bg:#0d0d15;
}
*{ box-sizing:border-box; margin:0; padding:0; }
body{ background:var(--bg); color:var(--text); font-family:'Syne',sans-serif; min-height:100vh; overflow-x:hidden; }
header{ padding:3rem 2rem 2rem; text-align:center; border-bottom:1px solid var(--border); position:relative; overflow:hidden; }
header canvas#hero{ position:absolute; inset:0; width:100%; height:100%; opacity:.25; pointer-events:none; }
header .inner{ position:relative; z-index:1; }
.tagline-chip{ display:inline-block; background:var(--accent); color:#000; font-family:'Space Mono',monospace; font-size:.65rem; padding:.25rem .75rem; letter-spacing:.15em; text-transform:uppercase; margin-bottom:1rem; }
h1{ font-size:clamp(2.5rem,6vw,5rem); font-weight:800; line-height:1; letter-spacing:-.02em; }
h1 span{ color:var(--accent); }
.subtitle{ font-family:'Space Mono',monospace; font-size:.85rem; color:var(--muted); margin-top:.75rem; }
.progress-bar{ height:2px; background:var(--border); }
.progress-fill{ height:100%; background:var(--accent); transition:width .4s ease; }
nav{ display:flex; gap:.4rem; padding:1rem 1.5rem; overflow-x:auto; border-bottom:1px solid var(--border); background:var(--panel); position:sticky; top:0; z-index:100; scrollbar-width:none; }

.nav-btn:hover{ border-color:var(--accent); color:var(--accent); }

@media(max-width:900px){ main{ grid-template-columns:1fr; height:auto; } }

.lesson-body .artists::before{ content:'>> LISTEN TO: '; color:var(--accent); font-weight:700; display:block; margin-bottom:.3rem; font-size:.65rem; letter-spacing:.1em; }
.lesson-body .step-card{ background:#0f0f1e; border:1px solid var(--border); border-left:3px solid var(--accent3); padding:.75rem 1rem; margin:.6rem 0; }

.lesson-body .chord-row{ display:flex; gap:.4rem; flex-wrap:wrap; margin:.5rem 0; }

.lesson-body .beat.on-perc{ background:#ff6b9d; color:#000; border-color:#ff6b9d; }
.lesson-body .beat.beat-num{ background:none; color:var(--muted); border-color:transparent; font-size:.55rem; }
.lesson-body .structure-bar{ display:flex; gap:.3rem; flex-wrap:wrap; margin:.5rem 0; }
.lesson-body .section-block{ padding:.3rem .7rem; font-family:'Space Mono',monospace; font-size:.65rem; text-align:center; border:1px solid; }
.lesson-body .section-block.intro{ background:#1a1a2e; border-color:var(--muted); color:var(--muted); }
.lesson-body .section-block.verse{ background:#0f1a2e; border-color:var(--accent3); color:var(--accent3); }
.lesson-body .section-block.chorus{ background:#1a0f2e; border-color:var(--accent2); color:var(--accent2); }
.lesson-body .section-block.bridge{ background:#1a1a0f; border-color:var(--accent); color:var(--accent); }
.lesson-body .section-block.break{ background:#1a0f0f; border-color:#e05555; color:#e05555; }
.lesson-body .section-block.drop{ background:#0f1a0f; border-color:#7fff6b; color:#7fff6b; }

.synth-panel{ display:flex; flex-direction:column; background:var(--code-bg); overflow:hidden; position:relative; }

.play-btn{ background:var(--accent); color:#000; border:none; font-family:'Space Mono',monospace; font-size:.75rem; font-weight:700; padding:.35rem 1.1rem; cursor:pointer; letter-spacing:.05em; flex-shrink:0; transition:opacity .15s; }

.play-btn.playing{ background:var(--accent2); }
.status-txt{ font-family:'Space Mono',monospace; font-size:.6rem; color:var(--muted); flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.param-row{ display:flex; align-items:center; gap:.5rem; }
.param-row label{ font-family:'Space Mono',monospace; font-size:.6rem; color:var(--accent3); width:9rem; flex-shrink:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.param-row input[type=range]{ flex:1; accent-color:var(--accent); cursor:pointer; min-width:0; }
.param-row .val{ font-family:'Space Mono',monospace; font-size:.6rem; color:var(--accent); width:4.5rem; text-align:right; flex-shrink:0; }
#param-slots{ display:flex; flex-direction:column; gap:.32rem; }

.run-btn:hover{ opacity:.85; }
.code-editor{ flex:1; overflow:auto; min-height:0; }
textarea#synth-code{ width:100%; height:100%; background:var(--code-bg); color:#c8f0c0; font-family:'Space Mono',monospace; font-size:.68rem; line-height:1.7; border:none; outline:none; padding:.8rem; resize:none; tab-size:2; }
/* Chord player overlay */
#chord-overlay{ display:none; position:absolute; bottom:0; left:0; right:0; background:var(--panel); border-top:1px solid var(--border); padding:.5rem .75rem; z-index:20; flex-direction:column; gap:.4rem; }
#chord-overlay.visible{ display:flex; }

.chord-player-row label{ font-family:'Space Mono',monospace; font-size:.6rem; color:var(--accent3); }

<body>
<header>
  <canvas id="hero"></canvas>
  <div class="inner">
    <div class="tagline-chip">LEMUR Music School</div>
    <h1>Music Theory &amp; Composition for <span>Lemurs</span></h1>
    <p class="subtitle">// from kick drum -> full genre -> you can hear what makes it tick</p>
  </div>
</header>
<div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
<nav id="lesson-nav"></nav>
<main>
  <div class="lesson-panel" id="lesson-text"></div>
  <div class="synth-panel" id="synth-panel">
    <div class="scope-area" id="scope-area">
      <span class="scope-label">OSCILLOSCOPE -- SPECTRUM</span>
      <canvas id="scope-canvas"></canvas>
    </div>
    <div class="controls-area">
      <div class="transport-row">
        <button type="button" class="play-btn" id="play-btn">&gt; PLAY</button>
        <span class="status-txt" id="status-txt">press play to hear the sound</span>
      </div>
      <div id="param-slots"></div>
    </div>
    <div class="code-toolbar">
      <span>SYNTH CODE -- edit &amp; run &nbsp;(Ctrl/Cmd+Enter)</span>
      <button type="button" class="run-btn" id="run-btn">&gt; RUN</button>
    </div>
    <div class="code-editor">
      <textarea id="synth-code" spellcheck="false"></textarea>
    </div>
    <div id="chord-overlay">
      <div class="chord-player-row">
        <label>CHORD PLAYER</label>
        <span class="status-txt" id="chord-status">click a chord above to hear it</span>
        <button type="button" class="chord-stop-btn" id="chord-stop">&gt; STOP</button>
      </div>
    </div>
  </div>
</main>

<script>
'use strict';

// ============================================================
// CHORD INTERVAL TABLES
// Used by chord buttons in lesson bodies
// ============================================================
const INTERVALS = {
  major:  [0, 4, 7],
  minor:  [0, 3, 7],
  dom7:   [0, 4, 7, 10],
  maj7:   [0, 4, 7, 11],
  min7:   [0, 3, 7, 10],
  single: [0],
};

// Degree offsets in semitones (major scale degrees)
const MAJOR_DEGREES = { I:0, II:2, III:4, IV:5, V:7, VI:9, VII:11,
                        ii:2, iii:4, vi:9, vii:11 };
// Minor scale degrees
const MINOR_DEGREES = { i:0, ii:2, III:3, iv:5, v:7, VI:8, VII:10,
                        I:0, IV:5, V:7 };

// Special degree handling for octaves in capstone
const SPECIAL_DEGREES = { octave: 12, octave2: 24 };

function semitoneOffset(degree, mode) {
  if (SPECIAL_DEGREES[degree] !== undefined) return SPECIAL_DEGREES[degree];
  const upper = degree.toUpperCase();
  if (mode === 'minor') return (MINOR_DEGREES[degree] ?? MINOR_DEGREES[upper] ?? 0);
  return (MAJOR_DEGREES[degree] ?? MAJOR_DEGREES[upper] ?? 0);
}

// ============================================================
// LESSONS ARRAY
// ============================================================
const LESSONS = [
// ── BOOM BAP ────────────────────────────────────

{
title: "Boom Bap -- Composition",
subtitle: "01 -- The Blueprint",
body: `
<div class="lesson-intro">Boom bap is hip-hop in its purest form. A hard kick, a snapping snare, chopped soul samples, 808 bass that you feel in your chest. Born in NYC in the late 80s and early 90s — Pete Rock, DJ Premier, Large Professor — it's still the template every producer learns first because it teaches the most fundamental lesson: <em>space is a sound</em>.</div>

<div class="step-card"><span class="step-num">BPM + FEEL</span>
<strong>85–98 BPM</strong>. Slower than you think. The slowness is the point — it creates space for the kick and snare to breathe, and for the rapper to sit in the pocket. At 92 BPM a 16th-note hi-hat pattern feels appropriately busy without rushing. Go above 100 and boom bap starts sounding like hip-hop house. Go below 80 and it sags into trap territory.<br><br>
<strong>Swing:</strong> boom bap uses mild swing (~18%). The hi-hat 16th notes don't drag as hard as jazz swing, but they're not straight either. That subtle push-pull is what gives the groove its human feel — like a drum machine that's been slightly humanized.
</div>

<div class="step-card"><span class="step-num">THE KICK PATTERN — THE GENRE'S SIGNATURE</span>
This is what separates boom bap from every other genre: the kick does <em>not</em> sit on four-on-the-floor. The classic pattern is two hits per bar:<br><br>
<div style="font-family:'Space Mono',monospace;font-size:.65rem;margin:.6rem 0;line-height:2.2;">
STEP:  1  e  +  a  2  e  +  a  3  e  +  a  4  e  +  a<br>
KICK:  ×  .  .  .  .  .  .  .  .  ×  .  .  .  .  .  .<br>
       beat 1                      "and of 2" (swung back)<br><br>
SNARE: .  .  .  .  ×  .  .  .  .  .  .  .  ×  .  .  .<br>
       beats 2 and 4 — hard
</div>
Beat 1 is the downbeat kick. The second kick lands on the swung "and of 2" — step 9 in 16th-note counting, pushed slightly back by the swing offset. This syncopated two-hit pattern gives boom bap its characteristic lopsided lurch. It sounds like the beat is falling forward and catching itself.
</div>

<div class="step-card"><span class="step-num">SONG STRUCTURE</span>
<div class="structure-bar">
  <div class="section-block intro">INTRO<br><span style="font-size:.55rem">drums only<br>8 bars</span></div>
  <div class="section-block verse">VERSE 1<br><span style="font-size:.55rem">full beat<br>16 bars</span></div>
  <div class="section-block chorus">HOOK<br><span style="font-size:.55rem">filter open<br>8 bars</span></div>
  <div class="section-block verse">VERSE 2<br><span style="font-size:.55rem">16 bars</span></div>
  <div class="section-block break">BREAK<br><span style="font-size:.55rem">stripped<br>8 bars</span></div>
  <div class="section-block drop">FINALE<br><span style="font-size:.55rem">8 bars</span></div>
</div>
The intro is drums-only for 8 bars — not because it needs to be, but because boom bap teaches restraint. You earn the sample by making the drums interesting on their own first. The break strips back to kick and vinyl crunch to create contrast before the final return.
</div>

<div class="step-card"><span class="step-num">THE SAMPLE CHOP — SPACE IS THE HOOK</span>
The sample chop is the melodic identity of a boom bap beat. Short staccato hits on the 8th-note offbeats — "and of 1", "and of 2", "and of 3" — but <em>not all four</em>. Leaving one gap per bar is what gives the chop its conversational quality, like a musician leaving space for the rapper to breathe.<br><br>
Chord vocabulary: i-iv-VI-VII in minor (Am-Dm-F-G in the key of A minor) is the most common boom bap progression. It's melancholy but forward-moving. The minor i gives it street weight; the major VI creates a bittersweet lift.
<div class="chord-row" data-root="110" data-mode="minor">
  <span class="chord root" data-chord="min7" data-degree="i">i7</span>
  <span class="chord" data-chord="min7" data-degree="iv">iv7</span>
  <span class="chord" data-chord="maj7" data-degree="VI">VImaj7</span>
  <span class="chord" data-chord="dom7" data-degree="VII">VII7</span>
</div>
</div>

<div class="step-card"><span class="step-num">THE 808 BASS</span>
A sine wave through a tight lowpass — the 808 bass holds one pitch per 2–4 bars and simply throbs. It doesn't walk, it doesn't arpeggiate. It's a room-shaking sustain that anchors everything above it harmonically.<br><br>
Tuning matters: the 808 should be tuned to the root of the current chord. In the demo (A minor), the bass cycle is A → D → F → G — the root of each chord in the progression. An out-of-tune 808 sounds like an accident. A tuned 808 sounds like a thunderstorm.
</div>

<div class="step-card"><span class="step-num">COMMON KEYS</span>
<strong>A minor, C minor, F minor.</strong> Boom bap producers often work in minor keys with no sharps or flats — they're easiest to find when tuning 808 bass samples by ear. A minor (root = A2 at 55Hz) is particularly common because 55Hz is a clean sub-bass frequency that sits well in the mix without additional tuning. F minor and C minor appear frequently because many soul and jazz records — the primary sample sources — were recorded in horn-friendly flat keys.
</div>
<div class="artists">
Pete Rock & CL Smooth — "T.R.O.Y." (the kick pattern and sample relationship) / DJ Premier — anything from Gangstarr (how the sample loop creates tension and release) / Large Professor — "It's Alright" / J Dilla — "Workinonit" (how far you can stretch the tempo and swing) / Nas — "N.Y. State of Mind" (Premier's drum pattern under rap)
</div>

`,
code: `// BOOM BAP -- FULL ARRANGEMENT (~60s)
// 92 BPM. Kick on 1 and "and of 2" (syncopated). Snare on 2+4 hard.
// 16th hat pattern, open hat before beat 1. 808 bass one note per section.
// Piano chops on offbeats (not all of them — space is the point).
// Vinyl crunch under everything. Lo-fi is the aesthetic.

function makeSynth(ctx, p) {
  const _d={bpm:92,root:220,bassRoot:131,bassNote:65,bassVol:0.72,bassCutoff:300,bassFilter:350,bassReso:5,
    kickVol:0.95,kickFreq:145,kickNote:55,kickStart:155,kickSub:50,kickDecay:0.5,
    snareVol:0.82,snareFreq:210,snareHiss:3,hatVol:0.22,hatHP:8500,hatDecay:0.4,
    clapVol:0.65,clapFreq:1200,rimFreq:800,stabNote:196,stabBP:900,stabDetune:8,stabVol:0.4,
    riffRoot:220,riffNote:220,riffVol:0.42,riffCutoff:1800,padRoot:110,padNote:110,padVol:0.38,padCutoff:1200,
    leadNote:392,leadVol:0.5,pianoNote:220,pianoVol:0.38,pianoFilter:2800,
    acidNote:55,acidBase:300,acidReso:8,crunchVol:0.06,crunchLP:3200,
    cowVol:0.2,cowDecay:0.35,tomNote:110,tomDecay:0.4,vocoderVol:0.35,vocoderBP:800,vocoderQ:3,
    swing:0.18,slapDelay:0.08,scRelease:0.32,sawVol:0.45,sawCutoff:800,
    pluckVol:0.38,pluckDecay:0.3,pluckReso:4,pluckDetune:0,arpCutoff:400,arpReso:3,
    modCutoff:1200,preset:5,openHatDecay:0.4,hatOpen:0.4,vocalVol:0.35,bassVol2:0.5};
  for(const k in _d) if(p[k]===undefined||isNaN(p[k])||!isFinite(p[k])) p[k]=_d[k];

  const now=ctx.currentTime, S=60/p.bpm/4;
  const SW=p.swing*S;
  const master=ctx.createGain(); master.gain.value=0.74;
  const oscs=[];

  function swT(bar,s){ return now+(bar*16+s)*S+(s%2===1?SW:0); }
  function stT(bar,s){ return now+(bar*16+s)*S; }

  // ── KICK: sine sweep with noise click transient ──────────────────
  // Classic pattern: beat 1 (step 0) + syncopated "and of 2" (step 9, swung)
  // This two-hit pattern is the boom bap signature — not four-on-floor
  function kick(bar, extra){
    const hits=[0, 9];  // beat 1, "and of 2" (swung)
    if(extra) hits.push(13);  // "and of 3" in variation bars
    hits.forEach(s=>{
      const t=swT(bar,s);
      const vol=(s===0)?p.kickVol:p.kickVol*0.82;
      const k=ctx.createOscillator(),ke=ctx.createGain();
      k.type='sine';
      k.frequency.setValueAtTime(p.kickFreq,t);
      k.frequency.exponentialRampToValueAtTime(36,t+0.07);
      ke.gain.setValueAtTime(vol,t);
      ke.gain.exponentialRampToValueAtTime(0.001,t+p.kickDecay);
      k.connect(ke); ke.connect(master); k.start(t); k.stop(t+p.kickDecay+0.05); oscs.push(k);
      // Click transient — critical for small speaker translation
      const clen=Math.ceil(ctx.sampleRate*0.007);
      const cb=ctx.createBuffer(1,clen,ctx.sampleRate);
      const cd=cb.getChannelData(0); for(let j=0;j<clen;j++) cd[j]=Math.random()*2-1;
      const cl=ctx.createBufferSource(); cl.buffer=cb;
      const cg=ctx.createGain(); cg.gain.setValueAtTime(vol*0.45,t); cg.gain.exponentialRampToValueAtTime(0.001,t+0.007);
      cl.connect(cg); cg.connect(master); cl.start(t); cl.stop(t+0.009); oscs.push(cl);
    });
  }

  // ── SNARE: noise + tonal snap ────────────────────────────────────
  // Beats 2 and 4. Hard, cracking. 4ms behind beat for human feel.
  function snare(bar, ghost){
    const beats = [4, 12];
    if(ghost){ beats.push(2, 10); } // ghost notes in variation
    beats.forEach(s=>{
      const t=swT(bar,s)+0.004;
      const isGhost=ghost&&(s===2||s===10);
      const vol=isGhost ? p.snareVol*0.25 : p.snareVol;
      const len=Math.ceil(ctx.sampleRate*0.20);
      const buf=ctx.createBuffer(1,len,ctx.sampleRate);
      const d=buf.getChannelData(0); for(let j=0;j<d.length;j++) d[j]=Math.random()*2-1;
      const sn=ctx.createBufferSource(); sn.buffer=buf;
      const bp=ctx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=210; bp.Q.value=1.6;
      const hp=ctx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=180;
      const se=ctx.createGain();
      se.gain.setValueAtTime(vol,t); se.gain.exponentialRampToValueAtTime(0.001,t+0.20);
      sn.connect(bp); bp.connect(hp); hp.connect(se); se.connect(master);
      sn.start(t); sn.stop(t+0.22); oscs.push(sn);
    });
  }

  // ── HI-HAT: 16th grid with accent pattern ───────────────────────
  // Closed 16ths. Accents on 8th notes (steps 0,2,4...). Open hat at step 14.
  // The 16th-note pattern at 92 BPM feels busy but right — it's what makes boom bap groove.
  function hat(bar){
    for(let s=0;s<16;s++){
      const t=swT(bar,s);
      const isOpen=(s===14);
      const isAccent=(s%2===0);
      const decay=isOpen?0.24:0.022;
      const vol=p.hatVol*(isOpen?0.85:isAccent?0.60:0.28);
      if(vol<0.01) continue;
      const len=Math.ceil(ctx.sampleRate*(decay+0.005));
      const buf=ctx.createBuffer(1,len,ctx.sampleRate);
      const d=buf.getChannelData(0); for(let j=0;j<d.length;j++) d[j]=Math.random()*2-1;
      const h=ctx.createBufferSource(); h.buffer=buf;
      const hp=ctx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=isOpen?6800:9000;
      const he=ctx.createGain();
      he.gain.setValueAtTime(vol,t); he.gain.exponentialRampToValueAtTime(0.001,t+decay);
      h.connect(hp); hp.connect(he); he.connect(master);
      h.start(t); h.stop(t+decay+0.005); oscs.push(h);
    }
  }

  // ── 808 BASS: sine, whole bar, tuned to chord root ───────────────
  // One pitch per 2-4 bars is classic. The bass breathes, doesn't walk.
  // Long decay through tight lowpass — the sub should throb, not articulate.
  function bass808(bar, semi){
    const t=stT(bar,0);  // straight — sits under swung drums
    const freq=p.bassRoot*Math.pow(2,semi/12)/2;
    const o=ctx.createOscillator(),f=ctx.createBiquadFilter(),e=ctx.createGain();
    o.type='sine'; o.frequency.value=freq;
    f.type='lowpass'; f.frequency.value=220; f.Q.value=1.0;
    // Slight pitch scoop on attack — 808 characteristic
    o.frequency.setValueAtTime(freq*1.08,t);
    o.frequency.exponentialRampToValueAtTime(freq,t+0.12);
    e.gain.setValueAtTime(p.bassVol,t);
    e.gain.setValueAtTime(p.bassVol*0.65,t+16*S*0.5);
    e.gain.exponentialRampToValueAtTime(0.001,t+16*S*0.88);
    o.connect(f); f.connect(e); e.connect(master); o.start(t); o.stop(t+16*S); oscs.push(o);
  }

  // ── SAMPLE CHOP: short staccato soul/jazz notes on offbeats ─────
  // Triangle waves through lowpass — approximates a bandlimited sample.
  // Chops fire on "and of 1" (step 3), "and of 2" (step 7), "and of 3" (step 11).
  // NOT on every offbeat — space between chops is part of the groove.
  // Pitch follows chord progression: i-iv-VI-VII (minor feel, classic hip-hop).
  function chop(bar, filterOpen){
    const PROG=[[0,3,7],[5,8,12],[8,12,15],[10,13,17]]; // Amin Dmin F G
    const chord=PROG[bar%4];
    const fc=filterOpen ? p.pianoFilter*1.5 : p.pianoFilter;
    // Only hit 3 of the 4 possible offbeats — leave one gap per bar
    const CHOP_STEPS=[[3,7,11],[7,11,15],[3,11,15],[3,7,15]];
    const steps=CHOP_STEPS[bar%4];
    steps.forEach(s=>{
      const t=swT(bar,s);
      chord.forEach((semi,ci)=>{
        const o=ctx.createOscillator(),f=ctx.createBiquadFilter(),e=ctx.createGain();
        o.type='triangle';
        o.frequency.value=p.bassRoot*Math.pow(2,(semi+12)/12);
        f.type='lowpass'; f.frequency.value=fc; f.Q.value=1.0;
        e.gain.setValueAtTime(0,t+ci*0.003);
        e.gain.linearRampToValueAtTime(p.pianoVol/chord.length,t+ci*0.003+0.008);
        e.gain.exponentialRampToValueAtTime(0.001,t+0.28);
        o.connect(f); f.connect(e); e.connect(master);
        o.start(t+ci*0.003); o.stop(t+0.32); oscs.push(o);
      });
    });
  }

  // ── VINYL CRUNCH: lo-fi aesthetic layer ─────────────────────────
  // Low-volume white noise through lowpass at 3.2kHz.
  // Sounds like a vinyl record playing. Glues the elements together.
  function vinylCrunch(bar){
    const t=stT(bar,0);
    const dur=16*S+0.05;
    const len=Math.ceil(ctx.sampleRate*dur);
    const buf=ctx.createBuffer(1,len,ctx.sampleRate);
    const d=buf.getChannelData(0);
    for(let j=0;j<d.length;j++) d[j]=(Math.random()*2-1);
    const cr=ctx.createBufferSource(); cr.buffer=buf;
    const lp=ctx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=p.crunchLP;
    const cg=ctx.createGain(); cg.gain.value=p.crunchVol;
    cr.connect(lp); lp.connect(cg); cg.connect(master);
    cr.start(t); cr.stop(t+dur); oscs.push(cr);
  }

  // ── ARRANGEMENT ─────────────────────────────────────────────────
  const BASS_PROG=[0,5,8,10]; // i-iv-VI-VII

  // INTRO (0-7): Drums only. No bass, no chops. Let the pattern breathe.
  for(let b=0;b<8;b++){
    kick(b,false);
    if(b>=4){ snare(b,false); hat(b); } // snare enters bar 4
    else if(b>=2) hat(b);               // hats enter bar 2
    vinylCrunch(b);
  }

  // VERSE 1 (8-23): Full beat. Chop enters. Bass enters bar 12.
  for(let b=8;b<24;b++){
    kick(b,false);
    snare(b,false);
    hat(b);
    if(b>=12) bass808(b,BASS_PROG[b%4]);
    chop(b,false);
    vinylCrunch(b);
  }

  // HOOK (24-31): Filter opens on chop. Ghost snares add texture.
  for(let b=24;b<32;b++){
    kick(b,true);   // extra kick hit
    snare(b,true);  // ghost snares
    hat(b);
    bass808(b,BASS_PROG[b%4]);
    chop(b,true);   // filter open
    vinylCrunch(b);
  }

  // VERSE 2 (32-47): Back to standard, but slightly more energetic
  for(let b=32;b<48;b++){
    kick(b,false);
    snare(b,false);
    hat(b);
    bass808(b,BASS_PROG[b%4]);
    chop(b,false);
    vinylCrunch(b);
  }

  // BREAK (48-55): Strip to kick + vinyl crunch only. Space.
  for(let b=48;b<56;b++){
    kick(b,false);
    vinylCrunch(b);
    if(b>=54) hat(b); // hats creep back in last 2 bars
  }

  // FINALE (56-63): Full return
  for(let b=56;b<64;b++){
    kick(b,b%4===0);
    snare(b,false);
    hat(b);
    bass808(b,BASS_PROG[b%4]);
    chop(b,true);
    vinylCrunch(b);
  }

  return { node:master, oscs, stopAt:now+64*16*S+0.5 };
}
function updateParams(n,p){}`,

body: `
<div class="lesson-intro">Boom bap drums are the most studied sounds in music production. The kick should hit you in the chest. The snare should snap like a whip. The hi-hat should swing without rushing. Here's exactly how to build each element and why each synthesis choice produces the right result.</div>

<div class="step-card"><span class="step-num">THE KICK — SINE SWEEP + CLICK TRANSIENT</span>
A boom bap kick is two sounds that happen simultaneously:<br><br>
<strong>1. The body:</strong> a sine oscillator sweeping from ~145Hz down to 36Hz in about 70ms. The downward frequency sweep is what your ear reads as "thud" — it mimics a drumhead being struck and the membrane snapping back. Start too low (under 120Hz) and it sounds too muffled; start too high (over 160Hz) and it gets clicky. The decay time controls whether it's punchy (0.3s) or subby (0.6s).<br><br>
<strong>2. The click:</strong> a 7ms white noise burst at the same moment. This is non-negotiable. Without the click the kick disappears on small speakers and earbuds. The click frequency doesn't matter — it's just a transient marker that tells the ear "something struck something." With it, the kick punches through any playback system.
</div>

<div class="step-card"><span class="step-num">THE SNARE — TUNED NOISE</span>
Bandpass-filtered noise (BP center ~210Hz, Q=1.6) run through a secondary highpass at 180Hz. The bandpass gives the tuned "crack" character; the highpass removes sub rumble. Decay around 200ms — shorter than most genres because boom bap snares are dry and aggressive, not roomy.<br><br>
The 4ms timing offset behind the beat is critical. Place the snare exactly on the beat and it sounds mechanical. Push it 4ms later and it sounds human — like a real drummer who's slightly lazy on the backbeat. That laziness is the groove.
</div>

<div class="step-card"><span class="step-num">THE HI-HAT — 16TH GRID WITH ACCENT STRUCTURE</span>
Closed hi-hats on every 16th note, but with three loudness levels:<br>
— Accented 8ths (even steps): 60% volume<br>
— Ghost 16ths (odd steps): 28% volume<br>
— Open hat (step 14, before beat 1): 85% volume, 240ms decay, lowpass shifted to 6800Hz<br><br>
The ghost 16ths are the "texture" layer — barely audible, they fill in the rhythmic space between the accented notes. The single open hat on step 14 is the genre signature: it rings over the bar line into beat 1, creating a feeling of forward momentum.
</div>

<div class="step-card"><span class="step-num">THE SAMPLE CHOP — BANDLIMITED TRIANGLE WAVES</span>
Real sample chops are taken from vinyl records — soul and jazz recordings from the 60s and 70s, run through the sampler's lowpass filter to remove high-frequency content that would sound harsh. Triangle waves through a lowpass at 2800Hz approximate this: the triangle wave's natural harmonic rolloff mimics a bandlimited sample, and the lowpass removes any remaining sharpness.<br><br>
The 8ms stagger between chord tones (ci × 3ms offset) is the "spread" of a pianist's fingers striking a chord — not all at once, but cascading slightly. Without this the chord sounds like a single event. With it, it sounds like someone played it.
</div>

<div class="step-card"><span class="step-num">THE VINYL CRUNCH — LO-FI GLUE LAYER</span>
White noise through a lowpass at ~3200Hz at very low volume (gain ~0.06). This is the sound of a vinyl record — the surface noise that 90s producers didn't bother (or want) to remove. It has two functions: it fills the silence between drum hits with a subtle texture that "warms" the sound, and it glues the disparate elements (kick, snare, hat, bass, chop) into a single sonic space. Without it the elements sit in separate acoustic worlds. With it they all sound like they're coming from the same record.
</div>

<div class="artists">
The original boom bap producers sampled from vinyl — James Brown, Marvin Gaye, Curtis Mayfield, Syl Johnson. For free/legal samples today: Freesound.org (search "soul piano", "vintage organ") / ccMixter.org / Looperman.com / NASA audio archive (for texture sounds) / Internet Archive's 78 RPM collection (pre-1928 recordings are public domain in the US).
</div>

title: "Boom Bap -- In the Studio",
subtitle: "03 -- How to Build a Boom Bap Beat",
body: `
<div class="lesson-intro">Everything in the demo is built from sine waves, noise, and triangle waves. This lesson explains the production logic: what each element does for the track, how the arrangement earns its structure, and the mixing relationships that make boom bap sound like boom bap rather than just a drum pattern with some sounds on top.</div>

<div class="step-card"><span class="step-num">BUILD ORDER: EARN EACH LAYER</span>
<p>The demo intro plays drums alone for 8 bars before adding anything else. This isn't wasted time — it's the most important structural choice in boom bap production. The kick pattern needs to establish itself as the groove before the sample arrives. If the kick and sample start simultaneously, the listener's ear doesn't know what to track first.</p>
<p><strong>Order of entry:</strong> kick alone (bars 0–1) → hats add (bars 2–3) → snare completes the drum kit (bars 4–7) → chop enters (bar 8) → bass enters (bar 12). Each new element takes 4 bars to settle before the next arrives. This is patience as a production technique.</p>
</div>

<div class="step-card"><span class="step-num">THE KICK PATTERN'S EFFECT ON THE GROOVE</span>
<p>The syncopated two-hit kick (beat 1 + swung "and of 2") creates a specific illusion: the beat feels like it's slightly off-balance, perpetually about to fall forward. This is the "head-nod" effect — your body involuntarily compensates for the imbalance by nodding along.</p>
<p>The variation adds a third kick hit on "and of 3" in the hook sections. Three hits per bar increases density and signals the hook — the beat changes character without changing BPM or any other element.</p>
</div>

<div class="step-card"><span class="step-num">SAMPLE CHOP SPACING — WHERE THE GAPS ARE</span>
<p>The chop function uses four different step patterns across the bar cycle, each omitting one of the four possible offbeat positions. Bar 0: hits on 3,7,11 (gap on 15). Bar 1: hits on 7,11,15 (gap on 3). Bar 2: hits on 3,11,15 (gap on 7). Bar 3: hits on 3,7,15 (gap on 11). The gap rotates around the bar.</p>
<p>This means no single position feels "empty" — the gap is always somewhere different. The chop pattern feels varied without changing pitch or timing structure. This is how boom bap producers created the illusion of a human musician improvising around a sample loop.</p>
</div>

<div class="step-card"><span class="step-num">808 BASS TUNING</span>
<p>The 808 uses a pitch scoop on attack: it starts 8% sharp and exponentially ramps to the target frequency in 120ms. This is the characteristic 808 "bloom" — the note arrives slightly sharp then settles. Without it the bass sounds like a pure tone; with it the sub has warmth and personality.</p>
<p>The bass cycle (A → D → F → G, i.e. root offsets 0, 5, 8, 10 semitones) follows the chop's chord progression. When bass and chop are in the same harmonic space the track has depth. When they diverge the track sounds like two separate loops playing simultaneously.</p>
</div>

<div class="step-card"><span class="step-num">THE BREAK — HOW SILENCE WORKS</span>
<p>Bars 48–55 strip everything except kick and vinyl crunch. No bass, no chops, no snare, no hats. This is a fully intentional production choice: after 40+ bars of full beat, the sudden reduction is shocking. The listener expects the groove to continue and it doesn't.</p>
<p>The break's job is to make the finale sound bigger than it is. The finale uses the same elements at the same volumes as verse 2 — but after 8 bars of near-silence it feels enormous. This is the most important production technique in boom bap: contrast, not escalation.</p>
</div>

<div class="artists">
For free samples — Freesound.org (CC-licensed recordings), ccMixter.org, Looperman.com, and the Internet Archive's 78 RPM collection (recordings before 1928 are public domain in the US). Splice and Tracklib offer legal sample licensing for commercial work. Study: Pete Rock — "They Reminisce Over You" instrumental, DJ Premier — "Mass Appeal" instrumental.
</div>

code: `// BOOM BAP -- FULL ARRANGEMENT (~60s)

function makeSynth(ctx, p) {
  const _d={bpm:92,root:220,bassRoot:131,bassNote:65,bassVol:0.72,bassCutoff:300,bassFilter:350,bassReso:5,
    kickVol:0.95,kickFreq:145,kickNote:55,kickStart:155,kickSub:50,kickDecay:0.5,
    snareVol:0.82,snareFreq:210,snareHiss:3,hatVol:0.22,hatHP:8500,hatDecay:0.4,
    clapVol:0.65,clapFreq:1200,rimFreq:800,stabNote:196,stabBP:900,stabDetune:8,stabVol:0.4,
    riffRoot:220,riffNote:220,riffVol:0.42,riffCutoff:1800,padRoot:110,padNote:110,padVol:0.38,padCutoff:1200,
    leadNote:392,leadVol:0.5,pianoNote:220,pianoVol:0.38,pianoFilter:2800,
    acidNote:55,acidBase:300,acidReso:8,crunchVol:0.06,crunchLP:3200,
    cowVol:0.2,cowDecay:0.35,tomNote:110,tomDecay:0.4,vocoderVol:0.35,vocoderBP:800,vocoderQ:3,
    swing:0.18,slapDelay:0.08,scRelease:0.32,sawVol:0.45,sawCutoff:800,
    pluckVol:0.38,pluckDecay:0.3,pluckReso:4,pluckDetune:0,arpCutoff:400,arpReso:3,
    modCutoff:1200,preset:5,openHatDecay:0.4,hatOpen:0.4,vocalVol:0.35,bassVol2:0.5};
  for(const k in _d) if(p[k]===undefined||isNaN(p[k])||!isFinite(p[k])) p[k]=_d[k];

  const now=ctx.currentTime, S=60/p.bpm/4;
  const SW=p.swing*S;
  const master=ctx.createGain(); master.gain.value=0.74;
  const oscs=[];

  function swT(bar,s){ return now+(bar*16+s)*S+(s%2===1?SW:0); }
  function stT(bar,s){ return now+(bar*16+s)*S; }

  // ── KICK: sine sweep with noise click transient ──────────────────
  // Classic pattern: beat 1 (step 0) + syncopated "and of 2" (step 9, swung)
  // This two-hit pattern is the boom bap signature — not four-on-floor
  function kick(bar, extra){
    const hits=[0, 9];  // beat 1, "and of 2" (swung)
    if(extra) hits.push(13);  // "and of 3" in variation bars
    hits.forEach(s=>{
      const t=swT(bar,s);
      const vol=(s===0)?p.kickVol:p.kickVol*0.82;
      const k=ctx.createOscillator(),ke=ctx.createGain();
      k.type='sine';
      k.frequency.setValueAtTime(p.kickFreq,t);
      k.frequency.exponentialRampToValueAtTime(36,t+0.07);
      ke.gain.setValueAtTime(vol,t);
      ke.gain.exponentialRampToValueAtTime(0.001,t+p.kickDecay);
      k.connect(ke); ke.connect(master); k.start(t); k.stop(t+p.kickDecay+0.05); oscs.push(k);
      // Click transient — critical for small speaker translation
      const clen=Math.ceil(ctx.sampleRate*0.007);
      const cb=ctx.createBuffer(1,clen,ctx.sampleRate);
      const cd=cb.getChannelData(0); for(let j=0;j<clen;j++) cd[j]=Math.random()*2-1;
      const cl=ctx.createBufferSource(); cl.buffer=cb;
      const cg=ctx.createGain(); cg.gain.setValueAtTime(vol*0.45,t); cg.gain.exponentialRampToValueAtTime(0.001,t+0.007);
      cl.connect(cg); cg.connect(master); cl.start(t); cl.stop(t+0.009); oscs.push(cl);
    });
  }

  // ── SNARE: noise + tonal snap ────────────────────────────────────
  // Beats 2 and 4. Hard, cracking. 4ms behind beat for human feel.
  function snare(bar, ghost){
    const beats = [4, 12];
    if(ghost){ beats.push(2, 10); } // ghost notes in variation
    beats.forEach(s=>{
      const t=swT(bar,s)+0.004;
      const isGhost=ghost&&(s===2||s===10);
      const vol=isGhost ? p.snareVol*0.25 : p.snareVol;
      const len=Math.ceil(ctx.sampleRate*0.20);
      const buf=ctx.createBuffer(1,len,ctx.sampleRate);
      const d=buf.getChannelData(0); for(let j=0;j<d.length;j++) d[j]=Math.random()*2-1;
      const sn=ctx.createBufferSource(); sn.buffer=buf;
      const bp=ctx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=210; bp.Q.value=1.6;
      const hp=ctx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=180;
      const se=ctx.createGain();
      se.gain.setValueAtTime(vol,t); se.gain.exponentialRampToValueAtTime(0.001,t+0.20);
      sn.connect(bp); bp.connect(hp); hp.connect(se); se.connect(master);
      sn.start(t); sn.stop(t+0.22); oscs.push(sn);
    });
  }

  // ── HI-HAT: 16th grid with accent pattern ───────────────────────
  // Closed 16ths. Accents on 8th notes (steps 0,2,4...). Open hat at step 14.
  // The 16th-note pattern at 92 BPM feels busy but right — it's what makes boom bap groove.
  function hat(bar){
    for(let s=0;s<16;s++){
      const t=swT(bar,s);
      const isOpen=(s===14);
      const isAccent=(s%2===0);
      const decay=isOpen?0.24:0.022;
      const vol=p.hatVol*(isOpen?0.85:isAccent?0.60:0.28);
      if(vol<0.01) continue;
      const len=Math.ceil(ctx.sampleRate*(decay+0.005));
      const buf=ctx.createBuffer(1,len,ctx.sampleRate);
      const d=buf.getChannelData(0); for(let j=0;j<d.length;j++) d[j]=Math.random()*2-1;
      const h=ctx.createBufferSource(); h.buffer=buf;
      const hp=ctx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=isOpen?6800:9000;
      const he=ctx.createGain();
      he.gain.setValueAtTime(vol,t); he.gain.exponentialRampToValueAtTime(0.001,t+decay);
      h.connect(hp); hp.connect(he); he.connect(master);
      h.start(t); h.stop(t+decay+0.005); oscs.push(h);
    }
  }

  // ── 808 BASS: sine, whole bar, tuned to chord root ───────────────
  // One pitch per 2-4 bars is classic. The bass breathes, doesn't walk.
  // Long decay through tight lowpass — the sub should throb, not articulate.
  function bass808(bar, semi){
    const t=stT(bar,0);  // straight — sits under swung drums
    const freq=p.bassRoot*Math.pow(2,semi/12)/2;
    const o=ctx.createOscillator(),f=ctx.createBiquadFilter(),e=ctx.createGain();
    o.type='sine'; o.frequency.value=freq;
    f.type='lowpass'; f.frequency.value=220; f.Q.value=1.0;
    // Slight pitch scoop on attack — 808 characteristic
    o.frequency.setValueAtTime(freq*1.08,t);
    o.frequency.exponentialRampToValueAtTime(freq,t+0.12);
    e.gain.setValueAtTime(p.bassVol,t);
    e.gain.setValueAtTime(p.bassVol*0.65,t+16*S*0.5);
    e.gain.exponentialRampToValueAtTime(0.001,t+16*S*0.88);
    o.connect(f); f.connect(e); e.connect(master); o.start(t); o.stop(t+16*S); oscs.push(o);
  }

  // ── SAMPLE CHOP: short staccato soul/jazz notes on offbeats ─────
  // Triangle waves through lowpass — approximates a bandlimited sample.
  // Chops fire on "and of 1" (step 3), "and of 2" (step 7), "and of 3" (step 11).
  // NOT on every offbeat — space between chops is part of the groove.
  // Pitch follows chord progression: i-iv-VI-VII (minor feel, classic hip-hop).
  function chop(bar, filterOpen){
    const PROG=[[0,3,7],[5,8,12],[8,12,15],[10,13,17]]; // Amin Dmin F G
    const chord=PROG[bar%4];
    const fc=filterOpen ? p.pianoFilter*1.5 : p.pianoFilter;
    // Only hit 3 of the 4 possible offbeats — leave one gap per bar
    const CHOP_STEPS=[[3,7,11],[7,11,15],[3,11,15],[3,7,15]];
    const steps=CHOP_STEPS[bar%4];
    steps.forEach(s=>{
      const t=swT(bar,s);
      chord.forEach((semi,ci)=>{
        const o=ctx.createOscillator(),f=ctx.createBiquadFilter(),e=ctx.createGain();
        o.type='triangle';
        o.frequency.value=p.bassRoot*Math.pow(2,(semi+12)/12);
        f.type='lowpass'; f.frequency.value=fc; f.Q.value=1.0;
        e.gain.setValueAtTime(0,t+ci*0.003);
        e.gain.linearRampToValueAtTime(p.pianoVol/chord.length,t+ci*0.003+0.008);
        e.gain.exponentialRampToValueAtTime(0.001,t+0.28);
        o.connect(f); f.connect(e); e.connect(master);
        o.start(t+ci*0.003); o.stop(t+0.32); oscs.push(o);
      });
    });
  }

  // ── VINYL CRUNCH: lo-fi aesthetic layer ─────────────────────────
  // Low-volume white noise through lowpass at 3.2kHz.
  // Sounds like a vinyl record playing. Glues the elements together.
  function vinylCrunch(bar){
    const t=stT(bar,0);
    const dur=16*S+0.05;
    const len=Math.ceil(ctx.sampleRate*dur);
    const buf=ctx.createBuffer(1,len,ctx.sampleRate);
    const d=buf.getChannelData(0);
    for(let j=0;j<d.length;j++) d[j]=(Math.random()*2-1);
    const cr=ctx.createBufferSource(); cr.buffer=buf;
    const lp=ctx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=p.crunchLP;
    const cg=ctx.createGain(); cg.gain.value=p.crunchVol;
    cr.connect(lp); lp.connect(cg); cg.connect(master);
    cr.start(t); cr.stop(t+dur); oscs.push(cr);
  }

  // ── ARRANGEMENT ─────────────────────────────────────────────────
  const BASS_PROG=[0,5,8,10]; // i-iv-VI-VII

  // INTRO (0-7): Drums only. No bass, no chops. Let the pattern breathe.
  for(let b=0;b<8;b++){
    kick(b,false);
    if(b>=4){ snare(b,false); hat(b); } // snare enters bar 4
    else if(b>=2) hat(b);               // hats enter bar 2
    vinylCrunch(b);
  }

  // VERSE 1 (8-23): Full beat. Chop enters. Bass enters bar 12.
  for(let b=8;b<24;b++){
    kick(b,false);
    snare(b,false);
    hat(b);
    if(b>=12) bass808(b,BASS_PROG[b%4]);
    chop(b,false);
    vinylCrunch(b);
  }

  // HOOK (24-31): Filter opens on chop. Ghost snares add texture.
  for(let b=24;b<32;b++){
    kick(b,true);   // extra kick hit
    snare(b,true);  // ghost snares
    hat(b);
    bass808(b,BASS_PROG[b%4]);
    chop(b,true);   // filter open
    vinylCrunch(b);
  }

  // VERSE 2 (32-47): Back to standard, but slightly more energetic
  for(let b=32;b<48;b++){
    kick(b,false);
    snare(b,false);
    hat(b);
    bass808(b,BASS_PROG[b%4]);
    chop(b,false);
    vinylCrunch(b);
  }

  // BREAK (48-55): Strip to kick + vinyl crunch only. Space.
  for(let b=48;b<56;b++){
    kick(b,false);
    vinylCrunch(b);
    if(b>=54) hat(b); // hats creep back in last 2 bars
  }

  // FINALE (56-63): Full return
  for(let b=56;b<64;b++){
    kick(b,b%4===0);
    snare(b,false);
    hat(b);
    bass808(b,BASS_PROG[b%4]);
    chop(b,true);
    vinylCrunch(b);
  }

  return { node:master, oscs, stopAt:now+64*16*S+0.5 };
}

body: `
<div class="lesson-intro">This is where rock 'n' roll came from. Elvis at Sun Records in 1954, Bill Black slapping an upright bass, Scotty Moore playing a hollow-body guitar through a tape echo. Three instruments, a 12-bar blues form, and a shuffle feel that makes the whole thing feel like it's rolling downhill. No kick drum. No synthesizers. Just the slap of wood and string.</div>

<div class="step-card"><span class="step-num">THE SHUFFLE — THE WHOLE THING LIVES HERE</span>
Rockabilly runs at <strong>140–180 BPM</strong>, but the tempo number barely matters. What matters is the shuffle.<br><br>
Normal 4/4 divides each beat into two equal halves. Shuffle divides it into three — and puts the "and" on the <em>third</em> triplet, not the middle. The result is a loping, rolling feel — like a train on uneven tracks. Listen to "Mystery Train." That rolling forward momentum is the shuffle.<br><br>
Program it on a straight 8th-note grid and it sounds completely wrong immediately. The triplet grid is non-negotiable.
</div>

<div class="step-card"><span class="step-num">THE SLAP BASS — TWO-BEAT FEEL</span>
No kick drum in classic rockabilly. The upright bass handles everything below the guitar.<br><br>
The bassist plays two distinct motions, alternating:<br><br>
<strong>Snap</strong> (on beats 1 and 3): pull the string hard and let it slap the fingerboard. You get a pitched note AND a percussive click at the same moment. The click IS the attack — then the tone blooms after. Plus a tight rebound slap about 68ms later (the string physically bouncing back).<br><br>
<strong>Backbeat slap</strong> (on beats 2 and 4): hit the strings against the fingerboard without plucking a note. Pure percussion. This is the snare replacement. Loud enough to cut.<br><br>
<strong>Root on beat 1, fifth on beat 3</strong> — not root-root. The fifth gives harmonic motion. Root-root on 1 and 3 is what reggae does. This single difference is most of why one sounds like Elvis and the other sounds like Bob Marley.
</div>

<div class="step-card"><span class="step-num">THE 12-BAR BLUES</span>
<div class="structure-bar">
  <div class="section-block intro">INTRO<br><span style="font-size:.55rem">guitar only<br>4 bars</span></div>
  <div class="section-block verse">VERSE 1<br><span style="font-size:.55rem">full band<br>12 bars</span></div>
  <div class="section-block verse">VERSE 2<br><span style="font-size:.55rem">12 bars</span></div>
  <div class="section-block chorus">SOLO<br><span style="font-size:.55rem">guitar lead<br>12 bars</span></div>
  <div class="section-block outro">OUTRO<br><span style="font-size:.55rem">12 bars</span></div>
</div>
Every classic rockabilly song is 12-bar blues. I (4 bars) → IV (2 bars) → I (2 bars) → V (1 bar) → IV (1 bar) → I (2 bars). No chart needed — every musician in the room knows the form and knows exactly where they are at all times. The turnaround at bar 12 (V → IV → I) is the hinge that loops the form.

<div class="step-card"><span class="step-num">THE SLAPBACK ECHO</span>
One delay repeat at <strong>80–120ms, 35–40% volume</strong>. Not a repeating echo — one bounce, then silence. Like a sound hitting a hard wall. Sam Phillips at Sun Records kept it by accident and it became the defining sound of 50s rock. The guitar, the vocal, sometimes the whole mix runs through it. Without slapback it's country. With slapback it's rockabilly.
</div>

<div class="step-card"><span class="step-num">COMMON KEYS</span>
<strong>E, A, G.</strong> The three easiest open-position keys on a guitar — E uses all six open strings. Upright bass favors them too: the open strings (E, A, D, G) resonate naturally at those pitches. Essentially every classic rockabilly recording is in E, A, or G. This course uses E (root = E2, 82Hz).
</div>

  const master=ctx.createGain(); master.gain.value=0.74;
  const oscs=[];

    const cl=ctx.createBufferSource(); cl.buffer=cbuf;

    cl.start(t); cl.stop(t+0.020); oscs.push(cl);

    // The rebound — tight unpitched click, 68ms after (physical, not musical subdivision)
    slapRebound(t+REBOUND, vol*0.55);

  // ── SLAP REBOUND + BACKBEAT ───────────────────────────────────
  // Used two ways:
  //   1. As the tight rebound after each snap (vol 55%)
  //   2. As the full backbeat on beats 2+4 (vol 80%)
  // Same sound, different volumes. Slightly higher BP freq for backbeat to cut more.
  function slapRebound(t, vol){
    const slen=Math.ceil(ctx.sampleRate*0.022);
    const sbuf=ctx.createBuffer(1,slen,ctx.sampleRate);
    const sd=sbuf.getChannelData(0); for(let j=0;j<slen;j++) sd[j]=Math.random()*2-1;
    const sl=ctx.createBufferSource(); sl.buffer=sbuf;
    const sbp=ctx.createBiquadFilter(); sbp.type='bandpass'; sbp.frequency.value=550; sbp.Q.value=2.2;
    const shp=ctx.createBiquadFilter(); shp.type='highpass'; shp.frequency.value=200;
    const se=ctx.createGain();
    se.gain.setValueAtTime(vol,t); se.gain.exponentialRampToValueAtTime(0.001,t+0.022);
    sl.connect(sbp); sbp.connect(shp); shp.connect(se); se.connect(master);
    sl.start(t); sl.stop(t+0.025); oscs.push(sl);
  }

  // ── FULL SLAP BASS BAR ────────────────────────────────────────
  // The two-beat rockabilly pattern, one bar:
  //   Beat 1: snap ROOT  + rebound at +68ms
  //   Beat 2: backbeat slap (loud, pure percussive — this is the snare replacement)
  //   Beat 3: snap FIFTH + rebound at +68ms  (NOT root again — that's reggae)
  //   Beat 4: backbeat slap, OR a walk note if we're about to change chord
  //
  // Walk notes: only at chord transitions, chromatic approach from a half-step below
  // the target root. Gives the line forward motion without constant walking.
  function slapBassBar(bar, rootHz, nextRootHz){
    const fifth=rootHz*Math.pow(2,7/12);

    snap(bar, 0, rootHz, p.bassVol);               // beat 1: root
    slapRebound(bT(bar,1), p.bassVol*0.82);        // beat 2: backbeat
    snap(bar, 2, fifth, p.bassVol*0.85);            // beat 3: fifth
    // beat 4: walk if chord changes next bar, else backbeat
    if(nextRootHz && Math.abs(nextRootHz-rootHz)>1){
      const walkHz=nextRootHz*Math.pow(2,-1/12);   // half-step below next root
      snap(bar, 3, walkHz, p.bassVol*0.70);
    } else {
      slapRebound(bT(bar,3), p.bassVol*0.75);
    }
  }

  // ── BRUSHED HAT ───────────────────────────────────────────────
  // Triplet 8ths — every TRIP duration. Very light (vol 0.18).
  // This is what fills the gaps between slap events and stops the track
  // from feeling like reggae space. Rockabilly has rhythmic density.
  // HP at 9kHz — airy, not clunky. Like brushes on a snare rim.
  function hat(bar){
    for(let i=0;i<6;i++){   // 6 triplet 8ths per bar (2 per beat × 4 beats ÷ ... = 6 triplet 8ths in 4/4)
      // Actually: 4 beats × 1.5 triplet 8ths per beat = 6 per bar. Correct.
      const t=now+bar*4*Q + i*TRIP;
      const isDownbeat=(i%3===0); // triplet downbeats slightly louder
      const vol=p.hatVol*(isDownbeat?0.75:0.40);
      const hlen=Math.ceil(ctx.sampleRate*0.015);
      const hbuf=ctx.createBuffer(1,hlen,ctx.sampleRate);
      const hd=hbuf.getChannelData(0); for(let j=0;j<hlen;j++) hd[j]=Math.random()*2-1;
      const h=ctx.createBufferSource(); h.buffer=hbuf;
      const hhp=ctx.createBiquadFilter(); hhp.type='highpass'; hhp.frequency.value=9000;
      const he=ctx.createGain();
      he.gain.setValueAtTime(vol,t); he.gain.exponentialRampToValueAtTime(0.001,t+0.015);
      h.connect(hhp); hhp.connect(he); he.connect(master);
      h.start(t); h.stop(t+0.018); oscs.push(h);
    }
  }

  // ── GUITAR ────────────────────────────────────────────────────
  // Key insight from diagnosis: guitar was too low (rootHz*2 = E3 = muddy).
  // Real rockabilly guitar: trebly, bright, upper register.
  // Use rootHz*4 as the base — puts us in E4 territory (bright).
  //
  // Voicing: sawtooth for twang (real guitar is bright and harmonic-rich),
  // strum spread 3ms across strings, downstrokes on 1+3 sustained,
  // upstroke "chk" on 2+4 very short but AUDIBLE (not buried).
  //
  // Slapback: 95ms single echo, darker LP, 38% vol.
  function guitar(bar, rootHz, isMuted){
    const M3=Math.pow(2,4/12), P5=Math.pow(2,7/12);
    const base=rootHz*4; // bright register — this is the key change from before

    // Voicing built upward from base: root, M3, P5, octave
    const voicing=[
      [base,       1.00],
      [base*M3,    0.82],
      [base*P5,    0.68],
      [base*2,     0.50],
    ];

    const dur   = isMuted ? Q*0.09  : Q*0.82;  // muted = very short chk
    const vol   = isMuted ? p.riffVol*0.55 : p.riffVol;  // muted louder than before
    const beats = isMuted ? [1,3] : [0,2];

    beats.forEach(beat=>{
      const t=bT(bar,beat);
      voicing.forEach(([freq,relVol],vi)=>{
        const sd=vi*0.003; // 3ms strum stagger
        const o=ctx.createOscillator(), lp=ctx.createBiquadFilter(), eg=ctx.createGain();
        o.type='sawtooth'; // sawtooth = bright guitar twang, not muffled triangle
        o.frequency.value=freq;
        lp.type='lowpass'; lp.frequency.value=p.riffCutoff; lp.Q.value=0.6;
        eg.gain.setValueAtTime(0,t+sd);
        eg.gain.linearRampToValueAtTime(vol*relVol,t+sd+0.006);
        eg.gain.exponentialRampToValueAtTime(0.001,t+sd+dur);
        o.connect(lp); lp.connect(eg); eg.connect(master);
        o.start(t+sd); o.stop(t+sd+dur+0.01); oscs.push(o);
      });

      // Slapback echo — 95ms later, 38% vol, darker filter
      if(!isMuted){
        const t2=t+0.095;
        voicing.forEach(([freq,relVol],vi)=>{
          const sd=vi*0.003;
          const o=ctx.createOscillator(), lp=ctx.createBiquadFilter(), eg=ctx.createGain();
          o.type='sawtooth'; o.frequency.value=freq;
          lp.type='lowpass'; lp.frequency.value=p.riffCutoff*0.45; lp.Q.value=0.5;
          eg.gain.setValueAtTime(0,t2+sd);
          eg.gain.linearRampToValueAtTime(vol*relVol*0.38,t2+sd+0.006);
          eg.gain.exponentialRampToValueAtTime(0.001,t2+sd+dur*0.55);
          o.connect(lp); lp.connect(eg); eg.connect(master);
          o.start(t2+sd); o.stop(t2+sd+dur+0.01); oscs.push(o);
        });
      }
    });
  }

  // ── BOOGIE TURNAROUND LICK ────────────────────────────────────
  // Fires at the end of bars 3, 7, 11 in each 12-bar cycle.
  // root → m3 → P4 → P5 → P4 → m3
  // Six notes, two beats, in the guitar's bright register.
  // This is the signal that the form is about to loop.
  function lick(bar, rootHz){
    const base=rootHz*4;
    [0,3,5,7,5,3].forEach((semi,i)=>{
      const t=bT(bar,2)+i*(TRIP*0.48);
      const freq=base*Math.pow(2,semi/12);
      const o=ctx.createOscillator(), lp=ctx.createBiquadFilter(), eg=ctx.createGain();
      o.type='sawtooth'; o.frequency.value=freq;
      lp.type='lowpass'; lp.frequency.value=p.riffCutoff*1.1; lp.Q.value=0.7;
      eg.gain.setValueAtTime(0,t); eg.gain.linearRampToValueAtTime(p.riffVol*0.72,t+0.005);
      eg.gain.exponentialRampToValueAtTime(0.001,t+TRIP*0.38);
      o.connect(lp); lp.connect(eg); eg.connect(master);
      o.start(t); o.stop(t+TRIP*0.42); oscs.push(o);
      // Slapback on lick notes too
      const t2=t+0.095;
      const o2=ctx.createOscillator(), lp2=ctx.createBiquadFilter(), eg2=ctx.createGain();
      o2.type='sawtooth'; o2.frequency.value=freq;
      lp2.type='lowpass'; lp2.frequency.value=p.riffCutoff*0.4;
      eg2.gain.setValueAtTime(0,t2); eg2.gain.linearRampToValueAtTime(p.riffVol*0.28,t2+0.005);
      eg2.gain.exponentialRampToValueAtTime(0.001,t2+TRIP*0.28);
      o2.connect(lp2); lp2.connect(eg2); eg2.connect(master);
      o2.start(t2); o2.stop(t2+TRIP*0.32); oscs.push(o2);
    });
  }

  // ── GUITAR SOLO ───────────────────────────────────────────────
  // Blues pentatonic [0,3,5,7,10] — the scale Elvis and Scotty Moore lived in.
  // Phrases breathe: a run of 3-5 notes, then a rest, then another phrase.
  // Bends on scale degree 10 (m7) and 7 (P5) — the two most characteristic
  // rockabilly string bends. Start flat, slide up.
  function solo(bar, rootHz){
    const base=rootHz*4;
    const PHRASES=[
      [[0,7],[TRIP,10],[TRIP*2,7],[TRIP*4,5]],                   // high to low, space in middle
      [[0,10],[TRIP,12],[TRIP*1.5,10],[TRIP*3,7]],               // bend up to octave
      [[TRIP,5],[TRIP*2,7],[TRIP*3,5],[TRIP*4,3],[TRIP*5,0]],    // descending run
      [[0,0],[TRIP,3],[TRIP*2,5],[TRIP*3,7],[TRIP*5,10]],        // ascending, pause before last
    ];
    PHRASES[bar%4].forEach(([offset,semi])=>{
      const t=bT(bar,0)+offset;
      const freq=base*Math.pow(2,semi/12);
      const isBend=(semi===10||semi===7)&&(bar%3===0);
      const o=ctx.createOscillator(), lp=ctx.createBiquadFilter(), eg=ctx.createGain();
      o.type='sawtooth';
      o.frequency.setValueAtTime(isBend ? freq*Math.pow(2,-1.5/12) : freq, t);
      if(isBend) o.frequency.exponentialRampToValueAtTime(freq, t+0.045);
      lp.type='lowpass'; lp.frequency.value=p.riffCutoff*1.2; lp.Q.value=0.6;
      const dur=TRIP*1.5;
      eg.gain.setValueAtTime(0,t); eg.gain.linearRampToValueAtTime(p.riffVol*0.68,t+0.006);
      eg.gain.exponentialRampToValueAtTime(0.001,t+dur);
      o.connect(lp); lp.connect(eg); eg.connect(master);
      o.start(t); o.stop(t+dur+0.01); oscs.push(o);
      // Slapback on solo
      const t2=t+0.095;
      const o2=ctx.createOscillator(), lp2=ctx.createBiquadFilter(), eg2=ctx.createGain();
      o2.type='sawtooth'; o2.frequency.value=freq;
      lp2.type='lowpass'; lp2.frequency.value=p.riffCutoff*0.42;
      eg2.gain.setValueAtTime(0,t2); eg2.gain.linearRampToValueAtTime(p.riffVol*0.26,t2+0.006);
      eg2.gain.exponentialRampToValueAtTime(0.001,t2+dur*0.55);
      o2.connect(lp2); lp2.connect(eg2); eg2.connect(master);
      o2.start(t2); o2.stop(t2+dur+0.01); oscs.push(o2);
    });
  }

  // ── 12-BAR BLUES FORM ────────────────────────────────────────
  // I-I-I-I-IV-IV-I-I-V-IV-I-I
  // Root = E2 (82Hz). All Hz values computed fresh each bar.
  const STEPS=[0,0,0,0, 5,5,0,0, 7,5,0,0];
  const ROOT=p.bassRoot; // default 82Hz = E2

  function barRootHz(bi){ return ROOT*Math.pow(2,STEPS[bi]/12); }

  // INTRO: guitar only, 4 bars. Sets the feel and the slapback before bass enters.
  for(let b=0;b<4;b++){
    const rHz=barRootHz(b%12);
    guitar(b,rHz,false); guitar(b,rHz,true);
    hat(b);
    if(b===3) lick(b,rHz);
  }

  // VERSE 1: slap bass enters. 12 bars.
  for(let b=4;b<16;b++){
    const bi=b%12, rHz=barRootHz(bi), nHz=barRootHz((bi+1)%12);
    slapBassBar(b,rHz,nHz);
    guitar(b,rHz,false); guitar(b,rHz,true);
    hat(b);
    if(bi===3||bi===7||bi===11) lick(b,rHz);
  }

  // VERSE 2: identical, just more of it.
  for(let b=16;b<28;b++){
    const bi=b%12, rHz=barRootHz(bi), nHz=barRootHz((bi+1)%12);
    slapBassBar(b,rHz,nHz);
    guitar(b,rHz,false); guitar(b,rHz,true);
    hat(b);
    if(bi===3||bi===7||bi===11) lick(b,rHz);
  }

  // GUITAR SOLO: bass and hat carry the groove, guitar takes lead.
  for(let b=28;b<40;b++){
    const bi=b%12, rHz=barRootHz(bi), nHz=barRootHz((bi+1)%12);
    slapBassBar(b,rHz,nHz);
    hat(b);
    solo(b,rHz);
  }

  // OUTRO: full band returns, same as verses.
  for(let b=40;b<52;b++){
    const bi=b%12, rHz=barRootHz(bi), nHz=barRootHz((bi+1)%12);
    slapBassBar(b,rHz,nHz);
    guitar(b,rHz,false); guitar(b,rHz,true);
    hat(b);
    if(bi===3||bi===7||bi===11) lick(b,rHz);
  }

  return { node:master, oscs, stopAt:now+52*4*Q+0.5 };
}

body: `
<div class="lesson-intro">Two instruments making five roles. The slap bass is simultaneously a bass voice, a kick drum, and a snare drum. The guitar is simultaneously a rhythm instrument and a lead instrument. The slapback echo turns one guitar into something that sounds like it's playing in a room with hard concrete walls. This lesson is about how to build each of those things from scratch.</div>

<div class="step-card"><span class="step-num">THE SNAP SOUND — NOT A PLUCK</span>
The snap is a physical event: the string hits the fingerboard. The synthesis has to reflect this.<br><br>
Wrong approach: a smooth oscillator with a long decay (that's a pluck — that's reggae bass).<br><br>
Right approach: <strong>sharp transient attack, fast drop, then a short sustain tail</strong>. The envelope goes to peak in 4ms, drops to 45% by 20ms, then slow decay to zero. The click is the character — the tone is secondary.<br><br>
Plus a separate <strong>noise burst through BP at ~700Hz</strong> (wood register) — this is the fingerboard impact. 18ms only, louder than you'd expect. Together these two layers produce the "chk-boom" of a real snap.<br><br>
The rebound fires ~68ms after the snap (not a musical subdivision — a physical bounce time). It's unpitched noise, just the string hitting the fingerboard a second time on its way back.
</div>

<div class="step-card"><span class="step-num">THE BASS TONE — TRIANGLE, NOT SAWTOOTH</span>
A real upright bass body absorbs upper harmonics aggressively. The fundamental dominates; everything above ~600Hz is body resonance, not string harmonic. Triangle wave approximates this well — strong fundamental, weak overtones, nothing sharp.<br><br>
Lowpass at <strong>600Hz</strong> (warmer than the hard rolloff used before, which was too dark and made notes indistinct).<br><br>
The backbeat slaps on beats 2+4 are the same noise burst circuit — same BP, slightly louder (82% of snap volume). They need to cut as a backbeat, not whisper.
</div>

<div class="step-card"><span class="step-num">THE GUITAR TONE — BRIGHT, NOT MUDDY</span>
Earlier versions used the guitar in the wrong octave — rootHz×2 puts E2 root at E3 (164Hz), which is muddy and dark. Real rockabilly guitar is <strong>trebly and bright</strong>.<br><br>
<strong>rootHz×4</strong> as the base: puts the root at E4 (328Hz), which is guitar-bright.<br><br>
<strong>Sawtooth</strong> wave (not triangle): sawtooth's rich harmonics through a highish LP cutoff (~3200Hz) approximates the twangy, biting quality of a hollow-body guitar pick attack. Triangle was too soft and polite.<br><br>
The slapback copies use <strong>cutoff × 0.45</strong> — the echo is noticeably darker, like sound bouncing off stone. This is audible and important.
</div>

<div class="step-card"><span class="step-num">THE HAT — FILLING THE GAPS</span>
Empty space between slap events at 160 BPM sounds like dub or reggae. Rockabilly has rhythmic density — even a minimal brushed snare or hi-hat on triplet 8ths keeps the energy alive.<br><br>
The hat here fires on every triplet 8th (6 per bar): very high HP at 9kHz, 15ms duration, airy. Triplet downbeats at 75% volume, off-triplets at 40%. It's barely there, but it fills the gaps.
</div>

<div class="step-card"><span class="step-num">THE TURNAROUND LICK</span>
At the end of every 4th bar: root → m3 → P4 → P5 → P4 → m3. Six notes across two beats. Same bright register as the guitar chords (rootHz×4). This is the country/rockabilly turnaround signal — every musician hears it and knows "the form is about to loop." Notes are very short (38% of a triplet 8th), fast, staccato. Slapback on each note.
</div>

<div class="artists">
Primary reference: Sun Records recordings 1954–1958. Elvis "Mystery Train," Johnny Cash "Get Rhythm," Carl Perkins "Blue Suede Shoes." These are the source documents for every synthesis parameter in this lesson. The upright bass is Bill Black; the guitar is Scotty Moore. Two people making a sound that started an entire era of music.
</div>

    if(pr===3||pr===5){[4,12].forEach(s=>{const st=now+(bar*16+s)*S;const buf=ctx.createBuffer(1,ctx.sampleRate*0.06,ctx.sampleRate);const d=buf.getChannelData(0);for(let j=0;j<d.length;j++)d[j]=Math.random()*2-1;const sn=ctx.createBufferSource();sn.buffer=buf;const rim=ctx.createBiquadFilter();rim.type='bandpass';rim.frequency.value=p.rimFreq;rim.Q.value=3;const se=ctx.createGain();se.gain.setValueAtTime(0.7,st);se.gain.exponentialRampToValueAtTime(0.001,st+0.05);sn.connect(rim);rim.connect(se);se.connect(master);sn.start(st);sn.stop(st+0.08);oscs.push(sn);});}

title: "Rockabilly -- In the Studio",
subtitle: "06 -- How to Build a Rockabilly Track",
body: `
<div class="lesson-intro">The code is built around two timing constants and four functions. Once you understand what Q and REBOUND do, and how snap() and slapBassBar() interact, you can tune the whole track by adjusting a handful of values. This lesson explains what each knob is actually changing.</div>

<div class="step-card"><span class="step-num">THE TIMING CONSTANTS</span>
<p><code>Q = 60/bpm</code> — one quarter note. Everything rhythmic is measured in multiples of Q.</p>
<p><code>TRIP = Q*(2/3)</code> — the triplet 8th. The hat fires on every TRIP interval. The lick notes space at TRIP*0.48. Solo phrases space at multiples of TRIP.</p>
<p><code>REBOUND = Q*0.18</code> — about 68ms at 160 BPM. This is the tight snap rebound: not a musical subdivision, just the physical bounce time of a string off a fingerboard. Change this and the whole feel shifts. At 0.10 it sounds too tight (mechanical). At 0.25 it sounds like a counted subdivision (reggae). 0.18 is the sweet spot.</p>
</div>

<div class="step-card"><span class="step-num">THE SNAP FUNCTION</span>
<p><code>snap(bar, beat, freq, vol)</code> does three things:</p>
<ol style="font-family:'Space Mono',monospace;font-size:.63rem;margin:.4rem 0;line-height:2.2;">
  <li>Triangle oscillator through LP at bassFilter Hz, sharp transient envelope (4ms to peak, drops to 45% by 20ms)</li>
  <li>18ms noise burst through BP at 700Hz — the fingerboard click</li>
  <li>slapRebound() scheduled at t+REBOUND — the bounce-back</li>
</ol>
<p>The <em>bassFilter</em> parameter controls how warm or present the bass tone is. Default 600Hz. Go lower (400Hz) for a warmer, more distant tone. Higher (900Hz) for more click and presence.</p>
</div>

<div class="step-card"><span class="step-num">THE slapBassBar FUNCTION</span>
<p><code>slapBassBar(bar, rootHz, nextRootHz)</code> assembles one full bar:</p>
<ul style="font-family:'Space Mono',monospace;font-size:.63rem;margin:.4rem 0;line-height:2.2;">
  <li>Beat 1: snap(rootHz)</li>
  <li>Beat 2: slapRebound() at 82% vol — the backbeat</li>
  <li>Beat 3: snap(rootHz × 2^(7/12)) — the fifth</li>
  <li>Beat 4: if nextRootHz differs, snap(nextRootHz × 2^(-1/12)) — walk note a half-step below the next root. Else: slapRebound() at 75% vol.</li>
</ul>
<p>The walk note logic uses the actual next-bar root frequency, not a hardcoded semitone table — so it always computes the correct chromatic approach regardless of what chord is coming.</p>
</div>

<div class="step-card"><span class="step-num">THE GUITAR REGISTER</span>
<p>The guitar base frequency is <code>rootHz*4</code> — two octaves above the bass root. At E2 (82Hz) root, that's E4 (328Hz). The voicing builds upward from there: root, M3, P5, octave.</p>
<p>This is the single biggest tonal fix from previous versions. <code>rootHz*2</code> (E3, 164Hz) was muddy and dark — it competed with the bass and sounded like a baritone instrument. <code>rootHz*4</code> puts the guitar in the treble range where rockabilly guitar actually lives.</p>
<p><em>Guitar Cutoff</em> controls the tone character. Default 3200Hz — bright and twangy. Lower to 1800Hz for a warmer, more vintage sound. Below 1200Hz it starts to lose its guitar identity.</p>
</div>

<div class="step-card"><span class="step-num">COMMON PROBLEMS + FIXES</span>
<p><strong>"It still sounds like reggae"</strong> — check the REBOUND value (Q*0.18 in constants). If it's too long the rebound separates from the snap and sounds like a counted hit. Also check that beat 3 is playing a fifth, not a root.</p>
<p><strong>"The bass sounds boxy and distant"</strong> — raise <em>Bass Filter</em> toward 700–800Hz. The 600Hz default is warm but not muddy; going lower loses too much presence.</p>
<p><strong>"The guitar sounds thin"</strong> — raise <em>Guitar Volume</em> or <em>Guitar Cutoff</em>. Sawtooth at high cutoff is bright; if it sounds thin rather than bright, the voicing spread may be collapsing — check that riffVol is above 0.45.</p>
<p><strong>"The shuffle doesn't feel right"</strong> — the hat fires on every TRIP interval. If the hat volume is very low (<0.12) the triplet grid disappears and the groove loses its character. Raise <em>Hat Volume</em> slightly.</p>
</div>

<div class="artists">
Listen and map: "That's All Right" (Elvis, 1954) — identify every event in the first two bars. The snap on beat 1, the backbeat on 2, the fifth on 3, the backbeat on 4. Then the guitar: down on 1, chk on 2, down on 3, chk on 4. The slapback on the guitar making every note echo. That's the whole thing.
</div>

code: `// ROCKABILLY — "That's All Right" feel. Elvis at Sun, 1954.
//
// The instrument map:
//   Upright slap bass  — root on 1, fifth on 3, snap+rebound on the triplet after each
//   Guitar             — bright, trebly, continuous rhythm: down on 1+3, chk on 2+4
//   Light brushed hat  — triplet 8ths, keeps the shuffle alive between slaps
//   Boogie lick        — turnaround every 4th bar, root→m3→4→5→4→m3
//   Guitar solo        — blues pentatonic, phrases that breathe
//
// What makes this 50s rock and NOT reggae:
//   → The slap rebound (the "chick") fires at Q*0.18 after the snap, not a full TRIP.
//     It's a physical rebound — tight and immediate, not a counted subdivision.
//   → The fifth on beat 3 (not root-root). Root-root on 1+3 = reggae. Root-fifth = country/rock.
//   → The snap envelope: sharp transient first, then tone — not a smooth pluck.
//   → The guitar sits bright (rootHz*4 register = E4 treble range, not E3 muddy).
//   → The hat fills the gaps. Silence between events = dub. Constant 8ths = energy.

function makeSynth(ctx, p) {
  const _d={bpm:160,root:220,bassRoot:82,bassNote:65,bassVol:0.88,bassCutoff:300,bassFilter:600,bassReso:5,
    kickVol:0.9,kickFreq:130,kickNote:55,kickStart:155,kickSub:50,kickDecay:0.3,
    snareVol:0.72,snareFreq:320,snareHiss:3,hatVol:0.18,hatHP:8000,hatDecay:0.4,
    clapVol:0.65,clapFreq:1200,rimFreq:860,stabNote:196,stabBP:900,stabDetune:8,stabVol:0.4,
    riffRoot:220,riffNote:220,riffVol:0.52,riffCutoff:3200,padRoot:110,padNote:110,padVol:0.38,padCutoff:1200,
    leadNote:392,leadVol:0.5,pianoNote:220,pianoVol:0.45,pianoFilter:2200,
    acidNote:55,acidBase:300,acidReso:8,crunchVol:0.12,crunchLP:4000,
    cowVol:0.2,cowDecay:0.35,tomNote:110,tomDecay:0.4,vocoderVol:0.35,vocoderBP:800,vocoderQ:3,
    swing:0.22,slapDelay:0.08,scRelease:0.32,sawVol:0.45,sawCutoff:800,
    pluckVol:0.38,pluckDecay:0.3,pluckReso:4,pluckDetune:0,arpCutoff:400,arpReso:3,
    modCutoff:1200,preset:5,openHatDecay:0.4,hatOpen:0.4,vocalVol:0.35,bassVol2:0.5};
  for(const k in _d) if(p[k]===undefined||isNaN(p[k])||!isFinite(p[k])) p[k]=_d[k];

  const now=ctx.currentTime;
  const Q=60/p.bpm;           // quarter note (the beat)
  const TRIP=Q*(2/3);         // triplet 8th (2/3 of a beat)
  const REBOUND=Q*0.18;       // the slap rebound: tight, physical, NOT a counted triplet
                               // 0.18 * 0.375s = ~68ms — feels like the string bouncing back
  const master=ctx.createGain(); master.gain.value=0.74;
  const oscs=[];

  function bT(bar,beat){ return now+(bar*4+beat)*Q; } // beat position

  // ── SNAP ─────────────────────────────────────────────────────
  // The string hits the fingerboard. Two things at once:
  //   1. A pitched tone that decays fast — the fundamental of the string
  //   2. A wood-smack transient — the fingerboard impact
  // Then a tight rebound slap at +REBOUND (not a triplet subdivision — a physical bounce).
  //
  // Envelope: peak → fast decay to ~40% → slow tail
  // This is NOT a smooth pluck. The attack is a transient, then it backs off.
  function snap(bar, beat, freq, vol){
    const t=bT(bar,beat);

    // The tone — triangle through a midrange LP (upright bass = mostly fundamental)
    // Filter at 600Hz: warmer than before but still lets the attack click through
    const o=ctx.createOscillator(), lp=ctx.createBiquadFilter(), eg=ctx.createGain();
    o.type='triangle'; o.frequency.value=freq;
    lp.type='lowpass'; lp.frequency.value=p.bassFilter; lp.Q.value=0.5;
    // Sharp transient envelope: spike at attack, drop to 45%, then slow decay
    eg.gain.setValueAtTime(0.001,t);
    eg.gain.linearRampToValueAtTime(vol,t+0.004);      // 4ms to peak
    eg.gain.exponentialRampToValueAtTime(vol*0.45,t+0.020); // drop fast after click
    eg.gain.exponentialRampToValueAtTime(0.001,t+Q*0.68);   // sustain tail
    o.connect(lp); lp.connect(eg); eg.connect(master);
    o.start(t); o.stop(t+Q); oscs.push(o);

    // The fingerboard smack — wide noise burst, BP at ~700Hz (wood register)
    // Louder than before because the CLICK is the character, not the tone
    const clen=Math.ceil(ctx.sampleRate*0.018);
    const cbuf=ctx.createBuffer(1,clen,ctx.sampleRate);
    const cd=cbuf.getChannelData(0); for(let j=0;j<clen;j++) cd[j]=Math.random()*2-1;
    const cl=ctx.createBufferSource(); cl.buffer=cbuf;
    const cbp=ctx.createBiquadFilter(); cbp.type='bandpass'; cbp.frequency.value=700; cbp.Q.value=1.8;
    const ce=ctx.createGain();
    ce.gain.setValueAtTime(vol*0.85,t); ce.gain.exponentialRampToValueAtTime(0.001,t+0.018);
    cl.connect(cbp); cbp.connect(ce); ce.connect(master);
    cl.start(t); cl.stop(t+0.020); oscs.push(cl);

    // The rebound — tight unpitched click, 68ms after (physical, not musical subdivision)
    slapRebound(t+REBOUND, vol*0.55);
  }

  // ── SLAP REBOUND + BACKBEAT ───────────────────────────────────
  // Used two ways:
  //   1. As the tight rebound after each snap (vol 55%)
  //   2. As the full backbeat on beats 2+4 (vol 80%)
  // Same sound, different volumes. Slightly higher BP freq for backbeat to cut more.
  function slapRebound(t, vol){
    const slen=Math.ceil(ctx.sampleRate*0.022);
    const sbuf=ctx.createBuffer(1,slen,ctx.sampleRate);
    const sd=sbuf.getChannelData(0); for(let j=0;j<slen;j++) sd[j]=Math.random()*2-1;
    const sl=ctx.createBufferSource(); sl.buffer=sbuf;
    const sbp=ctx.createBiquadFilter(); sbp.type='bandpass'; sbp.frequency.value=550; sbp.Q.value=2.2;
    const shp=ctx.createBiquadFilter(); shp.type='highpass'; shp.frequency.value=200;
    const se=ctx.createGain();
    se.gain.setValueAtTime(vol,t); se.gain.exponentialRampToValueAtTime(0.001,t+0.022);
    sl.connect(sbp); sbp.connect(shp); shp.connect(se); se.connect(master);
    sl.start(t); sl.stop(t+0.025); oscs.push(sl);
  }

  // ── FULL SLAP BASS BAR ────────────────────────────────────────
  // The two-beat rockabilly pattern, one bar:
  //   Beat 1: snap ROOT  + rebound at +68ms
  //   Beat 2: backbeat slap (loud, pure percussive — this is the snare replacement)
  //   Beat 3: snap FIFTH + rebound at +68ms  (NOT root again — that's reggae)
  //   Beat 4: backbeat slap, OR a walk note if we're about to change chord
  //
  // Walk notes: only at chord transitions, chromatic approach from a half-step below
  // the target root. Gives the line forward motion without constant walking.
  function slapBassBar(bar, rootHz, nextRootHz){
    const fifth=rootHz*Math.pow(2,7/12);

    snap(bar, 0, rootHz, p.bassVol);               // beat 1: root
    slapRebound(bT(bar,1), p.bassVol*0.82);        // beat 2: backbeat
    snap(bar, 2, fifth, p.bassVol*0.85);            // beat 3: fifth
    // beat 4: walk if chord changes next bar, else backbeat
    if(nextRootHz && Math.abs(nextRootHz-rootHz)>1){
      const walkHz=nextRootHz*Math.pow(2,-1/12);   // half-step below next root
      snap(bar, 3, walkHz, p.bassVol*0.70);
    } else {
      slapRebound(bT(bar,3), p.bassVol*0.75);
    }
  }

  // ── BRUSHED HAT ───────────────────────────────────────────────
  // Triplet 8ths — every TRIP duration. Very light (vol 0.18).
  // This is what fills the gaps between slap events and stops the track
  // from feeling like reggae space. Rockabilly has rhythmic density.
  // HP at 9kHz — airy, not clunky. Like brushes on a snare rim.
  function hat(bar){
    for(let i=0;i<6;i++){   // 6 triplet 8ths per bar (2 per beat × 4 beats ÷ ... = 6 triplet 8ths in 4/4)
      // Actually: 4 beats × 1.5 triplet 8ths per beat = 6 per bar. Correct.
      const t=now+bar*4*Q + i*TRIP;
      const isDownbeat=(i%3===0); // triplet downbeats slightly louder
      const vol=p.hatVol*(isDownbeat?0.75:0.40);
      const hlen=Math.ceil(ctx.sampleRate*0.015);
      const hbuf=ctx.createBuffer(1,hlen,ctx.sampleRate);
      const hd=hbuf.getChannelData(0); for(let j=0;j<hlen;j++) hd[j]=Math.random()*2-1;
      const h=ctx.createBufferSource(); h.buffer=hbuf;
      const hhp=ctx.createBiquadFilter(); hhp.type='highpass'; hhp.frequency.value=9000;
      const he=ctx.createGain();
      he.gain.setValueAtTime(vol,t); he.gain.exponentialRampToValueAtTime(0.001,t+0.015);
      h.connect(hhp); hhp.connect(he); he.connect(master);
      h.start(t); h.stop(t+0.018); oscs.push(h);
    }
  }

  // ── GUITAR ────────────────────────────────────────────────────
  // Key insight from diagnosis: guitar was too low (rootHz*2 = E3 = muddy).
  // Real rockabilly guitar: trebly, bright, upper register.
  // Use rootHz*4 as the base — puts us in E4 territory (bright).
  //
  // Voicing: sawtooth for twang (real guitar is bright and harmonic-rich),
  // strum spread 3ms across strings, downstrokes on 1+3 sustained,
  // upstroke "chk" on 2+4 very short but AUDIBLE (not buried).
  //
  // Slapback: 95ms single echo, darker LP, 38% vol.
  function guitar(bar, rootHz, isMuted){
    const M3=Math.pow(2,4/12), P5=Math.pow(2,7/12);
    const base=rootHz*4; // bright register — this is the key change from before

    // Voicing built upward from base: root, M3, P5, octave
    const voicing=[
      [base,       1.00],
      [base*M3,    0.82],
      [base*P5,    0.68],
      [base*2,     0.50],
    ];

    const dur   = isMuted ? Q*0.09  : Q*0.82;  // muted = very short chk
    const vol   = isMuted ? p.riffVol*0.55 : p.riffVol;  // muted louder than before
    const beats = isMuted ? [1,3] : [0,2];

    beats.forEach(beat=>{
      const t=bT(bar,beat);
      voicing.forEach(([freq,relVol],vi)=>{
        const sd=vi*0.003; // 3ms strum stagger
        const o=ctx.createOscillator(), lp=ctx.createBiquadFilter(), eg=ctx.createGain();
        o.type='sawtooth'; // sawtooth = bright guitar twang, not muffled triangle
        o.frequency.value=freq;
        lp.type='lowpass'; lp.frequency.value=p.riffCutoff; lp.Q.value=0.6;
        eg.gain.setValueAtTime(0,t+sd);
        eg.gain.linearRampToValueAtTime(vol*relVol,t+sd+0.006);
        eg.gain.exponentialRampToValueAtTime(0.001,t+sd+dur);
        o.connect(lp); lp.connect(eg); eg.connect(master);
        o.start(t+sd); o.stop(t+sd+dur+0.01); oscs.push(o);
      });

      // Slapback echo — 95ms later, 38% vol, darker filter
      if(!isMuted){
        const t2=t+0.095;
        voicing.forEach(([freq,relVol],vi)=>{
          const sd=vi*0.003;
          const o=ctx.createOscillator(), lp=ctx.createBiquadFilter(), eg=ctx.createGain();
          o.type='sawtooth'; o.frequency.value=freq;
          lp.type='lowpass'; lp.frequency.value=p.riffCutoff*0.45; lp.Q.value=0.5;
          eg.gain.setValueAtTime(0,t2+sd);
          eg.gain.linearRampToValueAtTime(vol*relVol*0.38,t2+sd+0.006);
          eg.gain.exponentialRampToValueAtTime(0.001,t2+sd+dur*0.55);
          o.connect(lp); lp.connect(eg); eg.connect(master);
          o.start(t2+sd); o.stop(t2+sd+dur+0.01); oscs.push(o);
        });
      }
    });
  }

  // ── BOOGIE TURNAROUND LICK ────────────────────────────────────
  // Fires at the end of bars 3, 7, 11 in each 12-bar cycle.
  // root → m3 → P4 → P5 → P4 → m3
  // Six notes, two beats, in the guitar's bright register.
  // This is the signal that the form is about to loop.
  function lick(bar, rootHz){
    const base=rootHz*4;
    [0,3,5,7,5,3].forEach((semi,i)=>{
      const t=bT(bar,2)+i*(TRIP*0.48);
      const freq=base*Math.pow(2,semi/12);
      const o=ctx.createOscillator(), lp=ctx.createBiquadFilter(), eg=ctx.createGain();
      o.type='sawtooth'; o.frequency.value=freq;
      lp.type='lowpass'; lp.frequency.value=p.riffCutoff*1.1; lp.Q.value=0.7;
      eg.gain.setValueAtTime(0,t); eg.gain.linearRampToValueAtTime(p.riffVol*0.72,t+0.005);
      eg.gain.exponentialRampToValueAtTime(0.001,t+TRIP*0.38);
      o.connect(lp); lp.connect(eg); eg.connect(master);
      o.start(t); o.stop(t+TRIP*0.42); oscs.push(o);
      // Slapback on lick notes too
      const t2=t+0.095;
      const o2=ctx.createOscillator(), lp2=ctx.createBiquadFilter(), eg2=ctx.createGain();
      o2.type='sawtooth'; o2.frequency.value=freq;
      lp2.type='lowpass'; lp2.frequency.value=p.riffCutoff*0.4;
      eg2.gain.setValueAtTime(0,t2); eg2.gain.linearRampToValueAtTime(p.riffVol*0.28,t2+0.005);
      eg2.gain.exponentialRampToValueAtTime(0.001,t2+TRIP*0.28);
      o2.connect(lp2); lp2.connect(eg2); eg2.connect(master);
      o2.start(t2); o2.stop(t2+TRIP*0.32); oscs.push(o2);
    });
  }

  // ── GUITAR SOLO ───────────────────────────────────────────────
  // Blues pentatonic [0,3,5,7,10] — the scale Elvis and Scotty Moore lived in.
  // Phrases breathe: a run of 3-5 notes, then a rest, then another phrase.
  // Bends on scale degree 10 (m7) and 7 (P5) — the two most characteristic
  // rockabilly string bends. Start flat, slide up.
  function solo(bar, rootHz){
    const base=rootHz*4;
    const PHRASES=[
      [[0,7],[TRIP,10],[TRIP*2,7],[TRIP*4,5]],                   // high to low, space in middle
      [[0,10],[TRIP,12],[TRIP*1.5,10],[TRIP*3,7]],               // bend up to octave
      [[TRIP,5],[TRIP*2,7],[TRIP*3,5],[TRIP*4,3],[TRIP*5,0]],    // descending run
      [[0,0],[TRIP,3],[TRIP*2,5],[TRIP*3,7],[TRIP*5,10]],        // ascending, pause before last
    ];
    PHRASES[bar%4].forEach(([offset,semi])=>{
      const t=bT(bar,0)+offset;
      const freq=base*Math.pow(2,semi/12);
      const isBend=(semi===10||semi===7)&&(bar%3===0);
      const o=ctx.createOscillator(), lp=ctx.createBiquadFilter(), eg=ctx.createGain();
      o.type='sawtooth';
      o.frequency.setValueAtTime(isBend ? freq*Math.pow(2,-1.5/12) : freq, t);
      if(isBend) o.frequency.exponentialRampToValueAtTime(freq, t+0.045);
      lp.type='lowpass'; lp.frequency.value=p.riffCutoff*1.2; lp.Q.value=0.6;
      const dur=TRIP*1.5;
      eg.gain.setValueAtTime(0,t); eg.gain.linearRampToValueAtTime(p.riffVol*0.68,t+0.006);
      eg.gain.exponentialRampToValueAtTime(0.001,t+dur);

  // I-I-I-I-IV-IV-I-I-V-IV-I-I
  // Root = E2 (82Hz). All Hz values computed fresh each bar.
  const STEPS=[0,0,0,0, 5,5,0,0, 7,5,0,0];
