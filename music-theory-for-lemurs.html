<div class="lesson-intro">Future funk sound design centers on one instrument: the filtered chord pad with sidechain compression. Everything else (bass, stabs, drums) supports that central sound. Here's how each element is synthesized and what makes the filter automation work.</div>

<div class="step-card"><span class="step-num">THE CHORD PAD — DETUNED DOM7 WITH FILTER AUTOMATION</span>
Four sawtooth oscillators per chord note (root, M3, P5, b7 — a dominant 7th voicing), each doubled with a slightly detuned copy (ratio 1.007, approximately 12 cents). This gives 8 oscillators per bar creating the characteristic wide, warm sound of sampled disco chords.<br><br>
The filter is a resonant lowpass (Q=2.0). The Q is intentionally higher than a flat filter — the slight resonance peak creates a "vocal" quality at the cutoff frequency that sounds more organic. The cutoff parameter changes each bar according to the arrangement section, controlled by the <code>filterCutoff</code> argument passed to <code>chordPad()</code>.
</div>

<div class="step-card"><span class="step-num">THE SIDECHAIN SIMULATION</span>
The pad's gain envelope has four dips scheduled at the same times as the kick hits (steps 0, 4, 8, 12). At each kick, the gain drops to 12% (nearly silent) then ramps back to 100% over 120ms. This simulates sidechain compression — in real production, the kick's signal triggers a compressor on the pad channel.<br><br>
The 120ms recovery time is the key parameter. Too fast (under 60ms): the pump sounds like a click. Too slow (over 200ms): the pump becomes the dominant character and sounds more like tremolo than compression. At 120ms it reads as "breathing" — natural and musical.
</div>

<div class="step-card"><span class="step-num">THE FUNKY BASS — ACTIVE RHYTHM PATTERN</span>
Sawtooth through lowpass at 550Hz. The bass pattern uses 6 hits per bar: beat 1 at octave down (semi=1), syncopated hits at steps 3, 5, 8, 11, 14 using root and P5 intervals. This is more active than the techno or trance bass — it moves with the groove rather than anchoring it. The syncopated hits on odd 16th steps create the funk vocabulary.
</div>

<div class="step-card"><span class="step-num">THE FILTER SWEEP — HOW THE MATH WORKS</span>
The intro filter starts at padCutoff × 0.2 (very closed) and increases by 0.04× padCutoff per bar over bars 0–7. Bars 8–15 sweep from padCutoff × 1.0 to padCutoff × 4.0 as the groove opens. The chorus holds at padCutoff × 5.0 (fully open). The pre-break sweeps from padCutoff × 5.0 down to padCutoff × 0.3 over bars 40–47 — the closing is faster than the opening, which creates urgency. The peak reopens dramatically from padCutoff × 0.3 to padCutoff × 6.0 over 4 bars.<br><br>
All filter values are clamped to the audio-safe range (80Hz minimum, 18000Hz maximum) to prevent Web Audio API errors.

subtitle: "27 -- How to Build a Future Funk Track",
body: `
<div class="lesson-intro">Future funk production is filter automation. Once you understand that the lowpass cutoff is the arrangement, every other decision becomes easier. Here's the production logic behind each section and how to make the filter's movements feel intentional rather than arbitrary.</div>

<div class="step-card"><span class="step-num">WHY THE INTRO STARTS CLOSED</span>
<p>Bars 0–7 have the filter at 20–40% of padCutoff — the chord pad is muffled, dark, barely audible above the kick and snare. This is the genre convention: start closed, reveal gradually. The listener hears rhythm first, then harmony arrives as the filter opens.</p>
<p>The slow intro filter sweep (0.04× padCutoff per bar) means the opening takes 8 bars to become clearly audible. This patience is deliberate — rushing the reveal removes its impact. The listener should feel the chord pad arriving before they consciously recognize what changed.</p>
</div>

<div class="step-card"><span class="step-num">THE OPENING SWEEP — 8 BARS, NOT INSTANT</span>
<p>Bars 8–15 sweep the filter from padCutoff × 1.0 to padCutoff × 4.0 over 8 bars. This is a 12:1 sweep (4× more open at the end than the start) over 8 bars at 108 BPM — approximately 29 seconds. The filter change is barely audible in any single bar but dramatic over the full 8 bars.</p>
<p>This is the core future funk technique: slow enough to be subliminal, fast enough to be felt. The listener doesn't notice the filter moving — they notice that the track sounds different at bar 23 than at bar 8 and can't identify why.</p>
</div>

<div class="step-card"><span class="step-num">THE PRE-BREAK CLOSING SWEEP — FASTER THAN OPENING</span>
<p>Bars 40–47 close the filter from padCutoff × 5.0 down to padCutoff × 0.3 over 8 bars — a 16:1 sweep in the same timespan as the 4:1 opening sweep. The closing is 4× faster than the opening. This asymmetry creates urgency: things close faster than they opened, which the nervous system reads as danger or tension.</p>
<p>The break (bars 48–51) holds the filter fully closed — just kick and muffled pad. Four bars of near-silence at 108 BPM is about 14 seconds. This is the maximum tension point. When the peak sweep begins at bar 52, the relief is immediate and physical.</p>
</div>

<div class="step-card"><span class="step-num">SIDECHAIN PUMP TUNING</span>
<p>The 120ms recovery time in the sidechain simulation is tuned for 108 BPM. At this tempo a quarter note is 556ms — the pump occupies the first 120ms (22%) of each beat, leaving 434ms of full volume. Increase recovery time to 200ms and the pump feels more aggressive. Decrease to 60ms and it disappears into the kick transient.</p>
<p>If the pad sounds thin even with the filter open: the sidechain is possibly too aggressive (check the 12% floor value). Raising the duck floor to 20–25% makes the pump less extreme but allows more pad sustain through the kick.</p>
</div>

<div class="step-card"><span class="step-num">COMMON PROBLEMS + FIXES</span>
<p><strong>"The filter sweep isn't audible"</strong> — padCutoff default is 400Hz. The sweep multiplies this — at maximum (× 6) the cutoff is 2400Hz. If padCutoff is too low (under 300Hz) the sweep has limited range. Try setting padCutoff to 500Hz to give the sweep more headroom.</p>
<p><strong>"The sidechain pump doesn't sound like pumping"</strong> — Check the timing. The gain envelope sets value at the kick step time, then linearRamps to full volume. If the kick timing (steps 0,4,8,12) doesn't match the scheduled gain dips, the duck won't align with the kick hits.</p>
<p><strong>"The stabs sound too clean / not funky"</strong> — Future funk stabs should be short and punchy. Check stabVol is not too low. Also check the filter sweep on the stab (3500→1400Hz in 35ms) — if riffCutoff is very low this sweep is compressed into a smaller range.</p>
</div>

<div class="artists">
Listen and map: Daft Punk — "One More Time" (the filter automation is the entire A-section) / Breakbot — "Baby I'm Yours" (how the filter and sidechain interact) / Macross 82-99 — "Flicker" (future funk at its most nostalgic). Map the filter: literally describe when the sound is dark vs bright across the track — this is the composition.
</div>

      const t=stT(bar,s);
      const isAccent=(s%4===0);
      const v=vol*(isAccent?0.70:0.22);
      if(v<0.01) continue;
      const len=Math.ceil(ctx.sampleRate*0.018);
      const buf=ctx.createBuffer(1,len,ctx.sampleRate);

      const h=ctx.createBufferSource(); h.buffer=buf;
      const hp=ctx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=p.hatHP;
      const he=ctx.createGain();
      he.gain.setValueAtTime(v,t); he.gain.exponentialRampToValueAtTime(0.001,t+0.016);

  // A chord pad that ducks its volume briefly on each kick hit — sidechain effect.

      o.connect(f); f.connect(e); e.connect(master); o.start(t); o.stop(t+dur*S); oscs.push(o);
    });

  // ── FUNK STAB: choppy 16th rhythm figure ─────────────────────
  // Short dom7 chords on a funky 16th pattern. The stab IS the rhythm hook.
  function stab(bar, rootHz, vol){

    // Classic funk chop: off-1, e-2, off-3 — syncopated and punchy
    [3,5,11,13].forEach(s=>{
      const t=stT(bar,s);
      const mix=ctx.createGain(); mix.gain.value=0.32;
      const lp=ctx.createBiquadFilter(); lp.type='lowpass'; lp.Q.value=1.0;

      [1,M3,P5].forEach(r=>{
        const o=ctx.createOscillator(); o.type='sawtooth'; o.frequency.value=rootHz*2*r;

  }

  // Chord progression: I7-IV7-V7-IV7 (disco/funk major with dom7s)
  const PROG=[0,5,7,5];
  const ROOT=p.bassRoot; // A2 = 110Hz

  // INTRO (0-7): filter CLOSED. Chord pad barely audible. Tension.
  for(let b=0;b<8;b++){

    const openFraction=Math.min((b-8)/8,1);
    const cut=p.padCutoff*(1+openFraction*3); // filter sweeps open over 8 bars
    kick(b,p.kickVol); snare(b,p.snareVol); hat16(b,p.hatVol);
    chordPad(b,r,cut,p.padVol);
    bass(b,r);
    if(b>=16) stab(b,r,p.stabVol);

  // CHORUS (24-39): filter fully open. Maximum funk.
  for(let b=24;b<40;b++){
    const r=ROOT*Math.pow(2,PROG[b%4]/12);

    bass(b,r); stab(b,r,p.stabVol*1.08);
  }

<div class="lesson-intro">You've now heard nine genres, built kick drums from sine waves, designed acid basses, supersaw pads, slap basses, clarinet approximations, and 808 cowbells. Here's the revelation: everything you just did intuitively <em>is</em> music theory. This lesson hands you the vocabulary for what you already know — and fills in the gaps between genres.</div>

<div class="step-card"><span class="step-num">THE NOTE: ONE FREQUENCY, ONE NAME</span>
A note is a sound at a specific pitch. A4 = 440Hz. The chromatic scale has <strong>12 notes</strong> before repeating: C C# D D# E F F# G G# A A# B — then C again, one <strong>octave</strong> higher. Each octave doubles the frequency (A4=440, A5=880). Each semitone step multiplies by <code>2^(1/12) ≈ 1.0595</code> — you used this exact formula in every lesson's synth code whenever you wrote <code>Math.pow(2, semi/12)</code>.
<div class="chord-row" data-root="110" data-mode="major">
  <span class="chord root" data-chord="single" data-degree="I">A2 (110Hz)</span>
  <span class="chord" data-chord="single" data-degree="octave">A3 (220Hz)</span>
  <span class="chord" data-chord="single" data-degree="octave2">A4 (440Hz)</span>
</div>
Click each — same note name, each one double the frequency of the last.
</div>

<div class="step-card"><span class="step-num">THE INTERVAL: THE DISTANCE THAT CREATES THE FEELING</span>
An interval is the distance between two notes in semitones. The intervals that appeared in every lesson:
<div style="font-family:'Space Mono',monospace;font-size:.65rem;margin:.6rem 0;line-height:2.2;">
 2 semitones = Major 2nd   — passing tone, scale movement<br>
 3 semitones = Minor 3rd   — melancholy. Every minor chord. (Rockabilly bass pattern uses this)<br>
 4 semitones = Major 3rd   — bright. Every major chord. (Hi-NRG stab, future funk dom7)<br>
 5 semitones = Perfect 4th — strong, stable. Rockabilly I→IV, bass walking patterns<br>
 7 semitones = Perfect 5th — strongest consonance. Every chord. Electro bass pattern.<br>
 9 semitones = Major 6th   — sweet, open. Boom bap VI chord, jazz extensions<br>
10 semitones = Minor 7th   — bluesy tension. Every dom7 chord. 12-bar blues. Electro swing stab.<br>
11 semitones = Major 7th   — floating/dreamy. Future funk and jazz maj7 chords.<br>
</div>
When a chord feels happy, sad, tense, or dreamy — it's the intervals doing that work.
</div>

<div class="step-card"><span class="step-num">THE SCALE: THE 7-NOTE PALETTE</span>
A scale selects 7 of the 12 chromatic notes using a pattern of whole steps (W=2 semitones) and half steps (H=1 semitone):<br><br>
<strong>Major:</strong> W-W-H-W-W-W-H → bright, energetic (Hi-NRG, Eurodance, Future Funk, Rockabilly)<br>
<strong>Natural Minor:</strong> W-H-W-W-H-W-W → melancholy, weight (Eurodance minor, Trance, Boom Bap)<br>
<strong>Dorian Mode:</strong> W-H-W-W-W-H-W → minor but with a raised 6th — the "cool" minor (jazz, electro swing, some future funk)<br>
<strong>Pentatonic Minor:</strong> just 5 notes [0,3,5,7,10] — the blues scale. Rockabilly solos, boom bap melody samples.<br><br>
C major = C D E F G A B. A minor = A B C D E F G. Same 7 notes, different root — this is the <strong>relative minor</strong> relationship. Every major key has a relative minor that shares all its notes.
</div>

<div class="step-card"><span class="step-num">THE CHORD: STACKED INTERVALS</span>
A chord stacks intervals above a root. The four chord qualities that appeared across all nine genres:
<div class="chord-row" data-root="131" data-mode="major">
  <span class="chord root" data-chord="major" data-degree="I">Major</span>
  <span class="chord root" data-chord="minor" data-degree="i">Minor</span>
  <span class="chord root" data-chord="dom7" data-degree="V">Dom 7</span>
  <span class="chord root" data-chord="maj7" data-degree="I">Maj 7</span>
</div>
<strong>Major (1-3-5):</strong> root + M3 + P5. Bright, resolved. Hi-NRG, Eurobeat, Rockabilly.<br>
<strong>Minor (1-b3-5):</strong> root + m3 + P5. Heavy, melancholy. Techno drone, Trance pad, Boom Bap.<br>
<strong>Dominant 7th (1-3-5-b7):</strong> adds the minor 7th. Funky tension that wants to move. Future funk stab, Electro Swing horn stab, 12-bar blues every chord.<br>
<strong>Major 7th (1-3-5-7):</strong> adds the major 7th. Floating, sophisticated. Jazz harmony, Electro Swing piano comp.
</div>

<div class="step-card"><span class="step-num">CHORD PROGRESSIONS + COMMON KEYS — GENRE BY GENRE</span>
Each genre has a characteristic progression and a handful of keys that dominate its repertoire. The key choice is partly historical (what instruments are easiest in that key), partly physical (what frequencies the PA systems of each era handled), and partly just what got established first and got copied.
<div style="font-family:'Space Mono',monospace;font-size:.60rem;margin:.5rem 0;line-height:2.6;overflow-x:auto;">
GENRE          PROGRESSION              COMMON KEYS              WHY<br>
─────────────────────────────────────────────────────────────────────<br>
Boom Bap       i-iv-VI-VII             Am, Cm, Fm               minor for weight; samplers tune to these<br>
Rockabilly     I-IV-V (12-bar blues)   E, A, G                  guitar open chords; E is easiest on 6-string<br>
Hi-NRG         I-IV-V-IV               Eb, Bb, F, C             disco inheritance; horn keys (flat keys)<br>
Eurodance      i-VI-III-VII            Am, Dm, Em               minor for emotion; middle of keyboard range<br>
Electro Swing  ii-V-I, I-VI-ii-V       Dm, Gm, Am, C            jazz standards; horn-friendly flat keys<br>
Techno         one root (or none)      A, D, G, F               no harmonic reason — vibe and tuning<br>
Electro        root + P4/P5 movement   A, E, D                  808 tuning; A=55Hz sits clean in sub<br>
Trance         i-VII-VI-VII            Am, Dm, Em, Bm           keyboard-friendly; Am most common globally<br>
Future Funk    I7-IV7-V7-IV7           Bb, Eb, F, Ab            disco/funk flat keys; brass instruments<br>
</div>
<strong>Why flat keys dominate dance music:</strong> most acoustic instruments (trumpet, saxophone, trombone) are built in B♭ or E♭ — concert pitch in those keys means the players are reading in C or F (no sharps/flats). When electronic producers sample acoustic recordings, they inherit those key centers. When they make originals, they often match.<br><br>
<strong>Why A minor is everywhere:</strong> A minor uses no sharps or flats on a piano keyboard. A2 (55Hz) is a round sub-bass frequency. Am chord is the first chord most beginners learn. Cultural saturation creates more references to copy from.
</div>

<div class="step-card"><span class="step-num">RHYTHM: STRAIGHT VS. SWING</span>
All 9 genres in this course use one of two rhythmic grids:<br><br>
<strong>Straight (50:50):</strong> 8th notes divide the beat exactly in half. Hi-NRG, Eurodance, Techno, Electro, Trance, Future Funk. Mechanical. Precise. Machine music.<br>
<strong>Swing:</strong> the "and" of each beat is pushed slightly later. Boom bap uses 16th-note swing (~18%). Electro Swing uses 8th-note swing (~20–22%). Rockabilly uses full triplet shuffle (67:33). The swing makes music feel human — the deviation from perfect timing is what organic music does naturally.<br><br>
In the synth code you saw this as: <code>stT()</code> = straight timing, <code>swT()</code> = swing timing. The <code>swing</code> parameter controlled how much of the step duration was added to odd-numbered steps.
</div>

<div class="step-card"><span class="step-num">TIMBRE: WHY INSTRUMENTS SOUND DIFFERENT</span>
Every synthesis technique in this course was about shaping timbre — the harmonic content of a sound:<br><br>
<strong>Sawtooth wave:</strong> all harmonics (1f, 2f, 3f, 4f...). Bright, buzzy. Guitar, brass, bass synths, lead synths.<br>
<strong>Square wave:</strong> odd harmonics only (1f, 3f, 5f...). Hollow, reedy. Clarinet approximation, cowbell (very short), bass.<br>
<strong>Sine wave:</strong> fundamental only. Pure, round. Kick drum body, 808 bass, sub tones.<br>
<strong>Noise:</strong> all frequencies equal. Snare, hi-hat, cymbal, vinyl crunch.<br>
<strong>Lowpass filter:</strong> removes high harmonics → darker. Every instrument uses this.<br>
<strong>Bandpass filter:</strong> keeps only a frequency band → reedy/nasal. Cowbell, clarinet, robotic melody.<br>
<strong>Additive synthesis:</strong> specific harmonic ratios. Clarinet: [1f=1.0, 3f=0.70, 5f=0.28] — not equal odd harmonics like a square wave, but the actual measured amplitudes of a real instrument.
</div>

<div class="step-card"><span class="step-num">FILTER ENVELOPE — HOW SOUNDS CHANGE OVER TIME</span>
A sound's timbre isn't fixed — it changes from attack to decay. This is why:<br><br>
<strong>Kick drum:</strong> frequency sweeps from high (~145Hz) to low (~35Hz) in 65–80ms. Your ear hears this as "thud."<br>
<strong>Hi-NRG bass:</strong> filter envelope opens bright and snaps dark in 80ms. Your ear hears this as "dum."<br>
<strong>Horn stab (Electro Swing):</strong> LP filter sweeps 4500→1400→900Hz on attack. Your ear hears this as "blat."<br>
<strong>Trance pluck:</strong> filter sweeps 5×freq → 1.4×freq in 80ms. Your ear hears this as "pluck."<br>
<strong>Future Funk pad:</strong> filter opens over 8 bars (very slow). Your ear hears this as "revelation."<br><br>
The envelope's shape — how fast it moves, how far — is what your ear uses to identify sounds. Two identical waveforms with different envelopes sound like different instruments.
</div>

<div class="step-card"><span class="step-num">ARRANGEMENT: THE LARGE-SCALE STRUCTURE</span>
Each genre has a characteristic large-scale structure that serves its emotional purpose:<br><br>
<strong>Additive (Techno):</strong> elements enter one by one over 8–16 bars each. Structure = accumulation.<br>
<strong>Contrast (Electro Swing, Trance, Boom Bap):</strong> dense section → stripped section → return. Structure = contrast.<br>
<strong>Hook presence (Eurodance):</strong> riff appears (chorus) and disappears (verse). Structure = the riff's arrival.<br>
<strong>Filter automation (Future Funk):</strong> one parameter (filter cutoff) maps to the entire arrangement. Structure = timbral transformation.<br>
<strong>Blues form (Rockabilly):</strong> 12-bar repeating cycle. Structure = a shared grammar that every musician knows.<br><br>
What all of these have in common: <strong>contrast creates emotion</strong>. A track that stays at constant density, at the same filter setting, with the same elements throughout, has no emotional arc. The arrangement is the decision of when to add, when to remove, and how long to wait.
</div>

title: "Genre Mashup",
subtitle: "29 -- When Rules Break",
body: `
<div class="lesson-intro">You've learned nine genre grammars. Each one is a system of rules — specific BPMs, specific rhythmic feels, specific harmonic vocabularies, specific structural shapes. This lesson is about what those rules are <em>made of</em> by showing what happens when you deliberately break the genre boundaries. The track in this lesson belongs to no genre. Everything in it comes from somewhere specific.</div>

<div class="step-card"><span class="step-num">WHAT THE TRACK IS DOING</span>
The demo combines four genre elements that have never historically coexisted:
<div style="font-family:'Space Mono',monospace;font-size:.65rem;margin:.6rem 0;line-height:2.4;">
FROM BOOM BAP    → kick pattern (beat 1 + swung "and of 2"), swung 16th hats,<br>
                    808 bass tuned to chord, vinyl crunch, piano chop on offbeats<br>
FROM TRANCE      → breakdown structure (kick disappears for 12 bars), pad swells,<br>
                    the "drop" moment when the kick crashes back<br>
FROM ELECTRO SWING → horn stab (3 sawtooths + peaking EQ at 1100Hz), swung placement<br>
FROM FUTURE FUNK → filter automation on the chord pad (slowly opening through groove,<br>
                    swelling further during breakdown, fully open at drop)
</div>
The track runs at 96 BPM with swing=0.20 — boom bap tempo with boom bap feel. The trance breakdown at bar 28 is unexpected in this context. That surprise is compositionally useful.
</div>

<div class="step-card"><span class="step-num">WHY THIS WORKS — AND WHY IT SHOULDN'T</span>
The boom bap drum pattern gives the track a familiar, earthy foundation. When the trance breakdown arrives at bar 28, it violates genre expectation — a boom bap listener doesn't expect the kick to disappear into atmosphere. That violation creates more tension than the same breakdown would in an actual trance track, because it's <em>wrong in a specific way</em>.<br><br>
The electro swing horn stabs add a mid-register harmonic element with a specific timbral identity (the peaking EQ at 1100Hz is what makes noise read as brass). Without them the track is bass-heavy and pad-heavy. They occupy exactly the frequency range that boom bap's piano chop leaves empty — they fit without fighting.
</div>

<div class="step-card"><span class="step-num">THE FILTER IS STILL THE ARRANGEMENT</span>
The chord pad uses the same future funk filter logic: half-open during groove, swelling open during breakdown, fully open at the drop. But in this hybrid context the filter does something different — it tracks the emotional state of two simultaneous genre logics at once. The boom bap groove is present and stable; the filter's slow opening suggests something else is building underneath it. When the breakdown arrives and the kick disappears, the filter has already prepared the listener for atmosphere.
</div>

<div class="step-card"><span class="step-num">WHAT CAN CROSS AND WHAT CAN'T</span>
Not all genre combinations work. The things that combined successfully here:<br><br>
<strong>Compatible:</strong> boom bap swing + trance breakdown (both use contrast as arrangement), boom bap bass + electro swing horns (different frequency ranges, compatible harmonic vocabulary), filter automation + any genre (it's a continuous parameter, not a rhythm pattern).<br><br>
<strong>Harder to combine:</strong> rockabilly shuffle + four-on-floor kick (the rhythmic grids conflict at a fundamental level), Hi-NRG pumping 8th bass + boom bap (different tempos, different density expectations), techno's no-chord stasis + any genre that requires harmonic movement.
</div>

<div class="step-card"><span class="step-num">THE EXERCISE: CROSS YOUR OWN GENRES</span>
Take any two lessons from this course and identify their single most distinctive structural element:<br><br>
— Eurodance: the riff appears/disappears to mark structure<br>
— Techno: additive arrangement over long timescales<br>
— Electro: cowbell as melodic voice<br>
— Trance: breakdown → drop<br>
— Future Funk: filter automation<br>
— Boom Bap: syncopated two-hit kick<br>
— Rockabilly: no kick drum, slap bass does it all<br><br>
Pick any two. Apply one structural element to a track built on the other's sonic vocabulary. The collision point — where one genre's rules contradict the other's — is where the interesting music lives.<br><br>
There are no rules that cannot be broken. There are only rules, the reasons behind them, and what happens when you remove them. You now know all three.
</div>

<div class="artists">
Tracks that successfully cross genre grammars: Gorillaz — "DARE" (electro + pop + hip-hop, each element clearly traceable) / Jamie XX — "Gosh" (UK grime cadences over house structure) / Madvillain — "Accordion" (jazz harmony over boom bap drums — the bass is almost a Eurodance bassline) / DJ Shadow — "Midnight in a Perfect World" (trip-hop using trance atmosphere) / Daft Punk — "Harder Better Faster Stronger" (funk sample + house structure + future funk filter). In every case: you can hear exactly which genre contributed what. The art is the combination.
</div>

function makeSynth(ctx, p) {

    riffRoot:220,riffNote:220,riffVol:0.42,riffCutoff:1800,padRoot:110,padNote:110,padVol:0.32,padCutoff:420,

  for(const k in _d) if(p[k]===undefined||isNaN(p[k])||!isFinite(p[k])) p[k]=_d[k];

  const now=ctx.currentTime, S=60/p.bpm/4;
  const SW=p.swing*S; // swing offset for odd steps
  const master=ctx.createGain(); master.gain.value=0.74;
  const oscs=[];

      const isAccent=(s%2===0);

      const vol=p.hatVol*(isOpen?0.80:isAccent?0.58:0.24);
      if(vol<0.01) continue;
      const len=Math.ceil(ctx.sampleRate*(decay+0.005));

    const freq=p.bassRoot*Math.pow(2,semi/12)/2;
    const o=ctx.createOscillator(),f=ctx.createBiquadFilter(),e=ctx.createGain();

  }

let currentLesson = 0;
let audioCtx = null;
let analyser = null;
let activeNodes = null;
let playing = false;
let chordCtx = null;

let restartTimer = null;

function ensureCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  if (!analyser) {

    analyser.connect(audioCtx.destination);
  }
}

function teardown() {
  playing = false;

  if (!activeNodes) return;

    if (activeNodes.osc) try { activeNodes.osc.stop(); } catch(e){}
  } catch(e){}
  try { activeNodes.node.disconnect(); } catch(e){}
  activeNodes = null;
}

function buildSynthFromCode(code) {
  const fullCode = code + '\n\nreturn { makeSynth, updateParams };';
  try {
    return new Function(fullCode)();
  } catch(e) {
    setStatus('\u26A0 Code error: ' + e.message);
    return null;
  }
}

function collectParams() {
  const p = {};
  const L = LESSONS[currentLesson];

    p[param.id] = el ? parseFloat(el.value) : param.def;
  });
  return p;
}

function triggerPlay() {
  ensureCtx();
  teardown();
  const L = LESSONS[currentLesson];
  const code = document.getElementById('synth-code').value;
  const params = collectParams();
  const fns = buildSynthFromCode(code);
  if (!fns) return;
  try {
    const nodes = fns.makeSynth(audioCtx, params);
    if (!nodes) { setStatus('makeSynth returned nothing'); return; }
    nodes.node.connect(analyser);
    if (nodes.oscs) nodes.oscs.forEach(o => { try { o.start(); } catch(e){} });
    if (nodes.osc)  try { nodes.osc.start(); } catch(e){}

    activeNodes._fns = fns;
    playing = true;
    document.getElementById('play-btn').textContent = '\u25A0 STOP';
    document.getElementById('play-btn').classList.add('playing');

    setStatus('\u26A0 Runtime error: ' + e.message);
    console.error(e);
  }
}

  }
});

function setStatus(t) { document.getElementById('status-txt').textContent = t; }

// ============================================================
// PARAMETER SLIDERS
// ============================================================
function buildParams(lesson) {
  const slot = document.getElementById('param-slots');
  slot.innerHTML = '';
  (lesson.params || []).forEach(p => {
    const row = document.createElement('div');
    row.className = 'param-row';
    row.innerHTML = `<label>${p.label}</label>
      <input type="range" id="pslider_${p.id}" min="${p.min}" max="${p.max}" step="${p.step}" value="${p.def}">
      <span class="val" id="pval_${p.id}">${p.def}</span>`;
    slot.appendChild(row);
    const slider = row.querySelector('input');
    const valSpan = row.querySelector('.val');
    slider.addEventListener('input', () => {
      const v = parseFloat(slider.value);
      valSpan.textContent = v % 1 === 0 ? v : v.toFixed(2);
      if (playing && activeNodes && activeNodes._fns) {
        try { activeNodes._fns.updateParams(activeNodes, collectParams()); } catch(e){}
      }
    });
  });
}

// ============================================================
// CHORD PLAYER -- Piano-quality voice with smooth crossfade
// ============================================================

// ── PIANO VOICE SYNTHESIS ───────────────────────────────────────────────────
// Additive harmonics weighted like a piano string, differential decay rates,
// hammer transient for click. Much richer than bare triangle waves.
function makePianoVoice(ctx, freq, vol, when, duration) {
  const master = ctx.createGain();
  master.gain.value = 0;
  master.connect(ctx.destination);

  const harmonics = [
    { ratio:1, gain:1.00 },
    { ratio:2, gain:0.50 },
    { ratio:3, gain:0.25 },
    { ratio:4, gain:0.14 },
    { ratio:5, gain:0.09 },
    { ratio:6, gain:0.05 },
  ];

  const nodes = [];
  harmonics.forEach(h => {
    if (freq * h.ratio > 18000) return;
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = 'sine';
    o.frequency.value = freq * h.ratio;
    // Higher harmonics decay faster -- like a real piano string
    const hDecay = duration * (1 / h.ratio) * 1.4 + 0.2;
    g.gain.value = h.gain;
    o.connect(g); g.connect(master);
    o.start(when); o.stop(when + hDecay + 0.1);
    nodes.push(o);
  });

  // Piano ADSR: fast attack, quick decay to sustain, long release
  const attackEnd  = when + 0.006;
  const decayEnd   = when + 0.08;
  const sustainEnd = when + duration;
  const releaseEnd = when + duration + 0.9;

  master.gain.setValueAtTime(0, when);
  master.gain.linearRampToValueAtTime(vol, attackEnd);
  master.gain.exponentialRampToValueAtTime(vol * 0.65, decayEnd);
  master.gain.setValueAtTime(vol * 0.65, sustainEnd);
  master.gain.exponentialRampToValueAtTime(0.0001, releaseEnd);

  return { master, nodes, stopAt: releaseEnd };
}

// ── STATE ────────────────────────────────────────────────────────────────────
let chordVoices = [];
let seqTimer = null;
let activeChordBtn = null;

function ensureChordCtx() {
  if (!chordCtx) chordCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (chordCtx.state === 'suspended') chordCtx.resume();
}

function releaseChordVoices(fadeTime) {
  const now = chordCtx ? chordCtx.currentTime : 0;
  chordVoices.forEach(v => {
    try {
      v.master.gain.cancelScheduledValues(now);
      v.master.gain.setValueAtTime(v.master.gain.value, now);
      v.master.gain.exponentialRampToValueAtTime(0.0001, now + fadeTime);
      v.nodes.forEach(o => { try { o.stop(now + fadeTime + 0.05); } catch(e){} });
    } catch(e) {}
  });
  chordVoices = [];
}

function stopChord() {
  clearTimeout(seqTimer);
  if (chordCtx) releaseChordVoices(0.15);
  document.getElementById('chord-overlay').classList.remove('visible');
  document.getElementById('chord-status').textContent = 'click a chord to hear it';
  if (activeChordBtn) { activeChordBtn.classList.remove('chord-active'); activeChordBtn = null; }
}

document.getElementById('chord-stop').onclick = stopChord;

// ── NOTE NAME DISPLAY ────────────────────────────────────────────────────────
const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
function freqToNoteName(hz) {
  const midi = Math.round(12 * Math.log2(hz / 440) + 69);
  return NOTE_NAMES[((midi % 12) + 12) % 12];
}
const CHORD_TYPE_LABELS = {
  major:'maj', minor:'min', dom7:'7', maj7:'maj7', min7:'min7',
  single:'', octave:'', octave2:''
};

// ── PLAY ONE CHORD ───────────────────────────────────────────────────────────
function playChordNow(rootHz, chordType, degreeStr, mode, duration, btn) {
  ensureChordCtx();
  releaseChordVoices(0.08); // short crossfade -- no click

  const semiOffset = semitoneOffset(degreeStr, mode);
  const chordRoot = rootHz * Math.pow(2, semiOffset / 12);
  const intervals = INTERVALS[chordType] || [0];
  const now = chordCtx.currentTime;

  const voiceVol = 0.36 / Math.sqrt(intervals.length);
  const newVoices = [];

  intervals.forEach((semis, idx) => {
    const freq = chordRoot * Math.pow(2, semis / 12);
    const when = now + idx * 0.012; // gentle strum: 12ms between each note
    const v = makePianoVoice(chordCtx, freq, voiceVol, when, duration);
    newVoices.push(v);
  });
  chordVoices = newVoices;

  // Status bar
  const rootName = freqToNoteName(chordRoot);
  const typeLabel = CHORD_TYPE_LABELS[chordType] ?? chordType;
  const label = (chordType === 'single') ? rootName : `${rootName}${typeLabel}`;
  document.getElementById('chord-overlay').classList.add('visible');
  document.getElementById('chord-status').textContent =
    `${degreeStr}  ${label}  (${Math.round(chordRoot)}Hz)`;

  if (activeChordBtn) activeChordBtn.classList.remove('chord-active');
  if (btn) { btn.classList.add('chord-active'); activeChordBtn = btn; }
}

function playChord(rootHz, chordType, degreeStr, mode, btn) {
  playChordNow(rootHz, chordType, degreeStr, mode, 2.5, btn);
}

// ── PLAY FULL PROGRESSION ────────────────────────────────────────────────────
// Triggered by ▶ play progression button next to a chord-row-wrap
function playProgression(row) {
  clearTimeout(seqTimer);
  ensureChordCtx();
  releaseChordVoices(0.1);

  const rootHz = parseFloat(row.dataset.root) || 220;
  const mode   = row.dataset.mode || 'major';
  const bps    = parseFloat(row.dataset.bps) || 0.75;
  const duration = 1 / bps;
  const buttons  = Array.from(row.querySelectorAll('.chord'));

  let idx = 0;
  function playNext() {
    if (idx >= buttons.length) {
      releaseChordVoices(0.6);
      if (activeChordBtn) { activeChordBtn.classList.remove('chord-active'); activeChordBtn = null; }
      return;
    }
    const btn = buttons[idx];
    playChordNow(rootHz, btn.dataset.chord || 'major',
                 btn.dataset.degree || 'I', mode, duration * 0.90, btn);
    idx++;
    seqTimer = setTimeout(playNext, duration * 1000);
  }
  playNext();
}

// ── EVENT DELEGATION ─────────────────────────────────────────────────────────
document.getElementById('lesson-text').addEventListener('click', e => {
  const btn = e.target.closest('.chord');
  if (btn) {
    const row = btn.closest('.chord-row');
    if (!row) return;
    playChord(parseFloat(row.dataset.root) || 220,
              btn.dataset.chord || 'major',
              btn.dataset.degree || 'I',
              row.dataset.mode || 'major', btn);
    return;
  }
  const playBtn = e.target.closest('.play-prog-btn');
  if (playBtn) {
    const wrap = playBtn.closest('.chord-row-wrap');
    if (wrap) playProgression(wrap.querySelector('.chord-row'));
  }
});

// ============================================================
// SCOPE + SPECTRUM
// ============================================================
const scopeCanvas = document.getElementById('scope-canvas');
const scopeCtx = scopeCanvas.getContext('2d');
const FFT_BINS = 1024;
const fftBuf = new Uint8Array(FFT_BINS);
const wavBuf = new Uint8Array(2048);

function resizeScope() {
  const area = document.getElementById('scope-area');
  scopeCanvas.width = area.offsetWidth || 400;
  scopeCanvas.height = area.offsetHeight || 180;
}
resizeScope();
window.addEventListener('resize', resizeScope);

function drawScope() {
  const W = scopeCanvas.width, H = scopeCanvas.height;
  const half = Math.floor(H * 0.52);
  scopeCtx.fillStyle = '#050508';
  scopeCtx.fillRect(0, 0, W, H);
  scopeCtx.strokeStyle = '#111120';
  scopeCtx.lineWidth = 1;
  for (let i = 1; i < 4; i++) {
    const y = Math.round(i * half / 4);
    scopeCtx.beginPath(); scopeCtx.moveTo(0,y); scopeCtx.lineTo(W,y); scopeCtx.stroke();
    const y2 = half + Math.round(i*(H-half)/4);
    scopeCtx.beginPath(); scopeCtx.moveTo(0,y2); scopeCtx.lineTo(W,y2); scopeCtx.stroke();
  }
  for (let i = 1; i < 8; i++) {
    const x = Math.round(i*W/8);
    scopeCtx.beginPath(); scopeCtx.moveTo(x,0); scopeCtx.lineTo(x,H); scopeCtx.stroke();
  }
  scopeCtx.strokeStyle = '#1e1e2e'; scopeCtx.lineWidth = 1;
  scopeCtx.beginPath(); scopeCtx.moveTo(0,half); scopeCtx.lineTo(W,half); scopeCtx.stroke();

  if (!analyser) return;

  analyser.getByteTimeDomainData(wavBuf);
  scopeCtx.lineWidth = 2;
  scopeCtx.strokeStyle = '#ffb347';
  scopeCtx.shadowColor = '#ffb347';
  scopeCtx.shadowBlur = 4;
  scopeCtx.beginPath();
  const wLen = Math.min(wavBuf.length, 512);
  for (let i = 0; i < wLen; i++) {
    const x = (i / wLen) * W;
    const y = ((wavBuf[i] / 255) * (half - 8)) + 4;
    i === 0 ? scopeCtx.moveTo(x, y) : scopeCtx.lineTo(x, y);
  }
  scopeCtx.stroke();
  scopeCtx.shadowBlur = 0;

  scopeCtx.strokeStyle = '#1a1a0a'; scopeCtx.lineWidth = 1;
  scopeCtx.beginPath(); scopeCtx.moveTo(0, half/2); scopeCtx.lineTo(W, half/2); scopeCtx.stroke();

  analyser.getByteFrequencyData(fftBuf);
  const bins = Math.min(FFT_BINS, 400);
  const bw = W / bins;
  for (let i = 0; i < bins; i++) {
    const amp = fftBuf[i] / 255;
    const barH = amp * (H - half - 4);
    const hue = Math.round((1 - i/bins) * 55 + 15);
    scopeCtx.fillStyle = `hsl(${hue},90%,${40 + amp*25}%)`;
    scopeCtx.fillRect(i*bw, H-barH, Math.max(bw-1,1), barH);
  }
}
setInterval(drawScope, 33);

// ============================================================
// HERO CANVAS ANIMATION
// ============================================================
(function() {
  const c = document.getElementById('hero');
  const g = c.getContext('2d');
  let W, H, t = 0;
  function resize() { W = c.width = c.offsetWidth; H = c.height = c.offsetHeight; }
  resize(); window.addEventListener('resize', resize);
  function draw() {
    g.clearRect(0, 0, W, H);
    const bars = 48;
    for (let i = 0; i < bars; i++) {
      const x = (i / bars) * W;
      const phase = (i / bars) * Math.PI * 4 + t;
      const h = (Math.sin(phase) * 0.4 + 0.6) * H * 0.7;
      const hue = (i / bars) * 60 + 15;
      g.fillStyle = `hsla(${hue},85%,55%,0.6)`;
      g.fillRect(x, H - h, W/bars - 1, h);
    }
    t += 0.025;
    requestAnimationFrame(draw);
  }
  draw();
})();

// ============================================================
// NAV + LOAD LESSON
// ============================================================
const nav = document.getElementById('lesson-nav');
LESSONS.forEach((L, i) => {
  const b = document.createElement('button');
  b.className = 'nav-btn';
  b.textContent = L.subtitle;
  // Add separator before SD lessons and capstone
  if (i > 0 && i % 2 === 0) b.style.marginLeft = '.3rem';
  if (i === LESSONS.length - 1) b.style.borderColor = 'var(--accent)';
  b.onclick = () => loadLesson(i);
  nav.appendChild(b);
});

function loadLesson(idx) {
  teardown();
  stopChord();
  currentLesson = idx;
  const L = LESSONS[idx];
  document.getElementById('lesson-text').innerHTML = `
    <div class="lesson-number">${L.subtitle}</div>
    <div class="lesson-title">${L.title}</div>
    <div class="lesson-body">${L.body}</div>`;
  document.querySelectorAll('.nav-btn').forEach((b, i) => b.classList.toggle('active', i === idx));
  const fill = document.getElementById('progress');
  if (fill) fill.style.width = ((idx + 1) / LESSONS.length * 100) + '%';
  document.getElementById('synth-code').value = L.code || '';
  buildParams(L);
  setStatus('press play to hear the sound');
  document.getElementById('lesson-text').scrollTop = 0;
}

loadLesson(0);
</script>
