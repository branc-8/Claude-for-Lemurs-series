]; // end LESSONS

// ──────────────────────────────────────
//  CANVAS VISUALIZATIONS
// ──────────────────────────────────────
const canvas = document.getElementById('viz-out');
const ctx    = canvas.getContext('2d');
let animId   = null;
let startTime = Date.now();
let currentViz = 'auction';

function resizeCanvas(){
  const a = canvas.parentElement;
  canvas.width  = a.clientWidth  || 600;
  canvas.height = a.clientHeight || 310;
}

function lerp(a,b,t){ return a+(b-a)*t; }
function clamp(v,a,b){ return Math.max(a,Math.min(b,v)); }
function seededRand(seed){ let s=seed; return ()=>{ s=(s*9301+49297)%233280; return s/233280; }; }
function ease(t){ return t*t*(3-2*t); }

// ── ORDER BOOK ──
function vizAuction(){
  const W=canvas.width, H=canvas.height, t=(Date.now()-startTime)/1000;
  ctx.fillStyle='#030308'; ctx.fillRect(0,0,W,H);
  const mid=W/2, priceCenter=H/2;
  const basePrice=142.50 + Math.sin(t*0.4)*0.8 + Math.sin(t*0.15)*0.3;
  const rng=seededRand(42);
  const LEVELS=11, levelH=20;
  for(let i=0;i<LEVELS;i++){
    const bidPrice=basePrice-(i+1)*0.13;
    const askPrice=basePrice+(i+1)*0.13;
    const bidSize=(rng()*380+120)*(1-i*0.04)*(1+Math.sin(t*0.3+i)*0.1);
    const askSize=(rng()*380+120)*(1-i*0.04)*(1+Math.cos(t*0.25+i)*0.1);
    const maxBar=mid-65;
    const bidW=clamp(bidSize/650*maxBar,0,maxBar-4);
    const alpha=0.15+(1-i/LEVELS)*0.55;
    const y=priceCenter-5+i*levelH;
    ctx.fillStyle=`rgba(61,214,140,${alpha*0.35})`; ctx.fillRect(mid-4-bidW,y-8,bidW,15);
    ctx.fillStyle=`rgba(61,214,140,${alpha})`; ctx.font='9px Space Mono,monospace';
    ctx.textAlign='right'; ctx.fillText(bidPrice.toFixed(2),mid-8,y+3);
    ctx.fillStyle='rgba(61,214,140,0.45)'; ctx.textAlign='left';
    ctx.fillText(Math.round(bidSize),8,y+3);
    const y2=priceCenter-5-(i+1)*levelH;
    if(y2>10){
      const askW=clamp(askSize/650*maxBar,0,maxBar-4);
      ctx.fillStyle=`rgba(255,77,109,${alpha*0.35})`; ctx.fillRect(mid+4,y2-8,askW,15);
      ctx.fillStyle=`rgba(255,77,109,${alpha})`; ctx.textAlign='left';
      ctx.fillText(askPrice.toFixed(2),mid+8,y2+3);
      ctx.fillStyle='rgba(255,77,109,0.45)'; ctx.textAlign='right';
      ctx.fillText(Math.round(askSize),W-8,y2+3);
    }
  }
  ctx.strokeStyle='rgba(245,166,35,0.5)'; ctx.lineWidth=1; ctx.setLineDash([4,3]);
  ctx.beginPath(); ctx.moveTo(50,priceCenter); ctx.lineTo(W-50,priceCenter); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle='#f5a623'; ctx.font='bold 14px Space Mono,monospace'; ctx.textAlign='center';
  ctx.fillText(`$${basePrice.toFixed(2)}`,mid,priceCenter-2);
  ctx.fillStyle='#66638a'; ctx.font='8px Space Mono,monospace';
  ctx.fillText('LAST TRADE',mid,priceCenter+14);
  ctx.fillStyle='#3dd68c'; ctx.textAlign='left'; ctx.font='bold 9px Space Mono,monospace';
  ctx.fillText('◀ BIDS',8,16);
  ctx.fillStyle='#ff4d6d'; ctx.textAlign='right';
  ctx.fillText('ASKS ▶',W-8,16);
  ctx.fillStyle='#66638a'; ctx.textAlign='center'; ctx.font='8px Space Mono,monospace';
  ctx.fillText('← SPREAD →',mid,priceCenter+26);
}

// ── TICKER ──
function vizTicker(){
  const W=canvas.width, H=canvas.height, t=(Date.now()-startTime)/1000;
  ctx.fillStyle='#030308'; ctx.fillRect(0,0,W,H);
  const price=182.45+Math.sin(t*0.3)*1.2+Math.sin(t*0.7)*0.4;
  const change=price-180.21, changePct=(change/180.21)*100, isUp=change>=0;
  const col=isUp?'#3dd68c':'#ff4d6d';
  const cx=W/2, cy=H/2-20;
  ctx.fillStyle='#0d0d18'; ctx.fillRect(cx-200,cy-75,400,138);
  ctx.strokeStyle='#1d1d2a'; ctx.lineWidth=1; ctx.strokeRect(cx-200,cy-75,400,138);
  ctx.font='bold 34px Space Mono,monospace'; ctx.fillStyle='#e8e4d9'; ctx.textAlign='center';
  ctx.fillText('AAPL',cx,cy-32);
  ctx.font='bold 25px Space Mono,monospace'; ctx.fillStyle=col;
  ctx.fillText(`$${price.toFixed(2)}`,cx,cy+8);
  ctx.font='11px Space Mono,monospace';
  ctx.fillText(`${isUp?'+':''}${change.toFixed(2)} (${isUp?'+':''}${changePct.toFixed(2)}%)`,cx,cy+27);
  ctx.font='9px Space Mono,monospace'; ctx.fillStyle='#66638a';
  ctx.fillText('VOL: 52.8M  MKT CAP: $2.82T  P/E: 29.4',cx,cy+50);
  const tickerData=['MSFT +0.8%','GOOG -0.3%','AMZN +1.2%','TSLA -2.1%','NVDA +3.4%','META +0.6%','BTC -1.8%','ETH +2.3%','SPY +0.4%','   '];
  const tickerStr=tickerData.join('  ·  ');
  const totalW2=tickerStr.length*8.4, offset=(t*38)%totalW2;
  ctx.fillStyle='#0a0a14'; ctx.fillRect(0,H-26,W,26);
  ctx.strokeStyle='#1d1d2a'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(0,H-26); ctx.lineTo(W,H-26); ctx.stroke();
  ctx.font='9px Space Mono,monospace'; ctx.textAlign='left';
  ctx.save(); ctx.rect(0,H-26,W,26); ctx.clip();
  for(let rep=0;rep<3;rep++){
    let px=rep*totalW2-offset+8;
    tickerData.forEach(part=>{
      ctx.fillStyle=part.includes('+')?'#3dd68c':'#ff4d6d';
      ctx.fillText(part,px,H-8); px+=(part.length+3)*8.4;
    });
  }
  ctx.restore();
}

// ── CANDLESTICK CHART ──
function vizChart(){
  const W=canvas.width, H=canvas.height, t=(Date.now()-startTime)/1000;
  ctx.fillStyle='#030308'; ctx.fillRect(0,0,W,H);
  const rng=seededRand(17), N=34;
  const prices=[100];
  for(let i=1;i<N+2;i++) prices.push(Math.max(78,prices[i-1]+(rng()-0.46)*2.5));
  const candles=[];
  for(let i=0;i<N;i++){
    const o=prices[i],c=prices[i+1];
    const h=Math.max(o,c)+Math.abs(rng()-0.5)*3.8;
    const l=Math.min(o,c)-Math.abs(rng()-0.5)*3.8;
    candles.push({o,c,h,l});
  }
  const fp=(Math.sin(t*0.5)+1)/2;
  candles[N-1].c=candles[N-1].o+(prices[N]-candles[N-1].o)*fp;
  const pad={l:44,r:18,t:28,b:52};
  const cW=(W-pad.l-pad.r)/N;
  const allP=candles.flatMap(c=>[c.h,c.l]);
  const pMin=Math.min(...allP)-2, pMax=Math.max(...allP)+2, pRange=pMax-pMin;
  const chartH2=H-pad.t-pad.b;
  const toY=p=>pad.t+chartH2*(1-(p-pMin)/pRange);
  const ma14=candles.map((_,i)=>{
    if(i<13) return null;
    return candles.slice(i-13,i+1).reduce((s,c2)=>s+(c2.o+c2.c)/2,0)/14;
  });
  ctx.strokeStyle='rgba(29,29,42,0.8)'; ctx.lineWidth=1;
  for(let p=Math.ceil(pMin/5)*5;p<=pMax;p+=5){
    const y2=toY(p); ctx.beginPath(); ctx.moveTo(pad.l,y2); ctx.lineTo(W-pad.r,y2); ctx.stroke();
    ctx.fillStyle='#55517a'; ctx.font='8px Space Mono,monospace'; ctx.textAlign='right';
    ctx.fillText(`$${p.toFixed(0)}`,pad.l-3,y2+3);
  }
  const supportY=toY(Math.min(...candles.slice(N-20).map(c=>c.l))+0.4);
  const resistY=toY(Math.max(...candles.slice(N-20).map(c=>c.h))-0.4);
  ctx.fillStyle='rgba(61,214,140,0.06)'; ctx.fillRect(pad.l,supportY-3,W-pad.l-pad.r,6);
  ctx.strokeStyle='rgba(61,214,140,0.35)'; ctx.lineWidth=1; ctx.setLineDash([4,3]);
  ctx.beginPath(); ctx.moveTo(pad.l,supportY); ctx.lineTo(W-pad.r,supportY); ctx.stroke();
  ctx.fillStyle='rgba(255,77,109,0.06)'; ctx.fillRect(pad.l,resistY-3,W-pad.l-pad.r,6);
  ctx.strokeStyle='rgba(255,77,109,0.35)';
  ctx.beginPath(); ctx.moveTo(pad.l,resistY); ctx.lineTo(W-pad.r,resistY); ctx.stroke();
  ctx.setLineDash([]);
  ctx.font='7px Space Mono,monospace';
  ctx.fillStyle='#3dd68c'; ctx.textAlign='right'; ctx.fillText('SUPPORT',W-pad.r-2,supportY-5);
  ctx.fillStyle='#ff4d6d'; ctx.fillText('RESISTANCE',W-pad.r-2,resistY-5);
  ctx.strokeStyle='rgba(245,166,35,0.65)'; ctx.lineWidth=1.5;
  ctx.beginPath(); let mStart=false;
  ma14.forEach((v,i)=>{ if(!v) return; const mx=pad.l+i*cW+cW/2; if(!mStart){ctx.moveTo(mx,toY(v));mStart=true;}else ctx.lineTo(mx,toY(v)); });
  ctx.stroke();
  candles.forEach((c,i)=>{
    const x=pad.l+i*cW, xc=x+cW/2, isUp=c.c>=c.o, col2=isUp?'#3dd68c':'#ff4d6d';
    const bodyY=toY(Math.max(c.o,c.c)), bodyH=Math.max(1,Math.abs(toY(c.o)-toY(c.c)));
    ctx.strokeStyle=col2; ctx.lineWidth=1;

      ctx.beginPath();
      ctx.moveTo(x+bW/2,pad3.t+chartH3-peakH);

  });

}

// ── MACRO: RATES vs MARKET ──
function vizMacro(){
  const W=canvas.width, H=canvas.height, t=(Date.now()-startTime)/1000;
  ctx.fillStyle='#030308'; ctx.fillRect(0,0,W,H);
  const N=60, pad5={l:44,r:16,t:28,b:44};
  const chartW2=W-pad5.l-pad5.r, chartH5=H-pad5.t-pad5.b;
  const rng2=seededRand(33);
  // Rate: rises then falls
  const rates=Array.from({length:N},(_,i)=>{
    const base=2+Math.sin(i/N*Math.PI)*4+rng2()*0.3;
    return Math.max(0.25,base);
  });
  // Market: inversely correlated with rates (generally)
  const market=rates.map((r,i)=>{
    const inv=10-r*0.8+Math.sin(i*0.4)*2+i*0.05;
    return Math.max(5,inv);
  });
  const maxR=Math.max(...rates), minR=Math.min(...rates);
  const maxM=Math.max(...market), minM=Math.min(...market);
  const toY2=(v,mn,mx)=>pad5.t+chartH5*(1-(v-mn)/(mx-mn+0.01));
  // Grid
  ctx.strokeStyle='rgba(29,29,42,0.8)'; ctx.lineWidth=1;
  [0,0.25,0.5,0.75,1].forEach(f=>{
    const y2=pad5.t+chartH5*f; ctx.beginPath(); ctx.moveTo(pad5.l,y2); ctx.lineTo(W-pad5.r,y2); ctx.stroke();
  });
  // Market line
  ctx.strokeStyle='rgba(61,214,140,0.8)'; ctx.lineWidth=2; ctx.beginPath();
  market.forEach((v,i)=>{ const x2=pad5.l+i/N*chartW2; if(i===0)ctx.moveTo(x2,toY2(v,minM,maxM));else ctx.lineTo(x2,toY2(v,minM,maxM)); });
  ctx.stroke();
  // Rate line
  ctx.strokeStyle='rgba(255,77,109,0.8)'; ctx.lineWidth=2; ctx.beginPath();
  rates.forEach((v,i)=>{ const x2=pad5.l+i/N*chartW2; if(i===0)ctx.moveTo(x2,toY2(v,minR,maxR));else ctx.lineTo(x2,toY2(v,minR,maxR)); });
  ctx.stroke();
  // Moving dot
  const di=Math.floor((Math.sin(t*0.5)*0.5+0.5)*(N-1));
  const mx2=pad5.l+di/N*chartW2;
  ctx.beginPath(); ctx.arc(mx2,toY2(market[di],minM,maxM),4,0,Math.PI*2);
  ctx.fillStyle='#3dd68c'; ctx.fill();
  ctx.beginPath(); ctx.arc(mx2,toY2(rates[di],minR,maxR),4,0,Math.PI*2);
  ctx.fillStyle='#ff4d6d'; ctx.fill();
  // Labels
  ctx.font='bold 9px Space Mono,monospace';
  ctx.fillStyle='#3dd68c'; ctx.textAlign='left'; ctx.fillText('■ STOCKS',8,16);
  ctx.fillStyle='#ff4d6d'; ctx.textAlign='left'; ctx.fillText('■ RATES',90,16);
  ctx.fillStyle='#66638a'; ctx.textAlign='right'; ctx.font='8px Space Mono,monospace';
  ctx.fillText('when rates go up, stocks often go down',W-8,H-6);
  ctx.fillStyle='#f5a623'; ctx.textAlign='center'; ctx.font='8px Space Mono,monospace';
  ctx.fillText('↑ RATES → ↓ GROWTH STOCKS',W/2,16);
}

// ── DCA VISUALIZATION ──
function vizDca(){
  const W=canvas.width, H=canvas.height, t=(Date.now()-startTime)/1000;
  ctx.fillStyle='#030308'; ctx.fillRect(0,0,W,H);
  const months=24;
  const rng4=seededRand(55);
  const prices=[100];
  for(let i=1;i<months+1;i++){
    const p=prices[i-1]*(1+(rng4()-0.42)*0.15+0.003);
    prices.push(Math.max(60,p));
  }
  const pad6={l:48,r:16,t:28,b:50};
  const chartW3=W-pad6.l-pad6.r, chartH6=H-pad6.t-pad6.b;
  const pMin2=Math.min(...prices)*0.95, pMax2=Math.max(...prices)*1.05;
  const toY3=p=>pad6.t+chartH6*(1-(p-pMin2)/(pMax2-pMin2));
  const cW2=chartW3/months;
  const animM=Math.floor(clamp(t/0.3,1,months));
  // Price line
  ctx.beginPath();
  prices.slice(0,animM+1).forEach((p,i)=>{ const x2=pad6.l+i*cW2; if(i===0)ctx.moveTo(x2,toY3(p));else ctx.lineTo(x2,toY3(p)); });
  ctx.strokeStyle='rgba(245,166,35,0.8)'; ctx.lineWidth=1.5; ctx.stroke();
  // DCA entry dots
  const fixedDollar=100, firstP=prices[0];
  let totalInvested=0,totalShares=0;
  prices.slice(0,animM).forEach((p,i)=>{
    const x2=pad6.l+i*cW2;
    const shares=fixedDollar/p;
    totalShares+=shares; totalInvested+=fixedDollar;
    ctx.beginPath(); ctx.arc(x2,toY3(p),3,0,Math.PI*2);
    ctx.fillStyle='#3dd68c'; ctx.fill();
  });
  const avgCost=totalInvested/totalShares;
  // Avg cost line
  ctx.strokeStyle='rgba(61,214,140,0.5)'; ctx.lineWidth=1; ctx.setLineDash([3,3]);
  ctx.beginPath(); ctx.moveTo(pad6.l,toY3(avgCost)); ctx.lineTo(pad6.l+animM*cW2,toY3(avgCost)); ctx.stroke();
  ctx.setLineDash([]);
  // Current value
  const curP=prices[Math.min(animM,months-1)];
  const curVal=totalShares*curP;
  const gain=curVal-totalInvested;
  // Stats
  ctx.fillStyle='#0a0a14'; ctx.fillRect(W-150,H-50,142,44);
  ctx.strokeStyle='#3dd68c44'; ctx.lineWidth=1; ctx.strokeRect(W-150,H-50,142,44);
  ctx.font='8px Space Mono,monospace'; ctx.textAlign='left';
  ctx.fillStyle='#66638a'; ctx.fillText(`Invested: $${totalInvested.toFixed(0)}`,W-146,H-36);
  ctx.fillStyle=gain>=0?'#3dd68c':'#ff4d6d';
  ctx.fillText(`Value: $${curVal.toFixed(0)}`,W-146,H-24);
  ctx.fillStyle=gain>=0?'#3dd68c':'#ff4d6d';
  ctx.fillText(`Gain: ${gain>=0?'+':''}$${gain.toFixed(0)}`,W-146,H-12);
  ctx.fillStyle='#f5a623'; ctx.font='8px Space Mono,monospace'; ctx.textAlign='right';
  ctx.fillText('avg cost →',pad6.l+animM*cW2-2,toY3(avgCost)-5);
  ctx.fillStyle='#66638a'; ctx.font='bold 9px Space Mono,monospace'; ctx.textAlign='center';
  ctx.fillText('DCA: $100/month — green dots = your purchases',W/2,16);
  // Y axis
  [pMin2,pMax2].forEach(p=>{ ctx.fillStyle='#55517a'; ctx.font='8px Space Mono,monospace'; ctx.textAlign='right'; ctx.fillText(`$${p.toFixed(0)}`,pad6.l-3,toY3(p)+3); });
}

// ── IPO CYCLE ──
function vizIpo(){
  const W=canvas.width, H=canvas.height, t=(Date.now()-startTime)/1000;
  ctx.fillStyle='#030308'; ctx.fillRect(0,0,W,H);
  const pad7={l:44,r:18,t:32,b:50};
  const cW4=W-pad7.l-pad7.r, cH7=H-pad7.t-pad7.b;
  // IPO price curve: hype pop → reality dump → stabilize
  const points=[
    {x:0,y:0.4},{x:0.05,y:0.4},{x:0.08,y:0.55}, // listing day pop
    {x:0.12,y:0.72},{x:0.15,y:0.85}, // first day frenzy
    {x:0.2,y:0.65},{x:0.25,y:0.58}, // reality sets in
    {x:0.32,y:0.45},{x:0.38,y:0.38}, // post lock-up selling
    {x:0.45,y:0.35},{x:0.5,y:0.32},  // trough
    {x:0.6,y:0.38},{x:0.7,y:0.42},  // fundamentals emerge
    {x:0.8,y:0.52},{x:0.9,y:0.6},
    {x:1.0,y:0.65},
  ];
  const animP4=clamp((t-0.3)/4,0,1);
  // Draw curve up to animP
  ctx.beginPath();
  const drawn=points.filter(p=>p.x<=animP4);
  drawn.forEach((p,i)=>{ const x2=pad7.l+p.x*cW4, y2=pad7.t+cH7*(1-p.y*0.85); if(i===0)ctx.moveTo(x2,y2);else ctx.lineTo(x2,y2); });
  ctx.strokeStyle='#f5a623'; ctx.lineWidth=2; ctx.stroke();
  // IPO offering price line
  const offeringY=pad7.t+cH7*(1-0.4*0.85);
  ctx.strokeStyle='rgba(61,214,140,0.4)'; ctx.lineWidth=1; ctx.setLineDash([3,3]);
  ctx.beginPath(); ctx.moveTo(pad7.l,offeringY); ctx.lineTo(W-pad7.r,offeringY); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle='rgba(61,214,140,0.7)'; ctx.font='8px Space Mono,monospace'; ctx.textAlign='left';
  ctx.fillText('← IPO PRICE',pad7.l+2,offeringY-5);
  // Annotations
  const annotations=[
    {x:0.15,y:0.87,label:'Day 1 pop\nRetail buys here',col:'#ff4d6d'},
    {x:0.38,y:0.36,label:'Lock-up expires\nInsiders sell',col:'#f5a623'},
    {x:0.5,y:0.30,label:'Trough\nBetter entry',col:'#3dd68c'},
  ];
  annotations.forEach(a=>{
    if(animP4<a.x+0.02) return;
    const ax=pad7.l+a.x*cW4, ay=pad7.t+cH7*(1-a.y*0.85);
    ctx.beginPath(); ctx.arc(ax,ay,4,0,Math.PI*2); ctx.fillStyle=a.col; ctx.fill();
    ctx.font='7px Space Mono,monospace'; ctx.textAlign='center'; ctx.fillStyle=a.col;
    a.label.split('\n').forEach((line,li)=>ctx.fillText(line,ax,ay-10-li*10));
  });
  ctx.fillStyle='#66638a'; ctx.font='bold 9px Space Mono,monospace'; ctx.textAlign='center';
  ctx.fillText('TYPICAL IPO PRICE CYCLE',W/2,18);
  ctx.font='8px Space Mono,monospace';
  ctx.fillText('→ retail often buys at peak, not at offering price',W/2,H-5);
}

// ── OPTIONS PAYOFF ──
function vizOptions(){
  const W=canvas.width, H=canvas.height, t=(Date.now()-startTime)/1000;
  ctx.fillStyle='#030308'; ctx.fillRect(0,0,W,H);
  const pad8={l:44,r:18,t:30,b:44};
  const cW5=W-pad8.l-pad8.r, cH8=H-pad8.t-pad8.b;
  const strike=180, premium=5;
  const stockPrices=Array.from({length:80},(_,i)=>140+i*1.1);
  const callPL=stockPrices.map(p=>Math.max(-premium,p-strike-premium));
  const putPL=stockPrices.map(p=>Math.max(-premium,strike-p-premium));
  const maxVal=Math.max(...callPL,Math.max(...putPL))+5;
  const minVal=Math.min(...callPL,...putPL)-5;
  const toY4=v=>pad8.t+cH8*(1-(v-minVal)/(maxVal-minVal));
  const toX=i=>pad8.l+i/stockPrices.length*cW5;
  // zero line
  const zeroY=toY4(0);
  ctx.strokeStyle='rgba(102,99,138,0.5)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(pad8.l,zeroY); ctx.lineTo(W-pad8.r,zeroY); ctx.stroke();
  // strike line
  const strikeIdx=stockPrices.findIndex(p=>p>=strike);
  const strikeX=toX(strikeIdx);
  ctx.strokeStyle='rgba(245,166,35,0.4)'; ctx.setLineDash([3,3]);
  ctx.beginPath(); ctx.moveTo(strikeX,pad8.t); ctx.lineTo(strikeX,H-pad8.b); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle='rgba(245,166,35,0.7)'; ctx.font='8px Space Mono,monospace'; ctx.textAlign='center';
  ctx.fillText(`STRIKE $${strike}`,strikeX,pad8.t+8);
  // animate current price
  const curP=155+Math.sin(t*0.6)*30;
  const curIdx=stockPrices.findIndex(p=>p>=curP);
  // Call payoff line
  const animP5=clamp((t-0.3)/2,0,1);
  const drawN=Math.floor(stockPrices.length*animP5);
  ctx.strokeStyle='#3dd68c'; ctx.lineWidth=2; ctx.beginPath();
  callPL.slice(0,drawN).forEach((v,i)=>{ if(i===0)ctx.moveTo(toX(i),toY4(v));else ctx.lineTo(toX(i),toY4(v)); });
  ctx.stroke();
  // Put payoff line
  ctx.strokeStyle='#ff4d6d'; ctx.lineWidth=2; ctx.beginPath();
  putPL.slice(0,drawN).forEach((v,i)=>{ if(i===0)ctx.moveTo(toX(i),toY4(v));else ctx.lineTo(toX(i),toY4(v)); });
  ctx.stroke();
  // Current price dot
  if(curIdx>0&&curIdx<stockPrices.length){
    ctx.beginPath(); ctx.arc(toX(curIdx),toY4(callPL[curIdx]),4,0,Math.PI*2);
    ctx.fillStyle='#3dd68c'; ctx.fill();
    ctx.beginPath(); ctx.arc(toX(curIdx),toY4(putPL[curIdx]),4,0,Math.PI*2);
    ctx.fillStyle='#ff4d6d'; ctx.fill();
    ctx.fillStyle='#f5a623'; ctx.font='8px Space Mono,monospace'; ctx.textAlign='center';
    ctx.fillText(`$${curP.toFixed(0)}`,toX(curIdx),pad8.t+18);
  }
  // Legend
  ctx.fillStyle='#3dd68c'; ctx.font='bold 9px Space Mono,monospace'; ctx.textAlign='left';
  ctx.fillText('■ CALL ($180 strike)',8,16);
  ctx.fillStyle='#ff4d6d'; ctx.fillText('■ PUT ($180 strike)',8,28);
  ctx.fillStyle='#66638a'; ctx.font='8px Space Mono,monospace'; ctx.textAlign='right';
  ctx.fillText(`premium paid: $${premium}`,W-8,H-5);
  // Y axis labels
  ctx.fillStyle='#55517a'; ctx.font='8px Space Mono,monospace'; ctx.textAlign='right';
  [0,10,-5,-premium].forEach(v=>{
    ctx.fillText(`$${v}`,pad8.l-3,toY4(v)+3);
  });
}

// ── RISK CALCULATOR ──
function vizRisk(){
  const W=canvas.width, H=canvas.height;
  ctx.fillStyle='#030308'; ctx.fillRect(0,0,W,H);
  const portfolio=10000, riskPct=1.5, entryPrice=50, stopPct=8, targetPct=24;
  const riskDollars=portfolio*(riskPct/100);
  const stopPrice=entryPrice*(1-stopPct/100);
  const targetPrice=entryPrice*(1+targetPct/100);
  const stopDist=entryPrice-stopPrice;
  const shares=Math.floor(riskDollars/stopDist);
  const positionSize=shares*entryPrice;
  const positionPct=(positionSize/portfolio)*100;
  const rr=targetPct/stopPct;
  const items=[
    {label:'PORTFOLIO SIZE',val:`$${portfolio.toLocaleString()}`,color:'#e8e4d9'},
    {label:'MAX RISK/TRADE (1.5%)',val:`$${riskDollars.toFixed(0)}`,color:'#ff4d6d'},
    {label:'ENTRY PRICE',val:`$${entryPrice.toFixed(2)}`,color:'#e8e4d9'},
    {label:'STOP LOSS',val:`$${stopPrice.toFixed(2)} (-${stopPct}%)`,color:'#ff4d6d'},
    {label:'TARGET PRICE',val:`$${targetPrice.toFixed(2)} (+${targetPct}%)`,color:'#3dd68c'},
    {label:'SHARES TO BUY',val:`${shares}`,color:'#f5a623'},
    {label:'POSITION SIZE',val:`$${positionSize.toFixed(0)} (${positionPct.toFixed(1)}%)`,color:'#f5a623'},
    {label:'REWARD:RISK RATIO',val:`${rr.toFixed(1)}:1 ✓`,color:rr>=3?'#3dd68c':'#ff4d6d'},
  ];
  const rowH3=(H-52)/items.length;
  items.forEach((item,i)=>{
    const y=28+i*rowH3;
    ctx.fillStyle='#0a0a14'; ctx.fillRect(8,y,W-16,rowH3-2);
    ctx.fillStyle='#66638a'; ctx.font='8px Space Mono,monospace'; ctx.textAlign='left';
    ctx.fillText(item.label,14,y+rowH3/2+3);
    ctx.fillStyle=item.color; ctx.font='bold 9px Space Mono,monospace'; ctx.textAlign='right';
    ctx.fillText(item.val,W-14,y+rowH3/2+3);
  });
  const barY=H-25, barW=W-36;
  ctx.fillStyle='#0d0d18'; ctx.fillRect(18,barY,barW,14);
  const gainW=barW*(rr/(rr+1));
  ctx.fillStyle='rgba(61,214,140,0.55)'; ctx.fillRect(18,barY,gainW,14);
  ctx.fillStyle='rgba(255,77,109,0.55)'; ctx.fillRect(18+gainW,barY,barW-gainW,14);
  ctx.fillStyle='#fff'; ctx.font='7px Space Mono,monospace';
  ctx.textAlign='left'; ctx.fillText(`+$${(shares*(targetPrice-entryPrice)).toFixed(0)}`,22,barY+10);
  ctx.textAlign='right'; ctx.fillText(`-$${riskDollars.toFixed(0)}`,W-22,barY+10);
  ctx.fillStyle='#66638a'; ctx.font='bold 8px Space Mono,monospace'; ctx.textAlign='center';
  ctx.fillText('POSITION SIZE CALCULATOR',W/2,16);
}

    const y=28+i*rowH4;
    const checked=checklistState[i];
    ctx.fillStyle=checked?'rgba(61,214,140,0.07)':'#080810'; ctx.fillRect(8,y,W-16,rowH4-2);
    if(checked){ ctx.strokeStyle='rgba(61,214,140,0.25)'; ctx.lineWidth=1; ctx.strokeRect(8,y,W-16,rowH4-2); }
    ctx.strokeStyle=checked?'#3dd68c':'#66638a'; ctx.lineWidth=1.5;
    ctx.strokeRect(14,y+4,11,11);
    if(checked){
      ctx.strokeStyle='#3dd68c'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(17,y+9.5); ctx.lineTo(19.5,y+13); ctx.lineTo(23,y+6); ctx.stroke();
    }
    ctx.fillStyle=checked?'#3dd68c':'#b0accc';
    ctx.font=(checked?'bold ':'')+'8px Space Mono,monospace'; ctx.textAlign='left';
    ctx.fillText(item,30,y+rowH4/2+3);
  });
  const pct=total/items2.length;
  ctx.fillStyle='#0d0d18'; ctx.fillRect(8,H-22,W-16,14);
  ctx.fillStyle=pct===1?'#3dd68c':pct>0.6?'#f5a623':'#ff4d6d';
  ctx.fillRect(8,H-22,(W-16)*pct,14);
  ctx.fillStyle='#fff'; ctx.font='bold 8px Space Mono,monospace'; ctx.textAlign='center';
  ctx.fillText(`${total}/${items2.length} — ${pct===1?'READY':'keep going'}`,W/2,H-12);
  ctx.fillStyle='#66638a'; ctx.font='bold 8px Space Mono,monospace';
  ctx.fillText('PRE-TRADE CHECKLIST — tap to check',W/2,16);
}

// ── VOCAB VISUAL ──
function vizVocab(){
  const W=canvas.width, H=canvas.height, t=(Date.now()-startTime)/1000;
  ctx.fillStyle='#030308'; ctx.fillRect(0,0,W,H);
  const terms=[
    {word:'BULL/BEAR',plain:'going up / going down',col:'#f5a623'},
    {word:'YIELD',plain:'return rate (%)',col:'#3dd68c'},
    {word:'ALPHA',plain:'beating the market',col:'#7b8cde'},
    {word:'BETA',plain:'volatility vs market',col:'#ff9f43'},
    {word:'LIQUIDITY',plain:'how cashable is it?',col:'#3dd68c'},
    {word:'HEDGING',plain:'insurance on a trade',col:'#ff4d6d'},
    {word:'EBITDA',plain:'profit before tax tricks',col:'#f5a623'},
    {word:'QE',plain:'Fed prints + buys bonds',col:'#c8ff00'},
    {word:'DERIVATIVES',plain:'contracts about things',col:'#7b8cde'},
  ];
  const cols=3, rows=3;
  const cW7=(W-20)/cols, cH10=(H-28)/rows;
  ctx.fillStyle='#66638a'; ctx.font='bold 9px Space Mono,monospace'; ctx.textAlign='center';
  ctx.fillText('FINANCE JARGON → PLAIN ENGLISH',W/2,16);
  terms.forEach((term,i)=>{
    const col=i%cols, row=Math.floor(i/cols);
    const x=8+col*(cW7+4), y=24+row*(cH10+4);
    const hov=Math.sin(t*0.6+i*1.4)*0.5+0.5;
    ctx.fillStyle='#0a0a14'; ctx.fillRect(x,y,cW7-2,cH10-2);
    ctx.strokeStyle=term.col+`${Math.round((0.1+hov*0.2)*255).toString(16).padStart(2,'0')}`;
    ctx.lineWidth=1; ctx.strokeRect(x,y,cW7-2,cH10-2);
    ctx.fillStyle=term.col; ctx.font='bold 9px Space Mono,monospace'; ctx.textAlign='center';
    ctx.fillText(term.word,x+cW7/2-1,y+cH10/2-2);
    ctx.strokeStyle=term.col+'44'; ctx.lineWidth=0.5;
    ctx.beginPath(); ctx.moveTo(x+10,y+cH10/2+2); ctx.lineTo(x+cW7-12,y+cH10/2+2); ctx.stroke();
    ctx.fillStyle='#b0accc'; ctx.font='7px Space Mono,monospace';
    ctx.fillText(term.plain,x+cW7/2-1,y+cH10/2+13);
  });
}

canvas.addEventListener('click',function(e){
  if(currentViz!=='checklist') return;
  const rect=canvas.getBoundingClientRect();
  const scaleX=canvas.width/rect.width, scaleY=canvas.height/rect.height;
  const cx=(e.clientX-rect.left)*scaleX, cy=(e.clientY-rect.top)*scaleY;
  const rowH4=(canvas.height-48)/9;
  const idx=Math.floor((cy-28)/rowH4);
  if(idx>=0&&idx<9) checklistState[idx]=!checklistState[idx];
});

let currentLesson=0;
function loadLesson(idx){
  currentLesson=idx;
  const L=LESSONS[idx];
  document.getElementById('lesson-text').innerHTML=`
    <div class="lesson-number">${L.subtitle}</div>
    <div class="lesson-title">${L.title}</div>
    <div class="lesson-body">${L.body}</div>`;
  document.getElementById('claude-prompt').value=L.prompt;
  document.getElementById('viz-label').textContent=L.vizLabel;
  document.querySelectorAll('.nav-btn').forEach((b,i)=>b.classList.toggle('active',i===idx));
  document.getElementById('progress').style.width=((idx+1)/LESSONS.length*100).toFixed(1)+'%';
  currentViz=L.viz;
  startTime=Date.now();
  const btn=document.getElementById('copy-btn');
  btn.textContent='⎘ COPY'; btn.classList.remove('done');
}
function copyPrompt(){
  navigator.clipboard.writeText(document.getElementById('claude-prompt').value).then(()=>{
    const btn=document.getElementById('copy-btn');
    btn.textContent='✓ COPIED'; btn.classList.add('done');
    setTimeout(()=>{btn.textContent='⎘ COPY';btn.classList.remove('done');},2000);
  });
}

// ─────────────────────────────────────────────
//  HERO CANVAS
// ─────────────────────────────────────────────
(function(){
  const hc=document.getElementById('hero');
  const hctx=hc.getContext('2d');
  function rsz(){ hc.width=hc.parentElement.offsetWidth; hc.height=hc.parentElement.offsetHeight; }
  rsz(); window.addEventListener('resize',rsz);
  const hStart=Date.now();
  function heroRng(seed){ let s=seed; return()=>{s=(s*9301+49297)%233280;return s/233280;}; }
  const prices2=[]; const rng2=heroRng(7); let p2=100;
  for(let i=0;i<300;i++){ p2+=(rng2()-0.47)*3; prices2.push(p2); }
  (function loop(){
    const W2=hc.width, H2=hc.height;
    if(!W2||!H2){requestAnimationFrame(loop);return;}
    hctx.clearRect(0,0,W2,H2);
    const t2=(Date.now()-hStart)/1000;
    const off=t2*25;
    const vC=Math.floor(W2/4);
    const sI=Math.floor(off)%prices2.length;
    const vis=Array.from({length:vC},(_,i)=>prices2[(sI+i)%prices2.length]);
    const mn=Math.min(...vis), mx=Math.max(...vis);
    hctx.beginPath();
    vis.forEach((v,i)=>{
      const x=(i/vC)*W2, y=H2*0.3+((v-mn)/(mx-mn+0.01))*(H2*0.4);
      if(i===0)hctx.moveTo(x,y);else hctx.lineTo(x,y);
    });
    hctx.strokeStyle='rgba(245,166,35,0.55)'; hctx.lineWidth=1.5; hctx.stroke();
    hctx.lineTo(W2,H2); hctx.lineTo(0,H2); hctx.closePath();
    const g2=hctx.createLinearGradient(0,0,0,H2);
    g2.addColorStop(0,'rgba(245,166,35,0.04)'); g2.addColorStop(1,'rgba(245,166,35,0)');
    hctx.fillStyle=g2; hctx.fill();
    requestAnimationFrame(loop);
  })();
})();

window.addEventListener('resize',resizeCanvas);
resizeCanvas();
loadLesson(0);
animLoop();
