// ══════════════════════════════════════

{
title:"The Market Is a Mood Ring",
subtitle:"01 — What Even Is This",
vizLabel:"▶ the order book — live auction in action",
viz:"auction",
body:`
<p>The stock market is not a machine, a casino, or a velvet-rope club for people who wear khakis. It's just <strong>millions of people constantly arguing about what businesses are worth right now</strong>. That argument is live, 24/7, and you can join it with your phone. The argument has rules. This course teaches you the rules so you can argue smarter than the people who charge $200/hr to argue for you.</p>

<p>When you buy a share of a company, you are buying <em>actual legal ownership</em> of a tiny slice of it. Apple has about 15.5 billion shares outstanding. Own one share and you own 1/15,500,000,000th of Apple Inc. You can vote on shareholder resolutions. You're a part owner. The certificate just lives in a database now instead of a safe.</p>

<div class="vocab"><span class="vt">"The Market"</span> — just a label humans put on the collective result of everyone's buy/sell decisions. There is no single place or entity called "the market." It's a metaphor for aggregate behavior. Like calling the entire art world "the scene."</div>

<p>The price of a stock at any moment is simply <strong>what the last two people agreed to trade at</strong>. That's it. No formula. No fairness. If someone is panicking and sells cheap, that's the new price. If someone is euphoric and pays too much, that's the new price.</p>

<div class="step-card"><span class="step-num">THE ORDER BOOK — WHAT'S ON THE RIGHT</span>
At any moment there are people posting bids (what they'll pay) and asks (what they'll sell for). When a bid and ask overlap, a trade happens. The stack of waiting orders at each price level IS the order book. The viz on the right shows this live. Notice the gap between green (buyers) and red (sellers)? That gap is called the <strong>spread</strong> — and whoever captures it is making money on every single trade (that's market makers, not you).
</div>

<p>Short term: the market is a <strong>voting machine</strong> (pure emotion — people vote with dollars on what they believe or fear). Long term: it's a <strong>weighing machine</strong> (actual business performance eventually wins). The entire game of investing is just exploiting the gap between these two modes.</p>

<div class="tip">Think about how art prices work. A Basquiat isn't worth $110M because of canvas costs. It's worth that because enough credible people believe it is. Remove the belief and there's no floor. Stocks work exactly the same way — except business results eventually push back on unrealistic belief.</div>
`,
prompt:`I want to understand the stock market from scratch.

I'm [describe yourself — artist, creative, etc.] with zero finance background.

Please explain:
1. What a share of stock is — actual ownership, what rights come with it
2. How the price of a stock gets determined in real time (the order book mechanism)
3. What "the market" actually means — NYSE vs NASDAQ vs OTC vs dark pools
4. The difference between stocks, bonds, ETFs, and index funds in plain English — treat each term as a label someone made up and explain what the label describes
5. Why the stock market exists at all — who benefits and how?
6. How is the S&P 500 calculated and what it actually measures

Use analogies from art, creative work, or everyday life. Explain every term before using it.`
},

{
title:"All the Words, Decoded",
subtitle:"02 — Vocabulary Is Just Labels",
vizLabel:"▶ anatomy of a live stock quote",
viz:"ticker",
body:`
<p>Finance people love their vocabulary. Not because the concepts are hard — most aren't — but because <strong>jargon creates a moat around the profession</strong>. If you don't know the words, you feel like you don't belong, you feel stupid, and then you pay someone to speak the language for you. That someone often earns 1-2% of your money annually for doing very little. We are defeating this today. Here's every label you'll encounter, with the label removed.</p>

<div class="vocab"><span class="vt">"Market Capitalization"</span> — someone decided to multiply a company's share price by how many shares exist. That number became the shorthand for "how big is this company." The label makes it sound official. The math is: price × shares = market cap. That's all.</div>

<div class="step-card"><span class="step-num">THE BIG NUMBERS</span>
<strong>Price</strong> — what one share costs. Meaningless without context.<br>
<strong>Market Cap</strong> — price × shares. The real size. Apple = ~$3T. Local bakery = maybe $2M.<br>
<strong>Volume</strong> — shares traded today. High = attention. Low = nobody cares.<br>
<strong>52W High/Low</strong> — price range over the past year. Where are we in that range?<br>
<strong>Float</strong> — shares actually tradeable (not locked up by founders). Low float = more volatile.
</div>

<div class="step-card"><span class="step-num">THE RATIO TRIAD — "HOW EXPENSIVE IS THIS?"</span>
<strong>P/E Ratio</strong> — Price ÷ Earnings Per Share. Dollars paid per dollar of annual profit. P/E of 20 means: "I'll pay $20 now for each $1 this company earns per year." Growth companies have high P/Es (you're paying for the future). Mature companies have low ones.<br><br>
<strong>EPS (Earnings Per Share)</strong> — a company's annual profit divided by share count. Growing EPS = healthy. Shrinking EPS = problem.<br><br>
<strong>Revenue vs Earnings</strong> — Revenue is all money coming in. Earnings is what's left after expenses. A company with $1B revenue and -$200M earnings is still losing money. Revenue is vanity. Profit is sanity.
</div>

<div class="vocab"><span class="vt">"Bull Market / Bear Market"</span> — Wall Street chose animals to describe direction. Bull = going up (the animal thrusts up with its horns). Bear = going down (the animal swipes down with its paws). These are just words for "generally rising prices over time" and "generally falling prices over time." No bulls or bears are involved.</div>

<div class="stat-row">
  <div class="stat"><span class="lbl">P/E RATIO</span><span class="val">28.4</span></div>
  <div class="stat grn"><span class="lbl">EPS GROWTH</span><span class="val">▲ +19%</span></div>
  <div class="stat"><span class="lbl">MKT CAP</span><span class="val">$847B</span></div>
  <div class="stat red"><span class="lbl">DEBT/EQUITY</span><span class="val">2.4x ⚠</span></div>
  <div class="stat grn"><span class="lbl">GROSS MARGIN</span><span class="val">68.2%</span></div>
</div>

<div class="tip">Market cap tiers are just labels humans agreed on: micro-cap (<$300M), small-cap (<$2B), mid-cap (<$10B), large-cap (<$200B), mega-cap (above). These numbers aren't physics. The point is: smaller companies are riskier and more volatile. Bigger companies are more stable. Size correlates with reliability, not quality.</div>
`,
prompt:`Please explain the following financial terms like I've never heard them before — treat each one as a label someone invented and explain what the label is describing:

P/E ratio, EPS, Market Cap, Revenue vs Profit, Gross Margin vs Net Margin, Dividend Yield, Book Value, Price-to-Sales ratio, Debt-to-Equity ratio, Free Cash Flow, EBITDA

For each:
1. What is this actually measuring?
2. Why did someone decide this was a useful thing to measure?
3. What does a high number mean? What does a low number mean?
4. What type of investor cares most about this metric and why?
5. What's a number that would make you interested vs worried?

No jargon without explanation. Pretend finance invented new words to describe totally normal business concepts.`
},

{
title:"Reading Charts Without Crying",
subtitle:"03 — Visual Market Grammar",
vizLabel:"▶ annotated candlestick chart",
viz:"chart",
body:`
<p>Price charts look like chaos. They're not. They're just history drawn as a picture. The whole "technical analysis" industry is built on one idea: <strong>prices move in patterns because humans behave in patterns</strong>. And humans behave in patterns because we all have the same fear/greed wiring.</p>

<div class="vocab"><span class="vt">"Candlestick"</span> — Japanese rice traders in the 1700s invented this visualization. They needed a way to show four prices at once: where did trading start? where did it end? what was the highest point? the lowest? One candle shows all four. "Candlestick" because the shape looks like a candle with a wick.</div>

<div class="step-card"><span class="step-num">THE CANDLE — ONE PERIOD OF PRICE ACTION</span>
The fat body = from opening price to closing price.<br>
The thin wick above = the highest price reached.<br>
The thin wick below = the lowest price reached.<br>
<em>Green candle</em> = closed higher than it opened (up day). <em>Red candle</em> = closed lower (down day).<br><br>
A candle can represent 1 minute, 1 hour, 1 day, 1 week — whatever timeframe you're looking at. A giant wick means price went way up (or down) but pulled back. That tells a story about who won — buyers or sellers.
</div>

<div class="step-card"><span class="step-num">TREND — THE ONLY THING THAT MATTERS</span>
<strong>Uptrend</strong>: higher highs, higher lows. Each rally goes higher than the last. Each pullback doesn't erase as much as the last rally gained. This is a healthy trend.<br>
<strong>Moving Average</strong>: draw a line connecting the average closing price over N days. Price above the 50-day MA = generally in good shape. Price below the 200-day MA = be cautious. <em>The MA is just a smoothing function.</em> It takes out the noise so you can see the signal.
</div>

<div class="step-card"><span class="step-num">SUPPORT & RESISTANCE — FLOORS AND CEILINGS</span>
<strong>Support</strong>: a price level where buyers keep appearing. The stock falls to $45, bounces. Falls to $45 again, bounces again. $45 is support. <em>Why?</em> Because everyone who missed it last time says "if it gets back to $45, I'm buying."<br>
<strong>Resistance</strong>: a ceiling where sellers keep appearing. Usually an old high — people who bought at the top are waiting to "get out even."<br><br>
When price breaks through resistance on heavy volume — that old ceiling becomes the new floor. This is called a breakout.
</div>

<div class="tip">The chart doesn't predict the future. It shows where human attention clusters. A stock at an all-time high isn't "expensive" — every dollar it has ever traded at was someone's buy price. All-time highs just mean everyone who ever owned it is in profit, reducing selling pressure.</div>
`,
prompt:`I'm looking at a chart for [TICKER SYMBOL] on TradingView. Walk me through a complete technical read.

Please analyze:
1. The primary trend: is it in an uptrend, downtrend, or sideways range? (Look at higher highs/lows)
2. Key moving averages: is the stock above or below its 50-day and 200-day MA? What does this signal?
3. Support levels: where does price tend to stop falling? (Recent lows, old highs that got broken)
4. Resistance levels: where does price tend to stall going up?
5. Volume analysis: is volume expanding on up moves or down moves? What does this tell us?
6. Any classic chart patterns visible? (Cup and handle, head and shoulders, flag, pennant, etc.)
7. RSI or momentum: is the stock overbought, oversold, or neutral?

After the analysis: is this chart setup constructive for an entry, or would you wait for a better setup? Why?`
},

{
title:"Is This Company Actually Good?",
subtitle:"04 — Business Quality 101",
vizLabel:"▶ business quality comparison",
viz:"fundamentals",
body:`
<p>Charts tell you what price is doing. <strong>Fundamentals tell you what the business is actually doing</strong>. Price follows business quality — just not on a schedule anyone knows. The gap between price and business quality is where money gets made (and lost).</p>

<p>Warren Buffett's actual philosophy, stripped of the Omaha oracle mysticism: <em>find businesses that make good money consistently, have structural advantages that protect those profits from copycats, are run by people who aren't destroying it, and buy them when the price is reasonable relative to those profits.</em> That's the whole thing. Every book, interview, and shareholder letter he's written is just elaboration on those four ideas.</p>

<div class="step-card"><span class="step-num">THE FIVE THINGS THAT MATTER</span>
<strong>1. Revenue growth</strong> — Is the business getting bigger? 15%+ annually is exciting. Flat is fine if profitable. Shrinking is concerning unless there's a deliberate reason (selling a bad division, etc.).<br><br>
<strong>2. Margins</strong> — Revenue is vanity. Margins show efficiency. Apple's net margin ~25% means: for every $100 they make, $25 is profit. Grocery stores run at ~2%. Margins reveal how much pricing power and competitive protection a business has.<br><br>
<strong>3. Moat</strong> — Warren Buffett's word for competitive advantage. What makes this business hard to copy? Patents, brand loyalty, network effects, switching costs, cost advantages. The wider the moat, the more durable the profits.<br><br>
<strong>4. Balance sheet</strong> — Does it have more cash than debt? Or is it drowning in loans? Companies with strong cash positions can survive downturns. Companies with huge debt loads can't.<br><br>
<strong>5. Management</strong> — Are executives buying shares with their own money? Do they hit their stated targets? Do they communicate clearly and honestly? Great management can rescue a mediocre business. Bad management destroys a great one.
</div>

<div class="vocab"><span class="vt">"Free Cash Flow"</span> — earnings on paper can be massaged by accounting choices. Free cash flow is the actual dollars that flowed into the company's bank account after all expenses. It's harder to fake. High FCF = the business genuinely makes real money.</div>

<div class="tip">An artist analogy: revenue is how many pieces you sold. Profit margin is what you kept after materials, studio rent, and commissions. The moat is your unique style — why someone would pay you specifically vs any other artist. Balance sheet is whether you have savings or debt. Management is how disciplined you are about not spending everything on rent for a bigger studio you don't need yet.</div>
`,
prompt:`Give me a fundamental analysis of [COMPANY NAME] like you're a senior analyst briefing someone smart but not finance-trained.

1. Business model: exactly how does this company make money? (Be specific — what triggers revenue?)
2. Revenue trend: last 3 years. Growing, flat, or declining? At what rate?
3. Profitability: gross margin, net margin — and whether they're improving or deteriorating
4. The moat: what specifically prevents a competitor from just copying this business?
5. Balance sheet: cash vs debt. Is this company vulnerable if revenue drops 30%?
6. Management quality: any notable capital allocation decisions, share buybacks, dividends, acquisitions?
7. Bear case: the one or two things that would make this investment go wrong
8. Bull case: the scenario where this investment does really well

Rate the business quality 1-10 with justification. Not the stock — the business.`
},

// ══════════════════════════════════════
// SECTION 2: READING THE WORLD
// ══════════════════════════════════════
{
title:"App Autopsy — Phone & Web",
subtitle:"05 — How to Analyze Tech Companies",
vizLabel:"▶ tech company metrics dashboard",
viz:"appmetrics",
body:`
<p>You are already doing free market research every time you use your phone. The apps you open 10 times a day? That's DAU data. The apps you uninstalled after a week? That's churn. You have intuition here that most Wall Street analysts don't — <strong>they don't use the products; you do</strong>. The skill is learning to convert that intuition into a structured investment thesis.</p>

<p>Tech companies use different metrics than traditional businesses — on purpose. Normal accounting doesn't capture what makes software valuable: <strong>scale with near-zero marginal cost</strong>. Adding the 500 millionth TikTok user costs approximately zero. That's why these companies look "expensive" by normal accounting standards but sometimes aren't — the numbers just aren't built for them.</p>

<div class="vocab"><span class="vt">"DAU/MAU"</span> — someone needed to answer "of the people who have this app, how many actually use it every day?" Daily Active Users ÷ Monthly Active Users. WhatsApp ~80%. Instagram ~55%. A game that's downloaded 50M times but has a 4% DAU/MAU has 50M uninstalls waiting to happen.</div>

<div class="step-card"><span class="step-num">🔦 THE PHONE TEST — START HERE BEFORE READING A SINGLE FILING</span>
Before you buy stock in any consumer app company, spend one week noticing it in the real world:<br><br>
— <strong>How often do you open it?</strong> Once a day unprompted = strong. Only when you remember it exists = weak.<br>
— <strong>Do your friends use it?</strong> Not "did they try it" — do they actually use it regularly?<br>
— <strong>Could you switch?</strong> Think about replacing Instagram with any competitor. How hard? That friction = moat.<br>
— <strong>App Store ranking</strong> — go to App Store or Google Play, category rankings. Top 10 in category consistently = traction. Ranked #847 and sliding = problem. Rankings are free, real-time signal.<br>
— <strong>App Store reviews</strong> — 1-star reviews in the last month are users describing problems in exact terms. Read 20. They're better than any analyst report.
</div>

<div class="step-card"><span class="step-num">THE CONSUMER APP vs B2B SaaS DISTINCTION</span>
These are very different animals and get confused constantly:<br><br>
<strong>Consumer apps (TikTok, Spotify, Uber, Instagram)</strong>: Revenue usually from ads or subscriptions. Valuation driven by scale + engagement. Key risk: trends shift, teens move on. Key advantage: network effects can be enormous. One bad quarter of engagement = stock gets crushed.<br><br>
<strong>B2B SaaS (Salesforce, Slack, Figma, Notion)</strong>: Revenue from enterprise contracts. Sticky because switching costs are high — the company's whole team uses it and switching means re-training everyone. Key metric: Net Revenue Retention (NRR). Above 120% means existing customers are spending more each year — that's compounding without new customers.<br><br>
The tell: who's writing the check? If it's your personal credit card → consumer. If it's a procurement department → B2B.
</div>

<div class="step-card"><span class="step-num">THE TECH METRIC CHEAT SHEET</span>
<strong>DAU/MAU</strong> — engagement stickiness. >50% = strong. <20% = people installed it and forgot.<br><br>
<strong>LTV/CAC</strong> — Lifetime Value ÷ Customer Acquisition Cost. Get a customer for $50, they spend $150 total = 3:1. Below 3:1 = losing money on growth. Above 5:1 = underinvesting in growth.<br><br>
<strong>Churn Rate</strong> — % of customers leaving per month. 2%/month for SaaS = decent. 10%/month = leaky bucket, you're running to stand still.<br><br>
<strong>Gross Margin</strong> — software companies should be 60-80%+. If a company calling itself "tech" has 15% gross margins, look harder — it's probably a logistics company with an app on top. DoorDash and Instacart learned this the hard way.<br><br>
<strong>Rule of 40</strong> — growth rate + profit margin >40 = healthy SaaS. Growing 50% with -5% margins = 45 ✓. Growing 5% with 25% margins = 30, stagnating.<br><br>
<strong>ARPU</strong> (Average Revenue Per User) — how much does one user generate in a year? Compare to the DAU/MAU count. Low ARPU + high user count = ad model. High ARPU + lower user count = subscription or enterprise.
</div>

<div class="step-card"><span class="step-num">FREE SIGNALS YOU CAN READ RIGHT NOW</span>
<strong>Sensor Tower / data.ai (formerly App Annie)</strong> — app download rankings and revenue estimates. Free tier shows you trends. A consumer app with accelerating downloads in new countries = early global expansion signal.<br><br>
<strong>App Store / Google Play Top Charts</strong> — Top Free, Top Paid, Top Grossing. "Top Grossing" is the important one — people are paying. An app that's #47 in Top Grossing month after month has sticky revenue.<br><br>
<strong>Reddit / community pulse</strong> — r/[appname] subreddits. When users go from fans to critics, you'll see it here months before management acknowledges it in earnings calls. Users described Netflix's password crackdown with rage in early 2023; management called it a success. Who was right? Check the subscriber count now.<br><br>
<strong>Product Hunt</strong> — where new apps launch. Browsing it weekly is free trend reconnaissance. When investors were early to Notion, Figma, and Linear, some noticed them on Product Hunt years before their IPO hype.
</div>

<div class="step-card"><span class="step-num">NETWORK EFFECTS — THE REAL MOAT</span>
A product with network effects gets more valuable as more people use it. Instagram is worthless with 5 users, priceless with 2 billion. WhatsApp, Uber, Visa, LinkedIn — harder to displace <em>specifically because so many people already use them</em>. Network effects are the strongest moat in tech.<br><br>
The test: <em>if this app had 10% of its current users, would it still be useful?</em> WhatsApp: no — messaging apps need everyone to be on them. Photoshop: yes — it's still useful alone. Single-player products have no network effects. Multiplayer products do.
</div>

<div class="spamton">YOU WANT TO FIND A <strong>[[NETWORK EFFECT BUSINESS]]</strong> EARLY?! The platform that has [[LOCK-IN]] today becomes the [[UNTOUCHABLE MONOPOLY]] of tomorrow!! Watch the App Store rankings!! Read the Reddit complaints!! <strong>[[THE SIGNAL IS FREE]]</strong>!! <span class="sp-small">— also: high user counts alone mean nothing. look at what % of users pay, and how much. 1 billion free users who never pay = worth less than 5 million subscribers at $15/month.</span></div>

<div class="challenge">Open the App Store or Google Play right now. Go to "Top Charts" → "Top Grossing." Pick an app you don't recognize in the top 20. Google the company. Who owns it? How long has it been in the top 20? That consistency is a real revenue signal. Now check if it's publicly traded.</div>
`,
prompt:`Do a complete app/tech company analysis of [COMPANY / APP NAME] for me.

I want both the product lens (as a user) and the business lens (as an investor).

PRODUCT ANALYSIS
1. What exactly does this app do and who uses it? (be specific — not marketing language)
2. What does its App Store / Google Play rating look like, and what do the recent reviews say?
3. Is it consumer, B2B, or both? Who's actually paying?
4. What category of app is it? (social, utility, marketplace, game, productivity, etc.) — and what are the engagement expectations for that category?
5. Is there a "natural daily habit" that brings users back, or does it require a reason to open?

BUSINESS ANALYSIS
6. Revenue model: ads, subscriptions, transaction fees, enterprise contracts? What % of each?
7. DAU/MAU if reported — or estimate based on what you know
8. Gross margins — is this actually software-grade or is there physical infrastructure drag?
9. Network effects: does the product get harder to leave as more people join?
10. Churn risk: what would make users leave and how many alternatives exist?
11. Key growth vectors: where does the next 3 years of growth come from?

RED FLAGS to specifically check:
- Regulatory threat to the business model
- Declining App Store rankings or reviews in recent months
- Revenue concentrated in one country or customer

Rate the business model quality 1-10, separate from stock price. Explain your rating.`
},

{
title:"Where Is the Energy Right Now?",
subtitle:"06 — Sectors, Rotation & Momentum",
vizLabel:"▶ S&P 500 sector heatmap",
viz:"heatmap",
body:`
<p>The market is not one uniform thing. It's 11 sectors with different personalities. Money constantly flows between them based on the economic environment. <strong>Understanding rotation means knowing where to look before everyone else does.</strong></p>

<div class="step-card"><span class="step-num">SECTOR PERSONALITIES</span>
<em>Technology</em> — grows fast, loves low interest rates, gets crushed when rates rise<br>
<em>Healthcare</em> — defensive, people need medicine in any economy<br>
<em>Financials</em> — loves rising rates (banks charge more), hates recessions<br>
<em>Energy</em> — follows oil/gas prices, cyclical, geopolitical<br>
<em>Consumer Staples</em> — Procter & Gamble, Coca-Cola — people keep buying soap even in recessions<br>
<em>Consumer Discretionary</em> — Netflix, Nike — optional spending that people cut when scared<br>
<em>Utilities</em> — boring, stable, high dividends, loved when investors are scared
</div>

<div class="step-card"><span class="step-num">SECTOR ROTATION — THE ECONOMIC CLOCK</span>
Markets move through a cycle. Sectors that lead in each phase:<br><br>
<strong>Early recovery</strong>: Financials, Consumer Discretionary, Real Estate<br>
<strong>Expansion</strong>: Technology, Industrials, Materials<br>
<strong>Late cycle</strong>: Energy, Industrials, Healthcare<br>
<strong>Recession</strong>: Consumer Staples, Healthcare, Utilities (defensives hold up)<br><br>
Knowing where we are in the cycle tells you where to point your binoculars first.
</div>

<div class="vocab"><span class="vt">"Relative Strength"</span> — someone invented this to answer: "is this stock outperforming or underperforming the market?" If the market drops 10% and your stock drops 2%, your stock has strong relative strength — it's showing up better in adversity. Stocks with strong relative strength tend to lead in the next rally. This is why professionals track it obsessively.</div>

<div class="tip">The sector heat map is free on finviz.com/map.ashx. It color-codes every S&P 500 company by today's performance. Red sector = selling pressure. Green = buying pressure. But look at the 1-month and 3-month views to see which sectors are trending — one day of data is noise.</div>
`,

Please analyze the current market environment:
1. Which S&P 500 sectors have been strongest over 1 month and 3 months?
2. Which sectors are weakest — and is that weakness due to macro factors or specific industry problems?
3. Where are we in the economic cycle, roughly — early recovery, expansion, late cycle, or contraction?
4. What does the Fed's current interest rate stance imply for sector preferences?
5. Name 2-3 specific stocks in the leading sectors showing relative strength vs their peers
6. Any sectors that look like they might be bottoming or starting to rotate into favor?

Explain the "why" behind each sector's current behavior — what macro forces are driving it?`

// ══════════════════════════════════════
// SECTION 3: PSYCHOLOGY & ANTHROPOLOGY
// ══════════════════════════════════════
{
title:"Markets Are a Religion",
subtitle:"07 — The Anthropology of Greed",
vizLabel:"▶ historical bubble chart",
viz:"anthropology",
body:`
<p>Let's drop the finance lens entirely. Put on the anthropologist coat. When you look at financial markets the way an anthropologist looks at a society — studying behavior, belief systems, rituals, power dynamics — something remarkable emerges: <strong>markets are a collective belief system, and bubbles are tent revivals</strong>. The preacher is whoever tells the best story. The congregation brings their savings.</p>

<div class="step-card"><span class="step-num">MONEY ITSELF IS A COLLECTIVE HALLUCINATION</span>
A dollar bill is a piece of cotton and linen. It has material value measured in fractions of a cent. Yet you will trade it for a sandwich, a year of rent, or a car. <em>Why?</em> Because you believe everyone else believes in it. That's it. Money is a consensus reality — it functions because everyone agrees it does. Stocks are the same, one layer deeper: the consensus about the consensus.
</div>

<div class="step-card"><span class="step-num">MIMETIC DESIRE — WE WANT WHAT OTHERS WANT</span>
René Girard, a French anthropologist, proposed that humans don't develop desires independently. We want things because <em>other people want them</em>. Not because of intrinsic value. This is why the most-discussed stock becomes the most-owned stock becomes the most expensive stock — in a loop that has nothing to do with the underlying business. When Tesla was worth more than Toyota × Ford × GM combined, it wasn't a valuation. It was a desire cascade.
</div>

<div class="step-card"><span class="step-num">THE CARGO CULT INVESTOR</span>
After WWII, Pacific islanders who'd seen Allied military bases bring wealth built fake runways and bamboo control towers, believing the ritual would summon the planes back. In investing, "cargo cult" behavior means: copying surface actions of successful investors without understanding their logic. Buying "what Buffett buys" without understanding why. Using charts because "technical analysis works" without understanding what you're actually reading about human behavior. The ritual without the mechanism.
</div>

<div class="step-card"><span class="step-num">BUBBLES ARE ALWAYS THE SAME STORY</span>
Every major bubble in history shares five ingredients:<br><br>
1. A genuinely new technology or asset class (tulips, railroads, dot-com, crypto)<br>
2. A new class of people with money to deploy (newly wealthy merchants, retail investors with trading apps)<br>
3. Leverage — borrowed money amplifying both gains and losses<br>
4. A narrative that explains why "this time is different"<br>
5. FOMO as social contagion — not investing feels like refusing to evolve<br><br>
The tulip mania of 1637. The South Sea Bubble of 1720. The dot-com crash of 2000. GameStop 2021. Same five ingredients. Different costumes.
</div>

<div class="step-card"><span class="step-num">GAMESTOP WAS A PEASANT REVOLT</span>
The sociological reading of GameStop in 2021: retail investors (historically powerless) identified that hedge funds had shorted a company more than 100% of its available shares (technically illegal-ish, practically ignored). They coordinated on Reddit not primarily for profit but as a <em>symbolic attack on financial power structures</em>. The price run was partly financial, partly a ritual of collective defiance. The hedge funds lost billions. The crowd mostly also lost money — but that was partially not the point. Understanding this psychology tells you when crowd behavior has a financial logic vs a social/symbolic one.
</div>

<div class="tip">Herding behavior — following the crowd — is an evolutionary adaptation. On the savanna, if everyone ran from a bush, you ran too. The ones who stopped to verify if there was a lion got eaten. This reflex is deeply wired and saves lives. In markets, it destroys wealth. The instinct that kept your ancestors alive is the same instinct that makes you buy at the peak of a bubble.</div>
`,
prompt:`I want to understand the behavioral and social forces behind a current market situation.

Situation: [describe a recent market event, stock run-up, crypto mania, IPO frenzy, or meme stock situation]

Please analyze through an anthropological/sociological lens:
1. What psychological mechanisms are driving participant behavior? (mimetic desire, herding, status signaling, in-group identity, etc.)
2. How does this compare to historical crowd behavior in past bubbles or manias?
3. Is this a "cargo cult" situation — people copying behavior without understanding the mechanism?
4. What social or economic conditions created the conditions for this to happen?
5. What will the narrative be 2 years from now — how will this event be remembered?
6. What's the rational kernel at the center of what might be irrational behavior?
7. At what point does the crowd's behavior become self-fulfilling (belief makes the thing true) vs self-defeating?`
},

{
title:"Your Brain Is Not Your Friend Here",
subtitle:"08 — The Biases That Eat Money",
vizLabel:"▶ the emotion cycle — where are you?",
viz:"psychology",
body:`
<p>The biases below are not character flaws. They are <strong>features that evolved over millions of years for survival on the savanna</strong>. They are catastrophically mismatched to financial decision-making — the same way night vision goggles are useless in daylight. Not broken. Wrong environment.</p>

<div class="spamton">THE [[FINANCE INDUSTRY]] WANTS YOUR EMOTIONS TO MAKE YOUR DECISIONS!! [[FEAR]] sells protection products!! [[GREED]] sells lottery tickets and options!! Your biases are <strong>[[THEIR REVENUE]]</strong>!! <span class="sp-small">— understanding your biases doesn't make them go away. but it creates a tiny gap between the impulse and the action. that gap is where wealth is built.</span></div>

<div class="step-card"><span class="step-num">THE EMOTION CYCLE — WHAT THE CHART SHOWS</span>
Every market cycle creates the same emotional arc. The dangerous insight: <strong>the maximum financial opportunity and the maximum psychological pain occur at the same moment</strong>. When everyone is screaming about what a terrible investment something is — that's often the best time to buy. When everyone is euphoric and calling it genius — that's often the time to question your position. Watch the animated dot on the right — that's "you" going through the cycle.
</div>

<div class="step-card"><span class="step-num">THE SIX BIASES MOST LIKELY TO HURT YOU</span>
<strong>FOMO (Fear of Missing Out)</strong> — "everyone is making money and I'm not." This drives buying at tops. If a friend who doesn't invest is telling you about a hot stock, you are probably near the top.<br><br>
<strong>Loss Aversion</strong> — losing $100 feels 2.5× worse than gaining $100 feels good (Daniel Kahneman's actual research). This causes investors to hold losers too long ("it'll come back") and sell winners too early ("lock in the gains").<br><br>
<strong>Confirmation Bias</strong> — once you own a stock, you unconsciously read every piece of news as confirmation you were right. You stop updating your belief with new information.<br><br>
<strong>Recency Bias</strong> — whatever just happened, you expect to keep happening. Market just crashed 20%? You expect more crashing. Market just ran up 30%? You expect more running. Recency bias is why people panic-sell bottoms and FOMO into tops.<br><br>
<strong>Overconfidence</strong> — studies consistently show that people rate themselves above average at investing even after sustained losses. Three wins in a row does not make you smart. It makes you lucky, so far.<br><br>
<strong>Disposition Effect</strong> — the tendency to sell your winners (they feel good to cash in) and keep your losers (selling means admitting you were wrong). Professional traders do the opposite: cut losses fast, let winners run.
</div>

<div class="tip">The antidote to all biases is the same: <strong>a written plan made before you enter a trade</strong>. Write down: why am I buying this? What would prove me wrong? At what price will I exit if I'm wrong? At what price will I take profits? Tape it to your monitor. Your future emotional self will try to override it. Don't let them.</div>
`,
prompt:`Help me audit a recent investment decision for behavioral biases.

Decision: [describe a trade or investment decision you made — buying, selling, holding, or not buying something]

Please analyze:
1. Which specific cognitive biases might have influenced this decision? (FOMO, loss aversion, confirmation bias, recency bias, overconfidence, anchoring, herding, etc.)
2. What would a purely rational actor have done with the same information?
3. What information did I probably seek out vs avoid in making this decision? (confirmation bias test)
4. If the outcome was bad: was it bad because of bad reasoning, or bad luck? (These are different.)
5. If the outcome was good: was it good because of good reasoning, or good luck?
6. What decision process changes would make me less vulnerable to these biases in the future?

Be direct. I want to learn, not be validated.`
},

{
title:"The Fed Runs Everything",
subtitle:"09 — Interest Rates & Your Money",
vizLabel:"▶ rates vs. market — the see-saw",
viz:"macro",
body:`
<p>There is one group of about 12 people whose decisions ripple through every stock price, bond yield, mortgage rate, car loan, and savings account on Earth. They meet 8 times per year in Washington. They are the <strong>Federal Open Market Committee</strong>. When people say "the market is reacting to the Fed," this is who they mean. Understanding what they're doing — and the mechanics of why it matters — unlocks about 60% of "why is the market doing that."</p>

<div class="spamton">[[THE FED]] CONTROLS THE [[PRICE OF MONEY]] ITSELF!! Everything chains off their decisions!! Learning to read their statements is like <strong>[[LEARNING TO READ THE WEATHER]]</strong>!! Free, public, and <span class="sp-small">extremely dry to read but genuinely worth doing. the statements are published at federalreserve.gov immediately after each meeting. the language is careful and deliberately hedged. "patient" = not moving soon. "data dependent" = they have no idea. "attentive to risks" = they are nervous.</span></div>

<div class="vocab"><span class="vt">"Interest Rate"</span> — when you borrow money, someone charges you for the use of it. That charge, expressed as a percentage of what you borrowed, is the interest rate. The Fed doesn't directly set mortgage rates or car loan rates — it sets the "federal funds rate," which is what banks charge each other overnight. But everything else chains off this number. It's the price floor for all borrowed money.</div>

<div class="step-card"><span class="step-num">WHY RATES MOVE EVERYTHING</span>
<strong>Low rates</strong>: borrowing is cheap. Companies borrow to invest and grow. People borrow to buy houses and cars. The economy expands. Investors, seeking return, accept more risk — so stocks go up. Tech stocks (future profits matter) go up especially, because cheap money makes distant future profits worth more today.<br><br>
<strong>High rates</strong>: borrowing is expensive. Growth slows. Bonds now pay decent interest — maybe 5% risk-free. Suddenly, owning stocks (risky) for the same 5% expected return looks less attractive. Money flows into bonds. Tech stocks (which rely on cheap growth capital) get hit hardest.<br><br>
The see-saw: rates up → stocks often down, especially growth. Rates down → stocks often up.
</div>

<div class="step-card"><span class="step-num">INFLATION — YOUR CASH IS MELTING</span>
Inflation means the same dollar buys less over time. At 3% inflation, $100 today = $97 of buying power next year. At 8% inflation (2022 levels), your cash savings are losing 8% per year just sitting in a bank account earning 0.01% interest.<br><br>
This is why investing exists. <strong>Stocks, on average, return ~7-10% per year over long periods</strong>. They beat inflation. Cash doesn't. Owning a business (which raises prices as inflation rises) protects against inflation. Owning cash does not. This is the entire case for investing in one paragraph.
</div>

<div class="vocab"><span class="vt">"Yield Curve"</span> — a graph that plots interest rates for different loan durations (1 year, 2 years, 10 years). Normally, longer loans pay higher rates (more risk for the lender). When the curve "inverts" — short-term rates exceed long-term rates — it means the market expects rates to fall, which historically precedes recessions. An inverted yield curve has predicted every US recession since the 1960s. Not guaranteed, but worth watching.</div>

<div class="tip">When the Fed speaks, the market moves. Watch the Fed's quarterly press conferences on YouTube or read the meeting minutes on federalreserve.gov. The language they use is deliberately careful — learn to parse it. "Patient" means "not moving soon." "Data dependent" means "we have no idea." "Concerned about inflation" means "rates might go up."</div>
`,

Please explain:

// ══════════════════════════════════════
// SECTION 5: CRYPTO
// ══════════════════════════════════════
{
title:"Crypto: What It Actually Is",
subtitle:"10 — The Blockchain Demystified",
vizLabel:"▶ blockchain as a shared ledger",
viz:"crypto",
body:`
<p>Cryptocurrency has more hype, more scams, more genuine innovation, and more confusion per square inch than any other asset class. Let's do surgery on it and look at what's actually inside.</p>

<div class="vocab"><span class="vt">"Blockchain"</span> — someone needed to describe a database that nobody owns and everyone can see, where every entry is permanent and verified by thousands of computers. They called it a blockchain because the records are organized into "blocks" that are "chained" together cryptographically. Once written, nothing can be deleted or modified without redoing the work on every computer simultaneously. It's just a new kind of database with those specific properties.</div>

<div class="step-card"><span class="step-num">BITCOIN — WHAT IS THE ACTUAL PITCH</span>
Bitcoin is the first cryptocurrency, created in 2009 by an anonymous person or group called Satoshi Nakamoto. The pitch, stripped of mythology:<br><br>
— There will <strong>only ever be 21 million Bitcoin</strong>. Built into the code. Cannot be changed without everyone agreeing.<br>
— No government controls it. No bank can freeze it.<br>
— You can send it to anyone on earth in minutes with no intermediary taking a cut (except tiny network fees).<br>
— It is <em>digital scarcity</em>. Before Bitcoin, any digital file could be copied infinitely. Bitcoin cannot be.<br><br>
The bear case: it's slow for payments, uses enormous energy, and is mostly held, not used. The bull case: it's digital gold. Gold doesn't "do" anything either. It just has agreed-upon scarcity.
</div>

<div class="step-card"><span class="step-num">ETHEREUM — A COMPUTER YOU CAN'T TURN OFF</span>
Ethereum is different in a key way: it's a programmable blockchain. You can deploy code to it (called "smart contracts") that run automatically when conditions are met, forever, without any company maintaining them.<br><br>
This enables: DeFi (loans and trading without banks), NFTs (proof of ownership of digital items), DAOs (organizations run by code instead of executives). Most of it is very early and experimental. Some of it will change how institutions work. Most of the current applications are speculative.
</div>

<div class="step-card"><span class="step-num">ALTCOINS — BE HONEST</span>
There are 20,000+ cryptocurrencies. The vast majority are: solutions looking for problems, copies of Bitcoin/Ethereum with slight modifications, or outright scams. A few have genuine technical innovations or specific use cases.<br><br>
The honest question to ask of any altcoin: <em>what specific problem does this solve that Bitcoin or Ethereum can't, and who actually needs this solved urgently enough to pay for it?</em> If you can't answer that clearly, proceed with maximum skepticism.
</div>

<div class="spamton">CONGRATULATIONS!! You have discovered a [[NEW TOKEN]] with a [[1000X POTENTIAL]]!! The founder is <strong>[[DEFINITELY NOT ANONYMOUS]]</strong> and the whitepaper is <strong>[[TOTALLY REAL]]</strong>! Only 48 hours to get in on the presale!! <span class="sp-small">— this is what a rug pull looks like. if someone is this excited about a coin, they want you to buy so they can sell.</span></div>

<div class="risk-pill hi">VOLATILE</div>
<div class="risk-pill hi">REGULATORY RISK</div>
<div class="risk-pill nuke">ALTCOIN ROULETTE</div>
`,
prompt:`Explain [CRYPTOCURRENCY NAME] to me like I'm a skeptical but genuinely curious person.

Cover:
1. What specific problem was this designed to solve? (Not what it became — what was the original engineering goal?)
2. How does it actually work technically — in plain English, not marketing language
3. Who actually uses this and for what real-world purpose right now?
4. What makes it different from Bitcoin and Ethereum — and is that difference meaningful?
5. Tokenomics: how many exist? Is there a supply cap? Who owns the largest amounts?
6. The team: are they identifiable, credible, and do they have skin in the game?
7. The honest bear case: why might this be worth nothing in 5 years?
8. The honest bull case: what would have to be true for this to succeed?

Don't hype it and don't dismiss it. I want an honest engineering and business assessment.`
},

{
title:"Crypto: How Not to Get Wrecked",
subtitle:"11 — Surviving the Wild West",
vizLabel:"▶ crypto risk spectrum",
viz:"cryptorisk",
body:`
<p>The crypto space produces more genuine millionaires and more genuine devastated people per year than any other asset class. The difference between them is almost entirely about <strong>risk management and scam recognition</strong> — not timing or genius.</p>

<div class="step-card"><span class="step-num">THE SCAM TAXONOMY</span>
<strong>Rug Pull</strong>: developers create a token, hype it up, attract investment, then drain the liquidity pool and disappear with the money. Signs: anonymous team, no audited code, massive promises, aggressive referral programs.<br><br>
<strong>Pump and Dump</strong>: coordinated buying to inflate a low-volume coin's price, then mass selling into the spike. Telegram and Discord groups run these constantly. If you're getting "alpha" in a group chat, you're the exit liquidity.<br><br>
<strong>Phishing</strong>: fake websites, fake support, fake MetaMask extensions asking for your seed phrase. <em>Nobody legitimate ever needs your seed phrase.</em> Write it down. Store it offline. Give it to no one.<br><br>
<strong>Yield Farming Traps</strong>: "100% APY on your crypto!" Sometimes real (briefly). Usually either inflated with the protocol's own worthless token, or about to be rugged.
</div>

<div class="step-card"><span class="step-num">THE LEGITIMATE RISK SPECTRUM</span>
<em>Bitcoin</em> — most established, most liquid, most regulated. Still wildly volatile vs stocks.<br>
<em>Ethereum</em> — strong network effects, real usage, institutional adoption. More volatile than BTC.<br>
<em>Large-cap altcoins (Solana, etc.)</em> — more volatile, more speculative, higher potential gain AND loss.<br>
<em>Mid-cap projects</em> — often 80-99% losses in bear markets. Only buy what you've genuinely researched.<br>
<em>New / low-cap tokens</em> — assume most go to zero. Size accordingly.<br>
<em>Memecoins</em> — pure speculation and community gambling. Treat as lottery tickets or entertainment.
</div>

<div class="vocab"><span class="vt">"Seed Phrase / Recovery Phrase"</span> — when you create a crypto wallet, you get 12 or 24 random words. These words, in that exact order, ARE your wallet. They generate your private keys. Anyone who has these words owns your crypto. There is no customer service. No recovery. If you lose it and someone else finds it, your crypto is gone forever. Treat it like the only key to a vault with your life savings.</div>

<div class="spamton">MAKE [[PASSIVE INCOME]] WITH YOUR CRYPTO!! Just give us your <strong>[[SEED PHRASE]]</strong> and we'll stake it for you!! [[100% SAFE]] GUARANTEED RETURNS!! <span class="sp-small">— again. never. your seed phrase is the master key. nobody needs it for any legitimate reason ever.</span></div>

{
title:"The Broke Person's Playbook",
subtitle:"12 — Starting With Almost Nothing",
vizLabel:"▶ dollar-cost averaging — $100/month",
viz:"dca",
body:`
<p>The biggest lie in finance: "you need money to make money." The second biggest lie: that you need to be in the US on a specific platform using specific accounts. The gap between $0 and $25/month is smaller than you think. What you actually need: a phone, a bank account, and the stubbornness to start before you feel ready.</p>

<div class="spamton">BECOME A [[BIG SHOT]] WITH JUST <strong>[[$1]]</strong>!! Fractional shares mean you can own [[APPLE]] and [[NVIDIA]] and [[AMAZON]] TODAY with pocket change!! The [[RICH PEOPLE]] DON'T WANT YOU TO KNOW!! <span class="sp-small">— this is actually true though. fractional shares changed everything for small investors. this is a real democratization moment. but you still need a plan. a plan!</span></div>

<div class="step-card"><span class="step-num">STEP 0 — DO THIS BEFORE ANY INVESTING (NON-NEGOTIABLE)</span>
<strong>1. Kill high-interest debt first.</strong> A credit card charging 22% APR is a guaranteed 22% loss per year. The S&P 500 averages about 10% annually. You mathematically cannot invest your way out of high-interest debt. Minimum payments on everything, avalanche the highest-rate debt first.<br><br>
<strong>2. Build a baby emergency fund.</strong> $1,000 sitting somewhere boring (a high-yield savings account). Without this, one car repair wipes out months of investing and forces you to sell at the worst time.<br><br>
<strong>3. High-Yield Savings Account (HYSA)</strong> — regular savings accounts pay 0.01% interest. HYSAs (Marcus by Goldman, Ally, SoFi, Wealthfront Cash) pay 4-5%+ on cash. Move your emergency fund there first. That's already better than most managed funds, risk-free, right now. It's not investing but it beats nothing by a mile.
</div>

<div class="step-card"><span class="step-num">STEP 1 — FREE MONEY FIRST (IF YOU HAVE A JOB IN THE US)</span>
<strong>401k employer match = literal free money, no debate.</strong> If your employer matches 50% of contributions up to 6% of salary — and you don't contribute — you are leaving free money on the table. This is the only guaranteed 50-100% return in investing. Always, always take the full match before any other investing.
</div>

<div class="step-card"><span class="step-num">STEP 2 — THE ACCOUNTS THAT SAVE YOU TAXES (US)</span>
<strong>Roth IRA — the GOAT for most people starting out</strong><br>
Contribute after-tax dollars. All growth is tax-free forever. Withdraw the gains tax-free after 59½. 2025 limit: <em>$7,000/year</em> (or your earned income, whichever is less). On $100/month DCA for 30 years at 7% real return → ~$122K. You invested $36K. You owe <strong>zero tax</strong> on the $86K gain. Open one at Fidelity, Schwab, or Vanguard for free.<br><br>
<strong>HSA — the Triple Tax Advantage</strong><br>
Only available if you have a High-Deductible Health Plan. Contributions are pre-tax. Growth is tax-free. Withdrawals for medical expenses are tax-free. Zero other account in existence does all three. 2025 limit: $4,300 individual / $8,550 family. Don't touch it for medical costs now — invest it and let it compound. After 65 you can withdraw for anything (like a traditional IRA).<br><br>
<strong>If your income is too high for Roth IRA directly</strong> — look up "Backdoor Roth IRA." Legal, legitimate workaround for higher earners.
</div>

<div class="step-card"><span class="step-num">STEP 3 — THE APPS (BY WHERE YOU LIVE)</span>
<em>🇺🇸 USA</em><br>
<strong>Fidelity</strong> — best overall. $1 fractional shares. No fees. Excellent research. Trust it with your Roth IRA.<br>
<strong>Charles Schwab</strong> — $5 fractional shares (Stock Slices). Excellent long-term option. Strong research tools.<br>
<strong>Robinhood</strong> — $1 fractional. Clean UI. Robinhood Gold ($5/mo) gives 3% IRA match on contributions — actually significant. Payment-for-order-flow model means your trades are sold to market makers (not a dealbreaker, just know it).<br>
<strong>M1 Finance</strong> — build custom "pies" of stocks/ETFs, auto-rebalances. Good for set-and-forget investing.<br>
<strong>Acorns</strong> — rounds up every purchase to nearest dollar and invests the change. $3/month. Psychologically brilliant for people who can't bring themselves to manually invest.<br>
<strong>Public</strong> — fractional shares from $5. Social features. Good for learning alongside others.<br><br>
<em>🇬🇧 UK</em><br>
<strong>Freetrade</strong> — commission-free stocks and ETFs. ISA available (UK's tax-free wrapper = similar to Roth IRA). Clean app.<br>
<strong>Trading 212</strong> — commission-free, fractional from £1. ISA included. Very popular with beginners.<br>
<strong>Vanguard UK</strong> — low-cost index funds. Boring. Perfect.<br><br>
<em>🇪🇺 Europe</em><br>
<strong>Trade Republic</strong> (Germany-based, EU-wide) — €1 per trade, commission-free savings plans. Fast-growing, regulated by BaFin.<br>
<strong>Lightyear</strong> — commission-free ETFs, multi-currency. Available across most of EU.<br>
<strong>DEGIRO</strong> — low fees, massive selection, available in 18+ European countries.<br><br>
<em>🌍 Global (anywhere)</em><br>
<strong>Interactive Brokers</strong> — available in 200+ countries. Commission-free in US, very low elsewhere. Best for people outside US/EU who want access to US markets. Slightly more complex UI.<br>
<strong>eToro</strong> — available in 140+ countries. Copy Trading feature lets you mirror verified investors. Commission-free stocks but 1% crypto spread.
</div>

<div class="step-card"><span class="step-num">STEP 4 — DOLLAR-COST AVERAGING — YOUR ONLY JOB</span>
Invest the same fixed amount every month. Rain or shine. Market up or down. $50, $100, $25 — whatever is real for you. This does something magical:<br><br>
— When market is DOWN your $100 buys <em>more shares</em><br>
— When market is UP your $100 buys fewer shares<br>
— Over time, you automatically buy more when cheap and less when expensive<br>
— You permanently escape the impossible question: "is now a good time?"<br><br>
<em>The math, concretely:</em> $100/month × 30 years × 7% real return = ~$122,000. You contributed $36,000. The other $86,000 is your shares generating more shares generating more shares. That's compound interest and it's the only force in finance that unambiguously works for you, not against you.
</div>

<div class="step-card"><span class="step-num">STEP 5 — WHAT TO ACTUALLY BUY (THE BORING TRUTH)</span>
<strong>SPY or VOO</strong> — S&P 500. The 500 biggest US companies. ~0.03-0.09% annual fee. This is what ~95% of professional fund managers fail to beat over 20 years.<br>
<strong>VTI</strong> — Total US market. Everything, not just top 500. Marginally more diversification.<br>
<strong>VT</strong> — Total World. US + international. One fund, whole planet. Vanguard, ~0.07% fee.<br>
<strong>QQQ or QQQM</strong> — Nasdaq 100. Heavy tech. More volatile. Better returns in bull markets, worse in downturns. Only if you understand what you're getting.<br><br>
For most people: 80% VTI or SPY + 20% international (VXUS or VEA) is sufficient for a decade or more. Add individual stocks only when you have a clear thesis that beats the index case.
</div>

<div class="step-card"><span class="step-num">STEP 6 — DRIP — LET DIVIDENDS COMPOUND FOR FREE</span>
Dividend Reinvestment Plan: instead of receiving quarterly dividends as cash, automatically reinvest them in more shares. Most brokerages let you turn this on with one click. Why it matters: a $10,000 S&P 500 portfolio held 20 years WITHOUT dividend reinvestment grew to ~$112,000. WITH reinvestment: ~$196,000. Same stock. Same time. $84,000 more. The difference is DRIP. Turn it on everywhere.
</div>

<div class="tip">If you're not in the US, look up your country's equivalent of tax-advantaged accounts: UK has ISAs, Canada has TFSAs, Australia has Superannuation, France has PEA plans. These are the equivalent of Roth IRAs — use them before taxable accounts. The specific rules differ but the principle is the same: government lets you invest tax-free in certain wrappers because they want you to save.</div>

<div class="challenge">Right now: open the App Store and download Fidelity (US), Freetrade (UK), or Trade Republic (EU). Creating an account takes 10 minutes. You don't have to put money in yet. Just see what it looks like. Most people who "plan to start investing" never touch an actual brokerage interface. That's the actual barrier. Not knowledge. Interface.</div>
`,

My situation:
- I have $[STARTING AMOUNT] to put in right now

{
title:"IPOs & New Launches",
subtitle:"13 — Getting In Early (Carefully)",
vizLabel:"▶ IPO price cycle — hype vs reality",
viz:"ipo",
body:`
<p>Every tech giant — Apple, Google, Amazon, Facebook — was once a private company that "went public." Being early to a great company going public sounds like free money. It often isn't. Understanding why separates the informed from the hopeful.</p>

<div class="vocab"><span class="vt">"IPO (Initial Public Offering)"</span> — a private company decides to sell shares to the public for the first time. "Initial" because it's the first time. "Public" because anyone can buy. "Offering" because the company is offering shares at a set price. Investment banks manage the process, set the price, and take a 2-7% fee. The company uses the money raised to grow, pay debts, or let early investors/employees cash out.</div>

<div class="step-card"><span class="step-num">THE IPO PROCESS — WHAT'S ACTUALLY HAPPENING</span>
1. Company hires investment banks (Goldman, Morgan Stanley, etc.)<br>
2. Files an S-1 document with the SEC — this is your research bible. It's public. Read it.<br>
3. Roadshow: executives pitch the company to large institutional investors to build demand<br>
4. Price is set based on institutional demand<br>
5. Shares open for public trading — often pop significantly on day one<br>
6. Lock-up period (90-180 days): insiders can't sell. When this expires, expect selling pressure.<br><br>
The average IPO pops ~20% on day one — but most retail investors buy <em>after</em> that pop, not at the IPO price. They buy at the peak of hype, not at the offering price.
</div>

<div class="step-card"><span class="step-num">SPAC vs. DIRECT LISTING vs. IPO</span>
<strong>SPAC (Special Purpose Acquisition Company)</strong> — a blank check company that goes public to raise money, then finds a private company to merge with. Faster than IPO, less regulatory scrutiny. Red flag: often brings worse companies public without the same disclosure requirements. SPAC sponsors are highly incentivized regardless of outcome.<br><br>
<strong>Direct Listing</strong> — the company doesn't issue new shares, just lets existing shareholders sell publicly. Spotify and Coinbase did this. No underwriter premium. Fairer opening price discovery. Worth paying attention to.
</div>

<div class="step-card"><span class="step-num">HOW TO FIND NEW LAUNCHES WORTH WATCHING (BEFORE THE S-1)</span>
<strong>Pre-IPO signals — where organic traction shows up first:</strong><br><br>
— <strong>Product Hunt (producthunt.com)</strong> — the daily leaderboard of new tech products. Products that hit #1 Product of the Day and maintain strong community engagement are showing real product-market fit. Notion, Figma, Robinhood, Loom, and Linear all launched here years before their IPO hype. Browsing it weekly is free trend reconnaissance. Companies like Vercel, Notion, and Airtable had passionate PH communities long before press ever noticed them.<br><br>
— <strong>App Store / Google Play Top Grossing charts</strong> — a consumer app consistently ranked in the Top Grossing chart is making real, recurring revenue. If a company claims strong mobile engagement but doesn't appear anywhere in Top Grossing, probe that.<br><br>
— <strong>Sensor Tower / Similarweb</strong> — download trend charts. A consumer app with 6 consecutive months of accelerating downloads across multiple geographies is showing pre-IPO growth.<br><br>
— <strong>IPO Calendar on Nasdaq.com</strong> — free, upcoming IPO dates and size<br>
— <strong>SEC EDGAR S-1 filings</strong> — read the actual filing before analysts spin it<br>
— <strong>Renaissance Capital IPO ETF (ticker: IPO)</strong> — a fund of recent IPOs, tracks the sector as a whole<br>
— <strong>r/wallstreetbets, VC firm portfolios (a16z, Sequoia)</strong> — when portfolio companies file S-1s, the firm's track record tells you something about quality
</div>

<div class="spamton">[[HOT NEW IPO]] — only the [[BIG SHOTS]] get in at the offering price!! You will buy it [[6 MONTHS LATER]] at 3× the offering price after the lockup expires and insiders dump their shares!! <span class="sp-small">— this is why "getting in on IPOs" rarely works for regular people. the institutional investors set the price and get the initial allocation. you see it after the first-day pop. waiting 6-12 months post-IPO often produces better entry points.</span></div>
`,
prompt:`Analyze the upcoming or recent IPO for [COMPANY NAME] as if I'm considering buying within the first 6 months.

From the S-1 filing (or your knowledge), please cover:
1. Why is this company going public now? (Raise capital? Cash out VCs? Currency for acquisitions?)
2. Revenue trend, growth rate, and path to profitability — are the numbers real or is this "growth at all costs"?
3. Who are the major shareholders and what's their lock-up expiration date?
4. What does management say in the risk factors section — what could go wrong?
5. How does the IPO valuation compare to comparable public companies? (Cheap, fair, expensive?)
6. What's the story vs. the substance — is this a real business or a compelling narrative?
7. Is there a better entry point likely in 6-12 months (post-lockup, first few earnings reports)?

Red flags to specifically look for: excessive related-party transactions, multiple share classes with founder control, declining gross margins, no clear path to profitability.`

{
title:"Options: The Betting Window",
subtitle:"14 — Power Tool or Trap",
vizLabel:"▶ options payoff diagram",
viz:"options",
body:`
<p>Options are not for most beginners. They're also not the dark mysterious art that finance makes them sound like. They're just <strong>contracts that give you the right to buy or sell something at a set price by a set date</strong>. Once you understand this, you understand 90% of options. The other 10% is the Greeks, which are just Greek letters attached to normal concepts like "how much does this move when the stock moves."</p>

<div class="spamton">[[OPTIONS]] ARE HOW THE [[BIG SHOTS]] MAKE MONEY!! Buy a [[CALL]] and [[10X]] your investment in a week!! <span class="sp-small">— also: approximately 80% of retail options expire worthless. the people who consistently make money on options are usually the ones selling them, not buying them. this is a "know what you're doing first" zone.</span></div>

<div class="vocab"><span class="vt">"Option"</span> — just a contract. Someone invented the word "option" because the contract gives you the "option" (choice) to do something — you're not obligated. If the trade goes against you, you can let the option expire worthless and lose only what you paid for it. This is unlike buying a stock outright, where losses have no cap until zero.</div>

<div class="step-card"><span class="step-num">CALLS vs. PUTS — THE ONLY TWO TYPES</span>
<strong>CALL option</strong> = the right to BUY 100 shares at the "strike price" before the expiration date. You buy a call when you think the stock will go UP. If Apple is at $180 and you buy a $200 call expiring in 3 months, you're betting Apple will exceed $200 before then.<br><br>
<strong>PUT option</strong> = the right to SELL 100 shares at the strike price before expiration. You buy a put when you think the stock will go DOWN — or to insure a position you already own against a drop. A put on Apple is exactly like buying insurance on your house.
</div>

<div class="step-card"><span class="step-num">THETA — THE CLOCK IS YOUR ENEMY</span>
Options have an expiration date. Every day that passes, the option loses value simply from time passing — called "time decay" or theta. A 3-month option that's going nowhere loses value every single day.<br><br>
This is why retail traders who buy out-of-the-money calls and puts mostly lose money: they're buying something that decays every day, betting on a big move that doesn't come before expiration. The statistics: ~80% of retail options expire worthless. <em>The people selling options collect that 80%.</em>
</div>

<div class="step-card"><span class="step-num">THE LEGITIMATE USES OF OPTIONS</span>
<strong>Buying puts as insurance</strong> — own $10,000 of stock, buy $100 in put options. If the stock crashes, your puts pay out. This is how professionals hedge positions.<br><br>
<strong>Selling covered calls</strong> — own 100 shares of a stock. Sell the right for someone to buy them at a higher price by a certain date. If the stock stays flat, you collect the premium. Boring, consistent income on a long position.<br><br>
<strong>Understanding institutional positioning</strong> — large unusual options activity often precedes big moves. Learning to read options flow is like watching where smart money is placing bets.
</div>

<div class="tip">Start by understanding options before trading them. Paper trade options for 3 months first. The "lottery ticket" approach (buying cheap out-of-the-money options hoping for a huge move) is how people turn $5,000 into $0 faster than any other method. The professional approach is usually selling options, not buying them.</div>
`,
prompt:`Explain options to me like I'm genuinely curious but have never traded them.

Specifically:
1. What is a call option — walk through a real example with numbers (Apple at $180, $200 call, 90 days out, $3 premium)
2. What is a put option — same thing, real example
3. What is the "premium" — what am I actually paying for when I buy an option?
4. What are the "Greeks" (delta, theta, vega, gamma) and why do they matter in plain English?
5. Why do most people who buy options lose money? What's the math against them?
6. What are the three most legitimate uses of options for a regular investor? (Not speculation)
7. Walk me through what "selling a covered call" means and how it generates income
8. What's the riskiest thing you can do with options and why?

Give me enough understanding to not do something stupid, and to know if/when options would genuinely be useful to me.`
},

{
title:"Whales, Dark Pools & Manipulation",
subtitle:"15 — How the Big Money Moves",
vizLabel:"▶ unusual options activity + dark pool",
viz:"whales",
body:`
<p>The version of markets you see on your screen is not the whole market. Large institutions operate in ways that are largely invisible to retail investors — by design. Understanding this doesn't mean you're paranoid. It means you're realistic.</p>

<div class="vocab"><span class="vt">"Dark Pool"</span> — private trading venues where large institutions trade without the orders being visible to the public until after they execute. This exists because if BlackRock tried to buy $500 million of Apple stock on the public exchange, every algorithmic trader would see the order coming and front-run it — buying Apple first and selling it back at a higher price. Dark pools solve this by hiding the order until it's done. Legal, common, accounts for ~40% of US stock trading volume.</div>

<div class="step-card"><span class="step-num">THE 13F — WHAT BUFFETT BOUGHT, 45 DAYS LATER</span>
Any institution managing more than $100 million must file a quarterly "13F" report with the SEC, disclosing all their equity holdings. This is public. Free. On EDGAR.<br><br>
Warren Buffett's Berkshire Hathaway files 13Fs. You can see exactly what he bought and sold each quarter — just 45 days after the fact. Sites like dataroma.com and whalewisdom.com aggregate this data beautifully. You're not getting the same entry price as Buffett, but you're getting his analysis for free.
</div>

<div class="step-card"><span class="step-num">UNUSUAL OPTIONS ACTIVITY — READING THE BETS</span>
Before major corporate announcements — earnings, FDA approvals, acquisitions — unusual options activity often appears. Someone buys an unusual number of calls at an unusual strike price with an unusual expiration. This could be:<br><br>
— A legitimate hedge fund making an educated bet<br>
— Insider trading (illegal, but it happens)<br>
— A coincidence<br><br>
Sites like Unusual Whales and Barchart track this. It's not a trading signal by itself, but combined with other analysis, it tells you where large players are positioning.
</div>

<div class="step-card"><span class="step-num">SHORT SELLING — THE PESSIMIST'S BET</span>
Short selling means borrowing shares, selling them now, and hoping to buy them back cheaper later. If you're right, you profit from the decline. If you're wrong, losses are theoretically unlimited (the stock can keep rising).<br><br>
Short sellers are often the market's best researchers — they need to be right about the stock AND the timing. Companies like Enron, Theranos, and Wirecard were identified as fraudulent by short sellers years before regulators caught up. A high "short interest" (% of shares sold short) in a stock means skeptics are betting against it. Worth knowing why.
</div>

<div class="spamton">HAVE YOU HEARD ABOUT [[MARKET MANIPULATION]]?! HEDGE FUNDS SHORT YOUR [[FAVORITE STOCKS]] and then <strong>[[WRITE NEGATIVE REPORTS]]</strong> to make the price fall!! Sometimes this is true! Sometimes the report is also [[CORRECT]]!! <span class="sp-small">— short sellers do sometimes coordinate pressure campaigns. short sellers also do sometimes catch genuine fraud. both are true. read the actual arguments before assuming motive.</span></div>
`,
prompt:`I want to understand how institutional money moves and how I can observe it.

Please explain:
1. What is a dark pool, why do institutions use it, and how does it affect retail traders?
2. How do I read 13F filings — where do I find them, and what do I look for beyond "what did they buy"?
3. How do I use sites like Unusual Whales or Barchart to track unusual options activity? What patterns are meaningful vs noise?
4. What does "short interest" tell me about a stock, and how do I find it? (What % short interest should get my attention?)
5. How does a short squeeze work mechanically? (GameStop / AMC style) — what has to happen for it to occur?
6. Are there legal ways for me to "follow smart money" — and what are the limitations?
7. What are the signs that short seller reports or activist campaigns are credible vs motivated purely by their position?`
},

{
title:"The Art of Not Losing",
subtitle:"18 — Risk Is the Only Thing You Control",
vizLabel:"▶ position size calculator",
viz:"risk",
body:`
<p>Every professional trader agrees on one thing: <strong>the first goal isn't making money — it's not losing everything</strong>. Survival is the prerequisite for profit. This isn't pessimism. It's mathematics. And it's the thing nobody tells beginners because "boring risk math" doesn't sell courses.</p>

<div class="spamton">RISK MANAGEMENT IS <strong>[[BORING]]</strong>!! Nobody posts their risk-adjusted returns on social media!! They post the wins!! The [[LOSS TWEETS]] are deleted!! <span class="sp-small">— the boring math below is why professional traders are still trading after 20 years while the exciting ones blow up and disappear. surviving is the whole game.</span></div>

<div class="step-card"><span class="step-num">THE BRUTAL MATH OF LOSSES</span>
Lose 10% → need 11.1% gain to recover.<br>
Lose 20% → need 25% gain.<br>
Lose 50% → need 100% gain.<br>
Lose 75% → need 300% gain.<br><br>
Keeping losses small isn't "playing it safe." It's keeping your ability to participate in the next opportunity.
</div>

<div class="step-card"><span class="step-num">THE 1-2% RULE — THE ONLY RULE THAT MATTERS</span>
Never risk more than 1-2% of your total portfolio on any single trade. With $10,000, that's max $100-$200 of potential loss per position. If your stop loss is $5 below entry, you can buy 20-40 shares max.<br><br>
This sounds extremely conservative. It's why professionals survive. You'd need 50+ consecutive losing trades to lose half your money. Even bad traders don't lose 50 trades in a row.
</div>

<div class="step-card"><span class="step-num">POSITION SIZING — THE MATH</span>
1. Decide max dollar risk: 1% of $10,000 = $100<br>
2. Decide stop loss: entry at $50, stop at $46 = $4 risk per share<br>
3. Max shares = $100 ÷ $4 = 25 shares<br>
4. Position size = 25 × $50 = $1,250 (12.5% of portfolio)<br>
5. Check: if you're wrong and it hits the stop, you lose exactly $100<br><br>
Use the calculator in the viz panel. This math is the single most important skill in trading.
</div>

<div class="vocab"><span class="vt">"Risk/Reward Ratio"</span> — someone invented this phrase for a simple calculation: how much could I gain divided by how much could I lose. A 3:1 ratio means: if I'm right I make $300; if I'm wrong I lose $100. Professional traders typically won't enter trades below 2:1, and prefer 3:1 or better. With 3:1 R:R, you only need to be right 25% of the time to break even. The math is in your favor.</div>

<div class="tip">The hardest part of risk management isn't knowing the rules — it's following them when a stock you love is falling and you tell yourself it'll come back. Write your stop loss on paper before you buy. Take a screenshot. Set an actual price alert. Your future emotional self will argue. Don't negotiate with them.</div>
`,

<p>You now know: what the market is, how to read numbers and charts, how to evaluate a business and a tech company, what macro forces drive everything, how psychology and crowd dynamics move prices, the full crypto landscape, how to start with almost nothing, how to find new launches, what options are, how institutions move money, what tools to use, and how to manage risk.</p>

{
title:"The Complete Vocabulary Myth-Bust",
subtitle:"20 — Every Term Demystified",
vizLabel:"▶ financial dictionary — no jargon allowed",
viz:"vocab",
body:`
<p>Finance invented specialized vocabulary for the same reason any profession does: <strong>precision, communication efficiency, and gatekeeping</strong>. The first two are legitimate. The third is the one we're defeating here. Every term below is demystified from first principles.</p>

<div class="step-card"><span class="step-num">THINGS THAT ARE JUST WORDS FOR NUMBERS</span>
<strong>Yield</strong> — just the return expressed as a percentage. A bond paying $50/year on a $1000 investment has a 5% yield. Someone decided "yield" sounded more professional than "return rate."<br>
<strong>EBITDA</strong> — Earnings Before Interest, Taxes, Depreciation, and Amortization. Invented to show profitability before accounting decisions (how fast you depreciate equipment, etc.) obscure the underlying business performance. The joke: "earnings before all the bad stuff." Useful for comparing businesses across different tax environments. Easy to abuse by companies hiding real problems behind it.<br>
<strong>Basis Points</strong> — 0.01% = 1 basis point. "100 basis points" = 1%. Used because saying "the rate went from 3.00% to 3.25%" sounds more precise than "a quarter percent." It is marginally more precise. It also sounds more authoritative, which Wall Street enjoys.
</div>

<div class="step-card"><span class="step-num">THINGS THAT ARE JUST CONCEPTS WITH FANCY NAMES</span>
<strong>Alpha</strong> — return above and beyond the market benchmark. If the S&P 500 returns 10% and your portfolio returns 14%, you generated 4% alpha. Someone labeled this to make "beating the market" sound like a scientific achievement.<br>
<strong>Beta</strong> — how much your stock moves relative to the market. Beta of 1.5 = if market drops 10%, stock typically drops 15%. Not a prediction. Just historical correlation in a number. Someone labeled this to make "volatile" sound mathematical.<br>
<strong>Liquidity</strong> — how easily can you convert this to cash without moving the price? A $100 bill is perfectly liquid. Your beach house is illiquid. Most large-cap stocks are highly liquid. Many small-cap stocks and all real estate are less so. "Liquidity" just means "cashability."
</div>

<div class="step-card"><span class="step-num">THINGS THAT SOUND COMPLICATED BUT ARE SIMPLE</span>
<strong>Derivatives</strong> — any financial contract whose value "derives from" something else. Options derive from stocks. Futures derive from commodities or indices. Mortgage-backed securities derive from mortgages. They're just contracts about other things. Most of the 2008 financial crisis was derivatives-on-derivatives (contracts about contracts about contracts about mortgages). It got confusing enough that nobody knew what anything was worth.<br>
<strong>Quantitative Easing</strong> — the central bank creates new money and uses it to buy bonds from banks, injecting cash into the financial system. Labeled "quantitative easing" because "printing money to give to banks" sounded politically problematic in 2008.<br>
<strong>Hedging</strong> — making a second investment designed to offset losses in the first. Buying a stock and buying a put option on it = hedged position. You're insured against a big drop.
</div>

<div class="spamton">THE [[FINANCIAL INDUSTRY]] SPENT DECADES making this sound complicated so you'd [[HIRE THEM]]!! Now you know their [[SECRET LANGUAGE]]!! Use it to make them [[UNCOMFORTABLE]] at dinner parties!! <span class="sp-small">— the concepts genuinely aren't hard. the implementation and discipline are hard. but that's true of everything worth doing.</span></div>
`,
