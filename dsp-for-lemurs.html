body:`<div class="lesson-intro">Phase distortion is arguably the most underrated synthesis method ever made. Available only on the Casio CZ series (1984-1987), it disappeared from mainstream hardware almost immediately &mdash; yet the sounds it produces are genuinely unique. PD does not have a filter. Instead, distorting the phase of a sine wave creates harmonics. The DCW envelope sweeps that distortion over time, producing something that sounds exactly like a filter opening and closing &mdash; without any filter at all.</div>

<div class="step-card"><span class="step-num">HOW DCW ENVELOPES WORK</span>
On the real Casio CZ, the Distortion parameter was controlled by a dedicated DCW (Digital Controlled Waveform) envelope. The DCW Env Sweep slider here simulates it: set Distortion to 0.9 and DCW Env Sweep to 0.8, then hit play. The distortion starts at 0.9 and falls to 0.1 over the note duration &mdash; sounding exactly like a resonant filter closing. This is the single most important PD technique and the reason CZ basses sound so alive.
</div>

<div class="step-card"><span class="step-num">PRESET 0 &mdash; CZ RESONANT LEAD (the signature)</span>
The sound that defined the Casio CZ-101. Shape 0 (sawtooth-PD) at high distortion with a fast DCW sweep. The buzzy, resonant quality on the attack that softens as the note sustains. This is literally impossible to recreate exactly with a standard VCF synthesizer because the 'resonance' is a phase relationship, not a filter peak. Play around with DCW Env Sweep to hear how dramatically it changes character.
</div>

<div class="step-card"><span class="step-num">PRESET 1 &mdash; CZ BASS</span>
Drop the frequency to 80-110 Hz. The phase distortion adds exactly the kind of upper-harmonic content a bass needs to cut through a mix &mdash; controlled by the DCW parameter rather than a filter cutoff. This is how Casio users got bass sounds with no filter: the DCW IS the filter.
</div>

<div class="step-card"><span class="step-num">PRESET 2 &mdash; FLUTE / RECORDER</span>
Low distortion, shape 1 (squeezed-phase). At dist=0.1-0.2 the waveform is nearly sinusoidal and the slow attack mimics breath. As you raise distortion the flute becomes more clarinet-like, then oboe-like. All from the same shape &mdash; just changing how violently the phase is bent.
</div>

<div class="step-card"><span class="step-num">PRESET 3 &mdash; OBOE / REED</span>
Shape 2 (double-cycle PD) at medium distortion. The double-cycle shape produces odd harmonics with a particular weighting that naturally suggests reed instruments. Try setting DCW Env Sweep to 0.3 &mdash; the attack 'squeak' into a sustained reed tone is very convincing.
</div>

<div class="step-card"><span class="step-num">PRESET 4 &mdash; ELECTRIC PIANO</span>
Shape 0 with very fast attack, medium decay. The distortion creates the 'tine' click on the attack. This is how the CZ-1 achieved surprisingly good DX7-adjacent electric piano sounds without any FM &mdash; the harmonic burst at the beginning of phase distortion mimics the hammer strike on a tine.
</div>

<div class="step-card"><span class="step-num">PRESET 5 &mdash; HARD EURO LEAD / RAVE STAB</span>
Maximum distortion, shape 0, very short decay. The DCW at 0.97 fills the waveform with harmonics from top to bottom &mdash; bright and aggressive. The short envelope makes it stab. This is a genuine 1990s rave sound: the CZ-5000 was ubiquitous in early UK hardcore and techno because it was cheap, distinctive, and could cut through a loud PA.
</div>

<div class="step-card"><span class="step-num">PRESET 6 &mdash; METALLIC PERCUSSION</span>
Very short attack and decay, high distortion. Phase distortion at its extremes produces waveforms with irregular harmonic content that sounds metallic and percussive. This is not modeled on any specific instrument &mdash; it is the sound of a mathematical function pushed past its intended range.
</div>

<div class="step-card"><span class="step-num">PRESET 7 &mdash; VOCAL FORMANT</span>
Shape 2 with distortion tuned to emphasize the 3rd-5th harmonic range &mdash; the 'ah' formant zone. Not a realistic voice, but a stylized vocal quality. The CZ series was used extensively for choir-pad textures in 1980s TV music and film scores precisely because this formant emphasis was easy to achieve.
</div>

<div class="step-card"><span class="step-num">PRESET 8 &mdash; LASER / SCI-FI</span>
Rising pitch sweep + high distortion + very short window. The pitch jumps from half-frequency to 4x frequency over 200ms while the phase distortion keeps the harmonic content dense throughout the sweep. Pure sound effect territory.
</div>

<div class="step-card"><span class="step-num">PRESET 9 &mdash; BELL / CARILLON</span>
Medium distortion, long slow decay. The PD waveform at moderate dist has a harmonic structure surprisingly close to a bell's natural inharmonic content. Combined with the exponential decay, it reads convincingly as a struck bell even though every partial is perfectly harmonic.
</div>

<div class="step-card"><span class="step-num">PRESET 10 &mdash; CZ STRINGS (detuned PD duo)</span>
Two phase-distorted oscillators, detuned slightly against each other. The CZ-1 and CZ-5000 had two independent DCO lines per voice specifically for this &mdash; the beating between two PD waveforms at slightly different pitches gives a string-ensemble quality that pure additive or FM cannot quite replicate. The Detune/DCW combination is what CZ string patches actually exploited.
</div>

<div class="step-card"><span class="step-num">PRESET 11 &mdash; HARPSICHORD (CZ-1 classic)</span>
Very fast attack (1ms), fast hard decay (300ms), high distortion. The initial harmonic burst of phase distortion at maximum DCW sounds exactly like the pluck transient of a harpsichord quill. This was one of the most-used CZ-1 preset categories because PD's attack character maps so naturally onto plucked strings.
</div>

<div class="step-card"><span class="step-num">PRESET 12 &mdash; CZ BRASS PIPE (CZ-5000 brass)</span>
Shape 1 with a slow attack and medium DCW sweep. The rising distortion on the attack (DCW envelope going up) creates a bright 'blat' that settles into a rounder tone &mdash; exactly how a brass instrument's lips vibrate from a buzzy transient into a sustained note. The CZ-5000 Brass Pipe preset was famous in 1980s recording studios.
</div>

<div class="step-card"><span class="step-num">PRESET 13 &mdash; RESONANT SWEEP BASS</span>
This is the DCW envelope demo preset. Set Distortion to 0.95, DCW Env Sweep to 0.85, frequency to 80 Hz. The note starts fully distorted (bright, buzzy, full of harmonics) and sweeps closed over 1.5 seconds. It sounds like a TB-303 filter sweep. It is not a filter. It is a mathematical distortion of a phase relationship decaying over time.
</div>

<div class="step-card"><span class="step-num">PRESET 14 &mdash; GLASS ORGAN</span>
Low-to-medium distortion, shape 2, very slow attack. The double-cycle PD shape at gentle distortion produces a glassy, organ-like timbre with a smooth amplitude swell. Popular for ambient and new-age CZ patches. The softness comes from the shape 2 distortion being gentler on the harmonic structure than shape 0.
</div>

<div class="step-card"><span class="step-num">PRESET 15 &mdash; DIGITAL NOISE BURST</span>
Maximum everything: maximum distortion, instant attack, very short decay. PD at dist=0.97 produces a waveform that is so harmonically dense it approaches noise. At very short durations it sounds like a digital zap, click, or percussion hit. This is what happens when you push phase distortion past the 'musical' range into sonic territory the Casio engineers probably did not intend.
</div>`,
code:`// -- PHASE DISTORTION SYNTHESIS: 16 PRESETS --
// Casio CZ method: warp the phase curve of a sine to add harmonics.
// No filter -- DCW (distortion depth) is the only brightness control.
//
// shape: 0=sine  1=sawtooth  2=double-sine  3=saw-pulse
//        4=resonant  5=resonant-saw  6=resonant-triangle  7=resonant-pulse
// dist:  0 = clean sine, 1 = maximum harmonics
// env:   true = DCW sweeps 0->dist on attack (simulates a filter opening)
//
//  0  Sine Bass       dist=0, just the fundamental, clean sub
//  1  Hollow Pulse    sawtooth shape = nasal and cutting
//  2  Bright Saw      double-sine at full dist = aggressive attack
//  3  Reed            resonant shape = the CZ's signature voice
//  4  Organ Click     distortion opens fast = organ attack character
//  5  Growl Bass      saw-pulse + DCW envelope = evolving growl
//  6  Bell            inharmonic ratio + double-sine = metallic bell
//  7  Choir Pad       resonant-triangle, low dist, long decay
//  8  CZ Strings      dual oscillator with slight detune (the CZ stereo trick)
//  9  Glassy          barely-distorted sine = smooth and cold
// 10  Bright Stab     full dist, fast envelope = attack-heavy hit
// 11  Hollow Bell     resonant-sawtooth, bell-like decay
// 12  Soft Pad        DCW sweep from zero = classic CZ filter-open pad
// 13  Flute           low dist smooth shape = breathy tone
// 14  Buzz            maximum distortion, all harmonics
// 15  Classic CZ Lead saw-pulse + DCW envelope = the canonical CZ patch
function pdShape(phase, shp, d) {
  let dp;
  if (shp === 0) {
    // Sawtooth PD: first half runs fast, second half runs slow
    // d controls how extreme the speed difference is
    if (phase < 0.5) {
      const p = phase / 0.5;
      dp = p < (1 - d) ? p / (1 - d) * 0.5 : 0.5;
    } else {
      const p = (phase - 0.5) / 0.5;
      dp = 0.5 + p * (1 + d * 3) * 0.5;
    }
  } else if (shp === 1) {
    // Squeeze PD: phase is compressed into the first k of the cycle
    // then released quickly - creates a pulse-like shape
    const k = 1 - d * 0.97;
    dp = phase < k ? (phase / k) * 0.5 : 0.5 + ((phase - k) / (1 - k)) * 0.5;
  } else {
    // Double-cycle PD: run the squeeze PD twice per cycle
    // This adds an octave harmonic and changes the overall timbre
    const half = phase < 0.5 ? phase * 2 : (phase - 0.5) * 2;
    const k2 = 1 - d * 0.97;
    const dp2 = half < k2 ? (half / k2) * 0.5 : 0.5 + ((half - k2) / (1 - k2)) * 0.5;
    dp = phase < 0.5 ? dp2 * 0.5 : 0.5 + dp2 * 0.5;
  }
  return Math.sin(Math.max(0, Math.min(dp, 1)) * 2 * Math.PI);
}

// buildPDWave: convert a PD shape into a PeriodicWave.
// We sample the PD function N times, then run a DFT to get
// the real/imaginary Fourier coefficients that WebAudio needs.
// N=256 keeps the DFT fast enough for mobile (256*128 = 32768 ops).
function buildPDWave(audioCtx, shp, dist) {
  const N = 256;
  const real = new Float32Array(N);
  const imag = new Float32Array(N);
  const s = new Float32Array(N);
  for (let i = 0; i < N; i++) s[i] = pdShape(i / N, shp, dist);
  for (let k = 1; k < N / 2; k++) {
    let re = 0, im = 0;
    for (let n = 0; n < N; n++) {
      const a = 2 * Math.PI * k * n / N;
      re += s[n] * Math.cos(a);
      im -= s[n] * Math.sin(a);
    }
    real[k] = re * 2 / N;
    imag[k] = im * 2 / N;
  }
  return audioCtx.createPeriodicWave(real, imag, { disableNormalization: false });
}

function makeSynth(audioCtx, params) {
  const master = audioCtx.createGain();
  master.gain.value = 0.5;
  const now = audioCtx.currentTime;
  const preset = Math.round(params.preset);
  const dist = params.dist;
  const envSweep = params.env || 0; // how much dist falls over the note

  // Per-preset config:
  // [shape(0-2), atkMs, relS, startDistMult, detuneHz, numOscs]
  // startDistMult: multiply dist by this at note start (for DCW-up sweeps)
  // detuneHz: frequency offset for second oscillator (strings/chorus)
  // numOscs: 2 = dual oscillator (CZ-1 style)
  const cfg = [
    [0, 8,   2.0,  1.0,  0, 1],  // 0  CZ resonant lead
    [0, 12,  1.5,  1.0,  0, 1],  // 1  CZ bass
    [1, 35,  2.5,  1.0,  0, 1],  // 2  flute
    [2, 15,  1.8,  1.0,  0, 1],  // 3  oboe/reed
    [0, 4,   0.9,  1.0,  0, 1],  // 4  electric piano
    [0, 5,   0.5,  1.0,  0, 1],  // 5  hard euro lead
    [0, 2,   0.15, 1.0,  0, 1],  // 6  metallic percussion
    [2, 12,  2.5,  0.6,  0, 1],  // 7  vocal formant
    [0, 5,   0.8,  1.0,  0, 1],  // 8  laser/sci-fi
    [1, 10,  3.5,  0.5,  0, 1],  // 9  bell/carillon
    [0, 15,  2.0,  1.0,  3, 2],  // 10 CZ strings (dual osc, detuned)
    [0, 1,   0.3,  1.0,  0, 1],  // 11 harpsichord
    [1, 80,  1.8,  0.4,  0, 1],  // 12 CZ brass pipe
    [0, 10,  1.5,  1.0,  0, 1],  // 13 resonant sweep bass (DCW demo)
    [2, 180, 2.0,  0.4,  0, 1],  // 14 glass organ
    [0, 1,   0.08, 1.0,  0, 1],  // 15 digital noise burst
  ];

  const [shp, atkMs, relS, startDistMult, detuneHz, numOscs] =
    cfg[Math.min(preset, cfg.length - 1)];

  // DCW envelope: distortion starts at dist*startDistMult,
  // falls by envSweep amount over the note duration.
  // This is the killer PD technique - sounds like a filter sweep.
  const distStart = Math.min(0.97, dist * startDistMult);
  const distEnd   = Math.max(0.01, distStart - envSweep);

  const oscs = [];

  // Build each oscillator (1 or 2 depending on preset)
  for (let oi = 0; oi < numOscs; oi++) {
    // For DCW sweep, sample 3 PeriodicWaves at start/mid/end
    // and schedule them. WebAudio can't automate PeriodicWave
    // continuously, so we fake it with 3 timed swaps.
    const steps = envSweep > 0.05 ? 4 : 1;
    const env = audioCtx.createGain();

    // Amplitude envelope
    env.gain.setValueAtTime(0.001, now);
    env.gain.linearRampToValueAtTime(0.9 / numOscs, now + atkMs / 1000);
    env.gain.exponentialRampToValueAtTime(0.0001, now + atkMs / 1000 + relS);
    env.connect(master);

    const osc = audioCtx.createOscillator();
    const baseFreq = params.freq + (oi === 1 ? detuneHz : 0);
    osc.frequency.value = baseFreq;

    // Laser: rising pitch sweep
    if (preset === 8) {
      osc.frequency.setValueAtTime(params.freq * 0.5, now);
      osc.frequency.exponentialRampToValueAtTime(params.freq * 4, now + relS);
    }

    // DCW sweep: swap PeriodicWaves at timed intervals
    // This approximates the continuous DCW envelope of the real CZ.
    for (let step = 0; step < steps; step++) {
      const t = step / steps;
      const d = distStart + (distEnd - distStart) * t;
      const wave = buildPDWave(audioCtx, shp, Math.max(0.01, Math.min(0.97, d)));
      const when = now + (atkMs / 1000) * t;
      // First step: set immediately. Subsequent steps: schedule.
      if (step === 0) {
        osc.setPeriodicWave(wave);
      } else {
        // Use a silent GainNode trick to schedule wave changes
        // We can't schedule setPeriodicWave directly, so we
        // pre-build all waves and store them for scheduled swaps.
        // Simplest reliable cross-platform approach: setTimeout.
        (function(oscRef, w, delay) {
          setTimeout(function() {
            try { oscRef.setPeriodicWave(w); } catch(e) {}
          }, delay * 1000);
        })(osc, wave, when - now);
      }
    }

    osc.connect(env);
    oscs.push(osc);
  }

  const stopAt = now + atkMs / 1000 + relS + 0.1;
  return { node: master, oscs, stopAt };
}

function updateParams(nodes, params) {
  nodes.oscs.forEach(function(osc) {
    osc.frequency.value = params.freq;
  });
}
`},

body:`
<p>Subtractive synthesis (oscillator into filter into amplifier) covers the widest range of any synthesis method. Here are 9 sounds that together demonstrate why the Moog, Juno, Prophet, and TB-303 dominated music production for 40 years.</p>
<div class="step-card"><span class="step-num">PRESET 0 - 303 ACID BASS</span>Sawtooth, LPF, high resonance, envelope modulating cutoff. The TB-303 sound that defined acid house. The key is the resonance peak right at the cutoff frequency combined with the fast cutoff envelope. Drag Cutoff and Resonance for the "squelch."</div>
<div class="step-card"><span class="step-num">PRESET 1 - MOOG BASS</span>Sawtooth, 4-pole LPF (24dB/oct), low resonance, slow cutoff decay. The deep, warm Moog bass that anchored funk, prog rock, and electronic music for decades. Lower freq to 55Hz for a sub bass.</div>
<div class="step-card"><span class="step-num">PRESET 2 - JUNO PAD</span>Sawtooth plus square, LPF with gentle resonance, slow attack. The Roland Juno-106 chorus pad - the defining sound of 80s pop. The width comes from the Juno's chorus effect (detuning) which we approximate with a slight detune.</div>
<div class="step-card"><span class="step-num">PRESET 3 - TRANCE LEAD</span>Sawtooth, LPF, high resonance, fast attack, medium decay. The resonant lead that defined trance from 1993-2005. The resonance peak is the "scream" quality. Drag cutoff to sweep it.</div>
<div class="step-card"><span class="step-num">PRESET 4 - 909 KICK (subtractive)</span>Sine oscillator with pitch envelope (fast fall from 200Hz to 40Hz) plus a punchy amplitude envelope. The TR-909 kick is subtractive at its core: a bridged-T oscillator is just an LC resonant circuit, which is a filter.</div>
<div class="step-card"><span class="step-num">PRESET 5 - SNARE (subtractive)</span>White noise through a high-pass filter plus a short sine burst. The HPF removes the low rumble; what remains is the crack and rattle. Classic subtractive drum synthesis used in every analog drum machine.</div>
<div class="step-card"><span class="step-num">PRESET 6 - WIND / ATMOSPHERE</span>White noise through a slowly-swept bandpass filter. The filter sweep simulates wind gusts and changes in tonal content. Adjust Cutoff to set the "brightness" of the wind. Works as ambient texture or film score atmosphere.</div>
<div class="step-card"><span class="step-num">PRESET 7 - EURO DANCE BASS</span>Square wave, LPF with moderate resonance, very fast attack, medium release. The euro dance bass that drove every 90s club track. Punchy, immediately audible, sits under the kick without fighting it.</div>
<div class="step-card"><span class="step-num">PRESET 8 - LASER / BLASTER SFX</span>Short sine with very fast falling pitch envelope plus white noise burst. Classic sci-fi blaster sound. The fast pitch fall from high to low combined with the noise transient creates the "pew" character.</div>
`,
code:`// -- SUBTRACTIVE SYNTHESIS: 9 SOUND DESIGN PRESETS --
// Oscillator -> Filter -> Amplifier. The Moog, Juno, Prophet, 303.
//
//  0  Moog Bass       sawtooth + 24dB LPF + slow attack
//  1  Lead Saw        two detuned saws + resonant LPF
//  2  Pad             slow attack + long release + warm LPF
//  3  TB-303 Acid     sawtooth + resonant LPF + filter envelope = acid bass
//  4  Analog Brass    fast attack + filter envelope
//  5  Pluck           short envelope + high resonance
//  6  808 Kick        sine + exponential pitch fall
//  7  String Pad      saw + chorus detune + gentle LPF
//  8  Sync Lead       hard-sync at 5:1 + resonant HPF = cutting lead
function makeSynth(audioCtx, params) {
  const master = audioCtx.createGain();
  master.gain.value = 0.6;
  const now = audioCtx.currentTime;
  const preset = Math.round(params.preset);
  const f = params.freq;
  const sr = audioCtx.sampleRate;

  if (preset <= 3) {
    // Tonal presets: osc + filter + env
    const osc  = audioCtx.createOscillator();
    const osc2 = audioCtx.createOscillator();
    const flt  = audioCtx.createBiquadFilter();
    const env  = audioCtx.createGain();
    const mix  = audioCtx.createGain();

    const cfgs = [
      // type, cutoff, Q, atkMs, relS, envAmt, hasOsc2
      ['sawtooth', params.cutoff, params.rez, 5, 0.4, 2000, false],  // 0 acid
      ['sawtooth', params.cutoff, params.rez, 8, 1.2,  400, false],  // 1 moog
      ['sawtooth', params.cutoff, params.rez,200, 3.0,  200, true],  // 2 juno
      ['sawtooth', params.cutoff, params.rez, 6, 0.8, 1500, false],  // 3 trance
    ];
    const [oscType, cutHz, Q, atkMs, relS, envAmt, has2] = cfgs[preset];

    osc.type = oscType; osc.frequency.value = f;
    flt.type = 'lowpass'; flt.frequency.value = cutHz; flt.Q.value = Q;
    env.gain.setValueAtTime(0, now);
    env.gain.linearRampToValueAtTime(0.8, now + atkMs/1000);
    env.gain.exponentialRampToValueAtTime(0.0001, now + atkMs/1000 + relS);

    flt.frequency.setValueAtTime(cutHz + envAmt, now);
    flt.frequency.exponentialRampToValueAtTime(Math.max(cutHz, 50), now + 0.3);

    if (has2) {
      osc2.type = 'square'; osc2.frequency.value = f * 1.003;
      osc2.connect(mix); mix.gain.value = 0.3; mix.connect(flt);
    }
    osc.connect(flt); flt.connect(env); env.connect(master);
    return { node: master, osc, stopAt: now + atkMs/1000 + relS + 0.1 };

  } else if (preset === 4) {
    // 909 kick
    const osc = audioCtx.createOscillator();
    const env = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(180, now);
    osc.frequency.exponentialRampToValueAtTime(40, now + 0.25);
    env.gain.setValueAtTime(1.0, now);
    env.gain.exponentialRampToValueAtTime(0.0001, now + 0.4);
    osc.connect(env); osc.start(now); osc.stop(now + 0.45);
    return { node: env, stopAt: now + 0.5 };

  } else if (preset === 5) {
    // Snare
    const bufLen = Math.floor(sr * 0.2);
    const buf = audioCtx.createBuffer(1, bufLen, sr);
    const dat = buf.getChannelData(0);
    for (let i = 0; i < bufLen; i++) dat[i] = (Math.random()*2-1)*(1-i/bufLen);
    const src = audioCtx.createBufferSource();
    const hpf = audioCtx.createBiquadFilter();
    const env = audioCtx.createGain();
    const osc = audioCtx.createOscillator();
    const tEnv= audioCtx.createGain();
    src.buffer = buf;
    hpf.type = 'highpass'; hpf.frequency.value = 1800;
    env.gain.setValueAtTime(0.7, now);
    env.gain.exponentialRampToValueAtTime(0.0001, now + 0.18);
    osc.type = 'sine'; osc.frequency.value = 180;
    tEnv.gain.setValueAtTime(0.4, now);
    tEnv.gain.exponentialRampToValueAtTime(0.0001, now + 0.05);
    osc.connect(tEnv); tEnv.connect(master);
    src.connect(hpf); hpf.connect(env); env.connect(master);
    src.start(now); osc.start(now); osc.stop(now+0.1);
    return { node: master, stopAt: now + 0.25 };

  } else if (preset === 6) {
    // Wind atmosphere - noise + sweeping BPF
    const bufLen = Math.floor(sr * 3);
    const buf = audioCtx.createBuffer(1, bufLen, sr);
    const dat = buf.getChannelData(0);
    for (let i = 0; i < bufLen; i++) dat[i] = Math.random()*2-1;
    const src = audioCtx.createBufferSource();
    const bpf = audioCtx.createBiquadFilter();
    const env = audioCtx.createGain();
    src.buffer = buf; src.loop = false;
    bpf.type = 'bandpass'; bpf.frequency.value = params.cutoff; bpf.Q.value = 3;
    bpf.frequency.setValueAtTime(params.cutoff*0.5, now);
    bpf.frequency.linearRampToValueAtTime(params.cutoff*2, now+3);
    env.gain.setValueAtTime(0, now);
    env.gain.linearRampToValueAtTime(0.6, now + 0.5);
    env.gain.exponentialRampToValueAtTime(0.0001, now + 3);
    src.connect(bpf); bpf.connect(env); env.connect(master);
    src.start(now);
    return { node: master, stopAt: now + 3.1 };

  } else if (preset === 7) {
    // Euro dance bass
    const osc = audioCtx.createOscillator();
    const flt = audioCtx.createBiquadFilter();
    const env = audioCtx.createGain();
    osc.type = 'square'; osc.frequency.value = f;
    flt.type = 'lowpass'; flt.frequency.value = params.cutoff; flt.Q.value = params.rez;
    env.gain.setValueAtTime(0, now);
    env.gain.linearRampToValueAtTime(0.65, now + 0.008);
    env.gain.exponentialRampToValueAtTime(0.0001, now + 0.4);
    osc.connect(flt); flt.connect(env);
    return { node: env, osc, stopAt: now + 0.5 };

  } else {
    // Laser blaster
    const osc = audioCtx.createOscillator();
    const env = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(f*8, now);
    osc.frequency.exponentialRampToValueAtTime(f*0.5, now+0.3);
    env.gain.setValueAtTime(0.8, now);
    env.gain.exponentialRampToValueAtTime(0.0001, now+0.35);
    osc.connect(env); osc.start(now); osc.stop(now+0.4);
    return { node: env, stopAt: now+0.45 };
  }
}

function updateParams(nodes, params) {
  if (nodes && nodes.osc) nodes.osc.frequency.value = params.freq;
}
`},

{ subtitle:'35 - Appendix: FM Sound Library', title:'Appendix: FM Synthesis Sound Library',
params:[
  {id:'preset', label:'Sound (0-8)', min:0, max:8, step:1, def:0},
  {id:'freq',   label:'Frequency (Hz)', min:40, max:1200, step:1, def:440},
  {id:'index',  label:'Modulation Index', min:0, max:15, step:.1, def:3},
],
body:`
<p>FM synthesis covers sounds that no other method can easily replicate: electric pianos, DX7 bass, metallic percussion, bright brass, and the unmistakable 90s rave stabs. Here are 9 FM presets spanning instruments, effects, and genre-defining sounds.</p>
<div class="step-card"><span class="step-num">PRESET 0 - DX7 ELECTRIC PIANO (E. PIANO 1)</span>The most famous FM sound in history. Carrier at 1x, modulator at 14x, index 3.5. The high modulator ratio creates the bright metallic attack that decays into a rounder sustain. This sound is on more hit records than any other single synthesizer patch.</div>
<div class="step-card"><span class="step-num">PRESET 1 - FM BASS</span>Carrier at 1x, modulator at 1x, moderate index. The self-modulation creates a rich, harmonically dense bass that punches harder than a simple sawtooth. The FM bass is a club music staple.</div>
<div class="step-card"><span class="step-num">PRESET 2 - DX7 BRASS</span>Three operators in series chain. Carrier 1x, M1 1x at index 4, M2 2x at index 2. The chained modulation creates the bright, edgy quality of a brass section. With high index: harsh and aggressive. Lower index: rounder and more natural.</div>
<div class="step-card"><span class="step-num">PRESET 3 - BELL / MARIMBA</span>Carrier at 1x, modulator at 3.5x (inharmonic). The inharmonic ratio creates bell-like partials. Short envelope with fast decay. This is how the DX7 reproduced mallet instruments - no samples needed.</div>
<div class="step-card"><span class="step-num">PRESET 4 - 909 KICK (FM VERSION)</span>Self-modulating carrier with fast pitch fall. FM kick sounds slightly more distorted and "digital" than the subtractive version. The self-feedback creates harmonic distortion at the attack. The defining sound of Detroit techno and Chicago house.</div>
<div class="step-card"><span class="step-num">PRESET 5 - RAVE STAB</span>High modulation index, short envelope, bright carrier. The "stab" that defined rave and early trance. Very high index creates massive sidebands giving it a crunchy, aggressive texture. Modulator at 1x creates sidebands at integer multiples.</div>
<div class="step-card"><span class="step-num">PRESET 6 - EURO DANCE LEAD</span>Moderate FM with a resonant filter approximation (achieved by having the modulator's index change over time). Bright, singing quality with an edge. Every major euro dance act from Eurodance to Eurotrance used FM leads.</div>
<div class="step-card"><span class="step-num">PRESET 7 - METALLIC PERCUSSION</span>Two inharmonic operators in parallel, both modulated. Short burst, no sustain. The inharmonic interaction produces a clanging, industrial hit - used in industrial music and sci-fi soundtracks.</div>
<div class="step-card"><span class="step-num">PRESET 8 - SUBMARINE SONAR / SCI-FI</span>Very slow modulation rate (below audio frequency) creating tremolo, with the carrier pitch gliding. The subsonic modulation interacts with the audio rate to create slow pulsing sweeps. Surreal, underwater, alien.</div>
`,
code:`// -- FM SYNTHESIS: 9 SOUND DESIGN PRESETS --
// Carrier + modulators. Algorithm = who modulates who.
//   algo 0: M1->C          algo 1: M1+M2->C
//   algo 2: M2->M1->C      algo 3: self-feedback
//
//  0  DX7 E.Piano   C:M 1:3.5, index decays -- that 80s piano
//  1  Bell          C:M 1:14, high index = dense metallic sidebands
//  2  Fretless Bass sub carrier, mod adds pluck transient
//  3  Brass Stab    cascade algo, index falls from 8->1
//  4  Marimba       C:M 1:1, short decay, index 0.5 = wooden mallet
//  5  DnB Hit       C:M 1:7, high index, very short = metallic hit
//  6  Flute         C:M 1:1, low index = breathy sine
//  7  Clavinet      C:M 1:4, very short = digital pluck
//  8  Self-Mod Buzz feedback at moderate index = buzzing self-oscillation
function makeSynth(audioCtx, params) {
  const master = audioCtx.createGain();
  master.gain.value = 0.55;
  const now = audioCtx.currentTime;
  const preset = Math.round(params.preset);
  const fc = params.freq;
  const idx = params.index;

  const carrier  = audioCtx.createOscillator();
  const mod1     = audioCtx.createOscillator();
  const mod2     = audioCtx.createOscillator();
  const mGain1   = audioCtx.createGain();
  const mGain2   = audioCtx.createGain();
  const fbGain   = audioCtx.createGain();
  const env      = audioCtx.createGain();

  carrier.type = mod1.type = mod2.type = 'sine';

  // [fc_ratio, fm1_ratio, fm2_ratio, idx1, idx2, atkMs, relS, algo]
  // algo: 0=m1->c, 1=m1+m2->c, 2=m2->m1->c, 3=feedback
  const cfgs = [
    [1,  14,    1, 3.5, 0,   5, 1.8, 0],  // 0 DX7 e.piano
    [1,   1,    1, idx, 0,   6, 0.6, 0],  // 1 FM bass
    [1,   1,    2, 4,   2,   8, 1.2, 2],  // 2 DX7 brass
    [1, 3.5,    1, idx, 0,   5, 1.5, 0],  // 3 bell
    [1,   1,    1, 6,   0,   2, 0.4, 3],  // 4 909 FM kick
    [1,   1,    1, 10,  0,   3, 0.2, 0],  // 5 rave stab
    [1,   2,    1, idx, 0,   6, 0.8, 0],  // 6 euro lead
    [1, 2.3,  3.7, idx,idx,  3, 0.3, 1],  // 7 metallic perc
    [1, 0.03,   1, idx, 0,  50, 2.0, 0],  // 8 sonar
  ];

  const [fcR, fm1R, fm2R, i1, i2, atkMs, relS, algo] = cfgs[preset];
  carrier.frequency.value = fc * fcR;
  mod1.frequency.value    = fc * fm1R;
  mod2.frequency.value    = fc * fm2R;

  if (preset === 4) {
    // Kick: pitch falls
    carrier.frequency.setValueAtTime(fc*6, now);
    carrier.frequency.exponentialRampToValueAtTime(fc*0.3, now+0.18);
  }

  mGain1.gain.value = i1 * (fc * fm1R);
  mGain2.gain.value = i2 * (fc * fm2R);
  fbGain.gain.value = i1 * fc * 0.5;

  if (algo === 0) {
    mod1.connect(mGain1); mGain1.connect(carrier.frequency);
  } else if (algo === 1) {
    mod1.connect(mGain1); mGain1.connect(carrier.frequency);
    mod2.connect(mGain2); mGain2.connect(carrier.frequency);
  } else if (algo === 2) {
    mod2.connect(mGain2); mGain2.connect(mod1.frequency);
    mod1.connect(mGain1); mGain1.connect(carrier.frequency);
  } else {
    carrier.connect(fbGain); fbGain.connect(carrier.frequency);
    mod1.connect(mGain1);    mGain1.connect(carrier.frequency);
  }

  env.gain.setValueAtTime(0, now);
  env.gain.linearRampToValueAtTime(0.8, now + atkMs/1000);
  env.gain.exponentialRampToValueAtTime(0.0001, now + atkMs/1000 + relS);

  carrier.connect(env); env.connect(master);
  return { node: master, carrier, modulator:mod1, stopAt: now + atkMs/1000 + relS + 0.1 };
}

function updateParams(nodes, params) {
  nodes.carrier.frequency.value = params.freq;
}
`},

{ subtitle:'36 - Appendix: Wavetable Library', title:'Appendix: Wavetable Sound Design Guide',
params:[
  {id:'preset', label:'Sound (0-6)', min:0, max:6, step:1, def:0},
  {id:'freq',   label:'Frequency (Hz)', min:40, max:1200, step:1, def:220},
  {id:'pos',    label:'Wave Position', min:0, max:1, step:.01, def:0},
  {id:'scan',   label:'Scan Speed', min:0, max:2, step:.01, def:0.2},
],
body:`
<p>Wavetable synthesis excels at sounds that <em>evolve</em>. A static wavetable position produces a stable timbre; scanning produces animation. The sounds here demonstrate how the same mechanism produces pads, plucks, evolving textures, and even sound effects.</p>
<div class="step-card"><span class="step-num">PRESET 0 - SERUM-STYLE PAD</span>Scanning slowly through sine-to-saw morphing table, with slow attack. The defining sound of modern EDM production. Automated wave position (the Scan parameter) creates the "breathing" quality. Add reverb and this is every supersaw pad from 2010-present.</div>
<div class="step-card"><span class="step-num">PRESET 1 - PPG WAVE BASS</span>Wavetable at a fixed mid position with fast attack and medium decay. The PPG Wave 2 (Wolfgang Palm, 1981) at fixed positions produces a digital, slightly metallic bass that sits between a saw and a digital square. It is immediately recognizable from any Tangerine Dream or Gary Numan track.</div>
<div class="step-card"><span class="step-num">PRESET 2 - VOCAL FORMANT SWEEP</span>Wavetable built from formant-weighted waves, scanning continuously. The wave position modulates formant content, approximating the vowel-sweep quality of a talk box or auto-wah. Electronic music's answer to a human throat.</div>
<div class="step-card"><span class="step-num">PRESET 3 - PLUCK / METALLIC</span>Full wavetable scan at the very start of the note (fast initial scan speed) that slows to a stable position. Like a guitar string: bright complex attack that settles into a stable partial structure. Used in digital pianos, electric piano VSTs, and modern pluck leads.</div>
<div class="step-card"><span class="step-num">PRESET 4 - EURO TRANCE LEAD</span>Fast scan speed, mid position, bright wave. The animated, constantly-morphing quality gives it movement without vibrato. This is the "supersaw + movement" combination that defined progressive trance from 1999-2006. Scan at 0.5-0.8 for the right amount of motion.</div>
<div class="step-card"><span class="step-num">PRESET 5 - WIND / BREATH SFX</span>Wavetable scanning over noise-approximating waves with a very slow attack. The spectral evolution mimics gusting wind or a breathing effect. Works as ambient texture or as a transition effect in electronic music.</div>
<div class="step-card"><span class="step-num">PRESET 6 - DIGITAL STRINGS</span>Mid-slow scan speed, high position (near saw), soft attack. The evolving wavetable position creates gentle chorusing similar to a string ensemble. Every modern pop string pad is built this way in Serum or Vital.</div>
`,
code:`// -- WAVETABLE SYNTHESIS: 7 SOUND DESIGN PRESETS --
// Table = stack of single-cycle waveforms. Scanning = morphing through them.
// shape param = table position. Envelope sweeps it = timbre changes over time.
//
//  0  Pad           slow scan, long decay, atmospheric
//  1  Pluck         fast initial scan (bright attack), then freeze (warm body)
//  2  Vocal Morph   table designed around vowel formant positions
//  3  Metallic      non-integer harmonic positions = inharmonic body
//  4  String        fast attack scan, medium decay
//  5  Arpeggiator   quantized position steps = staccato timbral rhythm
//  6  Sweep FX      slow linear scan = textural sweep effect
function makeSynth(audioCtx, params) {
  const master = audioCtx.createGain();
  const now = audioCtx.currentTime;
  const preset = Math.round(params.preset);
  const f = params.freq;

  // Envelope configs: [atkS, relS, gain]
  const envCfg = [
    [0.4, 4.0, 0.42], // 0 pad
    [0.01,0.5, 0.45], // 1 PPG bass
    [0.3, 3.0, 0.40], // 2 vocal
    [0.01,1.2, 0.44], // 3 pluck
    [0.01,0.8, 0.43], // 4 trance lead
    [0.8, 3.5, 0.35], // 5 wind
    [0.5, 3.0, 0.40], // 6 strings
  ];
  const [atkS, relS, gain] = envCfg[preset];
  master.gain.value = gain;

  const env = audioCtx.createGain();
  env.gain.setValueAtTime(0, now);
  env.gain.linearRampToValueAtTime(0.9, now + atkS);
  env.gain.exponentialRampToValueAtTime(0.0001, now + atkS + relS);
  env.connect(master);

  const N = 64;
  const tableCount = 8;
  const tables = buildWT(N, tableCount, preset);

  const osc = audioCtx.createOscillator();
  osc.frequency.value = f;

  let scanPhase = params.pos;
  let scanTimer = null;

  const scanSpeed = preset === 3
    ? 0  // pluck: handle differently
    : params.scan;

  setWave(osc, scanPhase, tables, N, audioCtx);

  if (preset === 3) {
    // Pluck: fast initial scan then freeze
    let sp2 = 0;
    scanTimer = setInterval(() => {
      if (sp2 < 1) { sp2 = Math.min(1, sp2 + 0.05); setWave(osc, sp2, tables, N, audioCtx); }
      else { clearInterval(scanTimer); }
    }, 16);
  } else if (scanSpeed > 0) {
    scanTimer = setInterval(() => {
      scanPhase = (scanPhase + scanSpeed * 0.015) % 1;
      setWave(osc, scanPhase, tables, N, audioCtx);
    }, 16);
  }

  osc.connect(env);
  return { node: master, osc, tables, N, scanTimer, stopAt: now + atkS + relS + 0.1 };
}

function buildWT(N, count, preset) {
  const tables = [];
  for (let t = 0; t < count; t++) {
    const real = new Float32Array(N);
    const imag = new Float32Array(N);
    const p = t / (count - 1);

    if (preset === 2) {
      // Vocal: formant bumps at different harmonics
      const fmts = [2+Math.round(p*3), 4+Math.round(p*4)];
      for (let n = 1; n < N; n++) {
        const boost = fmts.includes(n) ? 2.0 : 1.0;
        imag[n] = (1/n) * boost * Math.pow(0.85, n);
      }
    } else {
      // Standard morphing: sine->triangle->square->saw
      for (let n = 1; n < N; n++) {
        let amp = 0;
        if (p < 0.33) {
          const a = p/0.33;
          const sa = n===1?1:0;
          const ta = (n%2===1)?Math.pow(-1,(n-1)/2)/(n*n):0;
          amp = sa*(1-a)+ta*a;
        } else if (p < 0.66) {
          const a = (p-0.33)/0.33;
          const ta = (n%2===1)?Math.pow(-1,(n-1)/2)/(n*n):0;
          const qa = (n%2===1)?1/n:0;
          amp = ta*(1-a)+qa*a;
        } else {
          const a = (p-0.66)/0.34;
          const qa = (n%2===1)?1/n:0;
          const wa = Math.pow(-1,n+1)/n;
          amp = qa*(1-a)+wa*a;
        }
        imag[n] = amp;
      }
    }
    tables.push({real,imag});
  }
  return tables;
}

function setWave(osc, pos, tables, N, ctx) {
  const idx = Math.max(0,Math.min(pos,1)) * (tables.length-1);
  const lo = Math.floor(idx), hi = Math.min(lo+1, tables.length-1);
  const t  = idx-lo;
  const r  = new Float32Array(N), im = new Float32Array(N);
  for (let i=0;i<N;i++) {
    r[i]  = tables[lo].real[i]*(1-t)+tables[hi].real[i]*t;
    im[i] = tables[lo].imag[i]*(1-t)+tables[hi].imag[i]*t;
  }
  osc.setPeriodicWave(ctx.createPeriodicWave(r,im,{disableNormalization:false}));
}

function updateParams(nodes, params) {
  nodes.osc.frequency.value = params.freq;
  if (!nodes.scanTimer) {
    setWave(nodes.osc, params.pos, nodes.tables, nodes.N, nodes.osc.context);
  }
}
`},

{ subtitle:'37 - Appendix: Euro Dance Sounds', title:'Euro Dance & Club Sound Design',
params:[
  {id:'preset', label:'Sound (0-9)', min:0, max:9, step:1, def:0},
  {id:'freq',   label:'Frequency (Hz)', min:40, max:1200, step:1, def:440},
  {id:'p2',     label:'Param 2 (context-specific)', min:0, max:1, step:.01, def:0.5},
],
body:`
<p>Euro dance, eurodance, euro trance, and rave: a specific sonic aesthetic from 1989-2006 that blends drum machines, synthesizers, and occasionally vocals into tracks that are maximally energetic and immediately recognizable. Here are 10 sounds that define the genre.</p>
<div class="step-card"><span class="step-num">PRESET 0 - RAVE STAB (the most important)</span>Short sawtooth through a very resonant LPF with the cutoff envelope going from high to low very fast. This is the sound. Every Prodigy, Altern-8, and early rave track. The resonance is turned up until the filter self-oscillates. Duration: 100-200ms maximum.</div>
<div class="step-card"><span class="step-num">PRESET 1 - EURODANCE BASS (Haddaway, Dr Alban style)</span>Square wave through LPF, punchy attack, very short decay. Sits at 80-100Hz fundamental. The bass that drove You Could Be My Lover, What is Love, Sing Hallelujah - everything from the golden era 1992-1995.</div>
<div class="step-card"><span class="step-num">PRESET 2 - TRANCE LEAD (Robert Miles / ATB)</span>Detuned sawtooth pair through resonant LPF, slow attack, long sustain. The "dreamy" trance lead from Children (1995) through 9PM (1997). Detuning the two saws creates the wide chorus sound.</div>
<div class="step-card"><span class="step-num">PRESET 3 - HARD TRANCE LEAD (Scooter / Dune)</span>Aggressive, distorted square wave through a resonant filter. No slow attack - immediate, in-your-face. The Scooter lead sound. Combine with a rave stab layered underneath for extra aggression.</div>
<div class="step-card"><span class="step-num">PRESET 4 - SUPERSAW PAD (late trance era)</span>5 detuned sawtooth oscillators, no filter, slow attack. The sound that dominated 2000-2010 trance production. It was the defining sound of Tiesto, Ferry Corsten, and Push. The detuning creates the wall-of-sound chorus effect.</div>
<div class="step-card"><span class="step-num">PRESET 5 - 909 KICK (the backbone)</span>The Roland TR-909 kick: sine with fast pitch fall from ~160Hz to 40Hz. The punch is the attack transient; the thud is the sub sine. Every house, techno, and euro dance track from 1987 onwards. Non-negotiable.</div>
<div class="step-card"><span class="step-num">PRESET 6 - 909 CLAP</span>Multiple short noise bursts in quick succession (3-4ms apart) simulating the "multiple strikes" of a snare clap hit. High-pass filtered. Distinctly different from a snare - brighter, sharper. In house music the clap replaces the snare or layers with it.</div>
<div class="step-card"><span class="step-num">PRESET 7 - EURO BRASS STAB</span>Square wave, bandpass filter, very short envelope (150ms), high attack level. The brass stab that punctuates every verse in eurodance. Usually played on beat 2 or 4, off the kick. LA synthesis sounds more authentic but subtractive works for live recreation.</div>
<div class="step-card"><span class="step-num">PRESET 8 - TRANCE ARPEGGIO NOTE</span>Short FM note with moderate index, played in rapid 16th note patterns. The arpeggio that fills every break section in trance. Individual note is short; the pattern creates the melodic content. Think Binary Finary, Gouryella, BT.</div>
<div class="step-card"><span class="step-num">PRESET 9 - CLUB RISER / BUILD</span>Filtered noise with cutoff sweeping from low to very high over 4-8 bars. The tension-building riser before a drop. Combined with a pitch-rising synth and a snare roll, this is the entire vocabulary of a trance or techno build section.</div>
`,
code:`// -- EURO DANCE & CLUB: 10 SIGNATURE SOUNDS --
// 1989-2006. Every one of these you've heard in a car park at 2am.
//
//  0  Rave Stab     detuned saws + resonant LPF + short envelope
//  1  Sub Bass      sine + slight FM for weight and rattle
//  2  Supersaw Lead  7 detuned sawtooths (the JP-8000 method)
//  3  Hoover Bass   FM feedback into resonant filter = that Hoover
//  4  Piano Stab    LA-style: piano PCM attack + detuned saw sustain
//  5  Trance Arp    short-gated saw + fast filter envelope
//  6  Trance Pad    huge detuned unison + slow filter open
//  7  Acid Line     303-style: resonant LPF + portamento
//  8  Club Kick     909-style: sine + noise transient + pitch fall
//  9  Chord Stab    4-note chord through a vowel filter
function makeSynth(audioCtx, params) {
  const master = audioCtx.createGain();
  master.gain.value = 0.6;
  const now = audioCtx.currentTime;
  const preset = Math.round(params.preset);
  const f = params.freq;
  const sr = audioCtx.sampleRate;
  const p2 = params.p2;

  if (preset === 0) {
    // Rave stab
    const osc = audioCtx.createOscillator();
    const flt = audioCtx.createBiquadFilter();
    const env = audioCtx.createGain();
    osc.type = 'sawtooth'; osc.frequency.value = f;
    flt.type = 'lowpass'; flt.frequency.value = 400; flt.Q.value = 12;
    flt.frequency.setValueAtTime(3000+p2*3000, now);
    flt.frequency.exponentialRampToValueAtTime(200, now+0.15);
    env.gain.setValueAtTime(0.9, now);
    env.gain.exponentialRampToValueAtTime(0.0001, now+0.18);
    osc.connect(flt); flt.connect(env); osc.start(now); osc.stop(now+0.2);
    return { node: env, stopAt: now+0.25 };

  } else if (preset === 1) {
    // Eurodance bass
    const osc = audioCtx.createOscillator();
    const flt = audioCtx.createBiquadFilter();
    const env = audioCtx.createGain();
    osc.type = 'square'; osc.frequency.value = f;
    flt.type = 'lowpass'; flt.frequency.value = 800; flt.Q.value = 2;
    env.gain.setValueAtTime(0, now);
    env.gain.linearRampToValueAtTime(0.7, now+0.008);
    env.gain.exponentialRampToValueAtTime(0.0001, now+0.35);
    osc.connect(flt); flt.connect(env); osc.start(now); osc.stop(now+0.4);
    return { node: env, stopAt: now+0.45 };

  } else if (preset === 2) {
    // Trance lead (detuned saws)
    const mix = audioCtx.createGain();
    const flt = audioCtx.createBiquadFilter();
    const env = audioCtx.createGain();
    mix.gain.value = 0.5;
    flt.type = 'lowpass'; flt.frequency.value = 2400; flt.Q.value = 1.5;
    env.gain.setValueAtTime(0, now);
    env.gain.linearRampToValueAtTime(0.8, now+0.4);
    env.gain.exponentialRampToValueAtTime(0.0001, now+2.5);
    const oscs = [];
    [-1,0,1,-0.5,0.5].forEach((d,i) => {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = 'sawtooth';
      o.frequency.value = f * Math.pow(2, d*p2*0.02/12);
      g.gain.value = i===1?1:0.6;
      o.connect(g); g.connect(mix); o.start(now); oscs.push(o);
    });
    mix.connect(flt); flt.connect(env);
    return { node: env, stopAt: now+2.6 };

  } else if (preset === 3) {
    // Hard trance lead
    const osc = audioCtx.createOscillator();
    const flt = audioCtx.createBiquadFilter();
    const env = audioCtx.createGain();
    osc.type = 'square'; osc.frequency.value = f;
    flt.type = 'lowpass'; flt.frequency.value = 2800+p2*2000; flt.Q.value = 6;
    env.gain.setValueAtTime(0, now);
    env.gain.linearRampToValueAtTime(0.7, now+0.005);
    env.gain.exponentialRampToValueAtTime(0.0001, now+0.6);
    osc.connect(flt); flt.connect(env); osc.start(now); osc.stop(now+0.65);
    return { node: env, stopAt: now+0.7 };

  } else if (preset === 4) {
    // Supersaw pad (5 detuned saws)
    const env = audioCtx.createGain();
    env.gain.setValueAtTime(0, now);
    env.gain.linearRampToValueAtTime(0.8, now+0.6);
    env.gain.exponentialRampToValueAtTime(0.0001, now+4.0);
    const spread = p2 * 0.04; // detune amount
    [-2,-1,0,1,2].forEach(d => {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = 'sawtooth';
      o.frequency.value = f * Math.pow(2, d*spread/12);
      g.gain.value = d===0?1:0.6;
      o.connect(g); g.connect(env); o.start(now);
    });
    return { node: env, stopAt: now+4.1 };

  } else if (preset === 5) {
    // 909 kick
    const osc = audioCtx.createOscillator();
    const env = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(160, now);
    osc.frequency.exponentialRampToValueAtTime(40, now+0.22);
    env.gain.setValueAtTime(1.0, now);
    env.gain.exponentialRampToValueAtTime(0.0001, now+0.4);
    osc.connect(env); osc.start(now); osc.stop(now+0.45);
    return { node: env, stopAt: now+0.5 };

  } else if (preset === 6) {
    // 909 clap (multiple noise bursts)
    const times = [0, 0.003, 0.007];
    const env = audioCtx.createGain();
    env.gain.value = 1;
    const hpf = audioCtx.createBiquadFilter();
    hpf.type = 'highpass'; hpf.frequency.value = 2000;
    times.forEach(t => {
      const bLen = Math.floor(sr * 0.06);
      const buf  = audioCtx.createBuffer(1, bLen, sr);
      const dat  = buf.getChannelData(0);
      for (let i=0;i<bLen;i++) dat[i]=(Math.random()*2-1)*(1-i/bLen);
      const src = audioCtx.createBufferSource();
      const g   = audioCtx.createGain();
      src.buffer = buf;
      g.gain.setValueAtTime(0.5, now+t);
      g.gain.exponentialRampToValueAtTime(0.0001, now+t+0.07);
      src.connect(g); g.connect(hpf); src.start(now+t);
    });
    hpf.connect(env);
    return { node: env, stopAt: now+0.3 };

  } else if (preset === 7) {
    // Euro brass stab
    const osc = audioCtx.createOscillator();
    const bpf = audioCtx.createBiquadFilter();
    const env = audioCtx.createGain();
    osc.type = 'square'; osc.frequency.value = f;
    bpf.type = 'bandpass'; bpf.frequency.value = f*3; bpf.Q.value = 3;
    env.gain.setValueAtTime(0, now);
    env.gain.linearRampToValueAtTime(0.7, now+0.006);
    env.gain.exponentialRampToValueAtTime(0.0001, now+0.18);
    osc.connect(bpf); bpf.connect(env); osc.start(now); osc.stop(now+0.2);
    return { node: env, stopAt: now+0.25 };

  } else if (preset === 8) {
    // Trance arp note (FM)
    const car = audioCtx.createOscillator();
    const mod = audioCtx.createOscillator();
    const mg  = audioCtx.createGain();
    const env = audioCtx.createGain();
    car.type = mod.type = 'sine';
    car.frequency.value = f; mod.frequency.value = f*2;
    mg.gain.value = 3 * f * 2;
    mod.connect(mg); mg.connect(car.frequency);
    car.connect(env);
    env.gain.setValueAtTime(0, now);
    env.gain.linearRampToValueAtTime(0.65, now+0.005);
    env.gain.exponentialRampToValueAtTime(0.0001, now+0.15);
    car.start(now); mod.start(now); car.stop(now+0.18); mod.stop(now+0.18);
    return { node: env, stopAt: now+0.2 };

  } else {
    // Club riser (4-bar noise sweep)
    const bLen = Math.floor(sr * 4);
    const buf  = audioCtx.createBuffer(1, bLen, sr);
    const dat  = buf.getChannelData(0);
    for (let i=0;i<bLen;i++) dat[i]=Math.random()*2-1;
    const src  = audioCtx.createBufferSource();
    const flt  = audioCtx.createBiquadFilter();
    const env  = audioCtx.createGain();
    src.buffer = buf;
    flt.type = 'bandpass'; flt.Q.value = 2;
    flt.frequency.setValueAtTime(80, now);
    flt.frequency.exponentialRampToValueAtTime(8000, now+4);
    env.gain.setValueAtTime(0, now);
    env.gain.linearRampToValueAtTime(0.5, now+1);
    env.gain.linearRampToValueAtTime(0.9, now+4);
    src.connect(flt); flt.connect(env); src.start(now);
    return { node: env, stopAt: now+4.1 };
  }
}

function updateParams(nodes, params) {}
`},


{ subtitle:'38 - DSP Math Demystified', title:'DSP Math: Everything You Already Know',
params:[
  {id:'freq',  label:'Frequency (Hz)',                                    min:80, max:800,  step:1,    def:440},
  {id:'phi',   label:'phi: 2nd sine phase (0=same, 3.14=flipped)',        min:0,  max:6.28, step:0.01, def:0},
  {id:'mix2',  label:'2nd sine volume (set to 1.0 with phi=3.14 to cancel)', min:0, max:1, step:0.01, def:0},
],
body:`<div class="lesson-intro">Every formula in a DSP textbook is describing something you already built. This lesson is a guided translation -- we take the scary-looking notation and show you the plain-English version right next to it, then point at the lesson where you already coded it. By the end, the symbols won't feel like math. They'll feel like shorthand for things you know.</div>

<div class="step-card"><span class="step-num">1. THE SAMPLE: x[n]</span>
In DSP textbooks, a single audio sample is written as <code>x[n]</code>. That's it. <code>x</code> is the signal. <code>n</code> is the sample number -- an integer counting from 0. So <code>x[0]</code> is the first sample, <code>x[1]</code> is the second, <code>x[44100]</code> is one second in at 44.1kHz.<br><br>
You've seen this as <code>data[i]</code> every time we filled an AudioBuffer in the noise lesson. Same thing. <code>i</code> and <code>n</code> are both just "which sample am I on." The bracket notation <code>[n]</code> means "discrete time" -- we're working sample by sample, not with a continuous wave. That's all it means.
</div>

<div class="step-card"><span class="step-num">2. THE SINE WAVE FORMULA</span>
<code>x[n] = A * sin(2*pi*f*n/SR)</code><br><br>
You wrote this in Lesson 2. In plain English:<br>
-- <code>A</code> = amplitude (how loud, 0 to 1)<br>
-- <code>2*pi</code> = one full circle in radians (because sin() works in radians, not degrees)<br>
-- <code>f</code> = frequency in Hz<br>
-- <code>n</code> = which sample number<br>
-- <code>SR</code> = sample rate (44100 samples per second)<br><br>
The fraction <code>f/SR</code> converts "cycles per second" into "cycles per sample." Multiply by <code>n</code> and you know how far around the circle you are at sample n. Wrap it in <code>sin()</code> and you have the sample value. The oscilloscope in this app is drawing exactly this for every sample it receives.
</div>

<div class="step-card"><span class="step-num">3. SUPERPOSITION: y[n] = x1[n] + x2[n]</span>
Lesson 4. You added two OscillatorNodes to the same destination and they mixed automatically. That automatic mixing is superposition -- the output sample at time n is just the sum of both input samples at time n.<br><br>
This extends to any number of signals: <code>y[n] = x1[n] + x2[n] + x3[n] + ...</code><br><br>
That sum symbol you see in textbooks:<br>
<code>y[n] = SUM(k=1 to K) of x_k[n]</code><br><br>
Is literally just: "add up all K signals at sample n." You built this in every additive synthesis lesson. Each oscillator in your 32-harmonic stack is one term in this sum. The Greek letter sigma (looks like a big E) means "add up the following thing for each value of k." That's it.
</div>

<div class="step-card"><span class="step-num">4. THE FOURIER SERIES: WHERE HARMONICS COME FROM</span>
The Fourier series says: any periodic signal can be written as a sum of sines and cosines at integer multiples of a base frequency.<br><br>
<code>x(t) = SUM(k=1 to inf) of [a_k * cos(2*pi*k*f0*t) + b_k * sin(2*pi*k*f0*t)]</code><br><br>
Translating piece by piece:<br>
-- <code>f0</code> = the fundamental frequency (your pitch)<br>
-- <code>k</code> = harmonic number (1, 2, 3...)<br>
-- <code>k*f0</code> = the kth harmonic's frequency (2nd harmonic = 2*f0, etc.)<br>
-- <code>a_k</code> and <code>b_k</code> = how much of each harmonic to include (the amplitudes)<br>
-- The sum to infinity means "in theory, infinitely many harmonics" but in practice we stop when they're below the noise floor or above Nyquist<br><br>
You set <code>a_k</code> and <code>b_k</code> manually in every additive lesson. The K5000's harmonic editor was a UI for exactly this. The sawtooth wave has <code>a_k = 0</code> (no cosines) and <code>b_k = 1/k</code> for all k. You built that in Lesson 6.
</div>

<div class="step-card"><span class="step-num">5. THE DFT: READING A SPECTRUM</span>
The spectrum analyzer in this app uses a Discrete Fourier Transform (DFT). It answers the question: "given this block of samples, how much of each frequency is present?"<br><br>
The formula looks intimidating:<br>
<code>X[k] = SUM(n=0 to N-1) of x[n] * e^(-i*2*pi*k*n/N)</code><br><br>
But <code>e^(i*theta) = cos(theta) + i*sin(theta)</code> (Euler's formula), so this is really:<br>
<code>X[k] = SUM of x[n] * (cos(2*pi*k*n/N) - i*sin(2*pi*k*n/N))</code><br><br>
In plain English: for each frequency bin k, multiply every sample by a sine and cosine at that frequency, then add them all up. How much the samples "agree with" (correlate with) that sine determines how bright that bin is on the spectrum. A big number in bin k means that frequency is present. Zero means it's absent.<br><br>
You used the DFT manually in Lesson 17 (Phase Distortion) -- we ran a DFT on the PD waveform to get the PeriodicWave coefficients. The AnalyserNode.getFloatFrequencyData() call is running an FFT (Fast Fourier Transform -- a faster algorithm for the same math) 30 times per second for the spectrum display.
</div>

<div class="step-card"><span class="step-num">6. CONVOLUTION AND FILTERS: y[n] = x[n] * h[n]</span>
The star symbol in DSP doesn't mean multiply. It means <strong>convolution</strong>. This confused everyone at some point. <code>y[n] = x[n] * h[n]</code> means "convolve signal x with impulse response h to get output y."<br><br>
The convolution sum:<br>
<code>y[n] = SUM(k=0 to M) of h[k] * x[n-k]</code><br><br>
What is this actually doing? For each output sample <code>y[n]</code>, it's looking at the current input sample <code>x[n]</code> AND the M previous input samples (<code>x[n-1]</code>, <code>x[n-2]</code>, etc.), multiplying each by a coefficient <code>h[k]</code>, and summing. The coefficient array h[] is the "impulse response" -- it defines the filter.<br><br>
You've been using this every single lesson. Every BiquadFilterNode is a convolution engine under the hood. The LPF in Lesson 11, the resonant filter in the K5000 lesson, the Z-Plane filters in Lesson 27 -- all of them are computing this sum continuously. The h[] coefficients are what change when you move the cutoff slider. The Z-Plane filters morph by smoothly interpolating between different h[] arrays.
</div>

<div class="step-card"><span class="step-num">7. IIR FILTERS: FEEDBACK CHANGES EVERYTHING</span>
The filters in this course are IIR (Infinite Impulse Response) filters. The "I" in IIR means the output feeds back into itself:<br><br>
<code>y[n] = b0*x[n] + b1*x[n-1] + b2*x[n-2] - a1*y[n-1] - a2*y[n-2]</code><br><br>
The b coefficients multiply current and past <em>input</em> samples. The a coefficients multiply past <em>output</em> samples (that's the feedback). This feedback is what creates resonance -- the filter remembers its own recent output and adds a bit back in, causing energy to accumulate at the resonant frequency. Raise the Q slider in any filter lesson and you're increasing those a coefficients. Push Q high enough and the feedback exceeds 1 and the filter self-oscillates -- it generates a tone with no input, which is exactly what happened in the K5000 and FZ filter lessons at high resonance.<br><br>
The b and a values are called the filter's coefficients. The Z-Plane filters in Lesson 27 work by morphing smoothly between two sets of b and a values simultaneously.
</div>

<div class="step-card"><span class="step-num">8. THE Z-TRANSFORM: WHY FILTERS ARE DRAWN AS FRACTIONS</span>
In DSP textbooks, filters are often written as a fraction called a "transfer function":<br><br>
<code>H(z) = (b0 + b1*z^-1 + b2*z^-2) / (1 + a1*z^-1 + a2*z^-2)</code><br><br>
The variable <code>z^-1</code> just means "one sample delay." <code>z^-2</code> = two sample delays. It's notation for "the previous sample." So the numerator is "current input + scaled previous inputs" (the b coefficients) and the denominator is "minus scaled previous outputs" (the a feedback coefficients). It's the exact same IIR filter formula from above, written as a ratio. The "Z-plane" in EMU Z-Plane synthesis literally refers to operating in this mathematical plane -- moving the filter's poles and zeros (the roots of that fraction) is what changes the filter shape.
</div>

<div class="step-card"><span class="step-num">9. FREQUENCY MODULATION: THE NESTED SINE</span>
FM synthesis (Lesson 16) has its own formula:<br><br>
<code>x[n] = A * sin(2*pi*fc*n/SR + I * sin(2*pi*fm*n/SR))</code><br><br>
The outer <code>sin()</code> is the carrier. The inner <code>sin()</code> is the modulator. <code>I</code> is the modulation index. The inner sine is computing a phase offset that changes on every sample -- it's adding a fluctuating amount to the carrier's phase. When I=0, the inner term is zero and you get a pure carrier sine. As I increases, the phase fluctuates more and more, creating sidebands at <code>fc +/- k*fm</code> for all integers k. The amplitude of each sideband is given by a Bessel function <code>J_k(I)</code> -- that's the fancy part of FM math, but you don't need it to use FM. You just need to know: bigger I = more sidebands = brighter, more complex sound.
</div>

<div class="step-card"><span class="step-num">10. DECIBELS: THE LOG SCALE EXPLAINED</span>
Decibels show up everywhere in audio and DSP. The formula:<br><br>
<code>dB = 20 * log10(amplitude)</code><br><br>
Where does the 20 come from? Power is proportional to amplitude squared, and <code>log(x^2) = 2*log(x)</code>, so the 20 is really 10*2. But practically: if you halve the amplitude (<code>A * 0.5</code>), you lose 6dB. If you halve it again, another 6dB. This is the pattern: each halving = -6dB. Each doubling = +6dB. 0dB = full scale (amplitude = 1.0). -20dB = amplitude 0.1. -40dB = amplitude 0.01. The filter slope you see in textbooks ("-12dB per octave", "-24dB per octave") means "for every doubling of frequency above the cutoff, the amplitude drops by that many dB." A 2-pole BiquadFilter = 12dB/octave. The LPF in Lesson 11 uses that. Chain two = 24dB/octave (Moog-style).
</div>

<div class="step-card"><span class="step-num">11. NYQUIST: WHY 44100 Hz</span>
The Nyquist theorem says: to represent a frequency <code>f</code> accurately in digital audio, your sample rate must be at least <code>2*f</code>. Above that limit (the Nyquist frequency = SR/2), frequencies can't be represented and "alias" -- fold back down into audible range as false tones.<br><br>
At SR=44100 Hz, Nyquist is 22050 Hz -- just above the top of human hearing (20kHz). So we can represent everything we can hear. The FZ lesson bandlimited harmonics at 4500 Hz because the FZ ran at 9kHz (Nyquist = 4500 Hz). Every time you saw <code>if (harmFreq > audioCtx.sampleRate / 2) break;</code> in the additive lessons, that was enforcing the Nyquist limit. Generate a harmonic above Nyquist and you get aliasing -- a false pitch at the wrong frequency. That's bad.
</div>

<div class="step-card"><span class="step-num">12. PHI: PHASE OFFSET</span>
<code>phi</code> (a circle with a vertical line) is the starting phase -- where in the cycle you begin:<br><br>
<code>x[n] = A * sin(2*pi*f*n/SR + phi)</code><br><br>
<code>phi = 0</code>: starts at zero crossing going up. <code>phi = pi/2</code>: starts at the peak. <code>phi = pi</code>: wave is upside down. A single sine sounds identical regardless of phi. Your ears can't detect absolute phase.<br><br>
<strong>Phase cancellation -- try it right now:</strong> set the <em>phi</em> slider to 3.14 (= pi) and raise <em>2nd sine volume</em> to 1.0. The second sine becomes <code>sin(wt + pi) = -sin(wt)</code>. It's the first sine, flipped. <code>sin(wt) + (-sin(wt)) = 0</code>. Silence from two playing tones. This is how noise-canceling headphones work, and how a one-sample timing error in a mixing chain can delete a signal entirely.<br><br>
<strong>In shaders:</strong> <code>sin(uv.x * freq + time)</code> -- the <code>time</code> offset IS phi. Animate it: wave scrolls. Set it to pi: wave flips. Same variable, visual domain.<br><br>
<strong>Phase distortion (Lesson 17):</strong> instead of a fixed phi offset at note-on, the Casio CZ warped the phase <em>accumulator</em> -- the rate of advance bent through a distortion curve each sample. Output still <code>sin(phase)</code>, but with a non-linear input. That bending creates harmonics without a filter.
</div>

<div class="step-card"><span class="step-num">13. OMEGA: ANGULAR FREQUENCY</span>
Textbooks rewrite the sine formula with <code>omega</code> (looks like a small w) to save writing <code>2*pi</code> constantly:<br><br>
<code>omega = 2 * pi * f</code> &nbsp;&nbsp; so &nbsp;&nbsp; <code>x[n] = A * sin(omega * n / SR + phi)</code><br><br>
At 440 Hz: <code>omega = 2764.6 radians/second</code>. One full cycle sweeps <code>2*pi</code> radians. You complete <code>f</code> of those per second. So omega = how many radians per second you spin through. That's the whole definition.<br><br>
<strong>Why it's in all filter math:</strong> filter cutoff frequencies in textbooks are always in rad/s, not Hz. A 1kHz LPF has <code>omega_c = 6283 rad/s</code>. When you write <code>flt.frequency.value = 1000</code>, the browser multiplies by <code>2*pi</code> before computing the b/a coefficients. You've been using omega through the API the entire course.<br><br>
<strong>Normalised omega</strong> (written <code>w</code> or <code>omega_n = omega / SR</code>): scales omega to the range 0 to pi. DC = 0, Nyquist = pi. A textbook saying "cutoff at w = 0.2*pi" means 10% of Nyquist -- about 2.2kHz at 44.1kHz. In every additive oscillator loop in this course:<br><br>
<code>phase += 2 * Math.PI * freq / sampleRate; // this increment = omega / SR</code><br><br>
After n steps, <code>phase = omega*n/SR + phi</code>. That's the full formula. The phase accumulator you've been writing IS the integral of omega over discrete time. You've been computing it all along without calling it that.
</div>

<div class="step-card"><span class="step-num">14. THE SYMBOLS AT A GLANCE</span>
<code>x[n]</code> -- one audio sample (discrete time signal)<br>
<code>X[k]</code> -- one frequency bin in the DFT (capital = frequency domain)<br>
<code>h[n]</code> -- impulse response (the filter's "fingerprint")<br>
<code>H(z)</code> -- transfer function (the filter as a fraction)<br>
<code>z^-1</code> -- one sample delay (just "the previous sample")<br>
<code>*</code> (between signals) -- convolution, not multiplication<br>
<code>SUM</code> / sigma -- add up the following thing for each value of the index<br>
<code>N</code> -- number of samples in a block (FFT size, often 1024 or 2048)<br>
<code>SR</code> or <code>Fs</code> -- sample rate<br>
<code>f0</code> -- fundamental frequency<br>
<code>fc</code> -- carrier frequency (FM)<br>
<code>fm</code> -- modulator frequency (FM)<br>
<code>I</code> or <code>beta</code> -- modulation index (FM)<br>
<code>phi</code> -- phase offset<br>
<code>omega</code> or <code>w</code> -- angular frequency = 2*pi*f (saves writing 2*pi every time)<br>
<code>j</code> or <code>i</code> -- sqrt(-1) (the imaginary unit -- appears in DFT and Z-transform, don't panic)
</div>

<div class="step-card"><span class="step-num">15. WHERE TO GO NEXT</span>
If you've made it through this course, you're ready for real DSP textbooks. Here's what to expect:<br><br>
<strong>The Scientist and Engineer's Guide to DSP</strong> by Steven W. Smith -- free online, exceptionally clear, starts from first principles. Chapters 6-8 (convolution and filters) will feel like revision.<br><br>
<strong>Understanding Digital Signal Processing</strong> by Richard Lyons -- the most readable paid textbook. The Z-transform chapter will make sense now that you've seen it here.<br><br>
<strong>Julius O. Smith III's online DSP books</strong> (ccrma.stanford.edu) -- academic, deep, free. His Physical Audio Signal Processing book is how virtual analog synthesis actually works.<br><br>
<strong>The Audio Programmer on YouTube</strong> -- real-time DSP in C++ (JUCE framework). Once you know the concepts, this shows you how they run at production quality.<br><br>
You already know: what a sample is, what a spectrum is, what a filter does, how FM and additive synthesis work, what convolution means, and why the Nyquist frequency matters. That's the vocabulary. The textbooks will give you the proofs. You don't need the proofs to make music -- but having them makes the tools feel less like magic and more like instruments you understand.
</div>`,
code:`// -- DSP MATH DEMYSTIFIED --
// phi = phase offset. omega = 2*pi*f (angular frequency).
// Full formula: x[n] = A * sin(omega * n / SR + phi)
//
// DEMO: two sines at the same frequency.
//   phi slider = phase offset of the second sine (radians)
//   phi = 0    --> identical, they add (louder)
//   phi = 3.14 --> second sine = sin(wt + pi) = -sin(wt) (flipped)
//   phi = 3.14 + mix2 = 1.0 --> total silence. Phase cancellation.
//
// omega = 2*pi*freq. Web Audio takes Hz and converts internally.
// The phase accumulator in an oscillator loop:
//   phase += 2 * Math.PI * freq / sampleRate;  // = omega / SR per step
// After n steps: phase = omega*n/SR. With offset: omega*n/SR + phi.
// That IS the sine formula. The accumulator computes it sample by sample.

function makeSynth(audioCtx, params) {
  const now = audioCtx.currentTime;

  // SINE 1: x1[n] = 0.4 * sin(omega * n / SR)   phi = 0
  const osc1 = audioCtx.createOscillator();
  osc1.type = 'sine';
  osc1.frequency.value = params.freq;

  // SINE 2: x2[n] = mix2 * 0.4 * sin(omega * n / SR + phi)
  // Bake phi into a PeriodicWave via Fourier coefficients.
  // sin(t + phi) = sin(phi)*cos(t) + cos(phi)*sin(t)
  // PeriodicWave: output = SUM real[k]*cos(k*t) + imag[k]*sin(k*t)
  // For k=1 with phase phi: real[1] = sin(phi), imag[1] = cos(phi)
  const real = new Float32Array(2);
  const imag = new Float32Array(2);
  real[1] = Math.sin(params.phi);
  imag[1] = Math.cos(params.phi);
  const osc2 = audioCtx.createOscillator();
  osc2.frequency.value = params.freq;
  osc2.setPeriodicWave(
    audioCtx.createPeriodicWave(real, imag, { disableNormalization: true })
  );

  const gain1 = audioCtx.createGain();
  gain1.gain.value = 0.4;
  const gain2 = audioCtx.createGain();
  gain2.gain.value = params.mix2 * 0.4;

  const env = audioCtx.createGain();
  env.gain.setValueAtTime(0.001, now);
  env.gain.linearRampToValueAtTime(1, now + 0.02);
  env.gain.exponentialRampToValueAtTime(0.0001, now + 4.0);

  const master = audioCtx.createGain();
  master.gain.value = 1.0;

  osc1.connect(gain1); gain1.connect(env);
  osc2.connect(gain2); gain2.connect(env);
  env.connect(master);

  // y[n] = 0.4*sin(wt) + mix2*0.4*sin(wt + phi)
  // At phi=pi: y[n] = 0.4*sin(wt) + mix2*0.4*(-sin(wt)) = 0.4*sin(wt)*(1 - mix2)
  // At phi=pi and mix2=1: y[n] = 0.  Pure silence.

  return { node: master, osc: osc1, osc2, stopAt: now + 4.1 };
}

function updateParams(nodes, params) {
  nodes.osc.frequency.value = params.freq;
  nodes.osc2.frequency.value = params.freq;
}`
}

let restartTimer = null; // timeout handle for auto-stopping finite notes

document.addEventListener('DOMContentLoaded', function() {
// ============================================================
// Everything below runs AFTER the page HTML is fully loaded.
// This is important because we need getElementById() to work,
// and elements don't exist until the DOM is ready.
// ============================================================

// -- AUDIO CONTEXT VARIABLES --
// These start as null and get created the first time the user
// hits PLAY. Browsers require audio to be started by a user
// gesture (tap/click) - we can't pre-create the context.
let audioCtx    = null;  // the Web Audio "universe" - all nodes live here
let analyser    = null;  // reads waveform + frequency data for the scope
let activeNodes = null;  // the currently playing synth node graph
let playing     = false; // true while a note is sounding

// -- ensureCtx --
// Called before any audio work. Creates the AudioContext if it
// doesn't exist yet, and resumes it if the browser suspended it
// (browsers auto-suspend audio after inactivity to save power).
function ensureCtx(){
  if(!audioCtx){
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if(audioCtx.state === 'suspended') audioCtx.resume();
  if(!analyser){
    // AnalyserNode sits between all synth output and the speakers.
    // It lets us peek at the waveform and frequency content in real time
    // without altering the sound. fftSize=2048 means 1024 frequency bins.
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 2048;
    analyser.smoothingTimeConstant = 0.8; // how "sticky" the spectrum is
    analyser.connect(audioCtx.destination); // destination = speakers
  }
}

// -- teardown --
// Stops all playing audio and resets the UI to idle state.
// Called when: STOP is pressed, a new note starts, lesson changes.
// We try to stop every possible oscillator type that a lesson might
// have returned - not all will exist, hence the try/catch.
function teardown(){
  playing = false;
  clearTimeout(restartTimer);
  document.getElementById('play-btn').textContent = '\u25B6 PLAY';
  document.getElementById('play-btn').classList.remove('playing');
  if(!activeNodes) return;
  try{
    // Stop all oscillator types that lesson code might have created
    if(activeNodes.osc)      activeNodes.osc.stop();
    if(activeNodes.osc1)     activeNodes.osc1.stop();
    if(activeNodes.osc2)     activeNodes.osc2.stop();
    if(activeNodes.sinOsc)   activeNodes.sinOsc.stop();
    if(activeNodes.triOsc)   activeNodes.triOsc.stop();
    if(activeNodes.carrier)  activeNodes.carrier.stop();
    if(activeNodes.modulator)activeNodes.modulator.stop();
    if(activeNodes.lfo)      activeNodes.lfo.stop();
    if(activeNodes.proc)     activeNodes.proc.disconnect(); // ScriptProcessor if any
    if(activeNodes.pcm)      activeNodes.pcm.stop();
    if(activeNodes.scanTimer)clearInterval(activeNodes.scanTimer); // wavetable scanner
    if(activeNodes.src)      activeNodes.src.stop();
    if(activeNodes.oscs)     activeNodes.oscs.forEach(o=>{ try{o.stop();}catch(e){} });
  }catch(e){}
  try{ activeNodes.node.disconnect(); } catch(e){}
  activeNodes = null;
}

// -- buildSynthFromCode --
// Takes the JavaScript code from the editor textarea and turns it
// into live functions. We use "new Function()" which creates a fresh
// scope each time so old variable values don't leak between runs.
// If the code has a syntax error, we show it in the status bar.
function buildSynthFromCode(code, params){
  const fullCode = code + `\n\nreturn { makeSynth, updateParams };`;
  try{
    const fns = new Function(fullCode)();
    return fns;
  }catch(e){
    setStatus('\u26A0 Code error: ' + e.message);
    return null;
  }
}

// -- collectParams --
// Reads all the slider values for the current lesson and returns
// them as a plain object like { freq: 440, dist: 0.5 }.
// This object is passed into makeSynth() and updateParams().
function collectParams(){
  const p = {};
  const L = LESSONS[currentLesson];
  (L.params||[]).forEach(param => {
    const el = document.getElementById('pslider_' + param.id);
    p[param.id] = el ? parseFloat(el.value) : param.def;
  });
  return p;
}

// -- triggerPlay --
// The main "make sound" function. Called when PLAY or RUN is pressed.
// Flow: get code -> build functions -> call makeSynth -> connect to
// analyser -> start oscillators -> watch for auto-stop.
function triggerPlay(){
  ensureCtx();
  teardown(); // stop anything currently playing first

  const L = LESSONS[currentLesson];
  if(L.isTracker) return; // tracker lessons use their own engine below

  const code   = document.getElementById('synth-code').value;
  const params = collectParams();
  const fns    = buildSynthFromCode(code, params);
  if(!fns) return;

  try{
    // makeSynth() builds the node graph and returns it.
    // It does NOT start oscillators yet - we do that below.
    const nodes = fns.makeSynth(audioCtx, params);
    if(!nodes){ setStatus('makeSynth returned nothing'); return; }

    // Connect the output of the synth to the analyser (and thus speakers)
    nodes.node.connect(analyser);

    // Start all oscillators. OscillatorNodes must be explicitly started.
    // Named single oscillators (most lessons):
    ['osc','osc1','osc2','sinOsc','triOsc','carrier','modulator','lfo'].forEach(k=>{
      if(nodes[k]) try{ nodes[k].start(); }catch(e){}
    });
    // Oscillator arrays (additive lessons return nodes.oscs = [...]):
    if(nodes.oscs) nodes.oscs.forEach(o=>{ try{ o.start(); }catch(e){} });

    activeNodes = nodes;
    activeNodes._fns = fns; // keep reference for live param updates
    playing = true;
    document.getElementById('play-btn').textContent = '\u25A0 STOP';
    document.getElementById('play-btn').classList.add('playing');
    setStatus('playing');

    // If makeSynth set a stopAt time (e.g. for a short ADSR pluck),
    // schedule automatic teardown so the button resets itself.
    if(nodes.stopAt){
      const delay = (nodes.stopAt - audioCtx.currentTime + 0.05) * 1000;
      restartTimer = setTimeout(()=>{
        if(playing) teardown();
      }, delay);
    }
  }catch(e){
    setStatus('\u26A0 Runtime error: ' + e.message);
    console.error(e);
  }
}

// Button and keyboard handlers for PLAY / RUN / Ctrl+Enter
document.getElementById('play-btn').onclick = () => {
  if(playing){ teardown(); return; }
  triggerPlay();
};

document.getElementById('run-btn').onclick = () => {
  if(playing){ teardown(); }
  triggerPlay(); // RUN always restarts even if playing
};

document.getElementById('synth-code').addEventListener('keydown', e => {
  if((e.ctrlKey||e.metaKey) && e.key==='Enter'){
    e.preventDefault();
    if(playing) teardown();
    triggerPlay();
  }
});
