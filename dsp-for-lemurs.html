body:`
<p>The Roland D-50 shipped with 64 factory patches that defined the sound of late-80s pop music. Here we deconstruct 6 of the most iconic, showing you exactly what PCM attack and synthesized sustain are doing in each one.</p>
<div class="step-card"><span class="step-num">PATCH 0 - FANTASIA (the D-50's defining patch)</span>Upper Partial: choir "ah" PCM attack into a quiet sawtooth sustain. Lower Partial: soft string noise PCM into a sine wave. The two partials blend to create a sound that resembles no real instrument but has an otherworldly beauty that defined the entire "new age" genre. Enya's "Orinoco Flow" opens with this patch. Set PCM Vol=1, Synth Vol=0 to hear just the attacks - soft breath and choir noise. Set PCM=0, Synth=1 to hear just the layered sine/sawtooth.</div>
<div class="step-card"><span class="step-num">PATCH 1 - DIGITAL NATIVE DANCE (the anthem)</span>Sharp metallic piano PCM attack into a bright sawtooth with fast decay. The PCM is a prepared piano hit - metallic, percussive. The synth layer is very short, giving it a pluck character. This patch became so ubiquitous it appears in virtually every D-50 owner's first hour with the instrument. It is the sound that says "1987."</div>
<div class="step-card"><span class="step-num">PATCH 2 - PIZZAGOGO (plucked strings)</span>Guitar string noise PCM into a very short sawtooth decay. The PCM captures the string pluck; the synthesized portion decays in under a second. This approximates pizzicato (plucked) strings convincingly because the synth portion is brief enough that the ear cannot identify it as synthetic. A lesson in using short synth decays to hide the artificial sustain.</div>
<div class="step-card"><span class="step-num">PATCH 3 - ORCHESTRA HIT</span>Brass section stab PCM (full orchestra brass hit) into a short square wave burst. The PCM does the heavy lifting - a real brass attack is almost impossible to synthesize convincingly. The synth adds body and thickness. This one-shot patch became a hip-hop and dance music staple: Snap! "The Power," Salt-N-Pepa productions, countless others.</div>
<div class="step-card"><span class="step-num">PATCH 4 - VOCAL (choir pad)</span>Vowel formant noise PCM into a sine wave with very slow attack. The PCM is a brief "ah" breath; the synthesized portion is simple but the slow attack makes the whole patch swell. Sounds like a choir heard at distance. This type of patch (PCM texture into sine sustain) is the template for most D-50 atmospheric sounds.</div>
<div class="step-card"><span class="step-num">PATCH 5 - CLAVINET (funky keyboard)</span>Short noise/string transient PCM into a square wave with fast decay and slight resonance. The Clavinet (as used by Stevie Wonder) has a very distinctive attack where the string is struck and quickly dampened. LA synthesis approximates this with a very brief PCM and an equally brief synth burst. The resonance adds the "twang."</div>
<div class="tip">>> TIP: Solo each layer with the volume sliders: set PCM=1, Synth=0 to hear just the attack; set PCM=0, Synth=1 to hear just the sustain. The relationship between these two is the entire art of D-50 programming. Some patches use the PCM layer almost silently - just a texture enhancement. Others make the PCM dominant and use synthesis only to extend the tail. There is no rule.</div>
<div class="challenge">Patch=0 (Fantasia). PCM=1, Synth=0: hear just the choir breath noise. PCM=0, Synth=1: hear just the layered sine/saw - boring. Now set both to 0.6. That combination is Fantasia. Now switch to Patch=3 (Orchestra Hit) and do the same solo exercise. Notice how the PCM is doing almost all the work - the synth is barely audible but would be missed if absent.</div>
`,
code:`// LA SYNTHESIS: D-50 ICONIC PATCHES DECONSTRUCTED
// The LA trick: a short PCM sample gives the attack transient (the "lie"),
// then synth oscillators provide the sustained body (the "truth").
// The ear fills in the gap and hears a coherent acoustic instrument.
//
// The D-50's synth layer was NOT just one oscillator. It used:
//   - Detuned unison pairs (chorus/width)
//   - LFO vibrato and tremolo
//   - Filter envelopes (cutoff sweeps over time)
//   - Stacked partials at musical intervals
// Each patch below uses a different TECHNIQUE, not just a different waveform.

function makeSynth(audioCtx, params) {
  const master = audioCtx.createGain();
  master.gain.value = 0.55;
  const now = audioCtx.currentTime;
  const f   = params.freq;
  const sr  = audioCtx.sampleRate;
  const preset = Math.round(params.preset);

  // PCM config: [pcmType, pcmDur, pcmFiltType, pcmFiltHz, pcmFiltQ]
  const pcmCfg = [
    [3, 0.35, 'lowpass',   900, 0.7],  // 0 Fantasia:     choir vowel, dark
    [0, 0.12, 'highpass',  120, 0.5],  // 1 Native Dance: piano strike, open
    [1, 0.18, 'bandpass',  800, 2.0],  // 2 Pizzagogo:    pluck, string band
    [2, 0.10, 'bandpass', 2000, 1.5],  // 3 Orch Hit:     brass buzz, power band
    [5, 0.25, 'bandpass',  600, 0.4],  // 4 Vocal Pad:    breath, formant range
    [4, 0.06, 'notch',    f*2,  8.0],  // 5 Clavinet:     click, fund notched out
    [6, 0.20, 'highpass', 2000, 1.0],  // 6 Glass Pad:    bell tap, no body
    [2, 0.12, 'bandpass',  400, 1.8],  // 7 Brass Stab:   lip buzz, warm fund
  ];

  const [pcmType, pcmDur, pcmFiltType, pcmFiltHz, pcmFiltQ] = pcmCfg[Math.min(preset, 7)];

  // BUILD PCM BUFFER
  const bufLen = Math.floor(sr * (pcmDur + 0.05));
  const buf = audioCtx.createBuffer(1, bufLen, sr);
  const dat = buf.getChannelData(0);
  let sx = 0;

  for (let i = 0; i < bufLen; i++) {
    const t = i / sr;
    const w = Math.random() * 2 - 1;
    if (pcmType === 0) {
      sx = sx * 0.88 + w * 0.12;
      const fEnv = Math.min(1, t/0.03) * Math.exp(-t / 0.28);
      dat[i] = sx * fEnv * 0.5 + Math.sin(2*Math.PI*730*i/sr)*fEnv*0.3
                                + Math.sin(2*Math.PI*1090*i/sr)*fEnv*0.2;
    } else if (pcmType === 1) {
      const hammEnv = Math.exp(-t * 60) * 0.9;
      const strEnv  = Math.exp(-t * 10) * (1 - Math.exp(-t * 100));
      dat[i] = w * hammEnv + Math.sin(2*Math.PI*f*i/sr)*strEnv*0.7
                           + Math.sin(2*Math.PI*f*2*i/sr)*strEnv*0.3;
    } else if (pcmType === 2) {
      sx = sx * 0.75 + w * 0.25;
      dat[i] = sx * Math.exp(-t * 25);
    } else if (pcmType === 3) {
      const buzzEnv = Math.exp(-t * 18);
      dat[i] = Math.tanh(Math.sin(2*Math.PI*f*i/sr) * 4) * buzzEnv * 0.8 + w * buzzEnv * 0.2;
    } else if (pcmType === 4) {
      const clkEnv = Math.exp(-t * 120);
      dat[i] = w * clkEnv + Math.sin(2*Math.PI*f*i/sr) * clkEnv * 0.6;
    } else if (pcmType === 5) {
      sx = sx * 0.94 + w * 0.06;
      dat[i] = sx * Math.min(1, t/(pcmDur*0.6)) * Math.exp(-t/(pcmDur*0.8));
    } else {
      dat[i] = Math.sin(2*Math.PI*f*3*i/sr) * Math.exp(-t*30) * 0.7 + w * Math.exp(-t*80) * 0.3;
    }
  }

  const pcmSrc = audioCtx.createBufferSource();
  pcmSrc.buffer = buf;
  const pcmFlt = audioCtx.createBiquadFilter();
  pcmFlt.type = pcmFiltType; pcmFlt.frequency.value = pcmFiltHz; pcmFlt.Q.value = pcmFiltQ;
  const pcmGain = audioCtx.createGain();
  pcmGain.gain.setValueAtTime(params.pcmVol, now);
  pcmGain.gain.setValueAtTime(params.pcmVol * 0.9, now + pcmDur * 0.6);
  pcmGain.gain.linearRampToValueAtTime(0, now + pcmDur + 0.04);
  pcmSrc.connect(pcmFlt); pcmFlt.connect(pcmGain); pcmGain.connect(master);
  pcmSrc.start(now);

  // SYNTH LAYER: each preset uses a different TECHNIQUE for its sustained texture.
  // This is what makes the D-50's patches feel different -- not waveform choice,
  // but the movement and layering strategy.
  const synEnv = audioCtx.createGain();
  synEnv.connect(master);
  const oscs = []; // collect all oscillators to start together

  if (preset === 0) {
    // FANTASIA: slow choir pad
    // Technique: 4 detuned sines in a slow unison cluster.
    // Slight detuning creates beating. Filter sweeps open slowly (cold -> warm).
    // The D-50's Fantasia patch is basically a detuned sine choir with a long filter attack.
    const detunes = [-8, -3, 3, 8]; // cents
    const lp = audioCtx.createBiquadFilter();
    lp.type = 'lowpass';
    lp.frequency.setValueAtTime(300, now);
    lp.frequency.linearRampToValueAtTime(1200, now + 3.0); // filter sweeps open
    lp.Q.value = 0.7;
    lp.connect(synEnv);
    synEnv.gain.setValueAtTime(0, now);
    synEnv.gain.linearRampToValueAtTime(params.synVol * 0.4, now + 0.8); // slow swell
    synEnv.gain.exponentialRampToValueAtTime(0.0001, now + 5.5);
    detunes.forEach(c => {
      const o = audioCtx.createOscillator();
      o.type = 'sine';
      o.frequency.value = f * Math.pow(2, c/1200);
      o.connect(lp); oscs.push(o);
    });

  } else if (preset === 1) {
    // NATIVE DANCE: plucked/struck body
    // Technique: two detuned sawtooths + a LPF with a fast envelope (bright attack, dulls quickly).
    // The filter closes fast to simulate a plucked string body dulling after the strike.
    const lp = audioCtx.createBiquadFilter();
    lp.type = 'lowpass'; lp.Q.value = 1.5;
    lp.frequency.setValueAtTime(3500, now);
    lp.frequency.exponentialRampToValueAtTime(600, now + 0.4); // dull quickly
    lp.connect(synEnv);
    synEnv.gain.setValueAtTime(0, now);
    synEnv.gain.linearRampToValueAtTime(params.synVol, now + 0.01);
    synEnv.gain.exponentialRampToValueAtTime(0.0001, now + 0.7);
    [-5, 5].forEach(c => {
      const o = audioCtx.createOscillator();
      o.type = 'sawtooth';
      o.frequency.value = f * Math.pow(2, c/1200);
      o.connect(lp); oscs.push(o);
    });

  } else if (preset === 2) {
    // PIZZAGOGO: pizzicato body
    // Technique: one sawtooth + one an octave up (0.5 vol), plus pitch LFO for slight shimmer.
    // Octave stacking is the D-50 trick for making simple waveforms feel rich.
    const lp = audioCtx.createBiquadFilter();
    lp.type = 'lowpass'; lp.frequency.value = 1800; lp.Q.value = 0.8;
    lp.connect(synEnv);
    synEnv.gain.setValueAtTime(0, now);
    synEnv.gain.linearRampToValueAtTime(params.synVol, now + 0.01);
    synEnv.gain.exponentialRampToValueAtTime(0.0001, now + 0.9);
    const o1 = audioCtx.createOscillator();
    o1.type = 'sawtooth'; o1.frequency.value = f; o1.connect(lp); oscs.push(o1);
    const o2 = audioCtx.createOscillator();
    const g2 = audioCtx.createGain(); g2.gain.value = 0.4;
    o2.type = 'sawtooth'; o2.frequency.value = f * 2;
    o2.connect(g2); g2.connect(lp); oscs.push(o2);

  } else if (preset === 3) {
    // ORCHESTRA HIT: stab
    // Technique: square + a 5th above (f*1.5) for classic orchestral depth.
    // Stacked 5ths are the trick Roland used for the famous D-50 orch hit.
    // Very fast gate -- the whole thing is gone in 0.35s.
    const lp = audioCtx.createBiquadFilter();
    lp.type = 'lowpass'; lp.frequency.value = 2400; lp.Q.value = 2.5;
    lp.connect(synEnv);
    synEnv.gain.setValueAtTime(0, now);
    synEnv.gain.linearRampToValueAtTime(params.synVol, now + 0.008);
    synEnv.gain.exponentialRampToValueAtTime(0.0001, now + 0.38);
    const o1 = audioCtx.createOscillator();
    o1.type = 'square'; o1.frequency.value = f; o1.connect(lp); oscs.push(o1);
    const o2 = audioCtx.createOscillator();
    const g2 = audioCtx.createGain(); g2.gain.value = 0.5;
    o2.type = 'square'; o2.frequency.value = f * 1.5; // perfect 5th
    o2.connect(g2); g2.connect(lp); oscs.push(o2);

  } else if (preset === 4) {
    // VOCAL PAD: slowly evolving, breath-like
    // Technique: triangle + slow LFO tremolo (amplitude modulation at 4Hz).
    // LFO makes the pad "breathe". Filter stays warm (no sweep).
    const lfo = audioCtx.createOscillator();
    lfo.type = 'sine'; lfo.frequency.value = 3.8;
    const lfoGain = audioCtx.createGain(); lfoGain.gain.value = 0.18;
    lfo.connect(lfoGain);
    const tremoloGain = audioCtx.createGain(); tremoloGain.gain.value = 0.82;
    lfoGain.connect(tremoloGain.gain); // LFO modulates amplitude
    const lp = audioCtx.createBiquadFilter();
    lp.type = 'lowpass'; lp.frequency.value = 700; lp.Q.value = 0.5;
    lp.connect(tremoloGain); tremoloGain.connect(synEnv);
    synEnv.gain.setValueAtTime(0, now);
    synEnv.gain.linearRampToValueAtTime(params.synVol, now + 1.0);
    synEnv.gain.exponentialRampToValueAtTime(0.0001, now + 5.0);
    const o1 = audioCtx.createOscillator();
    o1.type = 'triangle'; o1.frequency.value = f; o1.connect(lp); oscs.push(o1);
    lfo.start(now);
    // lfo is NOT pushed to oscs -- the main loop calls .start() on everything in oscs,
    // which would double-start the lfo and throw an InvalidStateError.

  } else if (preset === 5) {
    // CLAVINET: very tight pluck
    // Technique: single square with a fast resonant LPF that opens then snaps shut.
    // The resonant peak at the cutoff gives it a "twangy" quality.
    const lp = audioCtx.createBiquadFilter();
    lp.type = 'lowpass'; lp.Q.value = 7;
    lp.frequency.setValueAtTime(2200, now);
    lp.frequency.exponentialRampToValueAtTime(400, now + 0.12);
    lp.connect(synEnv);
    synEnv.gain.setValueAtTime(0, now);
    synEnv.gain.linearRampToValueAtTime(params.synVol, now + 0.005);
    synEnv.gain.exponentialRampToValueAtTime(0.0001, now + 0.32);
    const o1 = audioCtx.createOscillator();
    o1.type = 'square'; o1.frequency.value = f; o1.connect(lp); oscs.push(o1);

  } else if (preset === 6) {
    // GLASS PAD: ethereal, slow swell
    // Technique: 3 sines at the fundamental, major 3rd, and 5th (a major chord in one patch).
    // Stacked harmonic intervals is a core D-50 pad technique.
    // Extremely slow attack -- this patch "breathes in" over 2 seconds.
    const lp = audioCtx.createBiquadFilter();
    lp.type = 'lowpass'; lp.frequency.value = 600; lp.Q.value = 0.3;
    lp.connect(synEnv);
    synEnv.gain.setValueAtTime(0, now);
    synEnv.gain.linearRampToValueAtTime(params.synVol, now + 2.0); // very slow
    synEnv.gain.exponentialRampToValueAtTime(0.0001, now + 7.0);
    const intervals = [1, 1.2599, 1.4983]; // root, major 3rd, perfect 5th
    const amps = [1.0, 0.6, 0.5];
    intervals.forEach((ratio, idx) => {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain(); g.gain.value = amps[idx] * 0.5;
      o.type = 'sine'; o.frequency.value = f * ratio;
      o.connect(g); g.connect(lp); oscs.push(o);
    });

  } else {
    // BRASS STAB (preset 7): hard punchy brass
    // Technique: two sawtooths detuned a few cents + fast filter envelope.
    // Filter opens wide on attack then closes (the "wah" envelope of real brass).
    const lp = audioCtx.createBiquadFilter();
    lp.type = 'lowpass'; lp.Q.value = 3.5;
    lp.frequency.setValueAtTime(500, now);
    lp.frequency.linearRampToValueAtTime(3200, now + 0.04); // fast open
    lp.frequency.exponentialRampToValueAtTime(800, now + 0.22); // close back
    lp.connect(synEnv);
    synEnv.gain.setValueAtTime(0, now);
    synEnv.gain.linearRampToValueAtTime(params.synVol, now + 0.01);
    synEnv.gain.exponentialRampToValueAtTime(0.0001, now + 0.25);
    [-6, 6].forEach(c => {
      const o = audioCtx.createOscillator();
      o.type = 'sawtooth';
      o.frequency.value = f * Math.pow(2, c/1200);
      o.connect(lp); oscs.push(o);
    });
  }

  // Start all synth oscillators
  oscs.forEach(o => o.start(now));

  // Longest possible duration across all presets
  const maxRel = [5.5, 0.7, 0.9, 0.38, 5.0, 0.32, 7.0, 0.25];
  const stopAt = now + maxRel[preset] + 0.2;

  return { node: master, oscs, pcmSrc, stopAt };
}

function updateParams(nodes, params) {
  // freq change requires restart (multiple oscillators, no single node)
}

`},


{ subtitle:'27 - Z-Plane Filters (EMU)', title:'EMU Morpheus: Z-Plane Filter Morphing',
params:[
  {id:'cube',       label:'Filter Cube (0-5)',     min:0,   max:5,   step:1,   def:1},
  {id:'morph',      label:'Morph Start',           min:0,   max:1,   step:.01, def:0},
  {id:'morphSpeed', label:'Morph Sweep Speed',     min:0,   max:1,   step:.01, def:0.5},
  {id:'freq',       label:'Frequency (Hz)',         min:50,  max:800, step:1,   def:110},
  {id:'transform',  label:'Transform (shape depth)',min:0,   max:1,   step:.01, def:0.5},
],
body:`<div class="lesson-intro">The EMU Morpheus (1993) introduced Z-Plane synthesis: a filter architecture where the filter itself can transform in real time from one complex shape to another. Unlike every other synthesizer where the filter stays the same type and you only move its cutoff frequency, the Morpheus has 14-pole filters built from 7 cascaded two-pole stages whose coefficients can be smoothly interpolated between completely different filter topologies. The Morph parameter sweeps you between two entirely different filters &mdash; not between two settings of the same filter, but between fundamentally different shapes.</div>

<div class="step-card"><span class="step-num">HOW Z-PLANE FILTERS WORK TECHNICALLY</span>
A digital IIR filter is defined by a set of coefficient numbers. Change those coefficients and you change what the filter does: from low-pass to high-pass, from a notch to a peak, from a flat response to a formant. The Z-Plane architecture stores multiple sets of filter coefficients at the 'corners' of a conceptual 3D cube, and then interpolates between those corner coefficients in real time using three control parameters (Frequency, Morph, Transform).<br><br>
Dave Rossum's key invention was the 'ARMAdillo' encoding: a logarithmic compression of the IIR filter coefficients that makes interpolation produce smooth, stable filter shapes (rather than audio glitches or instability). Without this encoding, morphing between two IIR filter coefficient sets would produce unstable intermediate states that could explode into loud noise. With ARMAdillo encoding, every intermediate point in the 3D cube is a well-behaved, stable filter.<br><br>
The original Morpheus chip achieved 64 two-pole filter stages on a 20,000-gate ASIC in 1989 &mdash; an extraordinary engineering achievement. The 2017 Rossum Electro-Music Eurorack version has 280 filter cubes and allows all three axes to be modulated in real time simultaneously.
</div>

<div class="step-card"><span class="step-num">THE THREE AXES</span>
<strong>Frequency</strong>: on the original Morpheus, this was set at note-on and could not be changed while the note played (CPU limitation). It typically maps to keyboard pitch, sliding the entire filter shape up or down in frequency like a conventional filter cutoff. On the Rossum Eurorack module it can be real-time automated.<br><br>
<strong>Morph</strong>: the real-time axis. This is the signature control &mdash; it sweeps you between two filter states. Patching an envelope or LFO to Morph produces timbral changes far more dramatic than sweeping a conventional filter. The Morph parameter simultaneously changes the frequency, Q, and gain of up to 20 independent filter parameters in a single, musically meaningful gesture.<br><br>
<strong>Transform</strong>: on the original, also set at note-on (typically mapped to velocity). Often used to scale the depth of peaks and notches &mdash; velocity-sensitive filter intensity. On the Eurorack version this is also real-time.
</div>

<div class="step-card"><span class="step-num">FILTER CUBE 0 &mdash; LOWPASS to HIGHPASS MORPH</span>
The simplest demonstration: Morph at 0 = 12dB/oct low-pass. Morph at 1 = 12dB/oct high-pass. In between, you are neither: the intermediate states produce frequency responses with both low-frequency attenuation AND high-frequency attenuation, creating mid-band emphasis that no conventional filter topology can produce. Drag Morph slowly and watch the spectrum shift.</div>

<div class="step-card"><span class="step-num">FILTER CUBE 1 &mdash; VOCAL FORMANT MORPH (Ah-Ay-Ee)</span>
One of the original Morpheus filter cubes: Morph sweeps through the vowel sequence 'ah' (peaks at 700Hz, 1100Hz), 'ay' (intermediate), 'ee' (peaks at 280Hz, 2600Hz). These are accurate vocal formant positions. The Frequency axis shifts all formant peaks up or down together (like opening/closing your mouth while saying the vowel). This is how the EMU produced convincing vocal sweeps from a static synthesizer &mdash; no vocoder or sample required.</div>

<div class="step-card"><span class="step-num">FILTER CUBE 2 &mdash; COMB FILTER / PHASER MORPH</span>
Morph sweeps from a clean comb filter (evenly spaced notches) to a phaser-like response (notches with peaks between them). The spacing of the notches is controlled by Transform. This is the characteristic EMU 'growl': the filter Morph parameter modulated by a fast LFO creates a rapidly evolving comb pattern that has the metallic, buzzy texture associated with EMU samplers in DnB and breakbeat production.</div>

<div class="step-card"><span class="step-num">FILTER CUBE 3 &mdash; DUAL-PEAK MORPH</span>
Two resonant peaks. Morph slides them from close together (a single wide peak) to far apart (two narrow separate peaks). Transform scales the Q of both peaks simultaneously. When the two peaks are close, it sounds like a single resonant filter. As they separate, the sound becomes more formant-like and vocal. This is a good demonstration of why Z-Plane filters sound 'bigger' than conventional designs: you are manipulating the entire frequency response topology, not just one parameter.</div>

<div class="step-card"><span class="step-num">FILTER CUBE 4 &mdash; BANDPASS to NOTCH MORPH</span>
Morph sweeps from a resonant bandpass (energy concentrated at center frequency) to a notch (energy removed at center frequency). The transition passes through states where the filter is partially both: a complex mid-band shaping that sounds like a cocked wah. The Frequency parameter moves the center of the BP/notch up and down.</div>

<div class="step-card"><span class="step-num">FILTER CUBE 5 &mdash; THE EMU 'GROWL' (LPF-to-comb modulated)</span>
This is the Reese bass and DnB texture technique: a low-pass filter whose Morph parameter is driven by an LFO at 1-4Hz, sweeping between a clean LPF and a comb filter. The brief moments of comb filtering add metallic harmonics and then they disappear again. Apply to a detuned oscillator pair and you get the classic EMU E4/Morpheus bass sound that dominated UK drum and bass 1994-2000.</div>`,
code:`// EMU Z-PLANE FILTER SIMULATION
// A Z-Plane filter = multiple IIR filter stages whose coefficients
// are smoothly interpolated between preset 'corner' topologies.
// The MORPH parameter changes the filter SHAPE, not just the cutoff.
// We simulate with WebAudio BiquadFilter chains whose parameters
// are set by the current Morph value, plus a slow LFO to sweep Morph
// automatically so you can hear the transformation while the note plays.

function makeSynth(audioCtx, params) {
  const master = audioCtx.createGain();
  master.gain.value = 0.4;
  const now = audioCtx.currentTime;
  const f = params.freq;
  const cube = Math.round(params.cube);

  // === INPUT SOURCE ===
  // Sawtooth gives the richest harmonic content for filter demonstration.
  // Add a second detuned oscillator for width (common EMU patch technique).
  const osc1 = audioCtx.createOscillator();
  const osc2 = audioCtx.createOscillator();
  osc1.type = osc2.type = 'sawtooth';
  osc1.frequency.value = f;
  osc2.frequency.value = f * 1.007; // slight detune for width

  const oscGain = audioCtx.createGain();
  oscGain.gain.value = 0.5;
  osc1.connect(oscGain); osc2.connect(oscGain);

  // === AMPLITUDE ENVELOPE ===
  const env = audioCtx.createGain();
  env.gain.setValueAtTime(0.001, now);
  env.gain.linearRampToValueAtTime(0.9, now + 0.02);
  env.gain.exponentialRampToValueAtTime(0.5, now + 0.3);
  env.gain.exponentialRampToValueAtTime(0.0001, now + 3.5);
  oscGain.connect(env);

  function lerp(a, b, t) { return a + (b - a) * t; }

  // === Z-PLANE MORPH ANIMATION ===
  // The whole point of Z-Plane is that MORPH can be modulated in real time.
  // We use scheduled AudioParam ramps to sweep Morph from 0 to 1 and back,
  // so you hear the filter transformation automatically as the note plays.
  // morphSpeed: 0=static (set by slider), 1=full sweep in 3 seconds.
  const sweepTime = lerp(0.01, 3.0, params.morphSpeed);

  // Build filter chain for current cube.
  // Each cube has 2-3 BiquadFilter stages whose params are set by morph.
  // We schedule the params to animate from morph=0 state to morph=1 state,
  // so the filter morphs during the note just like on the real Morpheus.
  let filterChain;
  const morphStart = params.morph;
  const morphEnd = params.morph > 0.5 ? 0 : 1; // auto-sweep to opposite end

  if (cube === 0) {
    // CUBE 0: Lowpass -> Highpass
    // Intermediate states: a complex bandpass unavailable from a single filter.
    // LP*HP in series creates steep sides with a mid-band window.
    const lp = audioCtx.createBiquadFilter();
    const hp = audioCtx.createBiquadFilter();
    lp.type = 'lowpass';  hp.type = 'highpass';
    const q = 1 + params.transform * 8;
    lp.Q.value = hp.Q.value = q;
    lp.frequency.setValueAtTime(lerp(f*4, f*0.5, morphStart), now);
    lp.frequency.linearRampToValueAtTime(lerp(f*4, f*0.5, morphEnd), now + sweepTime);
    hp.frequency.setValueAtTime(lerp(f*0.3, f*3, morphStart), now);
    hp.frequency.linearRampToValueAtTime(lerp(f*3, f*0.3, morphStart > 0.5 ? 0 : 1), now + sweepTime);
    env.connect(lp); lp.connect(hp); filterChain = hp;

  } else if (cube === 1) {
    // CUBE 1: Vocal formant Ah (700/1100Hz) -> Ee (280/2600Hz)
    // Moving Morph from 0 to 1 is literally saying "ahhh...eeee".
    // The Frequency axis scales all formant peaks up/down like changing
    // the physical length of the vocal tract.
    const freqScale = f / 440;
    const f1_start = lerp(700, 280, morphStart) * freqScale;
    const f2_start = lerp(1100, 2600, morphStart) * freqScale;
    const f1_end   = lerp(700, 280, morphEnd) * freqScale;
    const f2_end   = lerp(1100, 2600, morphEnd) * freqScale;
    const q = 3 + params.transform * 12;
    const pk1 = audioCtx.createBiquadFilter();
    pk1.type = 'peaking'; pk1.Q.value = q;
    pk1.frequency.setValueAtTime(f1_start, now);
    pk1.frequency.linearRampToValueAtTime(f1_end, now + sweepTime);
    pk1.gain.setValueAtTime(lerp(8, 12, morphStart), now);
    pk1.gain.linearRampToValueAtTime(lerp(8, 12, morphEnd), now + sweepTime);
    const pk2 = audioCtx.createBiquadFilter();
    pk2.type = 'peaking'; pk2.Q.value = q * 1.3;
    pk2.frequency.setValueAtTime(f2_start, now);
    pk2.frequency.linearRampToValueAtTime(f2_end, now + sweepTime);
    pk2.gain.setValueAtTime(lerp(6, 14, morphStart), now);
    pk2.gain.linearRampToValueAtTime(lerp(6, 14, morphEnd), now + sweepTime);
    const shelf = audioCtx.createBiquadFilter();
    shelf.type = 'lowshelf'; shelf.frequency.value = 400 * freqScale; shelf.gain.value = -6;
    env.connect(shelf); shelf.connect(pk1); pk1.connect(pk2); filterChain = pk2;

  } else if (cube === 2) {
    // CUBE 2: Comb filter -> Phaser (3 notches with peaks between them)
    // Morph deepens the notches and adds resonant peaks between them.
    // Transform controls notch spacing (pitch of the comb).
    const spacing = 150 + params.transform * 700;
    const n1 = audioCtx.createBiquadFilter();
    const n2 = audioCtx.createBiquadFilter();
    const n3 = audioCtx.createBiquadFilter();
    [n1, n2, n3].forEach((n, i) => {
      n.type = 'notch';
      n.frequency.value = spacing * (i + 1);
      n.Q.setValueAtTime(lerp(1, 12, morphStart), now);
      n.Q.linearRampToValueAtTime(lerp(1, 12, morphEnd), now + sweepTime);
    });
    const pk = audioCtx.createBiquadFilter();
    pk.type = 'peaking'; pk.frequency.value = spacing * 1.5;
    pk.Q.value = 1.5;
    pk.gain.setValueAtTime(lerp(0, 14, morphStart), now);
    pk.gain.linearRampToValueAtTime(lerp(0, 14, morphEnd), now + sweepTime);
    env.connect(n1); n1.connect(n2); n2.connect(n3); n3.connect(pk); filterChain = pk;

  } else if (cube === 3) {
    // CUBE 3: Dual-peak separation
    // Morph slides two resonant peaks from overlapping (one wide peak)
    // to widely separated (two distinct formants = vocal tract simulation).
    const q = 2 + params.transform * 10;
    const spread_start = lerp(1.05, 3.5, morphStart);
    const spread_end   = lerp(1.05, 3.5, morphEnd);
    const pk1 = audioCtx.createBiquadFilter();
    pk1.type = 'peaking'; pk1.frequency.value = f * 1.5; pk1.Q.value = q; pk1.gain.value = 12;
    const pk2 = audioCtx.createBiquadFilter();
    pk2.type = 'peaking'; pk2.Q.value = q; pk2.gain.value = 12;
    pk2.frequency.setValueAtTime(f * 1.5 * spread_start, now);
    pk2.frequency.linearRampToValueAtTime(f * 1.5 * spread_end, now + sweepTime);
    const lp = audioCtx.createBiquadFilter();
    lp.type = 'lowpass'; lp.frequency.value = Math.min(f * 8, 8000);
    env.connect(lp); lp.connect(pk1); pk1.connect(pk2); filterChain = pk2;

  } else if (cube === 4) {
    // CUBE 4: Bandpass -> Notch
    // From energy concentrated at center to a hole at center.
    // Intermediate = complex cocked-wah response no single filter achieves.
    const q = 2 + params.transform * 10;
    const bp = audioCtx.createBiquadFilter();
    bp.type = 'bandpass'; bp.frequency.value = f * 2; bp.Q.value = q;
    const nt = audioCtx.createBiquadFilter();
    nt.type = 'notch'; nt.frequency.value = f * 2; nt.Q.value = q;
    const bpGain = audioCtx.createGain();
    bpGain.gain.setValueAtTime(1 - morphStart, now);
    bpGain.gain.linearRampToValueAtTime(1 - morphEnd, now + sweepTime);
    const ntGain = audioCtx.createGain();
    ntGain.gain.setValueAtTime(morphStart, now);
    ntGain.gain.linearRampToValueAtTime(morphEnd, now + sweepTime);
    const mix = audioCtx.createGain(); mix.gain.value = 1;
    env.connect(bp); bp.connect(bpGain); bpGain.connect(mix);
    env.connect(nt); nt.connect(ntGain); ntGain.connect(mix);
    filterChain = mix;

  } else {
    // CUBE 5: EMU Growl (LPF -> LPF + comb notches)
    // The Reese bass / DnB technique: clean LP that morphs toward
    // an LP with deep comb notches added, creating metallic buzzing texture.
    const lp = audioCtx.createBiquadFilter();
    lp.type = 'lowpass'; lp.Q.value = 1 + params.transform * 5;
    lp.frequency.setValueAtTime(lerp(f*8, f*3, morphStart), now);
    lp.frequency.linearRampToValueAtTime(lerp(f*8, f*3, morphEnd), now + sweepTime);
    const c1 = audioCtx.createBiquadFilter();
    c1.type = 'notch'; c1.frequency.value = f * 2; c1.Q.value = 3;
    const c2 = audioCtx.createBiquadFilter();
    c2.type = 'notch'; c2.frequency.value = f * 4; c2.Q.value = 3;
    const combMix = audioCtx.createGain();
    combMix.gain.setValueAtTime(morphStart, now);
    combMix.gain.linearRampToValueAtTime(morphEnd, now + sweepTime);
    const dryMix = audioCtx.createGain(); dryMix.gain.value = 1;
    env.connect(dryMix); dryMix.connect(lp);
    env.connect(c1); c1.connect(c2); c2.connect(combMix); combMix.connect(lp);
    filterChain = lp;
  }

  filterChain.connect(master);

  return { node: master, osc: osc1, oscs: [osc1, osc2], stopAt: now + 4 };
}

function updateParams(nodes, params) {
  nodes.osc.frequency.value = params.freq;
  nodes.osc2.frequency.value = params.freq * 1.007;
}
`},

{ subtitle:'28 - Tracker Pt 1: Rhythm', title:'Build a Tracker: Rhythm Section',
params:[], isTracker:true,
body:`
<p>A <strong>tracker</strong> is a step sequencer where each column is a channel (instrument) and each row is a 16th-note time slot. This is exactly how 90s computer music was made: ProTracker on the Amiga, FastTracker on DOS, ModPlug. Every rave, jungle, and early techno track you've heard was made this way.</p>
<p>We are building our tracker in three lessons. Part 1: the rhythm section (KICK, SNARE, HIHAT).</p>
<div class="step-card"><span class="step-num">HOW TO USE</span>1. Tap a channel header (KICK, SNARE, HIHAT) to select it. 2. Tap a step cell to toggle it on/off. 3. Tap a note name below to assign that note to the step you just toggled. 4. Tap PLAY.</div>
<div class="step-card"><span class="step-num">THE KICK DRUM - LA SYNTHESIS</span>Our kick uses Linear Arithmetic synthesis: a short PCM-style noise transient for the attack click, crossfading into a sine wave with an exponentially falling pitch. The falling pitch is what gives it the "thud." This is how the Roland TR-909 kick worked - a bridged-T oscillator that rings down.</div>
<div class="step-card"><span class="step-num">THE SNARE - NOISE + TONE</span>Snare = pitched body + noise tail. We use a short sine burst (the drum head resonance) layered with high-pass filtered white noise (the snare wires buzzing). The HPF removes low rumble, leaving just the crack and rattle.</div>
<div class="step-card"><span class="step-num">THE HIHAT - FILTERED NOISE</span>A hihat is simply white noise through a very high-pass filter (8kHz+) with a very short envelope. Closed hihat = 60ms. Open hihat = 300ms. That's literally the entire difference.</div>
<div class="step-card"><span class="step-num">BUILD A 4/4 PATTERN</span>Classic house/techno: KICK on steps 1, 5, 9, 13. SNARE on steps 5 and 13 (beats 2 and 4). HIHAT on every step. Try it, then deviate. Add a syncopated kick on step 4. Move the snare. That deviation is where groove comes from.</div>
<div class="tip">>> TIP: The "swing" feel in hip-hop and jungle comes from delaying every other 16th note by 10-20ms. Our grid is quantized (rigid), but you can fake swing by leaving the "swung" steps empty and using the steps just before them instead.</div>
<div class="challenge">Build a classic UK garage two-step: KICK on steps 1 and 11. SNARE on step 9. HIHAT on 1, 3, 5, 7, 9, 11, 13, 15 (every other). This asymmetric kick pattern is the defining feature of the genre. Notice how it creates forward momentum compared to straight 4/4.</div>
`,
code:`// -- TRACKER: RHYTHM ENGINE --
// A tracker is a step grid. Column = channel. Row = 16th-note time slot.
// Active cell = that sound fires on that beat. This is ProTracker on the Amiga.
// Every rave and jungle track from the early 90s started in a grid like this.
//
// KICK:  sine at ~80Hz with fast exponential pitch fall to ~45Hz.
//        The pitch drop is what makes it thump. Without it: a beep.
// SNARE: white noise burst (the crack) + short sine body, gated by AD envelope.
// HIHAT: very short noise burst through a steep high-pass filter (4kHz+).
//
// BPM controls the tick interval.
//   130 BPM = house  |  140 = techno  |  170 = DnB  |  175+ = jungle
function makeSynth(audioCtx, params) { return null; }
function updateParams(nodes, params) {}`},

{ subtitle:'29 - Tracker Pt 2: Bass Lines', title:'Build a Tracker: Bass & Harmony',
params:[], isTracker:true,
body:`
<p>With the rhythm section built, we add pitched instruments. The BASS channel plays synthesized bass notes - each step can have a different pitch. This is where the tracker becomes a sequencer, not just a drum machine.</p>
<div class="step-card"><span class="step-num">THE BASS CHANNEL - LA SYNTHESIS</span>The bass uses our LA approach: a short transient noise burst (the "pluck" of the string or key) crossfades into a sawtooth wave through a low-pass filter. The transient makes it punchy; the sawtooth gives it harmonic body. Set the Oct slider to 2 or 3 for bass register.</div>
<div class="step-card"><span class="step-num">HOW TO ENTER PITCHED NOTES</span>1. Tap BASS in the channel header. 2. Tap a step to toggle it on. 3. Immediately tap a note name in the picker below (C, D, E...). That note is now assigned to that specific step. Sharp notes (C#, D#) are available. The OCT slider sets the octave for all pitched channels.</div>
<div class="step-card"><span class="step-num">BASS LINES THAT WORK</span>The simplest bass line: root note on beat 1 (step 1), fifth on beat 3 (step 9). Try C on step 1, G on step 9. In minor: C on 1, G on 9, A# on 13. Acid bass: rapid 16th notes on one note with occasional jumps - the 303 style. Try C on every step 1-8, then F on 9, G on 11, C on 13.</div>
<div class="step-card"><span class="step-num">WRITING AGAINST THE KICK</span>The most important rule: bass and kick should not fight. When the kick hits (step 1), the bass note starting on step 1 will overlap. That is fine - it reinforces the downbeat. But avoid bass notes that start just BEFORE a kick hit (step 16 before step 1) unless you want a deliberate anticipation effect.</div>
<div class="tip">>> TIP: To use a different synthesis type for the bass instead of LA: open the tracker engine code (it is in the JavaScript of this page), find playTkBass(), and replace its body. You could use FM synthesis (modulator into carrier with an envelope) for a punchy FM bass, or phase distortion for a Casio-style bass.</div>
<div class="challenge">Build a classic deep house bass line in C minor. BASS: C on step 1, C on step 3, G on step 7, A# on step 9, G on step 13. Add KICK on 1, 5, 9, 13. SNARE on 5, 13. HIHAT every step. Set BPM to 124. This is a working deep house loop.</div>
`,
code:`// -- TRACKER: BASS + PITCHED STEPS --
// BASS channel adds pitched notes. Click an active step to assign its note.
//
// HOW PITCHED STEPS WORK:
// grid[channel][step].note = "C2", "F#1", etc.
// On each tick: freq = 440 * 2^((midiNote - 69) / 12)
// That's equal temperament. A4 = 440 Hz = MIDI 69.
// C2 = MIDI 36 = 65 Hz. Sub bass territory.
//
// BASS SOUND: sine wave, starts at 2x target pitch, falls exponentially
// to target over ~40ms. That pitch drop = the 808 bass thump.
// Without it you get a tone, not a hit.
//
// Try: C2 on step 1, G1 on step 9. Root + fifth. Most club music in two steps.
function makeSynth(audioCtx, params) { return null; }
function updateParams(nodes, params) {}`},

{ subtitle:'30 - Tracker Pt 3: Lead & Full Track', title:'Build a Tracker: Lead Melody & Full Track',
params:[], isTracker:true,
body:`
<p>The final piece: the LEAD channel. With all five channels running, you have a complete self-contained piece of music. This is literally how artists like Aphex Twin, Squarepusher, and LFO wrote their early tracks - five or six tracker channels, each doing one job.</p>
<div class="step-card"><span class="step-num">THE LEAD CHANNEL - SQUARE WAVE + ADSR</span>The lead uses a square wave (hollow, piercing, cutting through the mix) with a short attack and medium decay. Square waves work well for leads because their odd-harmonic content sits in the 1-4kHz presence range where the ear is most sensitive. The OCT slider controls which octave the lead plays in (4 or 5 for melody range).</div>
<div class="step-card"><span class="step-num">MELODY THAT WORKS OVER THE BASS</span>If your bass is in C minor (C, D#, F, G, A#), your lead should use the same scale. C minor scale: C, D, D#, F, G, G#, A#. Any combination of those notes will sound "in key." The simplest approach: mirror the bass root notes an octave up, then add passing notes between them.</div>
<div class="step-card"><span class="step-num">REPLACING THE LEAD SYNTH</span>The lead is the most replaceable channel. You could use: Phase Distortion (Casio CZ resonant sweep for the melody), FM synthesis (DX7 electric piano feel), Additive (Hammond-style organ lead), or Wavetable scanning (evolving pad-style lead). The tracker engine's playTkLead() function is where you would swap in a different synthesis approach.</div>
<div class="step-card"><span class="step-num">MIXING IN THE TRACKER</span>Volume balance matters. Kick should be loudest. Bass slightly quieter. Snare similar to kick. Hihat quiet (60% of kick). Lead quieter still, sitting above the bass but below the kick. Our synth gains are pre-set for a balanced mix but you can tune them by editing the playTk*() functions.</div>
<div class="step-card"><span class="step-num">FULL TRACK RECIPE</span>BPM 130 (trance/progressive). KICK: 1,5,9,13. SNARE: 5,13. HIHAT: every step. BASS (oct 2): C on 1, C on 3, G on 9, A# on 11. LEAD (oct 4): C on 1, D# on 5, G on 7, A# on 9, C on 13, D# on 15. That is a complete 2-bar trance pattern from 1997.</div>
<div class="tip">>> TIP: Real trackers had "effects columns" per step - commands like vibrato, portamento (pitch slide), volume changes, and arpeggio. Our tracker has fixed envelopes, but you could extend it: add a "slide" flag that makes the bass glide from the previous note pitch (this is how the TB-303 acid slide works).</div>
<div class="challenge">Build a complete track and export it mentally: count the bars. 16 steps = 1 bar at 4/4. Loop it 4 times = intro. Add the lead on the repeat = verse. Remove kick = breakdown. Bring kick back = drop. That structure, invented in tracker software in 1990, is still the template for every club track made today.</div>
`,
code:`// -- FULL TRACKER: ALL FIVE CHANNELS --
// KICK / SNARE / HIHAT / BASS / LEAD -- all running together.
// ProTracker MOD file, 1992. This is how it was done.
//
// LEAD SYNTH: square wave, short pluck envelope. Assign notes to steps.
//
// TRANCE RECIPE:
//   KICK  -- every even step (four-on-the-floor)
//   SNARE -- steps 5 and 13 (beats 2 and 4)
//   HIHAT -- every step (16th-note grid)
//   BASS  -- root on step 1, fifth on step 9
//   LEAD  -- your melody, higher octave
// That's the DNA of tens of thousands of tracks.
//
// TEMPO: 128=house | 138=trance | 140=techno | 170=DnB
function makeSynth(audioCtx, params) { return null; }
function updateParams(nodes, params) {}`},

{ subtitle:'31 - LA Sound Design', title:'LA Synthesis: Complete Sound Design Guide',
params:[
  {id:'preset', label:'Sound (0-9)', min:0, max:9, step:1, def:0},
  {id:'pcmVol', label:'PCM Attack Vol', min:0, max:1, step:.01, def:0.85},
  {id:'synVol', label:'Synth Sustain Vol', min:0, max:1, step:.01, def:0.55},
  {id:'freq',   label:'Frequency (Hz)', min:40, max:1600, step:1, def:220},
],
body:`
<p>LA synthesis is more versatile than its reputation as "that 80s digital piano" suggests. Because you control the attack and sustain independently, you can build sounds impossible with pure synthesis or pure sampling. These 10 presets cover the full range: orchestral instruments, sound design, and the euro dance sounds that defined a decade.</p>
<div class="step-card"><span class="step-num">PRESET 0 - D-50 PIANO</span>The foundational LA piano. Hammer noise + string ring (PCM) into warm sawtooth with LP filter (synth). The PCM makes it sound like a real piano attack; the sawtooth sustains forever unlike a real piano. Isolate each layer: PCM alone is just a click, synth alone is just a buzzy tone. Together they work.</div>
<div class="step-card"><span class="step-num">PRESET 1 - ORCHESTRAL STRINGS</span>Bow-catch noise (PCM) into warm sawtooth through gentle LPF (synth), slow attack. The PCM provides the breath and scrape of a bow hitting the string. The synth provides the sustained, tonally perfect sustain no real string section could hold indefinitely. Sade, Peter Gabriel, every 80s film score.</div>
<div class="step-card"><span class="step-num">PRESET 2 - BRASS STAB</span>Lip-buzz + breath transient (PCM) into square wave through resonant filter (synth), fast decay. Euro dance brass stabs are exactly this. The PCM provides the initial chiff that screams "real brass"; the synth adds the body. At pcmVol=1, synVol=0: just a pop of noise. Combined: convincing brass stab.</div>
<div class="step-card"><span class="step-num">PRESET 3 - MUSIC BOX / CELESTE</span>Metal tine strike (PCM) into a pure sine that decays (synth). The PCM captures the metallic ping; the sine provides the pure tonal decay. This is how the D-50 reproduced mallet and keyboard percussion instruments. The synth here fades naturally as part of the envelope design, not held.</div>
<div class="step-card"><span class="step-num">PRESET 4 - EURO DANCE LEAD</span>Short square PCM burst into sawtooth through resonant filter, medium attack, sustained. The bread-and-butter euro dance synthesizer lead. Punchy transient (PCM) gives it an edge; the resonant sawtooth gives it the "glossy digital" quality. Haddaway, Corona, 2 Unlimited - they all lived here. Drag freq up to 440Hz for the lead register.</div>
<div class="step-card"><span class="step-num">PRESET 5 - RAVE STAB (one-shot)</span>Noise burst PCM into short sawtooth through highly resonant filter, total duration under 200ms. A one-shot hit used in sequences. The PCM initiates with aggression; the synth's resonance peak adds the "squelch." At dist=high resonance this becomes the classic rave stab that defined hardcore techno and happy hardcore.</div>
<div class="step-card"><span class="step-num">PRESET 6 - SYNTH CHOIR / AHHH PAD</span>Vowel formant breath PCM into a pure sine with very slow attack and long release. The slow synth attack means the PCM "breath" and the synth "tone" overlap during the swell-in, creating a naturalistic choral effect. Enya territory. Set synth attack slow and PCM volume low for maximum subtlety.</div>
<div class="step-card"><span class="step-num">PRESET 7 - SCI-FI SWEEP</span>White noise burst PCM into a rising-pitch sine (synth). The PCM provides the initial "whoosh" texture; the rising sine gives it direction and purpose. Teleporter activation, spaceship door, laser charge. The PCM texture makes it feel physical; the pitch rise makes it feel like energy accumulating.</div>
<div class="step-card"><span class="step-num">PRESET 8 - THUNDER / CINEMATIC IMPACT</span>Long low-frequency noise burst PCM into a low sine with slow decay. Good for film and game audio: explosion body, thunder roll, large door slamming. Set freq to 40-60Hz for maximum sub-bass impact. The PCM provides the dense texture of real acoustic energy; the sine provides the sub-bass that you feel more than hear.</div>
<div class="step-card"><span class="step-num">PRESET 9 - PLUCKED BASS (acid-adjacent)</span>Finger pluck noise PCM into short sawtooth through resonant filter. The PCM is the finger/pick transient; the synth is the string resonance. Because the synth decay is fast (under 400ms), the ear doesn't notice it's synthesized - the brain completes the "string" story that the PCM began. Set freq to 55-110Hz for bass range.</div>
<div class="tip">>> TIP: The LA design principle is: what does this sound DO in its first 200ms that makes it recognizable? That is what goes in the PCM layer. What does it do for the rest of its duration? That is what goes in the synth layer. For most acoustic instruments, the attack character is MORE important than the sustain - which is why LA works at all.</div>
<div class="challenge">Take Preset 4 (Euro Dance Lead). Set pcmVol=0: it sounds like a basic synth lead, not bad. Now set pcmVol=0.9: the attack has punch. Now raise synVol from 0 to 0.6 slowly while playing repeatedly - hear the synth layer "fill in" under the PCM. That filling-in feeling is exactly what producers in 1992 were paying for when they bought a Roland JD-800.</div>
`,
code:`// -- LA SYNTHESIS: 10 SOUND DESIGN PRESETS --
// PCM attack layer + synth sustain layer. Mix slider = hear each in isolation.
//
//  0  Fantasia      choir PCM + warm sine sustain (the D-50 patch that sold the machine)
//  1  Pizzagogo     pluck noise + sine = nylon string body
//  2  Brass Stack   brass air + sawtooth + resonant LPF = Roland brass
//  3  Pipe Organ    breath PCM + square wave sustain
//  4  Clav Strike   clavinet transient only -- all attack, zero sustain
//  5  80s Pad       slow-attack choir into a long filtered fade
//  6  Digital Bell  pure sine sustain, cold and clean
//  7  Rave Stab     instant brass hit + square = the stab
//  8  Space FX      pitch-sliding sine, long attack
//  9  Choir+Synth   formant-filtered double choir layer
function makeSynth(audioCtx, params) {
  const master = audioCtx.createGain();
  master.gain.value = 0.65;
  const now = audioCtx.currentTime;
  const f   = params.freq;
  const sr  = audioCtx.sampleRate;
  const preset = Math.round(params.preset);

  // pcmCfg: [type, duration_s, filter_hz, filter_type]
  // synCfg: [oscType, cutHz, Q, atkS, relS]
  const pcmCfg = [
    [0, 0.18, 3000, 'highpass'],  // 0 piano
    [1, 0.28, 1200, 'bandpass'],  // 1 strings
    [2, 0.10, 2500, 'highpass'],  // 2 brass
    [3, 0.08, 6000, 'highpass'],  // 3 music box
    [4, 0.07, 2000, 'highpass'],  // 4 euro lead
    [4, 0.06, 3000, 'highpass'],  // 5 rave stab
    [5, 0.22,  900, 'bandpass'],  // 6 choir
    [6, 0.20, 8000, 'highpass'],  // 7 sci-fi
    [7, 0.50,  200, 'lowpass'],   // 8 thunder
    [1, 0.10, 2000, 'highpass'],  // 9 pluck bass
  ];
  const synCfg = [
    ['sawtooth', 1200, 0.8, 0.05, 1.8],  // 0 piano
    ['sawtooth',  900, 0.5, 0.18, 2.5],  // 1 strings
    ['square',   1800, 3.5, 0.01, 0.7],  // 2 brass
    ['sine',     8000, 0.5, 0.01, 1.2],  // 3 music box (decaying)
    ['sawtooth', 1600, 4.0, 0.03, 0.9],  // 4 euro lead
    ['sawtooth', 2400, 8.0, 0.01, 0.18], // 5 rave stab
    ['sine',     1000, 0.5, 0.50, 3.5],  // 6 choir
    ['sine',     8000, 0.5, 0.05, 1.5],  // 7 sci-fi (rising)
    ['sine',      120, 0.5, 0.08, 2.2],  // 8 thunder
    ['sawtooth',  900, 3.0, 0.01, 0.35], // 9 pluck bass
  ];

  const [pcmType, pcmDur, pcmFiltHz, pcmFiltType] = pcmCfg[preset];
  const [synthType, cutHz, Q, atkS, relS] = synCfg[preset];

  // BUILD PCM
  const atkLen = Math.floor(sr * pcmDur);
  const buf    = audioCtx.createBuffer(1, atkLen, sr);
  const dat    = buf.getChannelData(0);
  let s = 0;

  for (let i = 0; i < atkLen; i++) {
    const p   = i / sr;
    const env = Math.exp(-p / (pcmDur * 0.35));
    const w   = Math.random() * 2 - 1;

    if (pcmType === 0) {
      // Piano hammer
      dat[i] = w * Math.exp(-p*45) + Math.sin(2*Math.PI*f*i/sr)*Math.exp(-p*8)*0.5;
    } else if (pcmType === 1) {
      // Bow/pluck noise
      s = s*0.82 + w*0.18;
      dat[i] = s * Math.min(1,p/0.02) * Math.exp(-p/pcmDur);
    } else if (pcmType === 2) {
      // Brass buzz
      dat[i] = Math.sign(Math.sin(2*Math.PI*f*i/sr))*Math.exp(-p*22)*0.8 + w*Math.exp(-p*30)*0.2;
    } else if (pcmType === 3) {
      // Metal tine strike
      dat[i] = Math.sin(2*Math.PI*f*2.5*i/sr)*Math.exp(-p*30) + w*Math.exp(-p*60)*0.4;
    } else if (pcmType === 4) {
      // Square burst
      dat[i] = Math.sign(Math.sin(2*Math.PI*f*i/sr)) * Math.exp(-p*40);
    } else if (pcmType === 5) {
      // Choir breath
      s = s*0.9 + w*0.1;
      dat[i] = s * Math.min(1,p/0.06) * Math.exp(-p/pcmDur);
    } else if (pcmType === 6) {
      // White noise whoosh
      dat[i] = w * Math.min(1, p/0.05) * Math.exp(-p/pcmDur);
    } else {
      // Low rumble
      s = s*0.97 + w*0.03;
      dat[i] = s * Math.min(1, p/0.1) * (1 - p/pcmDur);
    }
  }

  const pcmSrc = audioCtx.createBufferSource();
  const pcmFlt = audioCtx.createBiquadFilter();
  const pcmEnv = audioCtx.createGain();
  pcmSrc.buffer = buf;
  pcmFlt.type = pcmFiltType; pcmFlt.frequency.value = pcmFiltHz;
  pcmEnv.gain.setValueAtTime(params.pcmVol, now);
  pcmEnv.gain.linearRampToValueAtTime(0, now + pcmDur + 0.04);
  pcmSrc.connect(pcmFlt); pcmFlt.connect(pcmEnv); pcmEnv.connect(master);
  pcmSrc.start(now);

  // BUILD SYNTH
  const osc    = audioCtx.createOscillator();
  const filter = audioCtx.createBiquadFilter();
  const synEnv = audioCtx.createGain();
  osc.type = synthType; osc.frequency.value = f;
  if (preset === 7) {
    // Sci-fi: rising pitch
    osc.frequency.setValueAtTime(f*0.5, now);
    osc.frequency.exponentialRampToValueAtTime(f*4, now+relS);
  }
  filter.type = 'lowpass'; filter.frequency.value = cutHz; filter.Q.value = Q;
  if (preset === 3) {
    // Music box: synth fades naturally
    synEnv.gain.setValueAtTime(params.synVol, now);
    synEnv.gain.exponentialRampToValueAtTime(0.0001, now + relS);
  } else {
    synEnv.gain.setValueAtTime(0, now);
    synEnv.gain.linearRampToValueAtTime(params.synVol, now + atkS);
    synEnv.gain.exponentialRampToValueAtTime(0.0001, now + atkS + relS);
  }
  osc.connect(filter); filter.connect(synEnv); synEnv.connect(master);

  return { node: master, osc, pcmSrc, stopAt: now + Math.max(pcmDur, atkS+relS) + 0.1 };
}

function updateParams(nodes, params) {
  nodes.osc.frequency.value = params.freq;
}
`},
{ subtitle:'32 - Additive Sound Design', title:'Additive Synthesis: Complete Sound Design Guide',
params:[
  {id:'preset', label:'Sound (0-19)', min:0, max:19, step:1, def:0},
  {id:'fund',   label:'Fundamental (Hz)', min:40, max:800, step:1, def:220},
  {id:'detune', label:'Detune / Spread (cents)', min:0, max:60, step:0.5, def:0},
  {id:'decay',  label:'Partial Decay', min:0, max:3, step:.05, def:0},
],
body:`<div class="lesson-intro">Every sound here is built <strong>only from sine waves</strong> &mdash; no filters, no samples. Additive synthesis proves any waveform is just a sum of sines. Use the Sound slider to step through 20 presets. Detune spreads copies for chorus and supersaw effects. Decay makes upper partials fade faster than the fundamental.</div>

<div class="step-card"><span class="step-num">PRESETS 0-9: ACOUSTIC / CLASSIC</span>
<strong>0 Hammond</strong> &mdash; 9 tonewheels, all harmonic. A Hammond B3 is literally a box of spinning metal wheels inducing voltages at precise frequency ratios.<br>
<strong>1 Pipe Organ</strong> &mdash; fast harmonic rolloff. Organ pipes amplify the fundamental much more than upper partials.<br>
<strong>2 Bell</strong> &mdash; inharmonic ratios (2.756x, 5.404x...). Struck bells have partials that don't sit on the harmonic series, which is why they sound metallic and slightly wrong.<br>
<strong>3 Glass Harmonica</strong> &mdash; wet-finger-on-glass. Closely spaced inharmonic partials.<br>
<strong>4 Clarinet</strong> &mdash; odd harmonics only. A cylindrical bore closed at one end reinforces only odd harmonics. Physics, not design.<br>
<strong>5 Choir Aah</strong> &mdash; formant-weighted. The vowel 'ah' has energy in the 3rd-5th partials. Your vocal tract is an additive filter.<br>
<strong>6 Clavinet</strong> &mdash; odd-dominant with fast upper decay. The snap of a plucked string, additively approximated.<br>
<strong>7 Wind Chimes</strong> &mdash; dense inharmonic cloud, partials decaying at individual rates.<br>
<strong>8 Siren</strong> &mdash; two close partials beating. The entire siren effect is just one number: the interval between them.<br>
<strong>9 Sawtooth</strong> &mdash; full harmonic series 1/n amplitude rolloff. This IS a sawtooth wave, built from sines.
</div>

<div class="step-card"><span class="step-num">PRESET 10 &mdash; SUPERSAW (7-oscillator detuned)</span>
The real mechanism inside Serum, Sylenth1, and Vital: 7 full harmonic series (sawtooth shapes), spread across the detune range. Without detune it sounds like one saw. Drag Detune up and the wall of sound appears. It is still just additive sine waves &mdash; just many of them offset from each other. Every "unison" synth does exactly this.
</div>

<div class="step-card"><span class="step-num">PRESET 11 &mdash; BRASS STAB (euro/rave)</span>
The 2nd and 4th harmonics boosted well above natural levels, fast decay above the 3rd partial. That combination gives the bright-attack, quick-chop character of the Haddaway/Scooter brass hit. No filter envelope needed &mdash; the decay is baked into the harmonic structure. The 'chiff' on the attack is just the upper harmonics being momentarily louder.
</div>

<div class="step-card"><span class="step-num">PRESET 12 &mdash; PWM (pulse width modulation)</span>
PWM is two square waves (odd harmonics only) detuned against each other. As they beat, even harmonics phase in and out &mdash; that modulation IS the PWM shimmer. The Juno-106 chorus, the Oberheim pad, the Roland JX-3P string sound. Watch the spectrum as you drag Detune: even harmonic bars appear and disappear. You are literally watching PWM happen in the frequency domain.
</div>

<div class="step-card"><span class="step-num">PRESET 13 &mdash; SUPER SQUARE / ACID BUZZ</span>
Odd harmonics only, but instead of rolling off at 1/n, upper partials are held near full amplitude. A normal square sounds hollow; this sounds screaming and nasal. Stack detuned copies and it becomes acid-like without any filter at all &mdash; you are just keeping the harmonics that distortion would normally produce.
</div>

<div class="step-card"><span class="step-num">PRESET 14 &mdash; HAMMOND GROWL (saturated drawbars)</span>
Same as preset 0 but with the 2nd and 3rd harmonics cranked above 1.0, simulating transformer saturation. The growl Keith Emerson and Jon Lord used. Detune adds a Leslie cabinet rotation effect &mdash; the real Leslie physically spins speakers to produce Doppler tremolo.
</div>

<div class="step-card"><span class="step-num">PRESET 15 &mdash; STRING ENSEMBLE (Solina / ARP Omni)</span>
The 1974 Solina achieved its sound by running the signal through 4 slightly-detuned circuits. The ensemble chorus is not an effect added after &mdash; it IS the oscillator. Drag Detune from 0 to 40: the sound goes from thin to lush. Still just additive sines. There is no other magic.
</div>

<div class="step-card"><span class="step-num">PRESET 16 &mdash; METALLIC / INDUSTRIAL PAD</span>
Partials at square-root-of-integer ratios (1.0, 1.414, 1.732, 2.236...) &mdash; the frequencies of a freely vibrating metal plate. Inharmonic spacing is what makes metal sound metallic. Heavy detuning spreads each partial into a beating cluster. Industrial, dark, unsettling. NIN pad territory.
</div>

<div class="step-card"><span class="step-num">PRESET 17 &mdash; 808 SUB BASS</span>
A dominant fundamental, weak 2nd harmonic (8%), almost nothing above. Real 808 basses sit mostly below 80Hz. The tiny 2nd harmonic is a psychoacoustic trick: small speakers can't reproduce 60Hz, but your brain infers the missing fundamental from the 120Hz harmonic. You 'hear' bass that your earbuds can't physically produce. This is the missing fundamental effect.
</div>

<div class="step-card"><span class="step-num">PRESET 18 &mdash; TRANCE LEAD (root + octave + fifth)</span>
Three harmonic series stacked: one at the fundamental, one an octave up (2x), one a fifth above (1.5x) &mdash; then all three spread with chorus detune. The anthem trance lead recipe used by Ferry Corsten, Push, and Armin van Buuren circa 1999-2003. The octave adds brightness, the fifth adds power, the detune adds width. Still sines.
</div>

<div class="step-card"><span class="step-num">PRESET 19 &mdash; VOCAL 'EE' FORMANT</span>
Different vowels are just different formant weightings of the harmonic series. 'Ah' = partials 3-5 prominent. 'Ee' = partials 7-9 prominent. 'Oh' = partials 2-3 prominent. This preset loads the 'ee' formant. Drag Detune gently for a vocal-chorus choir effect. Your voice box does additive synthesis every time you speak. You are an additive synthesizer.
</div>`,
code:`// -- ADDITIVE SYNTHESIS: 20 SOUND DESIGN PRESETS --
// Zero filters. Zero samples. Every sound = sine waves only.
// Proof of Fourier's theorem in 20 presets.
//
//  0  Hammond organ    9 drawbar harmonics at exact tonewheel ratios
//  1  Pipe organ       odd harmonics, long decay
//  2  Bell             inharmonic partials at measured bell ratios
//  3  Glass harmonica  smooth sine-heavy spectrum
//  4  Clarinet         odd harmonics only (cylindrical bore physics)
//  5  Choir ah         formant peaks at H3-H5 (the "ah" vowel)
//  6  Clavinet         strong attack partials, fast decay
//  7  Wind chimes      inharmonic shimmer
//  8  Siren            sweeping harmonic ratios
//  9  Sawtooth         all harmonics at 1/n (the textbook case)
// 10  Supersaw         7 detuned oscillators (JP-8000 patent)
// 11  Brass stab       boosted even harmonics, fast attack
// 12  PWM              pulse width modulation approximated additively
// 13  Super square     odd harmonics + drive
// 14  Hammond growl    drawbar boost + 3rd harmonic overdrive
// 15  String ensemble  detuned copies for chorus/width
// 16  Metallic pad     inharmonic upper partials
// 17  808 sub bass     fundamental-heavy, harmonics roll off fast
// 18  Trance lead      detuned saws, slight inharmonicity
// 19  Vocal EE         formant peaks matching the "ee" vowel
function makeSynth(audioCtx, params) {
  const master = audioCtx.createGain();
  master.gain.value = 0.45;
  const now = audioCtx.currentTime;
  const f   = params.fund;
  // cents to freq ratio: 100 cents = 1 semitone = multiply by 2^(1/12)
  const det = params.detune / 1200;
  const dec = params.decay;

  // Each preset object:
  //   pts: [[freq_ratio, amplitude], ...]  -- the partials
  //   decayPow: how fast upper partials decay (0 = sustain)
  //   copies: how many detuned unison copies (supersaw/ensemble)
  //   pwm: true = each copy is a separate square wave (PWM simulation)
  //   triad: true = copies spread to root/octave/fifth intervals
  const presets = [
    // 0 Hammond organ: 9 tonewheels
    { pts:[[1,0.9],[2,1.0],[3,0.7],[4,0.5],[5,0.3],[6,0.4],[8,0.2],[9,0.1],[16,0.05]], decayPow:0 },
    // 1 Pipe organ: fast rolloff
    { pts:[[1,1.0],[2,0.4],[3,0.15],[4,0.08],[5,0.04],[6,0.02]], decayPow:1 },
    // 2 Bell: inharmonic ratios
    { pts:[[1.0,1.0],[2.756,0.65],[5.404,0.3],[8.933,0.15],[11.34,0.07]], decayPow:2 },
    // 3 Glass harmonica: closely spaced inharmonic
    { pts:[[1.0,0.6],[1.22,0.8],[1.62,0.5],[2.1,0.3],[2.86,0.2],[3.75,0.1]], decayPow:0.5 },
    // 4 Clarinet: odd harmonics only (cylindrical bore)
    { pts:[[1,1.0],[3,0.6],[5,0.3],[7,0.15],[9,0.07],[11,0.03],[13,0.015]], decayPow:1.5 },
    // 5 Choir ah: formant-weighted (partials 3-5)
    { pts:[[1,0.3],[2,0.5],[3,0.8],[4,0.9],[5,0.6],[6,0.4],[7,0.2],[8,0.1]], decayPow:0 },
    // 6 Clavinet: odd-dominant, fast upper decay
    { pts:[[1,1.0],[2,0.15],[3,0.7],[5,0.35],[7,0.2],[9,0.08]], decayPow:2.5 },
    // 7 Wind chimes: dense inharmonic
    { pts:[[1.0,0.3],[1.18,0.3],[1.41,0.25],[1.78,0.2],[2.24,0.15],[2.83,0.1],[3.6,0.08]], decayPow:1.5 },
    // 8 Siren: two partials beating
    { pts:[[1.0,0.8],[1.03,0.65]], decayPow:0 },
    // 9 Sawtooth: harmonic series 1/n rolloff
    { pts:[[1,1.0],[2,0.5],[3,0.33],[4,0.25],[5,0.2],[6,0.17],[7,0.14],[8,0.12],[9,0.11],[10,0.1]], decayPow:0 },
    // 10 Supersaw: 7 detuned copies of harmonic series
    { pts:[[1,1.0],[2,0.5],[3,0.33],[4,0.25],[5,0.2],[6,0.17],[7,0.14],[8,0.12]], decayPow:0, copies:7 },
    // 11 Brass stab: boosted 2nd/4th, fast upper decay
    { pts:[[1,0.8],[2,1.3],[3,0.5],[4,1.0],[5,0.25],[6,0.12],[7,0.06],[8,0.03]], decayPow:3.5 },
    // 12 PWM: two detuned square waves beating = PWM shimmer
    { pts:[[1,1.0],[3,0.55],[5,0.28],[7,0.16],[9,0.10],[11,0.06],[13,0.04],[15,0.025]], decayPow:0, copies:2, pwm:true },
    // 13 Super square / acid buzz: flat odd harmonics
    { pts:[[1,1.0],[3,0.93],[5,0.86],[7,0.79],[9,0.72],[11,0.65],[13,0.58],[15,0.50]], decayPow:0 },
    // 14 Hammond growl: saturated drawbars (2nd/3rd cranked)
    { pts:[[1,0.6],[2,1.5],[3,1.7],[4,1.1],[5,0.4],[6,0.8],[8,0.5],[9,0.2],[16,0.15]], decayPow:0 },
    // 15 String ensemble: 4 detuned copies (Solina/ARP Omni)
    { pts:[[1,1.0],[2,0.6],[3,0.4],[4,0.3],[5,0.22],[6,0.17],[7,0.13],[8,0.10]], decayPow:0, copies:4 },
    // 16 Metallic pad: sqrt(integer) ratios = vibrating metal plate
    { pts:[[1.0,0.7],[1.414,0.6],[1.732,0.5],[2.0,0.4],[2.236,0.35],[2.449,0.28],[2.646,0.22],[3.162,0.15]], decayPow:0.5 },
    // 17 808 sub bass: huge fundamental, tiny 2nd harmonic
    { pts:[[1,1.0],[2,0.08],[3,0.02]], decayPow:0 },
    // 18 Trance lead: 3 copies at root, octave, fifth
    { pts:[[1,1.0],[2,0.5],[3,0.33],[4,0.25],[5,0.2],[6,0.17],[7,0.14],[8,0.12]], decayPow:0, copies:3, triad:true },
    // 19 Vocal ee formant: partials 7-9 prominent
    { pts:[[1,0.15],[2,0.2],[3,0.3],[4,0.4],[5,0.5],[6,0.45],[7,0.9],[8,1.0],[9,0.85],[10,0.5],[11,0.25],[12,0.12]], decayPow:0 },
  ];

  const preset = presets[Math.min(Math.round(params.preset), presets.length - 1)];
  const { pts, decayPow } = preset;
  const totalAmp = pts.reduce((s, [, a]) => s + a, 0);
  const oscs = [];

  // Number of detuned unison copies (1 = no chorus, 7 = full supersaw)
  const numCopies = preset.copies || 1;

  pts.forEach(([ratio, amp], idx) => {
    const normAmp = amp / totalAmp;
    // Upper partials decay faster than the fundamental when decayPow > 0
    const partialDecay = dec > 0
      ? dec * Math.pow(idx / Math.max(pts.length - 1, 1), decayPow)
      : 0;

    for (let ci = 0; ci < numCopies; ci++) {
      // Spread copies evenly across detune range, centered at 0
      const spread = numCopies > 1
        ? ((ci / (numCopies - 1)) - 0.5) * 2 * det
        : 0;

      // Trance lead: copies tuned to root, octave (x2), fifth (x1.5)
      const triadMult = preset.triad
        ? (ci === 0 ? 1 : ci === 1 ? 2 : 1.5)
        : 1;

      const osc = audioCtx.createOscillator();
      const env = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.value = f * ratio * triadMult * (1 + spread);

      const copyAmp = normAmp / numCopies;
      if (partialDecay > 0.001) {
        env.gain.setValueAtTime(copyAmp, now);
        env.gain.exponentialRampToValueAtTime(0.0001, now + Math.max(0.05, 2 - partialDecay));
      } else {
        env.gain.value = copyAmp;
      }

      osc.connect(env);
      env.connect(master);
      oscs.push(osc);
    }
  });

  return { node: master, oscs };
}

function updateParams(nodes, params) {}
`},
