<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DSP for Lemurs LEMUR - Sound Synthesis School</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;700;800&display=swap');
:root{
  --bg:#0a0a0f; --panel:#111118; --border:#1e1e2e;
  --accent:#7fff6b; --accent2:#ff6b9d; --accent3:#6bc5ff;
  --text:#e0e0f0; --muted:#666688; --code-bg:#0d0d15;
}
*{ box-sizing:border-box; margin:0; padding:0; }
body{ background:var(--bg); color:var(--text); font-family:'Syne',sans-serif; min-height:100vh; overflow-x:hidden; }
header{ padding:3rem 2rem 2rem; text-align:center; border-bottom:1px solid var(--border); position:relative; overflow:hidden; }
header canvas#hero{ position:absolute; inset:0; width:100%; height:100%; opacity:.3; pointer-events:none; }
header .inner{ position:relative; z-index:1; }
.tagline-chip{ display:inline-block; background:var(--accent); color:#000; font-family:'Space Mono',monospace; font-size:.65rem; padding:.25rem .75rem; letter-spacing:.15em; text-transform:uppercase; margin-bottom:1rem; }
h1{ font-size:clamp(2.5rem,6vw,5rem); font-weight:800; line-height:1; letter-spacing:-.02em; }
h1 span{ color:var(--accent); }
.subtitle{ font-family:'Space Mono',monospace; font-size:.85rem; color:var(--muted); margin-top:.75rem; }
.progress-bar{ height:2px; background:var(--border); }
.progress-fill{ height:100%; background:var(--accent); transition:width .4s ease; }
nav{ display:flex; gap:.4rem; padding:1rem 1.5rem; overflow-x:auto; border-bottom:1px solid var(--border); background:var(--panel); position:sticky; top:0; z-index:100; scrollbar-width:none; }
nav::-webkit-scrollbar{ display:none; }
.nav-btn{ flex-shrink:0; background:none; border:1px solid var(--border); color:var(--muted); font-family:'Space Mono',monospace; font-size:.7rem; padding:.4rem .8rem; cursor:pointer; transition:all .2s; white-space:nowrap; }
.nav-btn:hover{ border-color:var(--accent); color:var(--accent); }
.nav-btn.active{ background:var(--accent); color:#000; border-color:var(--accent); }
main{ display:grid; grid-template-columns:1fr 1fr; gap:0; height:calc(100vh - 185px); min-height:560px; }
@media(max-width:900px){ main{ grid-template-columns:1fr; height:auto; } }
.lesson-panel{ padding:2rem; overflow-y:auto; border-right:1px solid var(--border); scrollbar-width:thin; scrollbar-color:var(--border) transparent; }
.lesson-number{ font-family:'Space Mono',monospace; font-size:.65rem; color:var(--accent); letter-spacing:.2em; text-transform:uppercase; margin-bottom:.5rem; }
.lesson-title{ font-size:1.8rem; font-weight:800; line-height:1.1; margin-bottom:1rem; }
.lesson-body{ font-family:'Space Mono',monospace; font-size:.78rem; line-height:1.9; color:#b0b0cc; }
.lesson-body p{ margin-bottom:1rem; }
.lesson-body strong{ color:var(--accent); font-weight:700; }
.lesson-body em{ color:var(--accent3); font-style:normal; }
.lesson-body .tip{ background:#1a1a2e; border-left:3px solid var(--accent2); padding:.75rem 1rem; margin:1rem 0; color:#d0d0e8; }
.lesson-body .tip::before{ content:'>> TIP: '; color:var(--accent2); font-weight:700; }
.lesson-body .step-card{ background:#0f0f1e; border:1px solid var(--border); border-left:3px solid var(--accent3); padding:.75rem 1rem; margin:.6rem 0; }
.lesson-body .step-card .step-num{ color:var(--accent3); font-weight:700; font-size:.65rem; letter-spacing:.15em; display:block; margin-bottom:.25rem; }
.lesson-body .challenge{ background:#160d1e; border:1px solid var(--accent2); padding:.75rem 1rem; margin:.6rem 0; }
.lesson-body .challenge::before{ content:'>> CHALLENGE: '; color:var(--accent2); font-weight:700; }
.lesson-body code{ background:#1a1a2e; color:var(--accent3); padding:.1em .4em; font-size:.85em; }
.synth-panel{ display:flex; flex-direction:column; background:var(--code-bg); overflow:hidden; position:relative; }
.scope-area{ flex:0 0 175px; background:#000; border-bottom:1px solid var(--border); position:relative; }
.scope-area canvas{ width:100%; height:100%; display:block; }
.scope-label{ position:absolute; top:.35rem; left:.6rem; font-family:'Space Mono',monospace; font-size:.55rem; color:var(--muted); letter-spacing:.1em; pointer-events:none; z-index:1; }
.controls-area{ flex:0 0 auto; padding:.55rem .75rem; background:var(--panel); border-bottom:1px solid var(--border); display:flex; flex-direction:column; gap:.4rem; }
.transport-row{ display:flex; align-items:center; gap:.5rem; }
.play-btn{ background:var(--accent); color:#000; border:none; font-family:'Space Mono',monospace; font-size:.75rem; font-weight:700; padding:.35rem 1.1rem; cursor:pointer; letter-spacing:.05em; flex-shrink:0; transition:opacity .15s; }
.play-btn:hover{ opacity:.85; }
.play-btn.playing{ background:var(--accent2); }
.status-txt{ font-family:'Space Mono',monospace; font-size:.6rem; color:var(--muted); flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.param-row{ display:flex; align-items:center; gap:.5rem; }
.param-row label{ font-family:'Space Mono',monospace; font-size:.6rem; color:var(--accent3); width:7rem; flex-shrink:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.param-row input[type=range]{ flex:1; accent-color:var(--accent); cursor:pointer; min-width:0; }
.param-row .val{ font-family:'Space Mono',monospace; font-size:.6rem; color:var(--accent); width:4.5rem; text-align:right; flex-shrink:0; }
#param-slots{ display:flex; flex-direction:column; gap:.32rem; }
.code-toolbar{ display:flex; justify-content:space-between; align-items:center; padding:.4rem .75rem; border-bottom:1px solid var(--border); background:var(--panel); flex-shrink:0; }
.code-toolbar span{ font-family:'Space Mono',monospace; font-size:.6rem; color:var(--muted); letter-spacing:.08em; }
.run-btn{ background:var(--accent); color:#000; border:none; font-family:'Space Mono',monospace; font-size:.7rem; font-weight:700; padding:.28rem .85rem; cursor:pointer; transition:opacity .15s; }
.run-btn:hover{ opacity:.85; }
.code-editor{ flex:1; overflow:auto; min-height:0; }
textarea#synth-code{ width:100%; height:100%; background:var(--code-bg); color:#c8f0c0; font-family:'Space Mono',monospace; font-size:.68rem; line-height:1.7; border:none; outline:none; padding:.8rem; resize:none; tab-size:2; }

/* Tracker */
#tracker-overlay{ display:none; flex-direction:column; position:absolute; inset:0; background:var(--code-bg); z-index:10; overflow:hidden; }
#tracker-overlay.visible{ display:flex; }
.tracker-top{ display:flex; align-items:center; gap:.5rem; padding:.45rem .65rem; background:var(--panel); border-bottom:1px solid var(--border); flex-shrink:0; flex-wrap:wrap; }
.tracker-top label{ font-family:'Space Mono',monospace; font-size:.6rem; color:var(--accent3); }
.tracker-top input[type=range]{ accent-color:var(--accent); cursor:pointer; width:70px; }
#tk-play{ background:var(--accent); color:#000; border:none; font-family:'Space Mono',monospace; font-size:.7rem; font-weight:700; padding:.28rem .85rem; cursor:pointer; }
#tk-play.playing{ background:var(--accent2); }
#tk-bpm-val,#tk-oct-val{ font-family:'Space Mono',monospace; font-size:.6rem; color:var(--accent); width:2.5rem; }
#tk-hint{ font-family:'Space Mono',monospace; font-size:.5rem; color:var(--muted); margin-left:auto; }
.tracker-grid{ flex:1; overflow:auto; padding:.4rem .6rem; display:flex; gap:.3rem; min-height:0; }
.tracker-channel{ display:flex; flex-direction:column; gap:.2rem; flex:1; min-width:0; }
.ch-label{ font-family:'Space Mono',monospace; font-size:.55rem; color:var(--muted); text-align:center; margin-bottom:.1rem; cursor:pointer; padding:.15rem 0; border:1px solid transparent; transition:color .15s; }
.ch-label.sel{ color:var(--accent); border-color:var(--accent); }
.tk-step{ background:#0f0f18; border:1px solid var(--border); font-family:'Space Mono',monospace; font-size:.58rem; color:var(--muted); text-align:center; padding:.22rem .05rem; cursor:pointer; user-select:none; border-radius:2px; touch-action:manipulation; transition:background .08s, color .08s; white-space:nowrap; overflow:hidden; }
.tk-step.on{ background:var(--accent); color:#000; border-color:var(--accent); font-weight:700; }
.tk-step.active-step{ outline:3px solid #fff; outline-offset:-2px; filter:brightness(1.3); }
.tk-step.beat{ border-color:#252535; }
.tk-step.play-head{ outline:2px solid var(--accent2); outline-offset:-2px; }
.note-picker{ display:flex; flex-wrap:wrap; gap:.25rem; padding:.4rem .65rem; border-top:1px solid var(--border); flex-shrink:0; background:var(--panel); }
.note-key{ background:#1a1a2e; border:1px solid var(--border); color:var(--muted); font-family:'Space Mono',monospace; font-size:.62rem; padding:.28rem .35rem; cursor:pointer; min-width:2rem; text-align:center; transition:background .12s; }
.note-key:hover,.note-key:active{ background:var(--accent); color:#000; border-color:var(--accent); }
.note-key.sharp{ background:#10102a; color:#8888aa; }
</style>
</head>
<body>


<header>
  <canvas id="hero"></canvas>
  <div class="inner">
    <div class="tagline-chip">LEMUR Sound Synthesis School</div>
    <h1>DSP for <span>Lemurs</span></h1>
    <p class="subtitle">// from sin() -> full synthesizer -> you can hear this</p>
  </div>
</header>

<div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
<nav id="lesson-nav"></nav>

<main>
  <div class="lesson-panel" id="lesson-text"></div>
  <div class="synth-panel" id="synth-panel">
    <div class="scope-area" id="scope-area">
      <span class="scope-label">OSCILLOSCOPE - SPECTRUM</span>
      <canvas id="scope-canvas"></canvas>
    </div>
    <div class="controls-area">
      <div class="transport-row">
        <button type="button" class="play-btn" id="play-btn">> PLAY</button>
        <span class="status-txt" id="status-txt">press play to hear the sound</span>
      </div>
      <div id="param-slots"></div>
    </div>
    <div class="code-toolbar">
      <span>SYNTH CODE - edit &amp; run &nbsp;(Ctrl/Cmd+Enter)</span>
      <button type="button" class="run-btn" id="run-btn">> RUN</button>
    </div>
    <div class="code-editor">
      <textarea id="synth-code" spellcheck="false"></textarea>
    </div>
    <div id="tracker-overlay">
      <div class="tracker-top">
        <button type="button" id="tk-play">> PLAY</button>
        <label>BPM</label>
        <input type="range" id="tk-bpm" min="60" max="200" value="120">
        <span id="tk-bpm-val">120</span>
        <label>OCT</label>
        <input type="range" id="tk-oct" min="2" max="6" value="4">
        <span id="tk-oct-val">4</span>
        <span id="tk-hint">tap channel header -> tap step -> tap note below</span>
      </div>
      <div class="tracker-grid" id="tracker-grid"></div>
      <div class="note-picker" id="note-picker"></div>
    </div>
  </div>
</main>

<script>
'use strict';
window.addEventListener('error', function(e) { e.preventDefault(); return true; }, true);
window.addEventListener('unhandledrejection', function(e) { e.preventDefault(); }, true);
// ^^^ These suppress cross-origin "Script error." messages from bubbling
// up to the parent frame in Claude.ai's sandboxed iframe viewer.
// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
//  LESSONS
// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
const LESSONS = [
{ subtitle:'01 - What Is Sound?', title:'What Is Sound?',
params:[
  {id:'freq', label:'Frequency (Hz)', min:80, max:1200, step:1,  def:440},
  {id:'amp',  label:'Amplitude',      min:0,  max:1,    step:.01, def:0.4},
],
body:`<p>Sound is <strong>air pressure changing over time</strong>. Your speaker cone pushes air molecules. Those molecules push the ones next to them. The wave reaches your eardrum and wiggles it. Your brain turns that wiggling into music.</p>
<p>Two numbers describe any sound completely:</p>
<div class="step-card"><span class="step-num">FREQUENCY</span>How fast the air wiggles -- measured in <strong>Hz (cycles per second)</strong>. 440 Hz = A4, the note orchestras tune to. Humans hear roughly 20 Hz to 20,000 Hz. Below 20 Hz you feel it in your chest; above 20,000 Hz only dogs care.</div>
<div class="step-card"><span class="step-num">AMPLITUDE</span>How hard the air pushes -- the loudness. In code, audio samples are just numbers between -1.0 and +1.0. 0 = silence. +/-1.0 = maximum volume before distortion.</div>
<div class="step-card"><span class="step-num">IN SHADERS</span>A shader renders pixels. An audio engine renders samples. The math is identical: you're computing a function <code>f(time)</code> that outputs a value. In a fragment shader that value is a color. In audio it's air pressure. Same concept, different dimension.</div>`,
code:`// \u2500\u2500 WHAT IS SOUND? \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
// Press PLAY then drag the sliders while it runs.
// 'params' carries your slider values live.

function makeSynth(audioCtx, params) {
  const osc  = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.type = 'sine';                   // purest wave shape
  osc.frequency.value = params.freq;   // Hz from slider
  gain.gain.value     = params.amp;    // 0.0 = silence, 1.0 = full

  // Signal chain: oscillator \u2192 gain \u2192 output
  osc.connect(gain);
  return { node: gain, osc };
}

// Called live whenever you move a slider.
// No restart needed \u2014 updates the running nodes directly.
function updateParams(nodes, params) {
  nodes.osc.frequency.value = params.freq;
  nodes.node.gain.value     = params.amp;
}
`},

// \u2500\u2500\u2500 02 \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
{ subtitle:'02 - The Sine Wave', title:'The Sine Wave',
params:[
  {id:'freq',  label:'Frequency (Hz)', min:20,  max:4000, step:1,   def:440},
  {id:'phase', label:'Phase (radians)',min:0,   max:6.28, step:.05, def:0},
],
body:`<p>The sine wave is the <strong>only waveform that contains exactly one frequency</strong>. Everything else -- square, saw, piano, voice -- is just sine waves added together. This is Fourier's theorem, and it's the foundation of all audio DSP.</p>
<p>The formula: <code>sample = sin(2pi * freq * time)</code></p>
<div class="step-card"><span class="step-num">THE CIRCLE CONNECTION</span>Picture a dot orbiting the origin at a constant speed. The sine wave is the height of that dot over time. Frequency = how fast it orbits. Amplitude = how big the orbit is. Phase = where on the circle it started. That's literally all there is to it.</div>
<div class="step-card"><span class="step-num">IN SHADERS</span><code>sin(uv.x * freq + time)</code> -- you've written that a hundred times. In audio, <code>sin(phase)</code> where <code>phase</code> accumulates by <code>2pi * freq / sampleRate</code> each sample. Same function, accumulating phase instead of using a spatial coordinate.</div>
<div class="step-card"><span class="step-num">TRY IT</span>Drag Phase while the note plays. The waveform shifts but the sound doesn't change -- your ears can't hear phase difference on a single sine. (They can when two sines interact. More on that in Lesson 4.)</div>`,
code:`// \u2500\u2500 THE SINE WAVE \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
// The purest possible sound \u2014 one frequency only.
// Try dragging the Phase slider while playing.
// The waveform on the oscilloscope shifts,
// but the pitch is completely unchanged.

function makeSynth(audioCtx, params) {
  const osc  = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  gain.gain.value = 0.4;

  osc.type = 'sine';
  osc.frequency.value = params.freq;
  applyPhase(osc, params.phase, audioCtx);

  osc.connect(gain);
  return { node: gain, osc };
}

// A PeriodicWave lets us set initial phase via
// Fourier coefficients: real=cosine part, imag=sine part.
// Rotating them by 'phase' shifts where the wave starts.
function applyPhase(osc, phase, ctx) {
  const real = new Float32Array([0,  Math.sin(phase)]);
  const imag = new Float32Array([0, -Math.cos(phase)]);
  osc.setPeriodicWave(
    ctx.createPeriodicWave(real, imag, { disableNormalization: true })
  );
}

function updateParams(nodes, params) {
  nodes.osc.frequency.value = params.freq;
  // Re-apply phase on every slider move so you can
  // watch the oscilloscope shift in real time.
  applyPhase(nodes.osc, params.phase, nodes.osc.context);
}
`},

// \u2500\u2500\u2500 03 \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
{ subtitle:'03 - Amplitude & Loudness', title:'Amplitude & Loudness',
params:[
  {id:'freq',    label:'Frequency (Hz)',   min:80,  max:1200, step:1,   def:440},
  {id:'attack',  label:'Attack (ms)',      min:1,   max:800,  step:1,   def:10},
  {id:'release', label:'Release (ms)',     min:10,  max:3000, step:10,  def:500},
  {id:'amp',     label:'Peak Amplitude',   min:0,   max:1,    step:.01, def:0.6},
],
body:`
<p>Amplitude is the <strong>height of the wave</strong> \u2014 how far the speaker cone travels on each push. Bigger amplitude = louder sound. But our perception of loudness is not linear \u2014 it's <em>logarithmic</em>.</p>
<div class="step-card"><span class="step-num">DECIBELS (dB)</span>The unit we actually use for loudness. The key formula:<br><br><strong>dB = 20 \u00D7 log\u2081\u2080(amplitude)</strong><br><br>amplitude 1.0 \u2192 0 dBFS (full scale, maximum)<br>amplitude 0.5 \u2192 \u22126 dB (half amplitude, sounds "a bit quieter")<br>amplitude 0.1 \u2192 \u221220 dB (tenth amplitude, sounds "quiet")<br>amplitude 0.0 \u2192 \u2212\u221E dB (silence)<br><br>Halving the amplitude = \u22126 dB. Doubling = +6 dB. That's it.</div>
<p>This lesson introduces the <strong>envelope</strong> \u2014 how amplitude changes over time. Press PLAY and watch the oscilloscope: the wave fades in (Attack) then fades out (Release). That shape over time is the envelope. Press PLAY again while it's still fading out \u2014 it re-triggers immediately.</p>
<div class="step-card"><span class="step-num">ATTACK</span>Time from silence to peak amplitude after note-on. 1ms = instant, percussive snap (drum). 800ms = slow swell (string section bowing in). Watch the oscilloscope: a short attack means the wave jumps to full height instantly. A long attack means it grows gradually.</div>
<div class="step-card"><span class="step-num">RELEASE</span>Time from peak back to silence after note-off. Short release = staccato, clipped. Long release = lingering tail, like a piano sustain pedal. The oscilloscope shows the wave shrinking to nothing.</div>
<div class="tip">We'll expand this to the full ADSR envelope in lesson 09. For now, just internalize the pattern: <em>every sound in nature has an amplitude envelope</em>. A clap is fast attack, fast release. A bowed cello is slow attack, long release. A drum hit is instant attack, medium release. The envelope IS the personality of the sound.</div>
<div class="challenge">Simulate two instruments using only the Attack and Release sliders (keep frequency and amplitude the same):<br><br><strong>Piano:</strong> Attack=2ms, Release=1200ms \u2014 instant start, long ring.<br><strong>Slow strings:</strong> Attack=600ms, Release=800ms \u2014 swells in, fades out.<br><br>The pitch is identical. The instrument feel is completely different. That's how powerful envelope shaping is.</div>
`,
code:`// -- AMPLITUDE & LOUDNESS --------------------------------------------------
// GainNode.gain is an AudioParam -- schedulable to any curve.
// We use it as an amplitude envelope: the shape of loudness over time.
// Press PLAY multiple times to retrigger. Watch the scope -- you can
// literally see the envelope as a shape on the waveform.

function makeSynth(audioCtx, params) {
  const now = audioCtx.currentTime;

  // createOscillator() = a continuously running sine/square/saw generator.
  // type: 'sine' | 'square' | 'sawtooth' | 'triangle'
  const osc = audioCtx.createOscillator();
  osc.type = 'sine';
  osc.frequency.value = 440;

  // createGain() = a volume knob. gain.value 0 = silent, 1 = full, >1 = boost.
  const env = audioCtx.createGain();

  // AudioParam automation: schedule gain to trace an ADSR shape.
  // setValueAtTime(val, time)         -- jump to val at time
  // linearRampToValueAtTime(val, t)   -- ramp linearly to val by time t
  // exponentialRampToValueAtTime(val,t) -- curve (sounds more natural)
  // Note: exponential can't pass through 0, so we use a tiny near-zero value.
  const atkTime  = params.attack  / 1000;  // ms -> seconds
  const decTime  = params.decay   / 1000;
  const susLevel = params.sustain;         // 0-1 fraction
  const relTime  = params.release / 1000;
  const totalDur = atkTime + decTime + 0.3 + relTime; // 0.3 = hold time

  env.gain.setValueAtTime(0.0001, now);
  env.gain.linearRampToValueAtTime(0.8, now + atkTime);
  env.gain.exponentialRampToValueAtTime(Math.max(0.001, susLevel * 0.8), now + atkTime + decTime);
  env.gain.setValueAtTime(Math.max(0.001, susLevel * 0.8), now + atkTime + decTime + 0.3);
  env.gain.exponentialRampToValueAtTime(0.0001, now + totalDur);

  // Signal chain: oscillator -> envelope gain -> output
  osc.connect(env);

  const master = audioCtx.createGain();
  master.gain.value = 1.0;
  env.connect(master);

  return { node: master, osc, stopAt: now + totalDur + 0.1 };
}

function updateParams(nodes, params) {}
`},

// \u2500\u2500\u2500 04 \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
{ subtitle:'04 - Adding Waves', title:'Adding Waves Together',
params:[
  {id:'freq1',  label:'Freq 1 (Hz)',   min:80,  max:1200, step:1,   def:440},
  {id:'freq2',  label:'Freq 2 (Hz)',   min:80,  max:1200, step:1,   def:660},
  {id:'mix',    label:'Mix (0=F1 only)', min:0, max:1,    step:.01, def:0.5},
],
body:`
<p>Here's the most important idea in all of DSP: <strong>sounds add together by simply summing their sample values</strong>. Two waves playing at once? Each sample of audio output is just: Wave1[t] + Wave2[t]. That's it.</p>
<p>This is called <strong>superposition</strong>. The air, the speaker, the digital buffer \u2014 all of them just add. No multiplication, no interaction. Pure addition.</p>
<div class="step-card"><span class="step-num">CONSONANCE & DISSONANCE</span>When two frequencies have a simple integer ratio, they sound harmonious \u2014 "consonant". When the ratio is messy, they clash \u2014 "dissonant".<br><br>Try these with Freq1=440:<br>Freq2=440 \u2192 ratio 1:1 = unison (same note, louder)<br>Freq2=880 \u2192 ratio 1:2 = octave (most consonant)<br>Freq2=660 \u2192 ratio 2:3 = perfect fifth (very harmonious)<br>Freq2=550 \u2192 ratio 4:5 = major third (pleasant chord)<br>Freq2=466 \u2192 ratio ~7:8 = minor second (harsh, dissonant)</div>
<div class="step-card"><span class="step-num">BEATING</span>When two frequencies are very close together, they create a slow pulsing called "beating." The beat rate = |Freq1 \u2212 Freq2| Hz.<br><br>Set Freq1=440, Freq2=443. You'll hear a slow 3-Hz pulse \u2014 3 beats per second. That wobble IS audible beating. Piano tuners use this: when two strings are perfectly in tune, beating disappears. The beat rate of zero means they're identical.</div>
<p>Press PLAY and drag Freq2 slowly. Listen for: unison \u2192 beating \u2192 consonant interval \u2192 dissonant interval. The <em>mix</em> slider blends from all-Freq1 to all-Freq2 so you can isolate each, or hear both at equal volume.</p>
<div class="tip">This is literally how every musical instrument works. A violin string vibrates at its fundamental frequency AND all its harmonics simultaneously \u2014 many sine waves all added together. What you perceive as "violin timbre" is just a specific recipe of sine wave amplitudes.</div>
<div class="challenge">Set Freq1=440, Freq2=441, Mix=0.5. You hear a slow 1-Hz wobble (one pulse per second). Now set Freq2=448 \u2014 now 8 beats per second, faster wobble. Now Freq2=480 \u2014 the beating becomes so fast it's no longer heard as wobble; instead it fuses into a rougher tone. Roughly above 20 beats/sec our ear stops hearing separate pulses and starts hearing "roughness" \u2014 this transition is exactly how we perceive dissonance.</div>
`,
code:`// \u2500\u2500 ADDING TWO SINE WAVES \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
// The most fundamental operation in audio DSP.
// Each OscillatorNode is independent; they sum
// automatically when connected to the same destination.

function makeSynth(audioCtx, params) {
  const osc1  = audioCtx.createOscillator();
  const osc2  = audioCtx.createOscillator();
  const gain1 = audioCtx.createGain();
  const gain2 = audioCtx.createGain();
  const master = audioCtx.createGain();

  osc1.type = 'sine';
  osc2.type = 'sine';
  osc1.frequency.value = params.freq1;
  osc2.frequency.value = params.freq2;

  // mix = 0 \u2192 all freq1, mix = 1 \u2192 all freq2
  gain1.gain.value = (1 - params.mix) * 0.5;
  gain2.gain.value =      params.mix  * 0.5;

  master.gain.value = 0.6;

  osc1.connect(gain1); gain1.connect(master);
  osc2.connect(gain2); gain2.connect(master);

  return { node: master, osc1, osc2, gain1, gain2 };
}

function updateParams(nodes, params) {
  nodes.osc1.frequency.value = params.freq1;
  nodes.osc2.frequency.value = params.freq2;
  nodes.gain1.gain.value = (1 - params.mix) * 0.5;
  nodes.gain2.gain.value =      params.mix  * 0.5;
}
`},

// \u2500\u2500\u2500 05 \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
{ subtitle:'05 - Square Waves', title:'Square Waves',
params:[
  {id:'freq',  label:'Frequency (Hz)',  min:40,  max:2000, step:1,   def:220},
  {id:'duty',  label:'Pulse Width',     min:.05, max:.95,  step:.01, def:0.5},
],
body:`
<p>A <strong>square wave</strong> doesn't curve \u2014 it snaps between +1 and \u22121 instantly. It's the sound of old video games, chiptune music, and classic 8-bit consoles. But <em>why</em> does it sound so buzzy?</p>
<p>Because of harmonics. Any repeating waveform can be decomposed into sine waves. For a square wave the recipe is:</p>
<div class="step-card"><span class="step-num">FOURIER SERIES OF A SQUARE WAVE</span>square(f) = sin(f)/1 + sin(3f)/3 + sin(5f)/5 + sin(7f)/7 + sin(9f)/9 + ...<br><br>In words: fundamental + every <em>odd harmonic</em>, each getting quieter by 1/n. An infinite number of harmonics in theory \u2014 in practice it converges quickly. Look at the spectrum display right now: you should see spikes at f, 3f, 5f, 7f...</div>
<p>The <strong>pulse width</strong> (duty cycle) is how long each cycle spends "high" vs "low." 50% = classic square wave. 25% = thin, nasal pulse (exactly the NES/Game Boy lead sound). 10% = extremely thin, almost oboe-like.</p>
<div class="step-card"><span class="step-num">WHAT CHANGES WITH DUTY CYCLE</span>At 50%: only odd harmonics (1, 3, 5, 7...). Perfect symmetry.<br>At 25%: even AND odd harmonics appear. The timbre changes dramatically.<br>At 10%: still more harmonics, gets thin and reedy.<br><br>Watch the spectrum as you drag \u2014 the harmonic structure visibly shifts. At 50% the even harmonics (spikes at 2f, 4f, 6f) are absent. At any other duty, they appear.</div>
<div class="tip">PWM (Pulse Width Modulation) is one of the most powerful synthesis techniques. If you slowly sweep the duty cycle with an LFO (we'll do this in lesson 13), you get a rich, chorusing effect \u2014 the sound appears to move and breathe. The Juno-106 chorus uses this principle.</div>
<div class="challenge">Set duty to 0.50 and look at the spectrum. Note where the spikes are. Now set duty to 0.25 \u2014 new spikes appear at the even harmonic positions (2f, 4f...). Now set duty to 0.10 \u2014 the harmonics spread out differently again. Try to find a duty setting where the sound feels most "hollow" (hint: around 0.5 is thickest, very low or very high duty is thinnest). This is why 50% square waves sound "full" and narrow pulses sound "thin."</div>
`,
code:`// \u2500\u2500 SQUARE / PULSE WAVE \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
// A square wave is a sine wave plus all its odd harmonics.
// Web Audio's built-in 'square' type is a 50% duty square.
// For variable pulse width we build it with PeriodicWave.

function makeSynth(audioCtx, params) {
  const osc  = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  gain.gain.value = 0.35;

  buildPulse(osc, params.duty, audioCtx);
  osc.frequency.value = params.freq;
  osc.connect(gain);
  return { node: gain, osc };
}

function buildPulse(osc, duty, audioCtx) {
  // A pulse wave with duty d:
  // Fourier coefficients: a_n = (2/n\u03C0) \u00D7 sin(n \u00D7 \u03C0 \u00D7 d)
  const N    = 64;   // number of harmonics
  const real = new Float32Array(N);
  const imag = new Float32Array(N);
  for (let n = 1; n < N; n++) {
    imag[n] = (2 / (n * Math.PI)) * Math.sin(n * Math.PI * duty);
  }
  const wave = audioCtx.createPeriodicWave(real, imag,
                 { disableNormalization: false });
  osc.setPeriodicWave(wave);
}

function updateParams(nodes, params) {
  nodes.osc.frequency.value = params.freq;
  // Rebuild waveform when duty changes
  // (In production: cache waves per duty value)
  buildPulse(nodes.osc, params.duty, nodes.osc.context);
}
`},

// \u2500\u2500\u2500 06 \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
{ subtitle:'06 - Sawtooth Waves', title:'Sawtooth Waves',
params:[
  {id:'freq',  label:'Frequency (Hz)',  min:40,  max:2000, step:1,  def:220},
  {id:'harms', label:'Harmonics (1=sine, 32=full saw)', min:1, max:32, step:1, def:32},
],
body:`
<p>The <strong>sawtooth wave</strong> ramps up linearly then snaps back to zero \u2014 like a shark fin or saw blade. It's the <em>brightest</em> basic waveform, and the most common starting point for subtractive synthesis.</p>
<p>Unlike the square wave (odd harmonics only), the sawtooth has <strong>every harmonic</strong>:</p>
<div class="step-card"><span class="step-num">FOURIER SERIES OF A SAWTOOTH</span>saw(f) = sin(f)/1 \u2212 sin(2f)/2 + sin(3f)/3 \u2212 sin(4f)/4 + ...<br><br>Every integer harmonic present, alternating sign, amplitude falling as 1/n. More harmonics = brighter sound. Compare the spectrum here to the square wave in lesson 05 \u2014 the sawtooth has twice as many spikes because even harmonics are present too.</div>
<p>The <em>numHarmonics</em> slider lets you build the sawtooth manually from scratch. At 1 harmonic: just a sine. At 4: you can see the waveform starting to look saw-like. At 32: very close to a perfect sawtooth. This is <strong>Fourier synthesis in action</strong> \u2014 adding sines to build any shape.</p>
<div class="step-card"><span class="step-num">WHY SUBTRACTIVE SYNTHESIS USES SAW</span>Subtractive synthesis (lesson 10) starts with a rich source and uses filters to carve away harmonics. The sawtooth is ideal because it has all harmonics available \u2014 you can subtract any subset. Starting with a sine and trying to add harmonics with a filter doesn't work. You need to start rich.</div>
<div class="tip">A "reverse sawtooth" (ramps down, snaps up) has the same harmonics but alternating sign. It sounds nearly identical to your ears but looks like a mirror image on the oscilloscope. The Roland Juno, Moog Minimoog, Korg MS-20 \u2014 all use sawtooth as their primary oscillator waveform.</div>
<div class="challenge">Use the <strong>Harmonics</strong> slider to manually build the saw. Set it to 1 \u2014 just a sine. Set to 2 \u2014 slightly asymmetric. Set to 4 \u2014 you can hear the "edge" coming in. Set to 16 \u2014 recognizable sawtooth buzz. At 32 it sounds nearly identical to the built-in sawtooth but was constructed by adding 32 sine waves. This proves that any waveform = sum of sines. Fourier was right.</div>
`,
code:`// \u2500\u2500 SAWTOOTH WAVE \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
// The saw contains ALL harmonics: 1/1, 1/2, 1/3, 1/4...
// Drag the Harmonics slider from 1 to 32.
// Watch and HEAR the waveform build up from a pure sine
// into a full sawtooth as harmonics are added.

function makeSynth(audioCtx, params) {
  const osc  = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  gain.gain.value = 0.35;

  buildSaw(osc, Math.round(params.harms), audioCtx);
  osc.frequency.value = params.freq;
  osc.connect(gain);
  return { node: gain, osc };
}

// Build a sawtooth from N harmonics using Fourier series.
// With N=1: pure sine. N=32: very close to true sawtooth.
function buildSaw(osc, N, audioCtx) {
  const real = new Float32Array(N + 1);
  const imag = new Float32Array(N + 1);
  for (let n = 1; n <= N; n++) {
    // Sawtooth: amplitude = (-1)^(n+1) / n  for each harmonic
    imag[n] = Math.pow(-1, n + 1) / n;
  }
  osc.setPeriodicWave(
    audioCtx.createPeriodicWave(real, imag,
      { disableNormalization: false }));
}

function updateParams(nodes, params) {
  nodes.osc.frequency.value = params.freq;
  buildSaw(nodes.osc, Math.round(params.harms), nodes.osc.context);
}
`},

// \u2500\u2500\u2500 07 \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
{ subtitle:'07 - Triangle Waves', title:'Triangle Waves',
params:[
  {id:'freq',  label:'Frequency (Hz)',  min:40,  max:2000, step:1,   def:220},
  {id:'blend', label:'Sine\u2194Triangle',  min:0,   max:1,    step:.01, def:1.0},
],
body:`
<p>The <strong>triangle wave</strong> sits between a sine and a square. It ramps up linearly to +1, then down linearly to \u22121, then back \u2014 a zigzag. It sounds warm and mellow, much softer than the square.</p>
<div class="step-card"><span class="step-num">FOURIER SERIES OF A TRIANGLE</span>tri(f) = sin(f)/1 \u2212 sin(3f)/9 + sin(5f)/25 \u2212 sin(7f)/49 + ...<br><br>Odd harmonics only (like the square) \u2014 but notice the denominators: 1, 9, 25, 49... That's 1\u00B2, 3\u00B2, 5\u00B2, 7\u00B2. Harmonics fall at 1/n\u00B2 instead of 1/n. Squaring the denominator means harmonics fall off much faster. Fewer high harmonics = softer, more flute-like quality.</div>
<div class="step-card"><span class="step-num">THE HARMONIC BRIGHTNESS LADDER</span>From darkest to brightest:<br><br>Sine \u2192 Triangle \u2192 Square \u2192 Sawtooth<br><br>\u2022 Sine: 0 harmonics (just fundamental)<br>\u2022 Triangle: odd harmonics, fall at 1/n\u00B2<br>\u2022 Square: odd harmonics, fall at 1/n (louder highs)<br>\u2022 Sawtooth: ALL harmonics, fall at 1/n (brightest)<br><br>Subtractive synthesis travels from right to left: start with saw, filter down toward sine.</div>
<p>The <strong>Blend</strong> slider crossfades between sine (0) and triangle (1). Listen as harmonics arrive \u2014 the tiny odd-harmonic buzz of the triangle is very subtle compared to the square.</p>
<div class="tip">The Nintendo Entertainment System's triangle channel was limited to one octave range and had only 4-bit amplitude resolution (very few steps of loudness). That coarseness gave NES bass lines their characteristic slightly buzzy, stepped quality. The triangle wave + hardware limitation = iconic game music bass sound.</div>
<div class="challenge">Set frequency to 220 Hz and blend to 1.0 (pure triangle). Now open a new tab with lesson 05 (square wave) at the same frequency. Compare the spectrum: both have spikes only at odd harmonics (220, 660, 1100...) BUT in the triangle the higher harmonics are much quieter. Switch between them and listen to that difference in "brightness" \u2014 same harmonic positions, completely different amplitudes at each harmonic.</div>
`,
code:`// \u2500\u2500 TRIANGLE WAVE \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
// Triangle: odd harmonics only, falling at 1/n\u00B2 rate.
// Softer and flutier than a square wave.

function makeSynth(audioCtx, params) {
  const sinOsc = audioCtx.createOscillator();
  const triOsc = audioCtx.createOscillator();
  const sinGain = audioCtx.createGain();
  const triGain = audioCtx.createGain();
  const master  = audioCtx.createGain();

  sinOsc.type = 'sine';
  triOsc.type = 'triangle';
  sinOsc.frequency.value = params.freq;
  triOsc.frequency.value = params.freq;
  master.gain.value = 0.5;

  // blend: 0 = all sine, 1 = all triangle
  sinGain.gain.value = 1 - params.blend;
  triGain.gain.value =     params.blend;

  sinOsc.connect(sinGain); sinGain.connect(master);
  triOsc.connect(triGain); triGain.connect(master);

  return { node: master, sinOsc, triOsc, sinGain, triGain };
}

function updateParams(nodes, params) {
  nodes.sinOsc.frequency.value = params.freq;
  nodes.triOsc.frequency.value = params.freq;
  nodes.sinGain.gain.value = 1 - params.blend;
  nodes.triGain.gain.value =     params.blend;
}
`},

// \u2500\u2500\u2500 08 \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
{ subtitle:'08 - Noise', title:'Noise',
params:[
  {id:'color',    label:'Color (0=white  0.5=pink  1=brown)', min:0,   max:1,    step:.01, def:0},
  {id:'hpCutoff', label:'High-pass cutoff (Hz)',              min:20,  max:8000, step:10,  def:20},
  {id:'amp',      label:'Amplitude',                          min:0,   max:1,    step:.01, def:0.3},
],
body:`
<p><strong>Noise</strong> is the opposite of a sine wave: instead of one frequency, it contains <em>all frequencies at once</em> in random proportions. Different "colors" describe how energy is distributed across the spectrum.</p>
<div class="step-card"><span class="step-num">WHITE NOISE (slider at 0)</span>Equal energy at every frequency. Every sample is a random number between \u22121 and +1, independent of the previous sample. Spectrum: a flat line across all frequencies.<br>Sounds like: TV static, hissing, strong wind up close.</div>
<div class="step-card"><span class="step-num">PINK NOISE (slider at 0.5)</span>Energy falls at \u22123 dB per octave as frequency rises. Our ears perceive this as more balanced and natural \u2014 white noise sounds treble-heavy, pink sounds "even." Spectrum: a line tilted gently downward.<br>Sounds like: waterfall, heavy rain, ASMR, "natural" ambience. Used in acoustic testing because our hearing IS pink-noise-shaped.</div>
<div class="step-card"><span class="step-num">BROWN NOISE (slider at 1)</span>Energy falls at \u22126 dB per octave \u2014 even more bass-heavy. Generated by accumulating (integrating) white noise: each sample = previous sample + small random step (a random walk). Spectrum: steep downward slope.<br>Sounds like: thunder, deep ocean rumble, very strong wind.</div>
<p>The color slider smoothly blends across all three. Watch the spectrum as you drag: the slope of the noise floor changes from flat (white) to gently tilted (pink) to steep (brown).</p>
<div class="tip">Noise is essential for synthesis percussion: a hi-hat is just very short white noise. A snare is noise + a filtered pitched component. Filtered noise through a resonant bandpass filter sounds like breath or wind instruments. White noise through a narrow bandpass sounds like a pitched whistle. Lesson 12 explores this.</div>
<div class="challenge">Set color to pink (0.5) and listen for 30 seconds. Then switch to white (0). Pink feels "calmer" and more natural. This is because the real world \u2014 rustling leaves, flowing water, biological signals \u2014 tends toward 1/f (pink) spectra. Our brains literally evolved in a pink-noise environment, so pink noise is cognitively less arousing than white. White noise is more "alerting." Pink noise is more relaxing. This has real effects on sleep and concentration research.</div>
`,
code:`// -- NOISE GENERATOR --
// A noise generator outputs random sample values instead of a repeating wave.
// The "color" determines how the energy is distributed across frequencies.
//
// WHITE NOISE: pure random. Every frequency equally loud. Bright hiss.
//   Think: TV static, cymbal wash, the "shhhh" between FM radio stations.
//
// PINK NOISE: filtered white noise, -3dB per octave as frequency rises.
//   Equal energy per *octave* instead of per Hz -- sounds more natural.
//   Think: rain, waterfall, the kind of noise that doesn't fatigue your ears.
//   Used in studio acoustics testing because it matches how we hear.
//
// BROWN NOISE: each sample is the previous sample plus a tiny random step.
//   Called "Brownian motion" after Robert Brown, who watched pollen jiggle.
//   Very deep and rumbly. Think: standing next to a large engine, or thunder.
//
// WHY AN AUDIOBUFFER INSTEAD OF REAL-TIME GENERATION?
// createScriptProcessor() lets you run custom JS per-sample in real time.
// It's deprecated and broken on iOS Safari. So we pre-render 2 seconds of
// noise into a buffer and loop it. Sounds identical, works everywhere.

function makeSynth(audioCtx, params) {
  const SR = audioCtx.sampleRate;
  const len = SR * 2; // 2 seconds of noise, looped forever

  // createBuffer(channels, length, sampleRate)
  // We fill the buffer manually, sample by sample.
  const buf = audioCtx.createBuffer(1, len, SR);
  const data = buf.getChannelData(0); // Float32Array, values in [-1, 1]

  if (params.color < 0.33) {
    // WHITE NOISE: each sample is an independent random number.
    // Math.random() gives 0 to 1, so *2-1 shifts it to [-1, 1].
    for (let i = 0; i < len; i++) data[i] = Math.random() * 2 - 1;

  } else if (params.color < 0.66) {
    // PINK NOISE: Paul Kellett's algorithm -- 7 one-pole IIR filters
    // running in parallel, each tuned to a different frequency band.
    // They sum to approximate a -10dB/decade (= -3dB/octave) slope.
    // The b0-b6 variables are the "memory" of each filter stage --
    // each one remembers its previous output and bleeds it forward.
    let b0=0, b1=0, b2=0, b3=0, b4=0, b5=0, b6=0;
    for (let i = 0; i < len; i++) {
      const w = Math.random() * 2 - 1; // one white noise sample as input
      b0 = 0.99886*b0 + w*0.0555179;   // each stage: slight leak of memory
      b1 = 0.99332*b1 + w*0.0750759;   // + weighted new input
      b2 = 0.96900*b2 + w*0.1538520;
      b3 = 0.86650*b3 + w*0.3104856;
      b4 = 0.55000*b4 + w*0.5329522;
      b5 = -0.7616*b5 - w*0.0168980;
      data[i] = (b0+b1+b2+b3+b4+b5+b6 + w*0.5362) * 0.11;
      b6 = w * 0.115926;
    }
  } else {
    // BROWN NOISE: random walk. Each sample = previous sample + tiny nudge.
    // No memory of anything older than one step -- just drift.
    // Low frequencies dominate because the walk moves slowly on average.
    let prev = 0;
    for (let i = 0; i < len; i++) {
      const step = (Math.random() * 2 - 1) * 0.04; // small random step
      prev = Math.max(-1, Math.min(1, prev + step)); // clamp: don't clip
      data[i] = prev;
    }
  }

  // BufferSource: plays back the buffer we just filled.
  // src.loop = true means it wraps seamlessly at the end.
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  src.loop = true;

  // High-pass filter: drag the cutoff up to hear the brightness difference
  // between white and brown more clearly. At 20Hz it's effectively off.
  const hpf = audioCtx.createBiquadFilter();
  hpf.type = 'highpass';
  hpf.frequency.value = params.hpCutoff;

  const master = audioCtx.createGain();
  master.gain.value = params.amp;

  src.connect(hpf);
  hpf.connect(master);

  // We return hpf and master by name so updateParams() can reach them.
  // The engine calls updateParams() every time you move a slider.
  return { node: master, osc: src, hpf, master };
}

function updateParams(nodes, params) {
  // Cutoff and amplitude update instantly -- no restart needed.
  // Try dragging hpCutoff from 20 up to 5000 while brown noise plays:
  // you're carving away the low rumble in real time. That's a high-pass sweep.
  nodes.hpf.frequency.value = params.hpCutoff;
  nodes.master.gain.value   = params.amp;

  // Color (white/pink/brown) needs a restart.
  // The buffer was pre-rendered when you pressed PLAY --
  // we can't regenerate it on the fly without createScriptProcessor,
  // which is broken on iOS. Change color, press PLAY again.
}
`},

// \u2500\u2500\u2500 09 \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
{ subtitle:'09 - ADSR Envelope', title:'The ADSR Envelope',
params:[
  {id:'attack',  label:'Attack  (ms)', min:1,   max:1000, step:1,  def:50},
  {id:'decay',   label:'Decay   (ms)', min:1,   max:1000, step:1,  def:100},
  {id:'sustain', label:'Sustain (0-1)',min:0,   max:1,    step:.01,def:0.6},
  {id:'release', label:'Release (ms)', min:10,  max:3000, step:10, def:400},
],
body:`
<p>The <strong>ADSR envelope</strong> is the shape of a note over time. It's what makes a piano note sound different from an organ note, even at the same frequency. It's one of the most important tools in synthesis.</p>
<div class="step-card"><span class="step-num">A \u2014 ATTACK</span>Time from note-on to peak volume. Fast (1ms) = percussive snap. Slow (500ms) = swelling pad. Piano: ~2ms. Strings: 200-500ms.</div>
<div class="step-card"><span class="step-num">D \u2014 DECAY</span>Time to fall from peak to sustain level after the attack. A hard "D" with low sustain creates a plucked sound (peak then drop). Electric piano: medium decay to low-ish sustain.</div>
<div class="step-card"><span class="step-num">S \u2014 SUSTAIN</span>The volume level held as long as you hold the key. NOT a time \u2014 it's an amplitude level (0 to 1). Organ: sustain=1 (stays at full volume). Drum: sustain=0 (fades to silence naturally).</div>
<div class="step-card"><span class="step-num">R \u2014 RELEASE</span>How long the tail lasts after note-off. Short = staccato. Long = reverberant. In this demo the note automatically releases after sustain.</div>
<p>Press PLAY repeatedly to re-trigger the envelope. Watch the oscilloscope \u2014 you can actually see the amplitude shape of the ADSR curve.</p>
<div class="tip">Real synths often have a second envelope just for the filter cutoff \u2014 so the timbre evolves separately from the volume. Attack-shaped brightness (filter opens on attack, closes on decay) is the classic "synth brass" sound.</div>
<div class="challenge">Simulate a piano: Attack=2ms, Decay=200ms, Sustain=0.3, Release=800ms. Then simulate a string pad: Attack=400ms, Decay=100ms, Sustain=0.8, Release=1200ms. Then organ: Attack=5ms, Decay=5ms, Sustain=1.0, Release=20ms. Feel how each setting creates a completely different instrument feel.</div>
`,
code:`// \u2500\u2500 ADSR ENVELOPE \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
// The foundational volume shaping tool.
// GainNode.gain is an AudioParam \u2014 it supports
// precise, sample-accurate automation curves.

function makeSynth(audioCtx, params) {
  const osc  = audioCtx.createOscillator();
  const env  = audioCtx.createGain();

  osc.type = 'sawtooth';
  osc.frequency.value = 220;

  const now = audioCtx.currentTime;
  const A = params.attack  / 1000;
  const D = params.decay   / 1000;
  const S = params.sustain;
  const R = params.release / 1000;

  // Note-on sequence
  env.gain.setValueAtTime(0, now);
  env.gain.linearRampToValueAtTime(0.7, now + A);        // Attack
  env.gain.linearRampToValueAtTime(0.7 * S, now + A + D);// Decay \u2192 Sustain
  // Hold sustain for a moment, then note-off
  env.gain.setValueAtTime(0.7 * S, now + A + D + 0.3);   // Hold
  env.gain.exponentialRampToValueAtTime(               // Release
    0.0001, now + A + D + 0.3 + R);

  osc.connect(env);
  return { node: env, osc, stopAt: now + A + D + 0.3 + R + 0.1 };
}

function updateParams(nodes, params) {
  // Envelope is baked in at note-on \u2014 live update
  // restarts the note in the engine above.
}
`},

// \u2500\u2500\u2500 10 \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
{ subtitle:'10 - Subtractive Synthesis', title:'Subtractive Synthesis',
params:[
  {id:'cutoff', label:'Filter Cutoff (Hz)', min:80,  max:8000, step:10,  def:800},
  {id:'rez',    label:'Resonance (Q)',       min:0.1, max:20,   step:0.1, def:1},
  {id:'env',    label:'Env\u2192Cutoff (Hz)',    min:0,   max:4000, step:10,  def:400},
],
body:`
<p><strong>Subtractive synthesis</strong> is the most common synthesis type \u2014 it's what analog synths (Moog, Roland, Korg) are built on. The concept: <em>start with a harmonically rich source, filter away what you don't want.</em></p>
<p>Signal flow: <strong>Oscillator \u2192 Filter \u2192 Amplifier \u2192 Out</strong></p>
<div class="step-card"><span class="step-num">THE SOURCE</span>A sawtooth wave (all harmonics). It's the "raw clay" \u2014 full of brightness that we'll sculpt.</div>
<div class="step-card"><span class="step-num">THE FILTER</span>A low-pass filter that lets bass frequencies through but cuts treble above the cutoff point. Moving the cutoff down = darker sound. Moving it up = brighter. The filter is what gives analog synths their famous "warm" sound.</div>
<div class="step-card"><span class="step-num">RESONANCE (Q)</span>Boosts frequencies around the cutoff point, creating a peak. High resonance = the classic "wah" or "quack" effect. Extreme resonance can make the filter self-oscillate and generate its own pitched tone \u2014 used as a sound effect technique.</div>
<div class="step-card"><span class="step-num">ENVELOPE \u2192 CUTOFF</span>The third slider opens the filter on each note-on then closes it. This "envelope modulating the cutoff" is the signature sound of classic synth brass and synth plucks. The "Funky Drummer" bass sound, the Moog lead, the Jupiter-8 brass \u2014 all this.</div>
<div class="tip">You've heard this hundreds of times without knowing the name. Every "wah" guitar effect, every "funky synth bass", every "big synth lead" \u2014 subtractive synthesis with a resonant low-pass filter and envelope modulation of the cutoff.</div>
<div class="challenge">Set cutoff very low (200Hz), resonance high (10), env\u2192cutoff high (3000Hz). Press PLAY. That "BWAAAP" sound is literally the filter sweeping open from 200Hz to 3200Hz over the attack. Classic subtractive synthesis in action.</div>
`,
code:`// \u2500\u2500 SUBTRACTIVE SYNTHESIS \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
// Oscillator \u2192 Filter \u2192 Amplifier
// This is the core of analog synthesis.

function makeSynth(audioCtx, params) {
  const osc    = audioCtx.createOscillator();
  const filter = audioCtx.createBiquadFilter();
  const env    = audioCtx.createGain();

  // Rich source
  osc.type = 'sawtooth';
  osc.frequency.value = 110;

  // Low-pass filter
  filter.type = 'lowpass';
  filter.frequency.value = params.cutoff;
  filter.Q.value         = params.rez;

  // Envelope on filter cutoff (envelope modulation!)
  const now = audioCtx.currentTime;
  const A = 0.01, D = 0.3;
  filter.frequency.setValueAtTime(params.cutoff, now);
  filter.frequency.linearRampToValueAtTime(
    params.cutoff + params.env, now + A);      // attack opens filter
  filter.frequency.exponentialRampToValueAtTime(
    Math.max(params.cutoff, 20), now + A + D); // decay closes it

  // Volume envelope
  env.gain.setValueAtTime(0, now);
  env.gain.linearRampToValueAtTime(0.7, now + 0.008);
  env.gain.exponentialRampToValueAtTime(0.0001, now + 1.2);

  osc.connect(filter);
  filter.connect(env);
  return { node: env, osc, filter, stopAt: now + 1.3 };
}

function updateParams(nodes, params) {
  nodes.filter.frequency.value = params.cutoff;
  nodes.filter.Q.value         = params.rez;
}
`},

// \u2500\u2500\u2500 11 \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
{ subtitle:'11 - Low Pass Filter', title:'Low-Pass Filters',
params:[
  {id:'cutoff', label:'Cutoff (Hz)',  min:50,  max:20000, step:10,  def:2000},
  {id:'Q',      label:'Resonance Q', min:0.1, max:30,    step:0.1, def:1},
  {id:'poles',  label:'Filter Order (approx)', min:1, max:4, step:1, def:2},
],
body:`
<p>A <strong>low-pass filter (LPF)</strong> passes frequencies below the cutoff and attenuates frequencies above it. It's the most common filter in synthesis \u2014 it's what makes sounds go from bright to dark.</p>
<div class="step-card"><span class="step-num">CUTOFF FREQUENCY</span>The "knee" point. Frequencies below cutoff pass through unaffected. Frequencies above are increasingly attenuated. Move it left = darker. Move it right = brighter.</div>
<div class="step-card"><span class="step-num">SLOPE / ORDER</span>How steeply frequencies are cut above the cutoff. Measured in dB/octave. A 1st-order filter cuts at -6dB/oct. 2nd-order: -12dB/oct. 4th-order: -24dB/oct. The classic Moog ladder filter is a 4-pole (-24dB/oct) filter \u2014 that steep slope is part of its famous sound.</div>
<div class="step-card"><span class="step-num">RESONANCE (Q)</span>Creates a peak at the cutoff. At high Q values, the filter rings \u2014 you can hear a pitched tone at the cutoff frequency even on a noise source. At Q=0.707 (Butterworth) there is no peak \u2014 flat response up to the cutoff, then drops.</div>
<p>Watch the spectrum analyzer: the sawtooth harmonics get progressively cut as you lower the cutoff. The resonance peak is visible as a spike right at the cutoff frequency.</p>
<div class="tip">The "poles" slider changes from 1 to 4 cascaded biquad filters (each stage adds -12dB/oct). 4 stages = 48dB/oct which sounds almost like cutting with a knife. 1 stage is gentle. This is why "4-pole" filters (like Moog, Prophet-5) have that distinctively dramatic character.</div>
<div class="challenge">Set cutoff to 500Hz, Q to 20. The filter is self-oscillating (or close to it) \u2014 you hear a sine tone at 500Hz even through the noise. Now move the cutoff slider \u2014 you're literally playing a theremin-like instrument using just the filter resonance!</div>
`,
code:`// \u2500\u2500 LOW-PASS FILTER \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
// BiquadFilterNode implements a second-order (2-pole)
// filter. For higher orders, cascade multiple filters.

function makeSynth(audioCtx, params) {
  const src   = audioCtx.createOscillator();
  const gain  = audioCtx.createGain();
  gain.gain.value = 0.4;
  src.type = 'sawtooth';
  src.frequency.value = 110;

  // Cascade 'poles' number of 2nd-order LPF sections
  let last = src;
  const filters = [];
  for (let i = 0; i < params.poles; i++) {
    const f = audioCtx.createBiquadFilter();
    f.type = 'lowpass';
    f.frequency.value = params.cutoff;
    // Distribute Q: total Q scales with cascading
    f.Q.value = i === 0 ? params.Q : 0.5;
    last.connect(f);
    last = f;
    filters.push(f);
  }
  last.connect(gain);
  return { node: gain, osc: src, filters };
}

function updateParams(nodes, params) {
  nodes.filters.forEach((f, i) => {
    f.frequency.value = params.cutoff;
    f.Q.value = i === 0 ? params.Q : 0.5;
  });
}
`},

// \u2500\u2500\u2500 12 \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
{ subtitle:'12 - HPF, BPF & Notch', title:'High-Pass, Band-Pass & Notch',
params:[
  {id:'type',   label:'0=HP  0.5=BP  1=Notch',                                              min:0,   max:1,     step:.5,  def:0},
  {id:'cutoff', label:'Cutoff / Center (Hz)',                                                min:50,  max:10000, step:10,  def:1000},
  {id:'Q',      label:'Q: HP/BP=resonance peak | Notch=width (high Q = narrow notch dip)',  min:0.1, max:100,   step:0.1, def:2},
],
body:`
<p>The low-pass filter has siblings. Each shapes the frequency spectrum differently:</p>
<div class="step-card"><span class="step-num">HIGH-PASS FILTER (HPF)</span>The opposite of LPF \u2014 passes high frequencies, cuts low. Used to remove bass rumble, thin out a sound, create "telephone" or "radio" effect. A 200Hz HPF removes all the mud from a mix. Slider at 0.</div>
<div class="step-card"><span class="step-num">BAND-PASS FILTER (BPF)</span>Only passes a band of frequencies around the center. Everything above AND below is cut. Width is controlled by Q \u2014 high Q = narrow band (only a sliver of frequencies). Used for vowel sounds, wah effects, formant synthesis. Slider at 0.5.</div>
<div class="step-card"><span class="step-num">NOTCH FILTER (BAND REJECT)</span>The opposite of BPF \u2014 cuts a narrow band, passes everything else. Used to remove a specific frequency (like a 60Hz hum from power lines). Slider at 1.</div>
<p>Move the cutoff while listening. With HPF: the sound gets thinner and more trebly as you raise it. With BPF: you hear only a narrow frequency band \u2014 tweak Q for width. With notch: you hear a frequency disappear from the spectrum.</p>
<div class="tip">Your vocal tract is essentially a bank of band-pass filters. The different shapes your mouth makes when saying vowels (aah, eeh, ooh) are actually different sets of resonant peaks called formants. Formant synthesis models this directly with BPF banks.</div>
<div class="challenge">BPF + high Q + moving the cutoff slowly = classic wah pedal. Set type=0.5, Q=8, then slowly sweep cutoff from 300 to 3000 Hz. Now you understand exactly how a wah pedal works \u2014 it's literally a resonant band-pass filter with a foot-controlled cutoff sweep.</div>
`,
code:`// -- HPF, BPF, NOTCH FILTERS --
// Same BiquadFilterNode, different .type. But Q means something different
// for each filter type -- this is what trips people up.
//
// HIGH-PASS: passes everything ABOVE cutoff.
//   Q = resonant boost right at the cutoff edge. High Q = a peak there.
//   Good for: removing bass rumble, thinning a sound, telephone effect.
//
// BAND-PASS: passes only a band AROUND the center frequency.
//   Q = how narrow the band is. High Q = thin slice, low Q = wide chunk.
//   Good for: wah pedal, vowel sounds, isolating a single harmonic.
//
// NOTCH (band-reject): the opposite of band-pass. Cuts a notch, passes everything else.
//   Q = how narrow the notch is. LOW Q = wide gentle dip. HIGH Q = razor-thin surgical cut.
//   There is NO resonant boost with notch -- Q only controls the notch WIDTH.
//   At Q=2 the dip is subtle. At Q=50 you're removing one frequency with a scalpel.
//   Try it: set type=Notch, sweep cutoff across 110-880Hz (the harmonics of the saw),
//   then crank Q up to 80 and move cutoff slowly. You'll hear individual harmonics
//   disappear one by one. That's a surgical notch.
//   Real-world use: removing 50Hz/60Hz mains hum from a recording without
//   touching anything else. One frequency, gone, everything else untouched.

const FILTER_TYPES = ['highpass', 'bandpass', 'notch'];

function makeSynth(audioCtx, params) {
  const src    = audioCtx.createOscillator();
  const filter = audioCtx.createBiquadFilter();
  const gain   = audioCtx.createGain();
  gain.gain.value = 0.45;

  src.type = 'sawtooth';
  src.frequency.value = 110; // low pitch = rich harmonics to carve up

  const idx = Math.round(params.type * 2); // maps 0/0.5/1 to index 0/1/2
  filter.type            = FILTER_TYPES[idx];
  filter.frequency.value = params.cutoff;
  filter.Q.value         = params.Q;

  src.connect(filter);
  filter.connect(gain);
  return { node: gain, osc: src, filter };
}

function updateParams(nodes, params) {
  const idx = Math.round(params.type * 2);
  nodes.filter.type            = FILTER_TYPES[idx];
  nodes.filter.frequency.value = params.cutoff;
  nodes.filter.Q.value         = params.Q;
}
`},

// \u2500\u2500\u2500 13 \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
{ subtitle:'13 - LFOs', title:'LFOs \u2014 Low-Frequency Oscillators',
params:[
  {id:'freq',     label:'Frequency (Hz)',  min:80,  max:800, step:1,   def:220},
  {id:'lfoRate',  label:'LFO Rate (Hz)',   min:0.1, max:20,  step:.1,  def:2},
  {id:'lfoDepth', label:'LFO Depth',       min:0,   max:1,   step:.01, def:0.5},
  {id:'target',   label:'0=vibrato 1=tremolo', min:0, max:1, step:1, def:0},
],
body:`
<p>An <strong>LFO (Low-Frequency Oscillator)</strong> is just a sine wave oscillating too slowly to hear as a pitch \u2014 typically 0.1 to 20 Hz. You don't hear the LFO itself; you hear what it does to other parameters.</p>
<p>Connect an LFO to a parameter and that parameter wobbles back and forth slowly. This creates motion and life in a sound that would otherwise be static.</p>
<div class="step-card"><span class="step-num">LFO \u2192 PITCH = VIBRATO</span>The LFO modulates the oscillator frequency slightly. Rate: 5-7 Hz is natural vibrato (like a singer or violin). Deep vibrato = dramatic pitch swings. This is what string players and singers do naturally.</div>
<div class="step-card"><span class="step-num">LFO \u2192 VOLUME = TREMOLO</span>The LFO modulates the gain. Amplitude wobbles = tremolo. Classic guitar amp tremolo, electric organ tremolo (Leslie cabinet). Different from vibrato \u2014 tremolo is volume wobble, vibrato is pitch wobble.</div>
<div class="step-card"><span class="step-num">LFO \u2192 FILTER CUTOFF = WAH</span>The LFO slowly sweeps the filter up and down. Like a slow wah pedal cycling automatically. Fast LFO here creates a "growl" effect.</div>
<p>The target slider switches between the three destinations. Notice how the same LFO rate and depth produces very different musical effects depending on where it's routed.</p>
<div class="tip">Most synths have multiple LFOs. One for vibrato, one for filter sweep, one for pan wobble. The LFO itself has waveform options too \u2014 sine LFO = smooth wobble, square LFO = hard jump (used for trance arpeggios), random LFO = unpredictable analog-style drift.</div>
<div class="challenge">Set LFO rate to 0.3 Hz, target to filter (2), depth to 0.7. The filter slowly sweeps open and closed \u2014 that's the "breathing" quality you hear in ambient synth pads. Now increase rate to 8 Hz \u2014 it turns into a growling, talking quality. Same principle, very different sound.</div>
`,
code:`// -- LFO: LOW FREQUENCY OSCILLATOR ----------------------------------------
// An LFO is just a normal oscillator running too slow to hear as pitch.
// You don't listen to it -- you connect it to a parameter and the parameter
// wobbles. Below ~20 Hz: modulation. Above 20 Hz: audio.
//
// In Web Audio, parameters ARE audio nodes. You can connect any signal
// source directly to any AudioParam: source.connect(param).
// The signal from the source adds to (or sets) the parameter value.

function makeSynth(audioCtx, params) {
  const now = audioCtx.currentTime;

  const carrier = audioCtx.createOscillator();
  carrier.type = 'sawtooth';
  carrier.frequency.value = params.freq;

  // LFO: an oscillator running at sub-audio rate
  const lfo = audioCtx.createOscillator();
  lfo.frequency.value = params.lfoRate; // Hz -- try 0.5 (slow sweep) to 15 (fast tremolo)

  // LFO depth: scale the LFO output before connecting to the target.
  // Without this, a +/-1 LFO modulating frequency would only sweep +/-1 Hz -- nothing.
  const lfoDepth = audioCtx.createGain();
  lfoDepth.gain.value = params.lfoDepth; // depth in Hz (for pitch) or linear gain (for tremolo)

  lfo.connect(lfoDepth);

  const master = audioCtx.createGain();
  master.gain.value = 0.4;

  const env = audioCtx.createGain();
  env.gain.setValueAtTime(0, now);
  env.gain.linearRampToValueAtTime(1, now + 0.01);
  env.gain.exponentialRampToValueAtTime(0.0001, now + 3.0);

  carrier.connect(env);

  if (params.target < 0.5) {
    // VIBRATO: LFO -> carrier frequency (pitch wobble)
    // LFO output (+/-1) * depth (Hz) -> added to carrier.frequency
    lfoDepth.connect(carrier.frequency); // depth controls how many Hz of pitch swing
  } else {
    // TREMOLO: LFO -> gain (volume wobble)
    // The LFO swings from -depth to +depth. We add it to a base gain of 0.5.
    // So gain oscillates between (0.5 - depth) and (0.5 + depth).
    const tremoloBase = audioCtx.createGain();
    tremoloBase.gain.value = 0.5;
    carrier.connect(tremoloBase);
    lfoDepth.connect(tremoloBase.gain); // LFO modulates the gain directly
    tremoloBase.connect(env);
    carrier.disconnect(env); // reconnect through tremoloBase
  }

  env.connect(master);
  return { node: master, osc: carrier, lfo, stopAt: now + 3.1 };
}

function updateParams(nodes, params) {
  nodes.lfo.frequency.value = params.lfoRate;
}
`},

// \u2500\u2500\u2500 14 \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
{ subtitle:'14 - Additive Synthesis', title:'Additive Synthesis',
params:[
  {id:'freq',    label:'Fundamental (Hz)',  min:40,  max:800, step:1,  def:220},
  {id:'harms',   label:'Harmonics (count)', min:1,   max:16,  step:1,  def:8},
  {id:'rolloff', label:'Rolloff (1/n^x)',   min:0.5, max:4,   step:.1, def:1},
  {id:'decay',   label:'Decay (seconds)',   min:0.3, max:5,   step:.1, def:2},
],
body:`
<p><strong>Additive synthesis</strong> goes the opposite direction from subtractive: you <em>build</em> a sound from scratch by stacking sine waves together at specific frequencies and amplitudes.</p>
<p>This is the "atoms to molecule" approach. Every timbre you've ever heard is ultimately a specific recipe of sine waves. Additive synthesis lets you mix that recipe directly.</p>
<div class="step-card"><span class="step-num">HARMONICS</span>For a note at frequency f (the fundamental), harmonics are at 2f, 3f, 4f, 5f... Harmonic 1 = fundamental. Harmonic 2 = one octave up. Harmonic 3 = perfect fifth above that. The pattern is the overtone series \u2014 it's built into physics and into music.</div>
<div class="step-card"><span class="step-num">ROLLOFF</span>How quickly harmonics get quieter as you go up. Rolloff=1 \u2192 amplitudes fall as 1/n (sawtooth recipe). Rolloff=2 \u2192 1/n\u00B2 (triangle recipe). Rolloff=0.5 \u2192 1/\u221An (brighter than a saw). You're literally sculpting the spectrum by hand.</div>
<p>The <em>Harmonics</em> slider adds more overtones. Watch the spectrum as you increase it \u2014 each new sine wave adds a new spike. With enough harmonics and the right rolloff, you're building a convincing sawtooth or triangle from scratch.</p>
<div class="tip">The Hammond organ is pure additive synthesis. Its "drawbars" control the amplitude of 9 specific harmonics. When you "pull out" a drawbar, you're adding that harmonic to the mix. The entire characteristic sound of the Hammond is just: how loud is each of the 9 harmonics?</div>
<div class="challenge">Set rolloff to 2.0 and slowly add harmonics. With just 1 harmonic it's a pure sine. With 3 it starts to sound like a triangle. With 16 at rolloff=2, you've approximated a triangle wave by adding sine waves together. This proves the Fourier theorem: any periodic sound = sums of sines.</div>
`,
code:`// -- ADDITIVE SYNTHESIS ---------------------------------------------------
// Build a sound by stacking sine waves. Each sine = one "partial" or "harmonic."
// harmonic 1 (fundamental) = your base pitch
// harmonic 2 = double the frequency (one octave up)
// harmonic 3 = triple (an octave + a fifth)
// harmonic n = n * fundamental frequency
//
// Amplitude of each harmonic determines the TIMBRE (tone color).
// Sawtooth: all harmonics at 1/n amplitude
// Square: odd harmonics only (1, 3, 5...) at 1/n
// Bell: specific non-integer ratios at specific amplitudes
// The sliders here let you sculpt that ratio directly.

function makeSynth(audioCtx, params) {
  const now = audioCtx.currentTime;
  const f = params.freq;
  const numHarmonics = Math.round(params.harms);

  const master = audioCtx.createGain();
  master.gain.value = 0.5;

  const env = audioCtx.createGain();
  env.gain.setValueAtTime(0.001, now);
  env.gain.linearRampToValueAtTime(0.9, now + 0.01);
  env.gain.exponentialRampToValueAtTime(0.001, now + params.decay);
  env.connect(master);

  const oscs = [];

  for (let n = 1; n <= numHarmonics; n++) {
    // Skip harmonics that would exceed Nyquist (half sample rate).
    // Above Nyquist = aliasing artifacts. Always check this.
    if (f * n > audioCtx.sampleRate / 2) break;

    const osc = audioCtx.createOscillator();
    osc.type = 'sine'; // each partial is a pure sine
    osc.frequency.value = f * n; // nth harmonic = n * fundamental

    const g = audioCtx.createGain();

    // Amplitude pattern: set by 'rolloff' param.
    // rolloff = 1.0 -> amplitude = 1/n (sawtooth spectrum)
    // rolloff = 2.0 -> amplitude = 1/n^2 (triangle spectrum -- much softer)
    // rolloff = 0.5 -> amplitude = 1/sqrtn (brighter than sawtooth)
    const amp = 1 / Math.pow(n, params.rolloff);
    g.gain.value = amp / numHarmonics; // normalize so total volume stays consistent

    osc.connect(g); g.connect(env);
    oscs.push(osc);
  }

  return { node: master, oscs, stopAt: now + params.decay + 0.1 };
}

function updateParams(nodes, params) {}
`},

// \u2500\u2500\u2500 15 \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500


{ subtitle:'15 - K5000 Advanced Additive', title:'Kawai K5000: Advanced Additive Synthesis',
params:[
  {id:'preset',  label:'Preset (0-7)',              min:0,   max:7,   step:1,   def:2},
  {id:'fund',    label:'Fundamental (Hz)',           min:40,  max:800, step:1,   def:220},
  {id:'odd',     label:'Odd Harmonics scale',        min:0,   max:2,   step:.01, def:1},
  {id:'even',    label:'Even Harmonics scale',       min:0,   max:2,   step:.01, def:1},
  {id:'bright',  label:'Brightness (H8+ scale)',     min:0,   max:2,   step:.01, def:1},
  {id:'formant', label:'Formant Center (0-1)',        min:0,   max:1,   step:.01, def:0.3},
  {id:'fDepth',  label:'Formant Depth',              min:0,   max:1,   step:.01, def:0},
  {id:'morf',    label:'Morf (blend toward sawtooth)',min:0,   max:1,   step:.01, def:0},
  {id:'cutoff',  label:'LPF Cutoff (Hz) -- sweep down to hear it cut in',     min:100, max:8000, step:10,  def:1200},
  {id:'res',     label:'LPF Resonance Q (try 8+ for a self-oscillation peak)',   min:0.5, max:25,  step:0.1, def:1},
],
body:`<div class="lesson-intro">The Kawai K5000 (1996) took additive synthesis further than anyone had before -- or since. Most additive synths give you a row of harmonic sliders and call it a day. The K5000 gave each of its 64 harmonics its own 4-stage loopable envelope, a 128-band formant filter (one band per semitone -- compare that to the one-per-octave EQ bands you see everywhere else), a "Morf" function that fades between two completely different harmonic spectra, and up to six independent sources per patch. It was the deepest production synthesizer ever shipped. Kawai stopped making synths in 1999.</div>

<div class="step-card"><span class="step-num">PRESETS 0-7</span>Each preset is a harmonic amplitude drawing -- the same thing you'd see as a bar chart on the K5000's LCD. Preset 0 is a full sawtooth (all harmonics at 1/n). Preset 1 is a clarinet (odd harmonics only -- that hollow, reedy shape). Preset 2 is a choir "ah" vowel (energy piled at harmonics 3-5, which is where the human throat resonates for that vowel). Load each one and notice the completely different character -- same pitch, totally different soul.</div>

<div class="step-card"><span class="step-num">GROUP CONTROLS (Odd, Even, Bright)</span>Instead of editing 64 sliders one by one, the K5000 let you scale harmonic families in one move. <strong>Odd scale</strong> (H1, H3, H5...) controls hollow/nasal quality -- all the way down zeroes even harmonics and you get a square wave. <strong>Even scale</strong> (H2, H4, H6...) controls octave richness and warmth. <strong>Bright</strong> (H8+) is your high-frequency air. Pull it to 0 and the sound goes warm and dark instantly. These are at 1.0 by default -- meaning they pass the preset through unchanged. Go above 1 to boost.</div>

<div class="step-card"><span class="step-num">MORF</span>Drag Morf from 0 to 1 while a note rings out. You're watching one harmonic spectrum interpolate into another -- every single partial moves to its new position simultaneously. On the K5000 you could set any two patches as Morf endpoints and map Morf to velocity, an envelope, or an LFO. A soft touch = one sound, a hard touch = a completely different one, with every intermediate state perfectly calculated.</div>

<div class="step-card"><span class="step-num">PER-HARMONIC ENVELOPES</span>This is why K5000 sounds feel alive. Low harmonics (H1-H4) decay slowly -- they're the body that sustains. Mid harmonics (H5-H12) decay at medium speed. High harmonics (H13+) die fast -- they're the attack transient edge, gone in under half a second. The result: every note starts bright and narrows into warmth over time, exactly like an acoustic instrument. The spectrum changes shape while you listen. Try Preset 5 (Vocal EE) and watch the spectrum analyzer -- the upper harmonics flash then fade.</div>

<div class="step-card"><span class="step-num">FORMANT FILTER + RESONANT LPF</span>The K5000 had a 128-band formant filter on top of its additive engine (one EQ band per semitone across the whole frequency range), plus a standard resonant 24dB/oct LPF. Drag Formant Center and Formant Depth to carve vowel-shaped peaks into the spectrum. Then try pushing Resonance above 14 -- the filter starts adding its own pitched tone at the Cutoff frequency. At 18 it dominates everything. This self-oscillation was considered a feature, not a bug.</div>`,
code:`// KAWAI K5000 ADVANCED ADDITIVE SYNTHESIS
// Per-harmonic envelopes: every partial has its own decay rate.
// This is why K5000 sounds feel alive -- the spectrum evolves over time
// as high harmonics decay away, leaving the fundamental standing alone.
//
// Group controls sculpt the preset in real time:
//   odd/even: scale entire harmonic families
//   bright: scale H8+ (adds or removes air and edge)
//   morf: interpolate toward the Morf B spectrum (changes the timbre's DNA)
//
// Formant filter: 3 peaking EQs simulate the K5000's 128-band spectral shaper.
// Use fDepth > 0 to activate it. Try moving formant while fDepth is up.

function makeSynth(audioCtx, params) {
  const master = audioCtx.createGain();
  master.gain.value = 0.5;
  const now = audioCtx.currentTime;
  const f = params.fund;

  // === K5000 PRESET SPECTRA [H1..H24] ===
  // These are the harmonic amplitude templates. The K5000 shipped with
  // thousands of hand-drawn spectra on floppy; these are faithful
  // approximations of its most distinctive patch types.
  // Preset also sets its own Morf B target, decay character, and filter color.
  const presets = [
    // 0 SAWTOOTH LEAD: 1/n rolloff, Morf B = square (removes evens)
    { spec: Array.from({length:24}, (_,i) => 1/(i+1)),
      morfB: Array.from({length:24}, (_,i) => i%2===0 ? 1/(i+1) : 0),
      decayMid: 1.0, decaySus: 0.4, color: 'none' },

    // 1 HOLLOW REED: odd harmonics dominate (clarinet body)
    //   Morf B = sawtooth -- morphing "opens up" the sound
    { spec: Array.from({length:24}, (_,i) => i%2===0 ? 1/(i+1)*0.95 : 0.05),
      morfB: Array.from({length:24}, (_,i) => 1/(i+1)),
