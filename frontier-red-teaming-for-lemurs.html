function vizThreatmodel() {
  const W = canvas.width, H = canvas.height, t = (Date.now() - startTime) / 1000;
  ctx.fillStyle = '#030507'; ctx.fillRect(0, 0, W, H);
  // Three axes as overlapping circles
  const cx = W / 2, cy = H * 0.5, r = Math.min(W, H) * 0.26;
  const centers = [
    { x: cx, y: cy - r * 0.7, label: 'MISUSE', sub: 'humans using AI adversarially', c: '#ff4d6b' },
    { x: cx - r * 0.7, y: cy + r * 0.4, label: 'MISALIGNMENT', sub: 'AI pursuing wrong goals', c: '#ffd080' },
    { x: cx + r * 0.7, y: cy + r * 0.4, label: 'AUTONOMY', sub: 'no meaningful oversight', c: '#5fff8a' },
  ];
  const pulse = (Math.sin(t * 1.2) + 1) / 2;
  centers.forEach(c => {
    ctx.globalAlpha = 0.12 + pulse * 0.05;
    ctx.fillStyle = c.c;
    ctx.beginPath(); ctx.arc(c.x, c.y, r, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;
    ctx.strokeStyle = c.c + '88'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(c.x, c.y, r, 0, Math.PI * 2); ctx.stroke();
    ctx.fillStyle = c.c; ctx.font = 'bold 9px Space Mono,monospace'; ctx.textAlign = 'center';
    ctx.fillText(c.label, c.x, c.y - 14);
    ctx.fillStyle = c.c + '88'; ctx.font = '6px Space Mono,monospace';
    ctx.fillText(c.sub, c.x, c.y);
  });
  // Centre overlap
  ctx.fillStyle = '#ff4d6b'; ctx.font = 'bold 8px Space Mono,monospace'; ctx.textAlign = 'center';
  ctx.globalAlpha = 0.6 + pulse * 0.4;
  ctx.fillText('WORST CASE', cx, cy + r * 0.4 - 4);
  ctx.font = '6px Space Mono,monospace'; ctx.fillStyle = '#ffd080';
  ctx.fillText('all three converge', cx, cy + r * 0.4 + 9);
  ctx.globalAlpha = 1;
  ctx.fillStyle = '#3a5060'; ctx.font = '7px Space Mono,monospace';
  ctx.fillText('frontier red team: characterise & defend against all three', W / 2, H - 10);
}

function vizAgentloop() {
  const W = canvas.width, H = canvas.height, t = (Date.now() - startTime) / 1000;
  ctx.fillStyle = '#030507'; ctx.fillRect(0, 0, W, H);
  const cx = W / 2, cy = H / 2;
  const nodes = [
    { label: 'OBSERVE', sub: 'sensors/tools', c: '#3ecfff', angle: -Math.PI / 2 },
    { label: 'THINK', sub: 'LLM reasoning', c: '#c09fff', angle: 0 },
    { label: 'ACT', sub: 'tool calls', c: '#ff4d6b', angle: Math.PI / 2 },
    { label: 'WORLD', sub: 'real effects', c: '#ffd080', angle: Math.PI },
  ];
  const r = Math.min(W, H) * 0.3;
  const phase = (t * 0.5) % 1;
  const activeIdx = Math.floor(t * 1.5) % nodes.length;

  nodes.forEach((n, i) => {
    n.x = cx + Math.cos(n.angle) * r;
    n.y = cy + Math.sin(n.angle) * r;
    const isActive = i === activeIdx;
    ctx.fillStyle = n.c + (isActive ? '28' : '10');
    ctx.beginPath(); ctx.arc(n.x, n.y, 30, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = n.c + (isActive ? 'ff' : '44'); ctx.lineWidth = isActive ? 2 : 1;
    ctx.beginPath(); ctx.arc(n.x, n.y, 30, 0, Math.PI * 2); ctx.stroke();
    ctx.fillStyle = n.c; ctx.font = 'bold 8px Space Mono,monospace'; ctx.textAlign = 'center';
    ctx.fillText(n.label, n.x, n.y - 2);
    ctx.fillStyle = n.c + '88'; ctx.font = '6px Space Mono,monospace';
    ctx.fillText(n.sub, n.x, n.y + 12);
  });
  // Arrows between nodes
  for (let i = 0; i < nodes.length; i++) {
    const a = nodes[i], b = nodes[(i + 1) % nodes.length];
    const dx = b.x - a.x, dy = b.y - a.y;
    const len = Math.hypot(dx, dy);
    const ux = dx / len, uy = dy / len;
    const sx = a.x + ux * 30, sy = a.y + uy * 30;
    const ex = b.x - ux * 30, ey = b.y - uy * 30;
    const active = i === activeIdx;
    ctx.strokeStyle = active ? a.c : a.c + '33'; ctx.lineWidth = active ? 2 : 1;
    ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(ex, ey); ctx.stroke();
    // Travelling dot
    if (active) {
      const frac = (t * 1.5) % 1;
      const dpx = lerp(sx, ex, frac), dpy = lerp(sy, ey, frac);
      ctx.fillStyle = a.c; ctx.shadowBlur = 8; ctx.shadowColor = a.c;
      ctx.beginPath(); ctx.arc(dpx, dpy, 4, 0, Math.PI * 2); ctx.fill();
      ctx.shadowBlur = 0;
    }
  }
  ctx.fillStyle = '#3a5060'; ctx.font = '7px Space Mono,monospace'; ctx.textAlign = 'center';
  ctx.fillText('the loop runs until task complete or external stop', W / 2, H - 10);
}

function vizSelfimproving() {
  const W = canvas.width, H = canvas.height, t = (Date.now() - startTime) / 1000;
  ctx.fillStyle = '#030507'; ctx.fillRect(0, 0, W, H);
  // Spiral of model versions getting stronger
  const cx = W * 0.5, cy = H * 0.5;
  const nVersions = 6;
  const maxR = Math.min(W, H) * 0.38;
  const phase = (t * 0.4) % 1;

  for (let i = 0; i < nVersions; i++) {
    const progress = i / (nVersions - 1);
    const r = maxR * (0.2 + progress * 0.8);
    const angle = progress * Math.PI * 3 - Math.PI / 2;
    const x = cx + Math.cos(angle) * r;
    const y = cy + Math.sin(angle) * r;
    const col = i === nVersions - 1 ? '#ff4d6b' : `hsl(${160 + progress * 60}, 80%, 60%)`;
    ctx.fillStyle = col + '20'; ctx.strokeStyle = col + '88'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(x, y, 10 + progress * 12, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
    ctx.fillStyle = col; ctx.font = 'bold 7px Space Mono,monospace'; ctx.textAlign = 'center';
    ctx.fillText('v' + (i + 1), x, y + 3);
    // Arrow to next
    if (i < nVersions - 1) {
      const np = (i + 1) / (nVersions - 1);
      const nr = maxR * (0.2 + np * 0.8);
      const na = np * Math.PI * 3 - Math.PI / 2;
      const nx = cx + Math.cos(na) * nr, ny = cy + Math.sin(na) * nr;
      const isActive = Math.floor(t * 0.4 * nVersions) % nVersions === i;
      ctx.strokeStyle = col + (isActive ? 'aa' : '33'); ctx.lineWidth = isActive ? 2 : 1;
      ctx.setLineDash([3, 4]);
      ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(nx, ny); ctx.stroke();
      ctx.setLineDash([]);
    }
  }
  ctx.fillStyle = '#ff4d6b'; ctx.font = 'bold 8px Space Mono,monospace'; ctx.textAlign = 'center';
  ctx.fillText('KEY QUESTION: are safety properties', W / 2, H - 22);
  ctx.fillStyle = '#ff4d6b88'; ctx.font = '7px Space Mono,monospace';
  ctx.fillText('preserved across self-improvement cycles?', W / 2, H - 8);
}

  ctx.beginPath(); ctx.moveTo(lx + 18, steps[0].y); ctx.lineTo(lx + 18, steps[steps.length-1].y); ctx.stroke();
  steps.forEach((s, i) => {
    const active = i === phase, done = i < phase;
    // Node circle
    ctx.fillStyle = done ? s.c + '33' : active ? s.c + '28' : '#0b0e18';
    ctx.strokeStyle = done ? s.c + '88' : active ? s.c : '#1e2e3e'; ctx.lineWidth = active ? 2.5 : 1.5;
    ctx.beginPath(); ctx.arc(lx + 18, s.y, 10, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
    if (active) {
      ctx.fillStyle = s.c; ctx.shadowBlur = 10; ctx.shadowColor = s.c;
      ctx.beginPath(); ctx.arc(lx + 18, s.y, 5, 0, Math.PI * 2); ctx.fill(); ctx.shadowBlur = 0;
    } else if (done) {
      ctx.fillStyle = s.c; ctx.font = 'bold 8px Space Mono,monospace'; ctx.textAlign = 'center';
      ctx.fillText('✓', lx + 18, s.y + 3);
    }
    // Label
    ctx.fillStyle = active ? s.c : done ? s.c + '99' : '#3a5060';
    ctx.font = (active ? 'bold ' : '') + '8px Space Mono,monospace'; ctx.textAlign = 'left';
    ctx.fillText(s.label, lx + 36, s.y - 2);
    ctx.fillStyle = active ? s.c + 'cc' : '#2a3a4a'; ctx.font = '7px Space Mono,monospace';
    ctx.fillText(s.sub, lx + 36, s.y + 11);
    // Bar
    const barX = W * 0.46, barW = W * 0.44;
    const fill = done ? barW : active ? barW * ((Math.sin(t * 2) * 0.1 + 0.5)) : 0;
    ctx.fillStyle = s.c + '12'; ctx.fillRect(barX, s.y - 9, barW, 18);
    ctx.fillStyle = s.c + (active ? '44' : '28'); ctx.fillRect(barX, s.y - 9, fill, 18);
    ctx.strokeStyle = s.c + (active ? '55' : '22'); ctx.lineWidth = 1;
    ctx.strokeRect(barX, s.y - 9, barW, 18);
  });
  ctx.fillStyle = '#5fff8a88'; ctx.font = '7px Space Mono,monospace'; ctx.textAlign = 'center';
  ctx.fillText('the constraint is not the hardware — it is starting', W / 2, H - 8);
}


const VIZ_FNS = {
  threatmodel: vizThreatmodel,
  agentloop: vizAgentloop,
  evaltaxonomy: vizEvaltaxonomy,
  modelorganism: vizModelorganism,
  adversarialgame: vizAdversarialgame,
  cyberphysical: vizCyberphysical,
  defensiveagent: vizDefensiveagent,
  selfimproving: vizSelfimproving,
  adversarialrl: vizAdversarialrl,
  oversight: vizOversight,
  jailbreaks: vizJailbreaks,
  multiagent: vizMultiagent,
  interpretability: vizInterpretability,
  harddomains: vizHarddomains,
  policy: vizPolicy,
  nextsteps: vizNextsteps,
};

function startViz(key) {
  if (animId) cancelAnimationFrame(animId);
  const fn = VIZ_FNS[key];
  if (!fn) return;
  function loop() {
    resizeCanvas();
    fn();
    animId = requestAnimationFrame(loop);
  }
  loop();
}

// ─── HERO CANVAS ──────────────────────────────────────────────────────────────
(function heroInit() {
  const hc = document.getElementById('hero');
  const hctx = hc.getContext('2d');
  const pts = Array.from({ length: 22 }, () => ({
    x: Math.random() * 800, y: Math.random() * 120,
    vx: (Math.random() - 0.5) * 0.4, vy: (Math.random() - 0.5) * 0.3,
  }));
  function heroFrame() {
    hc.width = hc.parentElement.offsetWidth;
    hc.height = hc.parentElement.offsetHeight;
    const W = hc.width, H = hc.height;
    hctx.clearRect(0, 0, W, H);
    pts.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      if (p.x < 0 || p.x > W) p.vx *= -1;
      if (p.y < 0 || p.y > H) p.vy *= -1;
    });
    pts.forEach((a, i) => pts.forEach((b, j) => {
      if (j <= i) return;
      const d = Math.hypot(a.x - b.x, a.y - b.y);
      if (d < 100) {
        hctx.strokeStyle = `rgba(255,77,107,${(1 - d / 100) * 0.25})`;
        hctx.lineWidth = 1;
        hctx.beginPath(); hctx.moveTo(a.x, a.y); hctx.lineTo(b.x, b.y); hctx.stroke();
      }
    }));
    pts.forEach(p => {
      hctx.fillStyle = 'rgba(255,77,107,0.5)';
      hctx.beginPath(); hctx.arc(p.x, p.y, 1.5, 0, Math.PI * 2); hctx.fill();
    });
    requestAnimationFrame(heroFrame);
  }
  heroFrame();
})();
