<div class="vocab"><span class="vt">"Pre-Fracture"</span> — Generating all fragment geometry at load time (or better, at author time in Blender), not at impact time. The player sees "instant" shattering because the work is already done — fragments exist as hidden child nodes inside the intact mesh. Pre-fracture is the difference between a game that ships and a tech demo. Every shipped destructible object in every AAA game is pre-fractured. Control, Red Faction Guerrilla's sequel, Teardown — all pre-fracture. The runtime fracture in the original Red Faction is the exception that required GeoMod, a custom voxel engine.</div>
<div class="vocab"><span class="vt">"Fragment Pooling"</span> — A performance pattern that pre-allocates a fixed set of objects and reuses them instead of creating/destroying dynamically. For fragments: pre-instantiate 200 RigidBody3D nodes at startup, set them inactive. On fracture, pull N fragments from the pool, configure their mesh transform and impulse, activate. After 3 seconds, deactivate and return to pool. The pool size caps your maximum simultaneous active fragments. When full, oldest fragments get reclaimed. Same pattern as bullet pooling, particle pooling — any high-frequency spawning.</div>
<div class="perf">200 simultaneously active fragment RigidBodies is approximately the limit before physics frame time climbs noticeably. Each fragment is a full physics body with a collision shape and contact resolution. A single 12-fragment object breaking is cheap. Seven objects breaking simultaneously in a chain reaction is 84 fragments entering simulation at once. Profile your stress case: 10 objects fracturing in cascade, all fragments active. Reduce fragment_count from 12 to 8 if needed. Reduce pool size if memory is tight. Tune empirically.</div>
<div class="tip">Generate your Voronoi seeds with a seeded RNG: <code>var rng = RandomNumberGenerator.new(); rng.seed = fracture_seed</code>. Export <code>fracture_seed</code> as an <code>@export var</code>. This means every copy of this object produces identical fragments from the same seed — which is exactly what you need for networking (all clients see identical fragment shapes from the same seed) and for debugging (reproducible destruction patterns).</div>
<div class="artists">Red Faction: Guerrilla (GeoMod 2.0 — actual runtime voxel destruction, still impressive 16 years later and required a custom engine), Control (pre-fractured office destruction — the gold standard for visually seamless pre-fracture), Teardown (voxel-based destruction, different approach — each voxel is a destructible unit), Unreal Engine Chaos Destruction docs (detailed breakdown of their pre-fracture workflow, applicable to Godot)</div>
<div class="spamton">Runtime Voronoi fracture looks extraordinary in a GDC demo with one box. It collapses in production with 30 objects, a particle system, and any actual gameplay happening. <strong>Pre-fracture in Blender. Hide the pieces inside the mesh. Swap on impact. The geometry was always there. The illusion is just choosing the right moment to reveal it. That's all shipping physics is: choosing when to reveal things that already exist.</strong></div>
<div class="challenge">Pre-fracture a wall of 12 boxes using Blender's Cell Fracture addon (or manually create 8 child RigidBody3D pieces per box). In Godot, set all fragments to <code>freeze = true</code> on ready. When a raycast hits a box, trigger its fracture: hide parent, freeze=false on fragments, apply impulse from hit point proportional to 1/distance. Add a chain reaction: any fragment that hits an adjacent intact box triggers that box's fracture too — use an Area3D or contact callback on fragments. Cap at 200 total active fragments with a simple pool. Test: punch the leftmost box in a line, watch the chain propagate. This is Control's destruction system.</div>
<div class="net-note">Destruction events are synced. Fragment positions are not. The pattern: server determines "object at node path X fractured at hit position P with seed S at tick T" — broadcasts as a reliable RPC with those parameters. All clients run identical Voronoi decomposition from seed S (use a seeded RNG), apply the same impulse formula, get identical initial velocities. Fragments diverge over time due to floating-point differences — this is fine because debris is cosmetic. The fracture event itself (removing a collision body from the world) IS gameplay state and must be in the rollback snapshot.</div>`
},
{
  title: "L10 — Plane Slicing & Dismemberment",
  subtitle: "Sutherland-Hodgman clipping · cut face capping · limb graphs · blade mode",
  vizLabel: "VIZ: SLICE & DISMEMBER",
  viz: "slice",
  snippet: `<span class="cm"># Sutherland-Hodgman. 1974. runs in microseconds. powers Metal Gear Rising.</span>
<span class="cm"># works on convex polygons only — pre-decompose your meshes.</span>

<span class="kw">func</span> <span class="fn">clip_polygon</span>(poly: PackedVector2Array,
                    plane_pt: Vector2,
                    plane_nrm: Vector2) -> Array:
    <span class="kw">var</span> front := PackedVector2Array()
    <span class="kw">var</span> back  := PackedVector2Array()
    <span class="kw">for</span> i <span class="kw">in</span> poly.size():
        <span class="kw">var</span> a := poly[i]
        <span class="kw">var</span> b := poly[(i + <span class="nm">1</span>) % poly.size()]
        <span class="kw">var</span> da := plane_nrm.<span class="fn">dot</span>(a - plane_pt)
        <span class="kw">var</span> db := plane_nrm.<span class="fn">dot</span>(b - plane_pt)
        <span class="kw">if</span> da >= <span class="nm">0</span>: front.<span class="fn">append</span>(a)
        <span class="kw">else</span>:        back.<span class="fn">append</span>(a)
        <span class="kw">if</span> (da > <span class="nm">0</span>) != (db > <span class="nm">0</span>):          <span class="cm"># edge straddles the plane</span>
            <span class="kw">var</span> t := da / (da - db)
            <span class="kw">var</span> ix := a.<span class="fn">lerp</span>(b, t)         <span class="cm"># intersection point</span>
            front.<span class="fn">append</span>(ix);  back.<span class="fn">append</span>(ix)
    <span class="kw">return</span> [front, back]

<span class="cm"># blade mode: Engine.time_scale = 0.2 while holding the input.</span>
<span class="cm"># the orange glow on cut faces is a different material on the cap polygon.</span>
<span class="cm"># those are the two secrets. that is MGR.</span>
<span class="kw">func</span> <span class="fn">blade_mode</span>(active: <span class="kw">bool</span>) -> <span class="kw">void</span>:
    Engine.time_scale = <span class="nm">0.2</span> <span class="kw">if</span> active <span class="kw">else</span> <span class="nm">1.0</span>

<span class="cm"># dismemberment graph: each joint has health.</span>
<span class="cm"># at zero, sever the subtree as an independent RigidBody.</span>
<span class="kw">func</span> <span class="fn">damage_joint</span>(joint_id: String, amount: <span class="kw">float</span>) -> <span class="kw">void</span>:
    limb_health[joint_id] -= amount
    <span class="kw">if</span> limb_health[joint_id] <= <span class="nm">0</span>:
        <span class="fn">_sever</span>(joint_id)  <span class="cm"># detach subtree, apply impulse, spawn gibs</span>`,
  body: `<p>The algorithm that makes Metal Gear Rising: Revengeance possible — slicing anything at any angle and having the pieces fall apart with physics — was published in a 1974 computer graphics paper by Ivan Sutherland and Gary Hodgman. It's been in textbooks for fifty years. Runs in microseconds. Powered the most technically impressive sword game ever made. Sometimes old algorithms applied with confidence and good art direction are all you need.</p>
<div class="step-card"><span class="step-num">SUTHERLAND-HODGMAN CLIPPING</span>Input: a convex polygon and a clipping plane. For each edge of the polygon: if both vertices are in front of the plane, output the starting vertex. If both are behind, output nothing. If they straddle the plane, compute the intersection point — both half-polygons get it as an endpoint. Walk all edges. Result: two new polygons, one on each side of the plane. Then cap the exposed interior: generate a new polygon along the cut line for each half, assign a glowing cut-face material. In Godot 3D: apply this to a convex-decomposed mesh (use Mesh → Create Convex Decomposition in the Godot editor). The algorithm works on 3D polygons too — same math, just using 3D plane equations.</div>
<div class="step-card"><span class="step-num">LIMB GRAPH DISMEMBERMENT</span>Model the character as a directed graph: each node is a body segment, each edge is a severable connection with a health value. Parent → child relationships: <code>torso → upper_arm → lower_arm → hand</code>. Damage a connection by reducing its health. At zero: sever. The child node and everything below it detach from the animation skeleton and become an independent <code>RigidBody3D</code> — copy the current bone transform to it, call <code>physical_bones_start_simulation()</code> on the subtree, apply an outward impulse at the sever point. Spawn gibs and a particle burst at the separation point. Cast a downward ray from the burst to place a blood decal. L4D2's entire gore model is this graph, tracked server-side, displayed client-side.</div>
<div class="vocab"><span class="vt">"Sutherland-Hodgman Clipping"</span> — A 1974 polygon clipping algorithm. For each edge of the input polygon, classify both endpoints as inside or outside the clipping plane. Emit the appropriate vertices and intersection points to build two output polygons. O(n) where n is vertex count. In practice, convex-decomposed game meshes have 8–20 vertices per convex piece, making each cut nearly instant. The algorithm only works on convex polygons — which is why MGR uses convex decomposition on all sliceable objects.</div>
<div class="vocab"><span class="vt">"Limb Graph"</span> — A data structure representing a character's body as a graph of severable connections. Each connection stores: parent segment, child segment, current health, max health, sever threshold. Damage propagates to the health value. At zero health, the connection is severed: the child subtree detaches and becomes independent physics objects. This is how Left 4 Dead 2, Dead Space, MGR, and Mortal Kombat all handle dismemberment — the skeleton is a graph, damage is a value on each edge.</div>
<div class="vocab"><span class="vt">"Cut Face Capping"</span> — After clipping a mesh with a plane, the interior is exposed — the mesh is hollow along the cut line. Generate a new polygon that fills this opening for each half. Use a distinct material on the cap: an orange emissive gradient for "freshly cut metal" (MGR), a red texture for "biological" (Dead Space). The cap polygon vertices are exactly the intersection points computed during Sutherland-Hodgman. Without capping, players see inside the mesh. With capping, they see a glowing wound edge. The difference is one extra polygon and a material assignment.</div>
<div class="tip">Blade Mode in MGR is just <code>Engine.time_scale = 0.2</code> while the slash input is held, plus a blade trail effect and the orange cut-cap material on fresh slices. <code>Engine.time_scale</code> affects everything: physics, animation, particles, timers. Set it to 0.2 on right-click hold. Release: set back to 1.0. Add a blade guide line (thin line from player to cursor during slow-motion). Add a brief camera shake on release. That's the MGR experience in about 15 lines of GDScript.</div>
<div class="perf">Sutherland-Hodgman at runtime only works for convex meshes with low vertex counts. Pre-decompose all sliceable objects into convex pieces (Godot editor: select mesh → Mesh menu → Create Convex Decomposition). At runtime, slice each convex piece independently. Cap each new piece. A sword swing that hits a 5-piece convex decomposition performs 5 clipping operations — each O(n) with n ≈ 8–16 vertices. That's fast. Hitting a non-convex mesh with thousands of vertices is not. Convex decomposition is the prerequisite, not an optimization.</div>
<div class="artists">Metal Gear Rising: Revengeance (the definitive real-time slicing game — all sliceable objects are convex-decomposed, Blade Mode is literally time_scale), Fruit Ninja (2D Sutherland-Hodgman with parabolic debris physics), Left 4 Dead 2 (limb damage graph — server tracks health per connection, clients handle visual gore), Dead Space (strategic dismemberment as core mechanic — the limb graph IS the gameplay), Mortal Kombat 11 (rendering-level dismemberment with pre-authored wound geometry)</div>
<div class="spamton">Metal Gear Rising lets you cut anything at any angle and the pieces fall apart with real physics. The algorithm is from 1974. Published two years after the Apollo moon landings. <strong>Sutherland-Hodgman. Fifty years old. Runs in microseconds. Looks incredible with an orange emissive cap material and a screen-space motion blur. The most impressive tech in your game can be the oldest. Apply confidence. Apply art direction. Ship it.</strong></div>
<div class="challenge">Build MGR-lite: 6 convex shapes floating in the scene, tossed upward by impulses every few seconds. Hold right mouse → <code>Engine.time_scale = 0.2</code> + thin guide line following cursor. Drag to draw a slash line. Release: cast the cut plane through all objects intersecting the line. Each hit object runs Sutherland-Hodgman, becomes two new <code>RigidBody3D</code>s with capped faces (orange emissive material on the cut surface), each new piece is also sliceable. Release right mouse → time_scale = 1.0. Add a dismemberment dummy: 6-segment limb graph, hitscan weapon reduces health per segment, at zero sever with particle burst and downward-raycast decal.</div>
<div class="net-note">Slicing is a hybrid: the event is gameplay (it changes collision geometry, affects who can move where) but fragments are cosmetic (nobody cares if gibs diverge between clients). Server determines "mesh at ID X cut along plane (normal, distance) at tick T" — reliable RPC with those parameters. Clients apply identical Sutherland-Hodgman from the same plane parameters, get identical half-meshes. Fragment positions diverge: fine, cosmetic. Dismemberment: server determines sever events from limb health (gameplay state). Clients display gore locally (cosmetic). For rollback: sever events are world state — include in snapshot. Gibs excluded.</div>`
},
{
  title: "L11 — Explosions, Fire & Area Damage",
  subtitle: "inverse-square falloff · line-of-sight damage · fire spread · screen shake",
  vizLabel: "VIZ: EXPLOSION & FIRE",
  viz: "explosions",
  snippet: `<span class="cm"># every explosion is the same 15 lines.</span>
<span class="cm"># the thing that makes yours feel good is the screen shake. not the particles.</span>

<span class="kw">func</span> <span class="fn">explode</span>(epicenter: Vector3, radius: <span class="kw">float</span>, force: <span class="kw">float</span>) -> <span class="kw">void</span>:
    <span class="kw">var</span> space  := <span class="fn">get_world_3d</span>().direct_space_state
    <span class="kw">var</span> sphere := SphereShape3D.<span class="kw">new</span>(); sphere.radius = radius
    <span class="kw">var</span> q      := PhysicsShapeQueryParameters3D.<span class="kw">new</span>()
    q.shape = sphere;  q.transform.origin = epicenter
    <span class="kw">for</span> hit <span class="kw">in</span> space.<span class="fn">intersect_shape</span>(q, <span class="nm">32</span>):
        <span class="kw">var</span> body := hit[<span class="st">"collider"</span>]
        <span class="kw">var</span> dir  := body.global_position - epicenter
        <span class="kw">var</span> dist := <span class="fn">max</span>(dir.<span class="fn">length</span>(), <span class="nm">0.1</span>)
        <span class="cm"># line-of-sight: skip bodies behind cover</span>
        <span class="kw">var</span> los  := PhysicsRayQueryParameters3D.<span class="fn">create</span>(epicenter, body.global_position)
        los.exclude = [body.<span class="fn">get_rid</span>()]
        <span class="kw">if</span> <span class="kw">not</span> space.<span class="fn">intersect_ray</span>(los).<span class="fn">is_empty</span>(): <span class="kw">continue</span>
        <span class="cm"># inverse-square falloff: close = obliterated, edge = nudged</span>
        <span class="kw">if</span> body <span class="kw">is</span> RigidBody3D:
            body.<span class="fn">apply_central_impulse</span>(dir.<span class="fn">normalized</span>() * force / (dist * dist))

<span class="cm"># screen shake: 2 frames intense, exponential decay to zero.</span>
<span class="cm"># THIS is why combat feels good. not the particles. the shake.</span>
<span class="kw">func</span> <span class="fn">screen_shake</span>(intensity: <span class="kw">float</span>) -> <span class="kw">void</span>:
    <span class="kw">var</span> t := <span class="nm">0.0</span>
    <span class="kw">while</span> t < <span class="nm">0.28</span>:
        camera.offset = Vector3(<span class="fn">randf_range</span>(-<span class="nm">1</span>,<span class="nm">1</span>),<span class="fn">randf_range</span>(-<span class="nm">1</span>,<span class="nm">1</span>),<span class="nm">0</span>) * intensity * <span class="fn">exp</span>(-t*<span class="nm">14</span>)
        t += <span class="fn">get_physics_process_delta_time</span>()
        <span class="kw">await</span> <span class="fn">get_tree</span>().<span class="fn">process_frame</span>
    camera.offset = Vector3.ZERO`,
  body: `<p>Every explosion in every game — DOOM, Call of Duty, Dark Souls, Breath of the Wild — is the same 15 lines. Sphere overlap query at epicenter. For each body in the sphere: check line of sight. If clear, apply impulse proportional to <code>1 / distance²</code>. Apply screen shake with exponential decay. That's it. The reason some explosions feel incredible and others feel flat has nothing to do with the blast radius or the damage values. It's the screen shake. It's always the screen shake.</p>
<div class="step-card"><span class="step-num">EXPLOSION PIPELINE (COMPLETE)</span>1. <code>PhysicsShapeQueryParameters3D</code> with a <code>SphereShape3D</code> at the epicenter. Call <code>direct_space_state.intersect_shape(query, 32)</code> — get up to 32 bodies. 2. For each body, raycast from epicenter to body position. If the ray hits anything before reaching the body: skip (it's in cover). 3. Compute <code>var dir = (body.pos - epicenter).normalized()</code>, <code>var dist = max(distance, 0.1)</code>. Call <code>body.apply_central_impulse(dir * base_force / (dist * dist))</code>. 4. Reduce body health by <code>base_damage / (dist * dist)</code>. 5. Screen shake: set camera offset to random vector × intensity, decay by 0.82 each frame until < 0.5px. Done.</div>
<div class="step-card"><span class="step-num">FIRE SPREAD SYSTEM</span>Burning objects have a fire <code>Area3D</code> child that's active while burning. Flammable bodies inside the area accumulate a burn exposure timer. At threshold (2 seconds): the body ignites, activates its own fire Area3D, propagates to neighbors. This creates organic chain reactions — fire spreads faster through dense groups and slower through sparse areas, because more bodies are simultaneously in range. Cap simultaneous fire sources at 20 (check count before spawning, reclaim the oldest if at cap). Each fire has a lifetime timer — burns out after 5-8 seconds unless sustained by neighboring fires.</div>
<div class="vocab"><span class="vt">"Inverse Square Falloff"</span> — Force (and damage) decreasing with the square of distance from epicenter. <code>force = base_force / (distance * distance)</code>. A body at 1 meter gets full force. At 2 meters it gets 1/4. At 5 meters, 1/25. Physically accurate for blast waves. Clamp minimum distance to avoid division-by-zero: <code>max(distance, 0.1)</code>. Use the same formula for damage — bodies at the edge of a blast radius take negligible damage, bodies at the center get obliterated. One formula for both force and damage: consistent behavior, easy to tune.</div>
<div class="vocab"><span class="vt">"Line-of-Sight Damage"</span> — A raycast from the explosion epicenter to each potential target before applying damage. If the ray hits a wall or other obstacle before reaching the target, the target is in cover — skip it. This single raycast check converts a dumb sphere-of-damage into a tactical system where positioning matters. Rainbow Six Siege's entire breach meta — "can I shoot through this wall, which direction is the explosion" — comes from this check. Zero additional complexity, massive tactical depth.</div>
<div class="vocab"><span class="vt">"Screen Shake via Camera Offset"</span> — Set <code>camera.offset</code> to a random vector scaled by shake intensity. Each <code>_process</code> tick: <code>shake_offset *= 0.82; camera.offset = shake_offset</code>. Two frames of peak intensity, then exponential decay to zero. The exponential decay is what makes it feel like impact rather than random jitter. For explosions: intensity proportional to <code>base_force / max(player_distance, 1)</code>. For nearby explosions: intense, brief. For far explosions: subtle. Cap maximum intensity. Never let it run longer than 0.5 seconds.</div>
<div class="perf">Sphere overlap queries with <code>intersect_shape</code> are cheap for single explosions. Fire spread with 20 simultaneous <code>Area3D</code> nodes each firing <code>body_entered</code> signals is not. Replace fire spread detection with a manual timer check: each burning object runs a tick counter in <code>_physics_process</code>, does a single <code>intersect_shape</code> query once per second to find nearby flammable objects, and applies burn exposure manually. This eliminates 20 Area3D signal handlers and replaces them with 20 cheap periodic queries. Profile both approaches and keep the faster one.</div>
<div class="tip">Add <code>@export var base_force: float = 800</code>, <code>@export var base_damage: float = 100</code>, <code>@export var blast_radius: float = 6.0</code>, <code>@export var shake_intensity: float = 8.0</code> to your explosion component. Hand it to a designer. Watch them spend 30 minutes making the perfect grenade without touching code. This workflow — physics systems as components with exported parameters — is how AAA studios ship tunable combat in large teams. The programmer writes the system once. Designers tune it forever.</div>
<div class="artists">Rainbow Six Siege (explosion + LOS cover system — the gold standard for tactical explosion design), Breath of the Wild (fire spread chain reactions with wind propagation — organically spreading through the environment), Call of Duty: Modern Warfare 2019 (screen shake mastery — find a breakdown video, copy the decay curve exactly), GDC 2015: "The Art of Screen Shake" by Vlambeer (Jan Willem Nijman demonstrates every screen shake technique in 30 minutes; watch it once)</div>
<div class="spamton">Every explosion is the same fifteen lines. What separates a good one from a forgettable one is not the particle system. <strong>It is two frames of intense shake followed by exponential decay to zero. Your playtesters will say the combat feels incredible and point at the fire effect. It is not the fire. It is never the fire. Screen shake. Add it to everything that impacts.</strong></div>
<div class="challenge">Build the complete system. Click to explode: sphere overlap query, inverse-square impulse, LOS raycast check. Add screen shake with exponential decay. Then fire: explosions leave a burning Area3D zone for 6 seconds. Flammable boxes ignite after 2 seconds in a fire zone. Place 12 boxes in an L-shape. Explode at the corner. Watch fire propagate around the L. Some boxes should be shielded by cover (no LOS from blast) and ignite only from fire spread, not the explosion. This combination — explosion + fire spread + cover system — is the complete Breath of the Wild hazard model. Wire screen shake to player distance from epicenter.</div>
<div class="net-note">Explosions are events. Server determines "explosion at position P with force F and radius R at tick T" — reliable RPC with those parameters. Clients run sphere query and LOS raycasts locally against their own physics state. Fire spread is trickier: the server tracks which objects are burning and their burn timers (gameplay state — affects health). Clients display fire particles locally (cosmetic). For rollback: explosion events and per-object burn timers are in the snapshot. Particles, screen shake, and visual fire are not. Getting this split wrong is the number one source of rollback desyncs.</div>`
},

  snippet: `<span class="cm"># Rainbow Six Siege's tactical meta is one Dictionary.</span>
<span class="cm"># one float per material. the meta is the data, not the code.</span>

<span class="kw">extends</span> Node3D

<span class="kw">const</span> MATERIALS := {
    <span class="st">"wood"</span>:     { <span class="st">"pen"</span>: <span class="nm">0.20</span>, <span class="st">"ric_max"</span>: <span class="nm">0.00</span> },  <span class="cm"># passes through</span>
    <span class="st">"drywall"</span>:  { <span class="st">"pen"</span>: <span class="nm">0.40</span>, <span class="st">"ric_max"</span>: <span class="nm">0.00</span> },  <span class="cm"># wallbang material</span>
    <span class="st">"concrete"</span>: { <span class="st">"pen"</span>: <span class="nm">0.02</span>, <span class="st">"ric_max"</span>: <span class="nm">0.30</span> },  <span class="cm"># embeds at steep, ricochets shallow</span>
    <span class="st">"steel"</span>:    { <span class="st">"pen"</span>: <span class="nm">0.01</span>, <span class="st">"ric_max"</span>: <span class="nm">0.42</span> },  <span class="cm"># mostly ricochets</span>
}

<span class="kw">var</span> velocity: Vector3 = Vector3.ZERO
<span class="kw">const</span> GRAVITY: <span class="kw">float</span> = <span class="nm">980.0</span>

<span class="kw">func</span> <span class="fn">_physics_process</span>(delta: <span class="kw">float</span>) -> <span class="kw">void</span>:
    velocity.y -= GRAVITY * delta       <span class="cm"># the parabola. two lines.</span>
    <span class="kw">var</span> col := <span class="fn">move_and_collide</span>(velocity * delta)

<span class="kw">func</span> <span class="fn">on_impact</span>(col: KinematicCollision3D) -> <span class="kw">void</span>:
    <span class="kw">var</span> mat_id: String = col.<span class="fn">get_collider</span>().<span class="fn">get</span>(<span class="st">"surface_material"</span>) or <span class="st">"concrete"</span>
    <span class="kw">var</span> mat    := MATERIALS.get(mat_id, MATERIALS[<span class="st">"concrete"</span>])
    <span class="kw">var</span> normal := col.<span class="fn">get_normal</span>()
    <span class="kw">var</span> angle  := velocity.<span class="fn">normalized</span>().<span class="fn">dot</span>(-normal)  <span class="cm"># 0=grazing 1=head-on</span>
    <span class="kw">if</span> angle < mat[<span class="st">"ric_max"</span>]:
        velocity = velocity.<span class="fn">bounce</span>(normal) * <span class="nm">0.55</span>    <span class="cm"># ricochet</span>
    <span class="kw">elif</span> mat[<span class="st">"pen"</span>] > <span class="nm">0.05</span>:
        velocity *= <span class="nm">0.4</span>                               <span class="cm"># penetrate, slow</span>
    <span class="kw">else</span>:
        <span class="fn">queue_free</span>()                                   <span class="cm"># embed</span>`,
  body: `<p>Rainbow Six Siege's entire competitive meta — every wallbang, every breach strategy, every "can I shoot through that surface" calculation — is stored in a Dictionary. One float per surface: <code>penetration_depth</code>. The difference between a wallbang kill and a blocked shot is a number. The game's tactics emerge from data, not code. That's data-driven design: write the system once, put the values in a table, let the table create emergent depth.</p>
<div class="step-card"><span class="step-num">BALLISTIC TRAJECTORY</span>Unlike hitscan (instant, infinite speed, straight line), ballistic projectiles arc under gravity and take time to arrive. Each <code>_physics_process</code> tick: <code>velocity.y -= gravity * delta; global_position += velocity * delta</code>. That's the parabola. Use <code>move_and_collide()</code> instead of manually updating position — it handles collision detection at the same time, returns a <code>KinematicCollision3D</code> on impact. For fast projectiles (bullets), subdivide the motion: <code>var step = velocity * delta / substeps; for i in substeps: move_and_collide(step)</code>. This prevents thin-wall tunneling for fast objects.</div>
<div class="step-card"><span class="step-num">PENETRATION AND RICOCHET LOGIC</span>On <code>move_and_collide()</code> hit: get the surface material from the collider (use a custom <code>@export var material_type: String</code> on your physics bodies, or a named group). Look up the material in your <code>MATERIALS</code> dictionary. Check the angle: <code>var angle = velocity.normalized().dot(-collision.get_normal())</code>. If <code>angle < mat.ricochet_threshold</code>: reflect — <code>velocity = velocity.bounce(collision.get_normal()) * energy_retention</code>. Else check penetration: cast a secondary ray of length <code>mat.penetration_depth</code> from the hit point in bullet direction. If it exits the other side (ray misses), continue through with <code>velocity *= 0.4</code>. Otherwise, embed or destroy.</div>
<div class="vocab"><span class="vt">"Ballistic Trajectory"</span> — A projectile path curved by gravity over time. <code>velocity.y -= GRAVITY * delta</code> per tick produces a parabolic arc. Longer flight time = more drop = sniper compensation required. Unlike hitscan, ballistic projectiles can be physically dodged (you can outrun a slow-moving grenade). The transition from hitscan to ballistic weapons is a game design decision: hitscan rewards aim, ballistic rewards aim + timing + distance estimation. Many games use both (instant pistols vs arcing grenades).</div>
<div class="vocab"><span class="vt">"Penetration Depth"</span> — How far a projectile travels through a material before stopping (meters). Stored per-material in a data table: drywall = 0.4m, wood = 0.2m, concrete = 0.02m, glass = 0.35m, steel = 0.01m. If the collider thickness (measured by a secondary ray) is less than the penetration depth, the bullet exits the other side with reduced velocity. This is how Rainbow Six Siege implements wall-banging — not a complex simulation, just a float lookup and a secondary raycast. The entire tactical meta emerges from that table.</div>
<div class="vocab"><span class="vt">"Ricochet Angle"</span> — The angle between bullet velocity and the surface normal. Shallow angles ricochet (bullet doesn't have enough perpendicular force to penetrate). Steep angles embed or penetrate. Threshold typically 15–25° from the surface (not from the normal — check which direction your dot product is computing). Reflected velocity: <code>velocity = velocity.bounce(surface_normal) * energy_loss_factor</code>. Godot's <code>Vector3.bounce()</code> does the reflection math: <code>v - 2 * v.dot(n) * n</code>. Apply an energy multiplier of 0.4–0.6 per ricochet.</div>
<div class="perf">Ballistic projectiles need one physics body per projectile, running every tick. For machine guns or shotguns (many simultaneous projectiles), pool them: pre-instantiate 50 projectile nodes, deactivate them, activate on fire. Fast projectiles (bullets) need substep collision detection (multiple short <code>move_and_collide</code> calls per tick) to avoid tunneling through thin surfaces. For slow projectiles (grenades, arrows), single-step is fine. Measure your maximum simultaneous projectile count and pool to that number.</div>
<div class="tip">Store your material data as a <code>const</code> Dictionary in a GDScript autoload. Give physics bodies a <code>@export var surface_material: String = "concrete"</code> that's set in the editor. The penetration system reads <code>MATERIALS[hit_body.surface_material]</code>. Adding a new surface type is: add one line to the dictionary. No code changes elsewhere. A level designer can create a "glass-reinforced concrete" wall by just setting the exported var. The system expands through data, not code changes.</div>
<div class="artists">Rainbow Six Siege (the gold standard for data-driven ballistic penetration — their material table is the entire tactical game), Escape from Tarkov (full ballistic simulation including drag, bullet tumbling, and armor penetration via material tables), Receiver 2 (gun-as-physical-object, every component modeled separately), Sniper Elite 5 (bullet cam in slow motion — reveals the arc, the spin, the penetration — pure visual clarity about what the ballistic system does), Battlefield series (projectile-based netcode vs hitscan — intentional design choice)</div>
<div class="spamton">Rainbow Six Siege's competitive meta is a Dictionary. One float per surface. Penetration depth. That's the whole system. <strong>The difference between a wallbang and a blocked shot — the thing players study for hundreds of hours — is a number in a table that a designer could change in five seconds. The code is thirty lines. The meta is the data. Write the system once. Put the numbers where someone can edit them.</strong></div>
<div class="challenge">Build a shooting range with three material targets (wood, concrete, steel) as labeled boxes with <code>surface_material</code> exported vars. Fire ballistic projectiles (no hitscan — they arc and take time). Implement penetration and ricochet using your material Dictionary. Add trail renderers using <code>GPUParticles3D</code> in trail mode on each projectile. Add a bullet-cam mode: right-click fires in slow motion (<code>Engine.time_scale = 0.25</code>) with camera following the projectile via a <code>SpringArm3D</code>. Add a fourth material (e.g., "glass" with penetration=0.35 and high ricochet angle) entirely via Dictionary — zero code changes required. The material table expands without touching the physics system.</div>
<div class="net-note">Ballistic projectiles are harder to sync than hitscan. Two approaches: server-authoritative (server simulates trajectory, sends position updates every N ticks, clients display an interpolated visual ghost) vs predicted (client spawns local prediction immediately for responsiveness, server runs authoritative simulation, client corrects on divergence). For rollback: projectile state — position, velocity, alive/dead flag — is gameplay state in the snapshot. Trail renderer state is cosmetic, excluded. Penetration/ricochet events are deterministic if all clients use the same material table (static shared data, never synced).</div>`

  viz: "combat",
  snippet: `<span class="cm"># a fighting game is hitbox-hurtbox overlap detection with a state machine.</span>
<span class="cm"># that's it. all the complexity is in the numbers, not the code.</span>

<span class="kw">extends</span> CharacterBody3D
<span class="kw">enum</span> State {IDLE, STARTUP, ACTIVE, RECOVERY, HITSTUN, DODGE, RAGDOLL}

<span class="dc">@export</span> <span class="kw">var</span> startup:  <span class="kw">int</span>   = <span class="nm">5</span>    <span class="cm"># frames before hitbox activates</span>
<span class="dc">@export</span> <span class="kw">var</span> active:   <span class="kw">int</span>   = <span class="nm">4</span>    <span class="cm"># frames hitbox is live</span>
<span class="dc">@export</span> <span class="kw">var</span> recovery: <span class="kw">int</span>   = <span class="nm">8</span>    <span class="cm"># frames vulnerable after attack</span>
<span class="dc">@export</span> <span class="kw">var</span> hitstun:  <span class="kw">int</span>   = <span class="nm">12</span>   <span class="cm"># frames defender is frozen on hit</span>
<span class="dc">@export</span> <span class="kw">var</span> i_frames: <span class="kw">int</span>   = <span class="nm">8</span>    <span class="cm"># Dark Souls dodge: 13i. generous by design.</span>
<span class="kw">const</span>   HITSTOP: <span class="kw">int</span> = <span class="nm">4</span>           <span class="cm"># both fighters freeze on hit — hides 67ms of lag</span>

<span class="kw">var</span> state:      State = State.IDLE
<span class="kw">var</span> state_f:    <span class="kw">int</span>   = <span class="nm">0</span>

<span class="dc">@onready</span> <span class="kw">var</span> hitbox:  Area3D = %Hitbox   <span class="cm"># only enabled during active frames</span>
<span class="dc">@onready</span> <span class="kw">var</span> hurtbox: Area3D = %Hurtbox  <span class="cm"># always on, mask=0 during i-frames</span>

<span class="kw">func</span> <span class="fn">_physics_process</span>(_dt: <span class="kw">float</span>) -> <span class="kw">void</span>:
    state_f += <span class="nm">1</span>
    <span class="kw">match</span> state:
        State.STARTUP:  <span class="kw">if</span> state_f >= startup:  <span class="fn">_to</span>(State.ACTIVE)
        State.ACTIVE:
            hitbox.monitoring = <span class="kw">true</span>
            <span class="kw">if</span> state_f >= active:   <span class="fn">_to</span>(State.RECOVERY)
        State.RECOVERY:
            hitbox.monitoring = <span class="kw">false</span>
            <span class="kw">if</span> state_f >= recovery: <span class="fn">_to</span>(State.IDLE)
        State.HITSTUN:  <span class="kw">if</span> state_f >= hitstun:  <span class="fn">_to</span>(State.IDLE)
        State.DODGE:
            hurtbox.collision_mask = <span class="nm">0</span>   <span class="cm"># the i-frames. collision_mask=0 = unhittable.</span>
            <span class="kw">if</span> state_f >= i_frames: hurtbox.collision_mask = <span class="nm">2</span>; <span class="fn">_to</span>(State.IDLE)

<span class="cm"># active ragdoll PD controller per joint:</span>
<span class="cm"># torque = Kp*(target_angle - current_angle) - Kd*angular_velocity</span>
<span class="cm"># Gang Beasts runs at Kp=8 Kd=3. Rain World at higher values. tune empirically.</span>`,
  body: `<p>A fighting game is a hitbox-hurtbox overlap detector with a state machine attached. That is literally the entire architecture. Street Fighter, Guilty Gear, Smash Bros, your game — all of them are just rectangles overlapping per frame, fed through a state machine that says "is this the right frame to register a hit." The hitbox size, position, and active window define how an attack feels. Everything else — hitstop, knockback, i-frames, ragdoll — is what happens after an overlap is detected.</p>
<div class="step-card"><span class="step-num">HITBOX SYSTEM SETUP</span>Each fighter has two <code>Area3D</code> nodes: a <strong>Hurtbox</strong> (always active, layer=1) and a <strong>Hitbox</strong> (only active during attack frames, layer=2). Set hurtbox mask to detect layer=2 (hitboxes). Hitbox mask detects layer=1 (hurtboxes). In your <code>AnimationPlayer</code>: use Method Call tracks to call <code>enable_hitbox()</code> at the startup frame and <code>disable_hitbox()</code> at the end of active frames. Connect <code>Hurtbox.area_entered</code> → <code>on_hit(area)</code>. On hit: apply knockback impulse to the defender, set their state to <code>HITSTUN</code> with duration from the attack data, and set <code>hitstop = 4</code> on both fighters.</div>
<div class="step-card"><span class="step-num">ACTIVE RAGDOLL PD CONTROLLER</span>Active ragdoll means the ragdoll joints have motors trying to reach target angles from an animation pose. Per joint in <code>_physics_process</code>: <code>var error = target_angle - joint.get_bone_pose_rotation().x; var torque = Kp * error - Kd * joint.angular_velocity.x; joint.apply_torque(joint.transform.basis.x * torque)</code>. Kp = how hard it tries to reach the target (stiffness). Kd = how much it damps oscillation (prevents overshoot). Start with Kp = 50, Kd = 10. High Kp + moderate Kd = fighter stumbles but recovers. Lower both = floppy drunk (Gang Beasts). For "death ragdoll": set Kp = 0 on all joints — they go limp. For "recovery": ramp Kp back up over 30 frames with <code>lerp</code>.</div>
<div class="vocab"><span class="vt">"Hitbox / Hurtbox"</span> — Hitbox = the attack's damaging region. Hurtbox = the character's vulnerable region. When an active hitbox overlaps a hurtbox: hit registered. The hitbox is only active during specific frames (startup: animation playing but no damage; active: hitbox on, damage deals; recovery: animation finishing but hitbox off and character vulnerable). The shape, position, and active duration of the hitbox define the attack's feel. A hitbox that's too small makes attacks feel like they miss. Too large makes them feel cheap. This is the entire art of fighting game design.</div>
<div class="vocab"><span class="vt">"I-Frames (Invincibility Frames)"</span> — Frames where the character's hurtbox is disabled. Dodge rolls, knockdown recovery, wake-up options. Implementation: <code>hurtbox.collision_mask = 0</code> during i-frames. Dark Souls dodge: 13 i-frames at 30fps. Generous by design — the player executed a dodge and deserves the payoff. Too few i-frames = dodge feels useless. Too many = dodge trivializes every attack. The i-frame count is a pure game feel parameter: export it, tune it with playtesters, don't guess.</div>
<div class="vocab"><span class="vt">"Active Ragdoll (PD Controller)"</span> — A physics ragdoll where each joint has a motor (proportional-derivative controller) that tries to match a target pose from an animation. <code>torque = Kp * (target - current) - Kd * angular_velocity</code>. The P term drives toward the target. The D term dampens overshoot. Result: a character that physically fights to maintain a pose, stumbles when hit, and can be pulled off-balance by physics. Gang Beasts, Human Fall Flat, Rain World — all PD controller active ragdoll with different Kp/Kd values creating completely different character personalities.</div>
<div class="tip">Hitstop hides network latency. When a hit lands, both fighters freeze for 4 frames (~67ms at 60Hz). The server confirms the hit during that window. When time unfreezes, the authoritative result is already synchronized. This is why fighting games adopted hitstop long before rollback netcode existed — it was originally just good game feel. The networking benefit is free. Build hitstop into your combat system from the start. Every competitive fighting game relies on it.</div>
<div class="artists">Street Fighter 6 (built-in frame data viewer — enable it in training mode and watch hitboxes in real-time; this is the fastest education in fighting game design you can get), Guilty Gear Strive (GGPO rollback + masterclass hitstop design), Dark Souls (i-frame design as core loop — the dodge is the entire combat system), Gang Beasts (active ragdoll at Kp=8, Kd=3 — low stiffness, low damping — see how that compares to Rain World), Rivals of Aether (indie rollback brawler, open development blog with frame data discussion)</div>
<div class="spamton">Hitstop has been in every fighting game since Street Fighter II. Players call it game feel. It is. It's also 67ms of invisible network correction. <strong>Four frames. Both freeze. Server confirms. Rollback corrects if needed. Players experience IMPACT. The best netcode is the netcode that looks exactly like game design. Build hitstop in from day one. It will save your multiplayer.</strong></div>
<div class="challenge">Build a 2-player local combat test. Two CharacterBody3D fighters with your L02 controller. Each has a Hurtbox Area3D (always on) and a Hitbox Area3D (off by default). Light attack: 5 startup frames, 4 active, 8 recovery, 12 hitstun, knockback = 280. Heavy attack: 12 startup, 8 active, 15 recovery, 20 hitstun, knockback = 420. Dodge: disables hurtbox collision_mask for 8 frames. On hit: both fighters freeze for 4 frames (hitstop), then defender launches. On health reaching zero: transition to ragdoll (copy bone global transforms to PhysicalBone3D, call <code>physical_bones_start_simulation()</code>). After 2 seconds, PD controller activates and the fighter struggles to stand back up. Run two instances. Hit each other. Adjust the numbers until it feels right.</div>
<div class="net-note">The complete per-fighter rollback state: position, velocity, combat_state (enum), state_frames_remaining, hitbox_active (bool), iframes_remaining (int), health (float), hitstop_frames (int). That's 8 values per fighter. Serialize them all. During rollback, the server rewinds both fighters to the corrected tick, replays inputs frame by frame, and checks hitbox/hurtbox overlaps at each replayed tick. If a hit was predicted but shouldn't have happened (or vice versa), the correction occurs during hitstop — 67ms of "everyone is frozen" is the correction window. Design your hitstop duration with rollback correction time in mind.</div>`
},
{
  title: "L14 — The Networked Brawler: Ship the Thing",
  subtitle: "BrawlerState · input authority · rollback · cosmetic/gameplay split · ship it",

<span class="cm"># the architecture that makes rollback possible: one serializable state object.</span>

<span class="kw">class_name</span> BrawlerState
<span class="kw">extends</span> Resource

<span class="cm"># ── GAMEPLAY STATE (rollback snapshot — affects who wins) ─────────────────</span>
<span class="kw">var</span> p1_pos:      Vector3;  <span class="kw">var</span> p1_vel:     Vector3
<span class="kw">var</span> p1_state:    <span class="kw">int</span>;      <span class="kw">var</span> p1_hp:      <span class="kw">float</span>
<span class="kw">var</span> p1_hitstun:  <span class="kw">int</span>;      <span class="kw">var</span> p1_iframes: <span class="kw">int</span>
<span class="kw">var</span> p2_pos:      Vector3;  <span class="kw">var</span> p2_vel:     Vector3
<span class="kw">var</span> p2_state:    <span class="kw">int</span>;      <span class="kw">var</span> p2_hp:      <span class="kw">float</span>
<span class="kw">var</span> fractured:   PackedInt32Array  <span class="cm"># IDs of broken objects</span>
<span class="kw">var</span> burning:     Dictionary        <span class="cm"># {obj_id: burn_timer_frames}</span>
<span class="kw">var</span> tick:        <span class="kw">int</span>

<span class="cm"># ── COSMETIC STATE (local only — never rolled back, never synced) ─────────</span>
<span class="cm"># particles, gib positions, screen shake, jiggle, sound, trail renderers.</span>
<span class="cm"># if it doesn't affect who wins: it's cosmetic. keep it out of this class.</span>

<span class="kw">func</span> <span class="fn">to_dict</span>() -> Dictionary:
    <span class="kw">return</span> {
        <span class="st">"p1"</span>: {<span class="st">"pos"</span>:p1_pos,<span class="st">"vel"</span>:p1_vel,<span class="st">"state"</span>:p1_state,<span class="st">"hp"</span>:p1_hp,<span class="st">"hs"</span>:p1_hitstun,<span class="st">"if"</span>:p1_iframes},

        <span class="st">"frac"</span>: fractured, <span class="st">"burn"</span>: burning, <span class="st">"tick"</span>: tick
    }
<span class="cm"># this one dict = save file, rollback snapshot, replay frame, spectator sync.</span>
<span class="cm"># four features. one function. this is the whole architecture.</span>`,
  body: `<p>You've built every system in this course. The controller with coyote time and input buffering. The save system where to_dict() and from_dict() handle saves, network sync, and rollback snapshots from the same code path. The forces and impulses for knockback. The raycasts for hit detection. The verlet rope bridge. The pre-fractured destructible crates. The fire barrels with chain reaction spread. The combat system with hitboxes, hitstop, and active ragdoll. Now wire them together and ship it.</p>
<div class="step-card"><span class="step-num">BRAWLERSTATE: ONE RESOURCE, EVERYTHING</span>Create a <code>class_name BrawlerState extends Resource</code>. It contains ALL gameplay state: both fighters' positions, velocities, combat states, health, hitstun/iframes/hitstop counters, the array of fractured object IDs, per-burning-object timers, active projectile states, and the current tick number. <code>to_dict()</code> on this resource gives you: save files (JSON to disk), rollback snapshots (Dictionary in memory), replay recording, and spectator mode sync — from the same code. If something affects who wins, it's in BrawlerState. If it's cosmetic (particles, screen shake, gibs), it's not.</div>
<div class="step-card"><span class="step-num">MULTIPLAYER WIRING (FROM THE NETWORKING COURSE)</span>ENet peer setup: server creates the authoritative simulation, each client sends input packets with tick numbers via <code>@rpc("unreliable")</code>. Server sends back confirmed state snapshots via <code>@rpc("reliable")</code>. Input authority: each peer is authoritative over their own input only — they predict their own movement immediately, and correct if the server disagrees. Hit confirmation: client predicts hit locally for instant feedback, server validates against its authoritative state and either confirms or corrects during rollback. See godot-networking-for-lemurs-v2.html for full ENet/RPC/rollback implementation. This lesson provides the physics state that gets plugged into that system.</div>
<div class="vocab"><span class="vt">"Input Authority"</span> — The architecture where each client is the sole authority over their own inputs. Client sends {tick, input_bitmask} to server. Server applies those inputs to its authoritative simulation. Clients predict their own movement locally for instant response. Hits are confirmed by the server ~1 RTT later — hitstop absorbs this delay. Alternative: server authority (server runs movement too, client prediction can diverge wildly) or lockstep (everyone waits for all inputs before simulating any, zero prediction, high latency sensitivity). Input authority is the right choice for a fighting game.</div>
<div class="vocab"><span class="vt">"Cosmetic vs Gameplay State"</span> — The most important architectural decision in a rollback game. Gameplay state: positions, velocities, health, hitbox states, fire timers, fracture events, hitstun counters — anything that determines who wins. Must be deterministic, serializable, and in the rollback snapshot. Cosmetic state: particles, gib positions, debris trails, screen shake, jiggle physics, audio, trail renderers — anything that looks or sounds good but doesn't affect outcomes. Runs locally, diverges freely between clients, never included in snapshots. If you're uncertain which category something belongs to: "does this affect who wins?" If no, it's cosmetic.</div>
<div class="vocab"><span class="vt">"Deterministic Simulation"</span> — Same inputs at the same tick produce identical results on every machine. Required for rollback. The enemies of determinism in Godot: <code>randf()</code> without a seeded RNG (use <code>RandomNumberGenerator</code> with a fixed seed, advance it identically on all machines), any logic in <code>_process</code> instead of <code>_physics_process</code> (frame-rate dependent), floating-point operations whose results differ between CPUs (rare but real — use integer frame counters for all timing-critical state). Jolt is more deterministic than GodotPhysics across platforms. Test cross-platform with a determinism checker: record inputs on one machine, replay on another, compare states at every tick.</div>
<div class="tip">Use Godot's "Run Multiple Instances" (Debug menu → Run Multiple Instances → 2) to test multiplayer locally. Add artificial latency simulation: in your input-send function, add a <code>await get_tree().create_timer(0.08).timeout</code> before sending (80ms simulated latency). If the game looks correct with 80ms simulated latency — no visible desync, hitstop absorbing corrections, destruction synced — it will run correctly on real networks with typical RTTs. Test at 150ms for a hard stress test. If that breaks it, your rollback window (number of stored snapshots) needs to increase.</div>
<div class="artists">Guilty Gear Strive (GGPO rollback netcode at professional fighting game level — the gold standard), Brawlhalla (rollback brawler in production, well-documented architecture in their postmortem), Rivals of Aether (indie rollback success story with public development blog), Nick All-Star Brawl (rollback implementation postmortem — read this specifically, it covers exactly the issues you'll hit), GGPO SDK source code on GitHub (the canonical rollback reference implementation, readable C++)</div>
<div class="spamton">Saves, network sync, rollback snapshots, replay recording. All four call to_dict() on the same BrawlerState. <strong>Four features from one design decision made before anything else was built. The developers who add multiplayer to an existing codebase spend months fighting serialization. The ones who design around it from day one get rollback almost for free. Serialize first. Everything else is consequence.</strong></div>
<div class="challenge">Build the brawler. Two players, one arena, using the CharacterBody3D controller from L02. Arena contains: 8 pre-fractured crates (L09 pattern), 2 fire barrel hazards (L11 chain fire spread), a verlet rope bridge (L07 — 16-point rope between two anchor platforms, players can cut it with a heavy attack). Wire multiplayer: ENet peer setup from the networking course, @rpc input authority, server-authoritative hit resolution using the L13 hitbox system. Implement BrawlerState.to_dict() and restore(). Run two instances with 80ms simulated latency. Punch someone into a crate stack, watch it shatter. Kick a fire barrel, watch the chain reaction. Cut the rope bridge. When the other player sees the same thing at roughly the same time — that's a shipped rollback-compatible networked physics brawler. Everything in this course in one game.</div>
<div class="net-note">The networking layer is covered in full in godot-networking-for-lemurs-v2.html — ENet setup, RPC patterns, input prediction, rollback loop, and deterministic resimulation are all there. This lesson's contribution to the networked game: BrawlerState as the complete serializable game state, the cosmetic/gameplay split that keeps the rollback snapshot small and fast, the deterministic physics patterns (seeded RNG, integer counters, Jolt backend) that make resimulation reliable, and the destruction/fire/combat systems designed from the start to separate "what happened" (gameplay, synced) from "how it looks" (cosmetic, local). The systems were designed to be networked from lesson one. That's why the capstone can ship.</div>`
}

<span class="cm"># ── INVERSE SQUARE LAW ───────────────────────────────────────────</span>

  body: `<p>Every equation in this course is built from the same five or six ideas. You don't need to derive them. You need to recognize them when you see them, know which one solves your current problem, and know what the Godot function for it is called. That's the whole thing.</p>

<div class="step-card"><span class="step-num">VECTORS ARE JUST ARROWS</span>A <code>Vector3(x, y, z)</code> is a point in 3D space, or a direction with a magnitude — context decides which. <strong>Length</strong>: <code>v.length()</code> = √(x²+y²+z²). How long is the arrow. <strong>Normalized</strong>: <code>v.normalized()</code> = same direction, length exactly 1.0. "Which way" without "how far." Add vectors to move: <code>position += velocity * delta</code>. Subtract to get direction between two points: <code>(target - origin).normalized()</code>. Everything in physics uses this exact pattern.</div>

<div class="step-card"><span class="step-num">DOT PRODUCT — IS IT FACING ME?</span><code>a.dot(b)</code> — when both vectors are normalized: returns 1.0 if same direction, 0.0 if perpendicular, -1.0 if opposite. Use it to answer "is this thing in front of me" (dot with forward > 0), "how much is this velocity pointing toward the ground" (velocity.dot(Vector3.DOWN)), "is this surface nearly vertical" (normal.dot(Vector3.UP) > 0.8). The dot product is also used in the reflection formula and the ricochet angle check. You use it more than any other math operation in game physics.</div>

<div class="step-card"><span class="step-num">SIN, COS, ATAN2</span><code>sin(angle)</code> and <code>cos(angle)</code> take an angle in radians and return coordinates on the unit circle. <code>cos(a)</code> = x, <code>sin(a)</code> = y. <strong>Oscillation</strong>: <code>sin(time * speed) * amplitude</code> — makes anything bob, swing, pulse. Used in every idle animation, every ambient wave. <strong>Converting polar to Cartesian</strong>: place N points equally around a circle = <code>Vector2(cos(i/N * TAU), sin(i/N * TAU))</code> — used in Voronoi seed generation, radial UI, explosion debris scatter. <code>atan2(y, x)</code> goes the other way: give it a direction vector, get back the angle. Aim a sprite at the mouse: <code>rotation = atan2(mouse.y - pos.y, mouse.x - pos.x)</code>.</div>

<div class="vocab"><span class="vt">Radians vs Degrees</span> — Godot uses radians everywhere in code. One full circle = TAU (≈6.28) radians = 360°. Half circle = PI (≈3.14) = 180°. To convert: <code>deg_to_rad(180.0)</code> = PI. <code>rad_to_deg(PI)</code> = 180.0. The unit circle: 0 = right, PI/2 = up (in math), PI = left, 3*PI/2 = down. In Godot's 2D (Y-down): 0 = right, PI/2 = DOWN. Know which one you're in.</div>

<div class="vocab"><span class="vt">lerp vs move_toward</span> — Both interpolate toward a target. <code>lerp(a, b, t)</code> takes a ratio (0.0–1.0): at t=0.1 per frame it moves 10% of the remaining distance each frame — smooth but framerate-dependent. <code>lerp(a, b, 1 - exp(-speed * delta))</code> is the framerate-independent version. <code>move_toward(current, target, step)</code> moves by a fixed amount per frame and stops exactly at target — never overshoots. Use lerp for smooth visual following. Use move_toward for physics-accurate acceleration curves.</div>

<div class="vocab"><span class="vt">Exponential Decay</span> — <code>value *= exp(-k * delta)</code> per frame. Starts at whatever value, smoothly approaches zero, never goes negative. The formula for screen shake fadeout, spring damping, velocity friction, sound fade. <code>k</code> controls speed: k=5 takes ~0.6 seconds to reach near-zero, k=15 takes ~0.2 seconds. <code>exp(-k * t)</code> is the curve. This is what "smooth" means in physics — not linear, exponential.</div>

<div class="vocab"><span class="vt">Inverse Square Law</span> — <code>force = base / (distance * distance)</code>. At distance 1: full force. At distance 2: quarter force. At distance 3: ninth force. This is how gravity, light, sound, and explosion blast all work. Objects close to an explosion get obliterated; objects at the edge barely nudge. Clamp minimum distance to prevent division-by-near-zero: <code>max(distance, 0.1)</code>. One formula handles gravity, explosions, and damage falloff.</div>

<div class="step-card"><span class="step-num">KINEMATIC EQUATIONS — EVERY PHYSICS LOOP</span>These four lines are in every game physics system: <br><br><code>velocity += acceleration * delta</code> (force changes velocity)<br><code>position += velocity * delta</code> (velocity changes position)<br><code>velocity *= (1 - friction * delta)</code> (friction slows things down)<br><code>velocity.y -= gravity * delta</code> (gravity is just downward acceleration)<br><br>The order matters: update velocity before position (symplectic Euler — more stable than the reverse). That's it. That's Newtonian mechanics. F=ma, integrated forward one tick at a time.</div>

<div class="step-card"><span class="step-num">REFLECTION & BOUNCE</span>To reflect a velocity vector off a surface: <code>v - 2 * v.dot(normal) * normal</code>. Godot has this as <code>velocity.bounce(normal)</code>. The normal must be normalized (length = 1.0). Multiply by an energy retention factor (0.0–1.0) for damped bouncing. Used for: ricochet bullets, bouncing projectiles, mirror reflections, billiard-ball physics. The dot product of the incoming velocity with the normal gives the perpendicular component; doubling it and subtracting flips that component while keeping the tangential part.</div>

<div class="tip">When you get a dot product back and wonder what it means: it's the cosine of the angle between the two vectors (when both are normalized). <code>acos(v1.dot(v2))</code> gives you the actual angle in radians. But usually you don't need the angle — you just need to know if it's positive (same-ish direction), negative (opposite-ish), or near-zero (perpendicular). Compare the dot directly to a threshold: <code>if facing.dot(to_enemy) > 0.0</code> means "in front of me."</div>

<div class="step-card"><span class="step-num">CLAMP, SIGN, ABS — THE GUARD RAILS</span><code>clamp(value, min, max)</code> — keeps a value in range. Use for terminal velocity, maximum health, capped damage. <code>sign(x)</code> — returns -1, 0, or 1 based on whether x is negative, zero, or positive. Use to find which direction to push overlapping boxes apart. <code>abs(x)</code> — removes the sign, returns magnitude. Use to check if velocity is nearly zero: <code>if abs(velocity.x) < 5.0</code>. These three prevent most physics bugs caused by values escaping to infinity.</div>

<div class="step-card"><span class="step-num">MODULO & WRAPPING</span><code>a % b</code> gives the remainder after dividing a by b. Wraps a value around a range. Frame counter that loops: <code>tick % 60</code> — gives 0–59 and repeats. Angle wrapping: <code>fmod(angle, TAU)</code> keeps angles in 0–TAU. Ring buffer index: <code>(head + 1) % buffer_size</code> — circular array that loops. Used in animation frame selection, rollback snapshot buffers, music pattern loops. The modulo operator is how you make anything cyclical.</div>

<div class="artists">3Blue1Brown: "Essence of Linear Algebra" YouTube series (vectors, dot product, cross product — visual, no prerequisites), Khan Academy: Trigonometry (sin, cos, atan2 from first principles), Freya Holmér: "Math for Game Devs" YouTube series (the best game-specific math resource that exists, directly applicable), GDC: "Math for Game Programmers" talks (Simon Schreiber, Squirrel Eiserloh)</div>

<div class="spamton">You have been using sin() and cos() since you first animated anything. You have been using lerp since you first smoothed a camera. You have been using dot products since you first checked if an enemy was in front of you. <strong>The math was already there. The equations in this appendix are the names for things you already do. The physics systems in this course are the same operations chained together with intent. None of it was ever hidden. It was just never labeled.</strong></div>

<div class="challenge">Open the interactive visualization. It shows a unit circle, a dot product angle detector, a lerp slider, and exponential decay. Try to identify which equation each viz in this course was secretly using. The verlet integrator is <code>pos += (pos - prev) + accel*dt²</code> — that is <code>pos += velocity + acceleration</code> in disguise. The spring is <code>force = -stiffness * displacement</code> — Hooke's Law, F=-kx. The explosion falloff is the inverse square law. Every system reduces to the same five operations. Once you see it, you can't unsee it.</div>

<div class="net-note">Physics determinism is a math problem at its core. Floating-point arithmetic is not associative: <code>(a + b) + c</code> ≠ <code>a + (b + c)</code> on different CPUs. For rollback to work, every client must produce bit-identical results. The practical solution: use integer frame counters for all timing-critical state (they're exact), avoid <code>randf()</code> without a seeded RNG (seed it at match start, advance identically on all clients), keep physics in <code>_physics_process</code> (fixed delta, no float variance), and test cross-platform. The math is fine. The floating-point representation of the math is where desyncs live.</div>`

<script>
window.onerror=()=>true;
let cur=0,rafId=null,stopFn=null;
function cancelRaf(){if(rafId){cancelAnimationFrame(rafId);rafId=null;}}
function stop(){if(stopFn){stopFn();stopFn=null;}}
function atmosBg(ctx,r,g,b,a){const W=ctx.canvas.width,H=ctx.canvas.height;const gr=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*0.7);gr.addColorStop(0,`rgba(${r},${g},${b},${a})`);gr.addColorStop(1,'rgba(9,9,14,0)');ctx.fillStyle=gr;ctx.fillRect(0,0,W,H);}
function glow(ctx,col,blur){ctx.shadowColor=col;ctx.shadowBlur=blur;}
function noGlow(ctx){ctx.shadowColor='transparent';ctx.shadowBlur=0;}
function scanline(ctx,col,a){const H=ctx.canvas.height;ctx.strokeStyle=`rgba(${col},${a})`;ctx.lineWidth=1;for(let y=0;y<H;y+=4){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(ctx.canvas.width,y);ctx.stroke();}}
function neonLine(ctx,x1,y1,x2,y2,col,w){glow(ctx,col,10);ctx.strokeStyle=col;ctx.lineWidth=w||1.5;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();noGlow(ctx);}
function neonNode(ctx,x,y,r,col,label){glow(ctx,col,12);ctx.fillStyle=col;ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();noGlow(ctx);if(label){ctx.fillStyle=col;ctx.font='9px Space Mono,monospace';ctx.textAlign='center';ctx.fillText(label,x,y+r+11);}}
function neonBar(ctx,x,y,w,h,col){glow(ctx,col,8);ctx.fillStyle=col;ctx.fillRect(x,y,w,h);noGlow(ctx);}
function lerp(a,b,t){return a+(b-a)*t;}
function getCtx(){const c=document.getElementById('viz-canvas');const area=c.parentElement;const W=area.clientWidth||window.innerWidth;const H=area.clientHeight||260;c.width=W;c.height=H;return{canvas:c,ctx:c.getContext('2d')};}

function buildViz(key){
  const{canvas,ctx}=getCtx();const W=canvas.width,H=canvas.height;
  switch(key){
    case 'jolt':vizJolt(canvas,ctx,W,H);break;
    case 'controller':vizController(canvas,ctx,W,H);break;
