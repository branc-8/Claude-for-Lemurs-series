    case 'bodies':vizBodies(canvas,ctx,W,H);break;
    case 'forces':vizForces(canvas,ctx,W,H);break;
    case 'raycasts':vizRaycasts(canvas,ctx,W,H);break;
    case 'verlet':vizVerlet(canvas,ctx,W,H);break;
    case 'jiggle':vizJiggle(canvas,ctx,W,H);break;
    case 'fracture':vizFracture(canvas,ctx,W,H);break;
    case 'slice':vizSlice(canvas,ctx,W,H);break;
    case 'explosions':vizExplosions(canvas,ctx,W,H);break;
    case 'ballistics':vizBallistics(canvas,ctx,W,H);break;
    case 'combat':vizCombat(canvas,ctx,W,H);break;
    case 'brawler':vizBrawler(canvas,ctx,W,H);break;
    case 'mathviz':vizMathViz(canvas,ctx,W,H);break;
    default:vizJolt(canvas,ctx,W,H);
  }
}

function vizJolt(canvas,ctx,W,H){
  stop();cancelRaf();clearMobileControls();
  const mid=W/2, floor=H-30, bw=24, bh=16;
  const boxes=[[],[]];
  function mkB(s){
    const zone = (mid-24)*0.5;
    return{x:(s===0?mid*0.5:mid+mid*0.5)+(Math.random()-0.5)*zone*0.6,
           y:15+Math.random()*20, vx:(Math.random()-0.5)*40,vy:0,w:bw,h:bh};
  }
  for(let i=0;i<7;i++){boxes[0].push(mkB(0));boxes[1].push(mkB(1));}
  const GRAV=0.35, DAMP=0.48;
  canvas.onclick=e=>{
    const r=canvas.getBoundingClientRect();
    const x=(e.clientX-r.left)*(W/r.width);
    const s=x<mid?0:1;
    if(boxes[s].length<18)boxes[s].push(mkB(s));
  };
  function step(s){
    const a=boxes[s];
    for(const b of a){
      b.vy+=GRAV; b.x+=b.vx; b.y+=b.vy; b.vx*=0.99;
      const lx=s===0?8:mid+8, rx=s===0?mid-8:W-8;
      if(b.x-b.w/2<lx){b.x=lx+b.w/2;b.vx=Math.abs(b.vx)*0.4;}
      if(b.x+b.w/2>rx){b.x=rx-b.w/2;b.vx=-Math.abs(b.vx)*0.4;}
      if(b.y+b.h/2>=floor){b.y=floor-b.h/2;b.vy*=-DAMP;b.vx*=0.82;if(Math.abs(b.vy)<0.5)b.vy=0;}
    }
    // box-box collision — correct sign: push p and q apart based on direction
    for(let i=0;i<a.length;i++) for(let j=i+1;j<a.length;j++){
      const p=a[i],q=a[j];
      const ox=Math.abs(p.x-q.x)-(p.w+q.w)/2;
      const oy=Math.abs(p.y-q.y)-(p.h+q.h)/2;
      if(ox<0&&oy<0){
        if(ox>oy){
          // resolve in X — push apart in direction of separation
          const dx=p.x-q.x;
          const sep=(-ox/2)*Math.sign(dx||1);
          p.x+=sep; q.x-=sep; p.vx*=0.3; q.vx*=0.3;
        } else {
          const dy=p.y-q.y;
          const sep=(-oy/2)*Math.sign(dy||1);
          p.y+=sep; q.y-=sep; p.vy*=0.3; q.vy*=0.3;
        }
      }
    }
  }
  let t=0;
  function draw(){
    t+=1/60; step(0); step(1);
    ctx.fillStyle='#06050a'; ctx.fillRect(0,0,W,H);
    atmosBg(ctx,35,8,28,0.18);
    ctx.strokeStyle='#1c152a'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(mid,0); ctx.lineTo(mid,H); ctx.stroke();
    neonLine(ctx,8,floor,mid-8,floor,'#b041e0',1.5);
    neonLine(ctx,mid+8,floor,W-8,floor,'#e8399a',1.5);
    for(const b of boxes[0]){
      // GodotPhysics side: simulate occasional jitter
      const j=(Math.random()-0.5)*(Math.random()<0.04?7:0.3);
      ctx.fillStyle='#b041e022'; ctx.strokeStyle='#b041e0'; ctx.lineWidth=1.2;
      glow(ctx,'#b041e0',5);
      ctx.fillRect(b.x-b.w/2+j,b.y-b.h/2,b.w,b.h);
      ctx.strokeRect(b.x-b.w/2+j,b.y-b.h/2,b.w,b.h);
      noGlow(ctx);
    }
    for(const b of boxes[1]){
      ctx.fillStyle='#e8399a22'; ctx.strokeStyle='#e8399a'; ctx.lineWidth=1.2;
      glow(ctx,'#e8399a',6);
      ctx.fillRect(b.x-b.w/2,b.y-b.h/2,b.w,b.h);
      ctx.strokeRect(b.x-b.w/2,b.y-b.h/2,b.w,b.h);
      noGlow(ctx);
    }
    ctx.fillStyle='#ff4d6b99'; ctx.font='700 9px Space Mono,monospace'; ctx.textAlign='center';
    ctx.fillText('GODOTPHYSICS',mid/2,14);
    ctx.fillStyle='#e8399a'; ctx.fillText('JOLT',mid+mid/2,14);
    ctx.fillStyle='#52486b'; ctx.font='8px Space Mono,monospace';
    ctx.fillText('tap to summon more',W/2,H-6);
    rafId=requestAnimationFrame(draw);
  }
  draw(); stopFn=()=>{canvas.onclick=null;clearMobileControls();};
}


function vizController(canvas,ctx,W,H){
  stop();cancelRaf();
  const FLOOR=H-48, PW=20, PH=30;
  let px=W/2, py=FLOOR-PH/2, vx=0, vy=0, coyote=0, jumpBuf=0, coyoteFlash=0;
  const velHist=Array(70).fill(0), keys={};
  const SPEED=180, ACCEL=1600, DECEL=2200, JUMP=420, GRAV=900;
  const kd=e=>{keys[e.code]=true; if(e.code==='Space'||e.code==='ArrowUp') jumpBuf=10;};
  const ku=e=>{keys[e.code]=false;};
  document.addEventListener('keydown',kd); document.addEventListener('keyup',ku);
  // Platforms: percentage-based so they fit any canvas width
  const plat=[
    {x:W*0.5-85,  w:170,       y:FLOOR},
    {x:W*0.04,    w:W*0.22,    y:FLOOR-68},
    {x:W*0.74,    w:W*0.22,    y:FLOOR-68}
  ];
  function draw(){
    const dt=1/60;
    const left=keys['ArrowLeft']||keys['KeyA'], right=keys['ArrowRight']||keys['KeyD'];
    let grounded=false;
    for(const p of plat){
      if(Math.abs(px-(p.x+p.w/2)) < p.w/2+PW/2-2 && Math.abs(py+PH/2-p.y) < 10 && vy>=0)
        grounded=true;
    }
    if(grounded) coyote=6; else if(coyote>0) coyote--;
    if(jumpBuf>0 && coyote>0){vy=-JUMP; coyote=0; jumpBuf=0; coyoteFlash=28;}
    if(jumpBuf>0) jumpBuf--;
    if(!keys['Space']&&!keys['ArrowUp']&&vy<0) vy*=0.88;
    const dir=(right?1:0)-(left?1:0);
    const acc=grounded?(dir!==0?ACCEL:DECEL):ACCEL*0.55;
    vx = Math.abs(vx-dir*SPEED)<acc*dt ? dir*SPEED : vx+Math.sign(dir*SPEED-vx)*acc*dt;
    if(dir===0 && grounded) vx*=0.78;
    vy+=GRAV*dt; px+=vx*dt; py+=vy*dt;
    for(const p of plat){
      if(Math.abs(px-(p.x+p.w/2)) < p.w/2+PW/2-2 && py+PH/2>=p.y-1 && py+PH/2<=p.y+14 && vy>=0){
        py=p.y-PH/2; vy=0;
      }
    }
    if(px<PW/2){px=PW/2;vx=0;} if(px>W-PW/2){px=W-PW/2;vx=0;}
    if(py>H+40){px=W/2; py=plat[0].y-100; vx=0; vy=0;}
    if(coyoteFlash>0) coyoteFlash--;
    velHist.shift(); velHist.push(vx/SPEED);

    ctx.fillStyle='#06050a'; ctx.fillRect(0,0,W,H);
    atmosBg(ctx,25,8,30,0.14);
    for(const p of plat){
      ctx.fillStyle='#1c152a'; ctx.fillRect(p.x,p.y,p.w,8);
      neonLine(ctx,p.x,p.y,p.x+p.w,p.y,'#e8399a',2);
    }
    // velocity graph (top-left)
    const gx=6, gy=6, gw=88, gh=28;
    ctx.fillStyle='#09080e99'; ctx.fillRect(gx,gy,gw,gh);
    ctx.strokeStyle='#1c152a'; ctx.lineWidth=1; ctx.strokeRect(gx,gy,gw,gh);
    ctx.strokeStyle='#e8399a77'; ctx.lineWidth=1;
    ctx.beginPath();
    for(let i=0;i<velHist.length;i++){
      const lx=gx+i*gw/velHist.length, ly=gy+gh/2-velHist[i]*gh*0.46;
      i===0?ctx.moveTo(lx,ly):ctx.lineTo(lx,ly);
    }
    ctx.stroke();
    ctx.fillStyle='#52486b'; ctx.font='7px Space Mono,monospace'; ctx.textAlign='left';
    ctx.fillText('VX',gx+2,gy+8);
    // player
    const pcol=grounded?'#e8399a':'#ffd080';
    neonBar(ctx,px-PW/2,py-PH/2,PW,PH,pcol+'22');
    ctx.strokeStyle=pcol; ctx.lineWidth=2; glow(ctx,pcol,10);
    ctx.strokeRect(px-PW/2,py-PH/2,PW,PH); noGlow(ctx);
    if(coyoteFlash>0){
      ctx.fillStyle='#3dd68c'; ctx.font='bold 9px Space Mono,monospace';
      ctx.textAlign='center'; ctx.fillText('COYOTE',W/2,H-14);
    }
    ctx.fillStyle='#52486b'; ctx.font='8px Space Mono,monospace'; ctx.textAlign='center';
    ctx.fillText('arrows/WASD · space to jump',W/2,H-4);
    rafId=requestAnimationFrame(draw);
  }
  draw();
  stopFn=()=>{
    document.removeEventListener('keydown',kd);
    document.removeEventListener('keyup',ku);
    clearMobileControls();
  };
  const mc=document.getElementById('mob-ctrl');
  if(mc){
    makeMCBtn(mc,{label:'\u25c4',x:'8px',y:'8px',w:'52px',h:'52px',ondown:()=>keys['ArrowLeft']=true,onup:()=>keys['ArrowLeft']=false});
    makeMCBtn(mc,{label:'\u25ba',x:'68px',y:'8px',w:'52px',h:'52px',ondown:()=>keys['ArrowRight']=true,onup:()=>keys['ArrowRight']=false});
    const jb=makeMCBtn(mc,{label:'JUMP',x:'',y:'8px',w:'60px',h:'52px',cls:'green',ondown:()=>{keys['Space']=true;jumpBuf=10;},onup:()=>keys['Space']=false});
    jb.style.right='8px';
  }
}


function vizSaveload(canvas,ctx,W,H){
  stop();cancelRaf();clearMobileControls();
  const nodes=[];
  for(let i=0;i<6;i++){
    const a=i/6*Math.PI*2;
    const rx=Math.min(80,W*0.22), ry=Math.min(60,H*0.22);
    nodes.push({bx:W/2+Math.cos(a)*rx, by:H/2-18+Math.sin(a)*ry, x:0,y:0, t:Math.random()*6.28, col:'#e8399a'});
  }
  nodes.forEach(n=>{n.x=n.bx; n.y=n.by;});
  let saved=null, mode='idle', modeT=0; const snaps=[];
  // Responsive button layout
  const bw=Math.floor(Math.min(58,W*0.16)), bh=22;
  const totalBtnW=bw*2+Math.floor(bw*1.25)+12;
  const btnLeft=W/2-totalBtnW/2;
  const btns=[
    {label:'SAVE',     x:btnLeft,            y:H-bh-8, w:bw,               h:bh},
    {label:'LOAD',     x:btnLeft+bw+4,       y:H-bh-8, w:bw,               h:bh},
    {label:'ROLLBACK', x:btnLeft+bw*2+8,     y:H-bh-8, w:Math.floor(bw*1.25), h:bh}
  ];
  canvas.onclick=e=>{
    const r=canvas.getBoundingClientRect();
    const mx=(e.clientX-r.left)*(W/r.width), my=(e.clientY-r.top)*(H/r.height);
    // JSON icon click — trigger save
    if(mx>=W-54&&mx<=W-22&&my>=H/2-32&&my<=H/2+10&&saved){mode='load';modeT=0;saved.forEach((s,i)=>{nodes[i].x=s.x;nodes[i].y=s.y;nodes[i].col='#3ecfff';});}
    btns.forEach(b=>{
      if(mx>=b.x&&mx<=b.x+b.w&&my>=b.y&&my<=b.y+b.h){
        if(b.label==='SAVE'){
          saved=nodes.map(n=>({x:n.x,y:n.y,col:n.col}));
          snaps.push(JSON.parse(JSON.stringify(saved)));
          if(snaps.length>6) snaps.shift();
          mode='save'; modeT=0; nodes.forEach(n=>n.col='#3dd68c');
        }
        if(b.label==='LOAD'&&saved){
          saved.forEach((s,i)=>{nodes[i].x=s.x;nodes[i].y=s.y;nodes[i].col='#3ecfff';});
          mode='load'; modeT=0;
        }
        if(b.label==='ROLLBACK'&&snaps.length>0){mode='rollback';modeT=0;}
      }
    });
  };
  let t=0;
  function draw(){
    t+=1/60; modeT+=1/60;
    if(mode!=='rollback'){
      nodes.forEach((n,i)=>{
        n.t+=0.012; n.x=n.bx+Math.sin(n.t+i)*11; n.y=n.by+Math.cos(n.t*0.7+i)*7;
        if(modeT>1.1&&mode!=='idle'){n.col='#e8399a'; mode='idle';}
      });
    } else {
      const s=snaps[Math.floor(modeT*3)%snaps.length];
      if(s) s.forEach((sv,i)=>{nodes[i].x=lerp(nodes[i].x,sv.x,0.15);nodes[i].y=lerp(nodes[i].y,sv.y,0.15);nodes[i].col='#c09fff';});
      if(modeT>2){mode='idle'; nodes.forEach(n=>n.col='#e8399a');}
    }
    ctx.fillStyle='#06050a'; ctx.fillRect(0,0,W,H);
    atmosBg(ctx,22,8,40,0.18);
    for(let i=0;i<nodes.length;i++) for(let j=i+1;j<nodes.length;j++)
      neonLine(ctx,nodes[i].x,nodes[i].y,nodes[j].x,nodes[j].y,'#1c152a',1);
    nodes.forEach((n,i)=>neonNode(ctx,n.x,n.y,9,n.col,'N'+i));
    // file icon (right side, safe)
    const fx=W-50, fy=H/2-28;
    glow(ctx,'#ffd080',mode==='save'?14:5);
    ctx.strokeStyle='#ffd08077'; ctx.lineWidth=1.5; ctx.strokeRect(fx,fy,28,36); noGlow(ctx);
    ctx.fillStyle='#ffd08022'; ctx.fillRect(fx,fy,28,36);
    ctx.fillStyle='#ffd080'; ctx.font='8px Space Mono,monospace'; ctx.textAlign='center';
    ctx.fillText('JSON',fx+14,fy+21);
    if(mode==='save'){
      const prog=Math.min(modeT/0.7,1);
      ctx.fillStyle='#ffd080'; ctx.fillRect(fx+2,fy+29,24*prog,5);
    }
    btns.forEach(b=>{
      const hot=(b.label===mode.toUpperCase())||(mode==='rollback'&&b.label==='ROLLBACK');
      ctx.fillStyle=hot?'#e8399a22':'#09080e';
      ctx.strokeStyle=hot?'#e8399a':'#1c152a'; ctx.lineWidth=1;
      ctx.fillRect(b.x,b.y,b.w,b.h); ctx.strokeRect(b.x,b.y,b.w,b.h);
      ctx.fillStyle=hot?'#e8399a':'#52486b';
      ctx.font=`${Math.min(8,b.w/7)}px Space Mono,monospace`; ctx.textAlign='center';
      ctx.fillText(b.label,b.x+b.w/2,b.y+b.h*0.62);
    });
    rafId=requestAnimationFrame(draw);
  }
  draw(); stopFn=()=>{canvas.onclick=null;clearMobileControls();};
}


function vizBodies(canvas,ctx,W,H){
  stop();cancelRaf();clearMobileControls();
  const floor=H-36; const rbs=[];
  for(let i=0;i<6;i++)
    rbs.push({x:W*0.55+i*(W*0.07),y:20+i*10, vy:0, vx:(Math.random()-0.5)*1.5});
  // Character walks LEFT-to-RIGHT across full width
  let charX=W*0.1, charVx=1.3, t=0;
  // Area3D zone centered in char's path
  const ax=W*0.38, aw=W*0.26;
  canvas.onmousedown=e=>{
    const r=canvas.getBoundingClientRect();
    const mx=(e.clientX-r.left)*(W/r.width), my=(e.clientY-r.top)*(H/r.height);
    rbs.push({x:mx, y:20, vy:0, vx:(Math.random()-0.5)*2.5});
    if(rbs.length>24) rbs.splice(0,1);
  };
  function draw(){
    t+=1/60;
    // char movement
    charX+=charVx; if(charX>W*0.92||charX<W*0.06) charVx*=-1;
    // rigidbodies
    for(const rb of rbs){
      rb.vy+=0.38; rb.x+=rb.vx; rb.y+=rb.vy; rb.vx*=0.995;
      if(rb.y>=floor-9){rb.y=floor-9; rb.vy*=-0.42; if(Math.abs(rb.vy)<0.6)rb.vy=0; rb.vx*=0.84;}
      if(rb.x<12){rb.x=12;rb.vx=Math.abs(rb.vx)*0.55;}
      if(rb.x>W-12){rb.x=W-12;rb.vx=-Math.abs(rb.vx)*0.55;}
      // character pushes boxes
      const dx=rb.x-charX, dy=rb.y-(floor-22);
      const d=Math.sqrt(dx*dx+dy*dy);
      if(d<28&&d>0.5){ rb.vx+=dx/d*1.8; rb.vy+=dy/d*0.8; }
    }
    ctx.fillStyle='#06050a'; ctx.fillRect(0,0,W,H);
    atmosBg(ctx,20,8,38,0.14);
    ctx.fillStyle='#1c152a'; ctx.fillRect(10,floor,W-20,8);
    neonLine(ctx,10,floor,W-10,floor,'#524868',2);
    ctx.fillStyle='#5c4870'; ctx.font='7px Space Mono,monospace'; ctx.textAlign='center';
    ctx.fillText('StaticBody3D \u2014 infinite mass, zero cost',W/2,floor+18);
    // boxes
    for(const rb of rbs){
      neonBar(ctx,rb.x-9,rb.y-9,18,18,'#e8399a22');
      ctx.strokeStyle='#e8399a'; ctx.lineWidth=1.5;
      glow(ctx,'#e8399a',4); ctx.strokeRect(rb.x-9,rb.y-9,18,18); noGlow(ctx);
    }
    // area3D zone — char enters it
    const inA=charX>ax&&charX<ax+aw;
    ctx.setLineDash([5,4]); ctx.strokeStyle=inA?'#3ecfff':'#3ecfff44'; ctx.lineWidth=1.5;
    ctx.strokeRect(ax,floor-58,aw,53); ctx.setLineDash([]);
    if(inA){ctx.fillStyle='#3ecfff0a'; ctx.fillRect(ax,floor-58,aw,53);}
    // character
    neonBar(ctx,charX-10,floor-36,20,32,'#3dd68c18');
    ctx.strokeStyle='#3dd68c'; ctx.lineWidth=2;
    glow(ctx,'#3dd68c',8); ctx.strokeRect(charX-10,floor-36,20,32); noGlow(ctx);
    // labels
    ctx.font='7px Space Mono,monospace'; ctx.textAlign='center';
    ctx.fillStyle='#e8399a88'; ctx.fillText('RigidBody3D',W*0.72,H-4);
    ctx.fillStyle=inA?'#3dd68c':'#3dd68c88'; ctx.fillText('CharacterBody3D',charX,H-4);
    ctx.fillStyle=inA?'#3ecfff':'#3ecfff55'; ctx.fillText('Area3D',ax+aw/2,H-4);
    if(inA){
      ctx.fillStyle='#3ecfff';ctx.font='bold 8px Space Mono,monospace';
      ctx.fillText('\u2BC8 body_entered',ax+aw/2,floor-65);
    }
    ctx.fillStyle='#5c4870'; ctx.font='7px Space Mono,monospace';
    ctx.fillText('tap to spawn',W/2,12);
    rafId=requestAnimationFrame(draw);
  }
  draw(); stopFn=()=>{canvas.onmousedown=null;clearMobileControls();};
}


function vizForces(canvas,ctx,W,H){
  stop();cancelRaf();clearMobileControls();
  let bx=W*0.20, by=H*0.46, bvx=0, bvy=0, bav=0, ba=0;
  const floor=H-30, boxMax=W*0.44;
  let forceOn=false;
  const pax=W*0.72, pay=30, plen=Math.min(70,H*0.27);
  let pa=0.7, pav_p=0;
  const sax=W*0.55, say=H-55, sRest=50;
  let sbx=sax+sRest+28, svy=-2.8;
  let dragMode=null; // 'pend' | 'spring' | null
  let lastMX=0, lastMY=0;
  const btns=[{l:'FORCE \u2192',x:6,y:8},{l:'IMPULSE \u2191',x:6,y:33},{l:'TORQUE \u21bb',x:6,y:58}];

  function getCanvas(e){
    const r=canvas.getBoundingClientRect();
    return{x:(e.clientX-r.left)*(W/r.width), y:(e.clientY-r.top)*(H/r.height)};
  }
  canvas.onmousedown=e=>{
    const{x,y}=getCanvas(e);
    // check buttons first
    let hit=false;
    btns.forEach((b,i)=>{
      if(x>=b.x&&x<=b.x+80&&y>=b.y&&y<=b.y+22){
        if(i===0) forceOn=!forceOn;
        if(i===1){bvy=-400;by=Math.min(by,floor-22);}
        if(i===2) bav+=8;
        hit=true;
      }
    });
    if(hit) return;
    // check pendulum bob
    const ppx_=pax+Math.sin(pa)*plen, ppy_=pay+Math.cos(pa)*plen;
    if(Math.hypot(x-ppx_,y-ppy_)<18){dragMode='pend'; return;}
    // check spring mass
    if(Math.hypot(x-sbx,y-say)<18){dragMode='spring'; return;}
  };
  canvas.onmousemove=e=>{
    const{x,y}=getCanvas(e); lastMX=x; lastMY=y;
    if(dragMode==='pend'){
      const dx=x-pax, dy=y-pay;
      pa=Math.atan2(dx,dy); pav_p=0;
    }
    if(dragMode==='spring'){
      sbx=Math.max(sax+10,Math.min(sax+sRest*2.8,x));
      svy=0;
    }
  };
  canvas.onmouseup=()=>dragMode=null;
  // backward compat: touch → mouse already handled by addTouchToMouse

  function draw(){
    const dt=1/60;
    if(forceOn) bvx+=280*dt;
    bvx*=0.990; bvy+=580*dt; bx+=bvx*dt; by+=bvy*dt; ba+=bav*dt; bav*=0.93;
    if(by>=floor-19){by=floor-19;bvy*=-0.42;bvx*=0.70;if(Math.abs(bvy)<1)bvy=0;}
    if(bx<14){bx=14;bvx=Math.abs(bvx)*0.5;}
    if(bx>boxMax){bx=boxMax;bvx=-Math.abs(bvx)*0.5;}
    if(dragMode!=='pend'){
      pav_p+=(-Math.sin(pa)*5.8-pav_p*0.028); pa+=pav_p*dt*2.2; pav_p*=0.9995;
    }
    const ppx=pax+Math.sin(pa)*plen, ppy=pay+Math.cos(pa)*plen;
    if(dragMode!=='spring'){
      const stretch=sbx-(sax+sRest);
      svy+=(-190*stretch-svy*4.5)*dt; sbx+=svy*dt;
      if(sbx<sax+6){sbx=sax+6;svy=Math.abs(svy)*0.55;}
      if(sbx>sax+sRest*2.6){sbx=sax+sRest*2.6;svy=-Math.abs(svy)*0.55;}
    }

    ctx.fillStyle='#06050a'; ctx.fillRect(0,0,W,H);
    atmosBg(ctx,30,5,18,0.14);
    neonLine(ctx,0,floor,W*0.5,floor,'#1e1428',1.5);
    ctx.strokeStyle='#1e142822'; ctx.lineWidth=1; ctx.setLineDash([6,5]);
    ctx.beginPath(); ctx.moveTo(W*0.5,0); ctx.lineTo(W*0.5,H); ctx.stroke(); ctx.setLineDash([]);

    // box
    ctx.save(); ctx.translate(bx,by); ctx.rotate(ba);
    ctx.fillStyle='#e8399a1a'; ctx.strokeStyle='#e8399a'; ctx.lineWidth=2;
    glow(ctx,'#e8399a',10); ctx.fillRect(-18,-18,36,36); ctx.strokeRect(-18,-18,36,36);
    noGlow(ctx); ctx.restore();
    if(forceOn){
      neonLine(ctx,bx+18,by,bx+60,by,'#ffd080',2);
      ctx.fillStyle='#ffd080';
      ctx.beginPath();ctx.moveTo(bx+60,by-4);ctx.lineTo(bx+68,by);ctx.lineTo(bx+60,by+4);ctx.fill();
    }
    // pendulum — highlight when draggable
    const pHot=dragMode==='pend'||Math.hypot(lastMX-ppx,lastMY-ppy)<18;
    neonLine(ctx,pax,pay,ppx,ppy,pHot?'#e8399a':'#c09fff',pHot?2.2:1.8);
    neonNode(ctx,pax,pay,5,'#5c4870');
    neonNode(ctx,ppx,ppy,pHot?14:11,pHot?'#e8399a':'#c09fff');
    ctx.fillStyle=pHot?'#e8399a':'#c09fff88'; ctx.font='7px Space Mono,monospace'; ctx.textAlign='center';
    ctx.fillText('PinJoint3D',pax,pay-8);
    ctx.fillText('drag \u2191',ppx,ppy+20);
    // spring zigzag
    const sHot=dragMode==='spring'||Math.hypot(lastMX-sbx,lastMY-say)<18;
    ctx.strokeStyle=sHot?'#e8399a':'#c09fff88'; ctx.lineWidth=sHot?1.8:1.2;
    ctx.beginPath(); ctx.moveTo(sax,say);
    const segs=10;
    for(let i=0;i<=segs;i++){
      const sx=sax+(sbx-sax)*i/segs, sy=say+(i%2===0?0:8)*(i>0&&i<segs?1:0);
      ctx.lineTo(sx,sy);
    }
    ctx.lineTo(sbx,say); ctx.stroke();
    neonNode(ctx,sax,say,5,'#5c4870');
    neonNode(ctx,sbx,say,sHot?14:11,sHot?'#e8399a':'#c09fff');
    ctx.fillStyle=sHot?'#e8399a':'#c09fff88'; ctx.font='7px Space Mono,monospace'; ctx.textAlign='center';
    ctx.fillText('Generic6DOF spring',sax+(sbx-sax)/2,say-12);
    ctx.fillText('drag \u2192',sbx,say+20);
    // buttons
    btns.forEach((b,i)=>{
      const on=i===0&&forceOn;
      ctx.fillStyle=on?'#e8399a1a':'#09080e';
      ctx.strokeStyle=on?'#e8399a':'#1e1428'; ctx.lineWidth=1;
      ctx.fillRect(b.x,b.y,80,22); ctx.strokeRect(b.x,b.y,80,22);
      ctx.fillStyle=on?'#e8399a':'#5c4870'; ctx.font='8px Space Mono,monospace'; ctx.textAlign='center';
      ctx.fillText(b.l,b.x+40,b.y+15);
    });
    ctx.fillStyle='#5c4870'; ctx.font='7px Space Mono,monospace'; ctx.textAlign='center';
    ctx.fillText('StaticBody3D',W*0.22,H-8);
    rafId=requestAnimationFrame(draw);
  }
  draw();
  stopFn=()=>{canvas.onmousedown=null;canvas.onmousemove=null;canvas.onmouseup=null;clearMobileControls();};
  const mcf=document.getElementById('mob-ctrl');
  if(mcf){
    makeMCBtn(mcf,{label:'FORCE',x:'8px',y:'8px',w:'62px',h:'42px',ondown:()=>forceOn=true,onup:()=>forceOn=false});
    makeMCBtn(mcf,{label:'IMPULSE',x:'8px',y:'58px',w:'62px',h:'42px',cls:'green',ontap:()=>{bvy=-400;by=Math.min(by,floor-22);}});
    makeMCBtn(mcf,{label:'TORQUE',x:'8px',y:'108px',w:'62px',h:'42px',cls:'cyan',ontap:()=>bav+=8});
  }
}


function vizRaycasts(canvas,ctx,W,H){
  stop();cancelRaf();clearMobileControls();
  const CX=W/2-20, CY=H/2+10;
  let mx=CX+100, my=CY;
  const floorY=H-32;
  const walls=[
    {x:80,y:60,w:30,h:100},{x:W-110,y:80,w:30,h:80},
    {x:W/2-40,y:30,w:80,h:25},{x:60,y:H-78,w:120,h:20},
    {x:W-180,y:H-78,w:120,h:20},
    {x:0,y:floorY,w:W,h:8} // floor — so ground ray detects it
  ];
  function updateMXY(e){const r=canvas.getBoundingClientRect();mx=(e.clientX-r.left)*(W/r.width);my=(e.clientY-r.top)*(H/r.height);}
  canvas.onmousemove=updateMXY; canvas.onmousedown=updateMXY;
  canvas.onmouseleave=()=>{mx=CX+100;my=CY;};
  function rayHit(ox,oy,dx,dy,len){
    let m=len;
    for(const w of walls){
      const ss=[[w.x,w.y,w.x+w.w,w.y],[w.x+w.w,w.y,w.x+w.w,w.y+w.h],[w.x,w.y+w.h,w.x+w.w,w.y+w.h],[w.x,w.y,w.x,w.y+w.h]];
      for(const[x1,y1,x2,y2]of ss){
        const ex=x2-x1,ey=y2-y1,c=dx*ey-dy*ex;
        if(Math.abs(c)<0.001)continue;
        const t1=((x1-ox)*ey-(y1-oy)*ex)/c,t2=((x1-ox)*dy-(y1-oy)*dx)/c;
        if(t1>0&&t1<m&&t2>=0&&t2<=1)m=t1;
      }
    }
    return m;
  }
  let t=0;
  function draw(){
    t+=1/60;
    ctx.fillStyle='#06050a'; ctx.fillRect(0,0,W,H);
    atmosBg(ctx,25,8,35,0.12);
    // floor
    neonLine(ctx,0,floorY,W,floorY,'#2a1e3a',1.5);
    // walls (skip floor wall for drawing)
    for(let wi=0;wi<walls.length-1;wi++){
      const w=walls[wi];
      ctx.fillStyle='#1c152a88'; ctx.fillRect(w.x,w.y,w.w,w.h);
      ctx.strokeStyle='#5c4870'; ctx.lineWidth=1; ctx.strokeRect(w.x,w.y,w.w,w.h);
    }
    // 8 scanning rays
    for(let i=0;i<8;i++){
      const a=i/8*Math.PI*2+t*0.3,dx=Math.cos(a),dy=Math.sin(a);
      const len=rayHit(CX,CY,dx,dy,150),hit=len<150;
      neonLine(ctx,CX,CY,CX+dx*len,CY+dy*len,hit?'#e8399a':'#3dd68c33',hit?1.5:0.8);
      if(hit) neonNode(ctx,CX+dx*len,CY+dy*len,4,'#e8399a');
    }
    // mouse-aimed ray (hitscan / gold)
    const mdx=mx-CX,mdy=my-CY,ml=Math.sqrt(mdx*mdx+mdy*mdy)||1,mnx=mdx/ml,mny=mdy/ml;
    const mh=rayHit(CX,CY,mnx,mny,220);
    neonLine(ctx,CX,CY,CX+mnx*mh,CY+mny*mh,'#ffd080',2);
    if(mh<220){
      neonNode(ctx,CX+mnx*mh,CY+mny*mh,6,'#ffd080');
      ctx.fillStyle='#ffd080';ctx.font='7px Space Mono,monospace';ctx.textAlign='center';
      ctx.fillText('HIT',CX+mnx*mh,CY+mny*mh+(mny>0?-10:16));
    }
    // ground-check ray (cyan, straight down)
    const gd=rayHit(CX,CY,0,1,220);
    const groundHit=gd<218;
    neonLine(ctx,CX,CY,CX,CY+gd,groundHit?'#3ecfff':'#3ecfff55',groundHit?2:1.2);
    if(groundHit){
      neonNode(ctx,CX,CY+gd,5,'#3ecfff');
      ctx.fillStyle='#3ecfff';ctx.font='7px Space Mono,monospace';ctx.textAlign='left';
      ctx.fillText('\u25c6 GROUNDED',CX+8,CY+gd-4);
    }
    // character at center
    neonNode(ctx,CX,CY,14,'#e8399a');
    // legend bottom-left
    const ly=H-6;
    ctx.font='7px Space Mono,monospace'; ctx.textAlign='left';
    ctx.fillStyle='#e8399a88'; ctx.fillText('\u2500 scan rays',8,ly-18);
    ctx.fillStyle='#ffd080'; ctx.fillText('\u2500 hitscan (mouse)',8,ly-9);
    ctx.fillStyle='#3ecfff'; ctx.fillText('\u2500 ground check',8,ly);
    ctx.fillStyle='#5c4870'; ctx.textAlign='center'; ctx.fillText('move mouse to aim',W*0.72,ly);
    rafId=requestAnimationFrame(draw);
  }
  draw(); stopFn=()=>{canvas.onmousemove=null;canvas.onmousedown=null;canvas.onmouseleave=null;clearMobileControls();};
}


function vizVerlet(canvas,ctx,W,H){
  stop();cancelRaf();clearMobileControls();
  // ── ROPE (left side) ──────────────────────────────────────────────
  const N=14, ax=Math.min(W*0.22,130), ay=22;
  const pts=[], prev=[];
  for(let i=0;i<N;i++){
    pts.push({x:ax+(Math.random()-0.5)*3, y:ay+i*16, locked:i===0});
    prev.push({x:pts[i].x, y:pts[i].y});
  }
  let drag=-1, wt=0, vmx=-1, vmy=-1;
  // rope constraints – NO tearing flag
  const ropecons=Array.from({length:N-1},(_,i)=>({a:i,b:i+1,rest:16}));

  // ── CLOTH (right side, adaptive) ────────────────────────────────
  const CW=8, CH=6;
  const csz = Math.max(14, Math.min(20, Math.floor((W - ax*2 - 60) / CW)));
  const clothW = CW*csz, clothH = CH*csz;
  const cox = W - clothW - Math.max(8, W*0.04);
  const coy = 22;
  const cloth=[], cprev=[], ccon=[];
  for(let r=0;r<CH;r++) for(let c=0;c<CW;c++){
    cloth.push({x:cox+c*csz, y:coy+r*csz, locked:r===0&&(c===0||c===CW-1)});
    cprev.push({x:cox+c*csz, y:coy+r*csz});
  }
  for(let r=0;r<CH;r++) for(let c=0;c<CW;c++){
    if(c<CW-1) ccon.push({a:r*CW+c,   b:r*CW+c+1,   rest:csz, alive:true});
    if(r<CH-1) ccon.push({a:r*CW+c,   b:(r+1)*CW+c, rest:csz, alive:true});
  }

  // ── INTERACTION ─────────────────────────────────────────────────
  canvas.onmousedown=e=>{
    const r=canvas.getBoundingClientRect();
    const mx=(e.clientX-r.left)*(W/r.width), my=(e.clientY-r.top)*(H/r.height);
    for(let i=1;i<N;i++) if(Math.hypot(pts[i].x-mx,pts[i].y-my)<18){drag=i;break;}
  };
  canvas.onmouseup=()=>drag=-1;
  canvas.onmousemove=e=>{
    const _r=canvas.getBoundingClientRect(); vmx=(e.clientX-_r.left)*(W/_r.width); vmy=(e.clientY-_r.top)*(H/_r.height);
    if(drag<0) return;
    const r=canvas.getBoundingClientRect();
    const mx=(e.clientX-r.left)*(W/r.width), my=(e.clientY-r.top)*(H/r.height);
    // inject velocity gently – don't just teleport (prevents tearing)
    const speed=0.45;
    prev[drag].x = pts[drag].x - (mx-pts[drag].x)*speed;
    prev[drag].y = pts[drag].y - (my-pts[drag].y)*speed;
    pts[drag].x = mx; pts[drag].y = my;
  };

  // ── SIMULATION ──────────────────────────────────────────────────
  // step: points,prevs,cons,doTear,gravity,windScale
  function vstep(points,prevs,cons,doTear,grav,ws){
    wt+=0.018;
    for(let i=0;i<points.length;i++){
      if(points[i].locked) continue;
      const vx=(points[i].x-prevs[i].x)*0.994;
      const vy=(points[i].y-prevs[i].y)*0.994;
      prevs[i].x=points[i].x; prevs[i].y=points[i].y;
      points[i].x+=vx+Math.sin(wt+i*0.35)*ws;
      points[i].y+=vy+grav;
    }
    for(let it=0;it<5;it++) for(const c of cons){
      if(doTear && !c.alive) continue;
      const a=points[c.a],b=points[c.b];
      const dx=b.x-a.x, dy=b.y-a.y;
      const d=Math.sqrt(dx*dx+dy*dy)||0.01;
      const diff=(d-c.rest)/d*0.5;
      if(!a.locked){a.x+=dx*diff; a.y+=dy*diff;}
      if(!b.locked){b.x-=dx*diff; b.y-=dy*diff;}
      if(doTear && d>c.rest*1.9) c.alive=false;
    }
  }

  function draw(){
    vstep(pts,  prev,  ropecons, false, 0.55, 0.18); // rope  – no tear
    vstep(cloth,cprev, ccon,     true,  0.40, 0.12); // cloth – tears
    // cloth mouse push (finger/cursor over cloth side pushes nearby points)
    if(vmx>=W*0.45){
      for(let i=0;i<cloth.length;i++){
        if(cloth[i].locked) continue;
        const cdx=cloth[i].x-vmx, cdy=cloth[i].y-vmy, cd=Math.sqrt(cdx*cdx+cdy*cdy);
        if(cd<40&&cd>0.5){const f=(1-cd/40)*4;cprev[i].x-=cdx/cd*f;cprev[i].y-=cdy/cd*f;}
      }
    }
    ctx.fillStyle='#09090e'; ctx.fillRect(0,0,W,H);
    atmosBg(ctx,20,8,32,0.12);

    // rope
    for(let i=0;i<N-1;i++) neonLine(ctx,pts[i].x,pts[i].y,pts[i+1].x,pts[i+1].y,'#e8399a',2);
    pts.forEach((p,i)=>neonNode(ctx,p.x,p.y,i===0?5:4,i===0?'#66638a':'#e8399a'));

    // cloth
    for(const c of ccon){
      if(!c.alive) continue;
      const a=cloth[c.a],b=cloth[c.b];
      neonLine(ctx,a.x,a.y,b.x,b.y,'#3dd68c',1);
    }
    cloth.forEach(p=>{if(p.locked) neonNode(ctx,p.x,p.y,4,'#66638a');});

    // divider label
    ctx.fillStyle='#1d1d2a'; ctx.fillRect(W*0.45,0,1,H);
    ctx.fillStyle='#66638a'; ctx.font='8px Space Mono,monospace'; ctx.textAlign='center';
    ctx.fillText('ROPE – drag points',ax,H-5);
    ctx.fillText('CLOTH – tears at 1.9\u00d7',cox+clothW/2,H-5);
    rafId=requestAnimationFrame(draw);
  }
  draw();
  canvas.onmouseleave=()=>{vmx=-1;vmy=-1;};
  stopFn=()=>{canvas.onmousedown=null;canvas.onmouseup=null;canvas.onmousemove=null;canvas.onmouseleave=null;clearMobileControls();};
}

function vizJiggle(canvas,ctx,W,H){
  stop();cancelRaf();clearMobileControls();
  const N=28, cx=W/2, cy=H*0.46, R=Math.min(65, H*0.25);
  const pts=[], vel=[], wts=[], rest=[];
  for(let i=0;i<N;i++){
    const a=i/N*Math.PI*2;
    // a=0 right, a=π/2 bottom, a=3π/2 top
    // weight: 0 at top (locked), 1 at bottom (free)
    const w=Math.max(0.04,(1+Math.sin(a))/2);
    pts.push({x:cx+Math.cos(a)*R, y:cy+Math.sin(a)*R});
    vel.push({x:0,y:0});
    wts.push(w);
    rest.push({x:cx+Math.cos(a)*R, y:cy+Math.sin(a)*R});
  }
  let mx=-1,my=-1,showW=true,t=0;
  const STIFF=9, DAMP=4.5, MAX_DISP=18, POKE_R=80, POKE_F=1800;

  function updateMXY(e){
    const r=canvas.getBoundingClientRect();
    mx=(e.clientX-r.left)*(W/r.width);
    my=(e.clientY-r.top)*(H/r.height);
  }
  canvas.onmousemove=updateMXY;
  canvas.onmousedown=updateMXY;
  canvas.onmouseleave=()=>{mx=-1;my=-1;};
  canvas.onclick=e=>{
    const r=canvas.getBoundingClientRect();
    const x=(e.clientX-r.left)*(W/r.width),y=(e.clientY-r.top)*(H/r.height);
    if(x>W-98&&y<28) showW=!showW;
  };

  function draw(){
    t+=1/60; const dt=1/60;
    for(let i=0;i<N;i++){
      const w=showW?wts[i]:1;
      // spring toward (noisy) rest
      const noise=Math.sin(t*1.8+i*0.7)*5;
      const rx=rest[i].x+noise*(1-wts[i]*0.6), ry=rest[i].y+noise*0.4;
      vel[i].x+=(rx-pts[i].x)*STIFF*dt;
      vel[i].y+=(ry-pts[i].y)*STIFF*dt;
      // poke force – applied separately AFTER spring so it always dominates
      if(mx>=0){
        const dx=pts[i].x-mx, dy=pts[i].y-my;
        const d=Math.sqrt(dx*dx+dy*dy)||0.1;
        if(d<POKE_R){
          const f=(1-d/POKE_R)*POKE_F*w;
          vel[i].x+=dx/d*f*dt;
          vel[i].y+=dy/d*f*dt;
        }
      }
      // damping
      vel[i].x*=(1-DAMP*dt);
      vel[i].y*=(1-DAMP*dt);
      pts[i].x+=vel[i].x*dt;
      pts[i].y+=vel[i].y*dt;
      // clamp displacement by weight
      const ox=pts[i].x-rest[i].x, oy=pts[i].y-rest[i].y;
      const ol=Math.sqrt(ox*ox+oy*oy);
      const md=MAX_DISP*w;
      if(ol>md&&ol>0.001){pts[i].x=rest[i].x+ox/ol*md; pts[i].y=rest[i].y+oy/ol*md;}
    }

    ctx.fillStyle='#09090e'; ctx.fillRect(0,0,W,H);
    atmosBg(ctx,28,8,30,0.12);

    // filled blob
    ctx.beginPath();
    for(let i=0;i<N;i++) i===0?ctx.moveTo(pts[i].x,pts[i].y):ctx.lineTo(pts[i].x,pts[i].y);
    ctx.closePath(); ctx.fillStyle='#e8399a0d'; ctx.fill();

    // edges coloured by weight
    for(let i=0;i<N;i++){
      const j=(i+1)%N, w=(wts[i]+wts[j])/2;
      const col=showW
        ?`rgba(${Math.round(255*w)},${Math.round(80+130*w)},${Math.round(58+(230-58)*(1-w))},0.95)`
        :'#e8399a';
      neonLine(ctx,pts[i].x,pts[i].y,pts[j].x,pts[j].y,col,2);
    }

    // poke cursor indicator
    if(mx>=0){
      ctx.strokeStyle='rgba(232,57,154,0.18)'; ctx.lineWidth=1;
      ctx.setLineDash([4,4]);
      ctx.beginPath(); ctx.arc(mx,my,POKE_R,0,Math.PI*2); ctx.stroke();
      ctx.setLineDash([]);
      neonNode(ctx,mx,my,4,'#e8399a44');
    }

    // weight-map gradient legend
    if(showW){
      for(let i=0;i<22;i++){
        ctx.fillStyle=`rgba(${Math.round(i*11.6)},${Math.round(80+i*8)},${Math.round(230-i*7)},0.9)`;
        ctx.fillRect(W-96+i*3.5,H-16,3.5,8);
      }
      ctx.fillStyle='#66638a'; ctx.font='8px Space Mono,monospace';
      ctx.textAlign='left';  ctx.fillText('locked',W-96,H-4);
      ctx.textAlign='right'; ctx.fillText('free',W-18,H-4);
    }

    // toggle button
    ctx.fillStyle=showW?'#e8399a22':'#0e0e14';
    ctx.strokeStyle=showW?'#e8399a':'#1d1d2a'; ctx.lineWidth=1;
    ctx.fillRect(W-98,4,94,22); ctx.strokeRect(W-98,4,94,22);
    ctx.fillStyle='#e8399a'; ctx.font='8px Space Mono,monospace'; ctx.textAlign='center';
    ctx.fillText(showW?'WEIGHT MAP ON':'UNIFORM',W-51,18);

    ctx.fillStyle='#66638a'; ctx.font='9px Space Mono,monospace'; ctx.textAlign='center';
    ctx.fillText('touch / hover to poke',W/2,H-5);
    rafId=requestAnimationFrame(draw);
  }
  draw();
  stopFn=()=>{canvas.onmousemove=null;canvas.onmousedown=null;canvas.onmouseleave=null;canvas.onclick=null;clearMobileControls();};
}

function vizFracture(canvas,ctx,W,H){
  stop();cancelRaf();
  const bxs=[];
  function mkBx(bx,by,bw,bh,seeds){const fs=[];for(let i=0;i<seeds;i++){const px=bx+(Math.random()*0.8+0.1)*bw,py=by+(Math.random()*0.8+0.1)*bh;fs.push({cx:px,cy:py,px,py,vx:0,vy:0,av:0,a:0,alive:false,t:0,sz:13+Math.random()*10});}return{x:bx,y:by,w:bw,h:bh,fs,broken:false};}
  for(let i=0;i<6;i++)for(let j=0;j<2;j++)bxs.push(mkBx(50+i*88,40+j*96,70,78,8));
  const floor=H-28;
  canvas.onmousedown=e=>{const r=canvas.getBoundingClientRect();const mx=(e.clientX-r.left)*(W/r.width),my=(e.clientY-r.top)*(H/r.height);for(const b of bxs){if(!b.broken&&mx>=b.x&&mx<=b.x+b.w&&my>=b.y&&my<=b.y+b.h){b.broken=true;for(const f of b.fs){f.alive=true;f.vx=(f.cx-mx)*0.04+(Math.random()-0.5)*2;f.vy=(f.cy-my)*0.04-3+Math.random()*-2;f.av=(Math.random()-0.5)*5;}break;}}};
  let t=0;
  function draw(){
    t+=1/60;ctx.fillStyle='#09090e';ctx.fillRect(0,0,W,H);atmosBg(ctx,28,8,25,0.12);neonLine(ctx,0,floor,W,floor,'#1d1d2a',1);
    for(const b of bxs){
      if(!b.broken){ctx.fillStyle='#e8399a22';ctx.strokeStyle='#e8399a';ctx.lineWidth=1.5;glow(ctx,'#e8399a',5);ctx.fillRect(b.x,b.y,b.w,b.h);ctx.strokeRect(b.x,b.y,b.w,b.h);noGlow(ctx);ctx.strokeStyle='#e8399a28';ctx.lineWidth=0.5;for(let i=0;i<b.fs.length-1;i++){ctx.beginPath();ctx.moveTo(b.fs[i].cx,b.fs[i].cy);ctx.lineTo(b.fs[(i+1)%b.fs.length].cx,b.fs[(i+1)%b.fs.length].cy);ctx.stroke();}}

function vizSlice(canvas,ctx,W,H){
  stop();cancelRaf();clearMobileControls();
  const floor=H-28;
  // Each poly stores LOCAL verts (relative to cx,cy), plus world cx,cy,vx,vy,a,av
  function mkPoly(wx,wy,hw,hh){
    const lv=[{x:-hw,y:-hh},{x:hw,y:-hh},{x:hw+10,y:hh},{x:-hw-10,y:hh}];
    return{lv,cx:wx,cy:wy,vx:0,vy:0,a:0,av:0.4,fresh:0};
  }
  function worldVerts(p){const co=Math.cos(p.a),si=Math.sin(p.a);return p.lv.map(v=>({x:p.cx+co*v.x-si*v.y,y:p.cy+si*v.x+co*v.y}));}
  function polyRadius(p){return Math.max(...p.lv.map(v=>Math.sqrt(v.x*v.x+v.y*v.y)));}
  let polys=[mkPoly(W/2,H/2-20,52,45)];
  let sliceStart=null,sliceEnd=null,drawing=false;
  function spawnInitial(){polys=[mkPoly(W/2,H/3,52,45)];}
  function doSlice(p,pn,pt){
    const wv=worldVerts(p);const front=[],back=[];
    for(let i=0;i<wv.length;i++){
      const a=wv[i],b=wv[(i+1)%wv.length];
      const da=pn.x*(a.x-pt.x)+pn.y*(a.y-pt.y),db=pn.x*(b.x-pt.x)+pn.y*(b.y-pt.y);
      da>=0?front.push({...a}):back.push({...a});
      if((da>0)!=(db>0)){const t=da/(da-db);const ix=a.x+(b.x-a.x)*t,iy=a.y+(b.y-a.y)*t;front.push({x:ix,y:iy});back.push({x:ix,y:iy});}
    }
    const res=[];
    for(const wverts of[front,back]){
      if(wverts.length<3)continue;
      const cx=wverts.reduce((s,v)=>s+v.x,0)/wverts.length,cy=wverts.reduce((s,v)=>s+v.y,0)/wverts.length;
      const co=Math.cos(-p.a),si=Math.sin(-p.a);
      const lv=wverts.map(v=>{const ox=v.x-cx,oy=v.y-cy;return{x:co*ox-si*oy,y:si*ox+co*oy};});
      res.push({lv,cx,cy,vx:p.vx+(wverts===front?pn.x*2.5:-pn.x*2.5),vy:p.vy+(wverts===front?pn.y*2-1:-pn.y*2-1),a:p.a,av:(Math.random()-0.5)*4,fresh:14});
    }
    return res;
  }
  canvas.onmousedown=e=>{const r=canvas.getBoundingClientRect();sliceStart={x:(e.clientX-r.left)*(W/r.width),y:(e.clientY-r.top)*(H/r.height)};drawing=true;};
  canvas.onmouseup=e=>{
    if(!drawing||!sliceStart)return;drawing=false;
    const r=canvas.getBoundingClientRect();const se={x:(e.clientX-r.left)*(W/r.width),y:(e.clientY-r.top)*(H/r.height)};
    if(Math.hypot(se.x-sliceStart.x,se.y-sliceStart.y)<18){sliceStart=null;return;}
    const nx=-(se.y-sliceStart.y),ny=se.x-sliceStart.x,nl=Math.sqrt(nx*nx+ny*ny),pn={x:nx/nl,y:ny/nl};
    const np=[];for(const p of polys)np.push(...doSlice(p,pn,sliceStart));
    if(np.length>0)polys=np;sliceStart=null;
  };
  canvas.onmousemove=e=>{if(drawing){const r=canvas.getBoundingClientRect();sliceEnd={x:(e.clientX-r.left)*(W/r.width),y:(e.clientY-r.top)*(H/r.height)};}};
  // mobile: tap to respawn
  const mc=document.getElementById('mob-ctrl');
  if(mc){const sb=makeMCBtn(mc,{label:'SPAWN',x:'50%',y:'8px',w:'70px',h:'40px',ontap:spawnInitial});sb.style.transform='translateX(-50%)';}
  let t=0;
  function draw(){
    t+=1/60;
    for(const p of polys){
      p.a+=p.av/60;p.cx+=p.vx;p.cy+=p.vy;p.vy+=220/60/60;if(p.fresh>0)p.fresh--;p.vx*=0.997;p.av*=0.997;
      const rad=polyRadius(p);
      // Floor bounce
      if(p.cy+rad>=floor){p.cy=floor-rad;p.vy*=-0.38;p.av*=0.7;p.vx*=0.78;}
      // Wall bounce
      if(p.cx-rad<4){p.cx=4+rad;p.vx=Math.abs(p.vx)*0.5;}
      if(p.cx+rad>W-4){p.cx=W-4-rad;p.vx=-Math.abs(p.vx)*0.5;}
    }
    // Respawn if all polys are nearly still on floor or off canvas
    const allSettled=polys.every(p=>Math.abs(p.vy)<5&&p.cy>floor-20)||polys.some(p=>p.cy>H+100);
    if(allSettled&&t>2)spawnInitial();
    ctx.fillStyle='#09090e';ctx.fillRect(0,0,W,H);atmosBg(ctx,28,8,25,0.12);
    neonLine(ctx,0,floor,W,floor,'#1d1d2a33',1);
    for(const p of polys){
      const wv=worldVerts(p),col=p.fresh>0?'#ffd080':'#e8399a';
      ctx.beginPath();wv.forEach((v,i)=>i===0?ctx.moveTo(v.x,v.y):ctx.lineTo(v.x,v.y));ctx.closePath();
      ctx.fillStyle=col+'22';glow(ctx,col,p.fresh>0?14:5);ctx.fill();ctx.strokeStyle=col;ctx.lineWidth=1.5;ctx.stroke();noGlow(ctx);
    }
    if(drawing&&sliceStart&&sliceEnd)neonLine(ctx,sliceStart.x,sliceStart.y,sliceEnd.x,sliceEnd.y,'#ffd080',2);
    ctx.fillStyle='#66638a';ctx.font='9px Space Mono,monospace';ctx.textAlign='center';
    ctx.fillText('drag to slice • pieces bounce • auto-respawns',W/2,H-5);
    rafId=requestAnimationFrame(draw);
  }
  draw();stopFn=()=>{canvas.onmousedown=null;canvas.onmouseup=null;canvas.onmousemove=null;clearMobileControls();};
}

function vizExplosions(canvas,ctx,W,H){

    for(let i=parts.length-1;i>=0;i--){const p=parts[i];if(p.type==='ring'){p.r+=4;p.alpha-=0.03;if(p.alpha<=0)parts.splice(i,1);}else{p.vx*=0.95;p.vy+=0.12;p.x+=p.vx;p.y+=p.vy;p.alpha-=0.025;if(p.alpha<=0)parts.splice(i,1);}}

    for(const b of boxes){ctx.save();ctx.translate(b.x,b.y);ctx.rotate(b.a);const col=b.fire>0?'#b041e0':'#e8399a';ctx.fillStyle=col+'33';ctx.strokeStyle=col;ctx.lineWidth=1.5;glow(ctx,col,b.fire>0?12:5);ctx.fillRect(-15,-18,30,36);ctx.strokeRect(-15,-18,30,36);noGlow(ctx);if(b.fire>0){for(let i=0;i<3;i++){ctx.fillStyle=`rgba(255,${100+Math.random()*100},0,${Math.random()*0.7})`;ctx.beginPath();ctx.arc((Math.random()-0.5)*18,-18-Math.random()*14,2+Math.random()*3,0,Math.PI*2);ctx.fill();}}ctx.restore();}
    for(const p of parts){if(p.type==='ring'){ctx.strokeStyle=`rgba(232,57,154,${p.alpha})`;ctx.lineWidth=2;glow(ctx,'#e8399a',8);ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.stroke();noGlow(ctx);}else{ctx.fillStyle=`rgba(255,200,80,${p.alpha})`;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();}}
    ctx.restore();ctx.fillStyle='#66638a';ctx.font='9px Space Mono,monospace';ctx.textAlign='center';ctx.fillText('click to explode \u00b7 fire spreads to nearby boxes',W/2,H-5);
    rafId=requestAnimationFrame(draw);
  }
  draw();stopFn=()=>{canvas.onmousedown=null;clearMobileControls();};

    ctx.fillStyle='#09090e';ctx.fillRect(0,0,W,H);atmosBg(ctx,20,8,32,0.15);neonLine(ctx,30,floor,W-30,floor,'#1d1d2a',1.5);

    bx.fs.forEach(f=>{if(!f.alive)return;const al=Math.max(0,1-f.t/2);ctx.save();ctx.translate(f.x,f.y);ctx.rotate(f.a);ctx.fillStyle=`rgba(232,57,154,${al*0.3})`;ctx.strokeStyle=`rgba(232,57,154,${al})`;ctx.lineWidth=1;ctx.fillRect(-7,-7,14,14);ctx.strokeRect(-7,-7,14,14);ctx.restore();});
    if(F[1].ghost){ctx.strokeStyle='#3ecfff44';ctx.lineWidth=1;ctx.setLineDash([4,4]);ctx.strokeRect(F[1].ghost.x-12,F[1].y-55,24,50);ctx.setLineDash([]);ctx.fillStyle='#3ecfff44';ctx.font='7px Space Mono,monospace';ctx.textAlign='center';ctx.fillText('PREDICTED',F[1].ghost.x,F[1].y-60);}
    F.forEach(f=>{neonBar(ctx,f.x-12,f.y-55,24,50,f.col+'22');ctx.strokeStyle=f.col;ctx.lineWidth=2;glow(ctx,f.col,8);ctx.strokeRect(f.x-12,f.y-55,24,50);noGlow(ctx);neonNode(ctx,f.x,f.y-65,10,f.col);ctx.fillStyle=f.col;ctx.font='7px Space Mono,monospace';ctx.textAlign='center';ctx.fillText(f.label,f.x,f.y+12);const hbx=f===F[0]?20:W-120;ctx.fillStyle='#111';ctx.fillRect(hbx,H-16,100,6);ctx.fillStyle=f.col;ctx.fillRect(hbx,H-16,f.hp,6);});
    corrections.forEach(c=>{const a=c.t/30;ctx.strokeStyle=`rgba(176,65,224,${a})`;ctx.lineWidth=2;glow(ctx,'#b041e0',8*a);ctx.beginPath();ctx.arc(c.x,c.y,8,0,Math.PI*2);ctx.stroke();noGlow(ctx);ctx.fillStyle=`rgba(176,65,224,${a})`;ctx.font='7px Space Mono,monospace';ctx.textAlign='center';ctx.fillText('ROLLBACK',c.x,c.y-12);});

function vizMathViz(canvas,ctx,W,H){
  stop();cancelRaf();clearMobileControls();
  let t=0;
  // ── UNIT CIRCLE (left panel) ─────────────────────────────────
  const ucx=W*0.22, ucy=H*0.42, ucr=Math.min(W*0.16,H*0.34);
  let ucAngle=0.6; // draggable
  // ── DOT PRODUCT (middle) ─────────────────────────────────────
  const dpx=W*0.52, dpy=H*0.35;
  let dpAngle=0.4;
  // ── LERP / EXP DECAY (right) ─────────────────────────────────
  const lpx=W*0.78, lpy=H*0.38, lpLen=Math.min(W*0.16,60);
  let lerpT=0, lerpDir=1, expVal=1.0;
  // ── TAB STATE ────────────────────────────────────────────────
  const tabs=['VECTORS','DOT','LERP','KINEMATICS'];
  let activeTab=0;
  let drag=null; // 'uc'|'dp'
  // for kinematics
  let kpos=W*0.15, kvel=0, kacc=0.08, kfric=0.985;
  let ktrail=[];
  // ── INPUT ─────────────────────────────────────────────────────
  function getXY(e){const r=canvas.getBoundingClientRect();return{x:(e.clientX-r.left)*(W/r.width),y:(e.clientY-r.top)*(H/r.height)};}
  canvas.onmousedown=e=>{
    const{x,y}=getXY(e);
    // tab clicks
    const tw=Math.floor(W/tabs.length);
    if(y>H-26&&y<H){activeTab=Math.floor(x/tw);return;}
    // unit circle drag
    const px=ucx+Math.cos(ucAngle)*ucr, py=ucy+Math.sin(ucAngle)*ucr;
    if(Math.hypot(x-px,y-py)<18){drag='uc';return;}
    // dot product drag
    const dp2x=dpx+Math.cos(dpAngle)*50, dp2y=dpy+Math.sin(dpAngle)*50;
    if(Math.hypot(x-dp2x,y-dp2y)<18){drag='dp';return;}
    // kinematics kick
    if(activeTab===3){kvel+=1.5; ktrail=[];}
  };
  canvas.onmousemove=e=>{
    const{x,y}=getXY(e);
    if(drag==='uc'){ucAngle=Math.atan2(y-ucy,x-ucx);}
    if(drag==='dp'){dpAngle=Math.atan2(y-dpy,x-dpx);}
  };
  canvas.onmouseup=()=>drag=null;

  function draw(){
    t+=1/60;
    lerpT+=lerpDir*0.008; if(lerpT>1||lerpT<0)lerpDir*=-1; lerpT=Math.max(0,Math.min(1,lerpT));
    expVal*=Math.exp(-3/60); if(expVal<0.01)expVal=1.0;
    // kinematics
    if(activeTab===3){kvel*=kfric;kpos+=kvel;if(kpos>W-30){kpos=W-30;kvel*=-0.5;}if(kpos<30){kpos=30;kvel*=-0.5;}ktrail.push({x:kpos,t:1.0});for(let i=ktrail.length-1;i>=0;i--){ktrail[i].t-=0.018;if(ktrail[i].t<0)ktrail.splice(i,1);}}

    ctx.fillStyle='#06050a'; ctx.fillRect(0,0,W,H);
    atmosBg(ctx,22,5,30,0.12);

    const tab=tabs[activeTab];

    // ── VECTORS tab ──────────────────────────────────────────
    if(tab==='VECTORS'){
      // unit circle
      ctx.strokeStyle='#2a1e3a'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.arc(ucx,ucy,ucr,0,Math.PI*2); ctx.stroke();
      // axes
      neonLine(ctx,ucx-ucr-8,ucy,ucx+ucr+8,ucy,'#2a1e3a',1);
      neonLine(ctx,ucx,ucy-ucr-8,ucx,ucy+ucr+8,'#2a1e3a',1);
      // angle arc
      ctx.strokeStyle='#e8399a44'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.arc(ucx,ucy,ucr*0.35,0,ucAngle,ucAngle<0); ctx.stroke();
      // cos line (horizontal)
      const cosV=Math.cos(ucAngle), sinV=Math.sin(ucAngle);
      neonLine(ctx,ucx,ucy,ucx+cosV*ucr,ucy,'#ffd080',1.5);
      // sin line (vertical)
      neonLine(ctx,ucx+cosV*ucr,ucy,ucx+cosV*ucr,ucy+sinV*ucr,'#3dd68c',1.5);
      // hypotenuse (the vector)
      neonLine(ctx,ucx,ucy,ucx+cosV*ucr,ucy+sinV*ucr,'#e8399a',2);
      neonNode(ctx,ucx+cosV*ucr,ucy+sinV*ucr,7,'#e8399a');
      ctx.fillStyle='#ffd080'; ctx.font='9px Space Mono,monospace'; ctx.textAlign='center';
      ctx.fillText('cos='+cosV.toFixed(2),ucx+cosV*ucr*0.5,ucy-6);
      ctx.fillStyle='#3dd68c'; ctx.textAlign='left';
      ctx.fillText('sin='+sinV.toFixed(2),ucx+cosV*ucr+4,ucy+sinV*ucr*0.5+4);
      ctx.fillStyle='#e8399a88'; ctx.textAlign='center';
      ctx.fillText('angle: '+(ucAngle*180/Math.PI|0)+'°',ucx,ucy+ucr+18);
      // length label on vector
      ctx.fillStyle='#e8399a'; ctx.fillText('length=1.0',ucx+(cosV*ucr)*0.5-12,ucy+sinV*ucr*0.5-8);
      ctx.fillStyle='#5c4870'; ctx.font='8px Space Mono,monospace';
      ctx.fillText('drag point around circle',ucx,ucy-ucr-14);
    }

    // ── DOT tab ──────────────────────────────────────────────
    if(tab==='DOT'){
      const AX=0.5, AY=0; // vector A fixed (pointing right)
      const BX=Math.cos(dpAngle), BY=Math.sin(dpAngle);
      const dot=AX*BX+AY*BY; // normalized dot
      const vlen=70;
      neonLine(ctx,dpx,dpy,dpx+AX*vlen,dpy+AY*vlen,'#ffd080',2.5);
      neonNode(ctx,dpx+AX*vlen,dpy+AY*vlen,7,'#ffd080');
      ctx.fillStyle='#ffd080'; ctx.font='8px Space Mono,monospace'; ctx.textAlign='center';
      ctx.fillText('A',dpx+AX*vlen+12,dpy+AY*vlen+4);
      neonLine(ctx,dpx,dpy,dpx+BX*vlen,dpy+BY*vlen,'#e8399a',2.5);
      neonNode(ctx,dpx+BX*vlen,dpy+BY*vlen,7,'#e8399a');
      ctx.fillStyle='#e8399a'; ctx.fillText('B',dpx+BX*vlen+12,dpy+BY*vlen+4);
      // projection of B onto A
      const projLen=dot*vlen;
      neonLine(ctx,dpx,dpy,dpx+AX*projLen,dpy,'#c09fff55',1.5);
      ctx.strokeStyle='#c09fff55'; ctx.lineWidth=1; ctx.setLineDash([3,3]);
      ctx.beginPath(); ctx.moveTo(dpx+BX*vlen,dpy+BY*vlen); ctx.lineTo(dpx+AX*projLen,dpy); ctx.stroke(); ctx.setLineDash([]);
      // dot value display
      const col=dot>0?'#3dd68c':dot<0?'#b041e0':'#ffd080';
      ctx.fillStyle=col; ctx.font='bold 22px Space Mono,monospace'; ctx.textAlign='center';
      ctx.fillText(dot.toFixed(2),dpx,dpy+90);
      ctx.fillStyle='#5c4870'; ctx.font='8px Space Mono,monospace';
      ctx.fillText(dot>0.7?'mostly same dir':dot<-0.7?'mostly opposite':Math.abs(dot)<0.15?'perpendicular':'partial align',dpx,dpy+110);
      ctx.fillStyle='#5c4870'; ctx.fillText('A.dot(B)',dpx,dpy+125);
      ctx.fillStyle='#5c4870'; ctx.font='8px Space Mono,monospace'; ctx.fillText('drag B',dpx+BX*vlen+5,dpy+BY*vlen+18);
    }

    // ── LERP tab ─────────────────────────────────────────────
    if(tab==='LERP'){
      const ly=H*0.32, lA=W*0.1, lB=W*0.88;
      // lerp track
      neonLine(ctx,lA,ly,lB,ly,'#2a1e3a',2);
      neonNode(ctx,lA,ly,6,'#5c4870');
      neonNode(ctx,lB,ly,6,'#5c4870');
      const lpos=lA+(lB-lA)*lerpT;
      neonNode(ctx,lpos,ly,10,'#e8399a');
      ctx.fillStyle='#e8399a'; ctx.font='9px Space Mono,monospace'; ctx.textAlign='center';
      ctx.fillText('lerp(A,B,'+lerpT.toFixed(2)+')',lpos,ly-16);
      ctx.fillStyle='#ffd080'; ctx.fillText('A',lA,ly+18); ctx.fillStyle='#ffd080'; ctx.fillText('B',lB,ly+18);

      // exp decay bar
      const ey=H*0.58, ex=W*0.1, ew=W*0.8;
      ctx.fillStyle='#1c152a'; ctx.fillRect(ex,ey-10,ew,20);
      ctx.fillStyle='#e8399a44'; ctx.fillRect(ex,ey-10,ew*expVal,20);
      neonLine(ctx,ex,ey-10,ex+ew*expVal,ey-10,'#e8399a',2);
      neonLine(ctx,ex,ey+10,ex+ew*expVal,ey+10,'#e8399a',2);
      ctx.fillStyle='#e8399a'; ctx.font='9px Space Mono,monospace'; ctx.textAlign='center';
      ctx.fillText('exp decay: '+expVal.toFixed(2),ex+ew*0.5,ey+28);
      ctx.fillStyle='#5c4870'; ctx.font='8px Space Mono,monospace';
      ctx.fillText('value *= exp(-3 * delta)  →  resets to 1.0 at zero',W/2,ey+44);
      // inv square
      const isy=H*0.78;
      for(let d=0;d<20;d++){
        const dist=0.4+d*0.3, f=Math.min(1,1/(dist*dist));
        const bx=W*0.08+d*(W*0.84/20), bh=f*55;
        ctx.fillStyle=`rgba(232,57,154,${f*0.8})`;
        ctx.fillRect(bx,isy-bh,W*0.84/21,bh);
      }
      ctx.fillStyle='#5c4870'; ctx.font='8px Space Mono,monospace'; ctx.textAlign='center';
      ctx.fillText('1/distance\u00b2 \u2014 inverse square law (explosion falloff)',W/2,isy+14);
    }

    // ── KINEMATICS tab ───────────────────────────────────────
    if(tab==='KINEMATICS'){
      const ky=H*0.6;
      neonLine(ctx,0,ky,W,ky,'#2a1e3a',1.5);
      // trail
      for(const pt of ktrail){
        ctx.fillStyle=`rgba(232,57,154,${pt.t*0.5})`;
        ctx.beginPath(); ctx.arc(pt.x,ky-18,4*pt.t,0,Math.PI*2); ctx.fill();
      }
      // box
      glow(ctx,'#e8399a',10); ctx.fillStyle='#e8399a22'; ctx.strokeStyle='#e8399a'; ctx.lineWidth=2;
      ctx.fillRect(kpos-16,ky-36,32,32); ctx.strokeRect(kpos-16,ky-36,32,32); noGlow(ctx);
      // velocity arrow
      if(Math.abs(kvel)>0.5){
        neonLine(ctx,kpos,ky-20,kpos+kvel*12,ky-20,'#ffd080',2);
        ctx.fillStyle='#ffd080'; ctx.font='8px Space Mono,monospace'; ctx.textAlign='center';
        ctx.fillText('vel: '+kvel.toFixed(1),kpos+kvel*8,ky-32);
      }
      // equations
      const eqs=['velocity += acceleration * delta','position += velocity * delta','velocity *= (1 - friction * delta)','velocity.y -= gravity * delta'];
      ctx.font='8px Space Mono,monospace'; ctx.textAlign='left';
      eqs.forEach((eq,i)=>{
        const active=(i===0&&Math.abs(kvel)<0.5)||(i===1&&Math.abs(kvel)>0.2)||(i===2&&Math.abs(kvel)>0.1);
        ctx.fillStyle=active?'#e8399a':'#3a2850';
        ctx.fillText(eq, 12, H*0.12+i*18);
      });
      ctx.fillStyle='#5c4870'; ctx.font='8px Space Mono,monospace'; ctx.textAlign='center';
      ctx.fillText('tap canvas to kick',W/2,H-32);
    }

    // ── TABS ─────────────────────────────────────────────────
    const tw=Math.floor(W/tabs.length);
    tabs.forEach((label,i)=>{
      const tx=i*tw, ty=H-24;
      ctx.fillStyle=i===activeTab?'#e8399a22':'#09080e';
      ctx.strokeStyle=i===activeTab?'#e8399a':'#1e1428'; ctx.lineWidth=1;
      ctx.fillRect(tx+1,ty,tw-2,22); ctx.strokeRect(tx+1,ty,tw-2,22);
      ctx.fillStyle=i===activeTab?'#e8399a':'#5c4870';
      ctx.font='7px Space Mono,monospace'; ctx.textAlign='center';
      ctx.fillText(label,tx+tw/2,ty+14);
    });
    rafId=requestAnimationFrame(draw);
  }
  draw();
  stopFn=()=>{canvas.onmousedown=null;canvas.onmousemove=null;canvas.onmouseup=null;clearMobileControls();};
}

function initHero(){
  const c=document.getElementById('hero');
  const par=c.parentElement; c.width=par.offsetWidth; c.height=par.offsetHeight;
  const ctx=c.getContext('2d'); const W=c.width, H=c.height;
  const CX=W*0.52, CY=H*0.48;

  // ── BAT (normalized -1..1) ───────────────────────────────────────
  const BAT=[
    [-1.0, 0.08],[-0.80,-0.26],[-0.54,-0.40],[-0.30,-0.10],
    [-0.22,-0.52],[-0.09,-0.70],[0.0,-0.50],
    [0.09,-0.70],[0.22,-0.52],[0.30,-0.10],
    [0.54,-0.40],[0.80,-0.26],[1.0, 0.08],
    [0.74, 0.40],[0.44, 0.18],[0.18, 0.30],
    [0.07, 0.55],[0.0, 0.66],[-0.07, 0.55],
    [-0.18, 0.30],[-0.44, 0.18],[-0.74, 0.40]
  ]; // 22 points
  // internal wing veins: [from_idx, to_idx]
  const VEINS=[[3,0],[3,21],[9,12],[9,13],[3,16],[9,16]];

  // ── SPIDERWEB ────────────────────────────────────────────────────
  const SPOKES=8, RINGS=5;
  function webPt(spoke, ring){
    const a=spoke/SPOKES*Math.PI*2 - Math.PI/2;
    const r=(ring+1)/RINGS;
    return [Math.cos(a)*r, Math.sin(a)*r];
  }

  let t=0;
  // Bat drifts gently
  let bx=0, by=-0.05, bdx=0.004, bdy=0.002;
  const BSCALE=Math.min(W,H)*0.38;
  const WSCALE=Math.min(W,H)*0.44;

  // Morph: 0=web 1=bat, cycles ~14s
  function morphVal(){ return (Math.sin(t*Math.PI/7)+1)*0.5; }

  function drawWeb(alpha){
    if(alpha<0.01) return;
    ctx.globalAlpha=alpha*0.9;
    ctx.strokeStyle='#e8399a'; ctx.lineWidth=0.6;
    ctx.shadowColor='#e8399a'; ctx.shadowBlur=5;
    // spokes
    for(let s=0;s<SPOKES;s++){
      const [ox,oy]=webPt(s,RINGS-1);
      ctx.beginPath(); ctx.moveTo(CX,CY);
      ctx.lineTo(CX+ox*WSCALE, CY+oy*WSCALE); ctx.stroke();
    }
    // rings (polygon)
    for(let r=0;r<RINGS;r++){
      ctx.beginPath();
      for(let s=0;s<=SPOKES;s++){
        const [ox,oy]=webPt(s%SPOKES,r);
        s===0?ctx.moveTo(CX+ox*WSCALE,CY+oy*WSCALE):ctx.lineTo(CX+ox*WSCALE,CY+oy*WSCALE);
      }
      ctx.stroke();
    }
    ctx.globalAlpha=1; ctx.shadowBlur=0;
  }

  function drawBat(alpha){
    if(alpha<0.01) return;
    ctx.globalAlpha=alpha;
    const sc=BSCALE*(1+Math.sin(t*1.6)*0.025); // subtle breathing
    const wx=CX+bx*BSCALE*0.3, wy=CY+by*BSCALE*0.3;
    ctx.strokeStyle='#e8399a'; ctx.lineWidth=1;
    ctx.shadowColor='#e8399a'; ctx.shadowBlur=8;
    // outline
    ctx.beginPath();
    BAT.forEach(([x,y],i)=>{
      const px=wx+x*sc, py=wy+y*sc;
      i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);
    });
    ctx.closePath(); ctx.stroke();
    // wing veins
    ctx.lineWidth=0.5; ctx.shadowBlur=4;
    for(const [a,b] of VEINS){
      ctx.beginPath();
      ctx.moveTo(wx+BAT[a][0]*sc, wy+BAT[a][1]*sc);
      ctx.lineTo(wx+BAT[b][0]*sc, wy+BAT[b][1]*sc);
      ctx.stroke();
    }
    ctx.globalAlpha=1; ctx.shadowBlur=0;
  }

  function hf(){
    t+=1/60;
    bx+=bdx; by+=bdy;
    if(bx<-0.4||bx>0.4) bdx*=-1;
    if(by<-0.25||by>0.15) bdy*=-1;
    ctx.clearRect(0,0,W,H);
    const m=morphVal();
    // web fades in when m→0, bat when m→1
    drawWeb((1-m)*0.85);
    drawBat(m*0.85);
    requestAnimationFrame(hf);
  }
  hf();
}


function buildNav(){
  const nav=document.getElementById('main-nav');
  const titles=["Jolt & Physics Frame", "Player Controller", "Saves & Snapshots", "Bodies & Layers", "Forces & Joints", "Raycasts & Queries", "Verlet Ropes & Cloth", "Jiggle & Weight Maps", "Voronoi Fracture", "Slicing & Dismemberment", "Explosions & Fire", "Ballistics & Materials", "Ragdoll & Combat", "The Networked Brawler", "Math Appendix"];
  for(let i=0;i<LESSONS.length;i++){
    const btn=document.createElement('button');
    btn.className='nav-btn';
    btn.innerHTML='<span class="nb-num">L'+String(i+1).padStart(2,'0')+'</span><span class="nb-title">'+titles[i]+'</span>';
    btn.title=LESSONS[i].title;
    btn.onclick=()=>loadLesson(i);
    nav.appendChild(btn);
  }
}

window.addEventListener('resize',()=>{const c=document.getElementById('viz-canvas');const area=c.parentElement;if(area.clientWidth>0){c.width=area.clientWidth;c.height=area.clientHeight;stop();cancelRaf();buildViz(LESSONS[cur].viz);}});
function clearMobileControls(){
  const mc=document.getElementById('mob-ctrl');
  if(mc)mc.innerHTML='';
}
function makeMCBtn(mc,cfg){
  const b=document.createElement('div');
  b.className='mc-btn'+(cfg.cls?' '+cfg.cls:'');
  b.textContent=cfg.label;
  b.style.cssText=`left:${cfg.x};bottom:${cfg.y};width:${cfg.w||'52px'};height:${cfg.h||'44px'};`;
  if(cfg.ondown){b.addEventListener('touchstart',e=>{e.preventDefault();b.classList.add('held');cfg.ondown();},{passive:false});b.addEventListener('mousedown',e=>{e.preventDefault();b.classList.add('held');cfg.ondown();});}
  if(cfg.onup){b.addEventListener('touchend',e=>{e.preventDefault();b.classList.remove('held');cfg.onup();},{passive:false});b.addEventListener('mouseup',e=>{e.preventDefault();b.classList.remove('held');cfg.onup();});}
  if(cfg.ontap){b.addEventListener('touchstart',e=>{e.preventDefault();cfg.ontap();},{passive:false});b.addEventListener('click',cfg.ontap);}
  mc.appendChild(b);return b;
}
function addTouchToMouse(el){
  let _ts=0,_tx=0,_ty=0;
  function te(e){
    e.preventDefault();
    const t=e.touches[0]||e.changedTouches[0];
    const type=e.type==='touchstart'?'mousedown':e.type==='touchend'?'mouseup':'mousemove';
    el.dispatchEvent(new MouseEvent(type,{clientX:t.clientX,clientY:t.clientY,bubbles:true}));
    if(e.type==='touchstart'){_ts=Date.now();_tx=t.clientX;_ty=t.clientY;}
    if(e.type==='touchend'){
      const moved=Math.hypot(t.clientX-_tx,t.clientY-_ty);
      if(Date.now()-_ts<300&&moved<12)
        el.dispatchEvent(new MouseEvent('click',{clientX:t.clientX,clientY:t.clientY,bubbles:true}));
    }
  }
  el.addEventListener('touchstart',te,{passive:false});
  el.addEventListener('touchmove',te,{passive:false});
  el.addEventListener('touchend',te,{passive:false});
}
window.addEventListener('DOMContentLoaded',()=>{
  addTouchToMouse(document.getElementById('viz-canvas'));buildNav();loadLesson(0);initHero();});
