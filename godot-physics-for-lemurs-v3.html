/* ── MOBILE CONTROLS ── */
#mob-ctrl{position:absolute;inset:0;pointer-events:none;z-index:10;}
.mc-btn{position:absolute;pointer-events:all;background:rgba(232,57,154,.12);border:1.5px solid rgba(232,57,154,.38);color:var(--accent);font-family:'Space Mono',monospace;font-size:.75rem;font-weight:700;border-radius:4px;display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none;-webkit-user-select:none;transition:background .1s;}

@media(min-width:861px){#mob-ctrl .mc-btn{display:none;}}

</style>

<body>
<header>
  <canvas id="hero"></canvas>

    <p class="subtitle">// what the docs omit · jolt → controllers → soft bodies → destruction → rollback brawler</p>
    <p class="disclaimer">◈ Godot 4.3+ · Jolt Physics · GDScript · multiplayer-aware · end goal: a rollback-compatible networked brawler</p>
  </div>
</header>
<div id="progress-bar"><div id="progress-fill"></div></div>
<nav id="main-nav"></nav>
<main>
  <div class="lesson-panel" id="lesson-panel">
    <div class="lesson-title" id="lesson-title"></div>

    </div>

  </div>
</main>
<script>
const LESSONS = [
{
  title: "L01 — Jolt Physics & The Physics Frame",
  subtitle: "Why Jolt changed everything · fixed timestep · physics interpolation",
  vizLabel: "VIZ: GODOTPHYSICS vs JOLT",
  viz: "jolt",
  snippet: `<span class="cm"># step one before you write a single line of physics code.</span>
<span class="cm"># Project Settings → Physics → 3D → Physics Engine → JoltPhysics3D</span>
<span class="cm"># restart editor. done. your scene still works. the simulation doesn't.</span>

<span class="kw">extends</span> RigidBody3D

<span class="kw">func</span> <span class="fn">_ready</span>() -> <span class="kw">void</span>:
    <span class="cm"># 60Hz fixed. adjust only if you have a reason (you probably don't).</span>
    Engine.physics_ticks_per_second = <span class="nm">60</span>
    <span class="cm"># free visual smoothness at any refresh rate. just enable it.</span>
    <span class="cm"># ProjectSettings → Physics → Common → physics_interpolation = true</span>

<span class="kw">func</span> <span class="fn">_physics_process</span>(delta: <span class="kw">float</span>) -> <span class="kw">void</span>:
    <span class="cm"># delta is ALWAYS 1.0/60. no drift. no variance. this is why rollback works.</span>
    <span class="cm"># ALL physics code lives here. moving a body in _process is a trap.</span>
    <span class="kw">var</span> state := PhysicsServer3D.<span class="fn">body_get_direct_state</span>(<span class="fn">get_rid</span>())
    <span class="kw">var</span> vel: Vector3 = state.linear_velocity
    <span class="kw">var</span> contacts: <span class="kw">int</span> = state.get_contact_count()

<span class="kw">func</span> <span class="fn">_process</span>(delta: <span class="kw">float</span>) -> <span class="kw">void</span>:
    <span class="cm"># rendering code only. never touch physics bodies here.</span>
    <span class="cm"># if you query a rigid body position in _process without interpolation,</span>
    <span class="cm"># it stutters at the physics rate. you've been warned.</span>
    <span class="kw">pass</span>`,
  body: `<p>GodotPhysics, the default engine, has been shipping with a known tunneling bug since Godot 3. Boxes fall through floors under load. Stacking collapses. Constraints jitter. Everybody just… accepted it. Then Jolt Physics — the same engine running Horizon: Forbidden West — got merged into Godot 4.3 as a one-checkbox swap. No code changes. No scene migration. One setting, completely different simulation.</p>
<div class="step-card"><span class="step-num">ENABLE JOLT RIGHT NOW</span>Project Settings → Physics → 3D → Physics Engine → set to <code>JoltPhysics3D</code>. Restart the editor. That's it. Every RigidBody, StaticBody, and CharacterBody in your project now uses Jolt. If you have an existing scene, open it and press Play — same scene, no tunneling. Do this before writing any physics code. Changing engines later with a full game is a bad time.</div>
<div class="step-card"><span class="step-num">_physics_process IS YOUR WORLD</span>Godot runs two update loops. <code>_process(delta)</code> runs every render frame — delta varies with GPU load, could be 4ms, could be 22ms, unreliable for physics. <code>_physics_process(delta)</code> runs on a fixed schedule (default 60 ticks/sec) regardless of framerate. Delta is always exactly <code>1.0 / Engine.physics_ticks_per_second</code>. Every force, raycast, velocity change, collision check — it all goes in <code>_physics_process</code>. Moving a RigidBody in <code>_process</code> is one of the top five ways to cause physics bugs that take three days to track down. Don't.</div>
<div class="vocab"><span class="vt">"Jolt Physics"</span> — Open-source physics by Jorrit Rouwe, used in Horizon: Forbidden West, now in Godot 4.3+. Faster, more stable, zero tunneling under normal conditions, better constraint solving than GodotPhysics. Enable: Project Settings → Physics → 3D → Physics Engine → JoltPhysics3D. Your existing scenes just work. There's no reason not to.</div>
<div class="vocab"><span class="vt">"_physics_process(delta)"</span> — Godot's fixed-timestep callback. Guaranteed to run at exactly <code>physics_ticks_per_second</code> Hz regardless of render framerate. Delta is always <code>1.0 / 60</code> at default settings. This predictability is what makes physics deterministic — same inputs produce identical results every time. It's also why rollback networking is possible. All physics logic belongs here.</div>
<div class="vocab"><span class="vt">"Physics Interpolation"</span> — When physics runs at 60Hz but the display refreshes at 144Hz, objects visually stutter at 60fps even though the game renders faster. Physics interpolation blends the previous and current physics state for rendering, producing smooth visual motion without changing the simulation rate. Enable it in Project Settings → Physics → Common → Physics Interpolation. It's free. Turn it on.</div>
<div class="tip">Run a stress test before committing to any physics architecture: 50 RigidBody3D boxes dropping into a concave StaticBody3D bowl. Run with GodotPhysics, count how many tunnel through. Switch to Jolt, run again. The number should be zero or near-zero. Now enable physics interpolation and run at 144Hz — the difference in visual smoothness is immediate. These 10 minutes will save you hours of "why is my game jittery" debugging later.</div>
<div class="artists">Horizon: Forbidden West (Jolt in production AAA — this is what your scenes now run on), Glenn Fiedler's "Fix Your Timestep!" (the definitive fixed-timestep article, read it once and you'll never write frame-rate-dependent physics again), Godot 4.3 docs: Jolt integration (has the complete feature comparison vs GodotPhysics)</div>
<div class="spamton">GodotPhysics shipped as the default for years. Everyone accepted that objects tunneling through floors was just a physics tax you paid. It wasn't. It was never supposed to work that way. <strong>Jolt fixes it. One project setting. The engine they don't tell you to use first is the one that actually works. Enable it before you write a line.</strong></div>
<div class="challenge">Create a stress test scene: 50 RigidBody3D boxes, a concave StaticBody3D bowl (use a CSGCombiner with a subtracted sphere to make the concave shape), no other code. Run it with GodotPhysics, note how many boxes fall through. Switch to Jolt (Project Settings → Physics → 3D → Physics Engine → JoltPhysics3D, restart), run the same scene. Count again. Enable physics interpolation. Watch it at 144Hz. Screenshot both results. This is your permanent reminder that the right default matters. Every project you start from now on: Jolt on, interpolation on, before anything else.</div>
<div class="net-note">The physics tick IS the network tick in a rollback game. <code>_physics_process</code> fires at a deterministic rate — the server and all clients run the same simulation, and rollback works by rewinding to a specific tick and replaying from there. For this to work, physics must be deterministic: same inputs at the same tick must produce identical positions on every machine. Jolt is more deterministic than GodotPhysics across platforms. However, for gameplay-critical values like position or health, use integer frame counters instead of float timers — integers are bit-identical across CPUs, floats can drift by tiny amounts that compound over time.</div>`
},
{
  title: "L02 — The Player Controller That Feels Amazing",
  subtitle: "acceleration curves · coyote time · input buffering · variable jump height",
  vizLabel: "VIZ: CONTROLLER FEEL DEMO",
  viz: "controller",
  snippet: `<span class="cm"># the three numbers that determine whether your game feels good.</span>
<span class="cm"># export all of them. tune without touching code.</span>

<span class="kw">extends</span> CharacterBody3D

<span class="dc">@export</span> <span class="kw">var</span> speed: <span class="kw">float</span>         = <span class="nm">320.0</span>  <span class="cm"># px/sec max velocity</span>
<span class="dc">@export</span> <span class="kw">var</span> accel: <span class="kw">float</span>         = <span class="nm">2400.0</span> <span class="cm"># how fast we reach speed</span>
<span class="dc">@export</span> <span class="kw">var</span> decel: <span class="kw">float</span>         = <span class="nm">3200.0</span> <span class="cm"># higher than accel = snappy stops</span>
<span class="dc">@export</span> <span class="kw">var</span> jump_vel: <span class="kw">float</span>     = <span class="nm">680.0</span>
<span class="dc">@export</span> <span class="kw">var</span> air_accel_mult: <span class="kw">float</span> = <span class="nm">0.6</span>   <span class="cm"># less control in air</span>
<span class="dc">@export</span> <span class="kw">var</span> coyote_frames: <span class="kw">int</span>   = <span class="nm">6</span>      <span class="cm"># Celeste uses 6. so do you.</span>
<span class="dc">@export</span> <span class="kw">var</span> jump_buf_frames: <span class="kw">int</span> = <span class="nm">8</span>      <span class="cm"># remember the press for 8 ticks</span>

<span class="cm"># integers, not floats. integers don't drift across rollback resimulations.</span>
<span class="kw">var</span> _coyote: <span class="kw">int</span>   = <span class="nm">0</span>
<span class="kw">var</span> _jump_buf: <span class="kw">int</span> = <span class="nm">0</span>
<span class="kw">const</span> GRAVITY: <span class="kw">float</span> = <span class="nm">1960.0</span>

<span class="kw">func</span> <span class="fn">_physics_process</span>(delta: <span class="kw">float</span>) -> <span class="kw">void</span>:
    <span class="kw">var</span> on_floor := <span class="fn">is_on_floor</span>()
    <span class="cm"># coyote: count down from 6 after leaving ground</span>
    <span class="kw">if</span> on_floor: _coyote = coyote_frames
    <span class="kw">elif</span> _coyote > <span class="nm">0</span>: _coyote -= <span class="nm">1</span>
    <span class="cm"># buffer: store the press for up to 8 frames</span>
    <span class="kw">if</span> Input.<span class="fn">is_action_just_pressed</span>(<span class="st">"jump"</span>): _jump_buf = jump_buf_frames
    <span class="kw">elif</span> _jump_buf > <span class="nm">0</span>: _jump_buf -= <span class="nm">1</span>
    <span class="cm"># jump fires when both counters are nonzero</span>
    <span class="kw">if</span> _jump_buf > <span class="nm">0</span> <span class="kw">and</span> _coyote > <span class="nm">0</span>:
        velocity.y = jump_vel; _coyote = <span class="nm">0</span>; _jump_buf = <span class="nm">0</span>
    <span class="cm"># variable height: cut velocity on early release</span>
    <span class="kw">if</span> <span class="kw">not</span> Input.<span class="fn">is_action_pressed</span>(<span class="st">"jump"</span>) <span class="kw">and</span> velocity.y > <span class="nm">0</span>:
        velocity.y *= <span class="nm">0.85</span>
    <span class="kw">var</span> dir := Input.<span class="fn">get_axis</span>(<span class="st">"move_left"</span>, <span class="st">"move_right"</span>)
    <span class="kw">var</span> a := accel <span class="kw">if</span> on_floor <span class="kw">else</span> accel * air_accel_mult
    <span class="kw">var</span> d := decel <span class="kw">if</span> on_floor <span class="kw">else</span> decel * <span class="nm">0.4</span>
    velocity.x = <span class="fn">move_toward</span>(velocity.x, dir * speed, (a <span class="kw">if</span> dir != <span class="nm">0</span> <span class="kw">else</span> d) * delta)
    <span class="kw">if</span> <span class="kw">not</span> on_floor: velocity.y -= GRAVITY * delta
    <span class="fn">move_and_slide</span>()`,
  body: `<p>Here's the thing about player controllers: nobody notices when they feel good. They only notice when they feel wrong. The game gets called "floaty" or "stiff" or "unresponsive" and the review docks a point and you spend a week trying to figure out what went wrong. The answer is almost always one of three things: you're not doing coyote time, you're not buffering jump inputs, or you're snapping to full speed instead of accelerating. All three are 5-10 lines of code each.</p>
<div class="step-card"><span class="step-num">ACCELERATION CURVE</span>Raw <code>move_and_slide()</code> with instant velocity assignment feels like ice skating. Replace it with <code>velocity.x = move_toward(velocity.x, target_speed, accel * delta)</code>. Now movement has momentum. The <code>accel</code> and <code>decel</code> values are separate — you usually want decel 30-50% higher than accel so stopping feels snappy. Export both with <code>@export</code> so you can tune without restarting. High accel = Mega Man (twitchy). Low accel = Dark Souls (committed). This one change is the entire "weight" of your game.</div>
<div class="step-card"><span class="step-num">COYOTE + BUFFER (BOTH REQUIRED)</span>Coyote time: when the player walks off a ledge, give them a 6-frame grace window to still jump. Track it as an integer: set to 6 when grounded, decrement each tick when airborne. Jump is allowed if coyote > 0. Input buffer: when jump is pressed, store it for 8 frames. If the player lands within that window, fire the jump. Both timers are integers — never floats. Together they make every jump feel intentional instead of frame-perfect. Celeste, Hollow Knight, Dead Cells all do this. You should too.</div>
<div class="vocab"><span class="vt">"Coyote Time"</span> — A jump grace period after leaving a platform, typically 5-6 frames (~83ms at 60Hz). Named after Wile E. Coyote. Without it, players feel robbed when they "were on the ledge" but the engine disagrees. Track as an int: <code>if is_on_floor(): coyote = 6 else: coyote -= 1</code>. Jump is valid when <code>coyote > 0</code>. Never a float. This one feature accounts for approximately 40% of "why does movement feel good in this game."</div>
<div class="vocab"><span class="vt">"Input Buffering"</span> — Storing a button press for N frames and executing it when the action first becomes valid. Player presses jump 5 frames before landing — the buffer fires it on contact. Without it, players must time inputs to within 1/60th of a second. With it, the game feels like it read your mind. 8-frame buffer is standard. Implement as an int: <code>if Input.is_action_just_pressed("jump"): jump_buf = 8 else: if jump_buf > 0: jump_buf -= 1</code>.</div>
<div class="vocab"><span class="vt">"Variable Jump Height"</span> — Cutting vertical velocity when jump is released early, giving players control over jump arc height. Implementation: <code>if not Input.is_action_pressed("jump") and velocity.y < 0: velocity.y *= 0.85</code> in <code>_physics_process</code>. Tap = short hop. Hold = full jump. This single check makes platforming feel expressive rather than mechanical. It's in every platformer worth playing. Check Celeste's source — it's literally this.</div>
<div class="tip">Export every tuning parameter with <code>@export_range</code>: speed, accel, decel, coyote_frames, jump_buffer_frames, jump_velocity, air_control_mult. Then hand the scene to someone who doesn't code and watch them tune a completely different-feeling character in under two minutes without touching a line of GDScript. That's the workflow — designers tune exported values, programmers write the systems. Keep them separate.</div>
<div class="artists">Celeste (open source — download it, read <code>Player.cs</code>, the coyote and buffer code is all there), Hollow Knight (heavy + still responsive — study how it handles coyote on wall-clings), Rivals of Aether (indie rollback brawler with public frame data — great reference for integer-based state), Dead Cells (snappy + momentum — the decel value is noticeably higher than accel)</div>
<div class="spamton">Celeste's speedrun community exists because someone chose three integers correctly and never touched them again. Coyote: 6 frames. Buffer: 8 frames. Variable height: yes. <strong>Not the pixel art. Not the soundtrack. Three integers, never in the tutorial, never in the documentation. The entire feeling of the game lives in those numbers. They were always available. Nobody pointed at them.</strong></div>
<div class="challenge">Build the controller from scratch in order. Step 1: raw <code>move_and_slide()</code> with instant velocity — note how it ice-skates. Step 2: add <code>move_toward</code> acceleration/decel — note the weight. Step 3: add coyote time (6 frames) — notice how ledge jumps stop failing. Step 4: add input buffer (8 frames) — notice how jumps start feeling responsive. Step 5: add variable height on release — notice how jumping becomes expressive. Step 6: <code>@export_range</code> everything with reasonable min/max. Each step should feel like an observable improvement. If it doesn't, you've implemented something wrong. Test on a scene with a platform with a gap — a gap you'd sometimes barely miss at step 1 should feel totally reliable by step 6.</div>
<div class="net-note">The complete controller state that must be serialized for rollback: <code>position</code>, <code>velocity</code>, <code>state</code> (grounded/airborne), <code>coyote_frames</code> (int), <code>jump_buf_frames</code> (int). That's it — 5 values. The reason to use int counters instead of float timers is that ints are bit-identical across CPUs and accumulate zero floating-point error across thousands of rollback resimulations. A float that's off by 0.0001 after one tick is off by 0.1 after a thousand. Use ints for any frame-counted game logic.</div>`
},
{
  title: "L03 — Scenes, Saves & Serialization",
  subtitle: "FileAccess · JSON saves · Persist group · rollback snapshots from the same code",
  vizLabel: "VIZ: SAVE / LOAD / ROLLBACK",
  viz: "saveload",
  snippet: `<span class="cm"># the same to_dict() call powers saves, network sync, rollback, and replay.</span>
<span class="cm"># write it once. the other three come free.</span>

<span class="kw">extends</span> Node3D  <span class="cm"># add to "Persist" group in the editor</span>
<span class="kw">var</span> health: <span class="kw">float</span> = <span class="nm">100.0</span>

<span class="kw">func</span> <span class="fn">to_dict</span>() -> Dictionary:
    <span class="cm"># everything needed to recreate this object's exact state</span>
    <span class="kw">return</span> {
        <span class="st">"pos"</span>: [position.x, position.y, position.z],
        <span class="st">"rot"</span>: [rotation.x, rotation.y, rotation.z],
        <span class="st">"hp"</span>:  health,
        <span class="st">"scene"</span>: <span class="fn">scene_file_path</span>()  <span class="cm"># so load_game() knows what to instantiate</span>
    }

<span class="kw">func</span> <span class="fn">from_dict</span>(d: Dictionary) -> <span class="kw">void</span>:
    position = Vector3(d[<span class="st">"pos"</span>][<span class="nm">0</span>], d[<span class="st">"pos"</span>][<span class="nm">1</span>], d[<span class="st">"pos"</span>][<span class="nm">2</span>])
    health   = d[<span class="st">"hp"</span>]

<span class="cm"># ── GAME SAVE (autoload) ─────────────────────────────────────────────────</span>
<span class="kw">func</span> <span class="fn">save_game</span>() -> <span class="kw">void</span>:
    <span class="kw">var</span> data := {}
    <span class="kw">for</span> node <span class="kw">in</span> <span class="fn">get_tree</span>().<span class="fn">get_nodes_in_group</span>(<span class="st">"Persist"</span>):
        data[str(node.<span class="fn">get_path</span>())] = node.<span class="fn">to_dict</span>()
    <span class="kw">var</span> f := FileAccess.<span class="fn">open</span>(<span class="st">"user://save.json"</span>, FileAccess.WRITE)
    f.<span class="fn">store_string</span>(JSON.<span class="fn">stringify</span>(data))

<span class="kw">func</span> <span class="fn">load_game</span>() -> <span class="kw">void</span>:
    <span class="kw">if</span> <span class="kw">not</span> FileAccess.<span class="fn">file_exists</span>(<span class="st">"user://save.json"</span>): <span class="kw">return</span>
    <span class="kw">var</span> data: Dictionary = JSON.<span class="fn">parse_string</span>(
        FileAccess.<span class="fn">open</span>(<span class="st">"user://save.json"</span>, FileAccess.READ).<span class="fn">get_as_text</span>())
    <span class="kw">for</span> path <span class="kw">in</span> data: <span class="fn">get_node</span>(path).<span class="fn">from_dict</span>(data[path])

<span class="cm"># ── ROLLBACK SNAPSHOT (same code, no disk I/O, no JSON) ──────────────────</span>
<span class="kw">func</span> <span class="fn">snapshot</span>() -> Dictionary:
    <span class="kw">var</span> snap := {}
    <span class="kw">for</span> node <span class="kw">in</span> <span class="fn">get_tree</span>().<span class="fn">get_nodes_in_group</span>(<span class="st">"Persist"</span>):
        snap[node.<span class="fn">get_instance_id</span>()] = node.<span class="fn">to_dict</span>()
    <span class="kw">return</span> snap  <span class="cm"># store this in a ring buffer indexed by tick</span>

<span class="kw">func</span> <span class="fn">restore</span>(snap: Dictionary) -> <span class="kw">void</span>:
    <span class="kw">for</span> node <span class="kw">in</span> <span class="fn">get_tree</span>().<span class="fn">get_nodes_in_group</span>(<span class="st">"Persist"</span>):
        node.<span class="fn">from_dict</span>(snap[node.<span class="fn">get_instance_id</span>()])`,
  body: `<p>A save system and a rollback snapshot system are the same thing. One writes to disk, one writes to a Dictionary. The serialization logic — <code>to_dict()</code> and <code>from_dict()</code> — is identical. If you build the save system first and design it right, rollback is almost free. Most people do it the other way around and end up writing the same code twice.</p>
<div class="step-card"><span class="step-num">THE PERSIST GROUP PATTERN</span>In the Godot editor, select any node, go to the Node panel on the right, click the Groups tab, add it to the group "Persist". Do this for every object that should be saved. In your save code: <code>get_tree().get_nodes_in_group("Persist")</code> gives you all of them. Call <code>to_dict()</code> on each. Write to JSON. Done. No hardcoded node paths. No giant save function that breaks every time you rename a node. Adding a new saveable object is: add it to the group, implement <code>to_dict()</code>/<code>from_dict()</code>.</div>
<div class="step-card"><span class="step-num">to_dict / from_dict EVERYWHERE</span>Every Persist-group node needs two methods. <code>to_dict()</code> returns a Dictionary of everything needed to recreate this object's state: position, rotation, health, state flags, current animation — anything that would make it look wrong after a load. <code>from_dict(d)</code> reads that Dictionary back and applies it. For save files: JSON-stringify the dictionary and write to <code>user://</code>. For rollback: skip the JSON step and store the Dictionary directly in an array indexed by tick. Same method, different destination.</div>
<div class="vocab"><span class="vt">"Serialization"</span> — Converting live objects to storable data and back. Your <code>CharacterBody3D</code> at position <code>(240, 180)</code> with 65 health becomes <code>{"pos": [240, 180], "hp": 65}</code>. That structure can go to disk (save), over a network (sync), or into a tick buffer (rollback snapshot). If you can't serialize your game state, you have exactly zero of those three features. Design for serializability from day one.</div>
<div class="vocab"><span class="vt">"user:// Path"</span> — Godot's per-user writable directory. <code>user://savegame.json</code> resolves to <code>%APPDATA%\Godot\app_userdata\YourProjectName\</code> on Windows, <code>~/.local/share/godot/app_userdata/YourProjectName/</code> on Linux, <code>~/Library/Application Support/Godot/app_userdata/YourProjectName/</code> on macOS. It survives game updates and exports. Never save to <code>res://</code> — it's read-only in exported builds. To find where <code>user://</code> maps: <code>OS.get_user_data_dir()</code> in GDScript.</div>
<div class="vocab"><span class="vt">"Persist Group"</span> — A named node group used to mark objects for automatic serialization. Add in the Godot editor (Node panel → Groups tab → type "Persist" → Add). At save time, one loop over <code>get_nodes_in_group("Persist")</code> catches everything. At load time, first delete all existing Persist nodes, then instantiate from the saved <code>scene</code> path in each dictionary entry, then call <code>from_dict()</code> to restore state. Works for arbitrary numbers of objects without modifying your save function.</div>
<div class="tip">Add <code>func snapshot() -> Dictionary</code> and <code>func restore(snap: Dictionary) -> void</code> to your game manager — they do the same thing as <code>save_game()</code>/<code>load_game()</code> but to a Dictionary in memory instead of disk. No JSON, no file I/O, no allocations in the hot path. Store the last 10 snapshots in a ring buffer. Call <code>snapshot()</code> every physics tick. You have just built your rollback state store from your save system. The networking layer just calls <code>restore(snapshots[target_tick])</code>.</div>
<div class="artists">Hades (god-mode persistent upgrades across runs — elegant Persist-style architecture), Hollow Knight (bench save system with granular object state), GGPO rollback SDK (the reference implementation — snapshots are literally just serialized game state stored per tick), Celeste (save crystals that capture exact room state)</div>
<div class="spamton">Your save system, your network sync, your rollback snapshots, your replay recorder. All four need the same thing. <strong>Write to_dict() once. Call it from four different places. Four features. One function. If an object can't serialize its own state, you don't have a game — you have a session that dies when the window closes.</strong></div>
<div class="challenge">Add <code>to_dict()</code> and <code>from_dict()</code> to your L02 player controller (position, velocity, coyote_frames, jump_buf_frames, health) and to 5 RigidBody props in a test scene. Mark all of them with the Persist group. Write <code>save_game()</code> that iterates the group and writes JSON to <code>user://save.json</code>. Write <code>load_game()</code> that reads it back. Test: run the game, move things around, save, move things more, load — everything should snap back exactly. Then write <code>snapshot()</code> (returns Dictionary, no disk I/O) and <code>restore(snap)</code>. Call snapshot every physics frame, store the last 10 in an array. Press a key to restore to 5 ticks ago. You just built time rewind. The rollback networking layer is this, but automated.</div>
<div class="net-note">For rollback, <code>snapshot()</code> needs to be fast — it may run multiple times per frame during corrections. That means: no JSON stringification, no file I/O, no string formatting, no heap allocation if possible. Use typed arrays instead of Dictionaries for position data in the hot path. The save-to-disk system can share the same <code>to_dict()</code> output and run the JSON step separately — slow path for save files, fast path for snapshots. Never put the two paths in the same function.</div>`
},
{
  title: "L04 — Physics Bodies, Layers & Materials",
  subtitle: "StaticBody · RigidBody · CharacterBody · Area3D · collision layers · PhysicsMaterial",
  vizLabel: "VIZ: BODY TYPE PLAYGROUND",
  viz: "bodies",
  snippet: `<span class="cm"># four types. pick the wrong one and you pay physics budget for nothing.</span>

<span class="cm"># ── StaticBody3D ── never moves. infinite mass. zero CPU.</span>
<span class="cm"># if it doesn't move in your game, it must be a StaticBody.</span>

<span class="cm"># ── RigidBody3D ── full simulation. use for anything that reacts to forces.</span>
<span class="kw">extends</span> RigidBody3D
<span class="kw">func</span> <span class="fn">_ready</span>() -> <span class="kw">void</span>:
    physics_material_override = PhysicsMaterial.<span class="kw">new</span>()
    physics_material_override.bounce   = <span class="nm">0.6</span>  <span class="cm"># 0=sandbag 1=superball</span>
    physics_material_override.friction = <span class="nm">0.8</span>  <span class="cm"># 0=ice 1=rubber grip</span>

<span class="cm"># ── Collision Layer vs Mask ───────────────────────────────────────────────</span>
<span class="cm"># layer = "I exist here."  mask = "I look for collisions here."</span>
<span class="cm"># A body only collides when A's mask contains B's layer AND vice versa.</span>
<span class="cm"># every bullet-phases-through-enemy bug is a wrong mask. check it first.</span>
<span class="kw">func</span> <span class="fn">setup_layers</span>() -> <span class="kw">void</span>:
    <span class="cm"># player bullet: exists on layer 3, sees enemies(2) and environment(4)</span>
    <span class="fn">set_collision_layer_value</span>(<span class="nm">3</span>, <span class="kw">true</span>)
    <span class="fn">set_collision_mask_value</span>(<span class="nm">2</span>,  <span class="kw">true</span>)
    <span class="fn">set_collision_mask_value</span>(<span class="nm">4</span>,  <span class="kw">true</span>)
    <span class="cm"># does NOT hit layer 1 (player) — so you can't shoot yourself</span>

<span class="cm"># ── Area3D ── detects overlaps only. does NOT block movement.</span>
<span class="cm"># fire zones, loot pickups, trigger volumes. NOT for walls or floors.</span>
<span class="dc">@onready</span> <span class="kw">var</span> kill_zone: Area3D = %KillZone
<span class="kw">func</span> <span class="fn">_ready</span>() -> <span class="kw">void</span>:
    kill_zone.body_entered.<span class="fn">connect</span>(<span class="fn">_on_kill</span>)
<span class="kw">func</span> <span class="fn">_on_kill</span>(body: Node3D) -> <span class="kw">void</span>:
    body.<span class="fn">queue_free</span>()`,
  body: `<p>Godot has four physics body types and exactly zero of them are interchangeable. Using the wrong one doesn't cause a crash — it just makes your physics slow, weird, or both. A CharacterBody3D doing a RigidBody's job, a RigidBody doing a StaticBody's job — this is how you get a 15ms physics frame on a scene with 20 objects. Choosing the right type is free performance and correct behavior at the same time.</p>
<div class="step-card"><span class="step-num">FOUR TYPES, FOUR JOBS</span><strong>StaticBody3D</strong>: never moves. Floors, walls, platforms. Infinite mass, zero physics CPU cost. If it doesn't move, it must be a StaticBody — using anything else wastes physics budget. <strong>RigidBody3D</strong>: full simulation. Apply forces/impulses, it responds. Boxes, barrels, debris, ragdoll limbs. <strong>CharacterBody3D</strong>: you control it manually via <code>move_and_slide()</code>. Player, enemies, anything with complex movement logic. <strong>Area3D</strong>: detects overlaps, does zero physics. Fire zones, loot pickups, trigger volumes. Critical: Area3D does NOT block movement — it just tells you something is inside it.</div>
<div class="step-card"><span class="step-num">LAYERS AND MASKS: READ THIS TWICE</span>Collision layer = "I exist here." Collision mask = "I look for collisions here." Two bodies only collide when A's mask includes B's layer AND B's mask includes A's layer. Practical 4-layer setup: Player=1, Enemy=2, PlayerBullets=3, Environment=4. Player bullets: layer=3, mask={2,4} — hits enemies and walls, ignores player. Enemies: layer=2, mask={1,4} — hits player and walls, ignores each other (prevents crowd pushing). Use <code>set_collision_layer_value(n, true/false)</code> and <code>set_collision_mask_value(n, true/false)</code> in code — more readable than bitmasks.</div>
<div class="vocab"><span class="vt">"StaticBody3D"</span> — A physics body with infinite mass that never moves. All collisions resolve against it as if it's immovable. Zero simulation cost — Jolt knows it can skip this body's physics entirely. Every floor, wall, platform, and piece of terrain in your game should be a StaticBody3D. If you're putting RigidBodies as floors because "they look the same in the editor," you're paying simulation cost for nothing.</div>
<div class="vocab"><span class="vt">"Collision Layer vs Mask"</span> — Layer is your identity ("I am an enemy"). Mask is your perception ("I collide with players and environment"). A collision only happens when both objects' configurations agree: A's mask must include B's layer, and B's mask must include A's layer. The most common bug in multiplayer game jams: copy-pasted a node, forgot to update the mask, bullets phase through enemies. Check both, always, before every playtest.</div>
<div class="vocab"><span class="vt">"PhysicsMaterial"</span> — A Resource that attaches to any CollisionShape3D (or directly to the body) and defines surface properties: <code>bounce</code> (restitution: 0.0 = sandbag, 1.0 = perfect elastic bounce) and <code>friction</code> (0.0 = ice, 1.0 = rubber grip). When two surfaces collide, the physics engine combines their materials. To make a specific platform feel like ice: create a PhysicsMaterial with <code>friction=0.0</code>, attach it to that platform's CollisionShape3D. One resource, one float, a completely different feel.</div>
<div class="tip">When a collision isn't happening that should, or IS happening that shouldn't: first thing — enable collision debug visualization (Project → Debug → Visible Collision Shapes, or the toolbar Debug menu while running). You'll immediately see every collision shape in the scene. 90% of collision bugs are visible in 5 seconds with debug shapes on. Check layer/mask second. Check shape size third. In that order, every time.</div>
<div class="artists">Half-Life 2 (Havok physics showcase — the physics prop interactions that made it famous are just RigidBodies with tuned PhysicsMaterials), Overwatch (faction-based projectile layers at scale — their entire "friendly fire disabled" feature is collision masks), Celeste (Area3D used for spike death triggers, not StaticBodies — Area3D doesn't block movement which is exactly what you want for something that kills you on touch)</div>
<div class="spamton">Layer/mask confusion has ended more game jam multiplayer demos than actual network code ever has. Someone copies a node, forgets to fix the mask, bullets phase through enemies, players stop playing, demo collapses. <strong>Bullets phase through things for exactly one reason. Wrong mask. Check the mask before every playtest. It is always the mask.</strong></div>
<div class="challenge">Build a 4-layer playground. Player (layer 1), Enemies (layer 2), Player Bullets (layer 3), Environment (layer 4). Wire it so: bullets hit enemies and environment but not player, enemies hit player and environment but not each other. Use <code>set_collision_layer_value()</code> and <code>set_collision_mask_value()</code> — not the bitmask integer, the named version. Create a PhysicsMaterial with <code>bounce=0.85</code> and attach it to one platform — drop RigidBodies onto it and watch them bounce. Change <code>friction=0.0</code> on a different platform — slide RigidBodies across it. Document what each layer/mask value does in a comment. Future-you will thank present-you.</div>
<div class="net-note">Collision layers are static configuration — set at scene load, never synced over the network. But runtime layer changes (a power-up makes you temporarily immune to bullets: set your layer/mask to exclude the bullet layer) are gameplay state. If those changes affect who wins, they must be part of the serialized snapshot and applied deterministically. Material property changes (floor becomes ice from a hazard) are also gameplay state if they affect physics — server applies the change, broadcasts it as a reliable RPC, all clients apply.</div>`
},
{
  title: "L05 — Forces, Impulses, Joints & Torque",
  subtitle: "apply_central_force · impulses · PinJoint · HingeJoint · springs",
  vizLabel: "VIZ: FORCES & JOINT SANDBOX",
  viz: "forces",
  snippet: `<span class="cm"># force vs impulse. get this wrong and your combat will always feel off.</span>
<span class="cm"># force = salary (builds over time). impulse = lottery win (one frame, done).</span>

<span class="kw">extends</span> RigidBody3D

<span class="kw">func</span> <span class="fn">_physics_process</span>(delta: <span class="kw">float</span>) -> <span class="kw">void</span>:
    <span class="cm"># FORCE: call every tick while active. for rockets, wind, sustained push.</span>
    <span class="kw">if</span> thruster_active:
        <span class="fn">apply_central_force</span>(Vector3(<span class="nm">0</span>, <span class="nm">800</span>, <span class="nm">0</span>))

<span class="kw">func</span> <span class="fn">on_hit</span>(direction: Vector3) -> <span class="kw">void</span>:
    <span class="cm"># IMPULSE: call once. for knockback, jumps, explosions.</span>
    <span class="cm"># apply_central_force here would push forever. apply_central_impulse fires once.</span>
    <span class="fn">apply_central_impulse</span>(direction * <span class="nm">600.0</span>)

<span class="kw">func</span> <span class="fn">spin_hit</span>(hit_offset: Vector3) -> <span class="kw">void</span>:
    <span class="cm"># hit OFF-center → torque impulse (character spins, not just flies)</span>
    <span class="fn">apply_impulse</span>(Vector3(<span class="nm">0</span>, <span class="nm">400</span>, <span class="nm">0</span>), hit_offset)

<span class="cm"># ── PinJoint: wrecking ball setup ────────────────────────────────────────</span>
<span class="kw">func</span> <span class="fn">build_chain</span>(anchor: Node3D, links: Array[RigidBody3D]) -> <span class="kw">void</span>:
    <span class="kw">var</span> prev: Node3D = anchor
    <span class="kw">for</span> link <span class="kw">in</span> links:
        <span class="kw">var</span> j := PinJoint3D.<span class="kw">new</span>()
        j.node_a = prev.<span class="fn">get_path</span>()
        j.node_b = link.<span class="fn">get_path</span>()
        anchor.<span class="fn">add_child</span>(j)
        prev = link

<span class="cm"># ── Generic6DOF spring: bungee cord ──────────────────────────────────────</span>
<span class="kw">func</span> <span class="fn">make_bungee</span>(joint: Generic6DOFJoint3D) -> <span class="kw">void</span>:
    joint.<span class="fn">set_param_x</span>(Generic6DOFJoint3D.PARAM_LINEAR_SPRING_STIFFNESS, <span class="nm">180.0</span>)
    joint.<span class="fn">set_param_x</span>(Generic6DOFJoint3D.PARAM_LINEAR_SPRING_DAMPING,    <span class="nm">22.0</span>)
    joint.<span class="fn">set_flag_x</span>(Generic6DOFJoint3D.FLAG_ENABLE_LINEAR_SPRING,       <span class="kw">true</span>)`,
  body: `<p>Forces and impulses are different words for two completely different things and mixing them up is the fastest way to make physics that feels wrong. Force accumulates over multiple frames. Impulse happens in one frame and is done. A rocket motor is a force. A punch is an impulse. If your character slides across the floor forever after stopping input, you used force. If your physics object teleports on hit, you used impulse when you meant force. Wrong word, wrong feel.</p>
<div class="step-card"><span class="step-num">FORCE vs IMPULSE IN PRACTICE</span>Force: call <code>apply_central_force()</code> every <code>_physics_process</code> tick while the effect is active. The force accumulates into velocity over time. Rockets, wind, sustained pushes. Impulse: call <code>apply_central_impulse()</code> once when the event happens. Instant velocity change. Jumps, explosions, knockback hits. The physics equation: <code>velocity += (force / mass) * delta</code> per tick for forces. For impulse it's <code>velocity += impulse / mass</code> once. Get this backwards and your rocket fires once then stops, or your punch applies force every frame and your character flies to the moon.</div>
<div class="step-card"><span class="step-num">JOINTS: WHICH ONE</span><strong>PinJoint3D</strong>: ball-and-socket. Two bodies connected at one point, free to rotate around it. Chain links, wrecking balls, flails. Set <code>node_a</code> and <code>node_b</code> to the connected bodies' paths. <strong>HingeJoint3D</strong>: rotation around one axis only. Doors, elbows, see-saws. Set <code>angular_limit/enabled = true</code> and configure <code>lower</code>/<code>upper</code> to constrain the swing range. <strong>Generic6DOFJoint3D</strong>: full control over all 6 axes of movement and rotation. Enable spring behavior via <code>set_param_x(PARAM_LINEAR_SPRING_STIFFNESS, value)</code>. If nothing else fits, this does — it's just more parameters to configure.</div>
<div class="vocab"><span class="vt">"apply_central_force vs apply_force"</span> — <code>apply_central_force()</code> applies force through the center of mass — pure linear acceleration, no rotation. <code>apply_force(force, position)</code> applies force at a specific point on the body, which generates both linear acceleration AND torque. Punching someone off-center makes them spin. Punching dead center doesn't. Choose based on whether you want rotational effect.</div>
<div class="vocab"><span class="vt">"PinJoint3D"</span> — Connects two RigidBody3D nodes at a single shared point. They can rotate freely around that point but cannot separate. Ball-and-socket connection. Wrecking balls, chain links, flails, grappling hook attachment points. Set <code>node_a</code> and <code>node_b</code> to the paths of the two bodies. The joint must be a child of one of the bodies or positioned at the connection point. Chain 5 together for a rope.</div>
<div class="vocab"><span class="vt">"Generic6DOFJoint3D"</span> — The catch-all joint. Controls all 6 degrees of freedom: X/Y/Z position and X/Y/Z rotation. Each axis can be: free, locked, or spring. For bungee-cord behavior: enable linear spring on the axis you want to stretch, set stiffness (how hard it pulls back) and damping (how fast oscillation dies). Higher stiffness = tighter spring. Higher damping = less bounce. If HingeJoint and PinJoint don't fit your use case, 6DOF does.</div>
<div class="tip">For knockback in combat, always use <code>apply_central_impulse()</code> — never force. You want the character to move immediately on the hit frame, not build up over time. For character locomotion, use <code>move_toward()</code> on velocity — that's equivalent to applying a capped force via <code>CharacterBody3D</code>. For explosions, use impulse proportional to inverse distance squared. Get these three patterns right and every physics interaction in your game will feel intentional.</div>
<div class="artists">Angry Birds (the entire game mechanic is one carefully tuned <code>apply_central_impulse()</code> call per shot), Katamari Damacy (continuous force accumulation — the wobble comes from force applied off-center creating persistent torque), World of Goo (spring-mass joint network — Generic6DOF springs at their finest), Kerbal Space Program (rocket thrust = continuous force, staging = sudden mass change)</div>
<div class="spamton">Force is a salary: it builds slowly, the effect is gradual. Impulse is the lottery win: one frame, immediate velocity change, done. <strong>Hit reactions: impulse. Movement: force. Every game with floaty combat applied force where impulse was required. This is the thing in the docs that everyone reads and half the people still get backwards. apply_central_impulse on hit. move_toward for movement. These two lines are the whole system.</strong></div>
<div class="challenge">Build a wrecking ball: 5 RigidBody3D spheres connected by PinJoint3D (anchor → link1 → link2 → link3 → link4 → heavy sphere at end). Attach the first anchor to a StaticBody3D. Swing it into a stack of 10 RigidBody boxes. Note the chain behavior. Then replace PinJoints with Generic6DOFJoint3D with linear spring parameters — feel the difference between rigid chain and elastic spring. Finally: add a button that calls <code>apply_torque_impulse()</code> on the heavy sphere — it should start spinning mid-swing, imparting angular momentum to whatever it hits. Observe how spin changes the destruction pattern of the box stack.</div>
<div class="net-note">Impulses are the primary gameplay event in a networked physics game. Server determines that a hit occurred and applies the authoritative impulse. Clients predict it locally for immediate feedback. If the server disagrees, rollback corrects. For joints (ropes, chains): sync only anchor positions and initial configuration at spawn. Joint simulation runs identically on all clients from the same initial conditions — Jolt joints are deterministic. Don't sync individual link positions; that's O(n) bandwidth for cosmetic data.</div>`
},
{
  title: "L06 — Raycasts, ShapeCasts & Space Queries",
  subtitle: "RayCast3D · direct space queries · ShapeCast3D · hitscan vs ballistic",
  vizLabel: "VIZ: RAYCAST ARENA",
  viz: "raycasts",
  snippet: `<span class="cm"># three ways to raycast. know when to use each one.</span>

<span class="cm"># ── METHOD 1: RayCast3D node — persistent, runs every tick ───────────────</span>
<span class="dc">@onready</span> <span class="kw">var</span> floor_ray: RayCast3D = %FloorRay  <span class="cm"># points straight down</span>

<span class="kw">func</span> <span class="fn">_physics_process</span>(_dt: <span class="kw">float</span>) -> <span class="kw">void</span>:
    <span class="kw">if</span> floor_ray.<span class="fn">is_colliding</span>():
        <span class="kw">var</span> surface_normal := floor_ray.<span class="fn">get_collision_normal</span>()
        <span class="cm"># use normal for footstep sounds, slope detection, etc.</span>

<span class="cm"># ── METHOD 2: Direct space query — one-off, no node needed ───────────────</span>
<span class="kw">func</span> <span class="fn">hitscan</span>() -> <span class="kw">void</span>:
    <span class="kw">var</span> vp_center := <span class="fn">get_viewport</span>().<span class="fn">get_visible_rect</span>().size / <span class="nm">2</span>
    <span class="kw">var</span> from := camera.<span class="fn">project_ray_origin</span>(vp_center)
    <span class="kw">var</span> to   := from + camera.<span class="fn">project_ray_normal</span>(vp_center) * <span class="nm">500.0</span>
    <span class="kw">var</span> query := PhysicsRayQueryParameters3D.<span class="fn">create</span>(from, to)
    query.exclude         = [<span class="fn">get_rid</span>()]   <span class="cm"># don't hit yourself</span>
    query.collision_mask  = <span class="nm">0b0110</span>         <span class="cm"># enemies(2) + environment(4)</span>
    <span class="kw">var</span> hit := <span class="fn">get_world_3d</span>().direct_space_state.<span class="fn">intersect_ray</span>(query)
    <span class="kw">if</span> hit:
        hit[<span class="st">"collider"</span>].<span class="fn">apply_central_impulse</span>((to-from).<span class="fn">normalized</span>() * <span class="nm">450.0</span>)
        <span class="cm"># spawn spark particle at hit["position"]</span>

<span class="cm"># ── METHOD 3: ShapeCast3D — thick beam / melee sweep ─────────────────────</span>
<span class="dc">@onready</span> <span class="kw">var</span> melee_cast: ShapeCast3D = %MeleeCast  <span class="cm"># sphere shape, 1.5m forward</span>

<span class="kw">func</span> <span class="fn">melee_swing</span>() -> <span class="kw">void</span>:
    <span class="kw">for</span> i <span class="kw">in</span> melee_cast.<span class="fn">get_collision_count</span>():
        <span class="kw">var</span> body  := melee_cast.<span class="fn">get_collider</span>(i)
        <span class="kw">var</span> dist  := (body.global_position - global_position).<span class="fn">length</span>()
        <span class="kw">var</span> force := <span class="nm">700.0</span> / <span class="fn">max</span>(dist, <span class="nm">0.4</span>)  <span class="cm"># closer = harder hit</span>
        body.<span class="fn">apply_central_impulse</span>(<span class="fn">transform</span>.basis.z * force)`,
  body: `<p>A raycast is the most useful tool in a game developer's toolbox and it costs almost nothing. Ground checks, line of sight, hitscan weapons, surface normals for footstep audio, ledge detection, environmental storytelling queries — all raycasts. The number of game features that reduce to "shoot an invisible line, see what it hits" is absurd. Learn the three ways to do it in Godot and use them constantly.</p>
<div class="step-card"><span class="step-num">THREE WAYS TO RAYCAST</span><strong>RayCast3D node</strong>: add to your scene, set target position in node-local space, it auto-updates every physics tick. Use <code>.is_colliding()</code>, <code>.get_collision_point()</code>, <code>.get_collision_normal()</code>. Best for persistent checks like ground detection. <strong>Direct space query</strong>: in <code>_physics_process</code>, call <code>get_world_3d().direct_space_state.intersect_ray(query)</code> where query is a <code>PhysicsRayQueryParameters3D</code>. No scene node needed. Best for weapons, one-off checks, procedural queries. <strong>ShapeCast3D node</strong>: sweeps a shape (sphere, capsule, box) along a path. Like a fat raycast. Best for melee hitboxes, wide beams, any attack that a thin line would miss.</div>
<div class="step-card"><span class="step-num">HITSCAN WEAPON SETUP</span>Fire a ray from camera position through the crosshair: <code>var origin = camera.project_ray_origin(get_viewport().get_visible_rect().size / 2)</code>, <code>var dir = camera.project_ray_normal(get_viewport().get_visible_rect().size / 2)</code>. Create a query: <code>PhysicsRayQueryParameters3D.create(origin, origin + dir * 500)</code>. Set <code>query.exclude = [get_rid()]</code> so you don't hit yourself. Set <code>query.collision_mask</code> to only the layers you want to hit. Call <code>intersect_ray(query)</code>. On hit: <code>result.collider.apply_central_impulse(dir * hit_force)</code>. Spawn a spark particle at <code>result.position</code>. That's a complete hitscan weapon.</div>
<div class="vocab"><span class="vt">"RayCast3D"</span> — A scene node that shoots a ray from its origin to its <code>target_position</code> (in local space) every physics tick. Enable it by setting <code>enabled = true</code>. Check results during <code>_physics_process</code>: <code>is_colliding()</code>, <code>get_collider()</code>, <code>get_collision_point()</code>, <code>get_collision_normal()</code>. Set <code>collision_mask</code> to filter which layers it detects. Ground detection is the canonical use case: one RayCast3D pointing straight down from the player's feet.</div>
<div class="vocab"><span class="vt">"PhysicsDirectSpaceState3D"</span> — Godot's API for physics queries in pure code without scene nodes. Get it via <code>get_world_3d().direct_space_state</code> during <code>_physics_process</code>. Methods: <code>intersect_ray(params)</code> for single ray, <code>intersect_shape(params)</code> for overlap queries (explosion radius), <code>cast_motion(params)</code> for continuous collision detection. This is what you use for one-off queries where you don't want a persistent node — weapon fire, AI line-of-sight checks, explosion radius detection.</div>
<div class="vocab"><span class="vt">"ShapeCast3D"</span> — Sweeps a collision shape (sphere, box, capsule, convex) along a path and reports everything it overlaps. Unlike a thin ray, it catches objects that a ray would pass between. Use for: melee attack hitboxes (sweep a sphere forward), wide beam attacks, character collision prediction. More expensive than a ray, far cheaper than an Area3D monitoring overlaps every frame. Access results with <code>get_collision_count()</code>, <code>get_collider(i)</code>, <code>get_collision_point(i)</code>.</div>
<div class="tip">Use raycasts for detection, <code>Area3D</code> for persistent zones. The mistake is using Area3D for everything because it's "easier" — but Area3D fires <code>body_entered</code> signals for every body that enters on every frame, through Godot's signal system. With 30 bullets each with an Area3D, that's 30 signals firing per frame minimum. Replace with raycasts and your physics frame time drops immediately. Area3D is for fire zones, loot ranges, trigger volumes that need continuous "is anything here" detection. Raycasts are for point queries.</div>
<div class="artists">Counter-Strike 2 (server-side lag-compensated raycasts — the server rewinds positions to when the client fired, then casts the authoritative ray), DOOM Eternal (BFG hitscan vs Rocket projectile — same physics system, different query type), Rainbow Six Siege (breach charges use raycasts to check material type through walls, enabling the entire penetration system), Valve: Source Engine lag compensation docs (explains the rewind-and-raycast pattern that every competitive FPS uses)</div>
<div class="spamton">Raycasts are cheap. Area3D with body_entered on 50 simultaneous objects is not. <strong>The developer who put Area3D on every bullet because "raycasts seemed complicated" now has a 15ms physics frame and a mystery performance budget. Rays are surgical. Areas are grenades. You do not throw a grenade to do surgery. Use the ray.</strong></div>
<div class="challenge">Build a dual-weapon system. Left click: hitscan — fire <code>intersect_ray()</code> from camera through crosshair. On hit: apply impulse in ray direction at hit point, spawn a spark at <code>result.position</code>, draw a brief orange debug line. Right click: melee — sweep a <code>ShapeCast3D</code> sphere 1.5m forward. All colliders in the sweep take knockback proportional to <code>1.0 / max(distance, 0.5)</code> — close targets fly, edge targets nudge. Visualize the sweep as a translucent arc (draw in <code>_process</code> for one frame). Set correct collision masks so both attacks only detect enemies and environment. This is your complete brawler attack foundation.</div>
<div class="net-note">Hitscan raycasts are the hardest part of networked combat. The server needs to validate "did this shot hit?" against the world state at the exact tick the client fired — not the current tick. That's lag compensation: store a rolling buffer of world snapshots, when a hit report arrives from a client, rewind to the tick they specify, cast the authoritative ray, compare. Counter-Strike does this. VALORANT does this. Every competitive shooter does this. Without it, fast players are unfairly disadvantaged by their own low latency.</div>`
},
{
  title: "L07 — Verlet Ropes, Cloth & Soft Bodies",
  subtitle: "verlet integration · constraint satisfaction · cloth grids · soft body pressure · tearing",
  vizLabel: "VIZ: VERLET SIMULATION",
  viz: "verlet",
  snippet: `<span class="cm"># 30 lines. every rope, chain, cloth, and grapple hook in your game.</span>
<span class="cm"># velocity is implicit — stored as (current - previous). no separate vel array.</span>

<span class="kw">class_name</span> VerletSystem

<span class="kw">const</span> GRAVITY  := Vector2(<span class="nm">0.0</span>, <span class="nm">0.6</span>)   <span class="cm"># px per frame² (not per sec)</span>
<span class="kw">const</span> DAMPING  := <span class="nm">0.995</span>               <span class="cm"># energy retention per step</span>
<span class="kw">const</span> ITERS    := <span class="nm">4</span>                    <span class="cm"># constraint satisfaction passes</span>

<span class="kw">var</span> pts: Array   = []  <span class="cm"># [{pos, prev, locked}]</span>
<span class="kw">var</span> cons: Array  = []  <span class="cm"># [{a, b, rest, alive}]</span>

<span class="kw">func</span> <span class="fn">step</span>() -> <span class="kw">void</span>:
    <span class="cm"># 1. integrate — implicit velocity = pos - prev</span>
    <span class="kw">for</span> p <span class="kw">in</span> pts:
        <span class="kw">if</span> p.locked: <span class="kw">continue</span>
        <span class="kw">var</span> vel: Vector2 = (p.pos - p.prev) * DAMPING
        p.prev = p.pos
        p.pos += vel + GRAVITY

    <span class="cm"># 2. enforce constraints — repeat ITERS times for stiffness</span>
    <span class="kw">for</span> _i <span class="kw">in</span> ITERS:
        <span class="kw">for</span> c <span class="kw">in</span> cons:
            <span class="kw">if</span> <span class="kw">not</span> c.alive: <span class="kw">continue</span>
            <span class="kw">var</span> a: Vector2 = pts[c.a].pos
            <span class="kw">var</span> b: Vector2 = pts[c.b].pos
            <span class="kw">var</span> d := b - a;  <span class="kw">var</span> len := d.<span class="fn">length</span>()
            <span class="kw">if</span> len < <span class="nm">0.001</span>: <span class="kw">continue</span>
            <span class="kw">var</span> correction: Vector2 = d * ((len - c.rest) / len) * <span class="nm">0.5</span>
            <span class="kw">if</span> <span class="kw">not</span> pts[c.a].locked: pts[c.a].pos += correction
            <span class="kw">if</span> <span class="kw">not</span> pts[c.b].locked: pts[c.b].pos -= correction
            <span class="cm"># tearing: delete constraint if stretched past threshold</span>
            <span class="kw">if</span> len > c.rest * <span class="nm">1.9</span>: c.alive = <span class="kw">false</span>`,
  body: `<p>Verlet integration is the best physics trick you've never heard of. It simulates ropes, cloth, bridges, chains, grappling hooks, capes, and anything else that deforms under gravity. The entire system is about 30 lines of code. Hitman: Codename 47 used it in 2000. Tears of the Kingdom's Ultrahand uses it in 2023. The algorithm hasn't needed to change because it was right the first time.</p>
<div class="step-card"><span class="step-num">HOW VERLET WORKS</span>Instead of storing velocity, you store the current and previous position. Velocity is implicit: <code>velocity = current_pos - previous_pos</code>. Integration step: <code>next_pos = current_pos + (current_pos - previous_pos) * damping + gravity * delta²; previous_pos = current_pos; current_pos = next_pos</code>. That's it. After integration, enforce constraints: for each pair of connected points, if they're the wrong distance apart, push both toward the correct distance by half the error each. Repeat 3-5 times. More iterations = stiffer. To implement in Godot: a plain <code>Node2D</code> or <code>Node3D</code> with a <code>PackedVector2Array</code> (or 3D equivalent) for points, an array of constraint pairs, and <code>_draw()</code> for rendering with <code>draw_line()</code>.</div>
<div class="step-card"><span class="step-num">CLOTH AND TEARING</span>A cloth is a verlet rope grid. Create an N×M array of points. Add constraints between adjacent points (structural), between diagonals (shear), and between points two apart (bend resistance). Pin the top row. The rest hangs and flows naturally. Tearing: each constraint has a maximum stretch ratio. After satisfying constraints, check if any exceeded the ratio — if so, delete them. The constraint is gone. No special "tear" code needed — just deletion. Slash a line through the constraint array, deleting every constraint the line intersects, and the cloth tears along that line.</div>
<div class="vocab"><span class="vt">"Verlet Integration"</span> — Position-based physics where velocity is stored implicitly as the difference between current and previous position. Stable, simple, naturally energy-conserving. The damping factor (multiply the implicit velocity by 0.98 each step) prevents energy accumulation. Works in 2D and 3D identically — just change <code>Vector2</code> to <code>Vector3</code>. The only "trick" is that gravity is added as <code>gravity_vector * delta * delta</code> — delta squared, not delta. This is the correct form for position-based integration.</div>
<div class="vocab"><span class="vt">"Constraint Satisfaction"</span> — After moving all points via integration, some connected pairs are too far apart or too close. The constraint satisfaction step fixes them: <code>var delta = point_b.pos - point_a.pos; var dist = delta.length(); var correction = delta * (dist - rest_length) / dist * 0.5; point_a.pos += correction; point_b.pos -= correction</code>. Run this 3-5 times per frame. Each iteration reduces constraint error. 4 iterations is the common practical trade-off between stability and cost.</div>
<div class="vocab"><span class="vt">"Soft Body Pressure"</span> — For a closed loop of verlet points (a 2D soft body), a pressure constant pushes all points outward from the centroid proportional to the current enclosed area vs the target area. <code>pressure_force = target_area - current_area * stiffness</code>, applied outward along each point's normal. High stiffness = inflated ball. Low stiffness = deflating bag. Without pressure, the shape collapses inward under any sustained force. Add cross-bracing internal constraints for structural integrity.</div>
<div class="tip">For rendering your verlet system in Godot 3D, the cleanest approach is a custom <code>MeshInstance3D</code> that you rebuild each frame using <code>ImmediateMesh</code>: call <code>surface_begin(Mesh.PRIMITIVE_LINES)</code>, add vertex pairs for each constraint, <code>surface_end()</code>. For 2D, use a <code>Node2D</code> with <code>_draw()</code> and <code>draw_line()</code>. For full 3D cloth, update a <code>SurfaceTool</code>-built <code>ArrayMesh</code> each frame with the new vertex positions.</div>
<div class="artists">Tears of the Kingdom (Ultrahand + vehicle physics = verlet constraints with collision response), Uncharted 4 (rope swinging — verlet chain with environment collision), Spider-Man PS4 (web physics — verlet chain with anchor attachment and swing physics), Shadow of the Colossus (cloak simulation — cloth verlet with character bone attachment), Cut the Rope (rope gameplay built entirely from verlet constraints)</div>
<div class="spamton">Tears of the Kingdom's Ultrahand — the mechanic that generated more breathless YouTube videos than any other in the last decade — is verlet integration with collision constraints. Thirty lines of code from 1998. <strong>Verlet integration. The most mechanically celebrated system in modern gaming. Thirty lines. Unchanged since the late 90s. It was always in the textbooks. Nobody told you to look there.</strong></div>
<div class="challenge">Build a grappling hook: player fires a <code>RayCast3D</code>, on hit spawn a verlet chain from player position to hit point (10-12 points). Apply a force on the player toward <code>points[0]</code> each frame proportional to chain tension (distance from player to anchor point). Add basic rope-vs-environment collision: each frame, cast a ray from each point to its neighbor; if it hits something, push the point out of the surface along the hit normal. Then build a destructible cloth banner: 10×8 grid pinned at the top two corners, tear threshold at 2× rest length. Add a "slash" — press a button, sweep a line across the cloth, deleting any constraint the line crosses. Watch it tear. These two mechanics share the same core system.</div>
<div class="net-note">Verlet is deterministic — same initial conditions, same forces, same result every time. For networking: sync only the anchor points and initial configuration at spawn. Each client runs the simulation locally from those conditions. For cloth tearing, the tear event is what gets synced: "constraint at grid position (3,5) torn at tick T" via reliable RPC, all clients delete that constraint. Do NOT sync individual point positions — that's O(n) bandwidth every frame for what is cosmetic data. The simulation diverges slightly between clients over time and that's completely fine; nobody is comparing cloth wrinkle positions across screens.</div>`
},
{
  title: "L08 — Jiggle Physics & Weight-Painted Displacement",
  subtitle: "spring-mass systems · weight maps · displacement limits · stiffness + damping",
  vizLabel: "VIZ: WEIGHT-MAPPED JIGGLE",
  viz: "jiggle",
  snippet: `<span class="cm"># jiggle: a spring pulling each vertex back to rest, scaled by a weight map.</span>
<span class="cm"># five lines of math. the weight map is the whole trick.</span>

<span class="kw">extends</span> Node3D

<span class="dc">@export</span> <span class="kw">var</span> stiffness:   <span class="kw">float</span> = <span class="nm">8.0</span>   <span class="cm"># how fast it snaps back</span>
<span class="dc">@export</span> <span class="kw">var</span> damping:     <span class="kw">float</span> = <span class="nm">5.0</span>   <span class="cm"># how fast oscillation dies</span>
<span class="dc">@export</span> <span class="kw">var</span> max_disp:    <span class="kw">float</span> = <span class="nm">0.12</span>  <span class="cm"># max displacement in world units</span>

<span class="kw">var</span> _pos:   PackedVector3Array
<span class="kw">var</span> _vel:   PackedVector3Array
<span class="kw">var</span> _rest:  PackedVector3Array
<span class="kw">var</span> _wt:    PackedFloat32Array  <span class="cm"># weight per vertex: 0=locked 1=free</span>

<span class="kw">func</span> <span class="fn">_load_weights</span>() -> <span class="kw">void</span>:
    <span class="cm"># weight data lives in vertex color red channel — baked in Blender</span>
    <span class="kw">var</span> arrays := mesh_instance.mesh.<span class="fn">surface_get_arrays</span>(<span class="nm">0</span>)
    <span class="kw">var</span> colors: PackedColorArray = arrays[Mesh.ARRAY_COLOR]
    <span class="kw">for</span> c <span class="kw">in</span> colors: _wt.<span class="fn">append</span>(c.r)  <span class="cm"># white=free black=locked</span>

<span class="kw">func</span> <span class="fn">_physics_process</span>(delta: <span class="kw">float</span>) -> <span class="kw">void</span>:
    <span class="kw">for</span> i <span class="kw">in</span> _pos.size():
        <span class="kw">var</span> w := _wt[i]
        <span class="kw">if</span> w < <span class="nm">0.01</span>: <span class="kw">continue</span>           <span class="cm"># locked vertex — skip entirely</span>
        <span class="cm"># spring: pull toward rest position</span>
        _vel[i] += (_rest[i] - _pos[i]) * stiffness * delta
        _vel[i] *= <span class="nm">1.0</span> - damping * delta  <span class="cm"># damping</span>
        _pos[i] += _vel[i] * delta
        <span class="cm"># clamp displacement by weight — this is the weight map doing its job</span>
        <span class="kw">var</span> off := _pos[i] - _rest[i]
        <span class="kw">if</span> off.<span class="fn">length</span>() > max_disp * w:
            _pos[i] = _rest[i] + off.<span class="fn">normalized</span>() * max_disp * w`,
  body: `<p>Jiggle physics sounds complicated until you realize it's a spring that pulls a vertex back to where it started, scaled by a per-vertex weight that says how far it's allowed to wander. That's the entire system. The stiffness controls how fast it snaps back. The damping controls how much it oscillates. The weight map controls which parts move at all. Paint the weight map in Blender, load it per-vertex in Godot, apply the spring equation each tick. Done.</p>
<div class="step-card"><span class="step-num">THE SPRING EQUATION (MEMORIZE THIS)</span>Per vertex, per physics tick: <code>spring_force = (rest_pos - current_pos) * stiffness</code>. <code>velocity += spring_force * delta</code>. <code>velocity *= (1.0 - damping * delta)</code>. <code>current_pos += velocity * delta</code>. Clamp: <code>var offset = current_pos - rest_pos; if offset.length() > max_displacement * weight: current_pos = rest_pos + offset.normalized() * max_displacement * weight</code>. Five lines. The weight map value (0.0–1.0) scales the max displacement clamp. White = full freedom. Black = zero movement. That's the whole system.</div>
<div class="step-card"><span class="step-num">APPLYING TO A GODOT MESH</span>In Godot 4, use <code>MeshDataTool</code> to read and write per-vertex data on an <code>ArrayMesh</code>. Call <code>mdt.create_from_surface(mesh_instance.mesh, 0)</code> to read. Loop through vertices with <code>mdt.get_vertex(i)</code>, apply jiggle, call <code>mdt.set_vertex(i, new_pos)</code>. Then <code>mdt.commit_to_surface(array_mesh, 0)</code> to write back. This updates the mesh in place each frame. For weight data: export vertex colors from Blender with weight painted into the red channel. Load with <code>mesh_instance.mesh.surface_get_arrays(0)[Mesh.ARRAY_COLOR][i].r</code>. No external texture needed — the weight is already in the mesh.</div>
<div class="vocab"><span class="vt">"Weight Map"</span> — A per-vertex scalar (0.0–1.0) that controls how much each vertex is allowed to deviate from its rest position. Paint it in Blender's Vertex Weight Paint mode (Header → Weight Paint). White = maximum jiggle freedom. Black = pinned. Export as vertex colors (Properties → Object Data → Vertex Colors) or as a texture using the vertex UV coordinates. In Godot, read back via <code>MeshDataTool</code> or the <code>ARRAY_COLOR</code> surface array. Shoulders and attachment points should be near-black. Soft tissue should be near-white.</div>
<div class="vocab"><span class="vt">"Displacement Limit"</span> — The maximum distance a vertex can travel from its rest position, scaled by weight: <code>max_offset = base_limit * weight_value</code>. Without this clamp, accumulated spring force causes vertices to drift to infinity under sustained input. With it, deformation is organic and bounded. For subtle secondary motion (breathing, walk cycle weight): 0.03–0.06 world units. For visible jiggle: 0.1–0.2. For cartoony deformation: 0.3+. This single float is the tasteful-vs-absurd dial.</div>
<div class="vocab"><span class="vt">"Spring Damping"</span> — The rate at which oscillation dies down each frame: <code>velocity *= (1.0 - damping * delta)</code>. At <code>damping = 5.0</code> with 60Hz delta (~0.017): multiplier ≈ 0.915 per frame — oscillation dies in about 10 frames. High damping = quick return to rest (muscle, firm tissue). Low damping = prolonged wobble (jelly, liquid-filled). Combine stiffness and damping: high stiffness + high damping = snappy but not bouncy. Low stiffness + low damping = slow, sustained wobble. Tune them in pairs, not separately.</div>
<div class="tip">Export <code>jiggle_intensity</code>, <code>stiffness</code>, <code>damping</code>, and an overall <code>jiggle_enabled</code> bool with <code>@export</code>. Add a <code>jiggle_multiplier</code> setting in your game options (0.0 to 2.0) and multiply the intensity by it. This serves both accessibility (players who find jiggle distracting can reduce or disable it) and creative chaos (players who want maximum deformation can crank it). Don't decide for your players. Give them the knob.</div>
<div class="artists">Dead or Alive series (jiggle physics pioneers in 3D — they were doing this in 1996 with far less hardware than you have), Blade &amp; Sorcery VR (weight-painted soft body deformation for hit reactions on every body part), VRChat (community avatar "jiggle bones" — a simplified bone-based version of the same concept), Blender Manual: Vertex Weight Paint mode (the reference for painting and exporting weight data)</div>
<div class="spamton">Someone shipped a VR game with uniform jiggle across the entire mesh. No weight map. Everything swayed equally. Within three hours someone had found the intensity parameter. <strong>The weight map is not optional. Paint the shoulders black. Free the flesh. Export the multiplier to settings. The players will find the slider either way — let them find it on purpose.</strong></div>
<div class="challenge">Build a complete jiggle system: a sphere mesh with 24+ vertices (use a SphereMesh, subdivide in Blender). Paint a weight map in Blender's Weight Paint mode: top hemisphere near-black (locked), bottom near-white (free), gradient around the equator. Export vertex colors with the weight in the red channel. In Godot: load the mesh, read weight data via surface arrays, implement the spring equation per-vertex, apply back via <code>MeshDataTool</code> each <code>_physics_process</code>. Export stiffness, damping, and intensity. Compare with weight map on vs off — the difference should be obvious. Then apply an external impulse force (click to poke) and watch the weighted deformation respond correctly to the hit direction.</div>
<div class="net-note">Jiggle is cosmetic — do not sync it, do not include it in rollback snapshots. Each client runs its own local jiggle simulation from the authoritative bone/body positions it receives from the server. The weight map is static data loaded identically on all clients at start. Jiggle positions will diverge between clients due to frame timing differences; this is correct and expected. The performance cost of jiggle is local only — it never touches the network. Cosmetic divergence is free, and nobody is comparing jiggle frame-by-frame across screens.</div>`
},
{
  title: "L09 — Breakable Objects & Voronoi Fracture",
  subtitle: "pre-fracture · Voronoi cells · fragment pooling · chain reactions",
  vizLabel: "VIZ: VORONOI FRACTURE",
  viz: "fracture",
  snippet: `<span class="cm"># pre-fracture at load time. hide the fragments. swap on impact.</span>
<span class="cm"># runtime Voronoi is a GDC demo. this is production.</span>

<span class="kw">extends</span> StaticBody3D

<span class="dc">@export</span> <span class="kw">var</span> fragment_count: <span class="kw">int</span>   = <span class="nm">8</span>
<span class="dc">@export</span> <span class="kw">var</span> fracture_seed:  <span class="kw">int</span>   = <span class="nm">42</span>   <span class="cm"># same seed = same frags on all clients</span>
<span class="dc">@export</span> <span class="kw">var</span> break_force:    <span class="kw">float</span> = <span class="nm">380.0</span>

<span class="kw">var</span> _frags: Array[RigidBody3D] = []
<span class="kw">var</span> _broken := <span class="kw">false</span>

<span class="kw">func</span> <span class="fn">_ready</span>() -> <span class="kw">void</span>:
    <span class="cm"># generate fragment meshes at load time (or better: bake in Blender)</span>
    <span class="cm"># Blender: select mesh → Cell Fracture add-on → export each piece</span>
    <span class="kw">for</span> i <span class="kw">in</span> fragment_count:
        <span class="kw">var</span> rb := RigidBody3D.<span class="kw">new</span>()
        rb.freeze = <span class="kw">true</span>     <span class="cm"># dormant — zero physics cost</span>
        <span class="fn">_attach_fragment_mesh</span>(rb, i, fracture_seed)
        <span class="fn">add_child</span>(rb); _frags.<span class="fn">append</span>(rb)

<span class="kw">func</span> <span class="fn">fracture</span>(hit_pt: Vector3, force: <span class="kw">float</span> = break_force) -> <span class="kw">void</span>:
    <span class="kw">if</span> _broken: <span class="kw">return</span>
    _broken = <span class="kw">true</span>
    <span class="fn">hide</span>();  collision_layer = <span class="nm">0</span>  <span class="cm"># remove from physics world</span>
    <span class="kw">for</span> rb <span class="kw">in</span> _frags:
        rb.freeze = <span class="kw">false</span>;  rb.<span class="fn">show</span>()
        <span class="kw">var</span> dir := (rb.global_position - hit_pt).<span class="fn">normalized</span>()
        <span class="kw">var</span> dist := rb.global_position.<span class="fn">distance_to</span>(hit_pt)
        rb.<span class="fn">apply_central_impulse</span>(dir * force / <span class="fn">max</span>(dist, <span class="nm">0.15</span>))
        rb.<span class="fn">apply_torque_impulse</span>(Vector3(<span class="fn">randf_range</span>(-<span class="nm">1</span>,<span class="nm">1</span>),<span class="fn">randf_range</span>(-<span class="nm">1</span>,<span class="nm">1</span>),<span class="nm">0</span>)*<span class="nm">40</span>)
        <span class="fn">get_tree</span>().<span class="fn">create_timer</span>(<span class="nm">3.5</span>).<span class="fn">timeout</span>.<span class="fn">connect</span>(rb.<span class="fn">queue_free</span>)`,
  body: `<p>Every shipped game with breakable objects uses the same trick: the fragments are already there. At load time, pre-fracture the mesh into N pieces and hide them inside the intact parent. At impact, hide the parent, unhide and unfreeze the fragments, apply impulses. The destruction looks instant because the work was done at load time. Runtime Voronoi fracture — computing the cuts during gameplay — is something you demo at GDC, not ship at 60fps.</p>
<div class="step-card"><span class="step-num">PRE-FRACTURE WORKFLOW</span>At <code>_ready()</code>: scatter N seed points randomly inside the mesh bounds. For each seed, compute its Voronoi cell as a convex mesh using polygon clipping (or, practically: pre-fracture in Blender using the Cell Fracture addon, export the fragment meshes, load them as children). Create a <code>RigidBody3D</code> for each fragment with its mesh and a generated <code>ConvexPolygonShape3D</code>. Set <code>freeze = true</code> on all fragments. At impact: <code>hide()</code> the parent, set <code>freeze = false</code> on each fragment, call <code>apply_central_impulse()</code> with direction from hit point and magnitude proportional to <code>1.0 / max(distance_from_hit, 0.1)</code>.</div>
<div class="step-card"><span class="step-num">FRAGMENT POOLING</span>Creating and destroying RigidBody nodes at runtime is expensive — <code>instantiate()</code> triggers physics body creation, collision shape generation, and scene tree updates. Instead: pre-instantiate a pool of 200 fragment objects at game start, mark them all inactive. When a fracture fires, grab fragments from the pool, configure their mesh/transform, activate. When fragments despawn (after 3 seconds), return them to the pool. Track pool usage with a simple index. When the pool is full, the oldest fragments get reclaimed. This pattern eliminates all mid-game instantiation spikes.</div>
<div class="vocab"><span class="vt">"Voronoi Fracture"</span> — A fracture pattern generated by scattering N random seed points inside a mesh and computing each seed's cell — the region of space closer to that seed than any other. Cell boundaries become the fracture planes. More seeds = more fragments = more expensive to simulate. 8–12 seeds per destructible object is the real-time sweet spot. In practice: use Blender's Cell Fracture addon (included in Blender) to generate fragments in-editor, export them, load them in Godot. Don't compute Voronoi at runtime.</div>
