<script>
const LESSONS = [
{
title:"The Network Is Just Shouting",
subtitle:"01 — What Actually Happens",
vizLabel:"▶ packets flying the wire",
viz:"packets",
snippet:`<span class="cm"># The internet moves data in small chunks called PACKETS.</span>
<span class="cm"># Two protocols — pick your poison:</span>

<span class="cm"># TCP — reliable, ordered, slower</span>
<span class="cm"># Head-of-line blocking kills real-time games.</span>

<span class="cm"># UDP — unreliable, unordered, FAST</span>
<span class="cm"># Fire and forget. You handle loss. Godot uses ENet (UDP-based).</span>

<span class="cm"># RTT = Round Trip Time. The number that governs your life.</span>
<span class="kw">var</span> ping_ms = <span class="nm">40</span>    <span class="cm"># local LAN — barely noticeable</span>
<span class="kw">var</span> ping_ms = <span class="nm">80</span>    <span class="cm"># same country — totally playable</span>
<span class="kw">var</span> ping_ms = <span class="nm">180</span>   <span class="cm"># cross-continent — you feel it</span>
<span class="kw">var</span> ping_ms = <span class="nm">400</span>   <span class="cm"># intercontinental — rubber-band city</span>

<span class="cm"># ENet gives you the best of both worlds:</span>
<span class="cm"># choose reliability PER PACKET — fast when you want,</span>
<span class="cm"># guaranteed when you need it.</span>`,
body:`<p>Good news: networking is not magic. Bad news: it is two computers trying to share data while the universe actively conspires against them. Packets get lost. Clocks drift. WiFi is a lie. Your only job is to <em>lose gracefully</em>.</p>
<div class="step-card"><span class="step-num">TCP vs UDP — PICK YOUR PAIN</span>
<strong>TCP</strong>: every packet is acknowledged. Lost packets are resent. Ordered. Reliable. The catch: <em>head-of-line blocking</em> — a single lost packet stalls everything while TCP waits for the retry. Bad for fast games.<br><br>
<strong>UDP</strong>: fire and forget. Packets may be lost or arrive out of order. Nothing stalls. Each packet is independent. <em>Fast games use UDP.</em></div>
<p>Godot's default transport is <strong>ENet</strong> — UDP with optional per-packet reliability. You get speed when you want it and guaranteed delivery when you need it.</p>
<div class="step-card"><span class="step-num">RTT — THE NUMBER THAT GOVERNS EVERYTHING</span>
RTT (Round-Trip Time) is how long a packet takes to leave your machine, reach the other end, and get a reply back. Your ping. Every problem in multiplayer — desyncs, rubber-banding, prediction errors — is a fight against RTT. <em>All of multiplayer programming is hiding that gap from the player.</em></div>
<div class="tip">The network is a bad postal service run by caffeinated raccoons. Packets fall off trucks. Some arrive twice. Some arrive six months later, completely irrelevant. Your code must assume any of this can happen at any time. That one player on hotel WiFi will find every gap in your error handling within five minutes of your jam releasing.</div>
<div class="challenge">Next time you play any online game, find the ping display. Find the highest-ping player. Watch them move. Everything you are seeing happened that many milliseconds ago on their machine. You are watching a ghost. Your entire job as a multiplayer programmer is making that ghost look alive.</div>`
},
{
title:"Two Ways to Connect",
subtitle:"02 — Server vs Peer-to-Peer",
vizLabel:"▶ client-server vs peer-to-peer",
viz:"topology",
snippet:`<span class="cm"># CLIENT-SERVER: everyone connects to one central machine</span>
<span class="kw">func</span> <span class="fn">host_game</span>():
    <span class="kw">var</span> peer = ENetMultiplayerPeer.<span class="fn">new</span>()
    peer.<span class="fn">create_server</span>(<span class="nm">7000</span>, <span class="nm">32</span>)  <span class="cm"># port, max_clients</span>
    multiplayer.multiplayer_peer = peer
    <span class="fn">print</span>(<span class="st">"Server running on port 7000"</span>)

<span class="kw">func</span> <span class="fn">join_game</span>(address: <span class="kw">String</span>):
    <span class="kw">var</span> peer = ENetMultiplayerPeer.<span class="fn">new</span>()
    peer.<span class="fn">create_client</span>(address, <span class="nm">7000</span>)
    multiplayer.multiplayer_peer = peer

<span class="cm"># That is literally it. Two Godot instances talking.</span>
<span class="cm"># Test: Project → Debug → Run Multiple Instances.</span>

<span class="cm"># LISTEN SERVER: the host is both server AND client.</span>
<span class="cm"># Player 1 presses "Host", others enter their IP and "Join".</span>
<span class="cm"># No dedicated machine needed. Great for jams.</span>
<span class="cm"># Host gets 0ms latency since they ARE the server.</span>`,
body:`<p>Before you write a single line of Godot networking code, you need to answer one question: <strong>who is in charge?</strong> Get this wrong and you will be refactoring it out of everything six months from now. Get it right and the rest falls into place.</p>
<div class="step-card"><span class="step-num">CLIENT-SERVER — ONE HOST RULES THEM ALL</span>
One machine is the <strong>server</strong>. Everyone else is a <strong>client</strong>. Clients send inputs. The server runs authoritative game logic. The server sends state back to clients.<br><br>
<em>Pros:</em> Cheat prevention is tractable. One source of truth. Easy to reason about.<br>
<em>Cons:</em> Someone has to run the server. Either costs money or the host has a latency advantage.</div>
<div class="step-card"><span class="step-num">PEER-TO-PEER — EVERYONE TALKS TO EVERYONE</span>
No dedicated server. Every machine connects to every other directly. Classic for 2-player fighting games.<br><br>
<em>Pros:</em> No server costs. Direct connections can mean lower latency.<br>
<em>Cons:</em> Cheating is hard to prevent. NAT traversal is painful. Falls apart with many players.</div>
<p>For most indie games: <strong>client-server wins.</strong> Make one player the host — a <em>listen server</em>. They run both server and client simultaneously. Zero latency for them since they ARE the server. Slightly unfair at high level, completely fine for a jam.</p>
<div class="step-card"><span class="step-num">PEER IDs — HOW GODOT IDENTIFIES EVERYONE</span>
<code>multiplayer.get_unique_id()</code> — who am I?<br>
<code>multiplayer.is_server()</code> — am I the server?<br>
<code>multiplayer.get_peers()</code> — list all connected peers<br><br>
<em>The server always has ID 1.</em> Clients get random IDs. Memorise this — it drives everything.</div>
<div class="tip">For a game jam: make player 1 the host. They press "Host", others type their IP and press "Join". Ship it. No server bill, no setup time, works. Polish the networking architecture <em>after</em> you confirm the game is actually fun — which most jam games are not, and that is okay.</div>`
},
{
title:"Godot's Multiplayer Brain",
subtitle:"03 — The MultiplayerAPI",
vizLabel:"▶ multiplayer architecture",
viz:"apimap",
snippet:`<span class="cm"># The four signals you ALWAYS wire up</span>
<span class="kw">func</span> <span class="fn">_ready</span>():
    <span class="cm"># Server fires when a client connects</span>
    multiplayer.peer_connected.<span class="fn">connect</span>(<span class="fn">_on_peer_joined</span>)
    <span class="cm"># Server fires when a client disconnects</span>
    multiplayer.peer_disconnected.<span class="fn">connect</span>(<span class="fn">_on_peer_left</span>)
    <span class="cm"># Client fires on successful connect</span>
    multiplayer.connected_to_server.<span class="fn">connect</span>(<span class="fn">_on_connected</span>)
    <span class="cm"># Client fires if connection fails</span>
    multiplayer.connection_failed.<span class="fn">connect</span>(<span class="fn">_on_failed</span>)

<span class="kw">func</span> <span class="fn">_on_peer_joined</span>(id: <span class="kw">int</span>):
    <span class="fn">print</span>(<span class="st">"New peer: "</span>, id)
    <span class="fn">spawn_player</span>(id)

<span class="kw">func</span> <span class="fn">_on_peer_left</span>(id: <span class="kw">int</span>):
    <span class="fn">print</span>(<span class="st">"Peer gone: "</span>, id)
    <span class="fn">remove_player</span>(id)

<span class="cm"># CRITICAL: name nodes by peer ID for RPC routing!</span>
<span class="kw">func</span> <span class="fn">spawn_player</span>(id: <span class="kw">int</span>):
    <span class="kw">var</span> p = PlayerScene.<span class="fn">instantiate</span>()
    p.name = <span class="kw">str</span>(id)  <span class="cm"># the RPC router uses this path</span>
    p.<span class="fn">set_multiplayer_authority</span>(id)
    $Players.<span class="fn">add_child</span>(p)`,
body:`<p>The good news about Godot 4: the engine does a shocking amount of the hard work for you. The bad news: you still have to understand what it is doing under the hood or you will spend hours debugging phantom desyncs caused by wiring up signals in the wrong order.</p>
<div class="step-card"><span class="step-num">THE MULTIPLAYER PEER — YOUR NETWORK DRIVER</span>
<code>ENetMultiplayerPeer</code> is the default transport. Create it, configure as server or client, hand it to <code>multiplayer.multiplayer_peer</code>. Godot handles all low-level socket work. You never write raw byte code.<br><br>
Other peers with the identical API: <code>WebSocketMultiplayerPeer</code> (for HTML5 exports), <code>WebRTCMultiplayerPeer</code> (browser P2P). Swap the peer type, everything else stays the same.</div>
<div class="step-card"><span class="step-num">THE CONNECTION LIFECYCLE — FOUR SIGNALS</span>
<em>peer_connected(id)</em> — fires on server when a client joins. Create their player object here.<br>
<em>peer_disconnected(id)</em> — fires on server when a client leaves. Delete their player object here.<br>
<em>connected_to_server</em> — fires on clients when they successfully join.<br>
<em>connection_failed</em> — fires on clients if the attempt times out.</div>
<div class="step-card"><span class="step-num">AUTOMATE IT — SPAWNER &amp; SYNCHRONIZER</span>
Godot 4 includes <strong>MultiplayerSpawner</strong> (auto-creates/destroys nodes across all peers) and <strong>MultiplayerSynchronizer</strong> (continuously syncs specified properties like position). Drop them in your scene, configure in the Inspector — no code needed. Great for prototyping.</div>
<div class="tip">Node names drive RPC routing and if you get them wrong you will see silent failures that are <em>terrible</em> to debug. If your Player node is at <code>/root/Game/Players/42</code>, RPCs travel by that exact path. Always name player nodes by peer ID (<code>str(id)</code>). A messy scene tree means confusing multiplayer bugs.</div>`
},
{
title:"RPC: Calling Functions Across Space",
subtitle:"04 — Remote Procedure Calls",
vizLabel:"▶ RPCs flying across the wire",
viz:"rpc",
snippet:`<span class="cm"># @rpc turns a function into a network call.</span>
<span class="cm"># Parameters: mode, sync, transfer_mode, channel</span>

<span class="cm"># POSITION — unreliable is correct.</span>
<span class="cm"># If one drops, the next arrives 16ms later anyway.</span>
<span class="dc">@rpc</span>(<span class="st">"any_peer"</span>, <span class="st">"call_remote"</span>, <span class="st">"unreliable"</span>)
<span class="kw">func</span> <span class="fn">sync_position</span>(pos: <span class="kw">Vector2</span>):
    position = pos

<span class="cm"># DAMAGE — reliable is correct.</span>
<span class="cm"># One missed death event = one invincible ghost.</span>
<span class="dc">@rpc</span>(<span class="st">"authority"</span>, <span class="st">"call_remote"</span>, <span class="st">"reliable"</span>)
<span class="kw">func</span> <span class="fn">take_damage</span>(amount: <span class="kw">int</span>):
    health -= amount
    <span class="fn">update_health_bar</span>()

<span class="cm"># HOW TO CALL:</span>
<span class="fn">sync_position</span>.<span class="fn">rpc</span>(position)        <span class="cm"># broadcast to everyone</span>
<span class="fn">sync_position</span>.<span class="fn">rpc_id</span>(<span class="nm">2</span>, position)  <span class="cm"># send to peer 2 only</span>
<span class="fn">take_damage</span>.<span class="fn">rpc_id</span>(<span class="nm">1</span>, <span class="nm">50</span>)         <span class="cm"># ask server (ID 1) to apply damage</span>

<span class="cm"># To also run locally:</span>
<span class="fn">take_damage</span>.<span class="fn">rpc</span>(<span class="nm">50</span>)  <span class="cm"># runs on remotes</span>
<span class="fn">take_damage</span>(<span class="nm">50</span>)      <span class="cm"># runs locally (call it separately)</span>`,
body:`<p>RPCs are the main event. <strong>Remote Procedure Call</strong> — you call a function on your machine, it executes on someone else's machine, across the internet, as if it were local. Godot 4 makes this ludicrously easy with the <code>@rpc</code> annotation. Do not let the ease fool you — getting the parameters wrong will ruin your game.</p>
<div class="step-card"><span class="step-num">@RPC ANNOTATION — FOUR THINGS TO CONFIGURE</span>
<strong>mode:</strong> <em>"authority"</em> — only the node's owner may call this remotely. <em>"any_peer"</em> — any peer may call it.<br><br>
<strong>sync:</strong> <em>"call_remote"</em> (default) — runs only on receivers. <em>"call_local"</em> — also runs on the caller.<br><br>
<strong>transfer_mode:</strong> <em>"unreliable"</em> (fast, lossy), <em>"unreliable_ordered"</em>, or <em>"reliable"</em> (guaranteed).<br><br>
<strong>channel:</strong> Separate traffic lanes to avoid head-of-line blocking between different data types.</div>
<div class="step-card"><span class="step-num">THE GOLDEN RULE — UNRELIABLE FOR POSITION, RELIABLE FOR EVENTS</span>
Position updates fire 20–60 times per second. A lost packet is replaced in 16ms. Use <em>unreliable.</em><br><br>
For important one-off events — player death, item pickup, match start — use <em>reliable</em>. A missed death event means a ghost running at full health.</div>
<div class="step-card"><span class="step-num">THE PATTERN — CLIENT SENDS INPUT, SERVER RESPONDS</span>
Client: <code>submit_input.rpc_id(1, my_input)</code> → Server validates → <code>apply_state.rpc(new_pos, new_hp)</code><br><br>
Never trust a client calling a damage function on themselves. A cheater will find it in five minutes. All gameplay logic lives on the server. Clients are fancy input devices.</div>
<div class="tip">The most common RPC bug ever: forgetting the function body runs on the RECEIVER, not you. <code>take_damage.rpc(50)</code> runs <code>take_damage</code> on every other peer. Your machine does not run it unless you use <em>"call_local"</em> or call it directly too.</div>`
},
{
title:"Who Owns What",
subtitle:"05 — Authority &amp; Ownership",
vizLabel:"▶ authority ownership map",
viz:"authority",
snippet:`<span class="cm"># Every node has exactly one multiplayer authority — its owner.</span>
<span class="cm"># Default: server (ID 1) owns everything.</span>

<span class="kw">func</span> <span class="fn">spawn_player</span>(peer_id: <span class="kw">int</span>):
    <span class="kw">var</span> p = PlayerScene.<span class="fn">instantiate</span>()
    p.name = <span class="kw">str</span>(peer_id)
    p.<span class="fn">set_multiplayer_authority</span>(peer_id)  <span class="cm"># THIS is the key call</span>
    $Players.<span class="fn">add_child</span>(p)

<span class="cm"># Inside Player.gd:</span>
<span class="kw">func</span> <span class="fn">_physics_process</span>(delta):
    <span class="cm"># Only the owner reads input and moves</span>
    <span class="kw">if not</span> <span class="fn">is_multiplayer_authority</span>():
        <span class="kw">return</span>

    <span class="kw">var</span> dir = Input.<span class="fn">get_vector</span>(
        <span class="st">"ui_left"</span>, <span class="st">"ui_right"</span>, <span class="st">"ui_up"</span>, <span class="st">"ui_down"</span>
    )
    position += dir * speed * delta
    <span class="fn">sync_pos</span>.<span class="fn">rpc</span>(position)

<span class="dc">@rpc</span>(<span class="st">"authority"</span>, <span class="st">"call_remote"</span>, <span class="st">"unreliable"</span>)
<span class="kw">func</span> <span class="fn">sync_pos</span>(pos: <span class="kw">Vector2</span>):
    position = pos  <span class="cm"># puppets: just snap to received position</span>`,
body:`<p>Here is a fun problem: every player's character node exists on every machine simultaneously. Without rules, Player 2's client could theoretically move Player 1's character. And a cheater <em>will</em> try. The answer is <strong>multiplayer authority</strong> — one owner per node, enforced by the engine.</p>
<div class="step-card"><span class="step-num">THE AUTHORITY SYSTEM — ONE OWNER PER NODE</span>
Every node has exactly one authority — the peer that may call <em>"authority"</em>-mode RPCs on it.<br><br>
<code>set_multiplayer_authority(peer_id)</code> — assign ownership<br>
<code>is_multiplayer_authority()</code> — am I the owner of this node?<br>
<code>get_multiplayer_authority()</code> — who owns this?<br><br>
Pattern: when spawning a player node, immediately call <code>set_multiplayer_authority(peer_id)</code>. Inside their <code>_physics_process</code>, check <code>is_multiplayer_authority()</code> before reading any input.</div>
<div class="step-card"><span class="step-num">ONE NODE, THREE SIMULTANEOUS ROLES</span>
On every machine, each player node plays all three roles at once:<br><br>
<strong>AUTHORITY COPY</strong> (on the owner's machine) — reads input, moves, sends position.<br>
<strong>PUPPET COPY</strong> (on all other machines) — receives positions, renders, does nothing else.<br>
<strong>SERVER COPY</strong> (on the server) — validates, runs physics, is the official truth.<br><br>
Same scene. Same script. Behaviour decided by <code>is_multiplayer_authority()</code>.</div>
<div class="step-card"><span class="step-num">AUTHORITY PROPAGATES DOWN THE TREE</span>
Setting authority on a parent propagates to all children. A Player node with children (weapon, hitbox, HUD) — all owned by the same peer in one call. Be careful with nodes the server should control — they will inherit player authority if nested under that player.</div>
<div class="tip">The architecture that does not embarrass you later: server owns GameState (scores, timers, rules), each player owns their Player node (input, local movement), and the server runs a shadow simulation of everyone for validation. Client = fast approximation. Server = truth. Tattoo that on your wrist.</div>`
},
{
title:"The Lag Monster",
subtitle:"06 — Latency, Jitter &amp; Loss",
vizLabel:"▶ latency timeline",
viz:"latency",
snippet:`<span class="cm"># Measuring actual RTT with a ping-pong RPC</span>
<span class="kw">var</span> _ping_sent_at: <span class="kw">int</span> = <span class="nm">0</span>

<span class="kw">func</span> <span class="fn">send_ping</span>():
    _ping_sent_at = Time.<span class="fn">get_ticks_msec</span>()
    <span class="fn">_pong</span>.<span class="fn">rpc_id</span>(<span class="nm">1</span>)  <span class="cm"># send to server</span>

<span class="dc">@rpc</span>(<span class="st">"any_peer"</span>, <span class="st">"call_remote"</span>, <span class="st">"reliable"</span>)
<span class="kw">func</span> <span class="fn">_pong</span>():
    <span class="kw">if</span> multiplayer.<span class="fn">is_server</span>():
        <span class="cm"># server bounces back to caller</span>
        <span class="fn">_pong</span>.<span class="fn">rpc_id</span>(multiplayer.<span class="fn">get_remote_sender_id</span>())
    <span class="kw">else</span>:
        <span class="kw">var</span> rtt = Time.<span class="fn">get_ticks_msec</span>() - _ping_sent_at
        <span class="fn">print</span>(<span class="st">"RTT: "</span>, rtt, <span class="st">"ms  one-way ~"</span>, rtt / <span class="nm">2</span>, <span class="st">"ms"</span>)

<span class="cm"># ENet also exposes stats directly:</span>
<span class="cm"># var ep = multiplayer.multiplayer_peer.get_peer(id)</span>
<span class="cm"># ep.get_statistic(ENetPacketPeer.PEER_ROUND_TRIP_TIME)</span>

<span class="cm"># get_remote_sender_id() — inside any @rpc function,</span>
<span class="cm"># tells you EXACTLY who sent it. Essential for validation.</span>`,
body:`<p>Harsh truth: you cannot make light travel faster. Physics is not on your side. What you <em>can</em> do is make your game feel like the delay does not exist — through prediction, interpolation, and careful design. First step: name the monsters you are fighting.</p>
<div class="step-card"><span class="step-num">LATENCY — THE CONSTANT DELAY</span>
Time between pressing a button and the server knowing. Roughly half the RTT. At 100ms ping: inputs arrive 50ms late, server response arrives 50ms later. Player sees their character react 100ms after pressing — unless you hide this. (You will. Lesson 08.)</div>
<div class="step-card"><span class="step-num">JITTER — THE INCONSISTENCY</span>
Latency that varies randomly: 60ms, 62ms, 58ms, 120ms, 61ms. That 120ms spike is jitter. It makes packets arrive out of order — a newer position update arrives before an older one, causing remote players to snap backwards.<br><br>
Fix: <strong>jitter buffer</strong>. Add 20–50ms of artificial delay to incoming packets, play them back smoothly. You trade tiny extra latency for smooth motion. Used in every video call on earth.</div>
<div class="step-card"><span class="step-num">PACKET LOSS — THE SILENCE</span>
ENet retransmits reliable packets automatically. Unreliable packets are gone forever. For position updates that is fine — next one arrives soon. For deaths and pickups: use <em>reliable</em>, full stop.</div>
<div class="step-card"><span class="step-num">CLOCK SYNC — WHOSE TIME IS IT?</span>
Every machine's clock drifts. <code>Time.get_ticks_msec()</code> is local — it does not sync automatically. For tick-based simulations you must implement clock synchronisation at connection time or desync will creep in.</div>
<div class="tip">The most reliable RTT measurement is also the most embarrassingly simple: send a packet with a timestamp, server bounces it back, measure elapsed time. Do this every few seconds, smooth with a rolling average. Display it in your debug overlay. Now you know exactly how bad your players' connections are before you start blaming your own code.</div>`
},
{
title:"State Sync Strategies",
subtitle:"07 — What Do You Send?",
vizLabel:"▶ snapshot vs event sync",
viz:"statesync",
snippet:`<span class="cm"># SNAPSHOTS — send full state at fixed intervals</span>
<span class="kw">var</span> tick_rate: <span class="kw">int</span> = <span class="nm">20</span>  <span class="cm"># 20 updates/sec = 50ms interval</span>
<span class="kw">var</span> _tick_accum: <span class="kw">float</span> = <span class="nm">0.0</span>

<span class="kw">func</span> <span class="fn">_physics_process</span>(delta):
    <span class="kw">if not</span> <span class="fn">is_multiplayer_authority</span>(): <span class="kw">return</span>
    _tick_accum += delta
    <span class="kw">if</span> _tick_accum &gt;= <span class="nm">1.0</span> / tick_rate:
        _tick_accum = <span class="nm">0.0</span>
        <span class="fn">recv_snapshot</span>.<span class="fn">rpc</span>(position, velocity)

<span class="dc">@rpc</span>(<span class="st">"authority"</span>, <span class="st">"call_remote"</span>, <span class="st">"unreliable_ordered"</span>)
<span class="kw">func</span> <span class="fn">recv_snapshot</span>(pos: <span class="kw">Vector2</span>, vel: <span class="kw">Vector2</span>):
    _remote_pos = pos
    _remote_vel = vel

<span class="cm"># INTERPOLATION — smooth the gaps between snapshots</span>
<span class="kw">func</span> <span class="fn">_process</span>(delta):
    <span class="kw">if</span> <span class="fn">is_multiplayer_authority</span>(): <span class="kw">return</span>
    position = position.<span class="fn">lerp</span>(_remote_pos, <span class="nm">12.0</span> * delta)

<span class="cm"># EVENTS — send only on change, for important things</span>
<span class="dc">@rpc</span>(<span class="st">"any_peer"</span>, <span class="st">"call_remote"</span>, <span class="st">"reliable"</span>)
<span class="kw">func</span> <span class="fn">player_fired</span>(aim_dir: <span class="kw">Vector2</span>):
    <span class="kw">var</span> bullet = BulletScene.<span class="fn">instantiate</span>()
    bullet.direction = aim_dir
    <span class="fn">add_child</span>(bullet)`,
body:`<p>Every frame your game produces gigabytes of state. You can send maybe a few kilobytes of it over the network. Deciding <em>what</em> to send, <em>how often</em>, and <em>how reliably</em> is one of the most impactful architectural decisions in multiplayer game design.</p>
<div class="step-card"><span class="step-num">SNAPSHOT SYNC — SEND STATE, NOT EVENTS</span>
Every N milliseconds broadcast full relevant state: position, velocity, health, animation state. Old snapshots discarded automatically with <em>unreliable_ordered</em>.<br><br>
Good for: physics objects, player positions, frequently-changing values.<br>
Bad for: discrete one-off events like explosions or item pickups.<br>
Cost: predictable, fixed bandwidth.</div>
<div class="step-card"><span class="step-num">EVENT-DRIVEN — SEND WHAT HAPPENED</span>
Send RPCs only when something changes: player fired, player jumped, player picked up an item.<br><br>
Good for: rare important events with side effects — sounds, particles, score.<br>
Bad for: continuous state — "position unchanged" every tick costs more than just sending the position.<br>
Pitfall: a lost unreliable event = desync that never self-heals.</div>
<div class="step-card"><span class="step-num">INTERPOLATION — SMOOTH THE GAPS</span>
You receive a position at t=0ms, next at t=50ms. What do you render at t=25ms? <strong>Interpolate</strong> — blend between last known and newly received. Player looks smooth even at low tick rates. Trade-off: you render 50–100ms in the past. Usually invisible.</div>
<div class="tip">Tick rate is your bandwidth budget dial. 20Hz = 50ms between updates, fine for strategy and RPGs. 60Hz = 16ms, needed for fast-paced action. The hybrid that works for most indie games: positions via unreliable snapshots at 20Hz, important events via reliable RPCs on-demand. The golden rule: <em>never send what the other end can compute itself.</em></div>
<div class="challenge">Add dead reckoning to your interpolation. When a snapshot arrives, store velocity alongside position. Between snapshots, extrapolate: <code>predicted_pos = last_pos + last_vel * elapsed</code>. Then lerp toward newly arriving snapshots to correct drift. Compare it to pure lerp. For slow-moving characters, lerp wins. For fast projectiles, dead reckoning wins. Now you know why some things feel snappy and others feel floaty.</div>`
},
{
title:"Client-Side Prediction",
subtitle:"08 — Moving Before Permission",
vizLabel:"▶ prediction &amp; reconciliation",
viz:"prediction",
snippet:`<span class="cm"># Apply input LOCALLY and IMMEDIATELY.</span>
<span class="cm"># Send it to the server. Correct if the server disagrees.</span>

<span class="kw">var</span> _input_buffer: <span class="kw">Array</span> = []
<span class="kw">var</span> _current_tick: <span class="kw">int</span> = <span class="nm">0</span>

<span class="kw">func</span> <span class="fn">_physics_process</span>(delta):
    <span class="kw">if not</span> <span class="fn">is_multiplayer_authority</span>(): <span class="kw">return</span>

    <span class="kw">var</span> dir = Input.<span class="fn">get_vector</span>(<span class="st">"ui_left"</span>,<span class="st">"ui_right"</span>,<span class="st">"ui_up"</span>,<span class="st">"ui_down"</span>)
    _input_buffer.<span class="fn">append</span>({<span class="st">"tick"</span>: _current_tick, <span class="st">"dir"</span>: dir})

    <span class="fn">_apply_input</span>(dir, delta)                     <span class="cm"># move IMMEDIATELY</span>
    <span class="fn">_server_input</span>.<span class="fn">rpc_id</span>(<span class="nm">1</span>, _current_tick, dir)  <span class="cm"># tell server</span>
    _current_tick += <span class="nm">1</span>

<span class="dc">@rpc</span>(<span class="st">"authority"</span>, <span class="st">"call_remote"</span>, <span class="st">"unreliable_ordered"</span>)
<span class="kw">func</span> <span class="fn">reconcile</span>(confirmed_tick: <span class="kw">int</span>, server_pos: <span class="kw">Vector2</span>):
    <span class="cm"># Drop inputs the server has confirmed</span>
    _input_buffer = _input_buffer.<span class="fn">filter</span>(
        <span class="kw">func</span>(i): <span class="kw">return</span> i[<span class="st">"tick"</span>] &gt; confirmed_tick
    )
    <span class="cm"># If server disagrees: snap and replay buffered inputs</span>
    <span class="kw">if</span> position.<span class="fn">distance_to</span>(server_pos) &gt; <span class="nm">1.0</span>:
        position = server_pos
        <span class="kw">for</span> inp <span class="kw">in</span> _input_buffer:
            <span class="fn">_apply_input</span>(inp[<span class="st">"dir"</span>], <span class="nm">0.016</span>)`,
body:`<p>Here is the dirty secret of every smooth-feeling multiplayer game: <strong>the client is lying to you</strong>. Not maliciously — helpfully. At 100ms ping, waiting for server confirmation before moving your character feels like wading through concrete. So you do not wait. You move immediately, tell the server what you did, and quietly fix any discrepancy when the truth arrives.</p>
<div class="step-card"><span class="step-num">THE PREDICTION LOOP — FIVE STEPS</span>
1. Player presses right.<br>
2. Client immediately moves the character right. Locally. Right now.<br>
3. Client sends "tick 42: pressed right" to the server.<br>
4. Server simulates tick 42 with the received input.<br>
5. Server sends back "at tick 42 you were at position X". Client compares — if they match, great. If not, snap to server position and replay all buffered unconfirmed inputs.</div>
<div class="step-card"><span class="step-num">INPUT BUFFERING — WHY YOU KEEP A RECORD</span>
Every unconfirmed input lives in a buffer. When the server confirms up to tick N, discard everything at or before N. The rest are unconfirmed — applied locally but not yet blessed by the server.<br><br>
If the server corrects you, re-simulate from the correction using all buffered inputs. This is <strong>replay</strong>. For replay to work the simulation must be deterministic — same inputs always produce the same position delta.</div>
<div class="step-card"><span class="step-num">WHEN IT GOES WRONG — RUBBER-BANDING</span>
Running forward, snap backward, running again. Prediction correction failing. Common causes:<br>
— Server and client running physics at different rates<br>
— Non-deterministic physics (floating point differences)<br>
— Server-side collision the client did not know about</div>
<div class="tip">Client prediction is for <em>your own</em> character only. Remote players arrive as position snapshots and get smoothly interpolated. You never predict remote players — you have literally zero idea what inputs they are pressing right now. The exception: projectiles, where many games spawn a local visual preview on fire and reconcile if the server disagrees.</div>`
},
{
title:"Rollback: The Core Idea",
subtitle:"09 — Assume, Simulate, Correct",
vizLabel:"▶ rollback tick timeline",
viz:"rollback",
snippet:`<span class="cm"># THE ROLLBACK ALGORITHM in pseudocode</span>
<span class="cm">#</span>
<span class="cm"># Every tick:</span>
<span class="cm">#   1. Collect local input</span>
<span class="cm">#   2. Predict remote inputs (repeat last known)</span>
<span class="cm">#   3. Save game state</span>
<span class="cm">#   4. Simulate one tick with all inputs</span>
<span class="cm">#   5. Send local input to peers</span>
<span class="cm">#</span>
<span class="cm"># When a remote input arrives for a past tick:</span>
<span class="cm">#   1. Check: did we predict it correctly?</span>
<span class="cm">#   2. If wrong: restore state at that tick</span>
<span class="cm">#   3. Replace predicted input with real input</span>
<span class="cm">#   4. Resimulate all ticks up to present</span>
<span class="cm">#   5. Render the corrected present</span>

<span class="cm"># Rollback vs delay-based:</span>
<span class="cm">#</span>
<span class="cm"># DELAY-BASED: wait N frames for all inputs,</span>
<span class="cm">#   then simulate. Safe but sluggish.</span>
<span class="cm">#   Used by: SF2, early NeoGeo games</span>
<span class="cm">#</span>
<span class="cm"># ROLLBACK: simulate immediately with guesses,</span>
<span class="cm">#   correct silently when truth arrives.</span>
<span class="cm">#   Used by: Guilty Gear Strive, SF6, MK1</span>`,
body:`<p>Client prediction (lesson 08) hides your own input latency. But you still have <em>no idea</em> what other players are pressing right now — their inputs are in the mail, somewhere between their keyboard and your ears. Rollback is the answer: simulate the whole world on guesses, then quietly rewind and correct when the truth lands. Fast enough that players never notice.</p>
<div class="step-card"><span class="step-num">THE CORE LOOP — GUESS, SIMULATE, CORRECT</span>
You receive Player 2's inputs ~30–80ms late due to network delay. Rather than waiting, you <strong>guess</strong> their input (almost always: repeat their last known input — humans are creatures of habit). Simulate the frame. Render it.<br><br>
When the real input arrives, compare: did you guess right? If yes, nothing to do. If wrong: silently roll back to the saved state for that tick, insert the real input, re-simulate every subsequent tick up to the present, and render. The player never sees a freeze.</div>
<div class="step-card"><span class="step-num">WHY GUESSING WORKS — INPUT COHERENCE</span>
Input guess accuracy is surprisingly high — typically 85–95%. Players hold directions for multiple frames. Attacks execute over several frames. The game loop rate (60Hz) is much faster than human reaction time (~150ms). So for most frames, "repeat last input" is exactly right.<br><br>
When guesses are wrong it is usually because of brief input transitions — releasing a key, starting a new motion. These corrections are small and imperceptible unless your rollback is deeper than 8 frames.</div>
<div class="step-card"><span class="step-num">ROLLBACK DEPTH — HOW FAR BACK CAN YOU GO?</span>
Rollback depth = maximum frames you can roll back. Determined by your network conditions: at 60Hz, 60ms RTT = 4 frames one-way, so you may need to roll back 4–8 frames. Each extra frame of depth costs:<br>
— Memory: one full game state snapshot<br>
— CPU: one extra simulation pass per rollback<br><br>
Most games cap at 8–10 frames. Beyond that, corrections become visible. If your RTT regularly exceeds ~130ms (8 frames at 60Hz), rollback struggles — consider adding 1–2 frames of delay-based input buffering as a floor.</div>
<div class="tip">Rollback is a high-skill technique. It turns your game into a time machine, which sounds cool until the time machine takes you to a slightly different universe than your opponent. That is what desync feels like. The fix is determinism, covered in lesson 14. Build a checksum system early — it is the only way to know if you have a problem before you ship.</div>`,
},
{
title:"The Tick Loop",
subtitle:"10 — Fixed Timestep Engine",
vizLabel:"▶ tick vs render frame",
viz:"tickloop",
snippet:`<span class="cm"># RollbackManager.gd — the tick engine</span>
<span class="kw">extends</span> Node

<span class="kw">const</span> TICK_RATE = <span class="nm">60</span>               <span class="cm"># ticks per second</span>
<span class="kw">const</span> TICK_DELTA = <span class="nm">1.0</span> / TICK_RATE  <span class="cm"># 0.01666... seconds</span>

<span class="kw">var</span> current_tick: <span class="kw">int</span> = <span class="nm">0</span>
<span class="kw">var</span> _tick_accum: <span class="kw">float</span> = <span class="nm">0.0</span>
<span class="kw">var</span> _max_rollback_frames: <span class="kw">int</span> = <span class="nm">8</span>

<span class="cm"># Rollback runs its OWN tick loop — separate from Godot's _process!</span>
<span class="cm"># _process just advances the accumulator.</span>
<span class="kw">func</span> <span class="fn">_process</span>(delta: <span class="kw">float</span>):
    _tick_accum += delta
    <span class="cm"># Run as many fixed ticks as time has accumulated</span>
    <span class="kw">while</span> _tick_accum >= TICK_DELTA:
        _tick_accum -= TICK_DELTA
        <span class="fn">_run_tick</span>(current_tick)
        current_tick += <span class="nm">1</span>
    <span class="cm"># Render at the real frame rate with interpolation</span>
    <span class="fn">_render_interpolated</span>(_tick_accum / TICK_DELTA)

<span class="kw">func</span> <span class="fn">_run_tick</span>(tick: <span class="kw">int</span>):
    <span class="fn">_collect_local_input</span>(tick)
    <span class="fn">_predict_remote_inputs</span>(tick)
    <span class="fn">_save_state</span>(tick)         <span class="cm"># BEFORE simulating</span>
    <span class="fn">_simulate</span>(tick)           <span class="cm"># advance physics/logic</span>
    <span class="fn">_send_local_input</span>(tick)   <span class="cm"># network it out</span>
    <span class="fn">_cleanup_old_states</span>(tick) <span class="cm"># keep only last N frames</span>

<span class="cm"># CRITICAL: use TICK_DELTA as your delta, never real frame time</span>
<span class="kw">func</span> <span class="fn">_simulate</span>(tick: <span class="kw">int</span>):
    <span class="kw">for</span> entity <span class="kw">in</span> _simulated_entities:
        entity.<span class="fn">rollback_tick</span>(TICK_DELTA)  <span class="cm"># fixed delta always</span>`,
body:`<p>Everything in rollback hinges on one rule: your game simulation must run on a <strong>fixed timestep</strong>, completely decoupled from your render framerate. Violate this and rollback will produce different results on different machines. Not sometimes. Every time. Your desync will be immediate and total.</p>
<div class="step-card"><span class="step-num">FIXED TICK vs RENDER FRAME — WHY THEY MUST BE SEPARATE</span>
Godot's <code>_process(delta)</code> gives you a variable delta — 16ms at 60fps, 33ms at 30fps, sometimes 22ms on a busy frame. If your game logic uses this directly, two machines running at different framerates will compute different positions from the same inputs. <em>That is a desync.</em><br><br>
Rollback uses a fixed tick rate (typically 60 ticks/second = 16.666ms always). The tick loop accumulates real time and fires as many fixed ticks as have elapsed. Rendering runs at whatever framerate the GPU allows, interpolating between the last two ticks for smoothness.</div>
<div class="step-card"><span class="step-num">THE ACCUMULATOR PATTERN</span>
<code>_tick_accum</code> collects real time. Each <code>_process</code> call adds <code>delta</code> to it. While it is ≥ one tick, fire a tick and subtract the tick duration. What remains in the accumulator is used for render interpolation (0.0 = just started a tick, 1.0 = about to start the next).<br><br>
This handles: dropped frames (two ticks fire in one _process), slow machines (ticks catch up), fast machines (sometimes zero ticks fire, frame is pure interpolation).</div>
<div class="step-card"><span class="step-num">THE ORDER INSIDE _run_tick — MATTERS ENORMOUSLY</span>
<em>1. Collect local input</em> — read Input.is_action_pressed() now<br>
<em>2. Predict remote inputs</em> — for any peer whose input has not arrived yet<br>
<em>3. Save state</em> — snapshot the entire game world BEFORE simulating<br>
<em>4. Simulate</em> — advance physics and logic with TICK_DELTA<br>
<em>5. Send local input</em> — broadcast this tick's input to peers<br>
<em>6. Cleanup</em> — discard state history older than max_rollback_frames<br><br>
State is saved BEFORE simulate so you can restore to "what the world looked like before this tick ran." Rolling back to tick N and re-simulating it puts you exactly where you were before tick N executed.</div>
<div class="step-card"><span class="step-num">DISABLING GODOT'S BUILT-IN PHYSICS</span>
Godot runs physics in <code>_physics_process</code> at its own rate. For rollback you take manual control:<br><br>
<code>get_tree().physics_interpolation_enabled = false</code><br>
<code>Engine.physics_ticks_per_second = 60</code>  <span style="color:#4a6070">  # match your tick rate</span><br><br>
Or bypass Godot physics entirely and implement your own movement math inside <code>rollback_tick()</code>. Many rollback games use simple Euler integration: <code>pos += vel * TICK_DELTA</code>. Simple, deterministic, fast to re-simulate.</div>
<div class="tip">Cap your resimulation: if you are 10 frames behind and each resimulation takes 3ms, that is 30ms of extra CPU in one frame — enough to cause another dropped frame, causing more catchup, causing a spiral. Track how many rollback ticks fired per frame and emit a warning when it exceeds max_rollback_frames. That signals network conditions too bad for rollback to hide.</div>`,
},
{
title:"State Serialization",
subtitle:"11 — Save and Restore Everything",
vizLabel:"▶ state snapshot structure",
viz:"stateserialize",
snippet:`<span class="cm"># Every entity that participates in rollback implements two methods.</span>

<span class="cm"># --- Player.gd ---</span>
<span class="kw">extends</span> CharacterBody2D

<span class="cm"># SAVE: return a Dictionary of every variable that affects future state</span>
<span class="kw">func</span> <span class="fn">save_state</span>() -> <span class="kw">Dictionary</span>:
    <span class="kw">return</span> {
        <span class="st">"position"</span>: position,
        <span class="st">"velocity"</span>: velocity,
        <span class="st">"health"</span>: health,
        <span class="st">"facing"</span>: facing,
        <span class="st">"anim_frame"</span>: $Sprite2D.frame,
        <span class="st">"anim_progress"</span>: $AnimationPlayer.current_animation_position,
        <span class="st">"attack_cooldown"</span>: _attack_cooldown,
        <span class="st">"is_invincible"</span>: _is_invincible,
        <span class="st">"jumps_remaining"</span>: _jumps_remaining,
    }

<span class="cm"># RESTORE: apply a previously saved Dictionary back to this node</span>
<span class="kw">func</span> <span class="fn">load_state</span>(s: <span class="kw">Dictionary</span>) -> <span class="kw">void</span>:
    position           = s[<span class="st">"position"</span>]
    velocity           = s[<span class="st">"velocity"</span>]
    health             = s[<span class="st">"health"</span>]
    facing             = s[<span class="st">"facing"</span>]
    $Sprite2D.frame    = s[<span class="st">"anim_frame"</span>]
    $AnimationPlayer.current_animation_position = s[<span class="st">"anim_progress"</span>]
    _attack_cooldown   = s[<span class="st">"attack_cooldown"</span>]
    _is_invincible     = s[<span class="st">"is_invincible"</span>]
    _jumps_remaining   = s[<span class="st">"jumps_remaining"</span>]

<span class="cm"># --- RollbackManager.gd ---</span>
<span class="cm"># Iterate all rollback participants and collect their state</span>
<span class="kw">func</span> <span class="fn">_save_state</span>(tick: <span class="kw">int</span>):
    <span class="kw">var</span> snapshot = {}
    <span class="kw">for</span> entity <span class="kw">in</span> _rollback_entities:
        snapshot[entity.<span class="fn">get_path</span>()] = entity.<span class="fn">save_state</span>()
    _state_history[tick] = snapshot

<span class="kw">func</span> <span class="fn">_restore_state</span>(tick: <span class="kw">int</span>):
    <span class="kw">var</span> snapshot = _state_history[tick]
    <span class="kw">for</span> entity <span class="kw">in</span> _rollback_entities:
        entity.<span class="fn">load_state</span>(snapshot[entity.<span class="fn">get_path</span>()])`,
body:`<p>The save/restore system is where rollback either works or falls apart. The requirements sound simple: save everything, restore everything, fast enough to run 60 times per second. The word "everything" is where developers get bitten. Miss a single variable and you will have a desync that takes hours to find.</p>
<div class="step-card"><span class="step-num">WHAT TO SAVE — EVERYTHING THAT AFFECTS FUTURE STATE</span>
If a variable is read during <code>rollback_tick()</code>, it must be in the snapshot. Common misses:<br><br>
— Cooldown timers / countdowns<br>
— Invincibility frames, hitstun counters<br>
— Animation state (frame index AND position within the frame)<br>
— RNG seed (if using random values in logic)<br>
— Spawned bullet/projectile list<br>
— Combo counter, state machine current state<br><br>
<em>Visual-only</em> state does not need saving: particle effects, screen shake, hit sparks. These are cosmetic and re-triggered by game events during resimulation. Only the last frame rendered is shown to the player anyway.</div>
<div class="step-card"><span class="step-num">REGISTRATION PATTERN — TELL THE MANAGER ABOUT YOURSELF</span>
Entities opt in by registering with the RollbackManager on _ready:<br><br>
<code>func _ready():</code><br>
<code>&nbsp;&nbsp;&nbsp;&nbsp;RollbackManager.register(self)</code><br>
<code>func _exit_tree():</code><br>
<code>&nbsp;&nbsp;&nbsp;&nbsp;RollbackManager.unregister(self)</code><br><br>
The manager stores a list of all registered entities. Each tick it iterates them to collect and restore state. Newly spawned entities (bullets, pickups) must register immediately on <code>add_child()</code>. Entities that die during resimulation must handle being re-spawned or re-killed correctly.</div>
<div class="step-card"><span class="step-num">MEMORY COST — HOW MUCH IS ONE SNAPSHOT?</span>
Two players × ~12 variables × 8 bytes average = ~200 bytes per entity, per tick. At 60 ticks/second with 8 frames of rollback history: 8 snapshots × (2 players × 200 bytes) = ~3.2KB. Trivial. Even with 20 bullets and 10 game objects, a snapshot stays well under 50KB. Memory is not your constraint — CPU for resimulation is.</div>
<div class="step-card"><span class="step-num">HANDLING SPAWNS AND DESPAWNS DURING ROLLBACK</span>
This is the hardest part. If a bullet was spawned at tick 42 and you roll back to tick 40, the bullet must be deleted. When resimulating tick 42, it must be re-spawned. Solutions:<br><br>
<em>Object pooling:</em> never actually delete objects, just hide and recycle them. Snapshot includes "active" flag.<br>
<em>Snapshot the spawn list:</em> save which entities exist at each tick. On restore, add/remove nodes to match.<br>
<em>Deterministic spawn IDs:</em> use tick number + peer ID as a deterministic unique ID for spawned entities.</div>
<div class="tip">Use <code>get_path()</code> as your state dictionary key. It handles nested scenes cleanly, survives refactors, and — critically — if an entity is deleted and re-created during rollback, the path stays the same while the object reference changes. Object references as dictionary keys in rollback code is a one-way ticket to baffling bugs at 2am the night before your release.</div>`,
},

snippet:`<span class="cm"># InputFrame: one tick's worth of input from one peer</span>
<span class="kw">class_name</span> <span class="fn">InputFrame</span>
<span class="kw">var</span> tick: <span class="kw">int</span>
<span class="kw">var</span> peer_id: <span class="kw">int</span>
<span class="kw">var</span> move: <span class="kw">Vector2</span>   <span class="cm"># left stick / WASD direction</span>
<span class="kw">var</span> buttons: <span class="kw">int</span>    <span class="cm"># bitmask: bit0=jump, bit1=attack, bit2=block</span>

<span class="kw">func</span> <span class="fn">serialize</span>() -> <span class="kw">PackedByteArray</span>:
    <span class="kw">var</span> buf = PackedByteArray()
    buf.<span class="fn">resize</span>(<span class="nm">13</span>)  <span class="cm"># 4 + 4 + 4 + 1 bytes</span>
    buf.<span class="fn">encode_s32</span>(<span class="nm">0</span>, tick)
    buf.<span class="fn">encode_float</span>(<span class="nm">4</span>, move.x)
    buf.<span class="fn">encode_float</span>(<span class="nm">8</span>, move.y)
    buf[<span class="nm">12</span>] = buttons
    <span class="kw">return</span> buf

<span class="kw">static func</span> <span class="fn">deserialize</span>(buf: <span class="kw">PackedByteArray</span>, from_peer: <span class="kw">int</span>) -> <span class="fn">InputFrame</span>:
    <span class="kw">var</span> f = InputFrame.<span class="fn">new</span>()
    f.peer_id = from_peer
    f.tick    = buf.<span class="fn">decode_s32</span>(<span class="nm">0</span>)
    f.move.x  = buf.<span class="fn">decode_float</span>(<span class="nm">4</span>)
    f.move.y  = buf.<span class="fn">decode_float</span>(<span class="nm">8</span>)
    f.buttons = buf[<span class="nm">12</span>]
    <span class="kw">return</span> f

<span class="cm"># --- In RollbackManager ---</span>

<span class="cm"># Send local input: broadcast every tick, include last N frames</span>
<span class="cm"># (redundancy combats single-packet loss)</span>
<span class="dc">@rpc</span>(<span class="st">"any_peer"</span>, <span class="st">"call_remote"</span>, <span class="st">"unreliable"</span>)
<span class="kw">func</span> <span class="fn">recv_input</span>(frames: <span class="kw">PackedByteArray</span>):
    <span class="kw">var</span> sender = multiplayer.<span class="fn">get_remote_sender_id</span>()
    <span class="kw">var</span> offset = <span class="nm">0</span>
    <span class="kw">while</span> offset < frames.<span class="fn">size</span>():
        <span class="kw">var</span> frame = InputFrame.<span class="fn">deserialize</span>(frames.<span class="fn">slice</span>(offset, offset + <span class="nm">13</span>), sender)
        offset += <span class="nm">13</span>
        <span class="fn">_on_remote_input_received</span>(frame)

<span class="cm"># PREDICTION: if no input arrived for this tick, use last known</span>
<span class="kw">func</span> <span class="fn">_predict_input</span>(peer: <span class="kw">int</span>, tick: <span class="kw">int</span>) -> <span class="fn">InputFrame</span>:
    <span class="kw">var</span> last = _last_received_input.get(peer)
    <span class="kw">if</span> last == <span class="kw">null</span>:
        <span class="kw">return</span> InputFrame.<span class="fn">new</span>()  <span class="cm"># neutral: no input</span>
    <span class="kw">var</span> predicted = InputFrame.<span class="fn">new</span>()
    predicted.peer_id = peer
    predicted.tick    = tick
    predicted.move    = last.move     <span class="cm"># repeat last direction</span>
    predicted.buttons = last.buttons  <span class="cm"># repeat last buttons</span>
    <span class="kw">return</span> predicted`,
body:`<p>Rollback's promise is this: as long as every peer eventually receives every other peer's input for every tick — even late — the simulation will converge to the same result everywhere. The input sync layer is what makes "eventually" happen fast enough for players not to notice.</p>
<div class="step-card"><span class="step-num">THE INPUTFRAME — SERIALIZE SMALL</span>
One tick of input is tiny. For a 2D fighter: direction (2 floats) + buttons (1 byte bitmask) + tick number (4 bytes) = 13 bytes. Sending 60 of these per second per peer = 780 bytes/sec outbound. Negligible. If you are sending more, you are over-engineering it.<br><br>
Bitmask your buttons: <code>var buttons: int = 0</code>. Set bits with <code>buttons |= (1 &lt;&lt; 0)</code> for jump, <code>(1 &lt;&lt; 1)</code> for attack, etc. Eight buttons fit in one byte. Unset with <code>buttons &amp;= ~(1 &lt;&lt; 0)</code>. Test with <code>buttons &amp; (1 &lt;&lt; 0) != 0</code>.</div>
<div class="step-card"><span class="step-num">REDUNDANCY — SENDING MULTIPLE FRAMES PER PACKET</span>
UDP can drop packets. A dropped input frame = rollback. Mitigation: include the last <em>N</em> input frames in every packet. If the current packet gets through, older frames are also confirmed redundantly.<br><br>
With N=3 redundancy and 2% packet loss, the chance of losing all three copies of a frame is 0.02³ = 0.000008. Essentially zero. Your packet grows from 13 bytes to 39 bytes. Still tiny. The Godot Rollback addon uses this technique by default.</div>
<div class="step-card"><span class="step-num">WHEN REMOTE INPUT ARRIVES — THREE CASES</span>
<em>Case 1: tick is in the future.</em> Store it. We will use it when we get there.<br>
<em>Case 2: tick matches our current prediction.</em> Great — confirm it. No rollback needed.<br>
<em>Case 3: tick is in the past and prediction was wrong.</em> Trigger rollback. Restore state at that tick, correct the input, resimulate up to current_tick.</div>
<div class="step-card"><span class="step-num">INPUT DELAY — ADDING A FLOOR</span>
Optional but helpful: add 1–2 frames of local input delay. When you press a key, store the input for <em>tick+2</em> instead of <em>tick</em>. This gives remote inputs extra time to arrive before you need them — reducing rollbacks on average. The cost is 33ms of extra input latency. For most games the reduction in corrections is worth it. Fighting games typically use 0–2 frames of delay depending on RTT.</div>
<div class="tip">This one will get you: <code>Input.is_action_just_pressed()</code> depends on Godot's internal frame event system, which does not fire during resimulation. Read all inputs once per real tick, pack them into your InputFrame, and use <em>only</em> the InputFrame values during simulation. Both the initial pass and every resimulation pass use the same stored data. Read input once per real tick, store it in the InputFrame, and use the stored value during both the initial simulation and any resimulation passes.</div>`,
},

title:"Full Rollback Implementation",

viz:"rollbackflow",
snippet:`<span class="cm"># RollbackManager.gd — complete implementation skeleton</span>
<span class="kw">extends</span> Node

<span class="kw">const</span> TICK_RATE      = <span class="nm">60</span>
<span class="kw">const</span> TICK_DELTA     = <span class="nm">1.0</span> / TICK_RATE
<span class="kw">const</span> MAX_ROLLBACK   = <span class="nm">8</span>
<span class="kw">const</span> INPUT_REDUNDANCY = <span class="nm">3</span>  <span class="cm"># send last N input frames</span>

<span class="kw">var</span> current_tick:   <span class="kw">int</span> = <span class="nm">0</span>
<span class="kw">var</span> _tick_accum:    <span class="kw">float</span> = <span class="nm">0.0</span>
<span class="kw">var</span> _state_history: <span class="kw">Dictionary</span> = {}
<span class="kw">var</span> _input_history: <span class="kw">Dictionary</span> = {}  <span class="cm"># tick -> {peer_id: InputFrame}</span>
<span class="kw">var</span> _local_history: <span class="kw">Array</span>[<span class="fn">InputFrame</span>] = []  <span class="cm"># for redundancy</span>
<span class="kw">var</span> _last_received: <span class="kw">Dictionary</span> = {}   <span class="cm"># peer -> last InputFrame</span>
<span class="kw">var</span> _confirmed_tick: <span class="kw">Dictionary</span> = {} <span class="cm"># peer -> last confirmed tick</span>
<span class="kw">var</span> _entities: <span class="kw">Array</span> = []

<span class="kw">func</span> <span class="fn">register</span>(e): _entities.<span class="fn">append</span>(e)
<span class="kw">func</span> <span class="fn">unregister</span>(e): _entities.<span class="fn">erase</span>(e)

<span class="kw">func</span> <span class="fn">_process</span>(delta: <span class="kw">float</span>):
    _tick_accum += delta
    <span class="kw">while</span> _tick_accum >= TICK_DELTA:
        _tick_accum -= TICK_DELTA
        <span class="fn">_run_tick</span>(current_tick)
        current_tick += <span class="nm">1</span>

<span class="kw">func</span> <span class="fn">_run_tick</span>(tick: <span class="kw">int</span>):
    <span class="cm"># 1. Local input</span>
    <span class="kw">var</span> local_inp = <span class="fn">_read_local_input</span>(tick)
    <span class="fn">_store_input</span>(tick, multiplayer.<span class="fn">get_unique_id</span>(), local_inp)
    _local_history.<span class="fn">push_front</span>(local_inp)
    <span class="kw">if</span> _local_history.<span class="fn">size</span>() > INPUT_REDUNDANCY:
        _local_history.<span class="fn">resize</span>(INPUT_REDUNDANCY)

    <span class="cm"># 2. Predict remote inputs (for any that haven't arrived)</span>
    <span class="kw">for</span> peer <span class="kw">in</span> multiplayer.<span class="fn">get_peers</span>():
        <span class="kw">if not</span> _has_real_input(tick, peer):
            <span class="fn">_store_input</span>(tick, peer, <span class="fn">_predict_input</span>(peer, tick))

    <span class="cm"># 3. Snapshot state BEFORE simulating</span>
    <span class="fn">_save_state</span>(tick)

    <span class="cm"># 4. Simulate</span>
    <span class="kw">for</span> entity <span class="kw">in</span> _entities:
        <span class="kw">var</span> inp = _input_history[tick][entity.<span class="fn">get_authority_id</span>()]
        entity.<span class="fn">rollback_tick</span>(TICK_DELTA, inp)

    <span class="cm"># 5. Broadcast local input (with redundancy)</span>
    <span class="fn">_send_local_input</span>()

    <span class="cm"># 6. Prune old history</span>
    <span class="kw">var</span> oldest = tick - MAX_ROLLBACK - <span class="nm">1</span>
    _state_history.<span class="fn">erase</span>(oldest)

<span class="dc">@rpc</span>(<span class="st">"any_peer"</span>, <span class="st">"call_remote"</span>, <span class="st">"unreliable"</span>)
<span class="kw">func</span> <span class="fn">recv_input_packet</span>(data: <span class="kw">PackedByteArray</span>):
    <span class="kw">var</span> sender = multiplayer.<span class="fn">get_remote_sender_id</span>()
    <span class="kw">var</span> offset = <span class="nm">0</span>
    <span class="kw">while</span> offset < data.<span class="fn">size</span>():
        <span class="kw">var</span> frame = InputFrame.<span class="fn">deserialize</span>(data.<span class="fn">slice</span>(offset, offset + <span class="nm">13</span>), sender)
        offset += <span class="nm">13</span>
        <span class="fn">_on_remote_frame</span>(frame)

<span class="kw">func</span> <span class="fn">_on_remote_frame</span>(frame: <span class="fn">InputFrame</span>):
    <span class="kw">var</span> tick = frame.tick
    <span class="kw">var</span> peer = frame.peer_id
    _last_received[peer] = frame

    <span class="cm"># Already past this tick — check if prediction was right</span>
    <span class="kw">if</span> tick < current_tick:
        <span class="kw">var</span> predicted = _input_history.get(tick, {}).get(peer)
        <span class="kw">if</span> predicted <span class="kw">and</span> <span class="fn">_inputs_differ</span>(predicted, frame):
            <span class="fn">_do_rollback</span>(tick, peer, frame)
    <span class="kw">else</span>:
        <span class="cm"># Future or current — store real input</span>
        <span class="fn">_store_input</span>(tick, peer, frame)

<span class="kw">func</span> <span class="fn">_do_rollback</span>(from_tick: <span class="kw">int</span>, peer: <span class="kw">int</span>, real: <span class="fn">InputFrame</span>):
    <span class="kw">if</span> from_tick < current_tick - MAX_ROLLBACK:
        <span class="fn">push_error</span>(<span class="st">"Rollback too deep: "</span> + <span class="kw">str</span>(current_tick - from_tick) + <span class="st">" frames"</span>)
        <span class="kw">return</span>
    <span class="fn">_store_input</span>(from_tick, peer, real)  <span class="cm"># replace prediction with truth</span>
    <span class="fn">_restore_state</span>(from_tick)            <span class="cm"># wind back</span>
    <span class="kw">for</span> t <span class="kw">in</span> <span class="fn">range</span>(from_tick, current_tick):  <span class="cm"># resimulate forward</span>
        <span class="kw">for</span> entity <span class="kw">in</span> _entities:
            <span class="kw">var</span> inp = _input_history[t][entity.<span class="fn">get_authority_id</span>()]
            entity.<span class="fn">rollback_tick</span>(TICK_DELTA, inp)`,
body:`<p>Theory time is over. Here is the complete implementation. This is the class that sits at the top of your scene tree, owns the tick loop, coordinates all entities, and handles every rollback. Read it top to bottom. Every rollback game is a variation of this — simpler if you have fewer entities, more complex if you have physics objects, but the structure does not change.</p>
<div class="step-card"><span class="step-num">THE ENTITY CONTRACT — WHAT EACH GAME OBJECT MUST IMPLEMENT</span>
Every entity participating in rollback implements three methods:<br><br>
<code>save_state() -> Dictionary</code> — return all state variables<br>
<code>load_state(s: Dictionary) -> void</code> — restore from saved dict<br>
<code>rollback_tick(delta: float, input: InputFrame) -> void</code> — one tick of simulation<br><br>
The <code>rollback_tick</code> replaces <code>_physics_process</code> entirely. It must be pure and deterministic — same inputs, same output. Never read from <code>Input</code> inside it, never read the real clock, never spawn nodes without recording them.</div>
<div class="step-card"><span class="step-num">COMPARING INPUTS — WHEN IS A PREDICTION WRONG?</span>
<code>_inputs_differ(predicted, real)</code> compares two InputFrames. For Vector2 movement, use an epsilon: <code>predicted.move.distance_to(real.move) > 0.001</code> to handle float precision. For button bitmasks: exact comparison <code>predicted.buttons != real.buttons</code>.<br><br>
Only roll back if they actually differ. Many incoming packets will confirm predictions you already guessed correctly — treat them as free confirmations, no work needed.</div>
<div class="step-card"><span class="step-num">THE ROLLBACK ITSELF — FIVE LINES THAT MATTER</span>
<code>_store_input(from_tick, peer, real)</code> — replace the predicted input with truth<br>
<code>_restore_state(from_tick)</code> — reload all entity states from the snapshot<br>
<code>for t in range(from_tick, current_tick)</code> — resimulate every tick since<br>
Run each entity's <code>rollback_tick</code> with the now-corrected input<br>
Return to normal — the manager continues from <code>current_tick</code> as if nothing happened</div>
<div class="step-card"><span class="step-num">VISUAL CONSISTENCY — DON'T RENDER DURING RESIMULATION</span>
During the rollback resimulation loop, you are computing game states rapidly. You do not want particles to trigger, sounds to play, or screen shake to start for each resimulated tick. Gate all visual/audio side-effects with a flag:<br><br>
<code>if not RollbackManager.is_resimulating:</code><br>
<code>&nbsp;&nbsp;&nbsp;&nbsp;$AnimationPlayer.play("hit_flash")</code><br>
<code>&nbsp;&nbsp;&nbsp;&nbsp;$SFX.play()</code><br><br>
Set <code>is_resimulating = true</code> at the start of the rollback loop and back to <code>false</code> at the end. This one flag prevents ghost particles and duplicate sound effects.</div>
<div class="tip">Build a debug overlay on day one: current tick, ticks-rolled-back-this-frame, prediction accuracy. A healthy rollback implementation shows >90% prediction accuracy on a normal connection. If yours shows 60%, your guess strategy needs work. If it shows 99% but you still see visible corrections, your resimulation is too slow. These two numbers tell you everything.</div>`,
},
{
title:"Determinism &amp; Debugging",
subtitle:"14 — Guaranteed to Agree",
vizLabel:"▶ desync detection",
viz:"desync",
snippet:`<span class="cm"># CHECKSUM-BASED DESYNC DETECTION</span>
<span class="cm"># Hash the game state every N ticks and compare across peers.</span>
<span class="cm"># Any mismatch = your simulation is non-deterministic.</span>

<span class="kw">func</span> <span class="fn">_compute_checksum</span>() -> <span class="kw">int</span>:
    <span class="kw">var</span> h = <span class="nm">0</span>
    <span class="kw">for</span> entity <span class="kw">in</span> _entities:
        <span class="kw">var</span> s = entity.<span class="fn">save_state</span>()
        <span class="cm"># Hash each float with fixed precision to avoid platform drift</span>
        h = hash(h ^ hash(<span class="fn">snapped</span>(s[<span class="st">"position"</span>].x, <span class="nm">0.0001</span>)))
        h = hash(h ^ hash(<span class="fn">snapped</span>(s[<span class="st">"position"</span>].y, <span class="nm">0.0001</span>)))
        h = hash(h ^ hash(s[<span class="st">"health"</span>]))
        h = hash(h ^ hash(s[<span class="st">"buttons"</span>]))
    <span class="kw">return</span> h

<span class="kw">const</span> CHECK_INTERVAL = <span class="nm">15</span>  <span class="cm"># check every 15 ticks = 4 per second</span>

<span class="kw">func</span> <span class="fn">_run_tick</span>(tick: <span class="kw">int</span>):
    <span class="cm"># ... simulate as normal ...</span>
    <span class="kw">if</span> tick % CHECK_INTERVAL == <span class="nm">0</span>:
        <span class="fn">_share_checksum</span>.<span class="fn">rpc</span>(tick, <span class="fn">_compute_checksum</span>())

<span class="dc">@rpc</span>(<span class="st">"any_peer"</span>, <span class="st">"call_remote"</span>, <span class="st">"reliable"</span>)
<span class="kw">func</span> <span class="fn">_share_checksum</span>(tick: <span class="kw">int</span>, remote_hash: <span class="kw">int</span>):
    <span class="kw">var</span> local_hash = _checksum_history.get(tick, <span class="nm">0</span>)
    <span class="kw">if</span> local_hash != remote_hash:
        <span class="fn">push_error</span>(<span class="st">"DESYNC at tick %d! local=%d remote=%d"</span> % [tick, local_hash, remote_hash])
        <span class="cm"># In debug: dump both states and diff them</span>
        <span class="fn">_dump_state_diff</span>(tick)

<span class="cm"># DETERMINISM CHECKLIST — common culprits:</span>
<span class="cm">#</span>
<span class="cm"># BAD:  position += velocity * delta   (delta varies per frame)</span>
<span class="cm"># GOOD: position += velocity * TICK_DELTA  (fixed always)</span>
<span class="cm">#</span>
<span class="cm"># BAD:  var rng = RandomNumberGenerator.new()  (different seed)</span>
<span class="cm"># GOOD: RollbackManager.rng.randf()  (shared seeded RNG)</span>
<span class="cm">#</span>
<span class="cm"># BAD:  await get_tree().create_timer(1.0).timeout  (real time)</span>
<span class="cm"># GOOD: _timer_ticks -= 1; if _timer_ticks <= 0: ...  (tick count)</span>
<span class="cm">#</span>
<span class="cm"># BAD:  if Engine.get_frames_per_second() > 55: ...  (per-machine)</span>
<span class="cm"># GOOD: don't. never read FPS in game logic.</span>`,
body:`<p>Nightmare scenario: your rollback implementation is correct, your input sync is solid, and your game still slowly drifts out of sync. Players start seeing each other in different positions. Health bars disagree. Someone is clearly in a different universe. This is a <strong>determinism bug</strong>, and finding it without the right tools is a special kind of hell.</p>
<div class="step-card"><span class="step-num">CHECKSUM SYNC — YOUR DESYNC RADAR</span>
Every N ticks, hash your entire game state and broadcast it to all peers. If any peer receives a checksum that differs from their own for the same tick: you have a desync. Log the tick number, dump the full state from both sides, diff them.<br><br>
In production: silently log and attempt a full state reset from the server. In development: pause and show a big red "DESYNC" overlay with a state dump. The diff will tell you exactly which variable diverged first.</div>
<div class="step-card"><span class="step-num">FLOATING POINT — THE SILENT KILLER</span>
<code>float</code> arithmetic results can differ between CPU architectures, compiler optimisations, and operating systems — even for the same inputs. Common culprits:<br><br>
— <code>sin()</code>, <code>cos()</code>, <code>sqrt()</code> — transcendental functions can produce slightly different results<br>
— Fused Multiply-Add (FMA) instructions — some CPUs combine operations differently<br>
— <code>Vector2.normalized()</code> — involves sqrt, can drift<br><br>
Mitigation: use integer arithmetic where possible. Round critical floats to 4 decimal places with <code>snapped(value, 0.0001)</code>. Avoid trigonometry in gameplay logic — use <code>move_toward()</code> and <code>lerp()</code> instead.</div>
<div class="step-card"><span class="step-num">THE SHARED RNG — RANDOM WITHOUT CHAOS</span>
<code>randf()</code> advances a global seed. Different call orders on different machines = different sequences. Solution: one shared RNG with a known seed, agreed at match start:<br><br>
<code>var rng := RandomNumberGenerator.new()</code><br>
<code>rng.seed = match_seed  # sent from server at match start</code><br><br>
All entities call <code>RollbackManager.rng.randf()</code> for any in-game randomness. The calls must happen in the same order on every machine — which they will, since your simulation is deterministic in all other respects.</div>
<div class="step-card"><span class="step-num">TIMERS — TICK-BASED NOT TIME-BASED</span>
Never use <code>get_tree().create_timer()</code> or <code>Time.get_ticks_msec()</code> in game logic. These measure real elapsed time, which differs between resimulation passes and normal play. Replace every timer with a tick counter:<br><br>
<code>var _cooldown_ticks: int = 0</code><br>
<code>_cooldown_ticks -= 1</code> (in rollback_tick)<br>
<code>if _cooldown_ticks <= 0: fire_attack()</code><br><br>
At 60 ticks/sec, a 1-second cooldown = 60 ticks. Integer arithmetic, perfectly deterministic.</div>
<div class="tip">Build a determinism test into your workflow before you touch any networking code: record a full single-player session's inputs, replay them twice back-to-back, compare the final checksum. If they differ, you have a non-deterministic element and you will find it now rather than after shipping. Binary search the replay to isolate exactly which tick it first diverges. If the checksum differs, you have a non-deterministic element. Binary search the replay to find which tick it first diverges. This is faster than debugging live multiplayer sessions.</div>`,
},
