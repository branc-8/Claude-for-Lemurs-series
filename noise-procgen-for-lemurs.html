function vizBuildRock(){
  addSlider('u_step','Stage',0,5,0,1);
  const frag = `precision highp float;
uniform float u_time;uniform vec2 u_res;uniform vec2 u_mouse;uniform float u_step;
` + GLSL_NOISE_LIB + `
float voronoiDist(vec2 x){vec2 n=floor(x),f=fract(x);float d=8.0;for(int j=-1;j<=1;j++)for(int i=-1;i<=1;i++){vec2 g=vec2(float(i),float(j));vec2 o=hash2(n+g);d=min(d,length(g+o-f));}return d;}
vec3 palette(float t,vec3 a,vec3 b,vec3 c,vec3 d){return a+b*cos(6.28318*(c*t+d));}
void main(){
  vec2 uv=gl_FragCoord.xy/u_res;
  int step=int(u_step);
  float e=1.0/u_res.x;
  float largeForm=voronoiDist(uv*4.0);
  float detail=fbm(uv*8.0+largeForm*0.5);
  float h=largeForm*0.6+detail*0.4;
  h=h*0.5+0.5;
  if(step==0){gl_FragColor=vec4(vec3(h),1.0);return;}
  vec3 albedo=palette(h*0.7+detail*0.3,vec3(.32,.28,.24),vec3(.12,.1,.08),vec3(1),vec3(0,.05,.1));
  albedo+=vec3(.04,.06,.02)*fbm(uv*16.0);
  if(step==1){gl_FragColor=vec4(albedo,1.0);return;}
  float hL=voronoiDist((uv+vec2(-e,0))*4.)*0.6+fbm((uv+vec2(-e,0))*8.)*0.4;
  float hR=voronoiDist((uv+vec2(e,0))*4.)*0.6+fbm((uv+vec2(e,0))*8.)*0.4;
  float hD=voronoiDist((uv+vec2(0,-e))*4.)*0.6+fbm((uv+vec2(0,-e))*8.)*0.4;
  float hU=voronoiDist((uv+vec2(0,e))*4.)*0.6+fbm((uv+vec2(0,e))*8.)*0.4;
  vec3 N=normalize(vec3((hL-hR)*3.0,(hD-hU)*3.0,1.0));
  vec3 L=normalize(vec3(u_mouse-0.5,0.6));
  float diff=max(dot(N,L),0.0);
  if(step==2){gl_FragColor=vec4(albedo*(diff*0.8+0.2),1.0);return;}
  float rough=0.45+fbm(uv*20.0)*0.35+largeForm*0.15;
  float NdH=max(dot(N,normalize(vec3(0,0,1)+L)),0.0);
  float spec=pow(NdH,mix(8.0,80.0,1.0-rough))*(1.0-rough)*0.5;
  if(step==3){gl_FragColor=vec4(albedo*(diff*0.7+0.3)+vec3(spec),1.0);return;}
  // AO: wider sampling radius for visible cavity darkening
  float ae=8.0/u_res.x;
  float aL=voronoiDist((uv+vec2(-ae,0))*4.)*0.6+fbm((uv+vec2(-ae,0))*8.)*0.4;
  float aR=voronoiDist((uv+vec2(ae,0))*4.)*0.6+fbm((uv+vec2(ae,0))*8.)*0.4;
  float aD=voronoiDist((uv+vec2(0,-ae))*4.)*0.6+fbm((uv+vec2(0,-ae))*8.)*0.4;
  float aU=voronoiDist((uv+vec2(0,ae))*4.)*0.6+fbm((uv+vec2(0,ae))*8.)*0.4;
  float hRaw=largeForm*0.6+detail*0.4;
  float aoAvg=(aL+aR+aD+aU)*0.25;
  float ao=clamp(0.5+(hRaw-aoAvg)*12.0, 0.15, 1.0);
  vec3 col=albedo*(diff*0.7+0.3)*ao+vec3(spec)*ao;
  if(step==4){gl_FragColor=vec4(pow(col,vec3(1.0/2.2)),1.0);return;}
  // Detail: strong micro-normal + visible roughness breakup
  float detailN=snoise(uv*40.0);
  float detailN2=snoise(uv*80.0);
  N=normalize(N+vec3((detailN*0.35+detailN2*0.15), (detailN*0.35+detailN2*0.15), 0.0));
  diff=max(dot(N,L),0.0);
  rough=rough-0.25*detailN;
  rough=clamp(rough,0.1,1.0);
  spec=pow(max(dot(N,normalize(vec3(0,0,1)+L)),0.0),mix(8.0,120.0,1.0-rough))*(1.0-rough)*0.5;
  col=albedo*(diff*0.7+0.3)*ao+vec3(spec)*ao;
  col=pow(col,vec3(1.0/2.2));
  gl_FragColor=vec4(col,1.0);
}`;
  const sv = makeShaderViz(frag, {u_step:{value:0.0}});
  wireSlider('u_step',sv.uniforms);
  // Add stage labels
  const stageNames = ['HEIGHT','ALBEDO','NORMALS','ROUGHNESS','AO','DETAIL'];
  const slider = document.getElementById('u_step');
  const label = document.createElement('span');
  label.id='stageLabel';
  label.style.cssText='color:var(--accent);font-size:0.65em;font-weight:700;min-width:70px;';
  label.textContent=stageNames[0];
  slider.parentElement.appendChild(label);
  slider.addEventListener('input',()=>{
    label.textContent=stageNames[parseInt(slider.value)]||'';
  });
  runShaderLoop(sv);
}


function vizWeatherBlend(){
  addSlider('u_wear','Wear',0,100,0,1);
  addSlider('u_blend','Blend',0,100,50,1);
  const frag = `precision highp float;
uniform float u_time;uniform vec2 u_res;uniform vec2 u_mouse;
uniform float u_wear;uniform float u_blend;
#define PI 3.14159265
` + GLSL_NOISE_LIB + `
float voronoiDist(vec2 x){vec2 n=floor(x),f=fract(x);float d=8.0;for(int j=-1;j<=1;j++)for(int i=-1;i<=1;i++){vec2 g=vec2(float(i),float(j));vec2 o=hash2(n+g);d=min(d,length(g+o-f));}return d;}
vec3 rustCol(vec2 uv){return mix(vec3(0.35,0.18,0.08),vec3(0.5,0.25,0.1),fbm(uv*12.0)*0.5+0.5);}
void main(){
  vec2 uv=gl_FragCoord.xy/u_res;
  float wear=u_wear/100.0,blend=u_blend/100.0;
  float e=2.0/u_res.x;
  float h=voronoiDist(uv*5.0)*0.5+fbm(uv*6.0)*0.5;
  float hL=voronoiDist((uv+vec2(-e,0))*5.)*0.5+fbm((uv+vec2(-e,0))*6.)*0.5;
  float hR=voronoiDist((uv+vec2(e,0))*5.)*0.5+fbm((uv+vec2(e,0))*6.)*0.5;
  float hD=voronoiDist((uv+vec2(0,-e))*5.)*0.5+fbm((uv+vec2(0,-e))*6.)*0.5;
  float hU=voronoiDist((uv+vec2(0,e))*5.)*0.5+fbm((uv+vec2(0,e))*6.)*0.5;
  // Curvature edge mask
  float curv=4.0*h-(hL+hR+hD+hU);
  float edgeMask=smoothstep(0.0,0.06,abs(curv))*wear;
  edgeMask+=fbm(uv*20.0)*0.2*wear;
  edgeMask=clamp(edgeMask,0.0,1.0);
  // Height blend
  float heightBlend=smoothstep(0.3,0.5,h)*blend;
  float mask=clamp(edgeMask+(1.0-heightBlend),0.0,1.0);
  // Blend materials
  vec3 metalAlb=vec3(0.15,0.22,0.35);
  vec3 albedo=mix(metalAlb,rustCol(uv),mask);
  float rough=mix(0.3,0.85,mask);
  float metallic=mix(1.0,0.0,mask);
  // PBR lighting
  vec3 N=normalize(vec3((hL-hR)*3.0,(hD-hU)*3.0,1.0));
  vec3 L=normalize(vec3(u_mouse-0.5,0.6));
  float diff=max(dot(N,L),0.0);
  float ao=clamp(0.5+(h-0.25*(hL+hR+hD+hU))*5.0,0.0,1.0);
  vec3 V=vec3(0,0,1);vec3 H2=normalize(V+L);
  float NdH=max(dot(N,H2),0.0);
  float spec=pow(NdH,mix(8.0,120.0,1.0-rough))*(1.0-rough)*mix(0.5,0.8,metallic);
  vec3 F0=mix(vec3(0.04),albedo,metallic);
  vec3 col=(1.0-metallic)*albedo/PI*(diff*0.7+0.3)*ao+F0*spec*ao;
  col=pow(col,vec3(1.0/2.2));
  gl_FragColor=vec4(col,1.0);
}`;
  const sv = makeShaderViz(frag, {
    u_wear:{value:0.0},u_blend:{value:50.0}
  });
  wireSlider('u_wear',sv.uniforms);
  wireSlider('u_blend',sv.uniforms);
  runShaderLoop(sv);
}

function vizShaderTranslation(){
  freshCanvas('2d');
  const ctx = vc().getContext('2d');
  if(!ctx) return;
  let t = 0, hoverCol = -1;

  const cols = [
    {name:'GLSL',color:MINT, code:[
      'precision highp float;',
      '',
      'float noise(vec2 p) {',
      '  vec2 i=floor(p);',
      '  vec2 f=fract(p);',
      '  vec2 u=f*f*(3.-2.*f);',
      '  return mix(',
      '    mix(h(i),h(i+vec2(1,0)),u.x),',
      '    mix(h(i+vec2(0,1)),h(i+1.),u.x),',
      '    u.y);',
      '}',
      '',
      'void main() {',
      '  float n = noise(UV*8.);',
      '  gl_FragColor = vec4(',
      '    mix(dark,light,n), 1.);',
      '}'
    ]},
    {name:'BLENDER',color:ORANGE, code:[
      '# bpy — Scripting tab',
      '',
      '# = noise() function:',
      'noise = nodes.new(',
      '  "ShaderNodeTexNoise")',
      'noise.inputs["Scale"]',
      '  .default_value = 8.0',
      '',
      '# = mix(dark,light,n):',
      'ramp = nodes.new(',
      '  "ShaderNodeValToRGB")',
      '',
      '# Wire it up:',
      'links.new(',
      '  noise.outputs["Fac"],',
      '  ramp.inputs["Fac"])',
      'links.new(',
      '  ramp.outputs["Color"],',
      '  bsdf.inputs["Base Color"])'
    ]},
    {name:'GODOT',color:GODOT_TEAL, code:[
      'shader_type spatial;',
      '',
      'float noise(vec2 p) {',
      '  vec2 i=floor(p);',
      '  vec2 f=fract(p);',
      '  vec2 u=f*f*(3.-2.*f);',
      '  return mix(',
      '    mix(h(i),h(i+vec2(1,0)),u.x),',
      '    mix(h(i+vec2(0,1)),h(i+1.),u.x),',
      '    u.y);',
      '}',
      '',
      'void fragment() {',
      '  float n = noise(UV*8.);',
      '  ALBEDO = mix(dark,light,n);',
      '  ROUGHNESS = 0.4+n*0.4;',
      '  // gl_FragColor -> ALBEDO',
      '  // u_time -> TIME',
      '  // Same. Math. Everywhere.'
    ]}
  ];
  // Lines that match across GLSL↔Godot (0-indexed)
  const matchLines = [
    {gl:2,gd:2,label:'identical'},
    {gl:3,gd:3,label:'identical'},
    {gl:6,gd:6,label:'identical'},
    {gl:12,gd:12,label:'void main → void fragment'},
    {gl:13,gd:13,label:'identical'},
    {gl:14,gd:14,label:'gl_FragColor → ALBEDO'},
  ];

  vc().onmousemove = function(e){
    const r = vc().getBoundingClientRect();
    const mx = (e.clientX-r.left)/r.width*W();
    hoverCol = Math.min(2, Math.floor(mx/(W()/3)));
  };

  function draw(){
    const w=W(),h=H();
    atmosBg(ctx,30,60,40,0.12);
    const colW=Math.floor((w-8)/3);
    const pad=3;
    // Responsive font size
    const fontSize = Math.max(8, Math.min(11, w/70));
    const lineH = fontSize*1.4;
    const headerH = 32;
    const codeY = headerH+8;

    // Draw three columns simultaneously
    cols.forEach((col,ci)=>{
      const x = ci*(colW+pad)+2;
      const isHover = (ci===hoverCol);
      // Header bg
      ctx.fillStyle = isHover?rgba(col.color,0.18):rgba(col.color,0.07);
      ctx.fillRect(x,0,colW,headerH);
      // Header text
      ctx.fillStyle = col.color;
      ctx.font = 'bold '+Math.max(10,fontSize+1)+'px Syne';
      ctx.textAlign = 'center';
      ctx.fillText(col.name, x+colW/2, headerH*0.65);
      // Column bg
      ctx.fillStyle = rgba(col.color, isHover?0.04:0.02);
      ctx.fillRect(x, headerH, colW, h-headerH);
      // Separator line
      if(ci>0){
        ctx.strokeStyle = rgba(col.color,0.15);
        ctx.lineWidth=1;
        ctx.beginPath();ctx.moveTo(x-1,0);ctx.lineTo(x-1,h);ctx.stroke();
      }
      // Code lines
      ctx.font = fontSize+'px Space Mono';
      ctx.textAlign = 'left';
      const maxLines = Math.min(col.code.length, Math.floor((h-codeY-10)/lineH));
      const revealLines = Math.min(maxLines, Math.floor(t/1.5)+1);
      for(let li=0;li<revealLines;li++){
        const alpha = Math.min(1, (t-li*1.5)/3+0.5);
        ctx.fillStyle = rgba(col.color, Math.max(0.35, alpha)*0.85);
        ctx.fillText(col.code[li], x+4, codeY+li*lineH);
      }
    });

    // Draw match indicators between GLSL and Godot columns
    const glslX = 2+colW;       // right edge of GLSL col
    const godotX = 2*(colW+pad)+2; // left edge of Godot col
    if(t>10){
      matchLines.forEach(m=>{
        const y1 = codeY + m.gl*lineH - lineH*0.3;
        const y2 = codeY + m.gd*lineH - lineH*0.3;
        // Subtle connecting line across blender column
        ctx.strokeStyle = rgba(AMBER, 0.15);
        ctx.lineWidth = 1;
        ctx.setLineDash([3,3]);
        ctx.beginPath();
        ctx.moveTo(colW-2, y1+lineH*0.5);
        ctx.lineTo(godotX+4, y2+lineH*0.5);
        ctx.stroke();
        ctx.setLineDash([]);
      });
    }

    // Bottom annotation bar
    const barY = h-28;
    ctx.fillStyle = rgba(MINT, 0.06);
    ctx.fillRect(0,barY,w,28);
    ctx.fillStyle = rgba(MINT, 0.7);
    ctx.font = 'bold '+Math.max(9,fontSize-1)+'px Space Mono';
    ctx.textAlign = 'center';
    if(t>15){
      ctx.fillText('GLSL and Godot are the same code. Blender is the same algorithm as boxes.', w/2, barY+17);
    } else {
      ctx.fillText('same algorithm \u2014 three representations', w/2, barY+17);
    }

    scanline(ctx,MINT,0.01);
    t+=0.08;
    _raf=requestAnimationFrame(draw);
  }
  draw();
}

function vizProcgenIntro(){
  addSeedInput();
  freshCanvas('2d');
  const ctx = vc().getContext('2d');
  if(!ctx) return;
  let seed=42, grid=null, t=0;
  function gen(){
    seed = parseInt(document.getElementById('seedInput').value)||42;
    const rng=mulberry32(seed);
    const gw=32,gh=24;
    grid=[];
    for(let y=0;y<gh;y++){grid[y]=[];for(let x=0;x<gw;x++) grid[y][x]=1;}
    const rooms=[];
    for(let i=0;i<7;i++){
      const rw=3+Math.floor(rng()*5), rh=3+Math.floor(rng()*4);
      const rx=1+Math.floor(rng()*(gw-rw-2)), ry=1+Math.floor(rng()*(gh-rh-2));
      rooms.push({x:rx,y:ry,w:rw,h:rh});
      for(let y=ry;y<ry+rh;y++)for(let x=rx;x<rx+rw;x++) grid[y][x]=0;
    }
    for(let i=1;i<rooms.length;i++){
      let ax=rooms[i-1].x+Math.floor(rooms[i-1].w/2);
      let ay=rooms[i-1].y+Math.floor(rooms[i-1].h/2);
      let bx=rooms[i].x+Math.floor(rooms[i].w/2);
      let by=rooms[i].y+Math.floor(rooms[i].h/2);
      while(ax!==bx){grid[ay][ax]=0;ax+=ax<bx?1:-1;}
      while(ay!==by){grid[ay][ax]=0;ay+=ay<by?1:-1;}
    }
  }
  gen();
  // Wire seed input to regenerate live
  const seedInp=document.getElementById('seedInput');
  if(seedInp) seedInp.addEventListener('input',gen);
  function draw(){
    const w=W(),h=H();
    atmosBg(ctx,30,80,50,0.2);
    if(!grid){_raf=requestAnimationFrame(draw);return;}
    const gw=grid[0].length,gh=grid.length;
    const cs=Math.min((w-40)/gw,(h-60)/gh);
    const ox=(w-gw*cs)/2,oy=(h-gh*cs)/2+10;
    for(let y=0;y<gh;y++)for(let x=0;x<gw;x++){
      if(grid[y][x]===1) ctx.fillStyle=rgba(MINT,0.08);
      else ctx.fillStyle=rgba(MINT,0.25);
      ctx.fillRect(ox+x*cs,oy+y*cs,cs-1,cs-1);
    }
    // Seed label

function vizNoiseTerrain(){
  addSlider('terrOct','Oct',1,8,5,1);
  addSlider('terrScale','Scale',10,80,30,1);
  addSlider('terrHeight','Height',10,60,35,1);
  // Three.js 3D terrain with vertex displacement
  cleanGL();
  freshCanvas('webgl');
  const canvas = document.getElementById('vizCanvas');
  const renderer = new THREE.WebGLRenderer({canvas, antialias: true, alpha: false});
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.setSize(canvas.clientWidth, canvas.clientHeight, false);
  canvas.width = canvas.clientWidth * Math.min(devicePixelRatio, 2);
  canvas.height = canvas.clientHeight * Math.min(devicePixelRatio, 2);
  renderer.setClearColor(0x09090e);
  const scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x09090e, 0.12);
  const camera = new THREE.PerspectiveCamera(50, canvas.width/canvas.height, 0.1, 100);
  camera.position.set(5, 6, 8);
  camera.lookAt(0, 0, 0);
  _renderer = renderer; _scene = scene; _camera = camera;

  const simplex = new SimplexNoise(42);
  const gs = 96; // grid segments
  const geo = new THREE.PlaneGeometry(10, 10, gs, gs);
  geo.rotateX(-Math.PI/2);
  const colors = new Float32Array((gs+1)*(gs+1)*3);
  geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
  const mat = new THREE.MeshPhongMaterial({vertexColors: true, flatShading: true, shininess: 10});
  const mesh = new THREE.Mesh(geo, mat);
  scene.add(mesh);

  // Lights
  const dLight = new THREE.DirectionalLight(0xffeedd, 0.9);
  dLight.position.set(3, 8, 4);
  scene.add(dLight);
  scene.add(new THREE.AmbientLight(0x223322, 0.5));

  function fbmJS(x,y,oct,pers){
    let v=0,a=1,f=1,mx=0;
    for(let i=0;i<oct;i++){v+=a*simplex.noise2D(x*f,y*f);mx+=a;f*=2;a*=pers;}
    return (v/mx)*0.5+0.5;
  }
  function biome(h){
    if(h<0.3) return [0.06,0.18,0.42];
    if(h<0.35) return [0.75,0.68,0.48];
    if(h<0.6) return [0.18,0.45,0.14];
    if(h<0.75) return [0.4,0.35,0.28];
    return [0.88,0.88,0.92];
  }

  let t = 0;
  function updateTerrain(){
    const oct = getSliderVal('terrOct');
    const scale = getSliderVal('terrScale')/100;
    const hgt = getSliderVal('terrHeight')/10;
    const pos = geo.attributes.position;
    const col = geo.attributes.color;
    for(let i=0; i<pos.count; i++){
      const x = pos.getX(i), z = pos.getZ(i);
      const h = fbmJS(x*scale, z*scale, oct, 0.5);
      pos.setY(i, (h-0.5)*hgt);
      const bc = biome(h);
      col.setXYZ(i, bc[0], bc[1], bc[2]);
    }
    pos.needsUpdate = true;
    col.needsUpdate = true;
    geo.computeVertexNormals();
  }
  updateTerrain();

  // Wire sliders to update
  ['terrOct','terrScale','terrHeight'].forEach(id => {
    const el = document.getElementById(id);
    if(el) el.oninput = updateTerrain;
  });

  function loop(){
    t += 0.004;
    camera.position.x = Math.cos(t)*9;
    camera.position.z = Math.sin(t)*9;
    camera.position.y = 5 + Math.sin(t*0.5);
    camera.lookAt(0, 0, 0);
    renderer.render(scene, camera);
    _raf = requestAnimationFrame(loop);
  }
  loop();
}
function vizBspDungeon(){
  freshCanvas('2d');
  const ctx = vc().getContext('2d');
  if(!ctx) return;
  let animSteps=[], stepIdx=0, running=false;
  function genBSP(){
    const rng=mulberry32(Date.now()&0xFFFF);
    const gw=48,gh=36;
    const grid=[];
    for(let y=0;y<gh;y++){grid[y]=[];for(let x=0;x<gw;x++) grid[y][x]=1;}
    animSteps=[];stepIdx=0;
    // BSP
    class N{constructor(x,y,w,h){this.x=x;this.y=y;this.w=w;this.h=h;this.l=null;this.r=null;this.room=null;}}
    function split(n,depth){
      if(depth<=0) return;
      let horiz=rng()>0.5;
      if(n.w>n.h*1.25) horiz=false;
      if(n.h>n.w*1.25) horiz=true;
      const min=5;
      const maxS=(horiz?n.h:n.w)-min;
      if(maxS<=min) return;
      const s=min+Math.floor(rng()*(maxS-min));
      if(horiz){
        n.l=new N(n.x,n.y,n.w,s);
        n.r=new N(n.x,n.y+s,n.w,n.h-s);
      } else {
        n.l=new N(n.x,n.y,s,n.h);
        n.r=new N(n.x+s,n.y,n.w-s,n.h);
      }
      animSteps.push({type:'split',a:n.l,b:n.r});
      split(n.l,depth-1);
      split(n.r,depth-1);
    }
    function placeRooms(n){
      if(n.l){placeRooms(n.l);placeRooms(n.r);return;}
      const pad=1;
      const rw=Math.max(3,pad+Math.floor(rng()*(n.w-pad*2-1)));
      const rh=Math.max(3,pad+Math.floor(rng()*(n.h-pad*2-1)));
      const rx=n.x+Math.floor(rng()*Math.max(1,n.w-rw));
      const ry=n.y+Math.floor(rng()*Math.max(1,n.h-rh));
      n.room={x:rx,y:ry,w:rw,h:rh};
      for(let y=ry;y<ry+rh&&y<gh;y++)for(let x=rx;x<rx+rw&&x<gw;x++) grid[y][x]=0;
      animSteps.push({type:'room',room:n.room});
    }
    function getRoom(n){
      if(n.room) return n.room;
      if(n.l) return getRoom(rng()>0.5?n.l:n.r);
      return null;
    }
    function connect(n){
      if(!n.l) return;
      connect(n.l); connect(n.r);
      const a=getRoom(n.l), b=getRoom(n.r);
      if(!a||!b) return;
      let ax=a.x+Math.floor(a.w/2), ay=a.y+Math.floor(a.h/2);
      let bx=b.x+Math.floor(b.w/2), by=b.y+Math.floor(b.h/2);
      const corr=[];
      while(ax!==bx){grid[ay][ax]=0;corr.push([ax,ay]);ax+=ax<bx?1:-1;}
      while(ay!==by){grid[ay][ax]=0;corr.push([ax,ay]);ay+=ay<by?1:-1;}
      animSteps.push({type:'corridor',cells:corr});
    }
    const root=new N(0,0,gw,gh);
    split(root,4);
    placeRooms(root);
    connect(root);
    return {grid,gw,gh};
  }
  let data=genBSP();
  function drawGrid(shownSteps){
    const w=W(),h=H(),gw=data.gw,gh=data.gh;
    atmosBg(ctx,30,80,50,0.15);
    const cs=Math.min((w-20)/gw,(h-20)/gh);
    const ox=(w-gw*cs)/2,oy=(h-gh*cs)/2;
    // Draw base grid
    for(let y=0;y<gh;y++)for(let x=0;x<gw;x++){
      ctx.fillStyle=rgba(MINT,0.06);
      ctx.fillRect(ox+x*cs,oy+y*cs,cs-1,cs-1);
    }
    // Replay steps
    for(let si=0;si<shownSteps&&si<animSteps.length;si++){
      const s=animSteps[si];
      if(s.type==='split'){
        ctx.strokeStyle=rgba(CYAN,0.4);ctx.lineWidth=1;
        ctx.strokeRect(ox+s.a.x*cs,oy+s.a.y*cs,s.a.w*cs,s.a.h*cs);
        ctx.strokeRect(ox+s.b.x*cs,oy+s.b.y*cs,s.b.w*cs,s.b.h*cs);
      } else if(s.type==='room'){
        const r=s.room;
        ctx.fillStyle=rgba(MINT,0.3);
        ctx.fillRect(ox+r.x*cs,oy+r.y*cs,r.w*cs,r.h*cs);
      } else if(s.type==='corridor'){
        ctx.fillStyle=rgba(AMBER,0.4);
        s.cells.forEach(([cx,cy])=>ctx.fillRect(ox+cx*cs,oy+cy*cs,cs-1,cs-1));
      }
    }
    scanline(ctx,MINT);
  }
  function idle(){
    drawGrid(animSteps.length);
    _raf=requestAnimationFrame(idle);
  }
  idle();
  window._bspGen=function(){
    stop();cancelRaf();
    data=genBSP();
    stepIdx=0; running=true;
    function anim(){
      if(stepIdx>animSteps.length){running=false;idle();return;}
      drawGrid(stepIdx);
      stepIdx++;
      animTimer=setTimeout(anim,ms());
    }
    anim();
  };
}

function vizCellularCave(){
  addSlider('caSteps','Steps',0,10,0,1);
  freshCanvas('2d');
  const ctx = vc().getContext('2d');
  if(!ctx) return;
  let grids=[], curStep=0;
  function gen(){
    const rng=mulberry32(Date.now()&0xFFFF);
    const gw=64,gh=48;
    let grid=[];
    for(let y=0;y<gh;y++){grid[y]=[];for(let x=0;x<gw;x++){
      if(x===0||y===0||x===gw-1||y===gh-1) grid[y][x]=1;
      else grid[y][x]=rng()<0.45?1:0;
    }}
    grids=[grid.map(r=>[...r])];
    for(let s=0;s<10;s++){
      const next=grid.map(r=>[...r]);
      for(let y=1;y<gh-1;y++)for(let x=1;x<gw-1;x++){
        let walls=0;
        for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++)if(dx||dy) walls+=grid[y+dy][x+dx];
        next[y][x]=(grid[y][x]===1)?(walls>=4?1:0):(walls>=5?1:0);
      }
      grid=next;
      grids.push(grid.map(r=>[...r]));
    }
  }
  gen();
  function draw(){
    const w=W(),h=H();
    const step=getSliderVal('caSteps');
    const grid=grids[Math.min(step,grids.length-1)];
    const gw=grid[0].length,gh=grid.length;
    atmosBg(ctx,30,80,50,0.15);
    const cs=Math.min((w-20)/gw,(h-40)/gh);
    const ox=(w-gw*cs)/2,oy=(h-gh*cs)/2+5;
    for(let y=0;y<gh;y++)for(let x=0;x<gw;x++){
      ctx.fillStyle=grid[y][x]===1?rgba(MINT,0.08):rgba(MINT,0.35);
      ctx.fillRect(ox+x*cs,oy+y*cs,cs-0.5,cs-0.5);
    }
    ctx.fillStyle=MINT;ctx.font='bold 12px Syne';ctx.textAlign='center';
    ctx.fillText('STEP '+step+(step===0?' (RANDOM)':step>=5?' (SMOOTH)':''), w/2, oy-6);
    scanline(ctx,MINT);
    _raf=requestAnimationFrame(draw);
  }
  draw();
}

function vizGodotDungeon(){
  freshCanvas('2d');
  const ctx = vc().getContext('2d');
  if(!ctx) return;
  let grid=null, gw=48, gh=36, playerX=0, playerY=0;
  let visited=null, keys={};
  function gen(){
    const rng=mulberry32((Date.now()&0xFFFF)+7);
    grid=[];visited=[];
    for(let y=0;y<gh;y++){grid[y]=[];visited[y]=[];for(let x=0;x<gw;x++){grid[y][x]=1;visited[y][x]=false;}}
    const rooms=[];
    // BSP
    class N{constructor(x,y,w,h){this.x=x;this.y=y;this.w=w;this.h=h;this.l=null;this.r=null;this.room=null;}}
    function split(n,d){
      if(d<=0)return;
      let hz=rng()>0.5;if(n.w>n.h*1.25)hz=false;if(n.h>n.w*1.25)hz=true;
      const min=5,mx=(hz?n.h:n.w)-min;if(mx<=min)return;
      const s=min+Math.floor(rng()*(mx-min));
      if(hz){n.l=new N(n.x,n.y,n.w,s);n.r=new N(n.x,n.y+s,n.w,n.h-s);}
      else{n.l=new N(n.x,n.y,s,n.h);n.r=new N(n.x+s,n.y,n.w-s,n.h);}
      split(n.l,d-1);split(n.r,d-1);
    }
    function placeRooms(n){
      if(n.l){placeRooms(n.l);placeRooms(n.r);return;}
      const rw=Math.max(3,2+Math.floor(rng()*(n.w-3)));
      const rh=Math.max(3,2+Math.floor(rng()*(n.h-3)));
      const rx=n.x+Math.floor(rng()*Math.max(1,n.w-rw));
      const ry=n.y+Math.floor(rng()*Math.max(1,n.h-rh));
      n.room={x:rx,y:ry,w:rw,h:rh};
      rooms.push(n.room);
      for(let y=ry;y<ry+rh&&y<gh;y++)for(let x=rx;x<rx+rw&&x<gw;x++) grid[y][x]=0;
    }
    function getRoom(n){if(n.room)return n.room;if(n.l)return getRoom(rng()>0.5?n.l:n.r);return null;}
    function connect(n){
      if(!n.l)return;connect(n.l);connect(n.r);
      const a=getRoom(n.l),b=getRoom(n.r);if(!a||!b)return;
      let ax=a.x+Math.floor(a.w/2),ay=a.y+Math.floor(a.h/2);
      let bx=b.x+Math.floor(b.w/2),by=b.y+Math.floor(b.h/2);
      while(ax!==bx){if(ay>=0&&ay<gh&&ax>=0&&ax<gw)grid[ay][ax]=0;ax+=ax<bx?1:-1;}
      while(ay!==by){if(ay>=0&&ay<gh&&ax>=0&&ax<gw)grid[ay][ax]=0;ay+=ay<by?1:-1;}
    }
    const root=new N(0,0,gw,gh);
    split(root,4);placeRooms(root);connect(root);
    // Place player in first room
    if(rooms.length>0){
      playerX=rooms[0].x+Math.floor(rooms[0].w/2);
      playerY=rooms[0].y+Math.floor(rooms[0].h/2);
    }
    reveal();
  }
  function reveal(){
    const rad=3;
    for(let dy=-rad;dy<=rad;dy++)for(let dx=-rad;dx<=rad;dx++){
      const vx=playerX+dx,vy=playerY+dy;
      if(vx>=0&&vx<gw&&vy>=0&&vy<gh&&dx*dx+dy*dy<=rad*rad) visited[vy][vx]=true;
    }
  }
  function move(dx,dy){
    const nx=playerX+dx,ny=playerY+dy;
    if(nx>=0&&nx<gw&&ny>=0&&ny<gh&&grid[ny][nx]===0){
      playerX=nx;playerY=ny;reveal();
    }
  }
  gen();
  window._godotGen=gen;
  // Keyboard
  function keyHandler(e){
    if(e.key==='ArrowUp'||e.key==='w')move(0,-1);
    if(e.key==='ArrowDown'||e.key==='s')move(0,1);
    if(e.key==='ArrowLeft'||e.key==='a')move(-1,0);
    if(e.key==='ArrowRight'||e.key==='d')move(1,0);
    e.preventDefault();
  }
  window.addEventListener('keydown',keyHandler);
  // Touch
  vc().onclick=function(e){
    const r=vc().getBoundingClientRect();
    const mx=(e.clientX-r.left)/r.width, my=(e.clientY-r.top)/r.height;
    const w=W(),h=H();
    const cs=Math.min((w-20)/gw,(h-40)/gh);
    const ox=(w-gw*cs)/2,oy=(h-gh*cs)/2+10;
    const cx=ox+playerX*cs+cs/2, cy=oy+playerY*cs+cs/2;
    const tx=mx*w,ty=my*h;
    const ddx=tx-cx, ddy=ty-cy;
    if(Math.abs(ddx)>Math.abs(ddy)) move(ddx>0?1:-1,0);
    else move(0,ddy>0?1:-1);
  };
  function draw(){
    const w=W(),h=H();
    atmosBg(ctx,20,50,80,0.2);
    const cs=Math.min((w-20)/gw,(h-40)/gh);
    const ox=(w-gw*cs)/2,oy=(h-gh*cs)/2+10;
    for(let y=0;y<gh;y++)for(let x=0;x<gw;x++){
      if(!visited[y][x]){ctx.fillStyle='#050508';ctx.fillRect(ox+x*cs,oy+y*cs,cs,cs);continue;}
      ctx.fillStyle=grid[y][x]===1?rgba(GODOT_TEAL,0.15):rgba(GODOT_TEAL,0.3);
      ctx.fillRect(ox+x*cs,oy+y*cs,cs-0.5,cs-0.5);
    }
    // Player
    glow(ctx,GODOT_TEAL,12);
    ctx.fillStyle=GODOT_TEAL;
    ctx.beginPath();
    ctx.arc(ox+playerX*cs+cs/2,oy+playerY*cs+cs/2,cs*0.35,0,Math.PI*2);
    ctx.fill();
    noGlow(ctx);
    ctx.fillStyle=GODOT_TEAL;ctx.font='bold 12px Syne';ctx.textAlign='center';
    ctx.fillText('WASD / ARROWS / TAP TO EXPLORE',w/2,oy-6);
    scanline(ctx,GODOT_TEAL);
    _raf=requestAnimationFrame(draw);
  }
  draw();
  // Cleanup on lesson change
  onCleanup(()=>{window.removeEventListener('keydown',keyHandler);});
}

  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.setSize(canvas.clientWidth, canvas.clientHeight, false);
  canvas.width = canvas.clientWidth * Math.min(devicePixelRatio, 2);
  canvas.height = canvas.clientHeight * Math.min(devicePixelRatio, 2);
  renderer.setClearColor(0x09090e);
  const scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x09090e, 0.08);
  const camera = new THREE.PerspectiveCamera(50, canvas.width/canvas.height, 0.1, 100);
  camera.position.set(6, 7, 10);
  camera.lookAt(0, 0, 0);
  _renderer = renderer; _scene = scene; _camera = camera;

  const simplex = new SimplexNoise(77);
  const gs = 80;
  const geo = new THREE.PlaneGeometry(12, 12, gs, gs);
  geo.rotateX(-Math.PI/2);
  const colors = new Float32Array((gs+1)*(gs+1)*3);
  geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
  const mat = new THREE.MeshPhongMaterial({vertexColors: true, flatShading: true, shininess: 5});
  const mesh = new THREE.Mesh(geo, mat);
  scene.add(mesh);

  // Water plane
  const waterGeo = new THREE.PlaneGeometry(20, 20);
  waterGeo.rotateX(-Math.PI/2);
  const waterMat = new THREE.MeshPhongMaterial({color: 0x1a4a8a, transparent: true, opacity: 0.6, shininess: 80});
  const water = new THREE.Mesh(waterGeo, waterMat);
  water.position.y = -0.3;
  scene.add(water);

  // Lights
  const dLight = new THREE.DirectionalLight(0xffeedd, 1.0);
  dLight.position.set(4, 10, 5);
  scene.add(dLight);
  scene.add(new THREE.AmbientLight(0x334433, 0.5));

  function fbmJS(x,y){
    let v=0,a=1,f=1,mx=0;
    for(let i=0;i<5;i++){v+=a*simplex.noise2D(x*f,y*f);mx+=a;f*=2;a*=0.5;}
    return (v/mx)*0.5+0.5;
  }
  function biome(h){
    if(h<0.35) return [0.1,0.25,0.5];
    if(h<0.4) return [0.76,0.7,0.5];
    if(h<0.6) return [0.2,0.45,0.15];
    if(h<0.75) return [0.4,0.35,0.28];
    return [0.9,0.9,0.95];
  }

  const pos = geo.attributes.position;
  const col = geo.attributes.color;
  for(let i=0; i<pos.count; i++){
    const x = pos.getX(i), z = pos.getZ(i);
    const h = fbmJS(x*0.15, z*0.15);
    pos.setY(i, (h-0.4)*6);
    const bc = biome(h);
    col.setXYZ(i, bc[0], bc[1], bc[2]);
  }
  pos.needsUpdate = true;
  col.needsUpdate = true;
  geo.computeVertexNormals();

  // Scatter "trees" as small cones
  const treeMat = new THREE.MeshPhongMaterial({color: 0x1a5a1a, flatShading: true});
  for(let i=0;i<120;i++){
    const tx = (Math.random()-0.5)*10, tz = (Math.random()-0.5)*10;
    const th = fbmJS(tx*0.15, tz*0.15);
    if(th>0.42 && th<0.65){
      const treeGeo = new THREE.ConeGeometry(0.12+Math.random()*0.1, 0.4+Math.random()*0.3, 5);
      const tree = new THREE.Mesh(treeGeo, treeMat);
      tree.position.set(tx, (th-0.4)*6, tz);
      scene.add(tree);
    }
  }

  let t = 0;
  function loop(){
    t += 0.003;
    camera.position.x = Math.cos(t)*11;
    camera.position.z = Math.sin(t)*11;
    camera.position.y = 6 + Math.sin(t*0.3)*1.5;
    camera.lookAt(0, 0.5, 0);
    water.position.y = -0.3 + Math.sin(t*2)*0.03;
    renderer.render(scene, camera);
    _raf = requestAnimationFrame(loop);
  }
  loop();
}
function vizNextSteps(){
  freshCanvas('2d');
  const ctx = vc().getContext('2d');
  if(!ctx) return;
  let t=0, selected=-1;
  const branches=[
    {q:'Open World',answer:'FBM Heightmap + Biome Noise (L05, L13)',color:MINT},
    {q:'Dungeon Rooms',answer:'BSP Partitioning (L14)',color:CYAN},
    {q:'Organic Caves',answer:'Cellular Automata (L15)',color:PURP},
    {q:'Materials',answer:'Procedural PBR (L07\u2013L10)',color:AMBER},
    {q:'Shader Art',answer:'Domain Warping + Palettes (L06, L08)',color:RED},
    {q:'Vegetation',answer:'Poisson + Geometry Nodes (L16)',color:LIME},
  ];
  vc().onclick=function(e){
    const r=vc().getBoundingClientRect();
    const mx=(e.clientX-r.left)/r.width*W();
    const my=(e.clientY-r.top)/r.height*H();
    const w=W(),h=H(), cy=h*0.35;
    branches.forEach((b,i)=>{
      const bx=w*0.1, by=cy+i*45;
      if(mx>bx&&mx<bx+200&&my>by-15&&my<by+20) selected=i;
    });
  };
  function draw(){
    const w=W(),h=H();
    atmosBg(ctx,30,80,50,0.2);
    // Title
    ctx.fillStyle=MINT;ctx.font='bold 18px Syne';ctx.textAlign='center';
    ctx.fillText('WHAT ARE YOU MAKING?',w/2,h*0.15);
    ctx.font='12px Space Mono';ctx.fillStyle=rgba(MINT,0.6);
    ctx.fillText('Click a category to see the recommended technique',w/2,h*0.22);
    // Branches
    const cy=h*0.35;
    branches.forEach((b,i)=>{
      const bx=w*0.1, by=cy+i*45;
      const isSel=(selected===i);
      // Button
      ctx.fillStyle=isSel?rgba(b.color,0.25):rgba(b.color,0.08);
      ctx.strokeStyle=rgba(b.color,isSel?0.8:0.3);
      ctx.lineWidth=isSel?2:1;
      if(ctx.roundRect){ctx.beginPath();ctx.roundRect(bx,by-15,180,32,4);ctx.fill();ctx.stroke();}
      else{ctx.fillRect(bx,by-15,180,32);ctx.strokeRect(bx,by-15,180,32);}
      ctx.fillStyle=b.color;ctx.font='bold 12px Space Mono';ctx.textAlign='left';
      ctx.fillText(b.q,bx+10,by+5);
      // Arrow + answer
      if(isSel){
        glow(ctx,b.color,10);
        neonLine(ctx,bx+190,by,bx+210,by,b.color,2,10);
        noGlow(ctx);
        ctx.fillStyle=b.color;ctx.font='11px Space Mono';
        ctx.fillText(b.answer,bx+220,by+4);
      }
    });
    // Animated particles
    for(let i=0;i<15;i++){
      const px=w*(0.5+0.4*Math.sin(t*0.3+i*1.1));
      const py=h*(0.5+0.35*Math.cos(t*0.2+i*0.9));
      ctx.fillStyle=rgba(MINT,0.06+0.04*Math.sin(t+i));
      ctx.beginPath();ctx.arc(px,py,2+Math.sin(t*0.5+i)*1.5,0,Math.PI*2);ctx.fill();
    }
    scanline(ctx,MINT);
    t+=0.02;
    _raf=requestAnimationFrame(draw);
  }
  draw();
}

function vizCapstone(){
  const frag = `precision highp float;
uniform float u_time;uniform vec2 u_res;uniform vec2 u_mouse;
` + GLSL_NOISE_LIB + `
float voronoiDist(vec2 x){vec2 n=floor(x),f=fract(x);float d=8.0;for(int j=-1;j<=1;j++)for(int i=-1;i<=1;i++){vec2 g=vec2(float(i),float(j));vec2 o=hash2(n+g);d=min(d,length(g+o-f));}return d;}
float terrain(vec2 p){
  vec2 q=vec2(fbm(p+vec2(0,0)),fbm(p+vec2(5.2,1.3)));
  return fbm(p+1.5*q)*0.5+0.5;
}
vec3 biome(float h,float m){
  if(h<0.32) return mix(vec3(0.05,0.15,0.35),vec3(0.1,0.25,0.5),h/0.32);
  if(h<0.36) return vec3(0.76,0.7,0.5);
  if(h<0.6) return mix(vec3(0.15,0.4,0.12),vec3(0.3,0.45,0.1),m);
  if(h<0.78) return mix(vec3(0.4,0.35,0.28),vec3(0.5,0.4,0.35),m);
  return vec3(0.85,0.88,0.92);
}
void main(){
  vec2 uv=gl_FragCoord.xy/u_res;float t=u_time*0.05;
  float h=terrain(uv*3.0+t);
  float moisture=fbm(uv*5.0+vec2(42.0,17.0))*0.5+0.5;
  float path=voronoiDist(uv*8.0)>0.15?0.0:1.0;
  float e=1.0/u_res.x;
  float hL=terrain((uv+vec2(-e,0))*3.0+t),hR=terrain((uv+vec2(e,0))*3.0+t);
  float hD=terrain((uv+vec2(0,-e))*3.0+t),hU=terrain((uv+vec2(0,e))*3.0+t);
  vec3 N=normalize(vec3((hL-hR)*4.0,(hD-hU)*4.0,1.0));
  vec3 L=normalize(vec3(u_mouse-0.5,0.6));
  float diff=max(dot(N,L),0.0);
  float ao=clamp(0.5+(h-0.25*(hL+hR+hD+hU))*5.0,0.0,1.0);
  float rough=0.3+fbm(uv*20.0)*0.4;
  vec3 H2=normalize(vec3(0,0,1)+L);
  float spec=pow(max(dot(N,H2),0.0),mix(8.0,128.0,1.0-rough))*(1.0-rough)*0.4;
  vec3 col=biome(h,moisture);
  if(path>0.5&&h>0.36) col=mix(col,vec3(0.55,0.5,0.4),0.6);
  col=col*(diff*0.7+0.3)*ao+vec3(1)*spec;
  if(h<0.25){float lava=smoothstep(0.25,0.2,h);col+=lava*vec3(1.0,0.3,0.05)*2.0;}
  col=pow(col,vec3(1.0/2.2));
  gl_FragColor=vec4(col,1.0);
}`;
  const sv = makeShaderViz(frag);
  runShaderLoop(sv);
}


// ═══════════════════════════════════════════════════════════════════════════════
// LIVE SHADER EDITOR
// ═══════════════════════════════════════════════════════════════════════════════
const SHADER_LESSONS = ['valueNoise','perlinNoise','simplexNoise','voronoiNoise','fbmNoise','domainWarp','pbrSphere','proceduralAlbedo','normalMapGen','textureSuite','buildRock','weatherBlend','capstone'];
let _origShaderSrc = null;
let _editableUniforms = null;

function isShaderLesson(){
  return SHADER_LESSONS.includes(LESSONS[curLesson].viz);
}

function setupEditor(){
  const isShader = isShaderLesson();
  const editorWrap = document.getElementById('editorWrap');
  const codeContent = document.getElementById('codeContent');
  if(isShader){
    editorWrap.style.display='flex';
    codeContent.style.display='none';
    const editor = document.getElementById('shaderEditor');
    const code = LESSONS[curLesson].code;
    editor.value = code;
    _origShaderSrc = code;
    document.getElementById('editorStatus').textContent = 'ready';
    document.getElementById('editorStatus').className = 'editor-status';
    // Tab key inserts spaces
    editor.onkeydown = function(e){
      if(e.key==='Tab'){
        e.preventDefault();
        const s=this.selectionStart,end=this.selectionEnd;
        this.value=this.value.substring(0,s)+'  '+this.value.substring(end);
        this.selectionStart=this.selectionEnd=s+2;
      }
      if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){
        e.preventDefault();
        runEditedShader();
      }
    };
  } else {
    editorWrap.style.display='none';
    codeContent.style.display='block';
    codeContent.innerHTML = highlightCode(LESSONS[curLesson].code);
  }
}

function runEditedShader(){
  const editor = document.getElementById('shaderEditor');
  const status = document.getElementById('editorStatus');
  const src = editor.value;
  // Try to compile
  stop(); cancelRaf();
  try {
    cleanGL();
    freshCanvas('webgl');
    const canvas = document.getElementById('vizCanvas');
    const renderer = new THREE.WebGLRenderer({canvas, antialias: false, alpha: false});
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.setSize(canvas.clientWidth, canvas.clientHeight, false);
    canvas.width = canvas.clientWidth * Math.min(devicePixelRatio, 2);
    canvas.height = canvas.clientHeight * Math.min(devicePixelRatio, 2);
    const scene = new THREE.Scene();
    const camera = new THREE.OrthographicCamera(-1,1,1,-1,0,1);
    // Build uniforms from whatever the current viz had
    const uniforms = {
      u_time:{value:0.0},
      u_res:{value:new THREE.Vector2(canvas.width, canvas.height)},
      u_mouse:{value:new THREE.Vector2(0.5,0.5)}
    };
    // Add extra uniforms that the current lesson might use
    const extras = ['u_octaves','u_persist','u_mode','u_lacunarity','u_gain',
      'u_warpAmt','u_warpIter','u_metallic','u_roughness','u_hue','u_material',
      'u_strength','u_showAlbedo','u_showNormal','u_showRough','u_showAO'];
    extras.forEach(name => {
      const el = document.getElementById(name);
      if(el) uniforms[name] = {value: parseFloat(el.value)||0};
    });
    const mat = new THREE.ShaderMaterial({
      vertexShader: 'void main(){gl_Position=vec4(position,1.0);}',
      fragmentShader: src,
      uniforms
    });
    // Force compilation check
    renderer.compile(scene, camera);
    const mesh = new THREE.Mesh(new THREE.PlaneGeometry(2,2), mat);
    scene.add(mesh);
    canvas.onmousemove = e => {
      const r = canvas.getBoundingClientRect();
      uniforms.u_mouse.value.set((e.clientX-r.left)/r.width, 1-(e.clientY-r.top)/r.height);
    };
    _renderer=renderer;_scene=scene;_camera=camera;_uniforms=uniforms;
    // Wire sliders
    extras.forEach(name => {
      const el = document.getElementById(name);
      if(el && uniforms[name]) el.oninput = ()=>{uniforms[name].value=parseFloat(el.value);};
    });
    const t0=performance.now();
    function loop(){
      uniforms.u_time.value=(performance.now()-t0)*0.001;
      renderer.render(scene,camera);
      _raf=requestAnimationFrame(loop);
    }
    loop();
    status.textContent='compiled OK';
    status.className='editor-status';
    editor.classList.remove('error');
  } catch(e) {
    // Extract useful error info
    let msg = e.message || 'compilation failed';
    // Try to get GLSL error from Three.js
    if(msg.includes('VALIDATE_STATUS')){
      const gl = document.getElementById('vizCanvas').getContext('webgl2') || document.getElementById('vizCanvas').getContext('webgl');
      if(gl){
        const info = gl.getShaderInfoLog(gl.createShader(gl.FRAGMENT_SHADER));
        if(info) msg = info.substring(0, 120);
      }
    }
    status.textContent = msg.substring(0, 80);
    status.className = 'editor-status err';
    editor.classList.add('error');
    // Restore previous viz
    buildViz(curViz);
  }
}

function resetShader(){
  if(_origShaderSrc){
    document.getElementById('shaderEditor').value = _origShaderSrc;
    document.getElementById('editorStatus').textContent = 'reset to original';
    document.getElementById('editorStatus').className = 'editor-status';
    document.getElementById('shaderEditor').classList.remove('error');
    runEditedShader();
  }
}

function wireSlider(id,uniforms){
  const el=document.getElementById(id);
  if(el&&uniforms[id]) el.oninput=()=>{uniforms[id].value=parseFloat(el.value);};
}
function wireSelect(id,uniforms){
  const el=document.getElementById(id);
  if(el&&uniforms[id]) el.onchange=()=>{uniforms[id].value=parseFloat(el.value);};
}
function wireCheckbox(id,uniforms){
  const el=document.getElementById(id);
  if(el&&uniforms[id]) el.onchange=()=>{uniforms[id].value=el.checked?1.0:0.0;};
}
function getSliderVal(id){

}

// ═══════════════════════════════════════════════════════════════════════════════
// RUN BUTTON
// ═══════════════════════════════════════════════════════════════════════════════
function run(){
  // Preserve interactive state before resetting
  const seedEl=document.getElementById('seedInput');
  const savedSeed=seedEl?seedEl.value:null;
  stop(); cancelRaf(); runCleanups(); cleanGL();
  // Reset controls (prevents duplicate sliders)
  document.getElementById('vizControls').innerHTML='<button id="runBtn" onclick="run()">RUN</button>';
  vc().onmousemove=null;
  sizeCanvas();
  buildViz(curViz);
  // Restore seed if it existed and trigger regeneration
  if(savedSeed!==null){
    const newSeedEl=document.getElementById('seedInput');
    if(newSeedEl){newSeedEl.value=savedSeed;newSeedEl.dispatchEvent(new Event('input'));}
  }
}
