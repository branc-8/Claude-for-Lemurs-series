<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noise &amp; Procgen for Lemurs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #09090e;
  --accent: #7affb2;
  --accent2: #ffcc44;
  --accent3: #38d9f5;
  --muted: #4a7a5a;
  --border: #1a2a1a;
  --text: #c8d8c8;
  --red: #ff6060;
  --purp: #cc66ff;
  --lime: #a8ff47;
  --orange: #ff7f2a;
  --godot: #478cbf;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Space Mono', monospace;
  font-size: 14px;
  line-height: 1.65;
  overflow-x: hidden;
}
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--muted); border-radius: 3px; }

/* ─── LAYOUT ─── */
.shell {
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: auto 1fr;
  height: 100vh;
  gap: 0;
}
.head {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.5rem 1.2rem;
  background: rgba(122,255,178,0.03);
  border-bottom: 1px solid var(--border);
  min-height: 44px;
}
.head h1 {
  font-family: 'Syne', sans-serif;
  font-size: 1rem;
  font-weight: 800;
  color: var(--accent);
  letter-spacing: 0.04em;
}
.head h1 span { color: var(--accent3); font-weight: 700; }
.head-nav {
  display: flex;
  align-items: center;
  gap: 0.3rem;
}
.pn-btn {
  background: rgba(122,255,178,0.1);
  border: 1px solid var(--border);
  color: var(--accent);
  font-size: 0.8em;
  padding: 0.15rem 0.5rem;
  cursor: pointer;
  border-radius: 2px;
  font-family: 'Space Mono', monospace;
  transition: background 0.15s;
}
.pn-btn:hover { background: rgba(122,255,178,0.25); }
.pn-label {
  color: var(--accent);
  font-size: 0.7em;
  font-weight: 700;
  min-width: 3em;
  text-align: center;
}
.nav-bar {
  display: flex;
  align-items: center;
  gap: 0.3rem;
  flex-wrap: nowrap;
  overflow-x: auto;
  max-width: 60vw;
  scrollbar-width: thin;
}
.nav-section {
  color: var(--muted);
  font-size: 0.6em;
  letter-spacing: 0.14em;
  margin: 0 0.4rem;
  text-transform: uppercase;
}
.nav-btn {
  background: rgba(122,255,178,0.06);
  border: 1px solid var(--border);
  color: var(--accent);
  font-family: 'Space Mono', monospace;
  font-size: 0.7em;
  padding: 0.15rem 0.5rem;
  cursor: pointer;
  border-radius: 2px;
  transition: all 0.15s;
}
.nav-btn:hover { background: rgba(122,255,178,0.15); }
.nav-btn.active {
  background: var(--accent);
  color: var(--bg);
  font-weight: 700;
}

/* ─── LEFT PANEL (viz) ─── */
.viz-panel {
  position: relative;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  border-right: 1px solid var(--border);
}
.viz-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.4rem 0.8rem;
  background: rgba(122,255,178,0.03);
  border-bottom: 1px solid var(--border);
  min-height: 36px;
}
.viz-title {
  font-family: 'Syne', sans-serif;
  font-size: 0.8rem;
  color: var(--accent);
  font-weight: 700;
}
.viz-controls {
  display: flex;
  align-items: center;
  gap: 0.5rem;
}
.viz-controls label {
  font-size: 0.65em;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 0.25rem;
}
.viz-controls input[type="range"] {
  width: 60px;
  accent-color: var(--accent);
  height: 3px;
}
.viz-controls select {
  background: var(--bg);
  color: var(--accent);
  border: 1px solid var(--border);
  font-family: 'Space Mono', monospace;
  font-size: 0.65em;
  padding: 0.1rem 0.3rem;
  cursor: pointer;
}
#runBtn {
  background: var(--accent);
  color: var(--bg);
  border: none;
  font-family: 'Space Mono', monospace;
  font-weight: 700;
  font-size: 0.7em;
  padding: 0.2rem 0.8rem;
  cursor: pointer;
  letter-spacing: 0.1em;
  border-radius: 2px;
}
#runBtn:hover { filter: brightness(1.2); }
.canvas-wrap {
  flex: 1;
  position: relative;
  overflow: hidden;
}
#vizCanvas {
  width: 100%;
  height: 100%;
  display: block;
}

/* ─── SPEED SLIDER ─── */
.speed-row {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  padding: 0.2rem 0.8rem;
  background: rgba(0,0,0,0.3);
  border-top: 1px solid var(--border);
  font-size: 0.6em;
  color: var(--muted);
}
#speedSlider { width: 80px; accent-color: var(--accent); }

/* ─── RIGHT PANEL (content) ─── */
.content-panel {
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.tab-bar {
  display: flex;
  border-bottom: 1px solid var(--border);
  background: rgba(122,255,178,0.03);
}
.tab-btn {
  flex: 1;
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  color: var(--muted);
  font-family: 'Space Mono', monospace;
  font-size: 0.7em;
  padding: 0.4rem;
  cursor: pointer;
  letter-spacing: 0.1em;
  transition: all 0.15s;
}
.tab-btn:hover { color: var(--text); }
.tab-btn.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}
.tab-content {
  flex: 1;
  overflow-y: auto;
  padding: 1rem 1.2rem;
  display: none;
}
.tab-content.active { display: block; }

/* ─── CODE PANEL ─── */
#codeContent {
  font-family: 'Space Mono', monospace;
  font-size: 0.75em;
  line-height: 1.6;
  color: #a0c8a0;
  white-space: pre-wrap;
  word-break: break-all;
}
.code-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 0.5rem;
  padding-bottom: 0.4rem;
  border-bottom: 1px solid var(--border);
}
.code-label {
  font-family: 'Syne', sans-serif;
  font-size: 0.75rem;
  color: var(--accent);
  font-weight: 700;
  letter-spacing: 0.08em;
}
.copy-btn {
  background: rgba(122,255,178,0.1);
  border: 1px solid var(--border);
  color: var(--accent);
  font-family: 'Space Mono', monospace;
  font-size: 0.6em;
  padding: 0.15rem 0.6rem;
  cursor: pointer;
  border-radius: 2px;
  letter-spacing: 0.08em;
  transition: all 0.15s;
}
.copy-btn:hover { background: rgba(122,255,178,0.25); }
.copy-btn.copied { background: var(--accent); color: var(--bg); }
.code-hint {
  font-size: 0.72em;
  color: var(--muted);
  margin: 0 0 0.6rem;
  line-height: 1.5;
  padding: 0.4rem 0.6rem;
  background: rgba(122,255,178,0.03);
  border-left: 2px solid var(--border);
}
#codeContent .kw { color: var(--accent3); }
#codeContent .fn { color: var(--accent); }
#codeContent .cm { color: var(--muted); font-style: italic; }
#codeContent .num { color: var(--accent2); }
#codeContent .str { color: var(--red); }
#codeContent .type { color: var(--purp); }

/* ─── LESSON BODY COMPONENTS ─── */
.vocab { border-left: 2px solid var(--accent); padding: .4rem .8rem; margin: .6rem 0; background: rgba(122,255,178,0.04); }
.vt { color: var(--accent); font-weight: bold; }
.step-card { border: 1px solid var(--border); padding: .7rem 1rem; margin: .7rem 0; background: rgba(255,255,255,0.02); border-radius: 2px; }
.step-num { display: block; color: var(--accent3); font-size: .7em; letter-spacing: .12em; margin-bottom: .4rem; font-weight: 700; }
.tip { border-left: 3px solid var(--accent2); padding: .3rem .7rem; color: var(--accent2); margin: .6rem 0; }
.tip::before { content: ">> TIP: "; font-weight: 700; }
.artists { border-left: 3px solid var(--accent3); padding: .4rem .8rem; color: #a0b8a0; margin: .6rem 0; }
.artists::before { content: ">> SEE ALSO: "; color: var(--accent3); font-weight: 700; }
.spamton { background: rgba(122,255,178,0.06); border: 1px solid rgba(122,255,178,0.2); padding: .6rem 1rem; margin: .8rem 0; border-radius: 2px; }
.challenge { border-left: 2px solid var(--accent); padding: .4rem .8rem; margin: .6rem 0; }
.challenge::before { content: ">> CHALLENGE: "; color: var(--accent); font-weight: bold; }

.lesson-body h3 {
  font-family: 'Syne', sans-serif;
  color: var(--accent);
  font-size: 1rem;
  margin: 0.8rem 0 0.4rem;
}
.lesson-body p { margin: 0.4rem 0; }
.lesson-body code {
  background: rgba(122,255,178,0.08);
  color: var(--accent);
  padding: 0.05rem 0.3rem;
  border-radius: 2px;
  font-size: 0.9em;
}


/* ─── LIVE SHADER EDITOR ─── */
#shaderEditor {
  width: 100%;
  flex: 1;
  background: rgba(0,0,0,0.4);
  color: #a0c8a0;
  border: 1px solid var(--border);
  border-radius: 2px;
  font-family: 'Space Mono', monospace;
  font-size: 0.72em;
  line-height: 1.55;
  padding: 0.6rem;
  resize: none;
  tab-size: 2;
  outline: none;
  overflow-y: auto;
}
#shaderEditor:focus { border-color: rgba(122,255,178,0.4); }
#shaderEditor.error { border-color: var(--red); }
.editor-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.3rem 0;
  gap: 0.4rem;
}
.editor-bar .run-shader-btn {
  background: var(--accent);
  color: var(--bg);
  border: none;
  font-family: 'Space Mono', monospace;
  font-weight: 700;
  font-size: 0.7em;
  padding: 0.25rem 0.8rem;
  cursor: pointer;
  letter-spacing: 0.08em;
  border-radius: 2px;
}
.editor-bar .run-shader-btn:hover { filter: brightness(1.2); }
.editor-status {
  font-size: 0.65em;
  color: var(--muted);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  flex: 1;
}
.editor-status.err { color: var(--red); }
.editor-help {
  font-size: 0.62em;
  color: var(--muted);
  padding: 0.2rem 0;
}
/* ─── L11 LANGUAGE TABS ─── */
.lang-tabs {
  display: flex;
  gap: 2px;
  margin-bottom: 0.5rem;
}
.lang-tab {
  background: rgba(122,255,178,0.06);
  border: 1px solid var(--border);
  color: var(--muted);
  font-family: 'Space Mono', monospace;
  font-size: 0.65em;
  padding: 0.2rem 0.6rem;
  cursor: pointer;
  border-radius: 2px;
  transition: all 0.15s;
}
.lang-tab:hover { color: var(--text); }
.lang-tab.active { background: var(--accent); color: var(--bg); font-weight: 700; }

/* ─── MOBILE ─── */
@media (max-width: 800px) {
  .shell {
    grid-template-columns: 1fr;
    grid-template-rows: auto 40vh 1fr;
  }
  .viz-panel { border-right: none; border-bottom: 1px solid var(--border); }
  .nav-bar { display: none; }
  .head { flex-wrap: wrap; gap: 0.3rem; justify-content: center; }
  .head h1 { font-size: 0.85rem; width: 100%; text-align: center; }
  .head-nav { order: 2; }
}
</style>
</head>
<body>
<div class="shell">
  <header class="head">
    <h1>NOISE &amp; PROCGEN <span>FOR LEMURS</span></h1>
    <div class="head-nav">
      <button class="pn-btn" id="prevBtn" onclick="loadLesson(Math.max(0,curLesson-1))">&#9664;</button>
      <span class="pn-label" id="pnLabel">01/18</span>
      <button class="pn-btn" id="nextBtn" onclick="loadLesson(Math.min(LESSONS.length-1,curLesson+1))">&#9654;</button>
    </div>
    <nav class="nav-bar" id="navBar"></nav>
  </header>
  <section class="viz-panel">
    <div class="viz-head">
      <span class="viz-title" id="vizTitle">VALUE NOISE</span>
      <div class="viz-controls" id="vizControls">
        <button id="runBtn" onclick="run()">RUN</button>
      </div>
    </div>
    <div class="canvas-wrap">
      <canvas id="vizCanvas"></canvas>
    </div>
    <div class="speed-row">
      <span>SPEED</span>
      <input type="range" id="speedSlider" min="1" max="10" value="6">
    </div>
  </section>
  <section class="content-panel">
    <div class="tab-bar">
      <button class="tab-btn active" onclick="setTab('lesson')">LESSON</button>
      <button class="tab-btn" onclick="setTab('code')">CODE</button>
    </div>
    <div class="tab-content active" id="lessonTab">
      <div class="lesson-body" id="lessonBody"></div>
    </div>
    <div class="tab-content" id="codeTab">
      <div class="code-head">
        <span class="code-label" id="codeLabel">REFERENCE CODE</span>
        <button class="copy-btn" id="copyBtn" onclick="copyCode()">COPY</button>
      </div>
      <p class="code-hint" id="codeHint"></p>
      <div id="editorWrap" style="display:none;flex-direction:column;flex:1;">
        <div class="editor-bar">
          <button class="run-shader-btn" onclick="runEditedShader()">RUN SHADER (Ctrl+Enter)</button>
          <span class="editor-status" id="editorStatus">ready</span>
          <button class="copy-btn" onclick="resetShader()">RESET</button>
        </div>
        <textarea id="shaderEditor" spellcheck="false"></textarea>
        <div class="editor-help">edit the fragment shader above &mdash; Ctrl/Cmd+Enter to compile &amp; run</div>
      </div>
      <pre id="codeContent"></pre>
    </div>
  </section>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/simplex-noise/2.4.0/simplex-noise.min.js"></script>

<script>
// ═══════════════════════════════════════════════════════════════════════════════
// LESSON DATA
// ═══════════════════════════════════════════════════════════════════════════════
const LESSONS = [
// ─── L01: Randomness Is Ugly ─────────────────────────────────────────────────
{
  subtitle: "NOISE \u2022 LESSON 01",
  title: "Randomness Is Ugly",
  viz: "valueNoise",
  code: "// Value Noise \u2014 GLSL\nprecision highp float;\nuniform float u_time;\nuniform vec2 u_res;\n\n// Hash: deterministic pseudo-random\nfloat hash(vec2 p) {\n  return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);\n}\n\n// Value noise with smoothstep interpolation\nfloat valueNoise(vec2 p) {\n  vec2 i = floor(p);\n  vec2 f = fract(p);\n  // Smoothstep curve (3t\u00b2 - 2t\u00b3)\n  vec2 u = f * f * (3.0 - 2.0 * f);\n  // Four corners\n  float a = hash(i);\n  float b = hash(i + vec2(1.0, 0.0));\n  float c = hash(i + vec2(0.0, 1.0));\n  float d = hash(i + vec2(1.0, 1.0));\n  // Bilinear interpolation\n  return mix(mix(a, b, u.x), mix(c, d, u.x), u.y);\n}\n\nvoid main() {\n  vec2 uv = gl_FragCoord.xy / u_res;\n  float n;\n  if (uv.x < 0.33) {\n    // Pure random\n    n = hash(uv * 200.0 + u_time);\n  } else if (uv.x < 0.66) {\n    // Value noise (no smoothstep)\n    vec2 p = uv * 8.0;\n    vec2 i = floor(p); vec2 f = fract(p);\n    n = mix(mix(hash(i), hash(i+vec2(1,0)), f.x),\n           mix(hash(i+vec2(0,1)), hash(i+vec2(1,1)), f.x), f.y);\n  } else {\n    // Value noise + smoothstep\n    n = valueNoise(uv * 8.0 + u_time * 0.3);\n  }\n  gl_FragColor = vec4(vec3(n) * vec3(0.48, 1.0, 0.7), 1.0);\n}",
  body: "<p>Hit <code>random()</code> in any creative tool. The result looks like television static. That\u2019s because raw randomness has zero <em>memory</em> \u2014 each pixel is independent of its neighbors. Nature doesn\u2019t work like that. Clouds, terrain, wood grain \u2014 they\u2019re random, but <em>smoothly</em> random.</p>\n<div class=\"vocab\"><span class=\"vt\">\"Coherent Noise\"</span> \u2014 Randomness where nearby points have similar values. The foundation of every natural-looking texture.</div>\n<div class=\"vocab\"><span class=\"vt\">\"Hash Function\"</span> \u2014 A deterministic formula that takes a position and returns a pseudo-random number. Same input = same output, every time.</div>\n<div class=\"vocab\"><span class=\"vt\">\"Smoothstep\"</span> \u2014 The curve <code>3t\u00b2 - 2t\u00b3</code> that turns a linear 0\u20131 ramp into a smooth S-curve. The secret sauce that makes value noise not look like garbage.</div>\n<div class=\"step-card\"><span class=\"step-num\">THE GRID</span>Imagine a grid of random values (one per corner). That\u2019s your hash function \u2014 <code>hash(vec2 p)</code> returns a float between 0 and 1 for any grid coordinate. Deterministic: same coordinate, same value.</div>\n<div class=\"step-card\"><span class=\"step-num\">THE BLEND</span>For any point between grid corners, interpolate the four surrounding values. Linear interpolation gives blocky artifacts. <code>smoothstep</code> gives that buttery organic feel.</div>\n<div class=\"step-card\"><span class=\"step-num\">THE ANIMATION</span>Add <code>u_time</code> to the input coordinates and the noise field drifts. Free animation from a static function. This is how clouds move in every game ever.</div>\n<div class=\"tip\">Left column: garbage. Middle: blocky. Right: smooth. Three columns, one lesson: interpolation is everything.</div>\n<div class=\"artists\">Blender\u2019s <code>Noise Texture</code> node, Photoshop\u2019s Clouds filter, Unity\u2019s <code>Mathf.PerlinNoise</code>, Substance Designer\u2019s noise generators \u2014 all coherent noise under the hood.</div>\n<div class=\"spamton\">YOU THINK random() IS YOUR [Friend]?? IT\u2019S A [One Night Stand]!! Coherent noise is a [RELATIONSHIP] \u2014 every point REMEMBERS its neighbors!! <strong>That\u2019s the difference between TV static and a cloud.</strong></div>\n<div class=\"challenge\">Open the code tab. Find the <code>8.0</code> frequency multiplier. Picture changing it to <code>32.0</code> (tiny detail) then <code>2.0</code> (continental blobs). That one number controls the scale of the entire texture. It\u2019s the first knob on every procedural tool you\u2019ll ever use.</div>"
},
// ─── L02: Gradient Noise (Perlin) ────────────────────────────────────────────
{
  subtitle: "NOISE \u2022 LESSON 02",
  title: "Gradient Noise (Perlin)",
  viz: "perlinNoise",
  code: "// Classic 2D Perlin Noise \u2014 GLSL\n// Based on ashima/webgl-noise noise2D.glsl\nprecision highp float;\nuniform float u_time;\nuniform vec2 u_res;\nuniform vec2 u_mouse;\nuniform float u_octaves; // 1.0\u20138.0\nuniform float u_persist; // 0.0\u20131.0\n\nvec3 mod289(vec3 x) { return x - floor(x / 289.0) * 289.0; }\nvec2 mod289(vec2 x) { return x - floor(x / 289.0) * 289.0; }\nvec3 permute(vec3 x) { return mod289(((x*34.0)+1.0)*x); }\n\nfloat snoise(vec2 v) {\n  const vec4 C = vec4(0.211324865405187, 0.366025403784439,\n                     -0.577350269189626, 0.024390243902439);\n  vec2 i = floor(v + dot(v, C.yy));\n  vec2 x0 = v - i + dot(i, C.xx);\n  vec2 i1 = (x0.x > x0.y) ? vec2(1.0, 0.0) : vec2(0.0, 1.0);\n  vec4 x12 = x0.xyxy + C.xxzz;\n  x12.xy -= i1;\n  i = mod289(i);\n  vec3 p = permute(permute(i.y + vec3(0.0, i1.y, 1.0))\n                           + i.x + vec3(0.0, i1.x, 1.0));\n  vec3 m = max(0.5 - vec3(dot(x0,x0), dot(x12.xy,x12.xy),\n                          dot(x12.zw,x12.zw)), 0.0);\n  m = m * m; m = m * m;\n  vec3 x = 2.0 * fract(p * C.www) - 1.0;\n  vec3 h = abs(x) - 0.5;\n  vec3 ox = floor(x + 0.5);\n  vec3 a0 = x - ox;\n  m *= 1.79284291400159 - 0.85373472095314\n       * (a0*a0 + h*h);\n  vec3 g;\n  g.x = a0.x * x0.x + h.x * x0.y;\n  g.yz = a0.yz * x12.xz + h.yz * x12.yw;\n  return 130.0 * dot(m, g);\n}\n\nvoid main() {\n  vec2 uv = gl_FragCoord.xy / u_res;\n  float n = 0.0, amp = 1.0, freq = 4.0, total = 0.0;\n  int oct = int(u_octaves);\n  for (int i = 0; i < 8; i++) {\n    if (i >= oct) break;\n    n += amp * snoise(uv * freq + u_time * 0.2);\n    total += amp;\n    freq *= 2.0;\n    amp *= u_persist;\n  }\n  n = n / total * 0.5 + 0.5;\n  gl_FragColor = vec4(vec3(n) * vec3(0.48, 1.0, 0.7), 1.0);\n}",
  body: "<p>Ken Perlin thought the CGI in <em>Tron</em> (1982) looked too clean, so he invented gradient noise and won an actual Oscar for it. The key insight: instead of storing random <em>values</em> at grid points, store random <em>gradients</em> (directions), then use dot products to blend. The result is smoother, more organic, and has no value-noise blockiness.</p>\n<div class=\"vocab\"><span class=\"vt\">\"Gradient Noise\"</span> \u2014 Noise where each grid point has a random direction vector. The value at any point comes from dot products with surrounding gradients.</div>\n<div class=\"vocab\"><span class=\"vt\">\"Octave\"</span> \u2014 One layer of noise at a specific frequency. Stack multiple octaves for detail (this becomes FBM later).</div>\n<div class=\"vocab\"><span class=\"vt\">\"Persistence\"</span> \u2014 How much each successive octave contributes. Low persistence = smooth. High = detailed/rough.</div>\n<div class=\"step-card\"><span class=\"step-num\">THE LATTICE</span>Place a random gradient vector at every integer grid point. These gradients point in random directions but are deterministic \u2014 same grid point, same gradient, always.</div>\n<div class=\"step-card\"><span class=\"step-num\">THE DOT PRODUCT</span>For any point in space, find the four surrounding grid corners. Compute the vector from each corner TO your point, then dot it with that corner\u2019s gradient. This gives four influence values.</div>\n<div class=\"step-card\"><span class=\"step-num\">THE INTERPOLATION</span>Blend the four dot products using smoothstep (or the improved quintic curve <code>6t\u2075 - 15t\u2074 + 10t\u00b3</code>). The result passes through zero at every grid point \u2014 that\u2019s why Perlin noise has a slight grid-aligned artifact pattern.</div>\n<div class=\"tip\">Drag the octaves and persistence sliders in the viz. One octave = blobs. Eight octaves with 0.5 persistence = terrain. This is literally how Minecraft generates its world.</div>\n<div class=\"artists\">Blender <code>Noise Texture</code> \u2192 Detail = octaves, Roughness = persistence. Unity <code>Mathf.PerlinNoise(x,y)</code>. Substance Designer Perlin Noise node. TouchDesigner\u2019s Noise TOP.</div>\n<div class=\"spamton\">KEN PERLIN WON AN [Academy Award] FOR A MATH FUNCTION!! Meanwhile YOUR random() is out here making [Static Cling]!! The DOT PRODUCT is the [Secret Handshake] between gradients and <strong>every terrain you\u2019ve ever walked on in a game was born from this one function.</strong></div>\n<div class=\"challenge\">Set octaves to 1, then slowly increase to 8. Watch how each octave adds finer detail. At what point does adding more octaves stop being visually noticeable? (Spoiler: around 5\u20136. Above that you\u2019re burning GPU for invisible detail.)</div>"
},
// ─── L03: Simplex Noise ──────────────────────────────────────────────────────
{
  subtitle: "NOISE \u2022 LESSON 03",
  title: "Simplex Noise",
  viz: "simplexNoise",
  code: "// Simplex vs Perlin comparison \u2014 GLSL\n// Shows both noise types side-by-side\nprecision highp float;\nuniform float u_time;\nuniform vec2 u_res;\n\nvec3 mod289(vec3 x){return x-floor(x/289.0)*289.0;}\nvec2 mod289(vec2 x){return x-floor(x/289.0)*289.0;}\nvec3 permute(vec3 x){return mod289(((x*34.0)+1.0)*x);}\n\n// Simplex 2D (ashima/webgl-noise)\nfloat snoise(vec2 v) {\n  const vec4 C = vec4(0.211324865405187, 0.366025403784439,\n                     -0.577350269189626, 0.024390243902439);\n  vec2 i = floor(v + dot(v, C.yy));\n  vec2 x0 = v - i + dot(i, C.xx);\n  vec2 i1 = (x0.x > x0.y) ? vec2(1,0) : vec2(0,1);\n  vec4 x12 = x0.xyxy + C.xxzz;\n  x12.xy -= i1;\n  i = mod289(i);\n  vec3 p = permute(permute(i.y+vec3(0,i1.y,1))+i.x+vec3(0,i1.x,1));\n  vec3 m = max(0.5-vec3(dot(x0,x0),dot(x12.xy,x12.xy),dot(x12.zw,x12.zw)),0.0);\n  m=m*m;m=m*m;\n  vec3 x = 2.0*fract(p*C.www)-1.0;\n  vec3 h = abs(x)-0.5;\n  vec3 ox = floor(x+0.5);\n  vec3 a0 = x-ox;\n  m *= 1.79284291400159-0.85373472095314*(a0*a0+h*h);\n  vec3 g;\n  g.x = a0.x*x0.x+h.x*x0.y;\n  g.yz = a0.yz*x12.xz+h.yz*x12.yw;\n  return 130.0*dot(m,g);\n}\n\n// Value noise for Perlin-style comparison\nfloat hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}\nfloat perlinLike(vec2 p) {\n  vec2 i=floor(p),f=fract(p);\n  vec2 u=f*f*(3.0-2.0*f);\n  return mix(mix(hash(i),hash(i+vec2(1,0)),u.x),\n             mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),u.x),u.y);\n}\n\nvoid main() {\n  vec2 uv = gl_FragCoord.xy / u_res;\n  float t = u_time * 0.3;\n  float n;\n  if (uv.x < 0.5) {\n    // Perlin-style\n    n = perlinLike(uv * 8.0 + t);\n  } else {\n    // Simplex\n    n = snoise((uv - vec2(0.5, 0.0)) * 8.0 + t) * 0.5 + 0.5;\n  }\n  vec3 col = vec3(n) * vec3(0.48, 1.0, 0.7);\n  // Divider line\n  if (abs(uv.x - 0.5) < 0.002) col = vec3(0.48, 1.0, 0.7);\n  gl_FragColor = vec4(col, 1.0);\n}",
  body: "<p>Classic Perlin has a dirty secret: square grid alignment. Squint at any Perlin texture and you\u2019ll spot faint axis-aligned artifacts. In 2001, Perlin fixed his own invention with <em>simplex noise</em> \u2014 a redesign built on triangles instead of squares. Fewer calculations, fewer artifacts, better scaling to higher dimensions.</p>\n<div class=\"vocab\"><span class=\"vt\">\"Simplex\"</span> \u2014 The simplest shape that fills N-dimensional space. In 2D, it\u2019s a triangle. In 3D, a tetrahedron. Fewer corners = fewer calculations = faster noise.</div>\n<div class=\"vocab\"><span class=\"vt\">\"Skewing\"</span> \u2014 The math trick that maps a square grid onto a triangular (simplex) grid. It lets you use integer coordinates but sample on triangles.</div>\n<div class=\"vocab\"><span class=\"vt\">\"O(n\u00b2) vs O(2\u207f)\"</span> \u2014 Simplex noise scales quadratically with dimensions (manageable), while classic Perlin scales exponentially (disaster in 4D+). For 3D animated noise, simplex is the move.</div>\n<div class=\"step-card\"><span class=\"step-num\">TRIANGLES, NOT SQUARES</span>The simplex grid divides space into equilateral triangles. Each point is influenced by only 3 corners (not 4), which means fewer dot products and faster execution.</div>\n<div class=\"step-card\"><span class=\"step-num\">THE SKEW</span>To find which triangle you\u2019re in, the algorithm skews the coordinate system. The factor <code>(sqrt(3)-1)/2</code> transforms square coordinates into simplex coordinates. It sounds arcane but the GPU doesn\u2019t care \u2014 it\u2019s just a multiply and an add.</div>\n<div class=\"tip\">Left half: Perlin. Right half: simplex. Squint at the Perlin side \u2014 see the faint grid artifacts? The simplex side is smoother, more isotropic. Subtle in 2D, dramatic in 3D. That\u2019s worth the upgrade.</div>\n<div class=\"artists\">Godot\u2019s <code>FastNoiseLite</code> uses OpenSimplex2 by default. Blender\u2019s Noise Texture is Perlin-based but the Musgrave node supports simplex. Unity\u2019s burst-compiled noise packages often default to simplex.</div>\n<div class=\"spamton\">PERLIN LOOKED AT HIS OWN [Legacy Code] AND SAID \u201cTHIS IS [Garbage]\u201d!! REPLACED SQUARES WITH TRIANGLES!! [Exponential] TO [Polynomial]!! THE MAN [Deprecated Himself]!! <strong>When the inventor of Perlin noise tells you to use simplex, you listen to the guy with the Oscar.</strong></div>\n<div class=\"challenge\">In Blender, add a <code>Noise Texture</code> and a <code>Musgrave Texture</code> node. Feed both into a MixRGB and plug that into Base Color. Musgrave is multi-fractal \u2014 compare the organic quality at Scale 4.0. Now change Musgrave\u2019s type dropdown to \u201cRidged\u201d. That\u2019s mountain ridges from a dropdown.</div>"
},
// ─── L04: Voronoi / Worley Noise ─────────────────────────────────────────────
{
  subtitle: "NOISE \u2022 LESSON 04",
  title: "Voronoi / Worley Noise",
  viz: "voronoiNoise",
  code: "// Voronoi / Worley Noise \u2014 GLSL\n// Based on ashima cellular2D algorithm\nprecision highp float;\nuniform float u_time;\nuniform vec2 u_res;\nuniform float u_mode; // 0=F1, 1=F2-F1, 2=F2\n\nvec2 hash2(vec2 p) {\n  p = vec2(dot(p,vec2(127.1,311.7)),\n           dot(p,vec2(269.5,183.3)));\n  return fract(sin(p)*43758.5453);\n}\n\nvec2 voronoi(vec2 x) {\n  vec2 n = floor(x), f = fract(x);\n  float F1 = 8.0, F2 = 8.0;\n  for (int j = -1; j <= 1; j++)\n  for (int i = -1; i <= 1; i++) {\n    vec2 g = vec2(float(i), float(j));\n    vec2 o = hash2(n + g);\n    // Animate feature points\n    o = 0.5 + 0.5*sin(u_time*0.6 + 6.2831*o);\n    float d = length(g + o - f);\n    if (d < F1) { F2 = F1; F1 = d; }\n    else if (d < F2) { F2 = d; }\n  }\n  return vec2(F1, F2);\n}\n\nvoid main() {\n  vec2 uv = gl_FragCoord.xy / u_res;\n  vec2 v = voronoi(uv * 6.0);\n  float n;\n  int mode = int(u_mode);\n  if (mode == 0) n = v.x;       // F1: cell distance\n  else if (mode == 1) n = v.y - v.x; // F2-F1: edges\n  else n = v.y;                 // F2: second closest\n  vec3 col = vec3(n) * vec3(0.48, 1.0, 0.7);\n  gl_FragColor = vec4(col, 1.0);\n}",
  body: "<p>Voronoi noise looks nothing like Perlin. No smooth gradients \u2014 you get <em>cells</em> \u2014 like looking at stone tiles, cracked mud, reptile scales, or biological cells under a microscope. The algorithm: scatter random points in space, then for any pixel, measure the distance to the nearest point.</p>\n<div class=\"vocab\"><span class=\"vt\">\"Feature Point\"</span> \u2014 A random seed point placed in each grid cell. The Voronoi pattern is defined by distances to these points.</div>\n<div class=\"vocab\"><span class=\"vt\">\"F1 Distance\"</span> \u2014 Distance to the nearest feature point. Produces the classic cell/bubble pattern. Low values = cell centers, high values = cell edges.</div>\n<div class=\"vocab\"><span class=\"vt\">\"F2\u2013F1\"</span> \u2014 Difference between second-closest and closest distance. This isolates the cell <em>edges</em> \u2014 perfect for cracked earth, stone mortar, or vein patterns.</div>\n<div class=\"step-card\"><span class=\"step-num\">SCATTER POINTS</span>Place one random point (feature point) in each grid cell. The position within the cell is determined by a hash function, so it\u2019s deterministic.</div>\n<div class=\"step-card\"><span class=\"step-num\">MEASURE DISTANCES</span>For any pixel, check the surrounding 3\u00d73 grid cells. Find the distance to the nearest feature point (F1) and second-nearest (F2). These two distances give you three useful patterns.</div>\n<div class=\"step-card\"><span class=\"step-num\">CHOOSE YOUR LOOK</span>F1 alone = round cells. F2\u2013F1 = sharp edges (mortar lines). F2 alone = a weirder, more alien pattern. Toggle between them in the viz to see.</div>\n<div class=\"tip\">Use the mode selector to switch between F1 (cells), F2\u2013F1 (edges), and F2 (second-closest). Each variant maps to completely different material types.</div>\n<div class=\"artists\">Substance Designer\u2019s Cells generators, Blender\u2019s <code>Voronoi Texture</code> node (with its Distance/F1/F2 outputs), Unreal\u2019s VoronoiNoise material expression.</div>\n<div class=\"spamton\">PERLIN MAKES [Clouds]!! VORONOI MAKES [Dragon Scales]!! THE ENTIRE ALGORITHM IS \u201cWHO IS MY [Nearest Neighbor]\u201d!! That\u2019s the WHOLE FUNCTION!! And F2\u2013F1?? That\u2019s the [Gossip] about where neighbors [TOUCH]!! <strong>Every cracked-earth, every stone wall, every reptile skin in every game is just \u201chow far to the nearest dot\u201d with attitude.</strong></div>\n<div class=\"challenge\">In Blender, add a Voronoi Texture node. Switch between Distance, Color, and Position outputs. Plug the Distance output into a ColorRamp to create a custom cell gradient \u2014 instant alien skin.</div>"
},
// ─── L05: FBM: Layering Noise ────────────────────────────────────────────────
{
  subtitle: "NOISE \u2022 LESSON 05",
  title: "FBM: Layering Noise",
  viz: "fbmNoise",
  code: "// FBM (Fractal Brownian Motion) \u2014 GLSL\nprecision highp float;\nuniform float u_time;\nuniform vec2 u_res;\nuniform float u_octaves;    // 1\u20138\nuniform float u_lacunarity; // 1.5\u20133.0\nuniform float u_gain;       // 0.2\u20130.8\n\nvec3 mod289(vec3 x){return x-floor(x/289.0)*289.0;}\nvec2 mod289(vec2 x){return x-floor(x/289.0)*289.0;}\nvec3 permute(vec3 x){return mod289(((x*34.0)+1.0)*x);}\nfloat snoise(vec2 v) {\n  const vec4 C = vec4(0.211324865405187,0.366025403784439,\n                     -0.577350269189626,0.024390243902439);\n  vec2 i=floor(v+dot(v,C.yy));\n  vec2 x0=v-i+dot(i,C.xx);\n  vec2 i1=(x0.x>x0.y)?vec2(1,0):vec2(0,1);\n  vec4 x12=x0.xyxy+C.xxzz; x12.xy-=i1;\n  i=mod289(i);\n  vec3 p=permute(permute(i.y+vec3(0,i1.y,1))+i.x+vec3(0,i1.x,1));\n  vec3 m=max(0.5-vec3(dot(x0,x0),dot(x12.xy,x12.xy),dot(x12.zw,x12.zw)),0.0);\n  m=m*m;m=m*m;\n  vec3 x2=2.0*fract(p*C.www)-1.0;\n  vec3 h=abs(x2)-0.5;\n  vec3 ox=floor(x2+0.5);\n  vec3 a0=x2-ox;\n  m*=1.79284291400159-0.85373472095314*(a0*a0+h*h);\n  vec3 g; g.x=a0.x*x0.x+h.x*x0.y;\n  g.yz=a0.yz*x12.xz+h.yz*x12.yw;\n  return 130.0*dot(m,g);\n}\n\nfloat fbm(vec2 p) {\n  float val = 0.0, amp = 0.5, freq = 1.0, total = 0.0;\n  int oct = int(u_octaves);\n  for (int i = 0; i < 8; i++) {\n    if (i >= oct) break;\n    val += amp * snoise(p * freq + u_time * 0.15);\n    total += amp;\n    freq *= u_lacunarity;\n    amp *= u_gain;\n  }\n  return val / total;\n}\n\nvoid main() {\n  vec2 uv = gl_FragCoord.xy / u_res;\n  float n = fbm(uv * 4.0) * 0.5 + 0.5;\n  gl_FragColor = vec4(vec3(n)*vec3(0.48,1.0,0.7), 1.0);\n}",
  body: "<p>One layer of noise is a blob. Stack layers at increasing frequency and decreasing amplitude and you get <em>terrain</em>. That\u2019s Fractal Brownian Motion (FBM) \u2014 the single most important technique in procedural generation. Mountains, clouds, marble, fire, ocean waves: all FBM.</p>\n<div class=\"vocab\"><span class=\"vt\">\"Lacunarity\"</span> \u2014 How much the frequency multiplies per octave. Default 2.0 (each octave is twice the frequency). Higher = more rapidly detailed.</div>\n<div class=\"vocab\"><span class=\"vt\">\"Gain / Persistence\"</span> \u2014 How much the amplitude shrinks per octave. 0.5 = each octave is half as strong. Low = smooth, high = rough.</div>\n<div class=\"vocab\"><span class=\"vt\">\"Self-Similarity\"</span> \u2014 The property of looking similar at different zoom levels. Coastlines, mountain ranges, and broccoli all have this. FBM simulates it by stacking scaled noise.</div>\n<div class=\"step-card\"><span class=\"step-num\">THE LOOP</span>Start with frequency=1, amplitude=0.5. Sample noise. Then: frequency *= lacunarity, amplitude *= gain. Repeat for N octaves. Sum everything. That\u2019s FBM.</div>\n<div class=\"step-card\"><span class=\"step-num\">THE INTUITION</span>Octave 1 = continent shapes. Octave 2 = mountain ranges. Octave 3 = individual peaks. Octave 4 = boulders. Octave 5 = rocks. Each octave adds detail at a smaller scale.</div>\n<div class=\"tip\">Play with the lacunarity slider. Values around 2.0 give natural-looking results. Push it to 3.0+ and things get spiky and alien. Persistence below 0.4 = rolling hills; above 0.6 = jagged crags.</div>\n<div class=\"artists\">Blender Noise Texture: Detail = octaves, Roughness = persistence. Substance Designer FBM node. Unreal Noise node (Material Editor). Houdini Unified Noise VOP. Godot <code>FastNoiseLite.fractal_octaves</code>. All the same loop.</div>\n<div class=\"spamton\">FBM IS A [For Loop]!! THAT\u2019S IT!! THE BIG [Industry Secret] IS A FOR LOOP!! The MOUNTAINS in Skyrim?? [For Loop]!! The CLOUDS in Zelda?? [For Loop]!! EVERY TERRAIN since [1993]?? \u2014 <strong>it\u2019s all one for-loop adding smaller and smaller copies of the same noise function.</strong></div>\n<div class=\"challenge\">Create a two-tone FBM: compute <code>fbm(uv)</code> and use a threshold (e.g., 0.5) to create land vs water. Congratulations, you just generated a continent map. Now vary the threshold for different sea levels.</div>"
},
// ─── L06: Domain Warping ─────────────────────────────────────────────────────
{
  subtitle: "NOISE \u2022 LESSON 06",
  title: "Domain Warping",
  viz: "domainWarp",
  code: "// Domain Warping \u2014 GLSL\n// Inigo Quilez\u2019s f(p + f(p)) technique\nprecision highp float;\nuniform float u_time;\nuniform vec2 u_res;\nuniform float u_warpAmt;  // 0.0\u20134.0\nuniform float u_warpIter; // 1.0\u20133.0\n\nvec3 mod289(vec3 x){return x-floor(x/289.0)*289.0;}\nvec2 mod289(vec2 x){return x-floor(x/289.0)*289.0;}\nvec3 permute(vec3 x){return mod289(((x*34.0)+1.0)*x);}\nfloat snoise(vec2 v) {\n  const vec4 C=vec4(0.211324865405187,0.366025403784439,-0.577350269189626,0.024390243902439);\n  vec2 i=floor(v+dot(v,C.yy)),x0=v-i+dot(i,C.xx);\n  vec2 i1=(x0.x>x0.y)?vec2(1,0):vec2(0,1);\n  vec4 x12=x0.xyxy+C.xxzz;x12.xy-=i1;i=mod289(i);\n  vec3 p=permute(permute(i.y+vec3(0,i1.y,1))+i.x+vec3(0,i1.x,1));\n  vec3 m=max(0.5-vec3(dot(x0,x0),dot(x12.xy,x12.xy),dot(x12.zw,x12.zw)),0.0);\n  m=m*m;m=m*m;\n  vec3 x2=2.0*fract(p*C.www)-1.0,h=abs(x2)-0.5,ox=floor(x2+0.5),a0=x2-ox;\n  m*=1.79284291400159-0.85373472095314*(a0*a0+h*h);\n  vec3 g;g.x=a0.x*x0.x+h.x*x0.y;g.yz=a0.yz*x12.xz+h.yz*x12.yw;\n  return 130.0*dot(m,g);\n}\nfloat fbm(vec2 p){float v=0.0,a=0.5;for(int i=0;i<5;i++){v+=a*snoise(p);p*=2.0;a*=0.5;}return v;}\n\nvoid main(){\n  vec2 uv=gl_FragCoord.xy/u_res;\n  vec2 p=uv*3.0;\n  float t=u_time*0.15;\n  int iters=int(u_warpIter);\n  // Iterative domain warping\n  for(int i=0;i<3;i++){\n    if(i>=iters) break;\n    p+=u_warpAmt*vec2(fbm(p+t),fbm(p+vec2(5.2,1.3)+t));\n  }\n  float n=fbm(p)*0.5+0.5;\n  // Color palette (Iq cosine palette)\n  vec3 col=0.5+0.5*cos(6.28*(n*vec3(1.0,0.8,0.6)+vec3(0.0,0.15,0.2)));\n  col*=vec3(0.6,1.0,0.8);\n  gl_FragColor=vec4(col,1.0);\n}",
  body: "<p>The trick that separates \u201cgood shader\u201d from \u201choly crap\u201d: instead of <code>fbm(p)</code>, try <code>fbm(p + fbm(p))</code>. Noise warping its own input coordinates. The result looks like folded rock, turbulent smoke, or alien biology. Inigo Quilez popularized this technique and it\u2019s become a staple of shader art.</p>\n<div class=\"vocab\"><span class=\"vt\">\"Domain Warping\"</span> \u2014 Distorting the input coordinates (the \"domain\") of a function using another function\u2019s output. It\u2019s displacement mapping, but in math-space instead of geometry-space.</div>\n<div class=\"vocab\"><span class=\"vt\">\"Warp Strength\"</span> \u2014 How far the coordinates get pushed. Low = subtle ripples. High = extreme folding and swirling.</div>\n<div class=\"vocab\"><span class=\"vt\">\"Iterative Warping\"</span> \u2014 Applying the warp multiple times: <code>f(p + f(p + f(p)))</code>. Each iteration adds more complexity and organic turbulence.</div>\n<div class=\"step-card\"><span class=\"step-num\">SINGLE WARP</span><code>result = fbm(p + warpAmt * vec2(fbm(p), fbm(p + offset)))</code>. The offset ensures the X and Y warps use different noise \u2014 without it, the warping has a strange diagonal symmetry.</div>\n<div class=\"step-card\"><span class=\"step-num\">DOUBLE WARP</span>Apply the same technique again: compute the warped position, then warp THAT. Two iterations of warping produce incredibly organic, fluid patterns that look like satellite photos of Jupiter.</div>\n<div class=\"tip\">Set warp to 0 (pure FBM) then slowly increase. Watch how the smooth blobs become folded, turbulent, almost geological. That transition from calm to chaotic is your most powerful creative control.</div>\n<div class=\"artists\">Shadertoy (search \"domain warping\" \u2014 thousands of examples). Substance Designer\u2019s Directional Warp node. TouchDesigner\u2019s Feedback TOP achieves similar effects. Houdini\u2019s Turbulence VOP.</div>\n<div class=\"spamton\">YOU TAKE NOISE AND FEED IT [Into Itself]!! IT\u2019S A [Camera] POINTED AT ITS OWN [Monitor]!! FEEDBACK LOOPS OF [Beauty]!! Inigo Quilez figured this out and now EVERY trending shader on Shadertoy is domain warping!! <strong>Noise eating its own tail. A mathematical ouroboros. And it runs at 60fps.</strong></div>\n<div class=\"challenge\">In the shader editor, change the final color line: replace the cosine palette with <code>vec3(fbm(p), fbm(p+7.0), fbm(p+13.0))</code>. Each RGB channel samples different noise, creating iridescent oil-slick patterns. Now crank the warp to 3.0.</div>"
},
// ─── L07: What PBR Actually Is ───────────────────────────────────────────────
{
  subtitle: "PBR MATERIALS \u2022 LESSON 07",
  title: "What PBR Actually Is",
  viz: "pbrSphere",
  code: "// Simplified PBR (Cook-Torrance BRDF)\n// Reference: lygia/lighting/pbr.glsl\nprecision highp float;\nuniform float u_time;\nuniform vec2 u_res;\nuniform vec2 u_mouse;\nuniform float u_metallic;  // 0\u20131\nuniform float u_roughness; // 0.05\u20131\nuniform float u_hue;       // 0\u20131\n\n#define PI 3.14159265\n\nvec3 hsv2rgb(vec3 c){\n  vec4 K=vec4(1.0,2.0/3.0,1.0/3.0,3.0);\n  vec3 p=abs(fract(c.xxx+K.xyz)*6.0-K.www);\n  return c.z*mix(K.xxx,clamp(p-K.xxx,0.0,1.0),c.y);\n}\n\n// GGX Normal Distribution\nfloat DistGGX(float NdH, float r){\n  float a=r*r; float a2=a*a;\n  float d=NdH*NdH*(a2-1.0)+1.0;\n  return a2/(PI*d*d);\n}\n// Schlick Geometry\nfloat GeomSmith(float NdV, float NdL, float r){\n  float k=(r+1.0)*(r+1.0)/8.0;\n  float g1=NdV/(NdV*(1.0-k)+k);\n  float g2=NdL/(NdL*(1.0-k)+k);\n  return g1*g2;\n}\n// Fresnel Schlick\nvec3 FresnelSchlick(float HdV,vec3 F0){\n  return F0+(1.0-F0)*pow(1.0-HdV,5.0);\n}\n\nvoid main(){\n  vec2 uv=(gl_FragCoord.xy-0.5*u_res)/min(u_res.x,u_res.y);\n  // Sphere SDF\n  float r=length(uv); if(r>0.45){gl_FragColor=vec4(vec3(0.035),1);return;}\n  vec3 N=normalize(vec3(uv,sqrt(max(0.0,0.45*0.45-r*r))));\n  // Light orbits\n  float lt=u_time*0.8;\n  vec3 L=normalize(vec3(cos(lt),0.6,sin(lt)));\n  vec3 V=vec3(0,0,1); vec3 H=normalize(V+L);\n  float NdL=max(dot(N,L),0.0);\n  float NdH=max(dot(N,H),0.0);\n  float NdV=max(dot(N,V),0.0);\n  float HdV=max(dot(H,V),0.0);\n  vec3 albedo=hsv2rgb(vec3(u_hue,0.7,0.9));\n  vec3 F0=mix(vec3(0.04),albedo,u_metallic);\n  float D=DistGGX(NdH,u_roughness);\n  float G=GeomSmith(NdV,NdL,u_roughness);\n  vec3 F=FresnelSchlick(HdV,F0);\n  vec3 spec=(D*G*F)/(4.0*NdV*NdL+0.001);\n  vec3 kD=(1.0-F)*(1.0-u_metallic);\n  vec3 col=(kD*albedo/PI+spec)*NdL*vec3(1.0,0.95,0.9)*3.0;\n  col+=albedo*0.03; // ambient\n  col=pow(col,vec3(1.0/2.2)); // gamma\n  gl_FragColor=vec4(col,1.0);\n}",
  body: "<p>PBR isn\u2019t a technique \u2014 it\u2019s a contract: <em>materials obey physics</em>. Light hits a surface. Some bounces (specular). Some gets absorbed and re-emitted (diffuse). The ratio depends on the material, not on your carefully art-directed lighting setup. That\u2019s why PBR killed Phong \u2014 it looks correct under <em>any</em> light, not just the one you placed.</p>\n<div class=\"vocab\"><span class=\"vt\">\"Albedo\"</span> \u2014 The base color of a material with no lighting applied. Think of it as the color of the surface under perfectly uniform white light.</div>\n<div class=\"vocab\"><span class=\"vt\">\"Metallic\"</span> \u2014 A 0\u20131 value. Metals reflect light as colored specular (gold reflects gold light). Non-metals (dielectrics) reflect white specular and show their albedo as diffuse.</div>\n<div class=\"vocab\"><span class=\"vt\">\"Roughness\"</span> \u2014 How scattered the specular reflection is. 0 = perfect mirror. 1 = completely matte. This single value controls whether a surface looks like polished chrome or chalk.</div>\n<div class=\"step-card\"><span class=\"step-num\">THE BRDF</span>The Cook-Torrance BRDF has three parts: <strong>D</strong> (normal distribution \u2014 how aligned are the microfacets?), <strong>G</strong> (geometry \u2014 do microfacets shadow each other?), <strong>F</strong> (Fresnel \u2014 does the reflection increase at grazing angles?). These multiply together for the specular component.</div>\n<div class=\"step-card\"><span class=\"step-num\">ENERGY CONSERVATION</span>The total light leaving a surface can\u2019t exceed the light arriving. Whatever isn\u2019t reflected as specular becomes diffuse. This is why increasing metallic darkens the diffuse component \u2014 metals reflect almost everything as specular.</div>\n<div class=\"tip\">Drag the metallic slider to 1.0 and watch the diffuse color vanish \u2014 all the light becomes colored specular reflection. That\u2019s why gold looks gold: it\u2019s reflecting colored light, not scattering it.</div>\n<div class=\"artists\">Every modern engine uses PBR: Blender\u2019s Principled BSDF, Unity\u2019s Standard/HDRP shader, Unreal\u2019s default material, Godot\u2019s StandardMaterial3D. Substance Painter is built entirely around the PBR workflow.</div>\n<div class=\"spamton\">PHONG SHADING WAS A [Beautiful Lie]!! YOU\u2019D PAINT A [Hot Dog] TO LOOK SHINY AND PRAY NOBODY [Moved The Light]!! PBR ACTUALLY [Conserves Energy]!! Your materials used to [Fall Apart] under different lighting!! <strong>PBR materials tell the truth no matter where you put the light.</strong></div>\n<div class=\"challenge\">In the viz, set roughness to 0.05 and metallic to 1.0 \u2014 you\u2019ve got a chrome ball. Now set roughness to 0.95 and metallic to 0.0 \u2014 that\u2019s chalk. Every real material lives somewhere on this 2D grid.</div>"
},
// ─── L08: Procedural Albedo ──────────────────────────────────────────────────
{
  subtitle: "PBR MATERIALS \u2022 LESSON 08",
  title: "Procedural Albedo",
  viz: "proceduralAlbedo",
  code: "// Procedural Materials: Wood, Stone, Marble\n// Iq cosine palette: iquilezles.org/articles/palettes\nprecision highp float;\nuniform float u_time;\nuniform vec2 u_res;\nuniform float u_material; // 0=wood, 1=stone, 2=marble\n\nvec3 mod289(vec3 x){return x-floor(x/289.0)*289.0;}\nvec2 mod289(vec2 x){return x-floor(x/289.0)*289.0;}\nvec3 permute(vec3 x){return mod289(((x*34.0)+1.0)*x);}\nfloat snoise(vec2 v){\n  const vec4 C=vec4(0.211324865405187,0.366025403784439,-0.577350269189626,0.024390243902439);\n  vec2 i=floor(v+dot(v,C.yy)),x0=v-i+dot(i,C.xx);\n  vec2 i1=(x0.x>x0.y)?vec2(1,0):vec2(0,1);\n  vec4 x12=x0.xyxy+C.xxzz;x12.xy-=i1;i=mod289(i);\n  vec3 p=permute(permute(i.y+vec3(0,i1.y,1))+i.x+vec3(0,i1.x,1));\n  vec3 m=max(0.5-vec3(dot(x0,x0),dot(x12.xy,x12.xy),dot(x12.zw,x12.zw)),0.0);\n  m=m*m;m=m*m;\n  vec3 x2=2.0*fract(p*C.www)-1.0,h=abs(x2)-0.5,ox=floor(x2+0.5),a0=x2-ox;\n  m*=1.79284291400159-0.85373472095314*(a0*a0+h*h);\n  vec3 g;g.x=a0.x*x0.x+h.x*x0.y;g.yz=a0.yz*x12.xz+h.yz*x12.yw;\n  return 130.0*dot(m,g);\n}\nfloat fbm(vec2 p){float v=0.0,a=0.5;for(int i=0;i<5;i++){v+=a*snoise(p);p*=2.0;a*=0.5;}return v;}\nvec2 hash2(vec2 p){p=vec2(dot(p,vec2(127.1,311.7)),dot(p,vec2(269.5,183.3)));return fract(sin(p)*43758.5453);}\nfloat voronoi(vec2 x){vec2 n=floor(x),f=fract(x);float d=8.0;for(int j=-1;j<=1;j++)for(int i=-1;i<=1;i++){vec2 g=vec2(float(i),float(j));vec2 o=hash2(n+g);o=0.5+0.5*sin(u_time*0.3+6.2831*o);d=min(d,length(g+o-f));}return d;}\n\n// Iq cosine palette\nvec3 palette(float t, vec3 a, vec3 b, vec3 c, vec3 d){\n  return a+b*cos(6.28318*(c*t+d));\n}\n\nvec3 wood(vec2 uv){\n  float r = length(uv*vec2(1.0,0.3))*8.0;\n  float ring = sin(r + fbm(uv*4.0+u_time*0.05)*3.0);\n  float n = ring*0.5+0.5+fbm(uv*12.0)*0.15;\n  return palette(n, vec3(0.3,0.15,0.05), vec3(0.2,0.1,0.0),\n                 vec3(1.0,1.0,1.0), vec3(0.0,0.1,0.2));\n}\nvec3 stone(vec2 uv){\n  float v = voronoi(uv*5.0);\n  float n = v + fbm(uv*8.0)*0.3;\n  return palette(n, vec3(0.4,0.4,0.38), vec3(0.15,0.12,0.1),\n                 vec3(1.0,1.0,1.0), vec3(0.0,0.05,0.1));\n}\nvec3 marble(vec2 uv){\n  float n = sin(uv.x*6.0 + fbm(uv*4.0+u_time*0.08)*6.0);\n  n = n*0.5+0.5;\n  return palette(n, vec3(0.9,0.9,0.92), vec3(0.1,0.08,0.12),\n                 vec3(1.0,0.5,0.5), vec3(0.0,0.15,0.2));\n}\n\nvoid main(){\n  vec2 uv=gl_FragCoord.xy/u_res;\n  int mat=int(u_material);\n  vec3 col;\n  if(mat==0) col=wood(uv-0.5);\n  else if(mat==1) col=stone(uv);\n  else col=marble(uv);\n  gl_FragColor=vec4(col,1.0);\n}",
  body: "<p>You understand noise now, which means you can build material colors from pure math. Wood rings = sine wave + FBM perturbation. Marble veins = directional sine + FBM turbulence. Stone = Voronoi cells + noise variation. No photographs. No scanning. Just functions.</p>\n<div class=\"vocab\"><span class=\"vt\">\"Cosine Palette\"</span> \u2014 Inigo Quilez\u2019s technique: <code>a + b * cos(2\u03c0(c*t + d))</code> where a,b,c,d are vec3 color parameters. A single function that generates infinite color gradients.</div>\n<div class=\"vocab\"><span class=\"vt\">\"Turbulence\"</span> \u2014 Using noise to perturb the input of another function (like <code>sin(x + fbm(p))</code>). The turbulence amount controls how \"veiny\" or \"ringed\" the result looks.</div>\n<div class=\"vocab\"><span class=\"vt\">\"Procedural Material\"</span> \u2014 A material whose textures are computed by math functions instead of stored as image files. Resolution-independent, infinitely tileable, and parametrically controllable.</div>\n<div class=\"step-card\"><span class=\"step-num\">WOOD</span><code>ring = sin(length(uv) * freq + fbm(uv) * turbulence)</code>. The <code>length(uv)</code> creates concentric circles (tree rings). The FBM perturbation makes them wobbly and natural.</div>\n<div class=\"step-card\"><span class=\"step-num\">MARBLE</span><code>vein = sin(uv.x * freq + fbm(uv) * turbulence)</code>. Direction-dependent (uv.x gives horizontal veins). Increase turbulence for more chaotic veining. Map through a white-to-grey-to-dark palette.</div>\n<div class=\"step-card\"><span class=\"step-num\">STONE</span>Voronoi cells give the base tile pattern. Layer FBM on top for surface variation. Use F2\u2013F1 for mortar lines between stones. Color each cell differently using the cell\u2019s hash.</div>\n<div class=\"tip\">Switch materials in the viz: wood, stone, marble. Same noise functions, different recipes. Wood = sin(length) + FBM. Marble = sin(x) + FBM. Stone = Voronoi + FBM. Three materials from two building blocks.</div>\n<div class=\"artists\">Substance Designer is literally a visual programming tool for this. Blender\u2019s shader node editor can build all of these. Godot\u2019s VisualShader editor. Unreal\u2019s Material Editor.</div>\n<div class=\"spamton\">THREE DIFFERENT [Materials] AND THEY\u2019RE ALL JUST [NOISE + SIN + PALETTE]!! THE WOOD IS [Circles + Wiggles]!! THE MARBLE IS [Lines + Wiggles]!! THE STONE IS [Voronoi + Wiggles]!! <strong>You now know the recipe for every Substance Designer material that costs $30.</strong></div>\n<div class=\"challenge\">Create a fourth material: <em>lava</em>. Use domain-warped FBM for the flow, a hot-to-cold cosine palette (bright yellow core \u2192 dark red edges), and animate it with <code>u_time</code>.</div>"
},
// ─── L09: Normal Maps from Noise ─────────────────────────────────────────────
{
  subtitle: "PBR MATERIALS \u2022 LESSON 09",
  title: "Normal Maps from Noise",
  viz: "normalMapGen",
  code: "// Normal Map from Height Field \u2014 GLSL\nprecision highp float;\nuniform float u_time;\nuniform vec2 u_res;\nuniform vec2 u_mouse;\nuniform float u_strength; // 0.5\u20135.0\n\nvec3 mod289(vec3 x){return x-floor(x/289.0)*289.0;}\nvec2 mod289(vec2 x){return x-floor(x/289.0)*289.0;}\nvec3 permute(vec3 x){return mod289(((x*34.0)+1.0)*x);}\nfloat snoise(vec2 v){\n  const vec4 C=vec4(0.211324865405187,0.366025403784439,-0.577350269189626,0.024390243902439);\n  vec2 i=floor(v+dot(v,C.yy)),x0=v-i+dot(i,C.xx);\n  vec2 i1=(x0.x>x0.y)?vec2(1,0):vec2(0,1);\n  vec4 x12=x0.xyxy+C.xxzz;x12.xy-=i1;i=mod289(i);\n  vec3 p=permute(permute(i.y+vec3(0,i1.y,1))+i.x+vec3(0,i1.x,1));\n  vec3 m=max(0.5-vec3(dot(x0,x0),dot(x12.xy,x12.xy),dot(x12.zw,x12.zw)),0.0);\n  m=m*m;m=m*m;\n  vec3 x2=2.0*fract(p*C.www)-1.0,h=abs(x2)-0.5,ox=floor(x2+0.5),a0=x2-ox;\n  m*=1.79284291400159-0.85373472095314*(a0*a0+h*h);\n  vec3 g;g.x=a0.x*x0.x+h.x*x0.y;g.yz=a0.yz*x12.xz+h.yz*x12.yw;\n  return 130.0*dot(m,g);\n}\nfloat fbm(vec2 p){float v=0.0,a=0.5;for(int i=0;i<5;i++){v+=a*snoise(p);p*=2.0;a*=0.5;}return v;}\n\nfloat heightAt(vec2 uv){\n  return fbm(uv*4.0+u_time*0.1)*0.5+0.5;\n}\n\nvoid main(){\n  vec2 uv=gl_FragCoord.xy/u_res;\n  float eps=1.0/u_res.x;\n  // Central differences for normal\n  float hL=heightAt(uv-vec2(eps,0));\n  float hR=heightAt(uv+vec2(eps,0));\n  float hD=heightAt(uv-vec2(0,eps));\n  float hU=heightAt(uv+vec2(0,eps));\n  vec3 N=normalize(vec3((hL-hR)*u_strength,(hD-hU)*u_strength,1.0));\n  \n  if(uv.x<0.33){\n    // Height map\n    float h=heightAt(uv*3.0);\n    gl_FragColor=vec4(vec3(h),1.0);\n  } else if(uv.x<0.66){\n    // Normal map (packed)\n    vec2 uv2=(uv-vec2(0.33,0))*3.0;\n    float eps2=1.0/u_res.x;\n    float hL2=heightAt(uv2-vec2(eps2,0));\n    float hR2=heightAt(uv2+vec2(eps2,0));\n    float hD2=heightAt(uv2-vec2(0,eps2));\n    float hU2=heightAt(uv2+vec2(0,eps2));\n    vec3 N2=normalize(vec3((hL2-hR2)*u_strength,(hD2-hU2)*u_strength,1.0));\n    gl_FragColor=vec4(N2*0.5+0.5,1.0);\n  } else {\n    // Lit result\n    vec2 uv3=(uv-vec2(0.66,0))*3.0;\n    float eps3=1.0/u_res.x;\n    float hL3=heightAt(uv3-vec2(eps3,0));\n    float hR3=heightAt(uv3+vec2(eps3,0));\n    float hD3=heightAt(uv3-vec2(0,eps3));\n    float hU3=heightAt(uv3+vec2(0,eps3));\n    vec3 N3=normalize(vec3((hL3-hR3)*u_strength,(hD3-hU3)*u_strength,1.0));\n    // Light from mouse\n    vec3 L=normalize(vec3(u_mouse-0.5,0.5));\n    float diff=max(dot(N3,L),0.0);\n    vec3 col=vec3(0.48,1.0,0.7)*diff+vec3(0.03);\n    gl_FragColor=vec4(col,1.0);\n  }\n}",
  body: "<p>Normal maps are the biggest lie in game graphics: flat surfaces that <em>look</em> bumpy because the lighting is being redirected per-pixel. You don\u2019t paint them \u2014 you <em>derive</em> them from height data. If you have a noise-based height field, you can compute the normals mathematically.</p>\n<div class=\"vocab\"><span class=\"vt\">\"Normal Map\"</span> \u2014 An RGB texture where R,G,B encode the X,Y,Z components of a surface normal vector. That signature blue-purple color means \"pointing straight up\" (0.5, 0.5, 1.0 in packed form).</div>\n<div class=\"vocab\"><span class=\"vt\">\"Central Differences\"</span> \u2014 Sample the height at <code>uv \u00b1 epsilon</code> in both X and Y. The slope between samples gives you the partial derivatives, which give you the normal direction.</div>\n<div class=\"vocab\"><span class=\"vt\">\"Tangent Space\"</span> \u2014 The coordinate system local to a surface point. Normal maps are stored in tangent space so they work on any surface orientation, not just flat planes.</div>\n<div class=\"step-card\"><span class=\"step-num\">SAMPLE THE NEIGHBORS</span>For each pixel, sample the height field at four points: left, right, up, down (offset by a tiny epsilon). This gives you four height values around the current point.</div>\n<div class=\"step-card\"><span class=\"step-num\">COMPUTE THE SLOPE</span><code>dx = heightLeft - heightRight</code>, <code>dy = heightDown - heightUp</code>. These are the partial derivatives \u2014 they tell you how steep the surface is in each direction.</div>\n<div class=\"step-card\"><span class=\"step-num\">PACK THE NORMAL</span><code>normal = normalize(vec3(dx * strength, dy * strength, 1.0))</code>. Map from [-1,1] to [0,1] range by doing <code>n * 0.5 + 0.5</code>. Now R=X, G=Y, B=Z. Done.</div>\n<div class=\"tip\">Move your mouse across the right panel \u2014 you\u2019re dragging a light across bumps that don\u2019t exist. The strength slider controls how aggressively the normals lie about the surface geometry.</div>\n<div class=\"artists\">Substance Designer generates normal maps from height. Blender\u2019s <code>Bump</code> node does this in real time. Godot\u2019s <code>StandardMaterial3D.normal_texture</code>. Photoshop\u2019s 3D filter \"Generate Normal Map\".</div>\n<div class=\"spamton\">THE ENTIRE [Gaming Industry] IS BUILT ON THE [Lie] THAT SURFACES HAVE BUMPS!! THEY\u2019RE [Flat]!! THE NORMAL MAP JUST [Redirects Light] SO YOUR EYES [Believe]!! And you can MAKE them from [Any Noise Function]!! <strong>Four height samples, two subtractions, one normalize. That\u2019s it. That\u2019s the trick.</strong></div>\n<div class=\"challenge\">In Blender, create a Noise Texture \u2192 Bump node \u2192 Normal input of Principled BSDF. Render it. Now increase the Bump node\u2019s Strength to 2.0. You\u2019re doing exactly what this shader does, but visually.</div>"
},
// ─── L10: The Full Texture Suite ─────────────────────────────────────────────
{
  subtitle: "PBR MATERIALS \u2022 LESSON 10",
  title: "The Full Texture Suite",
  viz: "textureSuite",
  code: "// Full PBR Procedural Material \u2014 GLSL\nprecision highp float;\nuniform float u_time;\nuniform vec2 u_res;\nuniform vec2 u_mouse;\nuniform float u_showAlbedo;   // 0 or 1\nuniform float u_showNormal;   // 0 or 1\nuniform float u_showRough;    // 0 or 1\nuniform float u_showAO;       // 0 or 1\n\n#define PI 3.14159265\nvec3 mod289(vec3 x){return x-floor(x/289.0)*289.0;}\nvec2 mod289(vec2 x){return x-floor(x/289.0)*289.0;}\nvec3 permute(vec3 x){return mod289(((x*34.0)+1.0)*x);}\nfloat snoise(vec2 v){\n  const vec4 C=vec4(0.211324865405187,0.366025403784439,-0.577350269189626,0.024390243902439);\n  vec2 i=floor(v+dot(v,C.yy)),x0=v-i+dot(i,C.xx);\n  vec2 i1=(x0.x>x0.y)?vec2(1,0):vec2(0,1);\n  vec4 x12=x0.xyxy+C.xxzz;x12.xy-=i1;i=mod289(i);\n  vec3 p=permute(permute(i.y+vec3(0,i1.y,1))+i.x+vec3(0,i1.x,1));\n  vec3 m=max(0.5-vec3(dot(x0,x0),dot(x12.xy,x12.xy),dot(x12.zw,x12.zw)),0.0);\n  m=m*m;m=m*m;\n  vec3 x2=2.0*fract(p*C.www)-1.0,h=abs(x2)-0.5,ox=floor(x2+0.5),a0=x2-ox;\n  m*=1.79284291400159-0.85373472095314*(a0*a0+h*h);\n  vec3 g;g.x=a0.x*x0.x+h.x*x0.y;g.yz=a0.yz*x12.xz+h.yz*x12.yw;\n  return 130.0*dot(m,g);\n}\nfloat fbm(vec2 p){float v=0.0,a=0.5;for(int i=0;i<6;i++){v+=a*snoise(p);p*=2.0;a*=0.5;}return v;}\nvec2 hash2(vec2 p){p=vec2(dot(p,vec2(127.1,311.7)),dot(p,vec2(269.5,183.3)));return fract(sin(p)*43758.5453);}\nfloat voronoi(vec2 x){vec2 n=floor(x),f=fract(x);float d=8.0;for(int j=-1;j<=1;j++)for(int i=-1;i<=1;i++){vec2 g=vec2(float(i),float(j));vec2 o=hash2(n+g);d=min(d,length(g+o-f));}return d;}\n\n// Rock material from same noise seed\nvec3 rockAlbedo(vec2 uv){\n  float v=voronoi(uv*5.0);\n  float n=fbm(uv*8.0)*0.3+v*0.7;\n  return mix(vec3(0.25,0.22,0.2),vec3(0.5,0.48,0.42),n);\n}\nfloat rockHeight(vec2 uv){\n  return fbm(uv*4.0)*0.5+0.5+voronoi(uv*5.0)*0.2;\n}\nfloat rockRoughness(vec2 uv){\n  return 0.4+fbm(uv*12.0)*0.4;\n}\nfloat rockAO(vec2 uv){\n  float h=rockHeight(uv);\n  float hAvg=(rockHeight(uv+vec2(0.02,0))+rockHeight(uv-vec2(0.02,0))+\n             rockHeight(uv+vec2(0,0.02))+rockHeight(uv-vec2(0,0.02)))*0.25;\n  return clamp(0.5+(h-hAvg)*4.0,0.0,1.0);\n}\n\nvoid main(){\n  vec2 uv=gl_FragCoord.xy/u_res;\n  float eps=2.0/u_res.x;\n  // Compute all maps\n  vec3 albedo=u_showAlbedo>0.5?rockAlbedo(uv):vec3(0.5);\n  float h=rockHeight(uv);\n  float hL=rockHeight(uv-vec2(eps,0)),hR=rockHeight(uv+vec2(eps,0));\n  float hD=rockHeight(uv-vec2(0,eps)),hU=rockHeight(uv+vec2(0,eps));\n  vec3 N=u_showNormal>0.5?normalize(vec3((hL-hR)*3.0,(hD-hU)*3.0,1.0)):vec3(0,0,1);\n  float rough=u_showRough>0.5?rockRoughness(uv):0.5;\n  float ao=u_showAO>0.5?rockAO(uv):1.0;\n  // Simple PBR lighting\n  vec3 L=normalize(vec3(u_mouse-0.5,0.6));\n  vec3 V=vec3(0,0,1); vec3 H=normalize(V+L);\n  float NdL=max(dot(N,L),0.0);\n  float NdH=max(dot(N,H),0.0);\n  float spec=pow(NdH,mix(4.0,128.0,1.0-rough));\n  vec3 col=albedo*(NdL*0.8+0.2)*ao+vec3(1)*spec*0.3*(1.0-rough);\n  col=pow(col,vec3(1.0/2.2));\n  gl_FragColor=vec4(col,1.0);\n}",
  body: "<p>One texture isn\u2019t a material. A PBR material is a <em>suite</em> of maps \u2014 each controlling a different physical property, all derivable from the same noise. Here\u2019s every map in the pipeline: what it does, how to generate it, and what to watch out for.</p>\n<div class=\"vocab\"><span class=\"vt\">\"Texture Suite\"</span> \u2014 The complete set of maps that define a PBR material. At minimum: albedo + normal + roughness. Full production: add metallic, AO, height, emission, opacity, bump, curvature, SSS, detail normals, and anisotropy. Every engine\u2019s \u201cPrincipled\u201d shader has inputs for all of these.</div>\n<div class=\"vocab\"><span class=\"vt\">\"Texture Baking\"</span> \u2014 Rendering procedural math to fixed-resolution image files. Converts infinite-resolution noise into PNGs/EXRs that any engine can load. Resolution-independent math \u2192 resolution-dependent file \u2014 the tradeoff is portability.</div>\n<div class=\"vocab\"><span class=\"vt\">\"sRGB vs Linear\"</span> \u2014 Albedo and emission maps are stored in sRGB color space (gamma-corrected for human eyes). All other maps (normal, roughness, metallic, AO, height) are linear data \u2014 never gamma-correct them or your material will look wrong.</div>\n<h3>The Complete PBR Map Reference</h3>\n<div class=\"step-card\"><span class=\"step-num\">ALBEDO / BASE COLOR</span><strong>What:</strong> The color of the surface with no lighting. Pure color information, no shadows baked in.<br><strong>Format:</strong> RGB, sRGB color space.<br><strong>Generate:</strong> Noise mapped through a cosine palette (<code>palette(fbm(uv))</code>). Voronoi cells for stone, sin+FBM for wood/marble. See L08.<br><strong>Common mistakes:</strong> Baking lighting/shadows into albedo (don\u2019t!). Using pure black or pure white (physically impossible for real materials).</div>\n<div class=\"step-card\"><span class=\"step-num\">NORMAL MAP</span><strong>What:</strong> Surface direction encoded as RGB. Redirects light to fake geometric detail on flat surfaces.<br><strong>Format:</strong> RGB, linear. Blue channel dominates (pointing up). That blue-purple tint = (0.5, 0.5, 1.0).<br><strong>Generate:</strong> Central differences on any height field: <code>normalize(vec3(hL-hR, hD-hU, 1.0))</code> then pack to 0\u20131 range. See L09.<br><strong>Gotcha:</strong> OpenGL vs DirectX normals \u2014 the green channel is flipped between them. Blender/Godot use OpenGL convention. Unreal uses DirectX.</div>\n<div class=\"step-card\"><span class=\"step-num\">ROUGHNESS MAP</span><strong>What:</strong> How scattered the specular reflection is, per pixel. Controls micro-surface variation.<br><strong>Format:</strong> Grayscale, linear. 0 = mirror, 1 = chalk.<br><strong>Generate:</strong> High-frequency noise: <code>0.4 + fbm(uv * 12.0) * 0.4</code>. Scratches on metal = directional noise (stretch FBM along one axis). Fingerprints = radial noise. Worn edges = curvature-based (AO inverted).<br><strong>Key insight:</strong> Roughness variation is what makes materials feel <em>real</em>. A uniform roughness value looks CG; varied roughness looks lived-in.</div>\n<div class=\"step-card\"><span class=\"step-num\">METALLIC MAP</span><strong>What:</strong> Whether each pixel is metal (1.0) or dielectric (0.0). Almost always binary \u2014 very few in-between values.<br><strong>Format:</strong> Grayscale, linear. Usually 0 or 1, with thin transitions at edges (paint peeling off metal, rust).<br><strong>Generate:</strong> For pure materials, just a constant (0.0 for stone, 1.0 for gold). For mixed: <code>step(threshold, noise(uv))</code> for paint chips, or Voronoi F2\u2013F1 edges for rust patterns spreading along seams.</div>\n<div class=\"step-card\"><span class=\"step-num\">HEIGHT / DISPLACEMENT MAP</span><strong>What:</strong> The source map for everything else. A grayscale height field that represents surface elevation.<br><strong>Format:</strong> Grayscale, linear. 0.5 = flat, higher = raised, lower = depressed.<br><strong>Generate:</strong> <code>fbm(uv * scale)</code> is your workhorse. Layer Voronoi for cell patterns, add domain warping for organic feel. This map is the <em>seed</em> for normals, AO, and roughness.<br><strong>Usage:</strong> True displacement (moves geometry in render) vs bump/parallax (fakes it cheaply). Blender Displacement modifier. Godot uses it for parallax mapping.</div>\n<div class=\"step-card\"><span class=\"step-num\">AMBIENT OCCLUSION (AO)</span><strong>What:</strong> How much ambient light reaches each point. Darkens crevices, cracks, and cavities.<br><strong>Format:</strong> Grayscale, linear. 0 = fully occluded, 1 = fully exposed.<br><strong>Generate:</strong> Compare each pixel\u2019s height to the average height of its neighbors: <code>ao = 0.5 + (h - avgNeighborH) * strength</code>. Steep depth differences = dark AO. Flat areas = white. This is literally what the viz does \u2014 four height samples, one subtraction.<br><strong>Pro tip:</strong> AO is the single biggest visual improvement for the least effort. Even bad materials look decent with good AO.</div>\n<div class=\"step-card\"><span class=\"step-num\">EMISSION MAP</span><strong>What:</strong> Self-illumination. Pixels that glow regardless of lighting. Lava cracks, neon signs, LED screens, magical runes.<br><strong>Format:</strong> RGB, sRGB. Values above 1.0 create HDR bloom in engines that support it.<br><strong>Generate:</strong> Threshold your height or noise map: <code>emission = smoothstep(0.7, 0.8, fbm(uv)) * hotColor</code>. Domain-warped FBM with a hot cosine palette (yellow \u2192 orange \u2192 red \u2192 black) = instant lava. Voronoi edges + emission = circuit board traces.</div>\n<div class=\"step-card\"><span class=\"step-num\">OPACITY / ALPHA MAP</span><strong>What:</strong> Transparency per pixel. Used for leaves, fences, fabric edges, dissolve effects.<br><strong>Format:</strong> Grayscale (or alpha channel), linear. 0 = invisible, 1 = solid.<br><strong>Generate:</strong> <code>step(threshold, noise(uv))</code> for dissolve/burn effects (animate threshold over time). For foliage: shape mask combined with noise edge erosion. Noise-based opacity creates organic, natural-feeling edges.</div>\n<div class=\"step-card\"><span class=\"step-num\">BUMP MAP</span><strong>What:</strong> A grayscale map that fakes surface detail by perturbing normals at render time, without generating a full normal map. Simpler than a normal map but less accurate at steep angles.<br><strong>Format:</strong> Grayscale, linear. Lighter = raised, darker = depressed. Interpreted as height, then converted to normal perturbation by the renderer.<br><strong>Generate:</strong> Literally any noise function: <code>fbm(uv * scale)</code>. In Blender, plug noise directly into the Bump node\u2019s Height input. In Godot, set <code>heightmap_texture</code> on StandardMaterial3D.<br><strong>Bump vs Normal vs Displacement:</strong> Bump = cheapest, per-pixel normal trick, no actual geometry. Normal map = pre-computed bump with XY direction data, more accurate. Displacement = actually moves vertices, most expensive but produces real silhouette changes. Use bump for prototyping, normal maps for production, displacement for hero assets and close-ups.</div>\n<div class=\"step-card\"><span class=\"step-num\">SPECULAR MAP (non-metallic workflow)</span><strong>What:</strong> In the specular/glossiness workflow (alternative to metallic/roughness), this RGB map directly controls the specular reflectance color and intensity.<br><strong>Format:</strong> RGB, sRGB. Dielectrics are typically grey (~0.04 reflectance). Metals have colored specular matching their reflectance (gold = warm yellow, copper = pinkish).<br><strong>Generate:</strong> For the spec/gloss workflow: base it on the albedo map processed through a reflectance lookup. <code>spec = mix(vec3(0.04), albedoColor, metallic)</code>. Most modern engines use metallic/roughness instead, but Unreal supports both, and older assets often use spec/gloss.<br><strong>When to use:</strong> Legacy assets, photogrammetry workflows, or when you need per-pixel control over reflectance color that metallic/roughness can\u2019t express (e.g. gemstones, iridescent materials).</div>\n<div class=\"step-card\"><span class=\"step-num\">CURVATURE MAP</span><strong>What:</strong> Encodes the convexity/concavity of a surface. White = convex edges (ridges), black = concave areas (crevices), grey = flat. Used as a mask to drive other effects.<br><strong>Format:</strong> Grayscale, linear. 0.5 = flat, above = convex, below = concave.<br><strong>Generate:</strong> Laplacian of the height field: <code>curvature = 4*h(center) - h(left) - h(right) - h(up) - h(down)</code>. Or derive from the normal map by computing its divergence. Essentially the second derivative of height.<br><strong>Usage:</strong> Edge wear (convex = rougher, lighter paint), cavity dirt (concave = darker, grittier), procedural weathering. Multiply curvature with roughness to get worn-edge effects automatically. Substance Painter uses curvature generators extensively.</div>\n<div class=\"step-card\"><span class=\"step-num\">SUBSURFACE SCATTERING (SSS) MAP</span><strong>What:</strong> Controls how much light penetrates and scatters inside a material. Skin, wax, marble, leaves, jade \u2014 anything where light enters, bounces around internally, and exits at a different point.<br><strong>Format:</strong> RGB or grayscale + scatter color, linear. Higher values = more translucent. The scatter color tints the transmitted light (skin scatters red, leaves scatter green).<br><strong>Generate:</strong> Use thickness estimation: thin areas scatter more. <code>sss = 1.0 - ao</code> is a rough approximation (cavities are thick, exposed areas are thin). For organic materials, domain-warped FBM with low frequency gives natural-looking SSS variation.<br><strong>Engine support:</strong> Blender Principled BSDF \u2192 Subsurface Weight + Subsurface Radius. Godot StandardMaterial3D \u2192 Subsurf Scatter Enabled. Unreal has a dedicated SSS shading model.</div>\n<div class=\"step-card\"><span class=\"step-num\">DETAIL NORMAL / DETAIL MAP</span><strong>What:</strong> A secondary, tiling normal map layered on top of the primary one. Adds micro-surface detail (fabric weave, skin pores, brushed metal grain) without increasing the primary map\u2019s resolution.<br><strong>Format:</strong> Same as normal map (RGB, linear), but designed to tile seamlessly at a higher UV scale.<br><strong>Generate:</strong> High-frequency noise at a different scale: <code>detailNormal = normalFromHeight(fbm(uv * 40.0), smallStrength)</code>. Blend with the primary normal using <code>normalize(primary.xy + detail.xy, primary.z)</code>.<br><strong>Why it matters:</strong> A 1K normal map with a tiling 256px detail normal looks better than a 4K normal map alone. It\u2019s resolution multiplier for free. Unity HDRP and Unreal have dedicated detail map inputs.</div>\n<div class=\"step-card\"><span class=\"step-num\">ANISOTROPY MAP</span><strong>What:</strong> Controls directional variation in specular reflection. Brushed metal, hair, silk, vinyl records \u2014 anything where micro-scratches align in a direction.<br><strong>Format:</strong> Grayscale (anisotropy amount, 0\u20131) + optional direction map (RGB encoding a tangent vector or rotation angle).<br><strong>Generate:</strong> For brushed metal: <code>anisotropy = 0.8</code> (constant high), direction = surface tangent. For radial brushing (pots, pans): direction = <code>normalize(vec2(-uv.y, uv.x))</code> (perpendicular to radius). Add noise to the direction for imperfect, realistic brushing: <code>angle += fbm(uv * 20.0) * 0.2</code>.<br><strong>Engine support:</strong> Blender Principled BSDF has Anisotropic + Anisotropic Rotation inputs. Godot 4 StandardMaterial3D supports anisotropy. Unreal has it in the Clear Coat and Anisotropy shading models.</div>\n<div class=\"step-card\"><span class=\"step-num\">THE SHARED-SEED PIPELINE</span>Generate ONE height field from FBM + Voronoi. From it derive: albedo (palette lookup), normal (slope), roughness (high-freq noise), AO (local curvature), metallic (threshold), emission (hot threshold). Toggle each map in the viz to see its individual contribution.</div>\n<div class=\"tip\">Move your mouse to reposition the light. Toggle maps on/off to see each one\u2019s contribution. The jump from \u201cokay\u201d to \u201cphotorealistic\u201d is almost always: add AO + roughness variation.</div>\n<div class=\"artists\">Substance Painter/Designer (industry standard for PBR authoring). Blender\u2019s Principled BSDF has inputs for every map listed above. Quixel Mixer. ArmorPaint and MaterialMaker (both open source). Godot\u2019s StandardMaterial3D exposes all these slots in the inspector.</div>\n<div class=\"spamton\">FOURTEEN [Maps]!! ONE [Height Field]!! ALBEDO = [Colored Height]!! NORMAL = [Tilted Height]!! ROUGHNESS = [Noisy Height]!! AO = [How Deep Is The Height]!! FOURTEEN INTERPRETATIONS OF [The Same Function]!! <strong>You\u2019re not painting textures. You\u2019re running the same noise through fourteen different lenses. That\u2019s what Substance Designer is. That\u2019s what this entire PBR section was building toward.</strong></div>\n<div class=\"challenge\">Disable all maps except albedo, then add them back one by one: normal \u2192 roughness \u2192 AO. Screenshot each stage. Now you have a perfect visual explanation of the PBR pipeline for your portfolio or Blender tutorial.</div>"
},
// ─── L11: Building a Rock Material ──────────────────────────────────────────
{
  subtitle: "PBR MATERIALS \u2022 LESSON 11",
  title: "Building a Rock Material",
  viz: "buildRock",
  code: "// Rock Material \u2014 Substance Designer-style\n// Step-by-step procedural construction\nprecision highp float;\nuniform float u_time;\nuniform vec2 u_res;\nuniform vec2 u_mouse;\nuniform float u_step; // 0\u20135: build stages\n\nvec3 mod289_3(vec3 x){return x-floor(x/289.0)*289.0;}\nvec2 mod289_2(vec2 x){return x-floor(x/289.0)*289.0;}\nvec3 permute(vec3 x){return mod289_3(((x*34.0)+1.0)*x);}\nfloat snoise(vec2 v){\n  const vec4 C=vec4(.2113,.3660,-.5773,.0243);\n  vec2 i=floor(v+dot(v,C.yy)),x0=v-i+dot(i,C.xx);\n  vec2 i1=(x0.x>x0.y)?vec2(1,0):vec2(0,1);\n  vec4 x12=x0.xyxy+C.xxzz;x12.xy-=i1;i=mod289_2(i);\n  vec3 p=permute(permute(i.y+vec3(0,i1.y,1))+i.x+vec3(0,i1.x,1));\n  vec3 m=max(.5-vec3(dot(x0,x0),dot(x12.xy,x12.xy),dot(x12.zw,x12.zw)),0.0);\n  m=m*m;m=m*m;\n  vec3 x2=2.0*fract(p*C.www)-1.0,h=abs(x2)-.5,ox=floor(x2+.5),a0=x2-ox;\n  m*=1.792-.853*(a0*a0+h*h);\n  vec3 g;g.x=a0.x*x0.x+h.x*x0.y;g.yz=a0.yz*x12.xz+h.yz*x12.yw;\n  return 130.0*dot(m,g);\n}\nvec2 hash2(vec2 p){p=vec2(dot(p,vec2(127.1,311.7)),dot(p,vec2(269.5,183.3)));return fract(sin(p)*43758.5453);}\nfloat fbm(vec2 p){float v=0.,a=.5;for(int i=0;i<6;i++){v+=a*snoise(p);p*=2.;a*=.5;}return v;}\nfloat voronoi(vec2 x){vec2 n=floor(x),f=fract(x);float d=8.;for(int j=-1;j<=1;j++)for(int i=-1;i<=1;i++){vec2 g=vec2(float(i),float(j));vec2 o=hash2(n+g);d=min(d,length(g+o-f));}return d;}\nvec3 palette(float t,vec3 a,vec3 b,vec3 c,vec3 d){return a+b*cos(6.28318*(c*t+d));}\n\nvoid main(){\n  vec2 uv=gl_FragCoord.xy/u_res;\n  int step=int(u_step);\n  float e=1./u_res.x;\n  \n  // Stage 1: Large-form Voronoi structure\n  float largeForm=voronoi(uv*4.);\n  // Stage 2: Detail FBM\n  float detail=fbm(uv*8.+largeForm*0.5);\n  // Combined height\n  float h=largeForm*0.6+detail*0.4;\n  h=h*0.5+0.5;\n  \n  if(step==0){\n    // Just show the height field\n    gl_FragColor=vec4(vec3(h),1.); return;\n  }\n  \n  // Stage 3: Albedo from palette\n  vec3 albedo=palette(h*0.7+detail*0.3,\n    vec3(.32,.28,.24),vec3(.12,.1,.08),\n    vec3(1.,1.,1.),vec3(.0,.05,.1));\n  // Add color variation with second noise\n  albedo+=vec3(.04,.06,.02)*fbm(uv*16.);\n  \n  if(step==1){\n    gl_FragColor=vec4(albedo,1.); return;\n  }\n  \n  // Stage 4: Normal from height\n  float hL=voronoi((uv+vec2(-e,0))*4.)*0.6+fbm((uv+vec2(-e,0))*8.)*0.4;\n  float hR=voronoi((uv+vec2(e,0))*4.)*0.6+fbm((uv+vec2(e,0))*8.)*0.4;\n  float hD=voronoi((uv+vec2(0,-e))*4.)*0.6+fbm((uv+vec2(0,-e))*8.)*0.4;\n  float hU=voronoi((uv+vec2(0,e))*4.)*0.6+fbm((uv+vec2(0,e))*8.)*0.4;\n  vec3 N=normalize(vec3((hL-hR)*3.,(hD-hU)*3.,1.));\n  vec3 L=normalize(vec3(u_mouse-.5,.6));\n  float diff=max(dot(N,L),0.);\n  \n  if(step==2){\n    gl_FragColor=vec4(albedo*(diff*.8+.2),1.); return;\n  }\n  \n  // Stage 5: Roughness variation\n  float rough=.45+fbm(uv*20.)*.35+largeForm*.15;\n  float NdH=max(dot(N,normalize(vec3(0,0,1)+L)),0.);\n  float spec=pow(NdH,mix(8.,80.,1.-rough))*(1.-rough)*.5;\n  \n  if(step==3){\n    gl_FragColor=vec4(albedo*(diff*.7+.3)+vec3(spec),1.); return;\n  }\n  \n  // Stage 6: AO\n  float hAvg=(hL+hR+hD+hU)*0.25;\n  float ao=clamp(.5+(h-.5-hAvg)*6.,0.,1.);\n  vec3 col=albedo*(diff*.7+.3)*ao+vec3(spec)*ao;\n  \n  if(step==4){\n    gl_FragColor=vec4(pow(col,vec3(1./2.2)),1.); return;\n  }\n  \n  // Stage 7: Detail normal overlay + micro roughness\n  float detailN=snoise(uv*40.);\n  N=normalize(N+vec3(detailN*.08,detailN*.08,0.));\n  diff=max(dot(N,L),0.);\n  rough=rough-.1*abs(detailN);\n  spec=pow(max(dot(N,normalize(vec3(0,0,1)+L)),0.),mix(8.,120.,1.-rough))*(1.-rough)*.5;\n  col=albedo*(diff*.7+.3)*ao+vec3(spec)*ao;\n  col=pow(col,vec3(1./2.2));\n  gl_FragColor=vec4(col,1.);\n}",
  body: "<p>Theory\u2019s over. This is the actual build. Same workflow as Substance Designer, Material Maker, and Unreal\u2019s Material Editor: start with a height field, derive everything else from it, layer details until it looks real. The viz builds a rock material step by step \u2014 use the stage slider to watch each layer add to the result.</p>\n<div class=\"vocab\"><span class=\"vt\">\"Large-Form Structure\"</span> \u2014 The big shapes: cracks, chunks, facets. For rock, this is Voronoi (cell boundaries = cracks, cell interiors = rock faces). In Substance Designer, this is your first noise generator.</div>\n<div class=\"vocab\"><span class=\"vt\">\"Detail Layer\"</span> \u2014 High-frequency noise layered on top of the large form. Adds grain, pores, micro-surface variation. This is FBM at 2\u20134x the frequency of your base. The layer that makes a material feel tangible instead of CG.</div>\n<div class=\"vocab\"><span class=\"vt\">\"Material Graph\"</span> \u2014 The node-based workflow in Substance Designer / Material Maker / Unreal Material Editor. Each node is a function. Connections are data flow. What we\u2019re doing in this shader IS the graph, just written as code.</div>\n<div class=\"step-card\"><span class=\"step-num\">STAGE 0: HEIGHT FIELD</span>Voronoi at low frequency (4\u00d7) for large-form rock chunks + FBM at higher frequency (8\u00d7) for surface detail. Blend 60/40. This single grayscale map is the foundation \u2014 everything else derives from it. In Substance Designer this is your Cells + Noise generator chain.</div>\n<div class=\"step-card\"><span class=\"step-num\">STAGE 1: ALBEDO</span>Map height through a cosine palette (grey-brown gradient). Add a second FBM layer at even higher frequency for micro color variation \u2014 the subtle green/yellow shift that stops rock from looking like uniform grey. In Substance: Gradient Map node fed by your height.</div>\n<div class=\"step-card\"><span class=\"step-num\">STAGE 2: NORMALS + LIGHTIN
