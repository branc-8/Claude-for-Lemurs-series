G</span>Central differences on the height field, same technique as L09. The rock immediately gains depth and catches light. This is the single biggest visual jump \u2014 from \"colored flat image\" to \"this is a surface.\" In Substance: Normal node from height.</div>\n<div class=\"step-card\"><span class=\"step-num\">STAGE 3: ROUGHNESS + SPECULAR</span>Base roughness from high-frequency FBM (20\u00d7) + Voronoi large-form influence. Cracks are rougher, flat faces catch more specular. In Substance: Levels node adjusting a noise, piped to Roughness output.</div>\n<div class=\"step-card\"><span class=\"step-num\">STAGE 4: AMBIENT OCCLUSION</span>Local curvature from height neighbors. Cracks darken. Exposed faces brighten. The material suddenly feels physically grounded \u2014 light can\u2019t reach everywhere. In Substance: HBAO or AO from Mesh node.</div>\n<div class=\"step-card\"><span class=\"step-num\">STAGE 5: DETAIL OVERLAY</span>A very high-frequency simplex noise (40\u00d7) adds micro-normal perturbation and micro-roughness variation. This is the \"texture within the texture\" that sells close-up shots. In Substance: Detail Normal Blend node. In Unreal: Detail Texturing input.</div>\n<div class=\"tip\">Drag the stage slider from 0 to 5 and watch each layer build on the previous. This is EXACTLY the workflow in Substance Designer: height \u2192 color \u2192 normal \u2192 roughness \u2192 AO \u2192 detail. Six stages, one material. Move your mouse to relight.</div>\n<div class=\"artists\">Substance Designer (height \u2192 all maps pipeline). Material Maker (open source, same workflow). Unreal Material Editor (same graph logic, real-time preview). Blender shader nodes (same flow, different names). Quixel Mixer.</div>\n<div class=\"spamton\">SUBSTANCE DESIGNER CHARGES [$$$$] FOR A GUI THAT DOES [Exactly This]!! HEIGHT \u2192 COLOR \u2192 NORMAL \u2192 ROUGHNESS \u2192 AO \u2192 DETAIL!! SIX [Stages]!! ONE [Height Field]!! THE MATERIAL [Builds Itself] FROM THE SAME NOISE!! <strong>You just learned the $30/month workflow in one lesson. The nodes are just the functions. The wires are just the data flow. The graph IS the shader.</strong></div>\n<div class=\"challenge\">Modify the shader: change the Voronoi frequency from 4.0 to 8.0 (smaller rocks), change the palette to warm sandstone colors (vec3(.45,.35,.25)), and increase the roughness base from .45 to .7 for a matte desert rock. Three number changes, completely different material.</div>"
},
// ─── L12: Weathering & Material Blending ──────────────────────────────────
{
  subtitle: "PBR MATERIALS \u2022 LESSON 12",
  title: "Weathering & Blending",
  viz: "weatherBlend",
  code: "// Weathering + Material Blending \u2014 GLSL\n// Two materials + curvature-based edge wear + height blend\nprecision highp float;\nuniform float u_time;\nuniform vec2 u_res;\nuniform vec2 u_mouse;\nuniform float u_wear; // 0\u20131: edge wear amount\nuniform float u_blend; // 0\u20131: material blend\n\nvec3 mod289_3(vec3 x){return x-floor(x/289.0)*289.0;}\nvec2 mod289_2(vec2 x){return x-floor(x/289.0)*289.0;}\nvec3 permute(vec3 x){return mod289_3(((x*34.0)+1.0)*x);}\nfloat snoise(vec2 v){\n  const vec4 C=vec4(.2113,.3660,-.5773,.0243);\n  vec2 i=floor(v+dot(v,C.yy)),x0=v-i+dot(i,C.xx);\n  vec2 i1=(x0.x>x0.y)?vec2(1,0):vec2(0,1);\n  vec4 x12=x0.xyxy+C.xxzz;x12.xy-=i1;i=mod289_2(i);\n  vec3 p=permute(permute(i.y+vec3(0,i1.y,1))+i.x+vec3(0,i1.x,1));\n  vec3 m=max(.5-vec3(dot(x0,x0),dot(x12.xy,x12.xy),dot(x12.zw,x12.zw)),0.0);\n  m=m*m;m=m*m;\n  vec3 x2=2.0*fract(p*C.www)-1.0,h=abs(x2)-.5,ox=floor(x2+.5),a0=x2-ox;\n  m*=1.792-.853*(a0*a0+h*h);\n  vec3 g;g.x=a0.x*x0.x+h.x*x0.y;g.yz=a0.yz*x12.xz+h.yz*x12.yw;\n  return 130.0*dot(m,g);\n}\nvec2 hash2(vec2 p){p=vec2(dot(p,vec2(127.1,311.7)),dot(p,vec2(269.5,183.3)));return fract(sin(p)*43758.5453);}\nfloat fbm(vec2 p){float v=0.,a=.5;for(int i=0;i<5;i++){v+=a*snoise(p);p*=2.;a*=.5;}return v;}\nfloat voronoi(vec2 x){vec2 n=floor(x),f=fract(x);float d=8.;for(int j=-1;j<=1;j++)for(int i=-1;i<=1;i++){vec2 g=vec2(float(i),float(j));vec2 o=hash2(n+g);d=min(d,length(g+o-f));}return d;}\n\n// Material A: painted metal\nvec3 metalAlbedo=vec3(.15,.22,.35);\nfloat metalRough=.3;\nfloat metalMetallic=1.;\n\n// Material B: exposed rust\nvec3 rustAlbedo(vec2 uv){return mix(vec3(.35,.18,.08),vec3(.5,.25,.1),fbm(uv*12.)*.5+.5);}\nfloat rustRough=.85;\n\nvoid main(){\n  vec2 uv=gl_FragCoord.xy/u_res;\n  float e=2./u_res.x;\n  \n  // Height field\n  float h=voronoi(uv*5.)*.5+fbm(uv*6.)*.5;\n  float hL=voronoi((uv+vec2(-e,0))*5.)*.5+fbm((uv+vec2(-e,0))*6.)*.5;\n  float hR=voronoi((uv+vec2(e,0))*5.)*.5+fbm((uv+vec2(e,0))*6.)*.5;\n  float hD=voronoi((uv+vec2(0,-e))*5.)*.5+fbm((uv+vec2(0,-e))*6.)*.5;\n  float hU=voronoi((uv+vec2(0,e))*5.)*.5+fbm((uv+vec2(0,e))*6.)*.5;\n  \n  // Curvature (edge detection)\n  float curv=4.*h-(hL+hR+hD+hU);\n  float edgeMask=smoothstep(0.,.06,abs(curv))*u_wear;\n  // Add noise to edge mask for organic breakup\n  edgeMask+=fbm(uv*20.)*.2*u_wear;\n  edgeMask=clamp(edgeMask,0.,1.);\n  \n  // Height-based blend (material B in low areas)\n  float heightBlend=smoothstep(.3,.5,h)*u_blend;\n  \n  // Combine masks\n  float mask=clamp(edgeMask+(1.-heightBlend),0.,1.);\n  \n  // Blend materials\n  vec3 albedo=mix(metalAlbedo,rustAlbedo(uv),mask);\n  float rough=mix(metalRough,rustRough,mask);\n  float metallic=mix(metalMetallic,0.,mask);\n  \n  // Normal + lighting\n  vec3 N=normalize(vec3((hL-hR)*3.,(hD-hU)*3.,1.));\n  vec3 L=normalize(vec3(u_mouse-.5,.6));\n  float diff=max(dot(N,L),0.);\n  float ao=clamp(.5+(h-.25*(hL+hR+hD+hU))*5.,0.,1.);\n  vec3 V=vec3(0,0,1);vec3 H2=normalize(V+L);\n  float NdH=max(dot(N,H2),0.);\n  float spec=pow(NdH,mix(8.,120.,1.-rough))*(1.-rough)*mix(.5,.8,metallic);\n  vec3 F0=mix(vec3(.04),albedo,metallic);\n  vec3 col=(1.-metallic)*albedo/3.14159*(diff*.7+.3)*ao+F0*spec*ao;\n  col=pow(col,vec3(1./2.2));\n  gl_FragColor=vec4(col,1.);\n}",
  body: "<p>Pristine materials look fake. Real surfaces have history \u2014 paint chips at edges, rust pools in crevices, dirt settles in cavities. That\u2019s <em>weathering</em>, and it\u2019s the difference between student work and a shipped prop. The technique: use curvature and height maps as <em>masks</em> to blend between a clean material and a damaged one.</p>\n<div class=\"vocab\"><span class=\"vt\">\"Edge Wear Mask\"</span> \u2014 A mask derived from the curvature map. Convex edges (ridges, corners) get worn first \u2014 paint chips, metal exposed, color lightens. This is the single most common procedural weathering technique in every Substance Designer smart material.</div>\n<div class=\"vocab\"><span class=\"vt\">\"Height Blend\"</span> \u2014 Blending two materials using the height map as a mask. Higher areas get one material, lower areas get another. With a soft threshold, you get natural-looking material transitions \u2014 moss grows in crevices, snow accumulates on peaks, rust pools in low spots.</div>\n<div class=\"vocab\"><span class=\"vt\">\"Smart Material\"</span> \u2014 A pre-built material graph (in Substance Painter/Designer) that uses mesh-derived maps (curvature, AO, position) to automatically apply weathering. What you\u2019re building here IS a smart material \u2014 just written as math instead of nodes.</div>\n<div class=\"step-card\"><span class=\"step-num\">THE TWO-MATERIAL SETUP</span>Material A: painted metal (blue-grey, smooth, metallic=1). Material B: exposed rust (orange-brown, rough, metallic=0). In Substance Designer, these would be two separate material graphs. In Unreal, two Material Functions. Here, they\u2019re two sets of PBR values.</div>\n<div class=\"step-card\"><span class=\"step-num\">EDGE WEAR FROM CURVATURE</span>Compute curvature: <code>4*h(center) - h(left) - h(right) - h(up) - h(down)</code>. Where curvature is high (edges), reveal Material B (rust). Noise breaks up the mask so edges aren\u2019t uniformly worn \u2014 that\u2019s the key to organic-looking weathering. The <strong>wear slider</strong> controls intensity.</div>\n<div class=\"step-card\"><span class=\"step-num\">HEIGHT BLEND</span>Use the height field as a second mask: low areas get rust (water pools there), high areas stay painted. The <strong>blend slider</strong> controls how much height influences the blend. Combined with edge wear, you get: edges worn, crevices rusted, flat faces clean. That\u2019s a production-quality weathering setup.</div>\n<div class=\"step-card\"><span class=\"step-num\">THE FULL PIPELINE</span>For each pixel: compute mask from curvature + height + noise breakup \u2192 blend albedo A/B \u2192 blend roughness A/B \u2192 blend metallic A/B \u2192 compute normals \u2192 compute AO \u2192 light with PBR. Every property blends. That\u2019s the trick Substance Painter\u2019s layers are doing under the hood.</div>\n<div class=\"tip\">Drag the wear slider from 0 (pristine) to 1 (battle-scarred). Then drag the blend slider. The two controls interact \u2014 wear controls edge damage, blend controls gravity/pooling. Mouse relights. This is the two-slider workflow behind every \"aged metal\" material on ArtStation.</div>\n<div class=\"artists\">Substance Painter\u2019s smart materials (generators = curvature + AO + position masks). Quixel Mixer\u2019s surface painting. Unreal\u2019s Material Blend nodes + World Position masks. Material Maker\u2019s Weathering nodes. Blender\u2019s Geometry \u2192 Pointiness for edge wear.</div>\n<div class=\"spamton\">EVERY [ArtStation Portfolio] WITH A [Worn Sci-Fi Prop] IS DOING [Exactly This]!! CURVATURE FOR [Edge Chips]!! HEIGHT FOR [Rust Pooling]!! NOISE FOR [Breakup]!! TWO MATERIALS AND A [Mask] AND SUDDENLY YOUR PROP HAS [A Backstory]!! <strong>Weathering isn\u2019t painting damage. It\u2019s computing history. Curvature knows where the edges are. Height knows where the gravity is. The math does the art direction.</strong></div>\n<div class=\"challenge\">Swap the materials: make Material A a clean white ceramic, Material B a dark grime. Now the edge wear shows clean ceramic peeking through grime (like a well-used mug). Change the height blend direction (invert it) so grime accumulates in LOW areas. Same technique, completely different story.</div>"
},
// ─── L13: Shaders in Blender & Godot ─────────────────────────────────────────
{
  subtitle: "PBR MATERIALS \u2022 LESSON 13",
  title: "Shaders in Blender & Godot",
  viz: "shaderTranslation",
  code: "// GLSL \u2192 Blender \u2192 Godot Translation\n//\n// GLSL Fragment Shader:\nprecision highp float;\nuniform float u_time;\nuniform vec2 u_res;\n// (This viz is Canvas 2D \u2014 code is reference)\n\n// === BLENDER PYTHON ===\n// import bpy\n// mat = bpy.data.materials.new('ProceduralRock')\n// mat.use_nodes = True\n// nodes = mat.node_tree.nodes\n// links = mat.node_tree.links\n// bsdf = nodes['Principled BSDF']\n//\n// # Noise for height\n// noise = nodes.new('ShaderNodeTexNoise')\n// noise.inputs['Scale'].default_value = 8.0\n// noise.inputs['Detail'].default_value = 5.0\n// noise.inputs['Roughness'].default_value = 0.5\n//\n// # Color ramp for albedo\n// ramp = nodes.new('ShaderNodeValToRGB')\n// ramp.color_ramp.elements[0].color = (0.25,0.22,0.2,1)\n// ramp.color_ramp.elements[1].color = (0.5,0.48,0.42,1)\n// links.new(noise.outputs['Fac'], ramp.inputs['Fac'])\n// links.new(ramp.outputs['Color'], bsdf.inputs['Base Color'])\n//\n// # Bump from same noise\n// bump = nodes.new('ShaderNodeBump')\n// bump.inputs['Strength'].default_value = 0.5\n// links.new(noise.outputs['Fac'], bump.inputs['Height'])\n// links.new(bump.outputs['Normal'], bsdf.inputs['Normal'])\n\n// === GODOT SHADER (.gdshader) ===\n// shader_type spatial;\n// uniform float noise_scale : hint_range(1,20) = 8.0;\n// uniform float bump_strength : hint_range(0,2) = 0.5;\n//\n// float hash(vec2 p) {\n//   return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);\n// }\n// float noise(vec2 p) {\n//   vec2 i=floor(p), f=fract(p);\n//   vec2 u=f*f*(3.0-2.0*f);\n//   return mix(mix(hash(i),hash(i+vec2(1,0)),u.x),\n//              mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),u.x),u.y);\n// }\n// void fragment() {\n//   float n = noise(UV * noise_scale);\n//   ALBEDO = mix(vec3(0.25,0.22,0.2), vec3(0.5,0.48,0.42), n);\n//   ROUGHNESS = 0.4 + n * 0.4;\n//   NORMAL_MAP = ...; // same central differences\n// }",
  body: "<p>Everything you\u2019ve written in GLSL works in Blender and Godot. Not \u201csimilar\u201d \u2014 <em>directly</em>. Blender\u2019s shader nodes are a visual representation of the same math. Godot\u2019s shader language is literally GLSL with different variable names. The mental model is portable.</p>\n<div class=\"vocab\"><span class=\"vt\">\"Principled BSDF\"</span> \u2014 Blender\u2019s all-in-one PBR shader node. It has inputs for Base Color (albedo), Metallic, Roughness, Normal, and more. Every procedural texture you build feeds into this.</div>\n<div class=\"vocab\"><span class=\"vt\">\".gdshader\"</span> \u2014 Godot\u2019s shader file format. Uses GLSL 3.0 syntax with Godot-specific built-ins like <code>ALBEDO</code>, <code>ROUGHNESS</code>, <code>NORMAL_MAP</code>. If you can write a fragment shader, you can write a Godot shader.</div>\n<div class=\"vocab\"><span class=\"vt\">\"Shader Graph\"</span> \u2014 Visual node-based shader editors (Blender, Unity ShaderGraph, Unreal Material Editor). Each node = one function. Connections = data flow. Same logic as code, different representation.</div>\n<div class=\"step-card\"><span class=\"step-num\">GLSL \u2192 BLENDER</span><code>snoise(uv * 8.0)</code> = Noise Texture (Scale: 8.0). <code>mix(a, b, t)</code> = ColorRamp with two stops. <code>normalize(vec3(dx, dy, 1))</code> = Bump node. The node graph IS the shader, just drawn instead of typed.</div>\n<div class=\"step-card\"><span class=\"step-num\">GLSL \u2192 GODOT</span>Replace <code>gl_FragColor</code> with <code>ALBEDO</code>. Replace <code>u_time</code> with <code>TIME</code>. Replace <code>gl_FragCoord.xy/u_res</code> with <code>UV</code>. Your noise functions copy-paste verbatim. That\u2019s it.</div>\n<div class=\"tip\">The viz shows all three representations side by side: GLSL (mint), Blender Python (orange), Godot .gdshader (teal). Hover a column to highlight it. After a few seconds, dashed lines connect matching code between GLSL and Godot \u2014 it\u2019s the same algorithm three ways.</div>\n<div class=\"artists\">Blender shader nodes docs. Godot <code>VisualShader</code> editor for node-based, or .gdshader files for code. Unity ShaderGraph. Unreal Material Editor. The concepts are universal.</div>\n<div class=\"spamton\">YOU LEARNED [GLSL] AND NOW YOU SPEAK [Three Languages]!! BLENDER NODES ARE JUST [GLSL With Boxes]!! GODOT SHADERS ARE JUST [GLSL With A Mustache]!! <strong>The math is the same everywhere. Only the syntax changes. You are now dangerous in every engine.</strong></div>\n<div class=\"challenge\">Open Blender, create a new material, and recreate the rock shader from L08 using only nodes: Noise Texture \u2192 ColorRamp \u2192 Principled BSDF Base Color. Add a Bump node for normals. Compare with the GLSL version.</div>"
},
// ─── L14: What Procgen Is ────────────────────────────────────────────────────
{
  subtitle: "PROCGEN \u2022 LESSON 14",
  title: "What Procgen Is",
  viz: "procgenIntro",
  code: "// Seeded PRNG \u2014 Mulberry32\n// Deterministic pseudo-random from a single integer seed\nfunction mulberry32(seed) {\n  return function() {\n    seed |= 0; seed = seed + 0x6D2B79F5 | 0;\n    var t = Math.imul(seed ^ seed >>> 15, 1 | seed);\n    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;\n    return ((t ^ t >>> 14) >>> 0) / 4294967296;\n  };\n}\n\n// Usage:\n// const rng = mulberry32(42);\n// rng() => 0.6011037519201636\n// rng() => 0.8593937200494111\n// Same seed = same sequence EVERY TIME\n\n// Simple dungeon from seed:\nfunction generateDungeon(seed, w, h) {\n  const rng = mulberry32(seed);\n  const grid = Array(h).fill(null)\n    .map(() => Array(w).fill(1)); // 1=wall\n  // Place random rooms\n  for (let i = 0; i < 6; i++) {\n    const rw = 3 + Math.floor(rng() * 5);\n    const rh = 3 + Math.floor(rng() * 5);\n    const rx = 1 + Math.floor(rng() * (w - rw - 2));\n    const ry = 1 + Math.floor(rng() * (h - rh - 2));\n    for (let y = ry; y < ry+rh; y++)\n      for (let x = rx; x < rx+rw; x++)\n        grid[y][x] = 0; // 0=floor\n  }\n  return grid;\n}",
  body: "<p>Procgen isn\u2019t randomness. It\u2019s <em>deterministic</em> randomness \u2014 algorithms that build content from a seed instead of manual labor. Give the same seed to the same algorithm and you get the same world, every time. That\u2019s how Minecraft can share world seeds: the seed IS the world.</p>\n<div class=\"vocab\"><span class=\"vt\">\"Seed\"</span> \u2014 A single number (often a 32-bit integer) that initializes a pseudo-random number generator. Same seed = same sequence of \"random\" numbers = same generated content.</div>\n<div class=\"vocab\"><span class=\"vt\">\"PRNG\"</span> \u2014 Pseudo-Random Number Generator. Looks random but is completely deterministic. <code>mulberry32</code> is a fast, high-quality PRNG perfect for procgen.</div>\n<div class=\"vocab\"><span class=\"vt\">\"Space Partitioning\"</span> \u2014 Dividing a space into non-overlapping regions before placing content. Prevents rooms from overlapping, ensures corridors connect, guarantees full coverage.</div>\n<div class=\"step-card\"><span class=\"step-num\">THE THREE APPROACHES</span>Noise-based (terrain, biomes \u2014 what we learned in Part 1). Rule-based (BSP dungeons, WFC \u2014 coming next). Simulation-based (erosion, agent-based generation). Most real games combine all three.</div>\n<div class=\"step-card\"><span class=\"step-num\">THE SEED</span>Type a seed number in the viz and press RUN. Same seed = same dungeon. Different seed = different dungeon. This is the fundamental contract of procgen: determinism from a single integer.</div>\n<div class=\"tip\">Try seeds 42, 1337, and 0. Each produces a completely different dungeon layout. Now try 42 again \u2014 identical. This reproducibility is what lets you share seeds with friends or debug generated content.</div>\n<div class=\"artists\">Minecraft (world seeds), No Man\u2019s Sky (galaxy generation), Spelunky (level generation), Dwarf Fortress (literally everything), Diablo (dungeon layouts), Hades (room selection).</div>\n<div class=\"spamton\">THE ENTIRE [World of Minecraft] FITS IN ONE [Integer]!! 64 BITS!! INFINITE MOUNTAINS FROM A [Number Smaller Than Your Phone Number]!! The SEED is a [ZIP File] OF THE UNIVERSE!! <strong>Everything from here on is just clever math that unpacks a number into a world.</strong></div>\n<div class=\"challenge\">Type any number in the seed field and press Enter. Now add 1. Completely different dungeon from a number that\u2019s one integer apart. That\u2019s the butterfly effect of deterministic randomness \u2014 and why speedrunners obsess over seeds.</div>"
},
// ─── L15: Noise Terrain ──────────────────────────────────────────────────────
{
  subtitle: "PROCGEN \u2022 LESSON 15",
  title: "Noise Terrain",
  viz: "noiseTerrain",
  code: "// Noise Terrain \u2014 FBM heightmap to 3D mesh\n// Three.js PlaneGeometry with vertex displacement\n//\n// const geo = new THREE.PlaneGeometry(10, 10, 128, 128);\n// const pos = geo.attributes.position;\n// for (let i = 0; i < pos.count; i++) {\n//   const x = pos.getX(i), y = pos.getY(i);\n//   const h = fbm(x * scale, y * scale, octaves, persistence);\n//   pos.setZ(i, h * height);\n// }\n// geo.computeVertexNormals();\n//\n// Biome color by height:\nfunction biomeColor(h) {\n  if (h < 0.3) return [0.1, 0.3, 0.6]; // water\n  if (h < 0.35) return [0.76, 0.7, 0.5]; // sand\n  if (h < 0.6) return [0.2, 0.5, 0.15]; // grass\n  if (h < 0.75) return [0.4, 0.35, 0.3]; // rock\n  return [0.9, 0.9, 0.95]; // snow\n}\n\n// SimplexNoise library usage:\n// const simplex = new SimplexNoise();\n// function fbm(x, y, oct, pers) {\n//   let val=0, amp=1, freq=1, max=0;\n//   for (let i=0; i<oct; i++) {\n//     val += amp * simplex.noise2D(x*freq, y*freq);\n//     max += amp; freq *= 2; amp *= pers;\n//   }\n//   return (val/max) * 0.5 + 0.5;\n// }",
  body: "<p>Take FBM noise. Apply it as height to a grid of vertices. You have terrain. This is literally how every open-world game generates landscapes \u2014 from Minecraft to Horizon to Valheim. The noise IS the terrain.</p>\n<div class=\"vocab\"><span class=\"vt\">\"Heightmap\"</span> \u2014 A 2D grid where each cell stores a height value. When mapped to a 3D mesh, it creates terrain. Grayscale image = height data = mountains and valleys.</div>\n<div class=\"vocab\"><span class=\"vt\">\"Vertex Displacement\"</span> \u2014 Moving the vertices of a mesh based on noise values. The mesh starts flat; the noise pushes vertices up and down to create terrain.</div>\n<div class=\"vocab\"><span class=\"vt\">\"Biome Blending\"</span> \u2014 Coloring terrain based on height (and optionally a second noise for moisture). Below water level = blue. Low = sand. Mid = grass. High = rock. Peaks = snow.</div>\n<div class=\"step-card\"><span class=\"step-num\">BUILD THE MESH</span>Create a flat grid (PlaneGeometry in Three.js, or just a 2D array). For each vertex, compute <code>height = fbm(x * scale, y * scale)</code>. Set the vertex\u2019s Z coordinate to height. Done \u2014 you have terrain.</div>\n<div class=\"step-card\"><span class=\"step-num\">COLOR BY HEIGHT</span>Below 0.3 = water (blue). 0.3\u20130.35 = beach (tan). 0.35\u20130.6 = grassland (green). 0.6\u20130.75 = rock (brown). Above 0.75 = snow (white). Five lines of code, instant biomes.</div>\n<div class=\"tip\">Drag the sliders while the terrain rotates. Oct 1 = smooth rolling hills. Oct 6 = jagged crags. Scale zooms the noise field. Height exaggerates the peaks. You\u2019re sculpting a world with three numbers.</div>\n<div class=\"artists\">Godot <code>FastNoiseLite</code> + heightmap terrain plugin. Unity Terrain with noise-based sculpting. Unreal\u2019s World Partition with procedural generation. Blender\u2019s Displace modifier + noise texture.</div>\n<div class=\"spamton\">A [Flat Plane]!! PUSH VERTICES WITH [Noise]!! SUDDENLY IT\u2019S [Middle Earth]!! THE MOUNTAINS?? [FBM]!! THE VALLEYS?? [Low FBM]!! THE BIOMES?? FIVE [If Statements]!! <strong>Thirty lines of code generate a continent. Tolkien needed 1200 pages. Your GPU does it in 16 milliseconds.</strong></div>\n<div class=\"challenge\">Add a second noise layer for \"moisture\" (use a different seed/offset). Color based on BOTH height AND moisture: low+dry = desert, low+wet = swamp, high+dry = rocky peaks, high+wet = snowy forest. You just invented biome blending.</div>"
},
// ─── L16: BSP Rooms & Corridors ──────────────────────────────────────────────
{
  subtitle: "PROCGEN \u2022 LESSON 16",
  title: "BSP Rooms & Corridors",
  viz: "bspDungeon",
  code: "// BSP Dungeon Generator\nclass BSPNode {\n  constructor(x, y, w, h) {\n    this.x=x; this.y=y; this.w=w; this.h=h;\n    this.left=null; this.right=null;\n    this.room=null;\n  }\n  split(rng, minSize) {\n    if (this.w < minSize*2 && this.h < minSize*2) return false;\n    let horiz = rng() > 0.5;\n    if (this.w > this.h*1.25) horiz = false;\n    if (this.h > this.w*1.25) horiz = true;\n    const max = (horiz ? this.h : this.w) - minSize;\n    if (max <= minSize) return false;\n    const split = minSize + Math.floor(rng() * (max - minSize));\n    if (horiz) {\n      this.left = new BSPNode(this.x,this.y,this.w,split);\n      this.right = new BSPNode(this.x,this.y+split,this.w,this.h-split);\n    } else {\n      this.left = new BSPNode(this.x,this.y,split,this.h);\n      this.right = new BSPNode(this.x+split,this.y,this.w-split,this.h);\n    }\n    return true;\n  }\n  placeRoom(rng, pad) {\n    if (this.left) { this.left.placeRoom(rng,pad); this.right.placeRoom(rng,pad); return; }\n    const rw = pad*2 + Math.floor(rng()*(this.w-pad*3)) + 1;\n    const rh = pad*2 + Math.floor(rng()*(this.h-pad*3)) + 1;\n    const rx = this.x + Math.floor(rng()*(this.w-rw));\n    const ry = this.y + Math.floor(rng()*(this.h-rh));\n    this.room = {x:rx, y:ry, w:Math.max(3,rw), h:Math.max(3,rh)};\n  }\n  getRoom(rng) {\n    if (this.room) return this.room;\n    return (rng()>0.5 && this.left) ? this.left.getRoom(rng) : this.right.getRoom(rng);\n  }\n}\n// Connect sibling rooms with L-shaped corridors\nfunction connectRooms(node, grid, rng) {\n  if (!node.left) return;\n  connectRooms(node.left, grid, rng);\n  connectRooms(node.right, grid, rng);\n  const a = node.left.getRoom(rng);\n  const b = node.right.getRoom(rng);\n  let ax=a.x+Math.floor(a.w/2), ay=a.y+Math.floor(a.h/2);\n  let bx=b.x+Math.floor(b.w/2), by=b.y+Math.floor(b.h/2);\n  // L-shaped corridor\n  while(ax!==bx){grid[ay][ax]=0;ax+=ax<bx?1:-1;}\n  while(ay!==by){grid[ay][ax]=0;ay+=ay<by?1:-1;}\n}",
  body: "<p>Noise makes terrain. It does NOT make dungeons. Rooms need walls, corridors need connections, and players need a guaranteed path from A to B. Binary Space Partitioning (BSP) is the classic algorithm: recursively split the space in half, place a room in each leaf, then connect siblings with corridors. Clean, guaranteed-connected results every time.</p>\n<div class=\"vocab\"><span class=\"vt\">\"BSP (Binary Space Partitioning)\"</span> \u2014 Recursively dividing a space into two halves, alternating between horizontal and vertical splits. The result is a tree where each leaf can hold a room.</div>\n<div class=\"vocab\"><span class=\"vt\">\"Leaf Node\"</span> \u2014 A BSP node that wasn\u2019t split further (too small). This is where rooms go. Each leaf gets one room, sized randomly within its bounds.</div>\n<div class=\"vocab\"><span class=\"vt\">\"Corridor\"</span> \u2014 An L-shaped path connecting the centers of two sibling rooms. Because BSP is a tree, connecting all siblings guarantees the entire dungeon is reachable.</div>\n<div class=\"step-card\"><span class=\"step-num\">SPLIT</span>Start with the full grid. Pick horizontal or vertical (prefer splitting the longer axis). Choose a split point. Recurse on both halves until nodes are too small to split.</div>\n<div class=\"step-card\"><span class=\"step-num\">PLACE</span>At each leaf node, place a room with random size and position within the leaf\u2019s bounds. Padding ensures rooms don\u2019t touch the edges.</div>\n<div class=\"step-card\"><span class=\"step-num\">CONNECT</span>Walk up the BSP tree. For each internal node, get a room from the left child and a room from the right child, then carve an L-shaped corridor between their centers.</div>\n<div class=\"tip\">Press RUN to watch the algorithm build a dungeon step by step. First the space partitions (blue lines), then rooms appear (green), then corridors connect them (amber). Adjust speed to see each phase.</div>\n<div class=\"artists\">Spelunky (BSP variant). Enter the Gungeon, Binding of Isaac, Dead Cells (BSP + room templates). Diablo 1 (BSP classic). Hades (room graph selection). Dwarf Fortress (everything layered). The technique scales from jam game to AAA.</div>\n<div class=\"spamton\">SPLIT A [Rectangle]!! SPLIT THE [Halves]!! KEEP SPLITTING UNTIL THEY\u2019RE [Room Sized]!! SHOVE A ROOM IN EACH ONE!! CONNECT THE [Siblings]!! <strong>That\u2019s the entire algorithm. Five steps. Infinite dungeons. Your roguelike is waiting.</strong></div>\n<div class=\"challenge\">Modify the minimum room size in the viz parameters. Smaller minimum = more rooms, tighter corridors. Larger minimum = fewer rooms, more open. Find the sweet spot for your game\u2019s feel.</div>"
},
// ─── L17: Cellular Automata Caves ────────────────────────────────────────────
{
  subtitle: "PROCGEN \u2022 LESSON 17",
  title: "Cellular Automata Caves",
  viz: "cellularCave",
  code: "// Cellular Automata Cave Generator\n// The 4-5 rule: if a cell has >= 5 wall neighbors, it becomes wall\n\nfunction initGrid(w, h, fillPct, rng) {\n  const grid = [];\n  for (let y = 0; y < h; y++) {\n    grid[y] = [];\n    for (let x = 0; x < w; x++) {\n      // Border is always wall\n      if (x===0||y===0||x===w-1||y===h-1) grid[y][x] = 1;\n      else grid[y][x] = rng() < fillPct ? 1 : 0;\n    }\n  }\n  return grid;\n}\n\nfunction step(grid) {\n  const h = grid.length, w = grid[0].length;\n  const next = grid.map(r => [...r]);\n  for (let y = 1; y < h-1; y++)\n    for (let x = 1; x < w-1; x++) {\n      let walls = 0;\n      for (let dy=-1;dy<=1;dy++)\n        for (let dx=-1;dx<=1;dx++)\n          if (dx||dy) walls += grid[y+dy][x+dx];\n      // 4-5 rule: birth if >= 5, survive if >= 4\n      next[y][x] = (grid[y][x]===1) ? (walls>=4?1:0) : (walls>=5?1:0);\n    }\n  return next;\n}\n\n// Flood fill to find main cave\nfunction floodFill(grid, sx, sy) {\n  const h=grid.length, w=grid[0].length;\n  const visited = grid.map(r=>r.map(()=>false));\n  const stack = [[sx,sy]];\n  const cells = [];\n  while (stack.length) {\n    const [x,y] = stack.pop();\n    if (x<0||y<0||x>=w||y>=h||visited[y][x]||grid[y][x]===1) continue;\n    visited[y][x] = true;\n    cells.push([x,y]);\n    stack.push([x+1,y],[x-1,y],[x,y+1],[x,y-1]);\n  }\n  return cells;\n}",
  body: "<p>BSP makes good dungeons. Cellular automata makes good <em>caves</em> \u2014 organic, irregular, alive in a way that rectangular rooms never will be. The algorithm is embarrassingly simple: fill the grid randomly, then repeatedly apply a rule \u2014 if a cell has 5+ wall neighbors, it becomes wall; otherwise it becomes floor. After a few passes, caves emerge from chaos. Local rules, global structure.</p>\n<div class=\"vocab\"><span class=\"vt\">\"Cellular Automaton\"</span> \u2014 A grid where each cell\u2019s next state depends only on its neighbors\u2019 current state. Conway\u2019s Game of Life is the famous one. Cave generation uses a different rule set.</div>\n<div class=\"vocab\"><span class=\"vt\">\"The 4-5 Rule\"</span> \u2014 A wall stays wall if it has \u22654 wall neighbors. A floor becomes wall if it has \u22655 wall neighbors. This single rule produces organic-looking caves.</div>\n<div class=\"vocab\"><span class=\"vt\">\"Flood Fill\"</span> \u2014 Starting from one floor cell, mark all reachable floor cells. This finds the \"main cave.\" Any unreachable pockets can be filled in to prevent inaccessible areas.</div>\n<div class=\"step-card\"><span class=\"step-num\">RANDOM FILL</span>Fill the grid with ~45% walls, ~55% floor (random per cell). Borders are always wall. This looks like static noise \u2014 no structure yet.</div>\n<div class=\"step-card\"><span class=\"step-num\">SMOOTH PASSES</span>Apply the 4-5 rule to every cell simultaneously. After 1 pass: blobs form. After 3 passes: caves emerge. After 5+ passes: smooth, organic cave systems. Watch it happen in the viz.</div>\n<div class=\"step-card\"><span class=\"step-num\">CLEAN UP</span>Flood-fill from the largest open region. Any floor cells not reached are isolated pockets \u2014 fill them with wall. Now every floor cell is reachable from every other floor cell.</div>\n<div class=\"tip\">Use the step control in the viz to see each smoothing pass. The transformation from random noise to organic cave happens in about 4\u20135 steps. More passes = smoother walls but smaller caves.</div>\n<div class=\"artists\">Terraria uses CA for cave systems. Don\u2019t Starve generates biome shapes with CA. Dwarf Fortress layers CA caves under its fortress maps. The technique is also used for procedural island coastlines.</div>\n<div class=\"spamton\">CONWAY\u2019S [Game of Life] BUT IT MAKES [Caves]!! DUMP [Random Garbage] ON A GRID!! APPLY ONE [Stupid Simple Rule] FIVE TIMES!! CAVES [Materialize From Chaos]!! <strong>The universe runs on cellular automata. Your caves can too.</strong></div>\n<div class=\"challenge\">Change the fill percentage: try 40% vs 55% walls. Lower fill = more open caves with thin walls. Higher fill = tight tunnels with thick walls. Find the density that fits your game\u2019s exploration feel.</div>"
},
// ─── L18: Blender Geometry Nodes ─────────────────────────────────────────────
{
  subtitle: "PROCGEN \u2022 LESSON 18",
  title: "Blender Geometry Nodes",
  viz: "blenderNodes",
  code: "// Blender Geometry Nodes \u2014 Python (bpy)\n// Creates a procedural terrain with scatter\n\nimport bpy\nfrom bpy import context as C, data as D\n\n# Create Geometry Nodes modifier\nobj = C.active_object\nmod = obj.modifiers.new('ProceduralTerrain', 'NODES')\ngroup = bpy.data.node_groups.new('TerrainGen', 'GeometryNodeTree')\nmod.node_group = group\nnodes = group.nodes\nlinks = group.links\n\n# Input/Output\ninp = nodes.new('NodeGroupInput')\nout = nodes.new('NodeGroupOutput')\n\n# 1. Noise Texture for height\nnoise = nodes.new('GeometryNodeNoiseTexture')\nnoise.inputs['Scale'].default_value = 3.0\nnoise.inputs['Detail'].default_value = 6.0\n\n# 2. Set Position (displace Z by noise)\nsetpos = nodes.new('GeometryNodeSetPosition')\n# Map noise [0,1] to height offset\nmath_sub = nodes.new('ShaderNodeMath')\nmath_sub.operation = 'SUBTRACT'\nmath_sub.inputs[1].default_value = 0.5\nmath_mul = nodes.new('ShaderNodeMath')\nmath_mul.operation = 'MULTIPLY'\nmath_mul.inputs[1].default_value = 4.0\n# Combine XYZ for offset\ncombine = nodes.new('ShaderNodeCombineXYZ')\n# noise -> subtract -> multiply -> combine.Z\nlinks.new(noise.outputs['Fac'], math_sub.inputs[0])\nlinks.new(math_sub.outputs[0], math_mul.inputs[0])\nlinks.new(math_mul.outputs[0], combine.inputs['Z'])\nlinks.new(combine.outputs[0], setpos.inputs['Offset'])\n\n# 3. Distribute Points on Faces (scatter)\nscatter = nodes.new('GeometryNodeDistributePointsOnFaces')\nscatter.distribute_method = 'POISSON'\nscatter.inputs['Distance Min'].default_value = 0.3\n\n# 4. Instance on Points (place trees/rocks)\ninstance = nodes.new('GeometryNodeInstanceOnPoints')\ncollection = nodes.new('GeometryNodeCollectionInfo')\n\n# Wire it up\nlinks.new(inp.outputs[0], setpos.inputs['Geometry'])\nlinks.new(setpos.outputs[0], scatter.inputs['Mesh'])\nlinks.new(scatter.outputs['Points'], instance.inputs['Points'])\n\n# 5. Join Geometry (terrain + instances)\njoin = nodes.new('GeometryNodeJoinGeometry')\nlinks.new(setpos.outputs[0], join.inputs['Geometry'])\nlinks.new(instance.outputs[0], join.inputs['Geometry'])\nlinks.new(join.outputs[0], out.inputs[0])",
  body: "<p>Geometry Nodes is procgen as a visual language. Instead of typing code, you wire nodes: noise generates height, height displaces a mesh, points scatter on the surface, objects instance at those points. It\u2019s the same pipeline you\u2019d write in code, but drawable.</p>\n<div class=\"vocab\"><span class=\"vt\">\"Geometry Nodes\"</span> \u2014 Blender\u2019s node-based system for procedural geometry creation and modification. Think of it as a visual scripting language specifically for 3D content generation.</div>\n<div class=\"vocab\"><span class=\"vt\">\"Distribute Points on Faces\"</span> \u2014 Scatters points across a mesh surface. Poisson disk distribution ensures even spacing. This is how you place trees, rocks, grass \u2014 anything instanced on terrain.</div>\n<div class=\"vocab\"><span class=\"vt\">\"Instance on Points\"</span> \u2014 Places copies of an object (or random picks from a collection) at each scattered point. Combines with rotation/scale randomization for natural-looking placement.</div>\n<div class=\"step-card\"><span class=\"step-num\">THE PIPELINE</span>Noise Texture \u2192 Set Position (displaces Z) \u2192 Distribute Points \u2192 Instance on Points \u2192 Join Geometry. Five nodes. The result is a terrain with scattered objects. The viz animates each node being added.</div>\n<div class=\"step-card\"><span class=\"step-num\">THE PYTHON</span>Everything in the viz can be created with a Python script (<code>bpy</code>). The code panel shows the exact script. You can paste it into Blender\u2019s scripting tab and it builds the node graph for you.</div>\n<div class=\"tip\">Click any node in the viz to see what it does and how it maps to the GLSL you already know. Noise Texture = <code>snoise()</code>. Set Position = vertex displacement. Distribute Points = Poisson scatter. The graph IS the shader, drawn instead of typed.</div>\n<div class=\"artists\">Blender Geometry Nodes documentation. Erindale on YouTube (procedural master). Default Cube, Ducky 3D. Houdini for the industry-standard equivalent. Godot\u2019s planned visual scripting for 3D.</div>\n<div class=\"spamton\">DRAG [Boxes]!! CONNECT [Wires]!! A [Forest] APPEARS!! NO CODE!! NO [Manual Placement]!! NOISE \u2192 [Terrain]!! POISSON \u2192 [Scatter]!! INSTANCES \u2192 [Trees]!! FIVE NODES AND YOU HAVE AN [Environment]!! <strong>Geometry Nodes turned Blender into Houdini. Except it\u2019s free. And it runs on your laptop.</strong></div>\n<div class=\"challenge\">Open Blender, add a Grid mesh (200\u00d7200 subdivisions), add a Geometry Nodes modifier, and recreate the five-node pipeline from the viz. Use a cube as your instanced object. Scale the cube randomly. You just made a procedural blockout environment.</div>"
},
// ─── L19: Godot Procgen Dungeons ─────────────────────────────────────────────
{
  subtitle: "PROCGEN \u2022 LESSON 19",
  title: "Godot: Procgen Dungeons",
  viz: "godotDungeon",
  code: "# Godot GDScript \u2014 BSP Dungeon Generator\n# Attach to a Node2D scene root\nextends Node2D\n\n@tool # Regenerates in-editor\n\n@export var grid_width := 48\n@export var grid_height := 36\n@export var min_room := 5\n@export var tile_size := 16\n@export var seed_val := 42\n\nvar tilemap: TileMap\nvar grid := []\nvar rng := RandomNumberGenerator.new()\n\nclass BSPNode:\n  var rect: Rect2i\n  var left: BSPNode\n  var right: BSPNode\n  var room: Rect2i\n\n  func _init(r: Rect2i):\n    rect = r\n\n  func split(rng_ref: RandomNumberGenerator, min_s: int) -> bool:\n    if rect.size.x < min_s*2 and rect.size.y < min_s*2:\n      return false\n    var horiz = rng_ref.randf() > 0.5\n    if rect.size.x > rect.size.y * 1.25: horiz = false\n    if rect.size.y > rect.size.x * 1.25: horiz = true\n    var max_split = (rect.size.y if horiz else rect.size.x) - min_s\n    if max_split <= min_s: return false\n    var s = min_s + rng_ref.randi_range(0, max_split - min_s)\n    if horiz:\n      left = BSPNode.new(Rect2i(rect.position, Vector2i(rect.size.x, s)))\n      right = BSPNode.new(Rect2i(rect.position + Vector2i(0,s), Vector2i(rect.size.x, rect.size.y-s)))\n    else:\n      left = BSPNode.new(Rect2i(rect.position, Vector2i(s, rect.size.y)))\n      right = BSPNode.new(Rect2i(rect.position + Vector2i(s,0), Vector2i(rect.size.x-s, rect.size.y)))\n    return true\n\nfunc _ready():\n  rng.seed = seed_val\n  generate()\n\nfunc generate():\n  grid = []\n  for y in grid_height:\n    grid.append([])\n    for x in grid_width:\n      grid[y].append(1) # wall\n  var root = BSPNode.new(Rect2i(0,0,grid_width,grid_height))\n  split_recursive(root, 4)\n  place_rooms(root)\n  connect_rooms(root)\n  apply_to_tilemap()\n\nfunc split_recursive(node, depth):\n  if depth <= 0: return\n  if node.split(rng, min_room):\n    split_recursive(node.left, depth-1)\n    split_recursive(node.right, depth-1)",
  body: "<p>Real game engine time. Godot gives you <code>FastNoiseLite</code> for noise, <code>TileMap</code> for grid rendering, and GDScript that\u2019s close enough to Python that L14\u2019s BSP copies almost line-for-line. The viz below is a playable dungeon \u2014 WASD to move, fog of war reveals as you explore.</p>\n<div class=\"vocab\"><span class=\"vt\">\"FastNoiseLite\"</span> \u2014 Godot\u2019s built-in noise generator. Supports Perlin, Simplex, Cellular (Voronoi), and Value noise with FBM. Set it up in the inspector, no code needed.</div>\n<div class=\"vocab\"><span class=\"vt\">\"TileMap\"</span> \u2014 Godot\u2019s grid-based rendering system. <code>set_cell(layer, coords, source_id, atlas_coords)</code> places tiles. Perfect for dungeon floors, walls, and decorations.</div>\n<div class=\"vocab\"><span class=\"vt\">\"@tool\"</span> \u2014 A GDScript annotation that makes the script run in the editor. Add <code>@tool</code> to your dungeon generator and watch it regenerate live as you tweak parameters. Essential for iteration.</div>\n<div class=\"step-card\"><span class=\"step-num\">THE BSP IN GODOT</span>The same BSP algorithm from L14, translated to GDScript. <code>Rect2i</code> replaces our JS objects. <code>RandomNumberGenerator</code> gives us seeded RNG. The logic is identical \u2014 split, place rooms, connect corridors.</div>\n<div class=\"step-card\"><span class=\"step-num\">THE TILEMAP</span>After generating the grid array, loop through it and call <code>tilemap.set_cell()</code> for each floor and wall tile. Godot handles the rendering. Add a <code>NavigationRegion2D</code> for pathfinding.</div>\n<div class=\"step-card\"><span class=\"step-num\">THE FOG OF WAR</span>Keep a \"visited\" grid. The player reveals cells in a radius around their position. Unvisited cells render as black. Simple, effective, and it makes exploration feel rewarding.</div>\n<div class=\"tip\">Use WASD or arrow keys (or tap/click) to explore the dungeon in the viz. Press RUN to generate a new dungeon. The fog of war reveals rooms as you enter them \u2014 each playthrough feels like discovery.</div>\n<div class=\"artists\">Godot docs: <code>class_fastnoiselite</code>, <code>tutorials/math/noise.html</code>. Heartbeast\u2019s Godot dungeon tutorial. GDQuest procedural generation guides. KidsCanCode tilemap tutorials.</div>\n<div class=\"spamton\">YOU TOOK THE [Algorithm From Lesson 16] AND PUT IT IN A [Real Game Engine] AND NOW IT\u2019S A [Playable Dungeon]!! WITH [Fog of War]!! THE CODE IS BASICALLY [The Same]!! <strong>That\u2019s the whole point: learn the algorithm once, implement it everywhere.</strong></div>\n<div class=\"challenge\">Add items to the dungeon: place a treasure chest (colored square) in each room\u2019s center. Add a counter for collected items. When all items are collected, generate a new dungeon with a different seed. Congratulations, you have a game loop.</div>"
},

// ─── L20: Godot 3D Procedural Terrain ─────────────────────────────────────────
{
  subtitle: "PROCGEN \u2022 LESSON 20",
  title: "Godot: 3D Procedural Terrain",
  viz: "godot3D",
  code: "# Godot GDScript \u2014 3D Procedural Terrain\n# Attach to a Node3D scene root\nextends Node3D\n\n@tool\n@export var terrain_size := 64\n@export var cell_size := 0.5\n@export var height_scale := 8.0\n@export var noise_scale := 0.05\n@export var octaves := 5\n@export var seed_val := 42\n\nvar noise := FastNoiseLite.new()\nvar mesh_instance: MeshInstance3D\n\nfunc _ready():\n  noise.seed = seed_val\n  noise.noise_type = FastNoiseLite.TYPE_SIMPLEX_SMOOTH\n  noise.fractal_octaves = octaves\n  noise.frequency = noise_scale\n  generate_terrain()\n\nfunc generate_terrain():\n  var st = SurfaceTool.new()\n  st.begin(Mesh.PRIMITIVE_TRIANGLES)\n  \n  for z in range(terrain_size):\n    for x in range(terrain_size):\n      # Four corners of this cell\n      var h00 = get_height(x, z)\n      var h10 = get_height(x+1, z)\n      var h01 = get_height(x, z+1)\n      var h11 = get_height(x+1, z+1)\n      \n      var v00 = Vector3(x*cell_size, h00, z*cell_size)\n      var v10 = Vector3((x+1)*cell_size, h10, z*cell_size)\n      var v01 = Vector3(x*cell_size, h01, (z+1)*cell_size)\n      var v11 = Vector3((x+1)*cell_size, h11, (z+1)*cell_size)\n      \n      # Color by height (biome)\n      add_vertex_colored(st, v00, h00)\n      add_vertex_colored(st, v10, h10)\n      add_vertex_colored(st, v11, h11)\n      add_vertex_colored(st, v00, h00)\n      add_vertex_colored(st, v11, h11)\n      add_vertex_colored(st, v01, h01)\n  \n  st.generate_normals()\n  var mesh = st.commit()\n  \n  if mesh_instance:\n    mesh_instance.mesh = mesh\n  else:\n    mesh_instance = MeshInstance3D.new()\n    mesh_instance.mesh = mesh\n    add_child(mesh_instance)\n  \n  # Apply PBR material\n  var mat = StandardMaterial3D.new()\n  mat.vertex_color_use_as_albedo = true\n  mat.roughness = 0.85\n  mesh_instance.material_override = mat\n\nfunc get_height(x: int, z: int) -> float:\n  return noise.get_noise_2d(x, z) * height_scale\n\nfunc add_vertex_colored(st: SurfaceTool, v: Vector3, h: float):\n  var norm_h = (h / height_scale) * 0.5 + 0.5\n  var col: Color\n  if norm_h < 0.35:\n    col = Color(0.1, 0.25, 0.5)  # water\n  elif norm_h < 0.4:\n    col = Color(0.76, 0.7, 0.5)  # sand\n  elif norm_h < 0.6:\n    col = Color(0.2, 0.45, 0.15) # grass\n  elif norm_h < 0.75:\n    col = Color(0.4, 0.35, 0.28) # rock\n  else:\n    col = Color(0.9, 0.9, 0.95)  # snow\n  st.set_color(col)\n  st.add_vertex(v)\n\n# --- Scatter objects with MultiMeshInstance3D ---\n# var scatter = MultiMeshInstance3D.new()\n# var mm = MultiMesh.new()\n# mm.mesh = preload(\"res://tree.tres\")\n# mm.instance_count = 500\n# for i in mm.instance_count:\n#   var pos = Vector3(rng.randf()*32, 0, rng.randf()*32)\n#   pos.y = get_height(int(pos.x/cell_size), int(pos.z/cell_size))\n#   var xf = Transform3D.IDENTITY.translated(pos)\n#   xf = xf.rotated(Vector3.UP, rng.randf()*TAU)\n#   mm.set_instance_transform(i, xf)\n# scatter.multimesh = mm\n# add_child(scatter)",
  body: "<p>L19 built a 2D dungeon. Now we go up a dimension. Godot\u2019s 3D pipeline gives you <code>SurfaceTool</code> for building meshes from code, <code>FastNoiseLite</code> for the heightmap, <code>StandardMaterial3D</code> for PBR, and <code>MultiMeshInstance3D</code> for scattering thousands of objects without killing the GPU. The same noise math, but now it makes mountains you can walk on.</p>\n<div class=\"vocab\"><span class=\"vt\">\"SurfaceTool\"</span> \u2014 Godot\u2019s mesh construction API. You call <code>begin()</code>, add vertices one by one with colors/normals/UVs, then <code>commit()</code> to get a Mesh. It\u2019s the 3D equivalent of drawing to a Canvas: direct, vertex-by-vertex control.</div>\n<div class=\"vocab\"><span class=\"vt\">\"MultiMeshInstance3D\"</span> \u2014 Renders thousands of copies of the same mesh in one draw call. Each instance gets its own Transform (position, rotation, scale). Trees, rocks, grass \u2014 anything you want to scatter uses this.</div>\n<div class=\"vocab\"><span class=\"vt\">\"StandardMaterial3D\"</span> \u2014 Godot\u2019s PBR material. Every property from L10 maps directly to an inspector slot: <code>albedo_color</code>, <code>roughness</code>, <code>metallic</code>, <code>normal_texture</code>, <code>ao_texture</code>, <code>emission</code>. If you can name the map, Godot has a field for it.</div>\n<div class=\"step-card\"><span class=\"step-num\">BUILD THE MESH</span>Loop over a grid. For each cell, sample <code>FastNoiseLite.get_noise_2d(x, z)</code> at four corners. Create two triangles (a quad). Set vertex color by height for instant biomes. Call <code>st.generate_normals()</code> at the end \u2014 Godot computes them from your triangle faces. Commit to mesh.</div>\n<div class=\"step-card\"><span class=\"step-num\">APPLY PBR</span>Create a <code>StandardMaterial3D</code>. Set <code>vertex_color_use_as_albedo = true</code> to use your per-vertex biome colors as the albedo. Set roughness high (~0.85) for a natural terrain look. For more detail: generate a noise texture in code and assign it to the <code>normal_texture</code> slot.</div>\n<div class=\"step-card\"><span class=\"step-num\">SCATTER OBJECTS</span><code>MultiMeshInstance3D</code> with a <code>MultiMesh</code>: set the mesh (a tree, rock, whatever), set <code>instance_count</code>, then loop through and assign each instance a Transform. Sample the terrain height at each position so objects sit on the ground. Randomize rotation with <code>randf() * TAU</code>.</div>\n<div class=\"step-card\"><span class=\"step-num\">NOISE-BASED SHADERS</span>Godot\u2019s <code>.gdshader</code> language is GLSL with different names. Assign a <code>ShaderMaterial</code> to your terrain, paste your noise functions from L01\u2013L06, and compute PBR maps in the fragment shader. <code>ALBEDO</code> = albedo, <code>ROUGHNESS</code> = roughness, <code>NORMAL_MAP</code> = normal. The procedural PBR pipeline from L10 runs natively in Godot.</div>\n<div class=\"tip\">The viz is a Three.js preview of what the GDScript produces: FBM terrain with biome colors, a water plane, and scattered trees. The code panel is the complete GDScript \u2014 paste into a Godot 4 Node3D, hit Play, and you\u2019ll have this scene running in under a minute.</div>\n<div class=\"artists\">Godot docs: <code>SurfaceTool</code>, <code>MultiMeshInstance3D</code>, <code>FastNoiseLite</code>. Gonkee (YouTube \u2014 Godot shader tutorials). Game Endeavor (procgen series). StayAtHomeDev (terrain generation). Tokisan Games (open-world Godot techniques).</div>\n<div class=\"spamton\">YOU WENT FROM [2D Grid] TO [3D Mountains] AND ALL YOU CHANGED WAS [One Dimension]!! THE NOISE IS THE SAME!! THE BIOMES ARE THE SAME!! THE PBR IS THE SAME!! You added a [Y Axis] and now it\u2019s [Skyrim]!! <strong>SurfaceTool builds. FastNoiseLite shapes. StandardMaterial3D lights. Three classes, infinite terrain, zero excuses. Welcome to 3D.</strong></div>\n<div class=\"challenge\">Extend the terrain: add a water plane at height 0.35 (a simple MeshInstance3D with a blue transparent material). Scatter trees above height 0.4 using MultiMeshInstance3D. Add a DirectionalLight3D and an Environment with fog. Screenshot it. You just built an environment that would take hours to model by hand.</div>"
},
// ─── L21: Build a World (Capstone) ──────────────────────────────────────────────────────────
{
  subtitle: "FINISH LINE \u2022 LESSON 21",
  title: "Build a World",
  viz: "capstone",
  code: "// CAPSTONE: Procedural World Shader\n// Combines: FBM terrain + domain warping + PBR lighting\n// + Voronoi paths + biome coloring\nprecision highp float;\nuniform float u_time;\nuniform vec2 u_res;\nuniform vec2 u_mouse;\n\nvec3 mod289_3(vec3 x){return x-floor(x/289.0)*289.0;}\nvec2 mod289_2(vec2 x){return x-floor(x/289.0)*289.0;}\nvec3 permute(vec3 x){return mod289_3(((x*34.0)+1.0)*x);}\nfloat snoise(vec2 v){\n  const vec4 C=vec4(.2113,.3660,-.5773,.0243);\n  vec2 i=floor(v+dot(v,C.yy)),x0=v-i+dot(i,C.xx);\n  vec2 i1=(x0.x>x0.y)?vec2(1,0):vec2(0,1);\n  vec4 x12=x0.xyxy+C.xxzz;x12.xy-=i1;i=mod289_2(i);\n  vec3 p=permute(permute(i.y+vec3(0,i1.y,1))+i.x+vec3(0,i1.x,1));\n  vec3 m=max(.5-vec3(dot(x0,x0),dot(x12.xy,x12.xy),dot(x12.zw,x12.zw)),0.0);\n  m=m*m;m=m*m;\n  vec3 x2=2.0*fract(p*C.www)-1.0,h=abs(x2)-.5,ox=floor(x2+.5),a0=x2-ox;\n  m*=1.792-0.853*(a0*a0+h*h);\n  vec3 g;g.x=a0.x*x0.x+h.x*x0.y;g.yz=a0.yz*x12.xz+h.yz*x12.yw;\n  return 130.0*dot(m,g);\n}\nvec2 hash2(vec2 p){p=vec2(dot(p,vec2(127.1,311.7)),dot(p,vec2(269.5,183.3)));return fract(sin(p)*43758.5453);}\nfloat fbm(vec2 p,int oct){float v=0.,a=.5;for(int i=0;i<8;i++){if(i>=oct)break;v+=a*snoise(p);p*=2.;a*=.5;}return v;}\nfloat voronoi(vec2 x){vec2 n=floor(x),f=fract(x);float d=8.;for(int j=-1;j<=1;j++)for(int i=-1;i<=1;i++){vec2 g=vec2(float(i),float(j));vec2 o=hash2(n+g);d=min(d,length(g+o-f));}return d;}\n\n// Domain-warped terrain height\nfloat terrain(vec2 p){\n  vec2 q=vec2(fbm(p+vec2(0,0),4),fbm(p+vec2(5.2,1.3),4));\n  return fbm(p+1.5*q,6)*.5+.5;\n}\n\n// Biome color from height + moisture\nvec3 biome(float h, float m){\n  if(h<.32) return mix(vec3(.05,.15,.35),vec3(.1,.25,.5),h/.32);\n  if(h<.36) return vec3(.76,.7,.5);\n  if(h<.6) return mix(vec3(.15,.4,.12),vec3(.3,.45,.1),m);\n  if(h<.78) return mix(vec3(.4,.35,.28),vec3(.5,.4,.35),m);\n  return vec3(.85,.88,.92);\n}\n\nvoid main(){\n  vec2 uv=gl_FragCoord.xy/u_res;\n  float t=u_time*.05;\n  // Terrain height (domain-warped FBM)\n  float h=terrain(uv*3.+t);\n  float moisture=fbm(uv*5.+vec2(42.,17.),4)*.5+.5;\n  // Paths (Voronoi edges carving trails)\n  float path=voronoi(uv*8.)>.15?0.:1.;\n  // Normal from height\n  float e=1./u_res.x;\n  float hL=terrain((uv+vec2(-e,0))*3.+t);\n  float hR=terrain((uv+vec2(e,0))*3.+t);\n  float hD=terrain((uv+vec2(0,-e))*3.+t);\n  float hU=terrain((uv+vec2(0,e))*3.+t);\n  vec3 N=normalize(vec3((hL-hR)*4.,(hD-hU)*4.,1.));\n  // PBR-lite lighting\n  vec3 L=normalize(vec3(u_mouse-.5,.6));\n  float diff=max(dot(N,L),0.);\n  float ao=clamp(.5+(h-(.25*(hL+hR+hD+hU)))*5.,0.,1.);\n  float rough=.3+fbm(uv*20.,3)*.4;\n  vec3 H2=normalize(vec3(0,0,1)+L);\n  float spec=pow(max(dot(N,H2),0.),mix(8.,128.,1.-rough))*(1.-rough)*.4;\n  // Compose\n  vec3 col=biome(h,moisture);\n  if(path>.5&&h>.36) col=mix(col,vec3(.55,.5,.4),.6);\n  col=col*(diff*.7+.3)*ao+vec3(1)*spec;\n  // Emission: lava in low valleys\n  if(h<.25){float lava=smoothstep(.25,.2,h);col+=lava*vec3(1.,.3,.05)*2.;}\n  col=pow(col,vec3(1./2.2));\n  gl_FragColor=vec4(col,1.);\n}",
  body: "<p>Twenty-one lessons. Six noise types, fourteen PBR maps, three dungeon algorithms, two game engines (2D and 3D), and one terrifying amount of math that turned out to be mostly <code>for</code> loops and <code>sin()</code> calls. Time to jam it all into one shader and prove you actually learned something.</p>\n<p>The viz on the left is a procedural world. Domain-warped FBM terrain. Noise-derived biomes. PBR lighting with computed normals and AO. Voronoi-carved paths. Lava emission in the deep valleys. Every technique from this course, running in a single fragment shader. Move your mouse to relight it. That\u2019s YOUR world now.</p>\n<div class=\"vocab\"><span class=\"vt\">\"The Pipeline\"</span> \u2014 Noise \u2192 Height \u2192 Normals + AO + Roughness + Biome Color + Emission. One seed function feeds every visual property. That\u2019s the core insight of this entire course: procedural content is one function interpreted many ways.</div>\n<div class=\"vocab\"><span class=\"vt\">\"Separation of Concerns\"</span> \u2014 Height is structure. Color is biome logic. Lighting is PBR math. Paths are Voronoi. Each system is independent but they compose into something that feels designed. Procgen isn\u2019t chaos \u2014 it\u2019s layered order.</div>\n<div class=\"vocab\"><span class=\"vt\">\"The Last Mile\"</span> \u2014 The gap between \u201ccool shader\u201d and \u201cshippable game asset.\u201d It\u2019s baking textures, connecting to tilemaps, hooking up player controllers. The math is done. The engineering is next.</div>\n<div class=\"step-card\"><span class=\"step-num\">WHAT THE CAPSTONE COMBINES</span><strong>Part 1 (Noise):</strong> FBM for terrain height (L05), domain warping for organic shapes (L06), Voronoi for path carving (L04), material construction (L11).<br><strong>Part 2 (PBR):</strong> Normal maps from central differences (L09), AO from local curvature (L10), roughness + weathering (L11\u201312), emission for lava (L10).<br><strong>Part 3 (Procgen):</strong> Biome blending from dual noise layers (L15), the seed-to-world pipeline (L14). One shader. Everything connected.</div>\n<div class=\"step-card\"><span class=\"step-num\">THE DECISION TREE</span>Making terrain? \u2192 FBM heightmaps (L05, L15). Making dungeons? \u2192 BSP (L16) for structure, CA (L17) for organic caves. Making materials? \u2192 Procedural PBR pipeline (L07\u201310). Making shader art? \u2192 Domain warping + cosine palettes (L06, L08). Building complete materials? → Rock construction (L11) + weathering (L12). Scattering objects? \u2192 Poisson disk + Geometry Nodes (L16). Shipping in an engine? \u2192 Translate to Godot 2D (L19) or 3D (L20), or Blender (L18). The technique matches the problem.</div>\n<div class=\"step-card\"><span class=\"step-num\">WHAT YOU DIDN\u2019T LEARN (YET)</span><strong>WFC (Wave Function Collapse):</strong> constraint-based tiling for cities and dungeons. <strong>Marching Cubes:</strong> converting 3D noise to mesh (No Man\u2019s Sky). <strong>L-Systems:</strong> grammar-based trees and rivers. <strong>Poisson disk sampling:</strong> natural-looking point distributions. <strong>Erosion simulation:</strong> making terrain look weathered. These are your next stops.</div>\n<div class=\"step-card\"><span class=\"step-num\">THE WORKFLOW</span>Prototype in GLSL (Shadertoy gives you instant visual feedback). Once it looks right, translate to your engine: Blender for offline rendering and baking, Godot/Unity/Unreal for real-time. The shader knowledge is portable because the math is universal. <code>snoise()</code> in GLSL is the same algorithm as <code>FastNoiseLite</code> in Godot is the same as the Noise Texture node in Blender. You learned it once. It works everywhere.</div>\n<div class=\"tip\">The code panel has the complete capstone shader \u2014 copy it into Shadertoy (shadertoy.com/new) and start modifying. Change the biome thresholds, swap the color palette, crank the domain warp. Break it until you understand every line.</div>\n<div class=\"artists\">Shadertoy.com (prototype shaders live). Inigo Quilez\u2019s articles (iquilezles.org \u2014 the bible). Sebastian Lague (YouTube procgen deep dives). Blender Artists Forum (Geometry Nodes inspo). GDQuest + Heartbeast (Godot tutorials). The Book of Shaders (thebookofshaders.com \u2014 the gentle intro).</div>\n<div class=\"spamton\">YOU WALKED IN HERE THINKING [random()] WAS A [Texture Generator]!! NOW YOU\u2019VE GOT [Domain-Warped PBR Terrain] RUNNING IN A [Fragment Shader] THAT YOU ACTUALLY [Understand]!! Twenty-one lessons ago your terrain looked like [SOAP]!! Now it has [BIOMES] and [LAVA] and [Ambient Occlusion]!! <strong>The entire universe is procedurally generated. You just learned the source code. Now go fork it.</strong></div>\n<div class=\"challenge\">Your final project: build ONE of these in a weekend. (1) A Shadertoy scene with domain-warped terrain, PBR lighting, and at least three biomes. (2) A Godot dungeon crawler using L14\u2019s BSP + fog of war + noise-textured walls. (3) A Blender Geometry Nodes landscape with procedural material and scattered instances. Post it. Share the seed. Tag it #ForLemurs.</div>"
}

<script>
'use strict';
// ═══════════════════════════════════════════════════════════════════════════════
// ENGINE + VIZ CODE
// ═══════════════════════════════════════════════════════════════════════════════

// roundRect polyfill
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r){
    if(w<2*r)r=w/2;if(h<2*r)r=h/2;
    this.beginPath();this.moveTo(x+r,y);this.arcTo(x+w,y,x+w,y+h,r);
    this.arcTo(x+w,y+h,x,y+h,r);this.arcTo(x,y+h,x,y,r);this.arcTo(x,y,x+w,y,r);this.closePath();
  };
}
window.addEventListener('error',e=>{e.preventDefault();return true;},true);
window.addEventListener('unhandledrejection',e=>e.preventDefault(),true);

// ─── CONSTANTS ────────────────────────────────────────────────────────────────
const MINT='#7affb2', CYAN='#38d9f5', RED='#ff6060', AMBER='#ffcc44', PURP='#cc66ff',
      LIME='#a8ff47', WHITE='#ffffff', ORANGE='#ff7f2a', GODOT_TEAL='#478cbf';
const NAV_SECTIONS = { 0:'NOISE', 7:'PBR', 14:'PROCGEN', 20:'FINISH' };

// ─── GLOBAL STATE ─────────────────────────────────────────────────────────────
let _raf=null, animTimer=null, curLesson=0, curViz=null;
let _renderer=null, _scene=null, _camera=null, _uniforms=null;
let _cleanupFns=[];
function cancelRaf(){if(_raf!=null){cancelAnimationFrame(_raf);_raf=null;}}
function stop(){if(animTimer){clearTimeout(animTimer);animTimer=null;}}
function onCleanup(fn){_cleanupFns.push(fn);}
function runCleanups(){_cleanupFns.forEach(fn=>{try{fn();}catch(e){}});_cleanupFns=[];}
let _lastCtxType=null; // 'webgl' or '2d'
function cleanGL(){
  if(_renderer){try{_renderer.dispose();}catch(e){}_renderer=null;}
  _scene=null;_camera=null;_uniforms=null;
}
function freshCanvas(needType){
  // Replace canvas element when switching context types (WebGL <-> 2D)
  if(_lastCtxType && _lastCtxType!==needType){
    const old=document.getElementById('vizCanvas');
    const nw=document.createElement('canvas');
    nw.id='vizCanvas';
    old.parentNode.replaceChild(nw,old);
  }
  _lastCtxType=needType;
  sizeCanvas();
}

// ─── CANVAS HELPERS ──────────────────────────────────────────────────────────
const vc=()=>document.getElementById('vizCanvas');
const W=()=>vc().width, H=()=>vc().height;
const spd=()=>parseInt(speedSlider.value), ms=()=>Math.round(1100-spd()*100);
function rgba(col,a){const r=parseInt(col.slice(1,3),16),g=parseInt(col.slice(3,5),16),b=parseInt(col.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function glow(ctx,col,blur){ctx.shadowColor=col;ctx.shadowBlur=blur;}
function noGlow(ctx){ctx.shadowBlur=0;}
function scanline(ctx,col,alpha=0.02){
  const h=H(),w=W();
  ctx.save();ctx.globalAlpha=alpha;
  for(let y=0;y<h;y+=4){ctx.fillStyle=col;ctx.fillRect(0,y,w,1);}
  ctx.restore();
}
function atmosBg(ctx,r,g,b,a=0.3){
  const w=W(),h=H(),cx=w/2,cy=h/2;
  ctx.fillStyle='#09090e';ctx.fillRect(0,0,w,h);
  const gr=ctx.createRadialGradient(cx,cy,0,cx,cy,Math.max(w,h)*0.7);
  gr.addColorStop(0,`rgba(${r},${g},${b},${a})`);gr.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=gr;ctx.fillRect(0,0,w,h);
}
function neonLine(ctx,x1,y1,x2,y2,col,lw=2,blur=18){
  ctx.save();ctx.shadowColor=col;ctx.shadowBlur=blur;
  ctx.strokeStyle=col;ctx.lineWidth=lw;
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
  ctx.restore();
}

// ─── WEBGL/THREE.JS HELPER ───────────────────────────────────────────────────
function makeShaderViz(fragSrc, extraUniforms={}) {
  cleanGL();
  freshCanvas('webgl');
  const canvas = document.getElementById('vizCanvas');
  const renderer = new THREE.WebGLRenderer({canvas, antialias: false, alpha: false});
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.setSize(canvas.clientWidth, canvas.clientHeight, false);
  canvas.width = canvas.clientWidth * Math.min(devicePixelRatio, 2);
  canvas.height = canvas.clientHeight * Math.min(devicePixelRatio, 2);
  const scene = new THREE.Scene();
  const camera = new THREE.OrthographicCamera(-1,1,1,-1,0,1);
  const uniforms = {
    u_time:  {value: 0.0},
    u_res:   {value: new THREE.Vector2(canvas.width, canvas.height)},
    u_mouse: {value: new THREE.Vector2(0.5, 0.5)},
    ...extraUniforms
  };
  const mat = new THREE.ShaderMaterial({
    vertexShader: 'void main(){gl_Position=vec4(position,1.0);}',
    fragmentShader: fragSrc,
    uniforms
  });
  const mesh = new THREE.Mesh(new THREE.PlaneGeometry(2,2), mat);
  scene.add(mesh);
  canvas.onmousemove = e => {
    const r = canvas.getBoundingClientRect();
    uniforms.u_mouse.value.set(
      (e.clientX-r.left)/r.width,
      1-(e.clientY-r.top)/r.height
    );
  };
  _renderer=renderer; _scene=scene; _camera=camera; _uniforms=uniforms;
  return {renderer, scene, camera, uniforms, mat};
}

function runShaderLoop(sv, startTime) {
  const t0 = startTime || performance.now();
  function loop() {
    sv.uniforms.u_time.value = (performance.now()-t0)*0.001;
    sv.renderer.render(sv.scene, sv.camera);
    _raf = requestAnimationFrame(loop);
  }
  loop();
}

// ─── SEEDED PRNG ─────────────────────────────────────────────────────────────
function mulberry32(seed){
  return function(){seed|=0;seed=seed+0x6D2B79F5|0;var t=Math.imul(seed^seed>>>15,1|seed);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};
}

// ═══════════════════════════════════════════════════════════════════════════════
// NAV + TABS + LESSON LOADING
// ═══════════════════════════════════════════════════════════════════════════════
function buildNav(){
  const bar = document.getElementById('navBar');
  bar.innerHTML='';
  LESSONS.forEach((l,i)=>{
    if(NAV_SECTIONS[i]!==undefined){
      const s=document.createElement('span');
      s.className='nav-section';s.textContent=NAV_SECTIONS[i];
      bar.appendChild(s);
    }
    const b=document.createElement('button');
    b.className='nav-btn'+(i===curLesson?' active':'');
    b.textContent=String(i+1).padStart(2,'0');
    b.onclick=()=>loadLesson(i);
    bar.appendChild(b);
  });
  // Update prev/next label
  const lbl=document.getElementById('pnLabel');
  if(lbl) lbl.textContent=String(curLesson+1).padStart(2,'0')+'/'+LESSONS.length;

function highlightCode(code){
  let out='';
  const lines=code.split('\n');
  for(const line of lines){
    const cIdx=line.search(/\/\/|#/);
    let isComment=false;
    if(cIdx!==-1){
      const ch=line[cIdx];
      if(ch==='/' && line[cIdx+1]==='/') isComment=true;
      else if(ch==='#' && !/^#\s*(define|include|ifdef|ifndef|endif|if|else|pragma)\b/.test(line.substring(cIdx))) isComment=true;
    }
    if(isComment){
      out+=hlLine(line.substring(0,cIdx));
      out+='<span class="cm">'+esc(line.substring(cIdx))+'</span>';
    } else {
      out+=hlLine(line);
    }
    out+='\n';
  }
  return out;
}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function hlLine(line){
  // Tokenize: split on word boundaries and highlight each token
  return line.replace(/([a-zA-Z_]\w*)|(\d+\.?\d*[fF]?)|(.)/g, function(m,word,num,ch){
    if(word){
      if(/^(precision|uniform|varying|void|if|else|for|return|break|continue|discard|struct|in|out|inout|var|let|const|function|class|extends|new|import|from|export|default|async|await|this|func|while|match|and|or|not|pass|self|signal|onready|preload|shader_type|spatial|hint_range)$/.test(word))
        return '<span class="kw">'+word+'</span>';
      if(/^(float|vec[234]|mat[234]|int|bool|sampler2D|BSPNode|Rect2i|Vector2i|RandomNumberGenerator|TileMap|Node2D|null|undefined|true|false)$/.test(word))
        return '<span class="type">'+word+'</span>';
      if(/^(sin|cos|tan|abs|min|max|clamp|mix|step|smoothstep|length|normalize|dot|cross|reflect|pow|sqrt|fract|floor|ceil|mod|mod289|permute|snoise|fbm|hash2?|voronoi|palette|valueNoise|perlinLike|heightAt|rockAlbedo|rockHeight|rockRoughness|rockAO|wood|stone|marble|mulberry32|initGrid|floodFill|DistGGX|GeomSmith|FresnelSchlick|hsv2rgb|main|fragment|noise|texture)$/.test(word))
        return '<span class="fn">'+word+'</span>';
      return esc(word);
    }
    if(num) return '<span class="num">'+num+'</span>';
    return esc(ch);
  });
}

// GLSL NOISE LIBRARY (shared fragments)
// ═══════════════════════════════════════════════════════════════════════════════
const GLSL_NOISE_LIB = `
vec3 mod289_3(vec3 x){return x-floor(x/289.0)*289.0;}
vec2 mod289_2(vec2 x){return x-floor(x/289.0)*289.0;}
vec3 permute(vec3 x){return mod289_3(((x*34.0)+1.0)*x);}
float snoise(vec2 v){
  const vec4 C=vec4(0.211324865405187,0.366025403784439,-0.577350269189626,0.024390243902439);
  vec2 i=floor(v+dot(v,C.yy)),x0=v-i+dot(i,C.xx);
  vec2 i1=(x0.x>x0.y)?vec2(1,0):vec2(0,1);
  vec4 x12=x0.xyxy+C.xxzz;x12.xy-=i1;i=mod289_2(i);
  vec3 p=permute(permute(i.y+vec3(0,i1.y,1))+i.x+vec3(0,i1.x,1));
  vec3 m=max(0.5-vec3(dot(x0,x0),dot(x12.xy,x12.xy),dot(x12.zw,x12.zw)),0.0);
  m=m*m;m=m*m;
  vec3 x2=2.0*fract(p*C.www)-1.0,h=abs(x2)-0.5,ox=floor(x2+0.5),a0=x2-ox;
  m*=1.79284291400159-0.85373472095314*(a0*a0+h*h);
  vec3 g;g.x=a0.x*x0.x+h.x*x0.y;g.yz=a0.yz*x12.xz+h.yz*x12.yw;
  return 130.0*dot(m,g);
}
float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}
vec2 hash2(vec2 p){p=vec2(dot(p,vec2(127.1,311.7)),dot(p,vec2(269.5,183.3)));return fract(sin(p)*43758.5453);}
float fbm(vec2 p){float v=0.0,a=0.5;for(int i=0;i<5;i++){v+=a*snoise(p);p*=2.0;a*=0.5;}return v;}
`;

function vizValueNoise(){
  const frag = `precision highp float;
uniform float u_time;
uniform vec2 u_res;
float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}
float valueNoise(vec2 p){
  vec2 i=floor(p),f=fract(p);
  vec2 u=f*f*(3.0-2.0*f);
  float a=hash(i),b=hash(i+vec2(1,0)),c=hash(i+vec2(0,1)),d=hash(i+vec2(1,1));
  return mix(mix(a,b,u.x),mix(c,d,u.x),u.y);
}
float linearNoise(vec2 p){
  vec2 i=floor(p),f=fract(p);
  float a=hash(i),b=hash(i+vec2(1,0)),c=hash(i+vec2(0,1)),d=hash(i+vec2(1,1));
  return mix(mix(a,b,f.x),mix(c,d,f.x),f.y);
}
void main(){
  vec2 uv=gl_FragCoord.xy/u_res;
  float n;
  if(uv.x<0.333){
    n=hash(floor(uv*120.0)+floor(u_time*2.0));
  } else if(uv.x<0.666){
    n=linearNoise(uv*8.0+u_time*0.3);
  } else {
    n=valueNoise(uv*8.0+u_time*0.3);
  }
  vec3 col=vec3(n)*vec3(0.48,1.0,0.7);
  float lx1=0.333,lx2=0.666;
  if(abs(uv.x-lx1)<0.002||abs(uv.x-lx2)<0.002) col=vec3(0.48,1.0,0.7);
  gl_FragColor=vec4(col,1.0);
}`;
  const sv = makeShaderViz(frag);
  runShaderLoop(sv);
}

function vizPerlinNoise(){
  addSlider('u_octaves','Octaves',1,8,4,1);
  addSlider('u_persist','Persistence',10,90,50,1);
  const frag = `precision highp float;
uniform float u_time;uniform vec2 u_res;uniform vec2 u_mouse;
uniform float u_octaves;uniform float u_persist;
${GLSL_NOISE_LIB}
void main(){
  vec2 uv=gl_FragCoord.xy/u_res;
  float n=0.0,amp=1.0,freq=4.0,total=0.0;
  float pers=u_persist/100.0;
  int oct=int(u_octaves);
  for(int i=0;i<8;i++){
    if(i>=oct) break;
    n+=amp*snoise(uv*freq+u_time*0.2);
    total+=amp;freq*=2.0;amp*=pers;
  }
  n=n/total*0.5+0.5;
  gl_FragColor=vec4(vec3(n)*vec3(0.48,1.0,0.7),1.0);
}`;

}

function vizSimplexNoise(){

uniform float u_time;uniform vec2 u_res;
${GLSL_NOISE_LIB}
float valueLike(vec2 p){

  vec2 u=f*f*(3.0-2.0*f);
  return mix(mix(hash(i),hash(i+vec2(1,0)),u.x),
             mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),u.x),u.y);
}
void main(){

  }
  vec3 col=vec3(n)*vec3(0.48,1.0,0.7);

function vizVoronoiNoise(){
  addSelect('u_mode','Mode',['F1 (cells)','F2-F1 (edges)','F2']);

uniform float u_time;uniform vec2 u_res;uniform float u_mode;
${GLSL_NOISE_LIB}
vec2 voronoi(vec2 x){
  vec2 n=floor(x),f=fract(x);
  float F1=8.0,F2=8.0;
  for(int j=-1;j<=1;j++)for(int i=-1;i<=1;i++){
    vec2 g=vec2(float(i),float(j));

    o=0.5+0.5*sin(u_time*0.6+6.2831*o);
    float d=length(g+o-f);
    if(d<F1){F2=F1;F1=d;}else if(d<F2){F2=d;}

}

function vizPbrSphere(){
  addSlider('u_metallic','Metal',0,100,20,1);
  addSlider('u_roughness','Rough',5,100,40,1);
  addSlider('u_hue','Hue',0,100,35,1);
  const frag = `precision highp float;
uniform float u_time;uniform vec2 u_res;uniform vec2 u_mouse;
uniform float u_metallic;uniform float u_roughness;uniform float u_hue;
#define PI 3.14159265
vec3 hsv2rgb(vec3 c){vec4 K=vec4(1.0,2.0/3.0,1.0/3.0,3.0);vec3 p=abs(fract(c.xxx+K.xyz)*6.0-K.www);return c.z*mix(K.xxx,clamp(p-K.xxx,0.0,1.0),c.y);}
float DistGGX(float NdH,float r){float a=r*r;float a2=a*a;float d=NdH*NdH*(a2-1.0)+1.0;return a2/(PI*d*d);}
float GeomSmith(float NdV,float NdL,float r){float k=(r+1.0)*(r+1.0)/8.0;return (NdV/(NdV*(1.0-k)+k))*(NdL/(NdL*(1.0-k)+k));}
vec3 FresnelSchlick(float HdV,vec3 F0){return F0+(1.0-F0)*pow(1.0-HdV,5.0);}
void main(){
  vec2 uv=(gl_FragCoord.xy-0.5*u_res)/min(u_res.x,u_res.y);
  float r=length(uv);if(r>0.45){gl_FragColor=vec4(vec3(0.035),1);return;}
  vec3 N=normalize(vec3(uv,sqrt(max(0.0,0.45*0.45-r*r))));
  float lt=u_time*0.8;
  vec3 L=normalize(vec3(cos(lt),0.6,sin(lt)));
  vec3 V=vec3(0,0,1);vec3 H2=normalize(V+L);
  float NdL=max(dot(N,L),0.0),NdH=max(dot(N,H2),0.0),NdV=max(dot(N,V),0.0),HdV=max(dot(H2,V),0.0);
  float metal=u_metallic/100.0,rough=u_roughness/100.0;
  vec3 albedo=hsv2rgb(vec3(u_hue/100.0,0.7,0.9));
  vec3 F0=mix(vec3(0.04),albedo,metal);
  float D=DistGGX(NdH,rough);float G=GeomSmith(NdV,NdL,rough);vec3 F=FresnelSchlick(HdV,F0);
  vec3 spec=(D*G*F)/(4.0*NdV*NdL+0.001);
  vec3 kD=(1.0-F)*(1.0-metal);
  vec3 col=(kD*albedo/PI+spec)*NdL*vec3(1.0,0.95,0.9)*3.0;
  col+=albedo*0.03;col=pow(col,vec3(1.0/2.2));
  gl_FragColor=vec4(col,1.0);
}`;
  const sv = makeShaderViz(frag, {
    u_metallic:{value:20.0},u_roughness:{value:40.0},u_hue:{value:35.0}
  });
  wireSlider('u_metallic',sv.uniforms);
  wireSlider('u_roughness',sv.uniforms);
  wireSlider('u_hue',sv.uniforms);
  runShaderLoop(sv);

function vizProceduralAlbedo(){
  addSelect('u_material','Material',['Wood','Stone','Marble']);
  const frag = `precision highp float;
uniform float u_time;uniform vec2 u_res;uniform float u_material;
${GLSL_NOISE_LIB}
float voronoiDist(vec2 x){vec2 n=floor(x),f=fract(x);float d=8.0;for(int j=-1;j<=1;j++)for(int i=-1;i<=1;i++){vec2 g=vec2(float(i),float(j));vec2 o=hash2(n+g);o=0.5+0.5*sin(u_time*0.3+6.2831*o);d=min(d,length(g+o-f));}return d;}
vec3 palette(float t,vec3 a,vec3 b,vec3 c,vec3 d){return a+b*cos(6.28318*(c*t+d));}
vec3 wood(vec2 uv){float r=length(uv*vec2(1.0,0.3))*8.0;float ring=sin(r+fbm(uv*4.0+u_time*0.05)*3.0);float n=ring*0.5+0.5+fbm(uv*12.0)*0.15;return palette(n,vec3(0.3,0.15,0.05),vec3(0.2,0.1,0.0),vec3(1,1,1),vec3(0,0.1,0.2));}
vec3 stone(vec2 uv){float v=voronoiDist(uv*5.0);float n=v+fbm(uv*8.0)*0.3;return palette(n,vec3(0.4,0.4,0.38),vec3(0.15,0.12,0.1),vec3(1,1,1),vec3(0,0.05,0.1));}
vec3 marble(vec2 uv){float n=sin(uv.x*6.0+fbm(uv*4.0+u_time*0.08)*6.0);n=n*0.5+0.5;return palette(n,vec3(0.9,0.9,0.92),vec3(0.1,0.08,0.12),vec3(1,0.5,0.5),vec3(0,0.15,0.2));}
void main(){
  vec2 uv=gl_FragCoord.xy/u_res;int mat=int(u_material);vec3 col;

function vizTextureSuite(){

  addCheckbox('u_showNormal','Normal',true);
  addCheckbox('u_showRough','Rough',true);
  addCheckbox('u_showAO','AO',true);
  const frag = `precision highp float;
uniform float u_time;uniform vec2 u_res;uniform vec2 u_mouse;
uniform float u_showAlbedo;uniform float u_showNormal;uniform float u_showRough;uniform float u_showAO;
#define PI 3.14159265
${GLSL_NOISE_LIB}
float voronoiDist(vec2 x){vec2 n=floor(x),f=fract(x);float d=8.0;for(int j=-1;j<=1;j++)for(int i=-1;i<=1;i++){vec2 g=vec2(float(i),float(j));vec2 o=hash2(n+g);d=min(d,length(g+o-f));}return d;}
vec3 rockAlb(vec2 uv){float v=voronoiDist(uv*5.0);float n=fbm(uv*8.0)*0.3+v*0.7;return mix(vec3(0.25,0.22,0.2),vec3(0.5,0.48,0.42),n);}
float rockH(vec2 uv){return fbm(uv*4.0)*0.5+0.5+voronoiDist(uv*5.0)*0.2;}
float rockR(vec2 uv){return 0.4+fbm(uv*12.0)*0.4;}
float rockAO(vec2 uv){float h=rockH(uv);float avg=(rockH(uv+vec2(.02,0))+rockH(uv-vec2(.02,0))+rockH(uv+vec2(0,.02))+rockH(uv-vec2(0,.02)))*0.25;return clamp(0.5+(h-avg)*4.0,0.0,1.0);}
void main(){
  vec2 uv=gl_FragCoord.xy/u_res;float eps=2.0/u_res.x;
  vec3 albedo=u_showAlbedo>0.5?rockAlb(uv):vec3(0.5);
  float hL=rockH(uv-vec2(eps,0)),hR=rockH(uv+vec2(eps,0));
  float hD=rockH(uv-vec2(0,eps)),hU=rockH(uv+vec2(0,eps));
  vec3 N=u_showNormal>0.5?normalize(vec3((hL-hR)*3.0,(hD-hU)*3.0,1.0)):vec3(0,0,1);
  float rough=u_showRough>0.5?rockR(uv):0.5;
  float ao=u_showAO>0.5?rockAO(uv):1.0;

  float spec=pow(NdH,mix(4.0,128.0,1.0-rough));
  vec3 col=albedo*(NdL*0.8+0.2)*ao+vec3(1)*spec*0.3*(1.0-rough);
  col=pow(col,vec3(1.0/2.2));
  gl_FragColor=vec4(col,1.0);
}`;
  const sv = makeShaderViz(frag, {
    u_showAlbedo:{value:1.0},u_showNormal:{value:1.0},u_showRough:{value:1.0},u_showAO:{value:1.0}
  });
