<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voice Synthesis for Lemurs — LEMUR Sound Synthesis School</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;700;800&display=swap');
:root{
  --bg:#0a0a0f; --panel:#111118; --border:#1e1e2e;
  --accent:#b48eff; --accent2:#ff6b9d; --accent3:#6bc5ff;
  --text:#e0e0f0; --muted:#666688; --code-bg:#0d0d15;
}
*{ box-sizing:border-box; margin:0; padding:0; }
body{ background:var(--bg); color:var(--text); font-family:'Syne',sans-serif; min-height:100vh; overflow-x:hidden; }
header{ padding:3rem 2rem 2rem; text-align:center; border-bottom:1px solid var(--border); position:relative; overflow:hidden; }
header canvas#hero{ position:absolute; inset:0; width:100%; height:100%; opacity:.25; pointer-events:none; }
header .inner{ position:relative; z-index:1; }
.tagline-chip{ display:inline-block; background:var(--accent); color:#000; font-family:'Space Mono',monospace; font-size:.65rem; padding:.25rem .75rem; letter-spacing:.15em; text-transform:uppercase; margin-bottom:1rem; }
h1{ font-size:clamp(2.5rem,6vw,5rem); font-weight:800; line-height:1; letter-spacing:-.02em; }
h1 span{ color:var(--accent); }
.subtitle{ font-family:'Space Mono',monospace; font-size:.85rem; color:var(--muted); margin-top:.75rem; }
.progress-bar{ height:2px; background:var(--border); }
.progress-fill{ height:100%; background:var(--accent); transition:width .4s ease; }
nav{ display:flex; gap:.4rem; padding:1rem 1.5rem; overflow-x:auto; border-bottom:1px solid var(--border); background:var(--panel); position:sticky; top:0; z-index:100; scrollbar-width:none; }
nav::-webkit-scrollbar{ display:none; }
.nav-btn{ flex-shrink:0; background:none; border:1px solid var(--border); color:var(--muted); font-family:'Space Mono',monospace; font-size:.7rem; padding:.4rem .8rem; cursor:pointer; transition:all .2s; white-space:nowrap; }
.nav-btn:hover{ border-color:var(--accent); color:var(--accent); }
.nav-btn.active{ background:var(--accent); color:#000; border-color:var(--accent); }
.nav-btn.locked{ opacity:.4; cursor:not-allowed; }
.nav-btn.locked:hover{ border-color:var(--border); color:var(--muted); }
main{ display:grid; grid-template-columns:1fr 1fr; gap:0; height:calc(100vh - 185px); min-height:560px; }
@media(max-width:900px){ main{ grid-template-columns:1fr; height:auto; } }
.lesson-panel{ padding:2rem; overflow-y:auto; border-right:1px solid var(--border); scrollbar-width:thin; scrollbar-color:var(--border) transparent; }

.lesson-body .step-card .step-num{ color:var(--accent3); font-weight:700; font-size:.65rem; letter-spacing:.15em; display:block; margin-bottom:.25rem; }
.lesson-body .challenge{ background:#160d1e; border:1px solid var(--accent2); padding:.75rem 1rem; margin:.6rem 0; }
.lesson-body .challenge::before{ content:'>> CHALLENGE: '; color:var(--accent2); font-weight:700; }

.vowel-btn:hover,.vowel-btn.active{ background:var(--accent); color:#000; border-color:var(--accent); }

.ph-btn:hover{ background:var(--accent3); color:#000; }
.ph-btn.plosive{ border-color:var(--accent2); color:var(--accent2); }
.ph-btn.plosive:hover{ background:var(--accent2); color:#000; }
.ph-btn.fricative{ border-color:var(--accent); color:var(--accent); }

          <option value="">load pattern…</option>

<script>
'use strict';
window.addEventListener('error', function(e){ e.preventDefault(); return true; }, true);
window.addEventListener('unhandledrejection', function(e){ e.preventDefault(); }, true);

// ═══════════════════════════════════════════════════════════════════
//  LESSONS
// ═══════════════════════════════════════════════════════════════════
const LESSONS = [

// ─── 01 ──────────────────────────────────────────────────────────
{ subtitle:'01 — Source & Filter', title:'What Is Voice?',
params:[
  {id:'f0',          label:'Pitch (F0, Hz)',      min:80,  max:300, step:1,   def:120},
  {id:'f1',          label:'Jaw height (F1)',  min:250, max:900, step:10,  def:800},
  {id:'f2',          label:'Tongue front/back (F2)',min:700, max:2800,step:10,  def:1200},
  {id:'breathiness', label:'Breathiness',     min:0,   max:1,   step:.01, def:0.15},
],
body:`<p>Here's the secret that phoneticians have been sitting on for 70 years: <strong>your voice is a synthesizer</strong>. Your vocal folds are the oscillator. Your throat, mouth, and nose are the filter bank. The sounds you make depend entirely on how you shape those filters in real time. You've been doing DSP since before you could walk — you just didn't know the label for it.</p>

<div class="vocab"><span class="vt">"Source-Filter Model"</span> — not a metaphor, an actual model. Your voice has two separate parts: a <em>source</em> (the buzzing of your vocal folds) and a <em>filter</em> (the resonant cavities that shape it). These are independent. Same source + different filter = different vowel. Different source + same filter = whisper vs. voiced speech. The model was formalized by Gunnar Fant in 1960 and still underlies everything.</div>

<div class="vocab"><span class="vt">"Formant"</span> — a resonant frequency peak in the vocal tract. When you change the shape of your mouth, you're tuning these peaks. Every vowel sound is defined by the positions of its formants. The first formant (F1) tracks jaw openness. The second (F2) tracks tongue position front-to-back. This is not metaphor. This is measurable, repeatable acoustics.</div>

<div class="vocab"><span class="vt">"Bandpass Filter"</span> — a filter that lets through a narrow band of frequencies and attenuates everything else. In Web Audio: <code>BiquadFilterNode</code> with <code>type='bandpass'</code>. Center frequency set by <code>.frequency.value</code>, bandwidth controlled by Q. High Q = narrow peak = more resonant. This is how formants work — the vocal tract has natural resonances that act like high-Q bandpass filters.</div>

<div class="step-card"><span class="step-num">THE SOURCE — VOCAL FOLDS</span>
Your vocal folds are two flaps of muscle tissue in the larynx. When you speak, air pressure from below forces them apart, they snap back together (the Bernoulli effect + muscle tension), air shoots through the gap, and this cycle repeats 80–300 times per second depending on pitch. That rapid pressure pulsing is the raw source signal — acoustically it looks like a sawtooth wave. Rich in harmonics. Ready to be filtered.
</div>

<div class="step-card"><span class="step-num">THE FILTER — YOUR VOCAL TRACT</span>
The vocal tract is a tube roughly 17cm long (adult male average) with a variable cross-section you control with your tongue, jaw, lips, and soft palate. Different configurations create different resonant frequencies. Those resonances amplify certain harmonics of the source and attenuate others. The pattern of amplified harmonics is what your ears recognize as a specific vowel. You've been tuning this filter continuously since infancy.
</div>

<div class="step-card"><span class="step-num">THE CODE ON THE RIGHT</span>
The synthesizer here implements the source-filter model directly. <code>makeSynth()</code> creates a sawtooth oscillator (source) feeding into two bandpass filters (formants). The sliders control the source frequency (F0 = fundamental = pitch) and the two formant center frequencies (F1, F2). Drag the formant sliders and listen — you're literally moving your virtual mouth.
</div>

<div class="challenge">In the code, find the line <code>f1.frequency.value = params.f1</code> and add a second bandpass filter for F2 at <code>params.f2</code>. Connect it in parallel with F1 (both fed by <code>src</code>, both feeding the output mixer). Now drag the F2 slider from 800 up to 2600 while F1 stays at 300. You'll hear a rough journey from /u/ toward /i/. That's your virtual tongue moving forward. You built a two-formant synthesizer. That's basically the whole field.</div>



<p class="tip">>> TIP: set F0 to 200Hz, then slowly drag F1 from 800 down to 300 while F2 stays around 1200. You'll hear a rough trajectory from an open "ahh" toward a closed "oo." Your jaw is doing this exact thing when you say those sounds — just 1000× faster and smoother.</p>`,
code:`// ── WHAT IS VOICE? SOURCE-FILTER MODEL ─────────────────────────────
// The most fundamental voice synthesis architecture.
// Source: a sawtooth wave (buzzy glottal pulse approximation)
// Filter: two resonant bandpass filters (formants F1 and F2)
// The mix of source + aspiration noise through those formants
// is enough to create recognizable vowel-like sounds.

function makeSynth(audioCtx, params) {
  // Safe defaults
  const _d = {f0:120, f1:800, f2:1200, breathiness:0.15};
  for(const k in _d) if(params[k]===undefined||isNaN(params[k])) params[k]=_d[k];

  // ── GLOTTAL SOURCE: sawtooth approximates vocal fold buzz ──────
  // Real glottal pulses are asymmetric and softer than a sawtooth,
  // but a sawtooth gives us the rich harmonic content to work with.
  const src = audioCtx.createOscillator();
  src.type = 'sawtooth';
  src.frequency.value = params.f0;

  // ── ASPIRATION NOISE: turbulent airflow through the glottis ────
  // Pre-render 2 seconds of noise into a looping buffer.
  // This approximates the breathiness in real voice.
  const SR = audioCtx.sampleRate;
  const nBuf = audioCtx.createBuffer(1, SR * 2, SR);
  const nd = nBuf.getChannelData(0);
  for(let i=0; i<nd.length; i++) nd[i] = Math.random() * 2 - 1;
  const noise = audioCtx.createBufferSource();
  noise.buffer = nBuf;
  noise.loop = true;

  const noiseGain = audioCtx.createGain();
  noiseGain.gain.value = params.breathiness * 0.4;

  // ── FORMANT FILTERS: the vocal tract resonances ─────────────────
  // F1 = first formant (jaw height / vocal tract length)
  // F2 = second formant (tongue position front/back)
  // Q value controls bandwidth — real formants are around Q=8-15.
  // Higher Q = narrower, more nasal/resonant character.
  const f1 = audioCtx.createBiquadFilter();
  f1.type = 'bandpass';
  f1.frequency.value = params.f1;
  f1.Q.value = 10;

  const f2 = audioCtx.createBiquadFilter();
  f2.type = 'bandpass';
  f2.frequency.value = params.f2;
  f2.Q.value = 12;

  // ── MIX: both paths through separate formant copies ────────────
  // In a real vocal tract F1 and F2 are in series, but parallel BPF
  // banks are a decent approximation and are easier to understand.
  const f1b = audioCtx.createBiquadFilter(); // noise copy of F1
  f1b.type = 'bandpass'; f1b.frequency.value = params.f1; f1b.Q.value = 10;
  const f2b = audioCtx.createBiquadFilter(); // noise copy of F2
  f2b.type = 'bandpass'; f2b.frequency.value = params.f2; f2b.Q.value = 12;

  const master = audioCtx.createGain();
  master.gain.value = 0.55;

  // Source → formants → output
  src.connect(f1);  f1.connect(master);
  src.connect(f2);  f2.connect(master);
  // Noise → formants (same resonances color the breathiness too)
  noise.connect(noiseGain);
  noiseGain.connect(f1b); f1b.connect(master);
  noiseGain.connect(f2b); f2b.connect(master);

  noise.start(); // noise starts immediately; engine starts osc

  return { node: master, osc: src, noise, noiseGain, f1, f2, f1b, f2b };
}

function updateParams(nodes, params) {
  nodes.osc.frequency.value    = params.f0;
  nodes.f1.frequency.value     = params.f1;
  nodes.f2.frequency.value     = params.f2;
  nodes.f1b.frequency.value    = params.f1;
  nodes.f2b.frequency.value    = params.f2;
  nodes.noiseGain.gain.value   = params.breathiness * 0.4;
}
`},

{ subtitle:'02 — Vowels Are Filters', title:'The Vowel Space',
params:[
  {id:'f0',  label:'Pitch (F0, Hz)',       min:80,  max:400, step:1,  def:120},
  {id:'f1',  label:'Jaw height (F1)', min:250, max:900, step:5,  def:800},
  {id:'f2',  label:'Tongue front/back (F2)', min:700, max:2800,step:5,  def:1200},
  {id:'f3',  label:'Nasal ring (F3)',     min:1800,max:3500,step:10, def:2500},
  {id:'bw',  label:'Resonance sharpness (Q)',   min:3,   max:20,  step:0.5,def:10},
],
body:`<p>Every vowel sound in every human language is defined by two numbers: <strong>F1 and F2</strong> — the frequencies of the first and second formants. Linguists have been measuring these since the 1950s. The map of F1 vs F2 space is called the <em>vowel chart</em>, and it looks like this:</p>

<div class="vowel-chart" id="vowel-chart">
  <span class="vc-label" style="top:.4rem;left:.4rem;font-size:.5rem;opacity:.5">F2 HIGH (front) ←→ F2 LOW (back)</span>
  <span class="vc-label" style="top:.4rem;right:.4rem;font-size:.5rem;opacity:.5;transform:rotate(90deg);transform-origin:right top">F1: open ↓</span>
</div>

<div class="vocab"><span class="vt">"F1 / F2"</span> — the first and second formant frequencies. Not arbitrary. F1 correlates almost perfectly with jaw height: low jaw (open mouth) = high F1, high jaw (closed mouth) = low F1. F2 correlates with tongue position: tongue forward = high F2 (front vowels like /i/), tongue back = low F2 (back vowels like /u/). So the vowel chart is literally a map of your mouth position.</div>

<div class="vocab"><span class="vt">"Vowel Chart / IPA Trapezoid"</span> — a 2D map of F1 on the Y axis (inverted: low jaw at bottom) and F2 on the X axis. Every human language's vowels can be plotted here. The IPA (International Phonetic Alphabet) uses a stylized trapezoid version. What looks like an abstract diagram is actually a direct map of articulatory space — tongue height vs. tongue frontness.</div>

<p>The vowel chart is literally acoustic phonetics rendered as a filter-parameter map. The x-axis is F2 (tongue front-back). The y-axis is F1 (jaw open-close). Your whole mouth is just a two-parameter filter bank.</p>

<div class="step-card"><span class="step-num">CLASSIC VOWEL TARGETS (ENGLISH, MALE VOICE)</span>
/ɑ/ "father": F1=800, F2=1200 — wide open jaw, tongue back<br>
/æ/ "cat":    F1=730, F2=1900 — open jaw, tongue slightly forward<br>
/ɛ/ "bed":    F1=600, F2=1900 — mid-open, tongue forward<br>
/i/ "meet":   F1=280, F2=2620 — nearly closed jaw, tongue very forward<br>
/ɪ/ "bit":    F1=390, F2=1990 — relaxed high front<br>
/o/ "boat":   F1=450, F2=850  — rounded lips, tongue back<br>
/u/ "boot":   F1=310, F2=890  — tight rounding, tongue very back<br>
/ʌ/ "cup":    F1=640, F2=1190 — central, relaxed
</div>

<div class="spamton">Your <strong>entire lifetime</strong> of vowel production is a two-dimensional motor control problem. Babies spend months calibrating their jaw and tongue to hit specific (F1,F2) targets they heard from caregivers. They're doing nonlinear acoustic regression. <strong>With their face.</strong> Before they can walk.</div>

<div class="step-card"><span class="step-num">F3 — THE SECRET THIRD FORMANT</span>
F3 doesn't define vowel identity but it defines <em>speaker voice quality</em>. A low F3 (below 2200Hz) is the acoustic signature of American-English retroflex /r/ — the reason American English sounds so distinctive to non-American ears. Vocal tract length affects all formant values together: women's voices have higher formants across the board than men's because shorter vocal tracts have higher resonant frequencies. Same vowel target, different absolute Hz values.
</div>

<div class="challenge">Click /i/ on the vowel chart, then slowly drag F2 down toward 900 while keeping F1 at 280. You're moving from "ee" toward "oo" with only your tongue — jaw stays shut the whole time. Now try holding F2 at 1500 and dragging F1 from 300 up to 800. That's the jaw dropping while the tongue stays central — the path from "heed" toward "had." Diphthongs like the /aɪ/ in "I" are exactly this: a scheduled F1/F2 trajectory between two vowel targets, mid-sound.</div>



<p class="tip">>> TIP: click any vowel button on the chart above to jump the sliders directly to that vowel's F1/F2 and hear it immediately. Then try manually interpolating between two adjacent vowels — that slow glide between formant targets is exactly what a diphthong is (the /aɪ/ in "I" or /oʊ/ in "go").</p>`,
code:`// ── THE VOWEL SPACE — 3-FORMANT SYNTHESIZER ────────────────────────
// Three formants, configurable bandwidth.
// The vowel chart buttons in the lesson inject preset F1/F2 values.
// F3 adds vocal tract length / timbre character.

function makeSynth(audioCtx, params) {
  const _d = {f0:120, f1:800, f2:1200, f3:2500, bw:10};
  for(const k in _d) if(params[k]===undefined||isNaN(params[k])) params[k]=_d[k];

  const src = audioCtx.createOscillator();
  src.type = 'sawtooth';
  src.frequency.value = params.f0;

  // Pre-tilt: vocal tract has a natural high-frequency rolloff.
  // A gentle lowpass before the formants helps realism.
  const preTilt = audioCtx.createBiquadFilter();
  preTilt.type = 'lowpass';
  preTilt.frequency.value = 5000;
  preTilt.Q.value = 0.5;

  // Three parallel bandpass filters
  function makeFormant(freq, Q) {
    const f = audioCtx.createBiquadFilter();
    f.type = 'bandpass';
    f.frequency.value = freq;
    f.Q.value = Q;
    return f;
  }

  const f1 = makeFormant(params.f1, params.bw);
  const f2 = makeFormant(params.f2, params.bw * 1.2);
  const f3 = makeFormant(params.f3, params.bw * 0.8);

  // F1 is loudest in real speech, F2 next, F3 quieter
  const g1 = audioCtx.createGain(); g1.gain.value = 1.0;
  const g2 = audioCtx.createGain(); g2.gain.value = 0.7;
  const g3 = audioCtx.createGain(); g3.gain.value = 0.4;

  const master = audioCtx.createGain();
  master.gain.value = 0.5;

  src.connect(preTilt);
  preTilt.connect(f1); f1.connect(g1); g1.connect(master);
  preTilt.connect(f2); f2.connect(g2); g2.connect(master);
  preTilt.connect(f3); f3.connect(g3); g3.connect(master);

  return { node: master, osc: src, f1, f2, f3 };
}

function updateParams(nodes, params) {
  nodes.osc.frequency.value = params.f0;
  nodes.f1.frequency.value  = params.f1;
  nodes.f2.frequency.value  = params.f2;
  nodes.f3.frequency.value  = params.f3;
  // Q update handled by slider — add if needed
}
`},

{ subtitle:'03 — The Glottal Source', title:'Vocal Folds & The Glottal Pulse',
params:[
  {id:'f0',        label:'Pitch (F0, Hz)',    min:60,  max:500, step:1,   def:120},
  {id:'jitter',    label:'Pitch noise (jitter)',min:0,  max:0.05,step:.001, def:0.005},
  {id:'shimmer',   label:'Volume flutter (shimmer)', min:0,  max:0.3, step:.01, def:0.05},
  {id:'openQuot',  label:'Fold openness (OQ)',    min:0.3, max:0.9, step:.01, def:0.6},
  {id:'breathiness',label:'Breathiness',     min:0,   max:1,   step:.01, def:0.1},
],
body:`<p>Real voices aren't clean sawtooth waves. They're messy, alive, imperfect — and those imperfections are what make them sound <em>human</em>. The two most important micro-perturbations are <strong>jitter</strong> (pitch instability) and <strong>shimmer</strong> (amplitude instability). Strip these out and you get the flat, robotic quality of early TTS. Add too much and you get a sick or elderly voice. The narrow band in between is where all human phonation lives.</p>

<div class="vocab"><span class="vt">"Jitter"</span> — cycle-to-cycle variation in the period (duration) of each glottal pulse. Normal jitter in a healthy adult voice: ~0.5–1% of the fundamental period. Measured as a percentage: jitter% = average absolute difference between consecutive periods, divided by mean period. Elevated jitter (above ~2%) = hoarse or rough voice. Zero jitter = robot. Jitter is why no two vocal fold cycles are ever identical.</div>

<div class="vocab"><span class="vt">"Shimmer"</span> — cycle-to-cycle variation in the amplitude of each glottal pulse. Measured similarly as a percentage of average amplitude difference. Works with jitter but separately. High shimmer = breathiness or vocal fatigue. Both jitter and shimmer increase with age, illness, and vocal strain — which is why voice analysis can actually diagnose some laryngeal conditions.</div>

<div class="vocab"><span class="vt">"Open Quotient (OQ)"</span> — the fraction of each glottal cycle during which the folds are open (allowing air through). Low OQ = folds snap shut quickly = pressed, clear phonation (loud, bright). High OQ = folds stay open longer = breathy phonation (airy, soft). OQ is a primary controller of vocal effort quality — the difference between a shout and a whisper at the glottal level.</div>

<div class="step-card"><span class="step-num">THE GLOTTAL PULSE SHAPE — NOT A SAWTOOTH</span>
Real vocal fold vibration doesn't produce a perfect sawtooth. The actual glottal waveform has a smooth opening phase (air flows through as folds open) and a sharp closing phase (folds snap shut — the Bernoulli effect). This shape is called the <strong>Liljencrants-Fant (LF) model</strong>. Web Audio's <code>PeriodicWave</code> lets you specify arbitrary waveform shapes via Fourier coefficients — the open quotient slider below changes the ratio of opening to closing phase.
</div>

<div class="step-card"><span class="step-num">JITTER IMPLEMENTATION</span>
In code: perturb <code>osc.frequency</code> slightly every few milliseconds using <code>setValueAtTime()</code> with random deviations. The deviation is a percentage of the base F0, applied at irregular intervals to simulate cycle-to-cycle variation. This is a rough approximation — real jitter would require sample-level control, not AudioParam scheduling. But it's perceptually convincing at low values.
</div>

<div class="spamton">Your vocal folds vibrate at <strong>100–300 Hz</strong>. At 120 Hz that's 120 complete open-close cycles per second — each cycle lasting about 8 milliseconds. The folds themselves move only about <strong>1–2mm</strong> on each cycle. The air velocity through the glottis peaks at about <strong>40 m/s</strong>. This is happening in your throat right now as you breathe. It's fine. It's normal. It's extremely violent.</div>

<div class="challenge">Set jitter to 0 and shimmer to 0 — flat, robotic. Hit RUN. Now dial jitter up to 0.012 and shimmer to 0.08. Hit RUN again. That's the difference. Now push open quotient above 0.8 with breathiness at 0.5 — that's a breathy, airy voice. Pull open quotient to 0.2 with breathiness near 0 — that's pressed, tense phonation. The open quotient slider is the single control that sits between a shout and a whisper at the source level, before the filter even touches it.</div>



<p class="tip">>> TIP: set jitter=0 and shimmer=0 — that's the "robot voice" baseline. Now add jitter=0.008 and shimmer=0.05. The pitch wavers slightly and the amplitude fluctuates — suddenly it sounds alive. The difference between "synthetic" and "human" is literally a few random number generators applied to the right parameters.</p>`,
code:`// ── THE GLOTTAL SOURCE — JITTER, SHIMMER, OPEN QUOTIENT ────────────
// We approximate the LF glottal pulse using a PeriodicWave with
// harmonics shaped by the open quotient, then add jitter by continuously
// perturbing the oscillator frequency with a random walk, and shimmer
// by modulating a GainNode with a slowly drifting random signal.

function makeSynth(audioCtx, params) {
  const _d = {f0:120, jitter:0.005, shimmer:0.05, openQuot:0.6, breathiness:0.1};
  for(const k in _d) if(params[k]===undefined||isNaN(params[k])) params[k]=_d[k];

  const now = audioCtx.currentTime;

  // ── GLOTTAL WAVEFORM via PeriodicWave ────────────────────────
  // Approximate LF pulse: harmonics fall as 1/(n^openQuot_power).
  // Low OQ (pressed) → slow harmonic rolloff → bright.
  // High OQ (breathy) → fast rolloff → dark.
  const N = 48;
  const real = new Float32Array(N);
  const imag = new Float32Array(N);
  const rollPow = 1 + (1 - params.openQuot) * 1.5; // 1=breathy, 2.5=pressed
  for(let n=1; n<N; n++) {
    imag[n] = Math.pow(-1, n+1) / Math.pow(n, rollPow);
  }
  const wave = audioCtx.createPeriodicWave(real, imag, {disableNormalization:false});

  const src = audioCtx.createOscillator();
  src.setPeriodicWave(wave);
  src.frequency.value = params.f0;

  // ── JITTER: random walk on frequency each ~5ms ────────────────
  // Schedule many small random frequency perturbations ahead in time.
  // Each perturbation is ±(f0 * jitter) Hz.
  const jitterDepth = params.f0 * params.jitter;
  let t = now;
  const period = 0.005; // perturbation every 5ms
  for(let i=0; i<200; i++) {
    const drift = (Math.random() * 2 - 1) * jitterDepth;
    src.frequency.setValueAtTime(params.f0 + drift, t);
    t += period;
  }

  // ── SHIMMER: random amplitude variation ───────────────────────
  const shimGain = audioCtx.createGain();
  shimGain.gain.value = 1;
  let ts = now;
  for(let i=0; i<200; i++) {
    const sv = 1 + (Math.random() * 2 - 1) * params.shimmer;
    shimGain.gain.linearRampToValueAtTime(Math.max(0.001, sv), ts + 0.005);
    ts += 0.005;
  }

  // ── ASPIRATION NOISE ──────────────────────────────────────────
  const SR = audioCtx.sampleRate;
  const nBuf = audioCtx.createBuffer(1, SR * 2, SR);
  const nd = nBuf.getChannelData(0);
  for(let i=0;i<nd.length;i++) nd[i]=Math.random()*2-1;
  const noise = audioCtx.createBufferSource();
  noise.buffer = nBuf; noise.loop = true;
  const noiseGain = audioCtx.createGain();
  noiseGain.gain.value = params.breathiness * 0.35;

  // ── FORMANT CHAIN: series LPF approximating vocal tract ──────
  // Two serial filters give a basic vocal tract coloring.
  const f1 = audioCtx.createBiquadFilter();
  f1.type = 'bandpass'; f1.frequency.value = 800; f1.Q.value = 8;
  const f2 = audioCtx.createBiquadFilter();
  f2.type = 'bandpass'; f2.frequency.value = 1200; f2.Q.value = 10;

  const master = audioCtx.createGain();
  master.gain.value = 0.5;

  src.connect(shimGain);
  shimGain.connect(f1); f1.connect(master);
  shimGain.connect(f2); f2.connect(master);
  noise.connect(noiseGain); noiseGain.connect(master);

  noise.start();

  return { node: master, osc: src, noise, noiseGain, f1, f2, shimGain };
}

function updateParams(nodes, params) {
  // Jitter + shimmer re-scheduled on next PLAY (buffer approach)
  // Breathiness and formants update live:
  nodes.noiseGain.gain.value = params.breathiness * 0.35;
}
`},

// ─── 04 ──────────────────────────────────────────────────────────
{ subtitle:'04 — Noise & Bursts', title:'Consonants: Friction & Explosion',
params:[
  {id:'type',     label:'Consonant type', min:0, max:2, step:1, def:0},
  {id:'cutoff',   label:'Hiss cutoff (Hz)',               min:1000, max:10000, step:100, def:6000},
  {id:'Q',        label:'Resonance sharpness (Q)',                         min:0.5,  max:30,    step:0.5, def:3},
  {id:'burstDur', label:'Release burst length (ms)',                 min:5,    max:150,   step:5,   def:15},
  {id:'f0',       label:'Buzz pitch (F0, Hz)',                     min:0,    max:200,   step:1,   def:0},
],
body:`<p>Vowels are only part of the story. Consonants — especially stops, fricatives, and affricates — are where speech gets its rhythm, precision, and intelligibility. Each consonant class is produced by a completely different acoustic mechanism, and each one requires a different synthesis approach. This lesson builds all three.</p>

<div class="vocab"><span class="vt">"Fricative"</span> — a consonant produced by forcing air through a narrow constriction, creating turbulent noise. English fricatives: /s/, /z/, /f/, /v/, /ʃ/ (sh), /ʒ/ (measure), /θ/ (thin), /ð/ (the), /h/. The turbulence generates broadband noise, filtered by the constriction location. /s/ = tongue near alveolar ridge = high-frequency noise. /ʃ/ = tongue further back = lower, noisier. Voiceless fricatives = noise only. Voiced = noise + buzzing.</div>

<div class="vocab"><span class="vt">"Plosive / Stop"</span> — a consonant produced by fully blocking airflow, building pressure, then releasing it. English stops: /p/, /b/, /t/, /d/, /k/, /g/. The release burst is a brief (10–30ms) explosion of broadband noise followed immediately by the onset of voicing (for voiced stops). The burst frequency depends on place of articulation: bilabial /p b/ = low burst, alveolar /t d/ = mid-high, velar /k g/ = mid (and spread across frequencies).</div>

<div class="vocab"><span class="vt">"Voiced vs. Voiceless"</span> — the single most important binary distinction in consonant phonology. Voiced = vocal folds vibrating during consonant production (/b/, /d/, /g/, /z/, /v/). Voiceless = folds not vibrating (/p/, /t/, /k/, /s/, /f/). This is why "bat" and "pat" sound different — the only acoustic difference is the presence or absence of a buzzing oscillator underlying the consonant burst. In synthesis: add an oscillator = voiced; noise only = voiceless.</div>

<div class="step-card"><span class="step-num">VOICE ONSET TIME (VOT)</span>
For aspirated stops like English /p t k/, there's a delay (10–80ms) between the burst release and the onset of voicing. This delay is called <strong>VOT</strong> (Voice Onset Time). Short or negative VOT = voiced. Long positive VOT = aspirated voiceless. Spanish /p/ has nearly zero VOT — which is why Spanish speakers' English /b/ and /p/ sound confusable to native English ears. VOT is one of the primary cues that distinguishes voiced from voiceless stops across languages.
</div>

<div class="step-card"><span class="step-num">AFFRICATE = STOP + FRICATIVE</span>
An affricate is a stop release directly into a fricative at the same place of articulation. English has two: /tʃ/ (church) = alveolar stop release into palatal fricative. /dʒ/ (judge) = voiced version. They're not two sounds — they're one gesture with a two-phase release. In synthesis: schedule a burst noise source followed immediately by sustained filtered noise, with the second part longer.
</div>

<div class="artists">S, SH, F — compare English /s/ vs. /ʃ/ ("sip" vs. "ship") slowly. Feel where your tongue is. /s/ = tip touching or near the alveolar ridge (just behind your upper front teeth). /ʃ/ = tip pulled back slightly, blade of tongue up. The mouth position difference is ~5mm. The acoustic difference is about 3kHz of center frequency shift. Your ears can hear sub-centimeter tongue movements.</div>

<div class="challenge">Set type to fricative, cutoff to 6500, Q to 3 — that's /s/. Add voicing (F0 to 120) and it becomes /z/. Now move cutoff to 3000, Q to 5, voicing off — that's /ʃ/ (sh). Switch to plosive, cutoff to 5000, burst duration 10ms — /t/. Add voicing — /d/. You've now covered six English consonants by changing three numbers. Try constructing an affricate (/tʃ/ as in "church"): start with a brief plosive burst (type=2, burstDur=8), then immediately switch type to 1. That's the actual two-phase release.</div>



<p class="tip">>> TIP: set type to fricative, cutoff to 6500, Q to 3 — that's /s/. Now move cutoff to 3000 and Q to 4 — that's /ʃ/. Now drop to cutoff 2000, turn on voicing — that's approaching /ʒ/ (the middle consonant in "measure"). You're sliding along a spectral continuum that your ears have been discretizing into phoneme categories your whole life.</p>`,
code:`// ── 04 — CONSONANTS: FRICATIVES, AFFRICATES, PLOSIVES ───────────────
// Three consonant types, each with a different noise generation strategy.
// The key variable distinguishing consonants of the same class is WHERE
// in the frequency spectrum the noise energy lives — that's place of articulation.
function makeSynth(audioCtx, params) {
  const _d = {type:0, cutoff:6000, Q:4, burstDur:35, f0:0};
  for(const k in _d) if(params[k]===undefined||isNaN(params[k])) params[k]=_d[k];

  const now = audioCtx.currentTime;
  const tp  = Math.round(params.type); // 0=fricative, 1=affricate, 2=plosive
  const SR  = audioCtx.sampleRate;

  const master = audioCtx.createGain(); master.gain.value = 0.65;
  const allOscs = [];

  function makeNoise(dur) {
    const len = Math.ceil(SR * dur);
    const buf = audioCtx.createBuffer(1, len, SR);
    const d = buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i] = Math.random()*2-1;
    const ns = audioCtx.createBufferSource(); ns.buffer = buf;
    return ns;
  }

  // ── FRICATIVE FILTER CHAIN ─────────────────────────────────────────
  // Two filters in series: HPF removes everything below the noise floor,
  // peaking EQ shapes the spectral peak at the constriction frequency.
  // This peak IS the distinguishing feature — /s/ vs /ʃ/ vs /f/ is
  // almost entirely the center frequency of this peak.
  function makeFricFilter(cutoff, Q) {
    const hpf = audioCtx.createBiquadFilter();
    hpf.type = 'highpass';
    hpf.frequency.value = cutoff * 0.45; // HPF below the peak
    hpf.Q.value = 0.7;
    const peak = audioCtx.createBiquadFilter();
    peak.type = 'peaking';
    peak.frequency.value = cutoff;
    peak.Q.value = Q;
    peak.gain.value = 12; // 12dB boost at the spectral center
    hpf.connect(peak);
    return { input: hpf, output: peak };
  }

  // ── VOICING OSCILLATOR ─────────────────────────────────────────────
  // Voiced consonants (/z/, /v/, /dʒ/) add a quiet sawtooth buzz
  // filtered to the lower formant region (~200–500Hz).
  // The noise stays dominant — buzz adds the "gravel" underneath.
  let voiceOsc = null;
  if(params.f0 > 10) {
    voiceOsc = audioCtx.createOscillator();
    voiceOsc.type = 'sawtooth';
    voiceOsc.frequency.value = params.f0;
    const vBPF = audioCtx.createBiquadFilter();
    vBPF.type = 'bandpass'; vBPF.frequency.value = 380; vBPF.Q.value = 2;
    const vGain = audioCtx.createGain(); vGain.gain.value = 0.22;
    voiceOsc.connect(vBPF); vBPF.connect(vGain); vGain.connect(master);
    voiceOsc.start(now);
    allOscs.push(voiceOsc);
  }

  const burstDurS = params.burstDur / 1000;

  if(tp === 0) {
    // ── FRICATIVE: continuous turbulent noise ──────────────────────────
    const dur = 1.4;
    const ns  = makeNoise(dur);
    const filt = makeFricFilter(params.cutoff, params.Q);
    const env  = audioCtx.createGain();
    env.gain.setValueAtTime(0, now);
    env.gain.linearRampToValueAtTime(0.9, now + 0.012); // 12ms onset
    env.gain.setValueAtTime(0.9, now + dur - 0.06);
    env.gain.linearRampToValueAtTime(0, now + dur);
    ns.connect(filt.input); filt.output.connect(env); env.connect(master);
    ns.start(now); ns.stop(now + dur + 0.02);
    allOscs.push(ns);

  } else if(tp === 1) {
    // ── AFFRICATE: stop closure → burst → fricative (e.g. /tʃ/ "ch") ──
    // The closure is silence (already there — nothing fires yet).
    // Then: short bandpass burst, then fricative takes over.
    const closureDur = 0.030; // 30ms stop closure

    // Burst — place-specific bandpass
    const burstNs = makeNoise(burstDurS);
    const burstBPF = audioCtx.createBiquadFilter();
    burstBPF.type = 'bandpass'; burstBPF.frequency.value = params.cutoff * 0.6; burstBPF.Q.value = 3;
    const burstEnv = audioCtx.createGain();
    burstEnv.gain.setValueAtTime(0, now + closureDur);
    burstEnv.gain.linearRampToValueAtTime(1.0, now + closureDur + 0.003);
    burstEnv.gain.exponentialRampToValueAtTime(0.001, now + closureDur + burstDurS);
    burstNs.connect(burstBPF); burstBPF.connect(burstEnv); burstEnv.connect(master);
    burstNs.start(now + closureDur); burstNs.stop(now + closureDur + burstDurS + 0.01);

    // Fricative follows immediately
    const fricStart = now + closureDur + burstDurS;
    const fricDur   = 1.0;
    const fricNs = makeNoise(fricDur);
    const filt   = makeFricFilter(params.cutoff, params.Q);
    const fricEnv = audioCtx.createGain();
    fricEnv.gain.setValueAtTime(0, fricStart);
    fricEnv.gain.linearRampToValueAtTime(0.85, fricStart + 0.015);
    fricEnv.gain.exponentialRampToValueAtTime(0.001, fricStart + fricDur);
    fricNs.connect(filt.input); filt.output.connect(fricEnv); fricEnv.connect(master);
    fricNs.start(fricStart); fricNs.stop(fricStart + fricDur + 0.01);
    allOscs.push(burstNs, fricNs);

  } else {
    // ── PLOSIVE: closure → burst → aspiration (VOT) ────────────────────
    // The three-phase structure is the key thing about English stops:
    //   1. Closure: silence while the stop builds up (30ms)
    //   2. Burst: the release — loud, brief, place-specific (burstDurS)
    //   3. Aspiration: breath noise during VOT before voicing starts (~60ms)
    //      This is what makes /p/ /t/ /k/ sound English — Spanish stops skip it.
    const closureDur = 0.030;
    const votDur     = 0.065;

    // BURST
    const burstNs = makeNoise(burstDurS + 0.01);
    const burstBPF = audioCtx.createBiquadFilter();
    burstBPF.type = 'bandpass'; burstBPF.frequency.value = params.cutoff; burstBPF.Q.value = params.Q;
    const burstEnv = audioCtx.createGain();
    burstEnv.gain.setValueAtTime(0, now + closureDur);
    burstEnv.gain.linearRampToValueAtTime(1.1, now + closureDur + 0.003); // snappy 3ms attack
    burstEnv.gain.exponentialRampToValueAtTime(0.001, now + closureDur + burstDurS);
    burstNs.connect(burstBPF); burstBPF.connect(burstEnv); burstEnv.connect(master);
    burstNs.start(now + closureDur); burstNs.stop(now + closureDur + burstDurS + 0.01);

    // ASPIRATION (VOT)
    const aspStart = now + closureDur + burstDurS;
    const aspNs = makeNoise(votDur + 0.02);
    const aspHPF = audioCtx.createBiquadFilter();
    aspHPF.type = 'highpass'; aspHPF.frequency.value = 1200; aspHPF.Q.value = 0.5;
    const aspEnv = audioCtx.createGain();
    aspEnv.gain.setValueAtTime(0, aspStart);
    aspEnv.gain.linearRampToValueAtTime(0.4, aspStart + 0.010);
    aspEnv.gain.setValueAtTime(0.4, aspStart + votDur * 0.7);
    aspEnv.gain.exponentialRampToValueAtTime(0.001, aspStart + votDur);
    aspNs.connect(aspHPF); aspHPF.connect(aspEnv); aspEnv.connect(master);
    aspNs.start(aspStart); aspNs.stop(aspStart + votDur + 0.02);

    allOscs.push(burstNs, aspNs);
  }

  if(voiceOsc) {
    const voiceDur = tp===0 ? 1.4 : tp===1 ? 1.2 : (burstDurS + 0.1);
    voiceOsc.stop(now + voiceDur + 0.05);
  }

  const stopAt = now + (tp===0 ? 1.45 : tp===1 ? 1.1 : (0.030 + burstDurS + 0.075));
  const primaryOsc = voiceOsc || allOscs[0];
  return { node: master, osc: primaryOsc, allOscs, stopAt };
}

function updateParams(nodes, params) {}`},

{ subtitle:'05 — The Complete Tract', title:'Five Formants & The Full Voice',
params:[
  {id:'f0',  label:'Pitch (F0, Hz)',   min:80,  max:400, step:1,   def:120},
  {id:'f1',  label:'Jaw height (F1, Hz)',         min:250, max:900, step:5,   def:800},
  {id:'f2',  label:'Tongue position (F2, Hz)',         min:700, max:2800,step:5,   def:1200},
  {id:'f3',  label:'Upper ring (F3, Hz)',         min:1800,max:3500,step:10,  def:2500},
  {id:'f4',  label:'Presence (F4, Hz)',         min:3000,max:4500,step:20,  def:3500},
  {id:'f5',  label:'Brilliance (F5, Hz)',         min:4000,max:5500,step:20,  def:4500},
  {id:'noise',label:'Breathiness',    min:0,   max:0.5, step:.01, def:0.08},

body:`<p>Real speech uses five or more resonant peaks simultaneously, each carrying different information about the speaker and the sound. The first two formants define the vowel. The third defines the speaker's distinctive vocal quality. Four and five add richness and the high-frequency "brilliance" that makes a voice carry in a room. This lesson builds a five-formant synthesizer and shows you what each resonance contributes.</p>

<div class="vocab"><span class="vt">"Spectral Envelope"</span> — the smooth curve connecting the tops of the harmonics when you look at a voiced sound's frequency spectrum. Formants are the peaks in this envelope. The spectral envelope is what carries vowel identity and voice quality — it's what TTS models are actually generating (via mel spectrograms, which are a compressed representation of this envelope). Individual harmonics vary; the envelope stays relatively stable across pitch changes.</div>

<div class="vocab"><span class="vt">"Bandwidth"</span> — how wide a formant peak is. A narrow bandwidth (high Q) = strong, resonant peak = formant is clearly defined = vowel sounds pure. Wide bandwidth (low Q) = smeared peak = vowel sounds muddy or nasal. Formant bandwidths widen with increasing formant number: F1 has the narrowest bandwidth, F5 the widest. Nasal sounds and nasalized vowels have extra-wide bandwidths because the nasal cavity adds damping.</div>

<div class="step-card"><span class="step-num">WHAT EACH FORMANT CARRIES</span>
F1: jaw height / vowel openness — the single strongest cue for vowel identity<br>
F2: tongue front-back position — second strongest vowel cue<br>
F3: vocal tract length idiosyncrasy, r-coloring (low F3 = retroflex)<br>
F4: overall voice quality, "nasality" character<br>
F5: the "ring" or "brilliance" — the energy that makes a voice project<br><br>
In practice, listeners use mostly F1 and F2 for vowel identification. F3–F5 contribute to speaker identity and voice quality but rarely change the <em>word</em> being perceived.
</div>

<div class="step-card"><span class="step-num">AMPLITUDE ROLLOFF — WHY HIGHER FORMANTS ARE QUIETER</span>
Real speech has a natural high-frequency rolloff: about -12dB per octave from the glottal source, partially compensated by the vocal tract resonances. F1 is the loudest formant, F2 quieter, F3 quieter still. The code uses an exponential gain rolloff per formant to approximate this. Without it, the synthesis sounds unnaturally bright — all formants equal loudness is not what a real mouth sounds like.
</div>

<div class="artists">Listen to any good operatic voice on headphones, preferably a dramatic soprano or a heldentenor. The "ring" that cuts through an orchestra — that's the singer's formant: a cluster of F3–F5 boosted around 2500–3500Hz. It's not about loudness; it's about spectral specificity. A singer trained to produce that cluster projects further than an untrained voice at the same SPL. You're hearing F3–F5 doing work that F1–F2 cannot.</div>

<div class="challenge">Start with F1=800, F2=1200 (/ɑ/ — open "ahh"). Now morph it toward a female voice: raise all five formants by about 15% (multiply each by 1.15). The voice brightens noticeably — that's shorter throat length shifting every resonance up simultaneously. Now raise F5 from wherever it is to about 3200 and notice the ring that appears — that's the singer's formant region. Drop noise to near zero. You've just sculpted a pressed operatic voice. Every parameter you touched maps to something a real throat does.</div>



<p class="tip">>> TIP: start with F1=800, F2=1200 (open /ɑ/ vowel). Now slowly raise F5 toward 4000Hz and notice how the voice starts to "ring" or project — more presence, more forward energy. Then reduce the noise slider to near zero and notice how the voice loses its breathiness and becomes more pressed and clear. You're controlling the source-filter model from both ends simultaneously.</p>`,
code:`// ── FIVE-FORMANT VOCAL SYNTHESIZER ─────────────────────────────────
// Full voice model: glottal source + 5 parallel formant filters
// + aspiration noise. Amplitude roll-off mimics natural speech.
// Drag all 7 sliders to sculpt different voices and vowels.

function makeSynth(audioCtx, params) {
  const _d = {f0:120, f1:800, f2:1200, f3:2500, f4:3500, f5:4500, noise:0.08};
  for(const k in _d) if(params[k]===undefined||isNaN(params[k])) params[k]=_d[k];

  // ── GLOTTAL SOURCE ────────────────────────────────────────────
  const src = audioCtx.createOscillator();
  src.type = 'sawtooth';
  src.frequency.value = params.f0;

  // Pre-tilt: simulate glottal source spectral slope (-12dB/oct approx)
  const preTilt = audioCtx.createBiquadFilter();
  preTilt.type = 'lowpass';
  preTilt.frequency.value = 4000;
  preTilt.Q.value = 0.5;

  // ── ASPIRATION NOISE ──────────────────────────────────────────
  const SR = audioCtx.sampleRate;
  const nBuf = audioCtx.createBuffer(1, SR*2, SR);
  const nd = nBuf.getChannelData(0);
  for(let i=0;i<nd.length;i++) nd[i]=Math.random()*2-1;
  const noise = audioCtx.createBufferSource();
  noise.buffer = nBuf; noise.loop = true;
  const noiseGain = audioCtx.createGain();
  noiseGain.gain.value = params.noise;

  // ── FIVE FORMANT FILTERS ──────────────────────────────────────
  const formantData = [
    {f:params.f1, q:10,  g:1.0},
    {f:params.f2, q:11,  g:0.65},
    {f:params.f3, q:10,  g:0.42},
    {f:params.f4, q:15,  g:0.22},
    {f:params.f5, q:15,  g:0.12},
  ];

  const master = audioCtx.createGain();
  master.gain.value = 0.45;

  const formants = formantData.map(({f, q, g}) => {
    const bpf = audioCtx.createBiquadFilter();
    bpf.type = 'bandpass';
    bpf.frequency.value = f;
    bpf.Q.value = q;

    const gn = audioCtx.createGain();
    gn.gain.value = g;

    // Glottal source (pre-tilted) → formant → gain → output
    src.connect(preTilt);
    preTilt.connect(bpf);
    bpf.connect(gn);
    gn.connect(master);

    // Noise also through same formants (aspiration gets shaped too)
    const nbpf = audioCtx.createBiquadFilter();
    nbpf.type = 'bandpass'; nbpf.frequency.value = f; nbpf.Q.value = q;
    const ngn = audioCtx.createGain(); ngn.gain.value = g * 0.5;
    noise.connect(noiseGain);
    noiseGain.connect(nbpf); nbpf.connect(ngn); ngn.connect(master);

    return bpf;
  });

  noise.start();

  return {
    node: master, osc: src, noise, noiseGain,
    f1: formants[0], f2: formants[1], f3: formants[2],
    f4: formants[3], f5: formants[4]
  };
}

function updateParams(nodes, params) {
  nodes.osc.frequency.value  = params.f0;
  nodes.f1.frequency.value   = params.f1;
  nodes.f2.frequency.value   = params.f2;
  nodes.f3.frequency.value   = params.f3;
  nodes.f4.frequency.value   = params.f4;
  nodes.f5.frequency.value   = params.f5;
  nodes.noiseGain.gain.value = params.noise;
}
`},

{ subtitle:'06 — Prosody', title:'The Music of Speech',
params:[
  {id:'contour', label:'Sentence type', min:0, max:2, step:1,  def:0},
  {id:'f0base',  label:'Speaking pitch (F0, Hz)',                     min:80, max:280, step:1, def:120},
  {id:'range',   label:'Pitch range (semitones)',             min:1,  max:16, step:0.5, def:7},
  {id:'sylRate', label:'Syllable speed (Hz)',                  min:1,  max:8,  step:0.25, def:3.5},
],
body:`<p>Say "I didn't say she stole the money" seven times, stressing a different word each time. The meaning shifts completely — accusation, denial, deflection — without changing a single phoneme. That's <strong>prosody</strong>: the musical layer underneath speech that carries meaning the phonemes themselves can't express.</p>

<div class="vocab"><span class="vt">"Prosody"</span> — the pitch, rhythm, stress, and phrasing that span across an utterance. Called "suprasegmental" because it operates above the phoneme level. Two speakers can say the exact same phoneme sequence with completely different meaning, emotion, or grammar just by changing the prosody.</div>

<div class="vocab"><span class="vt">"Pitch contour (F0 contour)"</span> — the curve your pitch traces across a whole phrase. English statements end falling (starting around 140Hz, landing near 90Hz for a male voice). Yes/no questions end rising. Emphasis peaks sharply and falls fast. These aren't grammar rules — infants respond to these contours before they understand any words.</div>

<div class="vocab"><span class="vt">"AudioParam Automation"</span> — Web Audio's scheduling system. <code>linearRampToValueAtTime(v, t)</code> for straight-line pitch changes. <code>exponentialRampToValueAtTime(v, t)</code> for curves that sound natural to the ear (use this for rising pitch — frequency is perceived logarithmically). <code>setValueCurveAtTime(array, t, dur)</code> for arbitrary shapes. You can draw the entire pitch curve of a sentence before a single sample plays.</div>

<div class="step-card"><span class="step-num">STRESS ISN'T JUST LOUDER</span>
When you stress a syllable, three things happen at once: the pitch rises (3–5 semitones above surrounding speech), the duration stretches (1.3–2× an unstressed syllable), and the volume nudges up slightly. All three fire together. Early TTS systems often only raised pitch and got the timing wrong — and listeners immediately heard it as unnatural. Duration is the thing people are most sensitive to; get the rhythm wrong and the whole sentence feels off.
</div>

<div class="step-card"><span class="step-num">SCHEDULING A PITCH CURVE IN CODE</span>
A statement falls: <code>fp.setValueAtTime(f0 * 1.08, now)</code> then <code>fp.linearRampToValueAtTime(f0 * 0.82, now + dur)</code>. A question rises at the end — hold pitch until 72% through, then <code>fp.exponentialRampToValueAtTime(f0 * 1.45, now + dur)</code>. Use exponential for rises, not linear: a linear Hz ramp sounds like it slows down as it climbs because pitch perception is logarithmic.
</div>

<div class="step-card"><span class="step-num">TONAL LANGUAGES — PITCH AS VOCABULARY</span>
In English, pitch changes meaning at the sentence level. In Mandarin, Vietnamese, Yoruba — roughly 70% of the world's languages — pitch changes meaning at the syllable level. Mandarin "ma" means mother (˥), hemp (˧˥), horse (˨˩˦), or scold (˥˩) depending on the contour you use. Getting a tone wrong doesn't produce an accent. It produces a different word. Building TTS for these languages means predicting lexical tones from text — a problem English TTS doesn't have at all.
</div>

<div class="step-card"><span class="step-num">STRESS-TIMED VS SYLLABLE-TIMED</span>
English is stress-timed: stressed syllables occur at roughly equal intervals, and unstressed syllables compress to fit in between. The result is an uneven, bouncy rhythm. French, Spanish, and Mandarin are syllable-timed: every syllable gets roughly equal time. This is why English sounds "choppy" to French speakers and French sounds "flat and fast" to English ears. TTS for English that doesn't compress unstressed syllables sounds foreign — rhythm carries as much information as pitch does.
</div>

<div class="spamton">A singing teacher and a speech scientist are studying the same thing. The difference between speech melody and a sung melody is <strong>basically just precision and duration</strong> — speech pitch drifts freely, singing locks to discrete notes. The F0 contours are the same type of object. When a pop singer "speaks" a lyric rather than singing it, they're choosing to let pitch be free rather than locked. <strong>You've been doing prosody your whole life. You just didn't have a word for it.</strong></div>

<div class="challenge">In the code editor, change <code>f0 * 0.82</code> (the statement's landing pitch) to <code>f0 * 1.35</code>. You've turned a statement into a question. Now switch to emphasis mode and push the peak ratio to <code>f0 * 1.8</code> — that's a shout. Move the peak earlier: <code>now + 0.04</code> instead of <code>now + 0.12</code>. Same height, faster attack, angrier read. The timing of the peak matters more than the height.</div>

<p class="tip">>> TIP: real pitch contours are never perfectly smooth — they bump at syllable boundaries and drift slightly in between. If your synthesis sounds glassy or mechanical, scatter small random offsets across the contour: <code>f0 * (1 + Math.random() * 0.02)</code> at each scheduled point. That's the texture of a human voice thinking while it speaks.</p>`,
code:`// ── 06 — PROSODY: F0 contour shaping + syllable-rate AM ────────────
// This synth has no fixed pitch — it draws a pitch *curve* across time.
// The curve shape is what carries grammatical and emotional meaning.
function makeSynth(ctx, p) {
  const now  = ctx.currentTime;
  const dur  = 1.8;
  const f0   = p.f0base;

  // ratio: how far the pitch can deviate from base, in frequency space
  // Math.pow(2, semitones/12) converts semitones → frequency multiplier.
  // e.g. 7 semitones = ratio ~1.5 (a perfect fifth above f0)
  const ratio = Math.pow(2, p.range / 12);

  // ── GLOTTAL SOURCE ────────────────────────────────────────────────
  // Sawtooth into two formants — same engine as L01, but now pitch moves.
  const osc = ctx.createOscillator();
  osc.type = 'sawtooth';

  const f1n = ctx.createBiquadFilter();
  f1n.type = 'bandpass'; f1n.frequency.value = 500; f1n.Q.value = 8;
  const f2n = ctx.createBiquadFilter();
  f2n.type = 'bandpass'; f2n.frequency.value = 1600; f2n.Q.value = 10;

  // ── F0 CONTOUR SCHEDULING ─────────────────────────────────────────
  // We pre-schedule the entire pitch trajectory before any audio plays.
  // AudioParam ramps let us describe the contour as a series of targets.
  const fp = osc.frequency;

  if (p.contour < 0.5) {
    // STATEMENT: gentle fall from slightly above base to below.
    // English declarative = pitch falls at the end. This is not a rule —
    // it's a phonetic universal. Infants respond to it before any words.
    fp.setValueAtTime(f0 * 1.08, now);
    fp.linearRampToValueAtTime(f0 * 0.82, now + dur);

  } else if (p.contour < 1.5) {
    // QUESTION (yes/no): flat through most of phrase, then a final rise.
    // Hold base pitch until 72% through — then spike up.
    // exponentialRampToValueAtTime sounds more natural than linear for rises
    // because pitch is perceived logarithmically (like all frequency).
    fp.setValueAtTime(f0, now);
    fp.linearRampToValueAtTime(f0, now + dur * 0.72);
    fp.exponentialRampToValueAtTime(f0 * ratio, now + dur);

  } else {
    // EMPHASIS: fast rise to peak, then steep fall.
    // The fast attack (0.12s) is what marks it as emphatic rather than
    // just "high pitched." Same height but slow rise sounds like singing.
    fp.setValueAtTime(f0, now);
    fp.linearRampToValueAtTime(f0 * ratio, now + 0.12);
    fp.exponentialRampToValueAtTime(f0 * 0.72, now + dur);
  }

  // ── SYLLABLE-RATE AMPLITUDE MODULATION ────────────────────────────
  // Real speech has amplitude bumps at each syllable — the voice swells
  // and dips as muscles fire for each stressed/unstressed pair.
  // Simulating this: a low-frequency oscillator (LFO) modulates the gain.
  // sylRate controls how fast the bumps come (syllables per second).
  const sylLFO = ctx.createOscillator();
  sylLFO.type = 'sine';
  sylLFO.frequency.value = p.sylRate;
  const sylGain = ctx.createGain();
  sylGain.gain.value = 0.35;   // depth of the modulation
  const sylBase = ctx.createGain();
  sylBase.gain.value = 0.65;   // base level (so it never goes to zero)
  sylLFO.connect(sylGain);
  sylGain.connect(sylBase.gain);  // LFO drives the gain node's gain param

  // ── SIGNAL CHAIN ──────────────────────────────────────────────────
  const mix = ctx.createGain(); mix.gain.value = 0.55;
  osc.connect(f1n); f1n.connect(mix);
  osc.connect(f2n); f2n.connect(mix);
  mix.connect(sylBase);  // formant output feeds the sylBase gain node

  // Sentence-level envelope: fade in, sustain, fade out
  const env = ctx.createGain();
  env.gain.setValueAtTime(0, now);
  env.gain.linearRampToValueAtTime(1, now + 0.05);
  env.gain.setValueAtTime(1, now + dur - 0.12);
  env.gain.linearRampToValueAtTime(0, now + dur);
  sylBase.connect(env);

  osc.start(now);    osc.stop(now + dur);
  sylLFO.start(now); sylLFO.stop(now + dur);

  return { node: env, osc, stopAt: now + dur, allOscs: [osc, sylLFO] };
}

function updateParams(nodes, p) {
  // F0 contour is pre-scheduled — it can't be updated mid-sound.
  // Hit RUN again to hear a new contour shape.
}` },

  {id:'v1f1',    label:'V1 jaw height (F1)',    min:200, max:900, step:10, def:280},
  {id:'v1f2',    label:'V1 tongue (F2)',    min:700, max:2800,step:20, def:2620},

body:`<p>There is no isolated /d/. The "d" in "dig" sounds different from the "d" in "dog" because your mouth is already moving toward the next vowel while making the consonant. Every sound bleeds into the next — and this blending, called <strong>coarticulation</strong>, is why the first naive speech synthesizers sounded like a broken answering machine.</p>

<div class="vocab"><span class="vt">"Coarticulation"</span> — the overlapping articulation of neighboring sounds. Your tongue, jaw, lips, and soft palate don't wait for one phoneme to finish before starting the next. Every sound is different depending on its neighbors. There's no context-free version of any consonant in real, continuous speech.</div>

<div class="vocab"><span class="vt">"Formant transition"</span> — the movement of a resonance peak (formant) as the mouth changes shape between phoneme targets. The key finding from Haskins Laboratories in the 1950s: a consonant's identity lives mostly in the transition it causes in surrounding vowels — not in the consonant itself. Cut the burst off a /d/ and listeners still hear /d/. Cut the transition instead and the consonant vanishes. The consonant is essentially movement instructions written in the vowel trajectory.</div>

<div class="vocab"><span class="vt">"Locus equation"</span> — the pattern describing where a tongue-position transition appears to originate from: F2_onset = k × F2_vowel + locus. Each place in the mouth has a characteristic locus. Lip sounds (/p b m/): ~700Hz. Tongue-behind-teeth sounds (/t d n/): ~1800Hz. Back-of-mouth sounds (/k g/): ~3000Hz. Even through a bad phone connection, the trajectory tells you where the consonant was made.</div>

<div class="step-card"><span class="step-num">CHAINING FORMANT TARGETS IN WEB AUDIO</span>
Building a word means scheduling formant ramps in sequence: <code>f1n.frequency.setValueAtTime(phoneA_F1, t)</code> to lock on phoneme A, then <code>f1n.frequency.linearRampToValueAtTime(phoneB_F1, t + transition)</code> to glide to B. Transition timing matters a lot: 20–40ms for a stop into a vowel, 40–80ms between vowels, 80–120ms for glides like /w/ and /y/. Too short = an audible click. Too long = the vowel identity blurs. The window where this sounds like actual speech is surprisingly small.
</div>

<div class="step-card"><span class="step-num">UNDERSHOOT</span>
At normal speaking rate, the mouth never fully reaches each sound's target formant values before moving on. Unstressed vowels often only hit 60–75% of their target. Native listeners compensate automatically — the brain reads the trajectory, not the endpoint. Non-native listeners hear mumbling because they're trying to decode each phoneme independently. Ironically, TTS that hits every target precisely sounds slightly robotic: too accurate, not enough mess.
</div>

<div class="step-card"><span class="step-num">A MINIMAL DIPHONE TABLE</span>
A basic formant synthesizer needs a lookup table: for each sound pair, store the starting and ending resonance values, the duration, and the crossfade time. Something like: <code>{"d_ae": {f1s:300, f2s:1800, f1e:700, f2e:1800, dur:0.10}}</code>. Chain entries by matching the end values of one to the start of the next. That's Vocaloid's parameter editor in miniature — and what neural TTS learns automatically from thousands of hours of recorded speech.
</div>

<div class="step-card"><span class="step-num">VOWEL REDUCTION</span>
Unstressed syllables don't just get shorter — their vowels migrate toward the neutral "uh" sound (schwa, /ə/ — roughly F1≈500, F2≈1500). "Photograph" has a full rounded vowel. "Photography" — same spelling, different stress — reduces that vowel to schwa. English spelling never tells you which vowels reduce. Speakers who produce every vowel at full quality sound overly formal. Models have to learn reduction from data; no rule set can describe it.
</div>

<div class="artists">Say "butter" at normal speed. American English: "budder." The /t/ became a flap /ɾ/ — a single tap of the tongue, about 20ms, acoustically between /t/ and /d/. The tongue didn't have time to complete a full stop closure at natural rate, so coarticulation just... changed the phoneme. Every accent has its own version of this. Scottish English keeps the /t/ crisp. Brazilian Portuguese does something different again. Same word, different physics.</div>

<div class="challenge">Extend the word synthesizer: add a third vowel state after the existing two. Schedule V1 → nasal segment (try F1=300, F2=1100, about 50ms) → V2. You've built something like /man/ or /min/ depending on your second vowel. Then try replacing the nasal with silence (set gain near-zero for 40ms). That silence is a stop consonant's closure phase. The abrupt formant jump when gain comes back is the release burst. You've assembled a plosive from nothing but an envelope and four numbers.</div>

<p class="tip">>> TIP: in ⬡ SEQ, stack a vowel row and a fricative row on the same step — they fire simultaneously. The vowel's buzz plus the fricative's filtered noise: that's voiced fricative synthesis. /z/ is literally just sawtooth + high-Q noise highpass playing at the same time. Coarticulation at the sequencer level.</p>`,
code:`// ── 07 — COARTICULATION: smooth formant transitions between vowels ──
// This synth demonstrates the core mechanic of coarticulation:
// formants don't jump discretely — they ramp from one target to the next.
// The ramp IS the consonant. The target IS the vowel.
// Everything else in this lesson flows from that one idea.
function makeSynth(ctx, p) {
  const now   = ctx.currentTime;
  const segMs = 0.28;             // how long each vowel "holds" (seconds)
  const trans = p.transMs / 1000; // transition window — the coarticulation
  const dur   = segMs * 2 + trans + 0.05;

  // ── GLOTTAL SOURCE ─────────────────────────────────────────────────
  const osc = ctx.createOscillator();
  osc.type = 'sawtooth';
  osc.frequency.value = p.f0;

  // ── FORMANT FILTERS ────────────────────────────────────────────────
  // Two bandpass filters — F1 (jaw height) and F2 (tongue position).
  // We'll move their center frequencies over time to simulate the
  // vocal tract smoothly changing shape between the two vowels.
  const f1n = ctx.createBiquadFilter();
  f1n.type = 'bandpass'; f1n.Q.value = 10;
  const f2n = ctx.createBiquadFilter();
  f2n.type = 'bandpass'; f2n.Q.value = 12;

  // ── TRANSITION SCHEDULING ─────────────────────────────────────────
  // At 'now': lock F1/F2 to vowel 1 targets (V1).
  // After segMs + trans seconds: F1/F2 arrive at vowel 2 targets (V2).
  // The linearRamp describes the coarticulation window.
  // Try transMs=10 (abrupt click) vs transMs=150 (diphthong glide) —
  // the perceptual difference is enormous for such a small timing change.
  f1n.frequency.setValueAtTime(p.v1f1, now);
  f2n.frequency.setValueAtTime(p.v1f2, now);

  f1n.frequency.linearRampToValueAtTime(p.v2f1, now + segMs + trans);
  f2n.frequency.linearRampToValueAtTime(p.v2f2, now + segMs + trans);

  // ── SIGNAL CHAIN ──────────────────────────────────────────────────
  const env = ctx.createGain();
  env.gain.setValueAtTime(0, now);
  env.gain.linearRampToValueAtTime(0.65, now + 0.03);
  env.gain.setValueAtTime(0.65, now + dur - 0.06);
  env.gain.linearRampToValueAtTime(0, now + dur);

  osc.connect(f1n); f1n.connect(env);
  osc.connect(f2n); f2n.connect(env);

  osc.start(now); osc.stop(now + dur + 0.05);

  return { node: env, osc, stopAt: now + dur };
}

function updateParams(nodes, p) {
  // Transitions are pre-scheduled — restart to hear new target values.
  // Try: V1 = /i/ (F1=280, F2=2620) + V2 = /ɑ/ (F1=800, F2=1200).
  // Then narrow the transition time to ~15ms and hear the abrupt click
  // at the boundary — that's the sound of formants with no coarticulation.
}` },

{ subtitle:'08 — LPC & Vocoders', title:'Stealing a Vocal Tract',
params:[
  {id:'bands',  label:'Bands',          min:4,  max:32, step:1,  def:16},
  {id:'carrier',label:'Carrier type',   min:0,  max:2,  step:1,  def:1},
  {id:'f0',     label:'Carrier pitch (F0, Hz)',      min:60, max:300,step:1,  def:130},
  {id:'vowel',  label:'Vowel — ɑ i u ɛ',       min:0,  max:3,  step:1,  def:0},
  {id:'tilt',   label:'High-frequency rolloff',    min:0,  max:1,  step:0.05,def:0.6},

body:`<p>Can you compress a phone call down to 10 numbers every 20 milliseconds and still have it sound like the person? <strong>Linear Predictive Coding</strong> says yes — because those 10 numbers, chosen correctly, describe the shape of the vocal tract well enough to reconstruct the sound. It's been doing this in phone codecs and speech assistants since the 1970s.</p>

<div class="vocab"><span class="vt">"LPC (Linear Predictive Coding)"</span> — models the vocal tract as an all-pole filter. Each speech sample is approximately a weighted sum of the previous ~10 samples: s(n) ≈ a₁·s(n-1) + a₂·s(n-2) + ... + aₚ·s(n-p) + e(n). The coefficients {a₁…aₚ} encode the tract shape. The residual e(n) — what the predictor got wrong — encodes the source. Send just those two things and the receiver reconstructs your voice.</div>

<div class="vocab"><span class="vt">"Cepstrum / MFCC"</span> — the cepstrum is the "spectrum of the log spectrum." It mathematically separates the slow-moving spectral envelope (the resonance peaks) from the fast-varying harmonic structure (the pitch). MFCCs apply a mel-scale filterbank first — squishing the frequency axis to match how the ear works — then keep only ~13 numbers. Those 13 numbers, extracted 50 times per second, ran every commercial voice system from around 1980 to 2015.</div>

<div class="vocab"><span class="vt">"Vocoder"</span> — splits a signal into N frequency bands, extracts the volume envelope in each band, then applies those envelopes to shape a carrier signal through the same bands. The carrier takes on the resonant character and rhythm of the modulator. Invented at Bell Labs in 1939 to compress phone calls. Discovered by musicians in the 1970s. The circuit is identical in both applications — the only change is what you feed in as the carrier.</div>

<div class="step-card"><span class="step-num">HOW LPC WORKS — THE SHORT VERSION</span>
Take a 20ms slice of speech. Compute the autocorrelation — how similar the signal is to time-shifted copies of itself. Solve for predictor coefficients using Levinson-Durbin recursion, which exploits the symmetric structure of the autocorrelation matrix to find the best solution in O(p²) steps. Each conjugate pole pair in the resulting filter maps to one resonance peak. The pole's angle gives the resonance frequency; its distance from the unit circle gives the bandwidth. LPC directly gives you resonance positions — which is why speech researchers still use it for acoustic analysis even though neural models have replaced it for synthesis.
</div>

<div class="step-card"><span class="step-num">BAND COUNT AND VOWEL RESOLUTION</span>
More bands = more spectral resolution = clearer vowels. The original SIGSALY used 10 bands — intelligible but robotic. Hardware vocoders like the Roland SVC-350 used 12–16. Software vocoders use 32–64. Below 8 bands, the "ee" and "oo" vowels start to blur because the resonance peaks aren't resolved. Try bands=4, then bands=32 on the same vowel — vowel perception depends entirely on separating those peaks, and band count is the lever.
</div>

<div class="step-card"><span class="step-num">CROSS-SYNTHESIS</span>
The vocoder's real creative power: use any sound as the modulator and any sound as the carrier. Speech + string ensemble = strings that talk. Drum loop + choir = rhythmically gated choral pads. Voice + orchestra = Imogen Heap's "Hide and Seek." The carrier doesn't need to be tonal. The result is simultaneously familiar (voice-shaped) and wrong (wrong material) — which is where the artistic interest lives. Wendy Carlos, Kraftwerk, Arca, and countless producers have built aesthetics entirely on this collision.
</div>

<div class="spamton">MFCCs ran <strong>every commercial voice system</strong> from ~1980 to 2015. Every voice assistant, every phone menu, every dictation engine. All of it — running on 13 numbers extracted from 20 milliseconds of audio, 50 times per second. The entire industry was built on a trick derived from modeling <strong>the geometry of cochlear hair cells</strong>. We built AI assistants on ear hair math. They still misheard you constantly. <strong>Deep learning fixed this. Mostly.</strong></div>

<div class="challenge">In the code editor, replace the sawtooth carrier with three oscillators: 220Hz, 277Hz, 330Hz (A3, C#4, E4 — an A major chord). Mix them and run through the vocoder. The chord takes on your vowel's resonance shape. You've built a chord vocoder. Now push the envelope smoothing up — the vowel definition blurs into a washy gated texture. That smooth/staccato tradeoff is the main control surface of every hardware vocoder ever made.</div>

<p class="tip">>> TIP: set carrier=noise and cycle through vowels while it runs. You're hearing whispered vowels — same resonance structure as voiced speech, just without pitch. This is why whispered speech is still intelligible. Vowel identity lives entirely in the resonance shape, not in the source buzzing.</p>`,
code:`// ── 08 — VOCODER: N-band spectral envelope transfer ─────────────────
// A vocoder splits the carrier into N frequency bands,
// shapes each band's amplitude to match the modulator's spectral envelope
// (here: a static vowel formant model), then sums the bands.
// Result: the carrier's tonal character takes on the vowel's resonance shape.
function makeSynth(ctx, p) {
  const now = ctx.currentTime;
  const dur = 1.8;

  // ── CARRIER ────────────────────────────────────────────────────────
  // Three carrier types demonstrate the source-filter model in action:
  // noise = voiceless (whisper), sawtooth = voiced speech, sine = pure tone.
  // Same vocoder, same vowel, same bands — only the carrier changes.
  // This is literally what the voiced/voiceless distinction IS.
  let carrier;
  if (p.carrier < 0.5) {
    // Noise carrier: broadband white noise
    const len = Math.ceil(ctx.sampleRate * dur);
    const buf = ctx.createBuffer(1, len, ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
    carrier = ctx.createBufferSource();
    carrier.buffer = buf;
  } else if (p.carrier < 1.5) {
    // Sawtooth: rich harmonic series — approximates vocal fold buzz
    carrier = ctx.createOscillator();
    carrier.type = 'sawtooth';
    carrier.frequency.value = p.f0;
  } else {
    // Sine: single harmonic — purer, more tonal, less speech-like
    carrier = ctx.createOscillator();
    carrier.type = 'sine';
    carrier.frequency.value = p.f0;
  }

  // ── VOWEL MODEL (pre-baked formant positions) ──────────────────────
  // These are the F1/F2/F3 targets for four English vowels.
  // In a real vocoder, the modulator signal IS the speech and you'd
  // extract these amplitudes in real-time. Here we bake them in.
  const VOWELS = [
    [800, 1200, 2500],  // ɑ "ahh" — open back, low jaw
    [280, 2620, 3380],  // i "eeee" — close front, high tongue
    [310,  890, 2370],  // u "oooo" — close back, rounded lips
    [600, 1900, 2550],  // ɛ "bed"  — open-mid front
  ];
  const formants = VOWELS[Math.round(p.vowel) % 4];

  // ── SPECTRAL TILT ──────────────────────────────────────────────────
  // Real speech has a natural high-frequency rolloff (~-12dB/octave).
  // The tilt slider controls a low-shelf boost — low values = heavy
  // rolloff (more "muffled"), high values = flatter (more "bright").
  const tiltF = ctx.createBiquadFilter();
  tiltF.type = 'lowshelf';
  tiltF.frequency.value = 600;
  tiltF.gain.value = (1 - p.tilt) * -10;
  carrier.connect(tiltF);

  const master = ctx.createGain(); master.gain.value = 0.55;
  const n = Math.round(p.bands);
  const minHz = 80, maxHz = 6000;

  // ── BAND ARRAY ────────────────────────────────────────────────────
  // N bandpass filters, logarithmically spaced from 80Hz to 6000Hz.
  // (Log spacing because we hear pitch logarithmically — equal steps
  // should feel equal, not look equal on a linear axis.)
  for (let b = 0; b < n; b++) {
    // Center frequency for this band (log-spaced)
    const fc = minHz * Math.pow(maxHz / minHz, b / (n - 1));

    // How much gain does this band get?
    // It depends on proximity to the formant frequencies.
    // Close to a formant peak → high gain. Far away → near zero.
    // exp(-dist * 4.5) is a soft Gaussian window in log-frequency space.
    let amp = 0;
    formants.forEach(fhz => {
      const dist = Math.abs(Math.log2(fc / fhz)); // distance in octaves
      amp = Math.max(amp, Math.exp(-dist * 4.5));
    });
    // Additional rolloff for high bands (mimics natural spectral slope)
    amp *= Math.exp(-b / (n * 1.1));

    const bpf = ctx.createBiquadFilter();
    bpf.type = 'bandpass';
    bpf.frequency.value = fc;
    bpf.Q.value = Math.max(3, n / 4); // narrower Q as band count increases

    const g = ctx.createGain();
    g.gain.value = amp * 2.8;

    tiltF.connect(bpf); bpf.connect(g); g.connect(master);
  }

  // Smooth amplitude envelope
  const env = ctx.createGain();
  env.gain.setValueAtTime(0, now);
  env.gain.linearRampToValueAtTime(1, now + 0.08);
  env.gain.setValueAtTime(1, now + dur - 0.1);
  env.gain.linearRampToValueAtTime(0, now + dur);
  master.connect(env);

  carrier.start(now); carrier.stop(now + dur);

  return { node: env, osc: carrier, stopAt: now + dur };
}

function updateParams(nodes, p) {}` },

{ subtitle:'09 — Concatenative TTS', title:'Assembly-Line Speech',
params:[
  {id:'word',      label:'Word — mama / baba / weee',  min:0, max:2, step:1,   def:0},
  {id:'f0',        label:'Pitch (F0, Hz)',              min:80, max:280, step:1, def:120},
  {id:'crossfade', label:'Join smoothness (ms)',     min:5, max:150, step:5,  def:40},
  {id:'rate',      label:'Speaking rate', min:0.5, max:2, step:0.1, def:1},
