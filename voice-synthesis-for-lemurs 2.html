body:`<p>The voice in your 2007 GPS navigator didn't come from rules or a neural network. It came from recordings — thousands of sound pairs spliced together in real time. Record one speaker saying every adjacent phoneme pair in English (~1600 of them), index everything, build a search algorithm to find the best sequence for any text. Ship it. That's concatenative synthesis, and it dominated commercial voice for twenty years.</p>

<div class="vocab"><span class="vt">"Diphone"</span> — a unit spanning from the middle of one phoneme to the middle of the next. The join point always falls in the acoustically stable center of a phoneme, while the transition — where the coarticulation lives — is preserved intact inside each unit. ~1600 diphones cover all English phoneme pairs. This design is the reason 1990s concatenative TTS was intelligible at all; every join lands at a steady region rather than mid-transition.</div>

<div class="vocab"><span class="vt">"Unit selection"</span> — an advanced concatenative approach (Festival 2, AT&T Natural Voices) that stores multiple recordings of each unit in different contexts, then searches for the globally optimal sequence. The cost function weighs target cost (does this unit have the right pitch and duration?) against join cost (will adjacent unit boundaries splice smoothly?). The search uses the Viterbi algorithm — a dynamic programming technique for finding the best path through a graph. With large enough databases, it could approach human naturalness for in-coverage content.</div>

<div class="vocab"><span class="vt">"PSOLA (Pitch-Synchronous Overlap-Add)"</span> — the algorithm behind Autotune, Melodyne, and most pitch-shifting in audio tools. Find the glottal pulse marks in the signal. Cut pitch-synchronous windows centered on each mark. Resynthesize by repositioning those windows: closer together = higher pitch, duplicate = longer at the same pitch, remove = shorter. The resonance envelope stays locked to the grain shape — only the pitch changes. The gritty metallic quality at extreme shifts is grain boundary mismatch.</div>

<div class="step-card"><span class="step-num">WHY JOINS SOUND WRONG</span>
When unit A ends and unit B begins, the resonance envelope of A may not match B's opening — especially if they were recorded in different emotional contexts. The join cost quantifies this as the distance between their cepstral vectors at the boundary. Unit selection minimizes total join cost across the whole utterance using Viterbi. High join cost = audible click or spectral seam. The whole system is essentially a shortest-path problem through a graph of thousands of recorded clips.
</div>

<div class="step-card"><span class="step-num">HMM SYNTHESIS — THE BRIDGE</span>
Between concatenative and neural sits Hidden Markov Model synthesis. Instead of storing recordings, it trains statistical models of acoustic features per phoneme, then generates smooth feature trajectories by sampling from those models at synthesis time. Fully parametric: want a sad voice? Shift the pitch model. Want a whisper? Adjust the breathiness parameter. Concatenative couldn't do this without re-recording. HMM could. The cost was a characteristic "buzzy" quality — like listening through a thin wall.
</div>

<div class="step-card"><span class="step-num">A MINIMAL DIPHONE TABLE IN JAVASCRIPT</span>
A toy version: <code>{"a_m": {f1s:800, f2s:1200, f1e:350, f2e:1100, dur:0.12, xf:0.04}}</code> — starting resonances, ending resonances, duration, crossfade. Chain entries by matching end values to start values of the next. Schedule ramps with <code>linearRampToValueAtTime</code>. Extend this to all 1600 English pairs with real measured values and you'd have a working formant TTS engine. What makes commercial systems better is data quality, not a fundamentally different architecture.
</div>

<div class="step-card"><span class="step-num">WHY EMOTION BROKE EVERYTHING</span>
Every unit was recorded in a neutral, careful reading voice. The prosody model could predict an angry pitch contour — but the recordings themselves were always neutral. The breathiness, laryngeal tension, and vocal effort of real emotion are encoded in the source signal, not the pitch. PSOLA could bend pitch and stretch duration but couldn't add any of those qualities without re-recording from scratch. This is the wall that concatenative synthesis hit. Neural synthesis walked straight through it.
</div>

<div class="artists">Find Apple's original "Fred" voice from 1984 on YouTube, then Siri circa 2012, then any current neural voice. The arc is audible: "intelligible but clearly a machine" → "occasionally convincing on rehearsed content" → "hard to tell." Same phonemes. Same words. Three completely different physical processes for generating the sound. The voice didn't change. The physics did.</div>

<div class="challenge">Add a fourth word to the WORDS array — your name, or any word you like. Break it into resonance segments using the vowel values from lesson 02. Add short near-silence segments (30–50ms, gain≈0.05) for any stop consonants. It will be rough — but you'll hear the trajectory you designed, and you'll understand exactly why commercial systems needed thousands of carefully recorded units to cover what you just roughed out with a handful of numbers.</div>

<p class="tip">>> TIP: set rate to 0.5 and listen to the crossfade in slow motion — you can hear the resonances blending at each boundary. Set it to 2.0 and synthesis artifacts shrink because transitions compress and your ear fills them in. Rate acceleration hides seams. This is why fast TTS sounds better than slow TTS on the same underlying engine.</p>`,
code:`// ── 09 — CONCATENATIVE TTS: diphone crossfade simulation ────────────
// Each "word" is a sequence of formant target pairs.
// We schedule the F1/F2 filters to ramp from one target to the next.
// The crossfade time is what separates "abrupt diphone splice" from
// "natural-sounding coarticulation." This is the entire tradeoff.
function makeSynth(ctx, p) {
  const now  = ctx.currentTime;
  const rate = p.rate;       // speaking rate multiplier — compresses durations
  const xf   = p.crossfade / 1000;  // crossfade window in seconds
  const f0   = p.f0;

  // ── WORD TABLE (diphone formant sequences) ─────────────────────────
  // Each entry: [F1, F2, segment_duration_seconds]
  // F1 = jaw height (low = open mouth), F2 = tongue position (high = front)
  // "mama" — nasal closure → open vowel → nasal closure → open vowel
  // "baba" — bilabial approximation → open vowel → bilabial → open vowel
  //          (the bilabial dip in F2 is what makes it sound like /b/ vs /m/)
  // "weee" — rounded glide → mid-open front → higher front → close front /i/
  //          (w→e→ee→i = a steady F2 climb as tongue moves forward and up)
  const WORDS = [
    [[300,1000,0.10],[800,1200,0.20],[300,1000,0.10],[800,1200,0.20]],  // mama
    [[380,1050,0.08],[800,1200,0.20],[380,1050,0.08],[800,1200,0.20]],  // baba
    [[310,890,0.10],[600,1900,0.14],[420,2200,0.14],[280,2620,0.20]],   // weee
  ];
  const seq = WORDS[Math.round(p.word) % 3];

  // ── GLOTTAL SOURCE ─────────────────────────────────────────────────
  const osc = ctx.createOscillator();
  osc.type = 'sawtooth';
  osc.frequency.value = f0;

  // ── TWO FORMANT FILTERS ────────────────────────────────────────────
  const f1n = ctx.createBiquadFilter();
  f1n.type = 'bandpass'; f1n.Q.value = 9;
  const f2n = ctx.createBiquadFilter();
  f2n.type = 'bandpass'; f2n.Q.value = 11;

  // ── SCHEDULE THE FORMANT SEQUENCE ─────────────────────────────────
  // Initialize at the first segment's targets
  f1n.frequency.setValueAtTime(seq[0][0], now);
  f2n.frequency.setValueAtTime(seq[0][1], now);

  // For each segment: ramp F1 and F2 to the target within xf seconds.
  // 't' accumulates the timeline position.
  // 'rate' scales duration — higher rate = faster = shorter segments.
  let t = now + 0.02;
  seq.forEach(([f1, f2, dur]) => {
    const d = dur / rate;
    // xf is the crossfade window — how quickly we reach the new target.
    // Small xf = abrupt boundary (click). Large xf = smooth blend (smear).
    f1n.frequency.linearRampToValueAtTime(f1, t + xf);
    f2n.frequency.linearRampToValueAtTime(f2, t + xf);
    t += d;
  });

  const totalDur = seq.reduce((s, [,,d]) => s + d / rate, 0) + 0.08;

  const env = ctx.createGain();
  env.gain.setValueAtTime(0, now);
  env.gain.linearRampToValueAtTime(0.65, now + 0.04);
  env.gain.setValueAtTime(0.65, now + totalDur - 0.06);
  env.gain.linearRampToValueAtTime(0, now + totalDur);

  osc.connect(f1n); f1n.connect(env);
  osc.connect(f2n); f2n.connect(env);

  osc.start(now); osc.stop(now + totalDur + 0.05);

  return { node: env, osc, stopAt: now + totalDur };
}

function updateParams(nodes, p) {}` },

body:`<p>ElevenLabs can take three sentences of audio, extract the resonance fingerprint of the speaker, and generate unlimited new speech in that voice in under a second. That workflow — audio in, speaker identity out, new speech out — is what neural TTS made possible. Here's what's actually happening at each step, and how you'd build something like it yourself.</p>

<div class="vocab"><span class="vt">"Mel spectrogram"</span> — a 2D image of sound: time across the X axis, frequency up the Y axis (scaled to match how the ear hears), log energy as brightness. Vowel resonances show as horizontal bright bands. Fricatives are diffuse high-frequency fuzz. Stops are silences followed by vertical bursts. Most neural TTS systems generate this image as an intermediate step, then convert it to audio with a neural vocoder. The model is essentially learning to draw these images from text.</div>

<div class="vocab"><span class="vt">"Speaker embedding"</span> — a fixed-length vector (typically 256–512 numbers) that encodes a speaker's vocal identity. Computed by a speaker encoder network trained to be similar for the same speaker and dissimilar for different speakers. It captures: habitual speaking pitch, how long the resonating tube is (which shifts all resonances together), breathiness, pitch irregularity, and the speaker-specific resonance geometry of their nasal cavity that can't be described any simpler than "this person's face." This is the thing you'd give ElevenLabs 30 seconds of audio to generate.</div>

<div class="vocab"><span class="vt">"Neural vocoder"</span> — the component that converts a mel spectrogram back to a waveform. WaveNet (2016) was first but ~2000× slower than real-time. HiFi-GAN (2020) runs in real-time on CPU and is the most widely deployed. The "slightly bubbly" or "metallic" artifacts you occasionally notice in neural TTS are HiFi-GAN artifacts — the spectrogram is mostly right, the vocoder imperfectly inverts it.</div>

<div class="step-card"><span class="step-num">HOW ELEVENLABS WORKS (SIMPLIFIED)</span>
Their pipeline is essentially: (1) a speaker encoder extracts a speaker embedding from your reference audio. (2) A text-to-phoneme model converts input text to a phoneme sequence with predicted durations and pitch. (3) A spectrogram decoder generates mel spectrogram frames, conditioned on both the phoneme sequence and your speaker embedding. (4) A vocoder converts the spectrogram to audio. Your voice identity is a conditioning signal — the model generates what the text would sound like if spoken by someone at that point in embedding space. The "instant voice cloning" feature is just a fast speaker encoder running inference on your upload.
</div>

<div class="step-card"><span class="step-num">HOW TO BUILD THIS YOURSELF</span>
You don't need to train from scratch. Open-source multi-speaker models are already trained on thousands of voices — you just need to fine-tune or condition them on yours. The stack: <a href="https://github.com/coqui-ai/TTS">Coqui TTS</a> (VITS-based, multi-speaker, good documentation). <a href="https://github.com/yl4579/StyleTTS2">StyleTTS 2</a> (style vector conditioning, very natural output). <a href="https://github.com/SWivid/F5-TTS">F5-TTS</a> (2024, flow-matching based, convincing zero-shot from 5 seconds). Try F5-TTS right now in your browser at <a href="https://huggingface.co/spaces/mrfakename/E2-F5-TTS">Hugging Face Spaces</a> — no setup required.
</div>

<div class="step-card"><span class="step-num">THE ARCHITECTURE: WHAT EACH PIECE DOES</span>
Text normalization ("3pm" → "three p.m."). Grapheme-to-phoneme conversion — English has ~13% irregular words where spelling doesn't match sound ("read" present vs. past). Duration and pitch prediction per phoneme — this is where the prosody lives. Spectrogram decoder generates the mel frames. Neural vocoder converts frames to audio. Each stage has its own failure mode: G2P errors produce wrong words, bad duration prediction produces uneven rhythm, vocoder artifacts produce the characteristic "AI voice" texture.
</div>

<div class="step-card"><span class="step-num">FastSpeech 2 — THE TRICK THAT MADE IT FAST</span>
Early systems like Tacotron generated frames sequentially — each depends on all previous, so it can't be parallelized. FastSpeech 2 (Microsoft, 2020) breaks this with a duration predictor: a small network that predicts how many output frames each phoneme should occupy. With those durations, the phoneme sequence is expanded to match output length, a variance adapter adds pitch and energy values, then a Transformer decoder generates all frames simultaneously. 50× faster than Tacotron 2 at comparable quality.
</div>

<div class="spamton">WaveNet in 2016: one second of audio took <strong>several minutes</strong> to generate. WaveNet in 2019: real-time. HiFi-GAN in 2020: real-time on CPU. F5-TTS in 2024: convincing voice clone from 5 seconds, running on a laptop, in a Python repo you can install in one line. The gap between <strong>"I want a voice for my project"</strong> and <strong>"I have a voice for my project"</strong> collapsed from "hire a studio" to "one afternoon." That happened in about eight years. The voices will keep getting better and the compute will keep getting cheaper. <strong>This is an unusually good time to understand how this works.</strong></div>

<div class="challenge">Call the ElevenLabs API (free tier, no credit card): <code>pip install elevenlabs</code>, grab your API key, then: <code>from elevenlabs import ElevenLabs; client = ElevenLabs(api_key="YOUR_KEY"); audio = client.text_to_speech.convert(voice_id="Rachel", text="your text here", model_id="eleven_multilingual_v2")</code>. Generate the same sentence with three different preset voices. Listen with headphones. Try to describe each voice in the terms from this course: is the speaking pitch high or low? Does it sound breathy? Is the resonance spacing wide (long throat) or narrow (short throat)? You now have vocabulary for what you're hearing.</div>

<p class="tip">>> TIP: add a little pitch irregularity (jitter=0.010) and breathiness to any preset and it sounds more human despite being technically noisier. Listeners read vocal imperfection as effort — as a body with friction and mass. Flawlessly clean synthesis sounds like it has no physical body. Zero imperfection is impossible for biological systems, so a perfect voice reads as absence.</p>`,
code:`// ── 10 — NEURAL TTS: speaker embedding → acoustic preset ────────────
// A real neural TTS system encodes speaker identity as a dense vector
// (256–512 numbers). Here we approximate that with four acoustic presets —
// each one a different cluster in the acoustic parameter space.
// The jitter + breathiness sliders simulate what a speaker embedding
// would express about phonation style and glottal health.
function makeSynth(ctx, p) {
  const now = ctx.currentTime;
  const dur = 1.6;

  // ── SPEAKER PRESETS ────────────────────────────────────────────────
  // Each preset: [F0 base, F1, F2, F3, spectral tilt, noise base]
  // These values approximate distinct vocal tract and phonation styles.
  // "warm"   — low F0, central formants, heavy rolloff, minimal noise
  // "thin"   — high F0, fronted formants, bright rolloff, minimal noise
  // "breathy"— mid F0, backed formants, moderate rolloff, lots of noise
  // "bass"   — very low F0, backed formants, heavy rolloff, minimal noise
  const PRESETS = [
    [120, 500, 1500, 2500, 0.70, 0.06],  // warm
    [185, 590, 2050, 3100, 0.45, 0.04],  // thin
    [145, 460, 1380, 2380, 0.62, 0.28],  // breathy
    [ 78, 440, 1080, 2180, 0.82, 0.05],  // bass
  ];
  const idx = Math.round(p.preset) % 4;
  const [f0b, f1, f2, f3, tilt, nAmt] = PRESETS[idx];

  // f0offset: semitones shift above or below preset base
  // Math.pow(2, semitones/12) converts semitone offset to frequency ratio
  const f0 = f0b * Math.pow(2, p.f0offset / 12);

  // ── GLOTTAL SOURCE WITH JITTER ─────────────────────────────────────
  // Jitter = cycle-to-cycle frequency perturbation.
  // We schedule small random F0 deviations every 1/15 second.
  // Low jitter → robotic. A little jitter → alive.
  // The deviation size is proportional to both p.jitter and f0 —
  // same jitter % sounds more pronounced at higher fundamental frequencies.
  const osc = ctx.createOscillator();
  osc.type = 'sawtooth';
  osc.frequency.value = f0;
  for (let j = 0; j < dur * 15; j++) {
    const jt  = now + j / 15;
    const jDev = (Math.random() * 2 - 1) * p.jitter * f0;
    osc.frequency.setValueAtTime(f0 + jDev, jt);
  }

  // ── THREE FORMANT FILTERS ──────────────────────────────────────────
  // F1, F2, F3 in parallel — same architecture as L05.
  // Q values increase with formant number because higher formants
  // in real speech have narrower bandwidths relative to their frequency.
  const filters = [f1, f2, f3].map((fc, i) => {
    const bpf = ctx.createBiquadFilter();
    bpf.type = 'bandpass';
    bpf.frequency.value = fc;
    bpf.Q.value = 8 + i * 2;
    return bpf;
  });

  // ── SPECTRAL TILT ──────────────────────────────────────────────────
  // Real voices lose energy at high frequencies at roughly -12dB/octave.
  // A high-shelf cut simulates this rolloff.
  // tilt=1 → flat (bright, thin). tilt=0 → -12dB at 1200Hz (warm, dark).
  const tiltNode = ctx.createBiquadFilter();
  tiltNode.type = 'highshelf';
  tiltNode.frequency.value = 1200;
  tiltNode.gain.value = -12 * (1 - tilt);

  // ── ASPIRATION NOISE ───────────────────────────────────────────────
  // Adds breathiness: air turbulence through the glottis.
  // The final noise level is preset's baseline + user breathiness slider.
  const noiseLen = Math.ceil(ctx.sampleRate * dur);
  const noiseBuf = ctx.createBuffer(1, noiseLen, ctx.sampleRate);
  const nd = noiseBuf.getChannelData(0);
  for (let i = 0; i < nd.length; i++) nd[i] = Math.random() * 2 - 1;
  const noiseSrc = ctx.createBufferSource();
  noiseSrc.buffer = noiseBuf;
  const noiseLPF = ctx.createBiquadFilter();
  noiseLPF.type = 'lowpass'; noiseLPF.frequency.value = 3500;
  const noiseGain = ctx.createGain();
  noiseGain.gain.value = (p.breathiness + nAmt) * 0.45;
  noiseSrc.connect(noiseLPF); noiseLPF.connect(noiseGain);

  // ── SIGNAL CHAIN ──────────────────────────────────────────────────
  const master = ctx.createGain(); master.gain.value = 0.45;
  osc.connect(tiltNode); tiltNode.connect(master);  // tilt before formants
  filters.forEach(bpf => { osc.connect(bpf); bpf.connect(master); });
  noiseGain.connect(master);

  const env = ctx.createGain();
  env.gain.setValueAtTime(0, now);
  env.gain.linearRampToValueAtTime(1, now + 0.05);
  env.gain.setValueAtTime(1, now + dur - 0.08);
  env.gain.linearRampToValueAtTime(0, now + dur);
  master.connect(env);

  osc.start(now);      osc.stop(now + dur);
  noiseSrc.start(now); noiseSrc.stop(now + dur);

  return { node: env, osc, stopAt: now + dur, allOscs: [osc, noiseSrc] };
}

function updateParams(nodes, p) {}` },

{ subtitle:'11 — Voice Cloning', title:'Speaker Embeddings in Practice',
params:[
  {id:'f0scale',    label:'Speaking pitch (F0)',  min:0.5, max:2.0,  step:0.02,  def:1},
  {id:'tractScale', label:'Throat length (tract)',min:0.7, max:1.4,  step:0.02,  def:1},
  {id:'vowel',      label:'Vowel — ɑ / i / u / ɛ',min:0,   max:3,    step:1,     def:0},
  {id:'tilt',       label:'Spectral tilt',        min:0,   max:1,    step:0.05,  def:0.5},
  {id:'jitter',     label:'Roughness (jitter)',   min:0,   max:0.025, step:0.001, def:0.005},
  {id:'breathiness',label:'Breathiness',          min:0,   max:0.8,  step:0.05,  def:0.15},
  {id:'f0drift',    label:'Pitch wandering speed',min:0,   max:4,    step:0.1,   def:0.7},
],
body:`<p>Your voice is a fingerprint — not metaphorically, but acoustically. The length of your resonating tube, your habitual speaking pitch, the statistical texture of your pitch irregularity, the specific resonances of your nasal cavity: together these place you at a unique point in a 256-dimensional space. Voice cloning is the technology of finding that point from a short recording and using it to generate new speech from the same location.</p>

<div class="vocab"><span class="vt">"d-vector / x-vector"</span> — two speaker embedding architectures. d-vectors (Google, 2018) use LSTM encoders trained with a contrastive objective: push same-speaker embeddings together, push different-speaker embeddings apart. x-vectors (Snyder et al., 2018) use time-delay neural networks with statistics pooling. d-vectors dominate TTS conditioning. x-vectors dominate speaker identification and "who spoke when" tasks. Both output ~256-dimensional vectors from audio of any length.</div>

<div class="vocab"><span class="vt">"Zero-shot voice cloning"</span> — extracting a speaker embedding from a reference recording at inference time, with no retraining of model weights. The model was trained on thousands of speakers and has learned to generalize: give it a new embedding and it generates the corresponding voice. Quality scales with reference length and audio cleanliness. 2024-generation systems (F5-TTS, CosyVoice, Seed-TTS) achieve convincing results from 5–10 seconds of clean audio.</div>

<div class="vocab"><span class="vt">"Throat length normalization (VTLN)"</span> — compensates for the fact that different speakers have differently sized resonating tubes. A 15cm tube produces resonances ~13% higher than a 17cm tube. VTLN estimates a warp factor α and rescales the frequency axis: mel_warped(f) = mel(α·f). The warp factor is directly interpretable as resonating tube length — one of the most powerful axes in speaker embedding space, and what the throat length slider approximates here.</div>

<div class="step-card"><span class="step-num">MEASURING YOUR OWN VOICE IN PRAAT</span>
<a href="https://www.praat.org">Praat</a> is free. Record yourself sustaining /ɑ/, /i/, /u/, /ɛ/ for 1–2 seconds each. Formant → Get first formant, Get second formant — those are your resonance values, which will differ from the textbook averages because your tube length differs from the reference speaker. For speaking pitch: read a paragraph aloud, extract mean pitch from the pitch track (10th–90th percentile of voiced frames). For pitch irregularity: Voice report → Local jitter %. Healthy voice: 0.5–1.0%. Above 2% = hoarse quality.
</div>

<div class="step-card"><span class="step-num">THE EMBEDDING SPACE IS NAVIGABLE</span>
Interpolating between two speaker embeddings (e₁ × w + e₂ × (1-w)) produces perceptually intermediate voices. This is practically useful: blend two accents, create a gender-neutral voice, generate synthetic characters that don't correspond to any real person, or study which acoustic properties live on which embedding dimensions. ElevenLabs' "voice design" feature is essentially a UI for navigating this space. The space isn't perfectly smooth everywhere — sparsely represented regions produce artifacts — but near well-covered areas, you can navigate continuously.
</div>

<div class="step-card"><span class="step-num">PITCH DRIFT — THE OVERLOOKED FINGERPRINT</span>
Mean speaking pitch is easy to clone. Pitch drift — the slow quasi-random wandering over 1–3 second spans — is speaker-specific in ways that resist simple description. It has a characteristic speed, amplitude, and frequency structure (approximately 1/f pink noise in many speakers). Early TTS had no drift, which was immediately detectable. Modern speaker encoders capture drift statistics implicitly. Voice detection systems look for drift patterns inconsistent with a target speaker's recordings.
</div>

<div class="step-card"><span class="step-num">THE CREATIVE APPLICATIONS</span>
What voice cloning actually gets used for, in practice: audiobooks narrated in the author's own voice. Game characters whose dialogue can be extended infinitely without re-recording sessions. Language learning tools that let you hear familiar voices speaking a new language. Accessibility applications that give people with ALS or vocal cord damage their own synthesized voice back. Post-production voice fixes without re-scheduling studio time. The technology is the same regardless of application — what changes is whose voice, and whether you have their consent.
</div>

<div class="spamton">In 2004 Yamaha hired voice actors to record every phoneme pair in Japanese. The actors got paid once. Vocaloid got their vocal tract geometry forever. That's the original voice cloning deal: <strong>your throat shape, our software, infinite uses, no royalties.</strong> Modern embedding systems are more sophisticated but the physics is the same — extract the resonance fingerprint, keep the person optional. The interesting question isn't whether this is technically possible. It clearly is. The interesting question is what you want to make with it.</div>

<div class="challenge">Use <a href="https://www.praat.org">Praat</a> to measure your own voice: record and measure the first two resonances for /ɑ/, /i/, /u/. Go to lesson 02's synth and dial in your measured values instead of the textbook averages. Do they sound more like you? Then come back here: set throat length to your estimated ratio (if your resonances are ~10% lower than reference, set it to 1.1). Set habitual pitch to your mean speaking pitch divided by 130Hz. You're building your speaker embedding by hand, one parameter at a time.</div>

<p class="tip">>> TIP: throat length and habitual pitch (F0 scale) feel like a coherent body when used together — because those two things are correlated in real populations. Larger bodies have longer tubes and lower habitual pitch. Mismatching them (short tube, low pitch) produces something immediately uncanny. The embedding space learned this correlation from data.</p>`,
code:`// ── 11 — VOICE CLONING: speaker embedding parameter space ──────────
// This synth exposes the five most perceptually powerful axes of a
// speaker embedding as sliders. Together they cover most of what
// makes one voice sound different from another.
function makeSynth(ctx, p) {
  const now = ctx.currentTime;
  const dur = 1.8;

  // ── SPEAKING PITCH ─────────────────────────────────────────────────
  // f0scale multiplies a 130Hz reference (middle of male range).
  // 1.0 = ~130Hz  |  1.5 = ~195Hz (female range)  |  0.7 = ~91Hz (deep)
  const f0 = 130 * p.f0scale;

  // ── THROAT LENGTH: SCALES ALL RESONANCES ──────────────────────────
  // A longer throat lowers ALL resonance frequencies proportionally —
  // shorter throat = brighter, higher resonances (child, smaller body)
  // longer throat = darker, lower resonances (tall, larger body)
  // ts = 1/tractScale so that a bigger value → lower frequencies
  const ts = 1 / p.tractScale;

  // ── VOWEL FORMANTS (scaled by throat length) ───────────────────────
  // These are the resonance peak positions for four vowels.
  // Each one gets scaled: multiply by ts to apply throat length.
  // F1 = how open the jaw is | F2 = tongue front/back | F3 = upper ring
  const VOWELS = [
    [800, 1200, 2500],  // ɑ "ahh" — open jaw, back tongue
    [280, 2620, 3380],  // i "eee" — nearly closed jaw, front tongue
    [310,  890, 2370],  // u "ooo" — nearly closed jaw, back tongue
    [600, 1900, 2550],  // ɛ "eh"  — mid-open, front-ish
  ];
  const vIdx = Math.round(p.vowel) % 4;
  const [rawF1, rawF2, rawF3] = VOWELS[vIdx];
  const f1 = rawF1 * ts;
  const f2 = rawF2 * ts;
  const f3 = rawF3 * ts;

  // ── GLOTTAL SOURCE ─────────────────────────────────────────────────
  const osc = ctx.createOscillator();
  osc.type = 'sawtooth';
  osc.frequency.value = f0;

  // ── FORMANT FILTER BANK ────────────────────────────────────────────
  const f1n = ctx.createBiquadFilter(); f1n.type='bandpass'; f1n.frequency.value=f1; f1n.Q.value=10;
  const f2n = ctx.createBiquadFilter(); f2n.type='bandpass'; f2n.frequency.value=f2; f2n.Q.value=12;
  const f3n = ctx.createBiquadFilter(); f3n.type='bandpass'; f3n.frequency.value=f3; f3n.Q.value=11;

  // ── SPECTRAL TILT ──────────────────────────────────────────────────
  // One of the most powerful male/female differentiators:
  // male voices have steeper high-frequency rolloff (more "warm/dark")
  // female voices have flatter rolloff (more "bright/present")
  // tilt=0 → heavy rolloff (dark, warm, "male-ish")
  // tilt=1 → flat rolloff (bright, airy, "female-ish")
  // implemented as a high-shelf filter: negative gain = cut high freqs
  const tiltNode = ctx.createBiquadFilter();
  tiltNode.type = 'highshelf';
  tiltNode.frequency.value = 1200;
  tiltNode.gain.value = -18 * (1 - p.tilt); // 0 tilt = -18dB at 1200Hz+

  // ── ASPIRATION NOISE ───────────────────────────────────────────────
  // Run noise through the formant filters too — this is important.
  // Real breathiness isn't just flat noise added on top; it's colored
  // by the same resonances as the voiced source. The result sounds
  // much more natural than filtered noise mixed separately.
  const noiseLen = Math.ceil(ctx.sampleRate * dur);
  const noiseBuf = ctx.createBuffer(1, noiseLen, ctx.sampleRate);
  const nd = noiseBuf.getChannelData(0);
  for (let i = 0; i < nd.length; i++) nd[i] = Math.random() * 2 - 1;
  const noiseSrc = ctx.createBufferSource(); noiseSrc.buffer = noiseBuf;
  const noiseGain = ctx.createGain(); noiseGain.gain.value = p.breathiness * 0.5;

  // ── SIGNAL CHAIN ──────────────────────────────────────────────────
  const master = ctx.createGain(); master.gain.value = 0.45;

  // Voiced source → tilt → formants → master
  osc.connect(tiltNode);
  tiltNode.connect(f1n); f1n.connect(master);
  tiltNode.connect(f2n); f2n.connect(master);
  tiltNode.connect(f3n); f3n.connect(master);

  // Noise → same formant filters (colored breathiness)
  noiseSrc.connect(noiseGain);
  noiseGain.connect(f1n);
  noiseGain.connect(f2n);

  // ── F0 DRIFT ──────────────────────────────────────────────────────
  // Slow, speaker-specific pitch wandering — one of the last things
  // to get right in a voice clone. 0 = robotic steady pitch.
  if (p.f0drift > 0) {
    const steps = Math.ceil(dur * p.f0drift * 3);
    let dF = f0;
    for (let d = 0; d < steps; d++) {
      const dt = now + d / (p.f0drift * 3);
      dF += (Math.random() * 2 - 1) * 2.5;
      dF = Math.max(f0 * 0.88, Math.min(f0 * 1.12, dF));
      osc.frequency.linearRampToValueAtTime(dF, dt);
    }
  }

  // ── JITTER: CYCLE-TO-CYCLE MICRO-PERTURBATION ─────────────────────
  const jSteps = Math.ceil(dur * 18);
  for (let j = 0; j < jSteps; j++) {
    const jt = now + j / 18;
    const jDev = (Math.random() * 2 - 1) * p.jitter * f0;
    osc.frequency.setValueAtTime(f0 + jDev, jt);
  }

  const env = ctx.createGain();
  env.gain.setValueAtTime(0, now);
  env.gain.linearRampToValueAtTime(1, now + 0.06);
  env.gain.setValueAtTime(1, now + dur - 0.1);
  env.gain.linearRampToValueAtTime(0, now + dur);
  master.connect(env);

  osc.start(now);      osc.stop(now + dur);
  noiseSrc.start(now); noiseSrc.stop(now + dur);

  return { node: env, osc, stopAt: now + dur, allOscs: [osc, noiseSrc] };
}

function updateParams(nodes, p) {}` },

{ subtitle:'12 — Singing Synthesis', title:'Making a Voice Sing',
params:[
  {id:'note',      label:'Note — 60 = middle C',             min:48, max:84, step:1,   def:60},
  {id:'vowel',     label:'Vowel — ɑ / i / u / ɛ',             min:0,  max:3,  step:1,   def:0},
  {id:'vibRate',   label:'Vibrato speed (Hz)',             min:3,  max:8,  step:0.1, def:5.5},
  {id:'vibDepth',  label:'Vibrato depth (cents)',     min:0,  max:1,  step:0.02,def:0.35},
  {id:'vibDelay',  label:'Vibrato delay (ms)',      min:0,  max:600,step:10,  def:200},
  {id:'singerF',   label:"Singer's formant (dB)",  min:0,  max:12, step:0.5, def:4},
],
body:`<p>Singing synthesis is speech synthesis with every assumption broken. Pitch must lock to exact values. Vowels hold across whole notes. Consonants compress into rhythmic slots. At high pitches the acoustic physics do something genuinely strange. And the result needs to be emotionally compelling. It's the hardest version of the problem — and after this course, you have every piece you need to build it.</p>

<div class="vocab"><span class="vt">"PSOLA"</span> — Pitch-Synchronous Overlap-Add. Mark the glottal pulses in a voiced recording. Cut pitch-period windows centered on each mark. Resynthesize at a new pitch by repositioning those windows: closer together = higher pitch, duplicated = held at same pitch. The resonance envelope stays tied to the grain shape — only the pitch changes. Vocaloid's engine is essentially PSOLA applied to a recorded phoneme database. The "Vocaloid sound" is the artifacts from extreme pitch shifts, aestheticized.</div>

<div class="vocab"><span class="vt">"Vibrato"</span> — quasi-periodic pitch oscillation around a sustained note, typically 5–7Hz at ±30–100 cents depth. Not a perfect sine wave — real vibrato has cycle-to-cycle variation in both rate and depth (~10–15%), a delayed onset (the note arrives and stabilizes before the oscillation begins), and slight correlated amplitude modulation. A pure LFO sounds like a theremin. The onset delay is what distinguishes trained technique from an unsteady voice.</div>

<div class="vocab"><span class="vt">"Singer's formant"</span> — a resonance cluster at 2500–3500Hz, produced when the upper resonances are tuned close together through specific throat and pharynx positioning. Adds 15–20dB in a frequency range where the orchestra has a spectral gap. This is how operatic singers are heard over 70 musicians without amplification. Pop singers don't develop it — a microphone is cheaper than a decade of technique training.</div>

<div class="step-card"><span class="step-num">MIDI TO FREQUENCY</span>
The formula: <code>f = 440 × 2^((note - 69) / 12)</code>. MIDI 69 = A4 = 440Hz. Every 12 steps = one octave. Every 1 step = one semitone = 2^(1/12) ≈ 1.0595×. For vibrato depth in Hz: <code>targetHz × (2^(depth_semitones / 12) - 1)</code>. At 0.3 semitones on C4 (261.6Hz), that's ±4.6Hz — narrow trained vibrato. At 0.8 semitones, ±12Hz — wide and expressive.
</div>

<div class="step-card"><span class="step-num">HIGH-NOTE VOWEL MODIFICATION</span>
When the fundamental frequency exceeds the first resonance (F1), that resonance can no longer reinforce any harmonic and the voice thins out. The fix: raise F1 to stay above the pitch. Rule: F1_modified = max(F1_original, pitch_Hz × 1.35). At C5 (523Hz), an "ee" vowel (F1=280Hz) must raise its F1 to 706Hz — into "ah" territory. This is correct technique, not a flaw. Opera singers do it without thinking. The synth below does it automatically.
</div>

<div class="step-card"><span class="step-num">VOCALOID → DIFFSINGER → WHERE IT'S HEADED</span>
Vocaloid (Yamaha, 2004): phoneme database + PSOLA + manual tuning per note. The editor exposes vibrato depth, rate, delay, and consonant timing per note — a full parameter surface. DiffSinger (2021): diffusion model conditioned on musical score + phoneme sequence + singer embedding. No PSOLA artifacts, no database gaps. <a href="https://github.com/MakiMakiLab/DiffSinger">Open source on GitHub</a>. <a href="https://synthesizerv.com">Synthesizer V</a> and <a href="https://ace-studio.timedomain.cn">ACE Studio</a> are commercial DiffSinger-tier tools you can use today with no DSP knowledge. The gap from "requires expert parameter tuning" to "drag and drop" took 20 years.
</div>

<div class="spamton">Hatsune Miku (Yamaha/Crypton, 2007): a Vocaloid voice package with a turquoise-haired character design. Built on concatenative synthesis + PSOLA, complete with audible pitch-quantization artifacts. Fans called these artifacts "Miku's voice." Over <strong>100,000 original songs</strong> attributed to her. Sold-out holographic concerts in Tokyo, LA, and Paris. A voice synthesizer with visible technical limitations became one of the most recognizable vocal identities on the planet. <strong>The uncanny valley became a fanbase.</strong> You're working with the same building blocks she runs on.</div>

<div class="challenge">The code editor already has the Jank Vocaloid loaded — hit <strong>RUN</strong> and it sings. Then make it yours:

Edit the <code>sequence</code> array at the top — each entry is <code>[midi_note, vowel_index, duration_ms]</code>. Vowels: 0=ɑ (ahh), 1=i (ee), 2=u (oo), 3=ɛ (eh). Try alternating vowels on the same pitch — coarticulation. Try a rising scale. Try all the same vowel at different pitches and notice where the quality shifts — that's high-note modification kicking in.
<br><br>
Then swap in your L11 measurements: set <code>myPitch</code> to your mean speaking pitch, <code>myTract</code> to your throat length ratio, <code>myJitter</code> to your measured jitter %. Does it sound more like you?</div>

<p class="tip">>> TIP: set vibrato onset delay to 0 and depth to wide — that's an unsteady, nervous sound. Set the delay to 250ms and depth moderate — the note arrives, settles, then vibrato begins. That sequence is technique. "Trained singer" vs "uncertain singer" lives almost entirely in whether the vibrato waits.</p>
<div class="step-card"><span class="step-num">WHAT YOU NOW UNDERSTAND</span>
You started with a sawtooth wave and two filters. You now know why that works — because the voice is a source and a filter, and you built both from scratch. Along the way you learned: how vowel identity lives in two resonance frequencies that map directly to jaw height and tongue position; why vocal imperfection (jitter, shimmer, open quotient) is the difference between "synthetic" and "alive"; how consonants are transitions embedded in vowels, not standalone sounds; why prosody carries meaning that phonemes can't; how a vocoder extracts and transplants spectral shape; why every TTS system from a 1990s GPS voice to ElevenLabs is solving the same problem with increasingly powerful tools; what a speaker embedding actually encodes about a person's throat; and why singing synthesis breaks every assumption that speech synthesis gets to make.
<br><br>
The code on the right is a working singing synthesizer. It's not ElevenLabs — it's about a decade of research behind it. But it runs on the same principles. The gap between "a sawtooth and two bandpass filters" and "a commercially convincing voice" is not a gap in concepts. It's a gap in data, compute, and the patience to measure 1600 diphone transitions. The concepts are exactly what you just learned.

// sequence: [midi_note, vowel_index, duration_ms]
// vowels: 0=ɑ(ahh)  1=i(ee)  2=u(oo)  3=ɛ(eh)
const sequence = [
  [60, 0, 400],  // C4 "ahh"
  [62, 3, 300],  // D4 "eh"
  [64, 1, 400],  // E4 "ee"
  [67, 0, 600],  // G4 "ahh"
  [65, 3, 300],  // F4 "eh"
  [64, 1, 500],  // E4 "ee"
  [62, 0, 700],  // D4 "ahh"
];

// ← YOUR voice parameters (swap in your L11 measurements)
const myPitch   = 130;   // your mean speaking pitch in Hz
const myTract   = 1.0;   // throat length (1.0 = neutral, 1.15 = longer)
const myJitter  = 0.005; // pitch irregularity (0.005 = healthy)
const myBreath  = 0.12;  // breathiness (0 = pressed, 0.4 = very breathy)

function makeSynth(ctx, p) {
  const now = ctx.currentTime;
  const VOWELS = [
    [800,1200,2500], // ɑ
    [280,2620,3380], // i
    [310, 890,2370], // u
    [600,1900,2550], // ɛ
  ];
  const ts = 1 / myTract; // tract scale factor

  const osc = ctx.createOscillator();
  osc.type = 'sawtooth';
  const f1n = ctx.createBiquadFilter(); f1n.type='bandpass'; f1n.Q.value=10;
  const f2n = ctx.createBiquadFilter(); f2n.type='bandpass'; f2n.Q.value=12;
  const f3n = ctx.createBiquadFilter(); f3n.type='bandpass'; f3n.Q.value=11;

  // Vibrato LFO — delayed onset so it ramps in after pitch settles
  const vibLFO = ctx.createOscillator();
  vibLFO.type = 'sine'; vibLFO.frequency.value = 5.5;
  const vibGain = ctx.createGain(); vibGain.gain.value = 0;
  vibLFO.connect(vibGain); vibGain.connect(osc.frequency);

  let t = now + 0.02;
  let totalDur = 0;

  sequence.forEach(([note, vIdx, durMs]) => {
    const dur = durMs / 1000;
    const hz  = 440 * Math.pow(2, (note - 69) / 12);
    let [rawF1, f2, f3] = VOWELS[vIdx];

    // High-note vowel modification: keep first resonance above pitch
    const f1 = Math.max(rawF1 * ts, hz * 1.35);

    // Schedule pitch and resonances for this note
    const xf = Math.min(0.06, dur * 0.2); // crossfade = coarticulation
    osc.frequency.setValueAtTime(hz, t);
    f1n.frequency.linearRampToValueAtTime(f1,      t + xf);
    f2n.frequency.linearRampToValueAtTime(f2 * ts, t + xf);
    f3n.frequency.linearRampToValueAtTime(f3 * ts, t + xf);

    // Vibrato: kicks in 200ms after note start, fades before note ends
    const vibHz = hz * (Math.pow(2, 0.25 / 12) - 1); // ±0.25 semitone depth
    vibGain.gain.setValueAtTime(0, t);
    vibGain.gain.linearRampToValueAtTime(vibHz, t + 0.20);
    vibGain.gain.setValueAtTime(vibHz, t + dur - 0.08);
    vibGain.gain.linearRampToValueAtTime(0, t + dur);

    t += dur;
    totalDur += dur;
  });

  // Jitter: small cycle-to-cycle pitch irregularity
  for (let j = 0; j < totalDur * 20; j++) {
    const jt = now + j / 20;
    osc.frequency.setValueAtTime(
      osc.frequency.value + (Math.random() * 2 - 1) * myJitter * myPitch,
      jt
    );
  }

  // Aspiration noise (breathiness)
  const nLen = Math.ceil(ctx.sampleRate * (totalDur + 0.1));
  const nBuf = ctx.createBuffer(1, nLen, ctx.sampleRate);
  const nd = nBuf.getChannelData(0);
  for (let i = 0; i < nd.length; i++) nd[i] = Math.random() * 2 - 1;
  const nSrc = ctx.createBufferSource(); nSrc.buffer = nBuf;
  const nLPF = ctx.createBiquadFilter(); nLPF.type='lowpass'; nLPF.frequency.value=4000;
  const nGain = ctx.createGain(); nGain.gain.value = myBreath * 0.35;
  nSrc.connect(nLPF); nLPF.connect(nGain);

  const master = ctx.createGain(); master.gain.value = 0.42;
  osc.connect(f1n); f1n.connect(master);
  osc.connect(f2n); f2n.connect(master);
  osc.connect(f3n); f3n.connect(master);
  nGain.connect(master);

  const env = ctx.createGain();
  env.gain.setValueAtTime(0, now);
  env.gain.linearRampToValueAtTime(1, now + 0.05);
  env.gain.setValueAtTime(1, now + totalDur - 0.1);
  env.gain.linearRampToValueAtTime(0, now + totalDur + 0.05);
  master.connect(env);

  osc.start(now);    osc.stop(now + totalDur + 0.15);
  vibLFO.start(now); vibLFO.stop(now + totalDur + 0.15);
  nSrc.start(now);   nSrc.stop(now + totalDur + 0.15);

  return { node: env, osc, stopAt: now + totalDur + 0.15, allOscs: [osc, vibLFO, nSrc] };
}
function updateParams(nodes, p) {}`,

//  ENGINE
// ═══════════════════════════════════════════════════════════════════
let audioCtx = null, analyser = null;
let currentNodes = null, currentLesson = 0;
let rafId = null, autoStopTimer = null;
let params = {};

const playBtn    = document.getElementById('play-btn');
const runBtn     = document.getElementById('run-btn');
const statusTxt  = document.getElementById('status-txt');
const paramSlots = document.getElementById('param-slots');
const codeTA     = document.getElementById('synth-code');
const scopeC     = document.getElementById('scope-canvas');
const progress   = document.getElementById('progress');
const lessonText = document.getElementById('lesson-text');
const lessonNav  = document.getElementById('lesson-nav');
const scopeCtx   = scopeC.getContext('2d');

// ── OSCILLOSCOPE ────────────────────────────────────────────────
function resizeScope() {
  scopeC.width  = scopeC.offsetWidth  * devicePixelRatio;
  scopeC.height = scopeC.offsetHeight * devicePixelRatio;
}
resizeScope();
window.addEventListener('resize', resizeScope);

let timeBuf = new Uint8Array(2048), freqBuf = new Uint8Array(2048);
let scopeRunning = false;

function drawScope() {
  if(!scopeRunning) return;
  rafId = requestAnimationFrame(drawScope);
  if(!analyser) return;

  const W = scopeC.width, H = scopeC.height;
  const half = W >> 1;

  scopeCtx.fillStyle = '#000';
  scopeCtx.fillRect(0, 0, W, H);

  analyser.getByteTimeDomainData(timeBuf);
  analyser.getByteFrequencyData(freqBuf);

  // centre divider
  scopeCtx.strokeStyle = '#1a1a2e';
  scopeCtx.lineWidth = 1;
  scopeCtx.beginPath();
  scopeCtx.moveTo(half, 0); scopeCtx.lineTo(half, H);
  scopeCtx.stroke();

  // time domain — left half
  scopeCtx.strokeStyle = '#b48eff';
  scopeCtx.lineWidth = 1.5;
  scopeCtx.beginPath();
  const step = Math.ceil(timeBuf.length / half);
  for(let i=0, drawn=0; i<timeBuf.length && drawn<half; i+=step, drawn++) {
    const x = drawn;
    const y = H/2 + (timeBuf[i] - 128) / 128 * (H/2 - 3);
    drawn===0 ? scopeCtx.moveTo(x, y) : scopeCtx.lineTo(x, y);
  }
  scopeCtx.stroke();

  // centre line ref
  scopeCtx.strokeStyle = '#1e1e2e';
  scopeCtx.lineWidth = 1;
  scopeCtx.beginPath();
  scopeCtx.moveTo(0, H/2); scopeCtx.lineTo(half, H/2);
  scopeCtx.stroke();

  // frequency spectrum — right half
  const bins = Math.min(freqBuf.length, 512);
  const bw = half / bins;
  for(let i=0; i<bins; i++) {
    const v = freqBuf[i] / 255;
    const h = v * H;
    const hue = 260 + v * 80; // purple → pink
    scopeCtx.fillStyle = `hsl(${hue},80%,${40 + v*40}%)`;
    scopeCtx.fillRect(half + i * bw, H - h, bw + 0.5, h);
  }
}

function startScope() {
  scopeRunning = true;
  drawScope();
}
function stopScope() {
  scopeRunning = false;
  if(rafId) cancelAnimationFrame(rafId);
  rafId = null;
  // blank canvas
  scopeCtx.fillStyle = '#000';
  scopeCtx.fillRect(0, 0, scopeC.width, scopeC.height);
}

// ── AUDIO CONTEXT ────────────────────────────────────────────────
function ensureContext() {
  if(!audioCtx) {
    audioCtx = new AudioContext();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 4096;
    analyser.smoothingTimeConstant = 0.8;
    timeBuf = new Uint8Array(analyser.fftSize);
    freqBuf = new Uint8Array(analyser.frequencyBinCount);
    analyser.connect(audioCtx.destination);
  }
  if(audioCtx.state === 'suspended') audioCtx.resume();
}

// ── STOP CURRENT SYNTH ───────────────────────────────────────────
function stopSynth() {
  if(autoStopTimer) { clearTimeout(autoStopTimer); autoStopTimer = null; }
  if(!currentNodes) return;

  try {
    const n = currentNodes;
    // stop all oscillators / buffer sources
    const stopAll = (obj) => {
      if(!obj) return;
      if(typeof obj.stop === 'function') { try { obj.stop(); } catch(e){} }
    };
    stopAll(n.osc);
    stopAll(n.noise);
    if(Array.isArray(n.oscs)) n.oscs.forEach(stopAll);
    if(Array.isArray(n.allOscs)) n.allOscs.forEach(stopAll);
    if(n.node) n.node.disconnect();
  } catch(e){}

  currentNodes = null;
  stopScope();
  playBtn.textContent = '> PLAY';
  playBtn.classList.remove('playing');
  statusTxt.textContent = 'stopped';
}

// ── RUN SYNTH ────────────────────────────────────────────────────
function runSynth() {
  ensureContext();
  stopSynth();

  // Build params object from sliders
  const p = {};
  const lesson = LESSONS[currentLesson];
  lesson.params.forEach(pr => {
    p[pr.id] = parseFloat(
      document.getElementById('sl-' + pr.id)?.value ?? pr.def
    );
  });
  params = p;

  // Evaluate user-edited code
  let makeS, updateP;
  try {
    const code = codeTA.value;
    const fn = new Function(code + '\nreturn { makeSynth, updateParams };');
    const exports = fn();
    makeS   = exports.makeSynth;
    updateP = exports.updateParams;
  } catch(err) {
    statusTxt.textContent = 'CODE ERROR: ' + err.message;
    return;
  }

  try {
    const result = makeS(audioCtx, {...p});
    if(!result || !result.node) { statusTxt.textContent = 'makeSynth must return {node, osc}'; return; }

    currentNodes = result;
    currentNodes._updateParams = updateP;

    // Start oscillator if it hasn't been started
    if(result.osc && typeof result.osc.start === 'function') {
      try { result.osc.start(); } catch(e){}
    }

    result.node.connect(analyser);

    startScope();
    playBtn.textContent = '> STOP';
    playBtn.classList.add('playing');
    statusTxt.textContent = 'playing — drag sliders to sculpt sound';

    // Auto-stop if stopAt provided
    if(result.stopAt) {
      const ms = (result.stopAt - audioCtx.currentTime) * 1000;
      autoStopTimer = setTimeout(stopSynth, Math.max(0, ms));
    }
  } catch(err) {
    statusTxt.textContent = 'RUNTIME ERROR: ' + err.message;
    console.error(err);
  }
}

// ── PLAY BUTTON ──────────────────────────────────────────────────
playBtn.addEventListener('click', () => {
  if(currentNodes) stopSynth();
  else runSynth();
});

runBtn.addEventListener('click', runSynth);

// Ctrl/Cmd+Enter to run
document.addEventListener('keydown', (e) => {
  if((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); runSynth(); }
});

// ── SLIDER UPDATE ────────────────────────────────────────────────
function onSlider(id, value) {
  params[id] = parseFloat(value);
  const valEl = document.getElementById('val-' + id);
  if(valEl) valEl.textContent = parseFloat(value).toFixed(
    value % 1 === 0 ? 0 : value < 1 ? 3 : 1
  );
  if(currentNodes && currentNodes._updateParams) {
    try { currentNodes._updateParams(currentNodes, {...params}); } catch(e){}
  }
}

// ── LOAD LESSON ──────────────────────────────────────────────────
function loadLesson(idx) {
  stopSynth();
  currentLesson = idx;

  // Progress bar
  const pct = ((idx + 1) / LESSONS.length * 100).toFixed(1);

  // locus = F2 transition target (where F2 appears to come FROM)
  {ph:'P',  type:'plsv',  cutoff:800,  dur:0.040, locus:700,  vot:0.055},  // bilabial — low burst
  {ph:'T',  type:'plsv',  cutoff:4000, dur:0.030, locus:1800, vot:0.070},  // alveolar — high burst
  {ph:'K',  type:'plsv',  cutoff:1800, dur:0.040, locus:3000, vot:0.060},  // velar — mid burst
  {ph:'B',  type:'plsv',  cutoff:800,  dur:0.030, locus:700,  vot:0.020, voiced:true},
  {ph:'D',  type:'plsv',  cutoff:4000, dur:0.020, locus:1800, vot:0.020, voiced:true},
  {ph:'G',  type:'plsv',  cutoff:1800, dur:0.025, locus:3000, vot:0.020, voiced:true},
  // nasals + approximants
  {ph:'M',  type:'nasal', f1:300,  f2:1000},
  {ph:'N',  type:'nasal', f1:280,  f2:1500},
  {ph:'ŋ',  type:'nasal', f1:280,  f2:2300},
  {ph:'L',  type:'approx',f1:360,  f2:1000},
  {ph:'R',  type:'approx',f1:460,  f2:1100},
  // rest
  {ph:'—',  type:'rest'},
];

const TRACKS = ['SYL 1','SYL 2','SYL 3','SYL 4'];
let STEPS = 8;
const CHROMATIC = [
  {name:'—',    midi:null},
  {name:'C3',   midi:48},{name:'D3',midi:50},{name:'E3',midi:52},{name:'F3',midi:53},
  {name:'G3',   midi:55},{name:'A3',midi:57},{name:'B3',midi:59},
  {name:'C4',   midi:60},{name:'D4',midi:62},{name:'E4',midi:64},{name:'F4',midi:65},
  {name:'G4',   midi:67},{name:'A4',midi:69},{name:'B4',midi:71},
  {name:'C5',   midi:72},{name:'D5',midi:74},{name:'E5',midi:76},{name:'G5',midi:79},
];
let pitchData = Array(16).fill(null); // null = follow global F0 slider
let seqData = Array.from({length:TRACKS.length}, () => Array(16).fill(null));
let selTrack = 0, selStep  = -1;
let seqPlaying = false, seqStep = 0, seqTimer = null;
let seqVoice = null; // persistent legato voice nodes


// ─── PRESET PATTERNS ────────────────────────────────────────────
const PH = (s) => PHONEMES.find(p => p.ph === s) || PHONEMES.find(p=>p.ph==='—');
const PATTERNS = {
  'nasal-chain': {
    desc: 'lesson 07 nasal chain: vowel → nasal → vowel',
    steps: 8,
    tracks: [
      ['A','—','M','—','A','—','—','—'],
      ['I','—','N','—','I','—','—','—'],
      ['—','—','—','—','—','—','—','—'],
      ['—','—','—','—','—','—','—','—'],
    ],
    pitch: [60,null,60,null,62,null,null,null],
  },
  'melodic-4': {
    desc: 'lesson 12 capstone: four vowels on a major scale',
    steps: 8,
    tracks: [
      ['A','—','E','—','I','—','O','—'],
      ['—','—','—','—','—','—','—','—'],
      ['—','—','—','—','—','—','—','—'],
      ['—','—','—','—','—','—','—','—'],
    ],
    pitch: [60,null,62,null,64,null,67,null],
  },
  'consonant-vowel': {
    desc: 'CV pattern — feel coarticulation at the step boundary',
    steps: 8,
    tracks: [
      ['M','A','N','I','P','E','—','—'],
      ['—','—','—','—','—','—','—','—'],
      ['—','—','—','—','—','—','—','—'],
      ['—','—','—','—','—','—','—','—'],
    ],
    pitch: [60,60,62,62,64,64,null,null],
  },
  'fricative-stack': {
    desc: 'voiced vs voiceless fricatives stacked',
    steps: 8,
    tracks: [
      ['S','—','ʃ','—','F','—','θ','—'],
      ['Z','—','—','—','V','—','ð','—'],
      ['—','—','—','—','—','—','—','—'],
      ['—','—','—','—','—','—','—','—'],
    ],
    pitch: Array(8).fill(null),
  },
};

function loadPattern(name) {
  const pat = PATTERNS[name];
  if(!pat) return;
  STEPS = pat.steps;
  // reset
  seqData = Array.from({length:TRACKS.length}, () => Array(16).fill(null));
  pitchData = Array(16).fill(null);
  pat.tracks.forEach((row, ti) => {
    row.forEach((sym, si) => {
      const found = PHONEMES.find(p => p.ph === sym);
      seqData[ti][si] = (found && found.type !== 'rest') ? found : null;
    });
  });
  (pat.pitch || []).forEach((m, si) => { pitchData[si] = m; });
  // update step count display
  const sc = document.getElementById('phseq-steps-val');
  if(sc) sc.textContent = STEPS;
  buildSequencer();
  const hint = document.getElementById('phseq-hint');
  if(hint) hint.textContent = '>> loaded: ' + (pat.desc || name);
}

function buildPitchRow() {
  const row = document.getElementById('phseq-pitch-row');
  if(!row) return;
  row.innerHTML = '<div class="phseq-pitch-label">PITCH</div>';
  for(let si=0; si<STEPS; si++) {
    const cell = document.createElement('div');
    cell.className = 'phseq-pitch-cell' + (si%2===0 ? ' beat' : '');
    cell.dataset.si = si;
    const n = CHROMATIC.find(c => c.midi === pitchData[si]);
    cell.textContent = n ? n.name : '—';
    cell.title = 'L-click: cycle note  ·  R-click: clear';
    cell.addEventListener('click', () => {
      // cycle through CHROMATIC
      const cur = pitchData[si];
      const idx = CHROMATIC.findIndex(c => c.midi === cur);
      const next = CHROMATIC[(idx + 1) % CHROMATIC.length];
      pitchData[si] = next.midi;
      cell.textContent = next.name;
      cell.classList.toggle('has-pitch', next.midi !== null);
    });
    cell.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      pitchData[si] = null;
      cell.textContent = '—';
      cell.classList.remove('has-pitch');
    });
    row.appendChild(cell);
  }
}

function buildSequencer() {
  const grid    = document.getElementById('phseq-grid');
  const picker  = document.getElementById('phoneme-picker');
  grid.innerHTML   = '';
  picker.innerHTML = '<label>PHONEMES — select a step, then tap one below</label>';

  buildPitchRow();

  TRACKS.forEach((label, ti) => {
    const col = document.createElement('div');
    col.className = 'phseq-track';
    const lbl = document.createElement('div');
    lbl.className = 'phseq-track-label';
    lbl.textContent = label;
    col.appendChild(lbl);

    for(let si=0; si<STEPS; si++) {
      const cell = document.createElement('div');
      cell.className = 'phseq-step' + (si%2===0 ? ' beat' : '');
      cell.dataset.ti = ti;
      cell.dataset.si = si;
      cell.textContent = seqData[ti][si]?.ph ?? '—';
      if(seqData[ti][si] && seqData[ti][si].type !== 'rest') cell.classList.add('on');
      cell.addEventListener('click', () => {
        selTrack = ti; selStep = si;
        document.querySelectorAll('.phseq-step').forEach(c => c.classList.remove('active-step'));
        cell.classList.add('active-step');
        document.getElementById('phseq-hint').textContent =
          'track ' + label + ' step ' + (si+1) + ' — tap a phoneme below';
      });
      col.appendChild(cell);
    }
    grid.appendChild(col);
  });

  // Phoneme picker
  PHONEMES.forEach(ph => {
    const btn = document.createElement('button');
    btn.className = 'ph-key ' + (ph.type==='vowel'?'vowel':ph.type==='fric'?'fric':ph.type==='plsv'?'plsv':'rest');
    btn.textContent = ph.ph;
    btn.title = ph.type;
    btn.addEventListener('click', () => {
      if(selStep < 0) return;
      seqData[selTrack][selStep] = ph.type==='rest' ? null : ph;
      refreshSequencerCells();
    });
    picker.appendChild(btn);
  });
}

function refreshSequencerCells() {
  document.querySelectorAll('.phseq-step').forEach(cell => {
    const ti = parseInt(cell.dataset.ti), si = parseInt(cell.dataset.si);
    const ph = seqData[ti][si];
    cell.textContent = ph?.ph ?? '—';
    cell.classList.toggle('on', !!ph && ph.type !== 'rest');
  });
}

function midiToHz(midi) {
  return 440 * Math.pow(2, (midi - 69) / 12);
}

function getSeqF0(stepMidi) {
  if(stepMidi !== null && stepMidi !== undefined) return midiToHz(stepMidi);
  // fall through to current lesson's F0 slider (or pitch slider)
  const f0el = document.getElementById('f0') || document.getElementById('basePitch');
  return f0el ? parseFloat(f0el.value) : 120;
}

function playPhoneme(ph, stepMidi) {
  ensureContext();
  if(!ph || ph.type === 'rest') return;

  const ctx = audioCtx;
  const now = ctx.currentTime;
  const master = ctx.createGain();
  master.gain.value = 0.4;
  master.connect(analyser);

  const f0 = getSeqF0(stepMidi);

  if(ph.type === 'approx') {
    // lateral/rhotic approximants — vowel-like but darker
    const osc = ctx.createOscillator();
    osc.type = 'sawtooth';
    osc.frequency.value = f0;
    const f1 = ctx.createBiquadFilter(); f1.type='bandpass'; f1.frequency.value=ph.f1; f1.Q.value=8;
    const f2 = ctx.createBiquadFilter(); f2.type='bandpass'; f2.frequency.value=ph.f2; f2.Q.value=8;
    const env = ctx.createGain();
    env.gain.setValueAtTime(0, now);
    env.gain.linearRampToValueAtTime(0.8, now+0.03);
    env.gain.setValueAtTime(0.8, now+0.10);
    env.gain.exponentialRampToValueAtTime(0.001, now+0.18);
    osc.connect(f1); f1.connect(env);
    osc.connect(f2); f2.connect(env);
    env.connect(master);
    osc.start(now); osc.stop(now+0.20);
  } else if(ph.type === 'vowel' || ph.type === 'nasal') {
    const osc = ctx.createOscillator();
    osc.type = 'sawtooth';
    osc.frequency.value = f0;
    const f1 = ctx.createBiquadFilter(); f1.type='bandpass'; f1.frequency.value=ph.f1; f1.Q.value=10;
    const f2 = ctx.createBiquadFilter(); f2.type='bandpass'; f2.frequency.value=ph.f2; f2.Q.value=12;
    const env = ctx.createGain();
    env.gain.setValueAtTime(0, now);
    env.gain.linearRampToValueAtTime(1, now+0.02);
    env.gain.setValueAtTime(1, now+0.12);
    env.gain.exponentialRampToValueAtTime(0.001, now+0.22);
    osc.connect(f1); f1.connect(env);
    osc.connect(f2); f2.connect(env);
    env.connect(master);
    osc.start(now); osc.stop(now+0.25);

  } else if(ph.type === 'fric') {
    // Two-stage filter: HPF removes energy below the noise floor,
    // BPF shapes the spectral peak — this peak is what makes /s/ vs /ʃ/ vs /f/ distinct.
    const dur = 0.16;
    const len = Math.ceil(ctx.sampleRate * (dur + 0.02));
    const buf = ctx.createBuffer(1, len, ctx.sampleRate);
    const d = buf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
    const nSrc = ctx.createBufferSource(); nSrc.buffer = buf;
    const hpf = ctx.createBiquadFilter(); hpf.type='highpass';
    hpf.frequency.value = ph.hpf || ph.cutoff * 0.5; hpf.Q.value = 0.7;
    const bpf = ctx.createBiquadFilter(); bpf.type='peaking';
    bpf.frequency.value = ph.cutoff; bpf.Q.value = ph.Q; bpf.gain.value = 10;
    const env = ctx.createGain();
    env.gain.setValueAtTime(0, now);
    env.gain.linearRampToValueAtTime(0.55, now + 0.010);
    env.gain.setValueAtTime(0.55, now + dur - 0.03);
    env.gain.exponentialRampToValueAtTime(0.001, now + dur);
    nSrc.connect(hpf); hpf.connect(bpf); bpf.connect(env); env.connect(master);
    nSrc.start(now); nSrc.stop(now + dur + 0.02);
    if(ph.voiced) {
      // Voiced: low-gain buzz through a low bandpass (the glottal formant region)
      // The noise stays dominant — buzz just adds the voicing "gravel" underneath
      const vbuzz = ctx.createOscillator();
      vbuzz.type = 'sawtooth'; vbuzz.frequency.value = f0;
      const vbpf = ctx.createBiquadFilter(); vbpf.type='bandpass';
      vbpf.frequency.value = 400; vbpf.Q.value = 3;
      const vbg = ctx.createGain(); vbg.gain.value = 0.18;
      vbuzz.connect(vbpf); vbpf.connect(vbg); vbg.connect(master);
      vbuzz.start(now); vbuzz.stop(now + dur);
    }

  } else if(ph.type === 'plsv') {
    // Plosive structure: closure (silence) → burst → aspiration (VOT) → voice onset
    // The burst duration and VOT length are the primary place-of-articulation cues.
    const closure  = 0.025;           // 25ms silence — the stop closure
    const burstDur = ph.dur;          // place-specific burst length
    const vot      = ph.vot || 0.05; // voice onset time — aspiration after burst
    const total    = closure + burstDur + vot + 0.02;

    // BURST: loud, short, bandpass-filtered noise at place-specific frequency
    const burstLen = Math.ceil(ctx.sampleRate * (burstDur + 0.01));
    const burstBuf = ctx.createBuffer(1, burstLen, ctx.sampleRate);
    const bd = burstBuf.getChannelData(0); for(let i=0;i<bd.length;i++) bd[i]=Math.random()*2-1;
    const burstSrc = ctx.createBufferSource(); burstSrc.buffer = burstBuf;
    const burstBPF = ctx.createBiquadFilter(); burstBPF.type='bandpass';
    burstBPF.frequency.value = ph.cutoff; burstBPF.Q.value = 4;
    const burstEnv = ctx.createGain();
    burstEnv.gain.setValueAtTime(0, now + closure);
    burstEnv.gain.linearRampToValueAtTime(1.0, now + closure + 0.003);  // 3ms attack — snappy
    burstEnv.gain.exponentialRampToValueAtTime(0.001, now + closure + burstDur);
    burstSrc.connect(burstBPF); burstBPF.connect(burstEnv); burstEnv.connect(master);
    burstSrc.start(now + closure); burstSrc.stop(now + closure + burstDur + 0.01);

    // ASPIRATION: quieter broadband noise during VOT (voice onset time)
    // This is the "h-like" breath after an English voiceless stop
    const aspLen = Math.ceil(ctx.sampleRate * (vot + 0.02));
    const aspBuf = ctx.createBuffer(1, aspLen, ctx.sampleRate);
    const ad = aspBuf.getChannelData(0); for(let i=0;i<ad.length;i++) ad[i]=Math.random()*2-1;
    const aspSrc = ctx.createBufferSource(); aspSrc.buffer = aspBuf;
    const aspHPF = ctx.createBiquadFilter(); aspHPF.type='highpass';
    aspHPF.frequency.value = 1000; aspHPF.Q.value = 0.5;
    const aspEnv = ctx.createGain();
    const aspStart = now + closure + burstDur;
    aspEnv.gain.setValueAtTime(0, aspStart);
    aspEnv.gain.linearRampToValueAtTime(0.35, aspStart + 0.008);
    aspEnv.gain.exponentialRampToValueAtTime(0.001, aspStart + vot);
    aspSrc.connect(aspHPF); aspHPF.connect(aspEnv); aspEnv.connect(master);
    aspSrc.start(aspStart); aspSrc.stop(aspStart + vot + 0.01);

    if(ph.voiced) {
      // Voiced plosive: prevoicing — quiet buzz starts BEFORE the burst
      const pbuzz = ctx.createOscillator();
      pbuzz.type = 'sawtooth'; pbuzz.frequency.value = f0;
      const pbpf = ctx.createBiquadFilter(); pbpf.type='bandpass'; pbpf.frequency.value=300; pbpf.Q.value=2;
      const pbg = ctx.createGain(); pbg.gain.value = 0;
      pbg.gain.setValueAtTime(0, now);
      pbg.gain.linearRampToValueAtTime(0.12, now + 0.01);
      pbg.gain.setValueAtTime(0.12, now + closure + burstDur * 0.5);
      pbg.gain.linearRampToValueAtTime(0, now + closure + burstDur);
      pbuzz.connect(pbpf); pbpf.connect(pbg); pbg.connect(master);
      pbuzz.start(now); pbuzz.stop(now + ph.dur + 0.06);
    }
  }

  setTimeout(() => { try { master.disconnect(); } catch(e){} }, 500);
}

// ── LEGATO VOICE ─────────────────────────────────────────────────
// Instead of firing a new oscillator every step, we keep one running
// and ramp the formant filters to new targets — exactly how TTS works.
// Consonant impulses (fricatives, plosives) fire as brief overlays.
function startLegatoVoice() {
  ensureContext();
  const ctx = audioCtx;
  const osc  = ctx.createOscillator();
  osc.type   = 'sawtooth';
  osc.frequency.value = 120;

  const f1 = ctx.createBiquadFilter(); f1.type = 'bandpass'; f1.frequency.value = 500; f1.Q.value = 10;
  const f2 = ctx.createBiquadFilter(); f2.type = 'bandpass'; f2.frequency.value = 1500; f2.Q.value = 12;

  // Breathiness noise — runs continuously
  const nLen = ctx.sampleRate * 60; // 60s buffer, loops
  const nBuf = ctx.createBuffer(1, nLen, ctx.sampleRate);
  const nd = nBuf.getChannelData(0);
  for (let i = 0; i < nLen; i++) nd[i] = Math.random() * 2 - 1;
  const nSrc = ctx.createBufferSource(); nSrc.buffer = nBuf; nSrc.loop = true;
  const nLPF = ctx.createBiquadFilter(); nLPF.type = 'lowpass'; nLPF.frequency.value = 4000;
  const nGain = ctx.createGain(); nGain.gain.value = 0;
  nSrc.connect(nLPF); nLPF.connect(nGain);

  const gate  = ctx.createGain(); gate.gain.value = 0; // controls voiced/rest
  const master = ctx.createGain(); master.gain.value = 0.5;

  osc.connect(f1); f1.connect(gate);
  osc.connect(f2); f2.connect(gate);
  nGain.connect(gate);
  gate.connect(master); master.connect(analyser);

  osc.start(); nSrc.start();
  seqVoice = { osc, f1, f2, gate, nGain, nSrc, master, ctx };
}

function stopLegatoVoice() {
  if (!seqVoice) return;
  const { osc, nSrc, gate, master, ctx } = seqVoice;
  const now = ctx.currentTime;
  gate.gain.cancelScheduledValues(now);
  gate.gain.setValueAtTime(0, now);
  try { osc.stop(now + 0.05); } catch(e) {}
  try { nSrc.stop(now + 0.05); } catch(e) {}
  setTimeout(() => { try { master.disconnect(); } catch(e) {} }, 200);
  seqVoice = null;
}


// Soft fricative overlay for legato sequencer — short duration, low gain
// Same HPF+BPF approach as playPhoneme but quieter and briefer
function playFricOverlay(ph, startTime) {
  ensureContext();
  const ctx = audioCtx;
  const dur = 0.08; // 80ms — just enough hiss to identify the consonant
  const len = Math.ceil(ctx.sampleRate * (dur + 0.01));
  const buf = ctx.createBuffer(1, len, ctx.sampleRate);
  const d = buf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
  const nSrc = ctx.createBufferSource(); nSrc.buffer = buf;
  const hpf = ctx.createBiquadFilter(); hpf.type='highpass';
  hpf.frequency.value = ph.hpf || ph.cutoff * 0.5; hpf.Q.value = 0.7;
  const bpf = ctx.createBiquadFilter(); bpf.type='peaking';
  bpf.frequency.value = ph.cutoff; bpf.Q.value = ph.Q; bpf.gain.value = 10;
  const env = ctx.createGain();
  env.gain.setValueAtTime(0, startTime);
  env.gain.linearRampToValueAtTime(0.30, startTime + 0.006);
  env.gain.setValueAtTime(0.30, startTime + dur - 0.015);
  env.gain.exponentialRampToValueAtTime(0.001, startTime + dur);
  nSrc.connect(hpf); hpf.connect(bpf); bpf.connect(env); env.connect(analyser);
  nSrc.start(startTime); nSrc.stop(startTime + dur + 0.01);
}

function seqTick() {
  const bpm = parseInt(document.getElementById('phseq-bpm')?.value ?? 80);
  const intervalMs = (60 / bpm / 2) * 1000; // eighth-note steps
  const stepSec    = intervalMs / 1000;
  const xfSec      = Math.min(0.04, stepSec * 0.25); // crossfade = 25% of step or 40ms max

  if (!seqVoice) { startLegatoVoice(); }
  const { osc, f1, f2, gate, nGain, ctx } = seqVoice;
  const now = ctx.currentTime;

  // Collect what's on this step across all tracks
  let voicedPh  = null;  // first vowel/nasal/approx found
  let impulsePh = null;  // first fricative/plosive found

  TRACKS.forEach((_, ti) => {
    const ph = seqData[ti][seqStep];
    if (!ph || ph.type === 'rest') return;
    if (!voicedPh  && (ph.type === 'vowel' || ph.type === 'nasal' || ph.type === 'approx')) voicedPh = ph;
    if (!impulsePh && (ph.type === 'fric'  || ph.type === 'plsv'))  impulsePh = ph;
  });

  const stepMidi = pitchData[seqStep];
  const targetF0 = getSeqF0(stepMidi);

  if (voicedPh) {
    // Ramp formants to this vowel/nasal (coarticulation window = xfSec)
    osc.frequency.linearRampToValueAtTime(targetF0, now + xfSec);
    f1.frequency.linearRampToValueAtTime(voicedPh.f1, now + xfSec);
    f2.frequency.linearRampToValueAtTime(voicedPh.f2, now + xfSec);
    // Breathiness from phoneme type — nasals slightly airier
    const breath = voicedPh.type === 'nasal' ? 0.08 : 0.04;
    nGain.gain.linearRampToValueAtTime(breath, now + xfSec);
    gate.gain.linearRampToValueAtTime(0.9, now + xfSec * 0.5);
    gate.gain.setValueAtTime(0.9, now + stepSec - xfSec);
    gate.gain.linearRampToValueAtTime(0.3, now + stepSec);  // slight tail into next step
  } else if (!impulsePh) {
    // Rest — fade out
    gate.gain.linearRampToValueAtTime(0, now + xfSec);
    nGain.gain.linearRampToValueAtTime(0, now + xfSec);
  }

  // Plosives: gate dip implies closure — no separate burst (prevents snare sound)
  // Fricatives: fire a soft hiss overlay on top of the legato voice
  if (impulsePh && impulsePh.type === 'plsv') {
    gate.gain.setValueAtTime(0.04, now);
    gate.gain.linearRampToValueAtTime(voicedPh ? 0.9 : 0.3, now + xfSec * 2);
  } else if (impulsePh && impulsePh.type === 'fric') {
    // Hiss overlay: separate quiet fricative on top of legato voice
    playFricOverlay(impulsePh, now);
    // Slight gate reduction — voice continues underneath the fricative
    gate.gain.setValueAtTime(0.3, now);
    gate.gain.linearRampToValueAtTime(voicedPh ? 0.9 : 0.2, now + stepSec * 0.7);
  }

  // Highlight active step
  document.querySelectorAll('.phseq-step, .phseq-pitch-cell').forEach(cell => {
    cell.classList.remove('play-head');
    if (parseInt(cell.dataset.si) === seqStep) cell.classList.add('play-head');
  });

  seqStep = (seqStep + 1) % STEPS;
  if (seqPlaying) seqTimer = setTimeout(seqTick, intervalMs);
}

document.getElementById('phseq-clear')?.addEventListener('click', () => {
  seqData = Array.from({length:TRACKS.length}, () => Array(16).fill(null));
  pitchData = Array(16).fill(null);
  refreshSequencerCells();
  buildPitchRow();
  document.getElementById('phseq-hint').textContent = 'cleared — select a step, then tap a phoneme below';
});

document.getElementById('phseq-steps-btn')?.addEventListener('click', function() {
  STEPS = STEPS === 8 ? 16 : 8;
  this.textContent = STEPS;
  buildSequencer();
});

document.getElementById('phseq-preset')?.addEventListener('change', function() {
  if(this.value) { loadPattern(this.value); this.value = ''; }
});

document.getElementById('phseq-play')?.addEventListener('click', function() {
  seqPlaying = !seqPlaying;
  this.textContent = seqPlaying ? '> STOP' : '> PLAY';
  this.classList.toggle('playing', seqPlaying);
  if(seqPlaying) {
    seqStep = 0;
    startLegatoVoice();
    seqTick();
  } else {
    clearTimeout(seqTimer);
    stopLegatoVoice();
    document.querySelectorAll('.phseq-step, .phseq-pitch-cell').forEach(c => c.classList.remove('play-head'));
  }
});

document.getElementById('phseq-bpm')?.addEventListener('input', function() {
  document.getElementById('phseq-bpm-val').textContent = this.value;
});

document.getElementById('phseq-close')?.addEventListener('click', () => {
  seqPlaying = false;
  clearTimeout(seqTimer);
  document.getElementById('phoneme-overlay').classList.remove('visible');
  document.getElementById('phseq-play').textContent = '> PLAY';
  document.getElementById('phseq-play').classList.remove('playing');
});

// ── SEQ BUTTON ───────────────────────────────────────────────────
document.getElementById('seq-btn')?.addEventListener('click', () => {
  const ov = document.getElementById('phoneme-overlay');
  ov.classList.toggle('visible');
});

buildSequencer();

// ── HERO CANVAS ──────────────────────────────────────────────────
(function() {
  const heroC = document.getElementById('hero');
  const hCtx  = heroC.getContext('2d');
  let hW, hH, hRaf;

  function resize() {
    hW = heroC.width  = heroC.offsetWidth;
    hH = heroC.height = heroC.offsetHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  function drawHero(ts) {
    hRaf = requestAnimationFrame(drawHero);
    const t = ts / 1000;

    hCtx.clearRect(0, 0, hW, hH);

    // Animate two overlapping vocal-tract waveforms
    for(let wave=0; wave<2; wave++) {
      const pitchHz  = wave === 0 ? 120 : 180;
      const syllRate = wave === 0 ? 0.7 : 1.1;
      const phase    = wave * Math.PI / 2;
      const color    = wave === 0 ? '#b48eff' : '#6bc5ff';

      hCtx.strokeStyle = color;
      hCtx.lineWidth   = wave === 0 ? 2 : 1.2;
      hCtx.globalAlpha = wave === 0 ? 0.9 : 0.55;
      hCtx.beginPath();

      for(let x=0; x<hW; x++) {
        const tx = x / hW * 4 + t * 0.25 + phase;

        // Glottal pulse envelope (syllable rate)
        const syll = 0.5 + 0.5 * Math.sin(tx * syllRate * Math.PI * 2);

        // Glottal period
        const gPhase = (tx * pitchHz) % 1;
        let pulse;
        if(gPhase < 0.55) {
          // open phase: smooth rise
          pulse = Math.pow(Math.sin(gPhase / 0.55 * Math.PI), 1.4);
        } else {
          // closed phase: abrupt return
          pulse = -0.18 * Math.exp(-(gPhase - 0.55) / 0.04);
        }

        // Formant ripple (F1 ~400Hz)
        const formant = Math.sin(tx * 400 * Math.PI * 2 + phase) * 0.15;

        const y = hH / 2 - (pulse * syll + formant * syll) * hH * 0.32;
        x === 0 ? hCtx.moveTo(x, y) : hCtx.lineTo(x, y);
      }
      hCtx.stroke();
    }

    hCtx.globalAlpha = 1;
  }

  drawHero(0);
})();

loadLesson(0);
