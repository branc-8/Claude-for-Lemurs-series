<!DOCTYPE html>
<html lang="en">
<head>

<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;700;800&display=swap');

}

</head>
<body>

<header>
  <canvas id="hero"></canvas>
  <div class="inner">
    <div class="tagline-chip">🐒 Interactive Shader School</div>
    <h1>GLSL for <span>Lemurs</span></h1>
    <p class="subtitle">// from zero pixels → shader wizard → you can do this</p>
  </div>
</header>

<div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
<nav id="lesson-nav"></nav>

<main>
  <div class="lesson-panel" id="lesson-text"></div>
  <div class="editor-panel">
    <div class="canvas-area">
      <span class="canvas-label">▶ live output</span>
      <canvas id="shader-output"></canvas>
      <div class="error-overlay" id="error-box"></div>
    </div>
    <div class="code-toolbar">
      <span>FRAGMENT SHADER — edit &amp; run</span>
      <button class="run-btn" onclick="compileAndRun()">▶ RUN</button>
    </div>
    <div class="code-editor">
      <textarea id="glsl-code" spellcheck="false"></textarea>
    </div>
  </div>
</main>

<script>
const LESSONS = [

// ─── 1 ───────────────────────────────────────────
{
title: "Your First Pixel",
subtitle: "01 — Hello Color",
body: `
<p>Welcome! A <strong>shader</strong> is just a tiny program that runs on your GPU — once <em>per pixel</em>, insanely fast, all at the same time.</p>
<p>Think of it like this: imagine a million tiny ants, each painting one dot of the screen. They all run the same code but each ant only knows where <em>it</em> is.</p>
<p>The shader below outputs a <strong>solid color</strong>. Every pixel runs this code and returns the same result.</p>
<p><strong>gl_FragColor</strong> is the magic variable — it's the color you're handing back. It takes 4 numbers: <em>Red, Green, Blue, Alpha</em> — all between 0.0 and 1.0.</p>
<div class="tip">Think of 0.0 as "none of that color" and 1.0 as "full blast". It's like a knob from off to maximum. No 0–255 nonsense here!</div>
<p>Try changing the numbers. Make it red: <strong>vec4(1.0, 0.0, 0.0, 1.0)</strong></p>
`,
shader: `// Every pixel runs this exact code.
// "precision" just tells the GPU how precise
// our decimal numbers should be. mediump = "medium".
precision mediump float;

void main() {
  // gl_FragColor = the final color of THIS pixel.
  // vec4 = a group of 4 numbers: (R, G, B, Alpha)
  // All values go from 0.0 (none) to 1.0 (full)
  
  gl_FragColor = vec4(
    0.2,   // Red:   low → not much red
    0.8,   // Green: high → lots of green
    0.6,   // Blue:  medium
    1.0    // Alpha: 1.0 = fully visible
  );
}
`
},

// ─── 2 ───────────────────────────────────────────
{
title: "Knowing Where You Are",
subtitle: "02 — Coordinates & UV",
body: `
<p>Right now every pixel paints the same color. Boring! Let's make pixels paint <em>differently based on their position</em>.</p>
<p>The special variable <strong>gl_FragCoord</strong> tells each pixel its own X,Y position in pixels. But pixel coordinates are ugly to work with (they depend on screen size).</p>
<p>Instead, we convert to <strong>UV coordinates</strong> — a normalized 0.0–1.0 space. Bottom-left = (0,0). Top-right = (1,1). Same everywhere, no matter the screen size.</p>
<p>In the shader: <em>uv.x</em> goes from 0 (left) → 1 (right). We use that as the Red channel. Result: a <strong>gradient</strong>!</p>
<div class="tip">UV is just "normalized position". U = horizontal, V = vertical. It's the most useful thing in shader-land. Tattoo it on your brain.</div>
<p>Try using <strong>uv.y</strong> for blue. Or add both together!</p>
`,
shader: `precision mediump float;

// The GPU gives us the resolution (canvas size)
// as a "uniform" — a value shared by ALL pixels.
uniform vec2 u_resolution;

void main() {
  // gl_FragCoord.xy = this pixel's position in pixels
  // Dividing by resolution gives us 0.0 → 1.0 range
  // This is called "UV" or "normalized coordinates"
  vec2 uv = gl_FragCoord.xy / u_resolution;
  
  // uv.x goes from 0 (left edge) to 1 (right edge)
  // Use it as the Red channel → red gradient!
  float red   = uv.x;
  
  // uv.y goes from 0 (bottom) to 1 (top)
  float green = uv.y;
  
  // Combine them!
  gl_FragColor = vec4(red, green, 0.4, 1.0);
}
`
},

// ─── 3 ───────────────────────────────────────────
{
title: "Time & Animation",
subtitle: "03 — The u_time Uniform",
body: `
<p>Animation = changing something over time. We pass the current time into the shader as a <strong>uniform</strong> called <em>u_time</em>.</p>
<p>A uniform is a value that's the same for every pixel but changes each frame — like the current second on a clock.</p>
<p>The magic function: <strong>sin()</strong>. It oscillates smoothly between -1 and 1. Feed it time, get a wave! Scale it to 0–1 with: <em>(sin(x) + 1.0) / 2.0</em></p>
<div class="tip">sin() is your best friend in shaders. It's just a smoothly wiggling number. Like a lemur's tail swinging back and forth. Feed it time → pulsing animation. No math degree needed!</div>
<p>Try making different channels pulse at different speeds by multiplying u_time: <strong>sin(u_time * 2.0)</strong></p>
`,
shader: `precision mediump float;

uniform vec2 u_resolution;
uniform float u_time; // current time in seconds

void main() {
  vec2 uv = gl_FragCoord.xy / u_resolution;
  
  // sin() goes from -1 to 1 smoothly.
  // Add 1, divide by 2 → now it's 0 to 1.
  // This maps nicely to a color value!
  float pulse = (sin(u_time) + 1.0) / 2.0;
  
  // Different speeds for each channel:
  float r = (sin(u_time * 1.0) + 1.0) / 2.0;
  float g = (sin(u_time * 0.7 + 1.0) + 1.0) / 2.0;
  float b = (sin(u_time * 1.3 + 2.0) + 1.0) / 2.0;
  
  // Mix with UV position too for extra fun
  gl_FragColor = vec4(r * uv.x, g, b * uv.y, 1.0);
}
`
},

// ─── 4 ───────────────────────────────────────────
{
title: "Drawing Shapes",
subtitle: "04 — Circles & step()",
body: `
<p>How do you draw a circle in a shader? There's no "draw circle" function — instead, you <em>test every pixel</em>: "are you inside the circle?"</p>
<p>The distance formula: <strong>length(uv - center)</strong> gives you how far each pixel is from the center point.</p>
<p>Then <strong>step(edge, value)</strong> is a hard switch: returns 0.0 if value &lt; edge, returns 1.0 if value ≥ edge. It's like an on/off button.</p>
<p>Use <strong>smoothstep(a, b, x)</strong> for a soft edge — smooth transition between a and b. Much more beautiful!</p>
<div class="tip">Shaders don't "draw shapes" — they ask "is this pixel inside the shape?" for every single pixel. It's backwards from what you're used to, but incredibly powerful!</div>
`,
shader: `precision mediump float;

uniform vec2 u_resolution;
uniform float u_time;

void main() {
  // Center UV around 0,0 (so center of screen = 0,0)
  // by multiplying by 2 and subtracting 1
  vec2 uv = (gl_FragCoord.xy / u_resolution) * 2.0 - 1.0;
  
  // Fix stretching: multiply x by width/height ratio
  uv.x *= u_resolution.x / u_resolution.y;
  
  // Distance from center (0,0) for each pixel
  float dist = length(uv);
  
  // Animated radius
  float radius = 0.4 + sin(u_time) * 0.1;
  
  // smoothstep(edge0, edge1, x)
  // → smooth 0-to-1 transition between edge0 and edge1
  // Invert (1.0 - ...) so inside = 1, outside = 0
  float circle = 1.0 - smoothstep(radius - 0.02, radius + 0.02, dist);
  
  // Color the circle green, background dark
  vec3 color = mix(
    vec3(0.05, 0.05, 0.1),  // background color
    vec3(0.5, 1.0, 0.4),    // circle color
    circle                  // 0 = bg, 1 = circle
  );
  
  gl_FragColor = vec4(color, 1.0);
}
`
},

// ─── 5 ───────────────────────────────────────────
{
title: "Patterns with fract()",
subtitle: "05 — Repeating & Tiling",
body: `
<p>Want to tile a pattern? <strong>fract(x)</strong> returns only the decimal part of a number. So fract(2.7) = 0.7, fract(3.0) = 0.0.</p>
<p>If you multiply UV by 5 and take fract(), you get 5 copies of the 0–1 space across your canvas. Instant tiling!</p>
<p><strong>floor(x)</strong> is the opposite — gives you just the integer part. Use it to give each tile a unique ID for randomness.</p>
<div class="tip">fract() is like a copy machine for your coordinate space. Multiply first to set how many copies, then fract() to reset each tile back to 0-1. That's ALL tiling is!</div>
<p>Try changing the <strong>8.0</strong> to see more or fewer tiles. Try using the tile ID for colors!</p>
`,
shader: `precision mediump float;

uniform vec2 u_resolution;
uniform float u_time;

// A "hash" function: scrambles a number into
// a fake-random value. It's not truly random,
// just looks like it. Very useful!
float hash(vec2 p) {
  return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5);
}

void main() {
  vec2 uv = gl_FragCoord.xy / u_resolution;
  
  // Scale up to make 8x8 grid
  vec2 scaled = uv * 8.0;
  
  // fract() wraps each tile back to 0-1 range
  vec2 cell_uv = fract(scaled);
  
  // floor() gives the INTEGER tile index (0,1,2...)
  // Use it as a unique ID for each cell
  vec2 cell_id = floor(scaled);
  
  // Each cell gets a random brightness using its ID
  float brightness = hash(cell_id + floor(u_time * 0.5));
  
  // Draw a circle in each tile
  vec2 centered = cell_uv * 2.0 - 1.0;
  float dist = length(centered);
  float circle = 1.0 - smoothstep(0.3, 0.35, dist);
  
  vec3 color = vec3(0.1, 0.8, 0.5) * brightness * circle;
  
  gl_FragColor = vec4(color, 1.0);
}
`
},

// ─── 6 ───────────────────────────────────────────
{
title: "Noise — Organic Randomness",
subtitle: "06 — Value Noise",
body: `
<p>Pure random looks static and harsh. <strong>Noise</strong> is smooth randomness — like clouds, terrain, or wood grain. It's the secret sauce of organic-looking shaders.</p>
<p>Value noise works by: hashing random values at grid corners, then <strong>smoothly interpolating</strong> between them using <em>mix()</em>.</p>
<p>Stack multiple noise layers at different scales (frequencies) and you get <strong>fractal noise</strong> — also called FBM (Fractal Brownian Motion). This is how pretty much every natural texture is made.</p>
<div class="tip">Noise = smooth randomness. Think of it like a random landscape where nearby points are similar. Layer it at different zoom levels and you get clouds, fire, marble — literally everything natural!</div>
`,
shader: `precision mediump float;

uniform vec2 u_resolution;
uniform float u_time;

// Simple 2D hash: input position → "random" float
float hash(vec2 p) {
  return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5);
}

// Value noise: smooth random by blending grid corners
float noise(vec2 p) {
  vec2 i = floor(p);   // integer grid cell
  vec2 f = fract(p);   // position within cell
  
  // Smooth the interpolation (feels nicer than linear)
  // This is called a "smoothstep curve"
  vec2 u = f * f * (3.0 - 2.0 * f);
  
  // Sample the 4 corners of the grid cell
  float a = hash(i);
  float b = hash(i + vec2(1.0, 0.0));
  float c = hash(i + vec2(0.0, 1.0));
  float d = hash(i + vec2(1.0, 1.0));
  
  // Blend between corners based on position
  return mix(mix(a, b, u.x), mix(c, d, u.x), u.y);
}

// FBM = layer noise at different scales
// Each layer = "octave". More octaves = more detail
float fbm(vec2 p) {
  float value = 0.0;
  float amplitude = 0.5; // how strong each layer is
  
  for (int i = 0; i < 5; i++) {
    value += amplitude * noise(p);
    p *= 2.0;          // zoom in (higher frequency)
    amplitude *= 0.5;  // quieter (less amplitude)
  }
  return value;
}

void main() {
  vec2 uv = gl_FragCoord.xy / u_resolution;
  
  // Animate the noise by shifting it over time
  float n = fbm(uv * 3.0 + u_time * 0.2);
  
  // Map noise to a color gradient
  // mix(colorA, colorB, amount) blends two colors
  vec3 color = mix(
    vec3(0.05, 0.1, 0.3),  // dark blue
    vec3(0.8, 0.95, 1.0),  // light cyan
    n
  );
  
  gl_FragColor = vec4(color, 1.0);
}
`
},

// ─── 7 ───────────────────────────────────────────
{
title: "Textures & UV Mapping",
subtitle: "07 — sampler2D",
body: `
<p>A <strong>texture</strong> is an image you send to the GPU. You sample it using UV coordinates — you ask "what color is at this position in the image?"</p>
<p>The function <strong>texture2D(sampler, uv)</strong> returns the color at that UV spot. UVs still go 0–1 and tile/wrap automatically.</p>
<p>The power: you can <em>warp, stretch, scroll, and distort</em> the UVs before sampling. Offsetting UVs over time = scrolling texture. Adding noise to UVs = warped/melting effect.</p>
<div class="tip">UV mapping is like stretching a photo over a surface. The UVs decide WHICH part of the photo lands on WHICH pixel. Distort the UVs, distort the image. You're not touching the image — just the "projection"!</div>
<p>This demo uses a procedural "texture" since we can't load images here — but the same texture2D() call works with real images!</p>
`,
shader: `precision mediump float;

uniform vec2 u_resolution;
uniform float u_time;

// In real apps you'd have: uniform sampler2D u_texture;
// And sample it with: texture2D(u_texture, uv)
// Here we'll make a fake procedural texture instead!

// Fake "texture" — a checkerboard pattern
vec3 fakeTexture(vec2 uv) {
  // Tile 8x8
  vec2 tiled = fract(uv * 8.0);
  // Checker: XOR of which half each axis is in
  float cx = step(0.5, tiled.x);
  float cy = step(0.5, tiled.y);
  float checker = abs(cx - cy); // 0 or 1, alternating
  return mix(vec3(0.1, 0.1, 0.3), vec3(0.9, 0.8, 0.5), checker);
}

void main() {
  vec2 uv = gl_FragCoord.xy / u_resolution;
  
  // === UV DISTORTION ===
  // Adding a wave offset to UVs before sampling
  // This "warps" the texture without changing it!
  float warpX = sin(uv.y * 6.0 + u_time) * 0.04;
  float warpY = cos(uv.x * 6.0 + u_time) * 0.04;
  
  // Distorted UV — slide the sample point around
  vec2 warpedUV = uv + vec2(warpX, warpY);
  
  // Sample the "texture" at the distorted UV
  vec3 color = fakeTexture(warpedUV);
  
  // Vignette: darken the edges (multiply by 1 at center,
  // 0 at corners). dist from center, inverted.
  vec2 centered = uv * 2.0 - 1.0;
  float vignette = 1.0 - dot(centered, centered) * 0.5;
  
  gl_FragColor = vec4(color * vignette, 1.0);
}
`
},

// ─── 8 ───────────────────────────────────────────
{
title: "Vertex Shaders",
subtitle: "08 — Geometry & Attributes",
body: `
<p>So far we've only used <strong>fragment shaders</strong> (per-pixel). But there's another shader: the <strong>vertex shader</strong> — which runs on each <em>point of your geometry</em>.</p>
<p>In a typical WebGL pipeline: CPU sends <em>vertex positions</em> → <strong>vertex shader</strong> transforms them → GPU fills triangles → <strong>fragment shader</strong> colors each pixel.</p>
<p>The vertex shader outputs <strong>gl_Position</strong> — the final clip-space position. You can move, scale, rotate vertices here.</p>
<p><strong>Varyings</strong> are values you pass FROM the vertex shader TO the fragment shader — they get <em>interpolated</em> across the triangle surface automatically.</p>
<div class="tip">The vertex shader is like a puppet master — it controls WHERE geometry ends up on screen. The fragment shader decides what COLOR each pixel is. Together they make everything!</div>
`,
shader: `// ⚠️ This shows BOTH shaders as comments.
// In real WebGL you'd compile them separately!
// This canvas is running a demo that visualizes
// what a vertex shader does to a triangle mesh.

precision mediump float;
uniform vec2 u_resolution;
uniform float u_time;

// === VERTEX SHADER (shown as comment) ===
// attribute vec2 a_position;  // per-vertex input
// varying vec2 v_uv;          // output to fragment
// void main() {
//   v_uv = a_position * 0.5 + 0.5;  // remap -1→1 to 0→1
//   // Wiggle vertices with time!
//   vec2 pos = a_position;
//   pos.y += sin(pos.x * 3.0 + u_time) * 0.1;
//   gl_Position = vec4(pos, 0.0, 1.0);
// }

// === FRAGMENT SHADER (active) ===
// v_uv comes FROM the vertex shader, interpolated
// across the triangle surface automatically.
// varying vec2 v_uv;

void main() {
  // Simulating what a vertex-distorted mesh looks like:
  vec2 uv = gl_FragCoord.xy / u_resolution;
  
  // Simulate the wave distortion a vertex shader would do
  float wave = sin(uv.x * 6.28 * 2.0 + u_time) * 0.05;
  vec2 distorted = vec2(uv.x, uv.y + wave);
  
  // Draw grid lines to visualize the mesh
  vec2 grid = fract(distorted * 10.0);
  float lines = step(0.92, grid.x) + step(0.92, grid.y);
  lines = clamp(lines, 0.0, 1.0);
  
  // Color by distorted position
  vec3 meshColor = vec3(distorted.x * 0.5, distorted.y, 0.8);
  vec3 lineColor = vec3(0.0, 1.0, 0.6);
  
  vec3 color = mix(meshColor * 0.3, lineColor, lines);
  gl_FragColor = vec4(color, 1.0);
}
`
},

// ─── 9 ───────────────────────────────────────────
{
title: "SDF — Signed Distance Fields",
subtitle: "09 — The Pro Shape Toolkit",
body: `
<p><strong>SDF</strong> is how pros draw shapes in shaders. Instead of "is this pixel inside/outside", an SDF returns the <em>exact distance</em> to the shape's edge — negative inside, positive outside.</p>
<p>This unlocks: <em>smooth blending</em> between shapes, cheap <em>outlines</em>, <em>drop shadows</em>, <em>rounded corners</em> — all for free from the distance value!</p>
<p>To <strong>combine shapes</strong>: use <em>min()</em> for union, <em>max()</em> for intersection, <em>max(a, -b)</em> for subtraction. These are called "boolean operations".</p>
<div class="tip">SDF is like asking "how far am I from the nearest border?" A positive number = you're outside. Negative = inside. Zero = you're exactly on the edge. This one number tells you EVERYTHING about your relationship to the shape.</div>
`,
shader: `precision mediump float;

uniform vec2 u_resolution;
uniform float u_time;

// === SDF FUNCTIONS ===
// Each returns: negative = inside, positive = outside

// Circle SDF: just distance minus radius
float sdCircle(vec2 p, float r) {
  return length(p) - r;
}

// Box SDF: distance to axis-aligned rectangle
float sdBox(vec2 p, vec2 b) {
  // q = how far outside the box in each axis (or 0 if inside)
  vec2 q = abs(p) - b;
  return length(max(q, 0.0)) + min(max(q.x, q.y), 0.0);
}

// Smooth union: blends two shapes together softly
// k = how smooth the blend is (try 0.0 to 0.5)
float sdSmoothUnion(float a, float b, float k) {
  float h = clamp(0.5 + 0.5*(b-a)/k, 0.0, 1.0);
  return mix(b, a, h) - k * h * (1.0 - h);
}

void main() {
  vec2 uv = (gl_FragCoord.xy / u_resolution) * 2.0 - 1.0;
  uv.x *= u_resolution.x / u_resolution.y;
  
  // Moving circles
  float angle = u_time;
  vec2 pos1 = vec2(cos(angle) * 0.4, sin(angle) * 0.2);
  vec2 pos2 = vec2(cos(angle + 2.1) * 0.4, sin(angle + 2.1) * 0.2);
  vec2 pos3 = vec2(cos(angle + 4.2) * 0.4, sin(angle + 4.2) * 0.2);
  
  float d1 = sdCircle(uv - pos1, 0.25);
  float d2 = sdCircle(uv - pos2, 0.25);
  float d3 = sdCircle(uv - pos3, 0.25);
  
  // Smoothly blend all three together
  float d = sdSmoothUnion(d1, d2, 0.15);
  d = sdSmoothUnion(d, d3, 0.15);
  
  // d < 0 = inside shape, d > 0 = outside
  // smoothstep for soft edge
  float shape = 1.0 - smoothstep(-0.01, 0.01, d);
  
  // Use distance for glow/color gradient
  float glow = exp(-abs(d) * 8.0); // bright near edge
  
  vec3 innerColor = vec3(0.3, 0.9, 0.6);
  vec3 glowColor  = vec3(0.1, 0.5, 0.9);
  vec3 bgColor    = vec3(0.02, 0.02, 0.08);
  
  vec3 color = bgColor;
  color += glowColor * glow * 0.5;
  color = mix(color, innerColor, shape);
  
  gl_FragColor = vec4(color, 1.0);
}
`
},

// ─── 10 ───────────────────────────────────────────
{
title: "Raymarching",
subtitle: "10 — Fake 3D From Nothing",
body: `
<p><strong>Raymarching</strong> is mind-bending: you cast a ray from the camera into a scene, and use SDFs to figure out where it hits. No actual geometry — just math. Yet you get fully 3D objects with shadows!</p>
<p>The loop: step along the ray by the SDF distance (safe — you can't overshoot). When distance is nearly 0, you've hit a surface.</p>
<p>Then calculate <strong>normals</strong> by sampling the SDF at tiny offsets — the gradient of the SDF IS the surface normal.</p>
<div class="tip">Raymarching is like walking through a dark room using only a distance meter. "How far to the nearest wall?" You walk that far. Check again. Repeat. You never bump into anything AND you can make 3D scenes with zero geometry!</div>
`,
shader: `precision mediump float;

uniform vec2 u_resolution;
uniform float u_time;

// 3D SDF for a sphere
float sdSphere(vec3 p, float r) {
  return length(p) - r;
}

// 3D SDF for a box
float sdBox3(vec3 p, vec3 b) {
  vec3 q = abs(p) - b;
  return length(max(q,0.0)) + min(max(q.x,max(q.y,q.z)),0.0);
}

// The whole 3D scene as one SDF
// Returns distance to nearest surface
float scene(vec3 p) {
  // Rotating box
  float a = u_time * 0.5;
  // Simple Y-axis rotation
  vec3 rp = vec3(
    p.x * cos(a) + p.z * sin(a),
    p.y,
    -p.x * sin(a) + p.z * cos(a)
  );
  float box = sdBox3(rp - vec3(0.0, 0.0, 0.0), vec3(0.35));
  
  // Sphere orbiting the box
  vec3 orbit = vec3(cos(u_time)*0.7, sin(u_time*0.7)*0.4, sin(u_time)*0.7);
  float sphere = sdSphere(p - orbit, 0.2);
  
  // Ground plane
  float ground = p.y + 0.6;
  
  // Union = nearest surface wins
  return min(min(box, sphere), ground);
}

// Estimate surface normal by sampling scene at small offsets
vec3 getNormal(vec3 p) {
  float e = 0.001;
  return normalize(vec3(
    scene(p + vec3(e,0,0)) - scene(p - vec3(e,0,0)),
    scene(p + vec3(0,e,0)) - scene(p - vec3(0,e,0)),
    scene(p + vec3(0,0,e)) - scene(p - vec3(0,0,e))
  ));
}

void main() {
  vec2 uv = (gl_FragCoord.xy / u_resolution) * 2.0 - 1.0;
  uv.x *= u_resolution.x / u_resolution.y;
  
  // Camera setup
  vec3 ro = vec3(0.0, 0.3, 2.0); // ray origin (camera pos)
  vec3 rd = normalize(vec3(uv, -1.5)); // ray direction
  
  // RAYMARCH: step along the ray
  float t = 0.0; // total distance traveled
  for (int i = 0; i < 80; i++) {
    vec3 p = ro + rd * t; // current position on ray
    float d = scene(p);   // how far to nearest surface?
    if (d < 0.001) break; // hit! close enough
    t += d;               // safe to step this far
    if (t > 20.0) break;  // too far, give up
  }
  
  vec3 color = vec3(0.05, 0.05, 0.12); // sky/bg
  
  if (t < 20.0) { // we hit something!
    vec3 p = ro + rd * t;
    vec3 normal = getNormal(p);
    
    // Simple diffuse lighting
    vec3 light = normalize(vec3(1.0, 2.0, 1.5));
    float diff = max(dot(normal, light), 0.0);
    
    // Ambient + diffuse
    color = vec3(0.15) + vec3(0.6, 0.85, 0.5) * diff;
    
    // Fog: farther = more background color
    color = mix(color, vec3(0.05,0.05,0.12), t * 0.15);
  }
  
  gl_FragColor = vec4(color, 1.0);
}
`
},

// ─── 11 ───────────────────────────────────────────
{
title: "Post-Processing Effects",
subtitle: "11 — Screen-Space Magic",
body: `
<p><strong>Post-processing</strong> means running a shader on an already-rendered image to add effects. Bloom, blur, chromatic aberration, film grain — all post-processing.</p>
<p>The technique: render your scene to a <em>framebuffer texture</em>, then run another shader that reads from that texture and outputs to screen with effects applied.</p>
<p>Here we simulate several classic effects in a single shader: <em>scanlines, vignette, chromatic aberration, and film grain</em>.</p>
<div class="tip">Post-processing is basically Instagram filters but for your entire 3D scene. You render everything normally, then apply filters to the final image. The crazy part: each filter is just a few lines of shader code!</div>
`,
shader: `precision mediump float;

uniform vec2 u_resolution;
uniform float u_time;

// The "base scene" we're post-processing
// (In real apps this would be a rendered texture)
vec3 baseScene(vec2 uv) {
  // Simple colorful base
  float n = sin(uv.x * 8.0 + u_time) * cos(uv.y * 6.0 + u_time * 0.7);
  vec3 a = vec3(0.8, 0.3, 0.1);
  vec3 b = vec3(0.1, 0.4, 0.9);
  return mix(a, b, n * 0.5 + 0.5);
}

// === POST EFFECTS ===

// Chromatic aberration: RGB channels slightly offset
vec3 chromaticAberration(vec2 uv, float amount) {
  float r = baseScene(uv + vec2(amount, 0.0)).r;
  float g = baseScene(uv).g;
  float bl = baseScene(uv - vec2(amount, 0.0)).b;
  return vec3(r, g, bl);
}

// Film grain: random noise overlay
float grain(vec2 uv, float time) {
  return fract(sin(dot(uv + time * 0.001, vec2(12.9898, 78.233))) * 43758.5);
}

void main() {
  vec2 uv = gl_FragCoord.xy / u_resolution;
  
  // 1. Chromatic aberration (color fringing)
  float aberration = 0.005 + sin(u_time * 0.3) * 0.002;
  vec3 color = chromaticAberration(uv, aberration);
  
  // 2. Scanlines (CRT monitor effect)
  float scanline = sin(uv.y * u_resolution.y * 1.5) * 0.5 + 0.5;
  scanline = pow(scanline, 0.3); // subtle, not harsh
  color *= mix(0.85, 1.0, scanline);
  
  // 3. Vignette (darken edges)
  vec2 centered = uv * 2.0 - 1.0;
  float vignette = 1.0 - dot(centered * 0.7, centered * 0.7);
  vignette = smoothstep(0.0, 1.0, vignette);
  color *= vignette;
  
  // 4. Film grain (random noise)
  float g = grain(uv, u_time * 100.0);
  color += (g - 0.5) * 0.06;
  
  // 5. Slight color grade (push contrast)
  color = color * 1.1 - 0.05;
  color = clamp(color, 0.0, 1.0);
  
  gl_FragColor = vec4(color, 1.0);
}
`
},

// ─── 12 ───────────────────────────────────────────
{
title: "Compute Shaders (Concepts)",
subtitle: "12 — GPU as a Calculator",
body: `
<p><strong>Compute shaders</strong> don't draw pixels — they do arbitrary calculations on the GPU in parallel. Particle systems, physics simulations, machine learning — all compute shaders.</p>
<p>In WebGL 2 / WebGPU you can write to textures or buffers from any shader using <em>ping-pong rendering</em>: render the simulation state to texture A, next frame read from A and write to B, alternate.</p>
<p>This demo simulates a <strong>reaction-diffusion</strong> system (like leopard spots or fish patterns) — a classic compute pattern: each frame reads neighbors and writes a new state.</p>
<div class="tip">Compute is just asking: "what if instead of coloring pixels, I use the GPU to do MATH at massive scale?" A million particles updating simultaneously. Physics simulations. Neural nets. All running in parallel. The GPU is just a HUGE math machine!</div>
`,
shader: `precision mediump float;

uniform vec2 u_resolution;
uniform float u_time;

// Reaction-Diffusion inspired pattern
// (Simulating what a compute shader produces)
// Real compute ping-pong: too complex for one demo,
// but this approximates the visual result!

float hash(vec2 p) {
  return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5);
}
float noise(vec2 p) {
  vec2 i = floor(p); vec2 f = fract(p);
  vec2 u = f*f*(3.-2.*f);
  return mix(mix(hash(i),hash(i+vec2(1,0)),u.x),
             mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),u.x),u.y);
}

void main() {
  vec2 uv = gl_FragCoord.xy / u_resolution;
  
  // Simulate Gray-Scott reaction-diffusion style pattern
  // (Real version requires reading neighboring pixels
  //  each frame — a true compute operation!)
  
  // Warped coordinate system (approximates RD output)
  float t = u_time * 0.1;
  vec2 p = uv * 4.0;
  
  // Layer multiple noise octaves with interference
  float v = 0.0;
  for (int i = 0; i < 4; i++) {
    float fi = float(i);
    v += noise(p * pow(2.0, fi) + vec2(t, t*0.7)) / pow(2.0, fi);
  }
  
  // Reaction-diffusion look: threshold + contour lines
  float contour = abs(fract(v * 4.0 + t * 0.5) - 0.5) * 2.0;
  contour = smoothstep(0.3, 0.4, contour);
  
  // Organic coloring
  vec3 colA = vec3(0.05, 0.02, 0.15); // dark purple
  vec3 colB = vec3(0.95, 0.8, 0.1);   // gold
  vec3 colC = vec3(0.1, 0.9, 0.5);    // green
  
  vec3 color = mix(colA, colB, contour);
  color = mix(color, colC, smoothstep(0.6, 0.8, v));
  
  gl_FragColor = vec4(color, 1.0);
}
`
},

// ─── 13 ───────────────────────────────────────────
{
title: "3D UV Mapping",
subtitle: "13 — UVs on 3D Surfaces",
body: `
<p>In 2D, UV was just screen position. In 3D raymarching, you need to figure out <em>where on the surface</em> you hit — and turn that into a UV coordinate for texturing.</p>
<p>Each shape has its own UV unwrap. A <strong>sphere's UV</strong> uses the hit-point converted to spherical angles: longitude (how far around) and latitude (how far up). Like GPS coordinates on a globe.</p>
<p>A <strong>box's UV</strong> figures out which face you're on (using the normal direction), then uses the remaining two axes as UV. Like unfolding a cardboard box flat.</p>
<p>Once you have UV, you can apply any 2D pattern — checker, noise, gradient — as if it were a real texture painted onto the surface.</p>
<div class="tip">UV on 3D = answering "where on the object's skin is this pixel?" For a sphere, imagine peeling it like an orange and laying the skin flat. Those flat coordinates ARE the UV. Every surface has its own way of being "peeled"!</div>
`,
shader: `precision mediump float;
uniform vec2 u_resolution;
uniform float u_time;

// ── SCENE SDF ──
float sdSphere(vec3 p, float r) { return length(p) - r; }
float sdBox(vec3 p, vec3 b) {
  vec3 q = abs(p) - b;
  return length(max(q,0.0)) + min(max(q.x,max(q.y,q.z)),0.0);
}

// Scene: returns distance + object ID (1=sphere, 2=box)
vec2 scene(vec3 p) {
  float sphere = sdSphere(p - vec3(-0.7, 0.0, 0.0), 0.55);
  float box    = sdBox(p - vec3(0.75, 0.0, 0.0), vec3(0.4));
  if (sphere < box) return vec2(sphere, 1.0);
  return vec2(box, 2.0);
}

vec3 getNormal(vec3 p) {
  float e = 0.001;
  return normalize(vec3(
    scene(p+vec3(e,0,0)).x - scene(p-vec3(e,0,0)).x,
    scene(p+vec3(0,e,0)).x - scene(p-vec3(0,e,0)).x,
    scene(p+vec3(0,0,e)).x - scene(p-vec3(0,0,e)).x
  ));
}

// ── UV FOR A SPHERE ──
// Convert hit point (normalised to surface) → longitude/latitude
vec2 sphereUV(vec3 hitPoint) {
  // Normalize so it's a unit sphere direction
  vec3 n = normalize(hitPoint);
  // atan returns the angle around Y axis (longitude)
  float u = atan(n.z, n.x) / (2.0 * 3.14159) + 0.5;
  // asin returns angle from equator (latitude)
  float v = asin(clamp(n.y, -1.0, 1.0)) / 3.14159 + 0.5;
  return vec2(u, v);
}

// ── UV FOR A BOX ──
// Check which face we're on via the normal, use other two axes
vec2 boxUV(vec3 hitPoint, vec3 normal) {
  // abs normal tells us the dominant axis
  vec3 an = abs(normal);
  if (an.x > an.y && an.x > an.z) return hitPoint.yz; // left/right face
  if (an.y > an.x && an.y > an.z) return hitPoint.xz; // top/bottom face
  return hitPoint.xy;                                  // front/back face
}

// A simple checker texture using any UV
vec3 checker(vec2 uv, vec3 colA, vec3 colB) {
  float scale = 6.0;
  vec2 g = floor(uv * scale);
  float c = mod(g.x + g.y, 2.0); // alternates 0,1
  return mix(colA, colB, c);
}

void main() {
  vec2 screen = (gl_FragCoord.xy / u_resolution) * 2.0 - 1.0;
  screen.x *= u_resolution.x / u_resolution.y;

  // Slowly rotate camera around scene
  float camAngle = u_time * 0.4;
  vec3 ro = vec3(sin(camAngle)*3.0, 0.6, cos(camAngle)*3.0);
  vec3 target = vec3(0.0);
  // Camera basis vectors
  vec3 fwd   = normalize(target - ro);
  vec3 right = normalize(cross(vec3(0,1,0), fwd));
  vec3 up    = cross(fwd, right);
  vec3 rd    = normalize(fwd*1.5 + right*screen.x + up*screen.y);

  // Raymarch
  float t = 0.0;
  float objId = 0.0;
  for (int i = 0; i < 90; i++) {
    vec2 res = scene(ro + rd*t);
    if (res.x < 0.001) { objId = res.y; break; }
    t += res.x;
    if (t > 20.0) break;
  }

  vec3 color = vec3(0.07, 0.07, 0.15);

  if (t < 20.0) {
    vec3 p      = ro + rd * t;
    vec3 normal = getNormal(p);
    vec3 light  = normalize(vec3(1.5, 2.0, 1.0));
    float diff  = max(dot(normal, light), 0.0);

    vec2 uv;
    vec3 texColor;

    if (objId < 1.5) {
      // SPHERE: use spherical UV
      uv = sphereUV(p - vec3(-0.7, 0.0, 0.0));
      texColor = checker(uv,
        vec3(0.9, 0.3, 0.1),  // red
        vec3(1.0, 0.9, 0.2)   // yellow
      );
    } else {
      // BOX: use box-face UV
      uv = boxUV(p - vec3(0.75, 0.0, 0.0), normal);
      texColor = checker(uv,
        vec3(0.1, 0.4, 0.9),  // blue
        vec3(0.9, 0.95, 1.0)  // white
      );
    }

    // Lighting × texture
    float ambient = 0.15;
    color = texColor * (ambient + diff * 0.85);

    // Specular highlight
    vec3 halfway = normalize(light - rd);
    float spec = pow(max(dot(normal, halfway), 0.0), 32.0);
    color += vec3(1.0) * spec * 0.4;
  }

  gl_FragColor = vec4(color, 1.0);
}
`
},

// ─── 14 ───────────────────────────────────────────
{
title: "3D SDF Primitives",
subtitle: "14 — The Shape Toolkit",
body: `
<p>Raymarching gives you a whole zoo of <strong>SDF primitives</strong> — mathematical shapes you get for free just by knowing their distance formula.</p>
<p>Key ones: <em>sphere, box, capsule, torus, cylinder, cone, plane</em>. Each is just a few lines. Mix and match with boolean ops (union, subtract, intersect) to build anything.</p>
<p><strong>Rounding</strong> any shape is trivially easy: subtract a small constant from the SDF result. That inflates the surface outward by that amount, rounding all edges automatically.</p>
<p><strong>Elongate</strong> stretches a shape. <strong>Twist</strong> spins it along an axis. These domain-warp tricks work on ANY primitive.</p>
<div class="tip">SDF primitives are like LEGOs for 3D. Each shape is just a formula that says "how far is point P from my surface?" Learn 5–6 of these and you can build almost anything — all without loading a single mesh file!</div>
`,
shader: `precision mediump float;
uniform vec2 u_resolution;
uniform float u_time;

// ═══ PRIMITIVE LIBRARY ═══

float sdSphere(vec3 p, float r) {
  return length(p) - r;
}

float sdBox(vec3 p, vec3 b) {
  vec3 q = abs(p) - b;
  return length(max(q,0.0)) + min(max(q.x,max(q.y,q.z)),0.0);
}

// Rounded box = box SDF minus a small radius
// That "inflates" the shape, rounding all edges!
float sdRoundBox(vec3 p, vec3 b, float r) {
  return sdBox(p, b) - r;
}

// Torus: like a donut. t.x = ring radius, t.y = tube radius
float sdTorus(vec3 p, vec2 t) {
  // q.x = distance from the ring centerline
  vec2 q = vec2(length(p.xz) - t.x, p.y);
  return length(q) - t.y;
}

// Capsule: a cylinder with round caps. Like a pill.
// a,b = endpoints of the line segment, r = radius
float sdCapsule(vec3 p, vec3 a, vec3 b, float r) {
  vec3 pa = p - a, ba = b - a;
  float h = clamp(dot(pa,ba)/dot(ba,ba), 0.0, 1.0);
  return length(pa - ba*h) - r;
}

// Cone (infinite, pointing up): c = sin/cos of half-angle
float sdCone(vec3 p, vec2 c, float h) {
  vec2 q = h * vec2(c.x/c.y, -1.0);
  vec2 w = vec2(length(p.xz), p.y);
  vec2 a = w - q * clamp(dot(w,q)/dot(q,q), 0.0, 1.0);
  vec2 b2 = w - q * vec2(clamp(w.x/q.x, 0.0, 1.0), 1.0);
  float k = sign(q.y);
  float d = min(dot(a,a), dot(b2,b2));
  float s = max(k*(w.x*q.y-w.y*q.x), k*(w.y-q.y));
  return sqrt(d)*sign(s);
}

// ── DOMAIN WARP: TWIST ──
// Rotates space around Y axis based on height.
// Apply BEFORE sampling any SDF to twist that shape!
vec3 opTwist(vec3 p, float strength) {
  float angle = p.y * strength;
  float c = cos(angle), s = sin(angle);
  // Rotate X and Z by the angle (standard 2D rotation)
  return vec3(c*p.x - s*p.z, p.y, s*p.x + c*p.z);
}

// ── SMOOTH MIN (soft union) ──
float smin(float a, float b, float k) {
  float h = clamp(0.5 + 0.5*(b-a)/k, 0.0, 1.0);
  return mix(b, a, h) - k*h*(1.0-h);
}

// ── FULL SCENE ──
// Returns (distance, colorID)
vec2 scene(vec3 p) {
  float t = u_time;

  // 1. Torus — center stage
  float torus = sdTorus(p, vec2(0.55, 0.18));

  // 2. Twisted round box — left
  vec3 tp = opTwist(p - vec3(-1.4, 0.0, 0.0), sin(t)*3.0);
  float rbox = sdRoundBox(tp, vec3(0.28), 0.07);

  // 3. Capsule — right (like a floating pill)
  float caps = sdCapsule(p,
    vec3(1.1, -0.35, 0.0),
    vec3(1.1,  0.35, 0.0), 0.2);

  // 4. Cone — back
  float cone = sdCone(p - vec3(0.0, -0.6, -1.1),
    vec2(sin(0.4), cos(0.4)), 0.6);

  // Union all: nearest surface wins
  float d = torus;
  float id = 1.0;
  if (rbox  < d) { d = rbox;  id = 2.0; }
  if (caps  < d) { d = caps;  id = 3.0; }
  if (cone  < d) { d = cone;  id = 4.0; }

  // Ground plane
  float ground = p.y + 0.65;
  if (ground < d) { d = ground; id = 0.0; }

  return vec2(d, id);
}

vec3 getNormal(vec3 p) {
  float e = 0.001;
  return normalize(vec3(
    scene(p+vec3(e,0,0)).x - scene(p-vec3(e,0,0)).x,
    scene(p+vec3(0,e,0)).x - scene(p-vec3(0,e,0)).x,
    scene(p+vec3(0,0,e)).x - scene(p-vec3(0,0,e)).x
  ));
}

// Palette: pick a color per object ID
vec3 palette(float id, vec3 p) {
  if (id < 0.5) return vec3(0.15, 0.12, 0.18) + vec3(0.05)*mod(floor(p.x*5.0)+floor(p.z*5.0),2.0);
  if (id < 1.5) return vec3(0.9, 0.5, 0.1);   // torus orange
  if (id < 2.5) return vec3(0.2, 0.7, 0.95);  // box cyan
  if (id < 3.5) return vec3(0.8, 0.2, 0.6);   // capsule pink
  return vec3(0.4, 0.9, 0.3);                  // cone green
}

void main() {
  vec2 screen = (gl_FragCoord.xy/u_resolution)*2.0-1.0;
  screen.x *= u_resolution.x/u_resolution.y;

  float a = u_time*0.35;
  vec3 ro = vec3(sin(a)*3.8, 1.2, cos(a)*3.8);
  vec3 fwd = normalize(-ro + vec3(0,0.1,0));
  vec3 right = normalize(cross(vec3(0,1,0), fwd));
  vec3 up = cross(fwd, right);
  vec3 rd = normalize(fwd*1.5 + right*screen.x + up*screen.y);

  float t2 = 0.0; float objId = -1.0;
  for (int i = 0; i < 100; i++) {
    vec2 res = scene(ro + rd*t2);
    if (res.x < 0.001) { objId = res.y; break; }
    t2 += res.x;
    if (t2 > 20.0) break;
  }

  vec3 color = vec3(0.04, 0.04, 0.1);
  if (t2 < 20.0) {
    vec3 p = ro + rd*t2;
    vec3 n = getNormal(p);
    vec3 L = normalize(vec3(2.0, 3.0, 1.5));
    float diff = max(dot(n, L), 0.0);
    float amb  = 0.12;
    vec3 baseCol = palette(objId, p);
    color = baseCol * (amb + diff*0.88);
    // specular
    vec3 h = normalize(L - rd);
    color += 0.35 * pow(max(dot(n,h),0.0), 48.0);
    // fog
    color = mix(color, vec3(0.04,0.04,0.1), t2*0.06);
  }
  gl_FragColor = vec4(color, 1.0);
}
`
},

{
title: "Model From Code",
subtitle: "15 — SDF Character",
body: `
<p>Here's the big payoff: building a recognizable <strong>character</strong> purely from SDF primitives. No 3D file. No Blender. Just math and boolean operations.</p>
<p>The secret: <em>think in parts</em>. A robot head = box body + sphere head + capsule arms + cylinder eyes. Each part is placed by <strong>subtracting its center position</strong> from the point before testing.</p>
<p>Use <em>smin</em> (smooth union) between parts that should flow together organically. Use <em>hard union</em> (min) for parts that should have a crisp seam.</p>
<p><strong>Subtraction</strong> (<em>max(a, -b)</em>) carves holes — perfect for eye sockets, windows, nostrils.</p>
<div class="tip">Building a character in SDF is like sculpting with math. Each body part is a little shape positioned in space. Layer them together with smooth or sharp unions and suddenly you have something that looks alive. This is exactly how Inigo Quilez builds those beautiful Shadertoy sculptures!</div>
`,
shader: `precision mediump float;
uniform vec2 u_resolution;
uniform float u_time;

// ── PRIMITIVE HELPERS ──
float sdSphere(vec3 p, float r)  { return length(p)-r; }
float sdBox(vec3 p, vec3 b) {
  vec3 q=abs(p)-b; return length(max(q,0.0))+min(max(q.x,max(q.y,q.z)),0.0);
}
float sdRoundBox(vec3 p,vec3 b,float r) { return sdBox(p,b)-r; }
float sdCapsule(vec3 p,vec3 a,vec3 b,float r) {
  vec3 pa=p-a,ba=b-a; float h=clamp(dot(pa,ba)/dot(ba,ba),0.0,1.0);
  return length(pa-ba*h)-r;
}
float sdTorus(vec3 p,vec2 t) {
  return length(vec2(length(p.xz)-t.x,p.y))-t.y;
}
float sdCylinder(vec3 p,float r,float h) {
  vec2 d=abs(vec2(length(p.xz),p.y))-vec2(r,h);
  return min(max(d.x,d.y),0.0)+length(max(d,0.0));
}

float smin(float a,float b,float k){
  float h=clamp(0.5+0.5*(b-a)/k,0.0,1.0);
  return mix(b,a,h)-k*h*(1.0-h);
}

// ── THE CHARACTER: "ROBO" ──
// Returns (distance, part ID for coloring)
vec2 robo(vec3 p) {
  float t = u_time;

  // ── BODY ──
  float body = sdRoundBox(p, vec3(0.38, 0.45, 0.22), 0.06);

  // ── HEAD ──
  // Bob gently up and down
  float headBob = sin(t*1.2)*0.03;
  vec3 hp = p - vec3(0.0, 0.72+headBob, 0.0);
  float head = sdRoundBox(hp, vec3(0.28, 0.22, 0.2), 0.07);

  // Eye sockets (carved INTO the head with subtraction)
  float eyeL = sdSphere(hp - vec3(-0.12, 0.03, 0.18), 0.07);
  float eyeR = sdSphere(hp - vec3( 0.12, 0.03, 0.18), 0.07);
  head = max(head, -eyeL); // carve left socket
  head = max(head, -eyeR); // carve right socket

  // ── EYEBALLS (separate, go inside sockets) ──
  // They look left/right based on sin(time)
  float gaze = sin(t*0.7)*0.03;
  float eyeballL = sdSphere(hp - vec3(-0.12+gaze, 0.03, 0.2), 0.055);
  float eyeballR = sdSphere(hp - vec3( 0.12+gaze, 0.03, 0.2), 0.055);

  // Pupils (dark dot in center of each eye)
  float pupilL = sdSphere(hp - vec3(-0.12+gaze, 0.03, 0.24), 0.025);
  float pupilR = sdSphere(hp - vec3( 0.12+gaze, 0.03, 0.24), 0.025);

  // Antenna
  float antennaPole = sdCapsule(hp,
    vec3(0.0, 0.21, 0.0), vec3(0.0, 0.48, 0.0), 0.025);
  float antennaBall = sdSphere(hp - vec3(0.0, 0.5, 0.0), 0.055);
  float antenna = smin(antennaPole, antennaBall, 0.03);

  // Mouth (a torus cross-section — like a visor slit)
  vec3 mp = hp - vec3(0.0, -0.08, 0.12);
  // Rotate torus to face forward: swap y and z axes
  float mouth = sdTorus(mp.xzy, vec2(0.1, 0.025));

  // ── NECK ──
  float neck = sdCylinder(p - vec3(0.0, 0.47, 0.0), 0.1, 0.07);

  // ── ARMS ──
  // Swing with opposite phase (like walking)
  float swingL =  sin(t) * 0.25;
  float swingR = -sin(t) * 0.25;

  // Left arm: capsule from shoulder to hand
  vec3 lShoulder = vec3(-0.44, 0.28, 0.0);
  vec3 lHand     = vec3(-0.65, -0.1+swingL, 0.1);
  float armL = sdCapsule(p, lShoulder, lHand, 0.1);
  float handL = sdSphere(p - lHand, 0.12);
  armL = smin(armL, handL, 0.05);

  // Right arm
  vec3 rShoulder = vec3(0.44, 0.28, 0.0);
  vec3 rHand     = vec3(0.65, -0.1+swingR, 0.1);
  float armR = sdCapsule(p, rShoulder, rHand, 0.1);
  float handR = sdSphere(p - rHand, 0.12);
  armR = smin(armR, handR, 0.05);

  // ── LEGS ──
  float stepL =  sin(t)*0.15;
  float stepR = -sin(t)*0.15;

  vec3 lHip  = vec3(-0.2, -0.45, 0.0);
  vec3 lFoot = vec3(-0.22, -0.95, stepL);
  float legL = sdCapsule(p, lHip, lFoot, 0.12);
  float footL = sdRoundBox(p - lFoot - vec3(0.0,-0.05,0.05),
    vec3(0.1,0.07,0.15), 0.04);
  legL = smin(legL, footL, 0.04);

  vec3 rHip  = vec3(0.2, -0.45, 0.0);
  vec3 rFoot = vec3(0.22, -0.95, stepR);
  float legR = sdCapsule(p, rHip, rFoot, 0.12);
  float footR = sdRoundBox(p - rFoot - vec3(0.0,-0.05,0.05),
    vec3(0.1,0.07,0.15), 0.04);
  legR = smin(legR, footR, 0.04);

  // ── CHEST PANEL (decorative box inset) ──
  float panel = sdRoundBox(p - vec3(0.0, 0.1, 0.21), vec3(0.2,0.18,0.03), 0.02);

  // ── ASSEMBLE ── (nearest surface = winner)
  // Merge body parts smoothly
  float torso = smin(body, neck, 0.06);
  torso = smin(torso, armL, 0.05);
  torso = smin(torso, armR, 0.05);
  torso = smin(torso, legL, 0.05);
  torso = smin(torso, legR, 0.05);
  float full = smin(torso, head, 0.04);

  // Now figure out which part we're closest to for coloring
  // (Re-evaluate each independently without smin for ID)
  float d = full;
  float id = 1.0; // body = 1

  // Override ID if closer to specific colorable part
  if (eyeballL < d+0.01 || eyeballR < d+0.01) { d=min(eyeballL,eyeballR); id=2.0; }
  if (pupilL   < d+0.01 || pupilR   < d+0.01) { d=min(pupilL,pupilR);     id=3.0; }
  if (antenna  < d+0.01)                       { d=antenna;                id=4.0; }
  if (panel    < d+0.01)                       { d=panel;                  id=5.0; }
  if (mouth    < d-0.01)                       { d=mouth;                  id=6.0; }

  return vec2(min(d, full), id);
}

float scene(vec3 p) {
  return min(robo(p).x, p.y + 1.05); // ground plane
}

vec2 sceneID(vec3 p) {
  vec2 r = robo(p);
  float ground = p.y + 1.05;
  if (ground < r.x) return vec2(ground, 0.0);
  return r;
}

vec3 getNormal(vec3 p) {
  float e=0.001;
  return normalize(vec3(
    scene(p+vec3(e,0,0))-scene(p-vec3(e,0,0)),
    scene(p+vec3(0,e,0))-scene(p-vec3(0,e,0)),
    scene(p+vec3(0,0,e))-scene(p-vec3(0,0,e))
  ));
}

vec3 partColor(float id, vec3 p) {
  if (id < 0.5) { // ground
    float checker = mod(floor(p.x*3.0)+floor(p.z*3.0),2.0);
    return mix(vec3(0.12,0.1,0.18), vec3(0.18,0.15,0.25), checker);
  }
  if (id < 1.5) return vec3(0.55, 0.7, 0.85);  // body: steel blue
  if (id < 2.5) return vec3(0.9, 0.95, 1.0);   // eyeball: white
  if (id < 3.5) return vec3(0.1, 0.15, 0.5);   // pupil: dark blue
  if (id < 4.5) return vec3(1.0, 0.6, 0.1);    // antenna: gold
  if (id < 5.5) return vec3(0.2, 0.3, 0.5);    // panel: dark
  return vec3(0.8, 0.3, 0.1);                   // mouth: orange
}

void main() {
  vec2 screen = (gl_FragCoord.xy/u_resolution)*2.0-1.0;
  screen.x *= u_resolution.x/u_resolution.y;

  // Camera slowly orbits + slight auto-pan
  float a = u_time * 0.3;
  float camY = 0.1 + sin(u_time*0.2)*0.15;
  vec3 ro = vec3(sin(a)*3.2, camY, cos(a)*3.2);
  vec3 fwd = normalize(vec3(0,0,0)-ro);
  vec3 right = normalize(cross(vec3(0,1,0),fwd));
  vec3 up = cross(fwd,right);
  vec3 rd = normalize(fwd*1.6 + right*screen.x + up*screen.y);

  float t2=0.0; vec3 hitP; bool hit=false;
  for(int i=0;i<120;i++){
    hitP=ro+rd*t2;
    float d=scene(hitP);
    if(d<0.001){hit=true;break;}
    t2+=d;
    if(t2>15.0)break;
  }

  vec3 color = vec3(0.04,0.05,0.12);
  if(hit){
    vec3 p=ro+rd*t2;
    vec3 n=getNormal(p);
    float id=sceneID(p).y;

    vec3 L1=normalize(vec3(2.0, 3.0, 1.0));
    vec3 L2=normalize(vec3(-1.5, 1.0, -1.0));
    float d1=max(dot(n,L1),0.0);
    float d2=max(dot(n,L2),0.0)*0.3;

    vec3 baseCol = partColor(id, p);
    color = baseCol*(0.1 + d1*0.8 + d2);

    // Specular
    vec3 h=normalize(L1-rd);
    float spec=pow(max(dot(n,h),0.0),64.0);
    color += 0.4*spec*vec3(0.9,0.95,1.0);

    // Rim light (backlight glow)
    float rim=pow(1.0-max(dot(n,-rd),0.0),3.0);
    color += rim*0.15*vec3(0.3,0.6,1.0);

    // Depth fog
    color=mix(color, vec3(0.04,0.05,0.12), t2*0.045);
  }

  gl_FragColor=vec4(color,1.0);
}
`
},

{
title: "Full 3D UV Unwrap",
subtitle: "16 — Triplanar & Procedural Texturing",
body: `
<p>Spherical UV works for spheres, box UV for boxes — but what about a <em>complex organic shape</em>? It has no clean seam to unwrap along.</p>
<p>The pro solution: <strong>triplanar mapping</strong>. Project the texture from all three axes (X, Y, Z) and blend them based on the surface normal. Steep surfaces use the projection that faces them most. No UV seams anywhere!</p>
<p>This is how game engines texture procedural terrain, rocks, and characters with no UV artist needed.</p>
<p>Combine triplanar with <strong>noise-based procedural textures</strong> and you get infinite detail — rust, moss, wood grain, alien skin — all generated at runtime.</p>
<div class="tip">Triplanar = "project the texture from 3 directions and blend". Think of it like shining the texture image from left, from above, and from the front simultaneously. Where walls are steep the front-facing projection dominates; where it's flat the top projection dominates. No seams!</div>
`,
shader: `precision mediump float;
uniform vec2 u_resolution;
uniform float u_time;

// ── NOISE UTILS ──
float hash(vec3 p) {
  return fract(sin(dot(p, vec3(127.1,311.7,74.7)))*43758.5);
}
float noise3(vec3 p) {
  vec3 i=floor(p); vec3 f=fract(p);
  vec3 u=f*f*(3.0-2.0*f);
  return mix(mix(mix(hash(i),          hash(i+vec3(1,0,0)),u.x),
                 mix(hash(i+vec3(0,1,0)),hash(i+vec3(1,1,0)),u.x),u.y),
             mix(mix(hash(i+vec3(0,0,1)),hash(i+vec3(1,0,1)),u.x),
                 mix(hash(i+vec3(0,1,1)),hash(i+vec3(1,1,1)),u.x),u.y),u.z);
}
float fbm3(vec3 p) {
  float v=0.0; float a=0.5;
  for(int i=0;i<5;i++){ v+=a*noise3(p); p*=2.0; a*=0.5; }
  return v;
}

// ── TRIPLANAR TEXTURE FUNCTION ──
// Give it a 3D world point and a surface normal.
// It samples a "texture" from all 3 axes and blends.
vec3 triplanar(vec3 worldPos, vec3 normal, float scale) {
  // The three UV planes:
  vec2 uvX = worldPos.yz * scale; // project from X axis
  vec2 uvY = worldPos.xz * scale; // project from Y axis (top)
  vec2 uvZ = worldPos.xy * scale; // project from Z axis

  // Sample the "texture" at each projection
  // (Using a procedural marble/granite pattern)
  float marble_x = sin(uvX.x*6.0 + fbm3(vec3(uvX*2.0, 0.0))*4.0)*0.5+0.5;
  float marble_y = sin(uvY.x*6.0 + fbm3(vec3(uvY*2.0, 1.7))*4.0)*0.5+0.5;
  float marble_z = sin(uvZ.x*6.0 + fbm3(vec3(uvZ*2.0, 3.3))*4.0)*0.5+0.5;

  // Blend weights = absolute normal components.
  // If normal points mostly in Y, top projection dominates.
  vec3 weights = abs(normal);
  weights = pow(weights, vec3(6.0)); // sharpen the blending
  weights /= weights.x+weights.y+weights.z; // normalize to sum=1

  // Blend the three samples by weight
  float blended = marble_x*weights.x + marble_y*weights.y + marble_z*weights.z;
  return mix(vec3(0.08,0.05,0.12), vec3(0.88,0.82,0.95), blended);
}

// ── SCENE (complex organic blob via SDF) ──
float smin(float a,float b,float k){
  float h=clamp(.5+.5*(b-a)/k,0.,1.); return mix(b,a,h)-k*h*(1.-h);
}
float sdSphere(vec3 p,float r){ return length(p)-r; }

// Organic blob: lots of spheres merged smoothly
float blobScene(vec3 p) {
  float t = u_time * 0.5;
  float d = sdSphere(p, 0.7); // core
  // Smaller blobs orbiting + merging into core
  for (int i = 0; i < 6; i++) {
    float fi = float(i);
    float angle = fi * 1.047 + t; // evenly spaced + animated
    float vert  = sin(fi*2.3 + t*0.7) * 0.4;
    vec3 offset = vec3(cos(angle)*0.6, vert, sin(angle)*0.6);
    float blob = sdSphere(p - offset, 0.28 + sin(fi+t)*0.06);
    d = smin(d, blob, 0.35); // smooth merge!
  }
  // Ground
  return min(d, p.y + 0.95);
}

vec3 getNormal(vec3 p) {
  float e=0.001;
  vec3 n=vec3(
    blobScene(p+vec3(e,0,0))-blobScene(p-vec3(e,0,0)),
    blobScene(p+vec3(0,e,0))-blobScene(p-vec3(0,e,0)),
    blobScene(p+vec3(0,0,e))-blobScene(p-vec3(0,0,e))
  );
  return normalize(n);
}

void main() {
  vec2 screen=(gl_FragCoord.xy/u_resolution)*2.0-1.0;
  screen.x*=u_resolution.x/u_resolution.y;

  float a=u_time*0.3;
  vec3 ro=vec3(sin(a)*3.0, 0.8, cos(a)*3.0);
  vec3 fwd=normalize(vec3(0,-0.1,0)-ro);
  vec3 right=normalize(cross(vec3(0,1,0),fwd));
  vec3 up=cross(fwd,right);
  vec3 rd=normalize(fwd*1.5+right*screen.x+up*screen.y);

  float t2=0.0; bool hit=false;
  for(int i=0;i<100;i++){
    float d=blobScene(ro+rd*t2);
    if(d<0.001){hit=true;break;}
    t2+=d; if(t2>15.0)break;
  }

  vec3 color=vec3(0.04,0.03,0.09);
  if(hit){
    vec3 p=ro+rd*t2;
    vec3 n=getNormal(p);

    // TRIPLANAR TEXTURING — no UV needed!
    vec3 texColor;
    if(p.y < -0.93) {
      // Ground: use a different scale + color
      texColor = mix(vec3(0.15,0.1,0.2), vec3(0.25,0.2,0.3),
        fbm3(p*3.0));
    } else {
      // Organic blob: triplanar marble
      texColor = triplanar(p * 1.8, n, 1.0);
      // Tint: inside blobs slightly warmer
      float warmth = 1.0 - smoothstep(0.5, 0.9, length(p));
      texColor = mix(texColor, texColor*vec3(1.3, 0.8, 0.7), warmth);
    }

    // Lighting
    vec3 L=normalize(vec3(1.5,2.5,1.0));
    float diff=max(dot(n,L),0.0);
    float amb=0.1;
    color=texColor*(amb+diff*0.9);

    // Specular
    vec3 h=normalize(L-rd);
    float spec=pow(max(dot(n,h),0.0),80.0);
    color+=spec*0.5*vec3(0.9,0.8,1.0);

    // Rim
    float rim=pow(1.0-max(dot(n,-rd),0.0),4.0);
    color+=rim*0.2*vec3(0.5,0.3,1.0);

    color=mix(color,vec3(0.04,0.03,0.09),t2*0.05);
  }
  gl_FragColor=vec4(color,1.0);
}
`
},

// ─── 17 ───────────────────────────────────────────
{
title: "Loading External 3D Files",
subtitle: "17 — OBJ / glTF / FBX",
body: `
<p>Real-world 3D workflows use <strong>mesh files</strong> — OBJ, glTF, or FBX — exported from Blender, Maya, or ZBrush. The GPU can't read those formats directly; you parse them on the CPU and upload vertex data as buffers.</p>
<p><strong>OBJ</strong> is the simplest: plain text with lines starting with <code>v</code> (vertex), <code>vt</code> (UV), <code>vn</code> (normal), <code>f</code> (face/triangle). Easy to parse yourself.</p>
<p><strong>glTF</strong> (.gltf / .glb) is the modern standard — binary, compact, supports animation, PBR materials, and loads directly into Three.js / Babylon.js. Think of it as the "JPG of 3D".</p>
<p><strong>FBX</strong> is proprietary (Autodesk) — use a library like <code>three/examples/jsm/loaders/FBXLoader</code> or convert to glTF first via Blender.</p>
<p>Once parsed, you upload data to the GPU via <strong>VBOs</strong> (Vertex Buffer Objects) — exactly the same buffers you already know from WebGL. The shader doesn't care where the data came from.</p>
<div class="tip">Think of mesh files as a recipe card. Your CPU reads the recipe (parses the file), assembles the ingredients (vertex arrays), then hands them to the GPU chef (WebGL). The shader just receives pre-chopped ingredients — it never sees the recipe card at all!</div>
<div class="step-card"><span class="step-num">PIPELINE</span>Load file → parse vertices/UVs/normals → upload to GPU buffers → bind in vertex shader → shade in fragment shader</div>
<div class="challenge">Try it: parse the OBJ below manually and count how many triangles it has. Each "f" line = 1 face. Hint: a cube has 12 triangles.</div>
`,
shader: `// OBJ FILE FORMAT — annotated example
// (This shader visualises what a parsed mesh looks like
//  as vertex data flowing through the pipeline)

precision mediump float;
uniform vec2 u_resolution;
uniform float u_time;

// ── WHAT AN OBJ FILE LOOKS LIKE (as a comment) ──
//
// v  0.5  0.5 -0.5   ← vertex position (x y z)
// v -0.5  0.5 -0.5
// vt 1.0  1.0        ← UV coordinate (u v)
// vt 0.0  1.0
// vn  0.0  1.0  0.0  ← surface normal (x y z)
// f  1/1/1  2/2/1  3/3/1  ← face: vertIdx/uvIdx/normalIdx
//
// After parsing, you'd have float arrays like:
// positions = [0.5, 0.5, -0.5,  -0.5, 0.5, -0.5, ...]
// uvs       = [1.0, 1.0,   0.0, 1.0, ...]
// normals   = [0.0, 1.0,   0.0, ...]
// Then: gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(positions), ...)

// ── SIMULATING A LOADED MESH IN THE SHADER ──
// We fake a rotating mesh using raymarching to show
// what it looks like once it's on the GPU.

float sdBox(vec3 p,vec3 b){vec3 q=abs(p)-b;return length(max(q,0.0))+min(max(q.x,max(q.y,q.z)),0.0);}
float sdSphere(vec3 p,float r){return length(p)-r;}
float smin(float a,float b,float k){float h=clamp(.5+.5*(b-a)/k,0.,1.);return mix(b,a,h)-k*h*(1.-h);}

// Fake "loaded character" built from primitives
// In a real app this would come from your OBJ/glTF vertices
float fakeModel(vec3 p) {
  float t = u_time * 0.5;
  // Body
  float body = sdBox(p, vec3(0.4,0.55,0.25));
  // Head
  float head = sdSphere(p - vec3(0.0,0.8,0.0), 0.32);
  // Arms (spread out like a T-pose — classic mesh export pose!)
  float armL = sdBox(p - vec3(-0.7, 0.1, 0.0), vec3(0.28,0.1,0.1));
  float armR = sdBox(p - vec3( 0.7, 0.1, 0.0), vec3(0.28,0.1,0.1));
  // Legs
  float legL = sdBox(p - vec3(-0.18,-1.0,0.0), vec3(0.12,0.45,0.12));
  float legR = sdBox(p - vec3( 0.18,-1.0,0.0), vec3(0.12,0.45,0.12));

  float d = smin(body, head, 0.08);
  d = smin(d, armL, 0.06);
  d = smin(d, armR, 0.06);
  d = smin(d, legL, 0.05);
  d = smin(d, legR, 0.05);
  return d;
}

float scene(vec3 p){ return min(fakeModel(p), p.y+1.5); }

vec3 getNormal(vec3 p){float e=0.001;return normalize(vec3(scene(p+vec3(e,0,0))-scene(p-vec3(e,0,0)),scene(p+vec3(0,e,0))-scene(p-vec3(0,e,0)),scene(p+vec3(0,0,e))-scene(p-vec3(0,0,e))));}

void main(){
  vec2 sc=(gl_FragCoord.xy/u_resolution)*2.0-1.0;
  sc.x*=u_resolution.x/u_resolution.y;
  float a=u_time*0.4;
  vec3 ro=vec3(sin(a)*3.5,0.3,cos(a)*3.5);
  vec3 fwd=normalize(-ro+vec3(0,0.1,0));
  vec3 right=normalize(cross(vec3(0,1,0),fwd));
  vec3 up=cross(fwd,right);
  vec3 rd=normalize(fwd*1.5+right*sc.x+up*sc.y);
  float t2=0.0; bool hit=false;
  for(int i=0;i<100;i++){float d=scene(ro+rd*t2);if(d<0.001){hit=true;break;}t2+=d;if(t2>20.0)break;}
  vec3 color=vec3(0.04,0.04,0.1);
  if(hit){
    vec3 p=ro+rd*t2;
    vec3 n=getNormal(p);
    // Wireframe overlay — visualises the mesh topology
    // In real meshes, each triangle edge would show here
    vec3 L=normalize(vec3(1.5,2.0,1.0));
    float diff=max(dot(n,L),0.0);
    // Base color: show normals as RGB (useful for debugging meshes!)
    vec3 normalColor = n*0.5+0.5;
    vec3 diffColor = vec3(0.4,0.7,1.0)*(0.1+diff*0.9);
    color = mix(diffColor, normalColor, 0.3);
    vec3 h=normalize(L-rd);
    color+=0.3*pow(max(dot(n,h),0.0),32.0);
    color=mix(color,vec3(0.04,0.04,0.1),t2*0.05);
  }
  gl_FragColor=vec4(color,1.0);
}
`
},

// ─── 18 ───────────────────────────────────────────
{
title: "Particle Systems",
subtitle: "18 — GPU Particles",
body: `
<p>A <strong>particle system</strong> is thousands of tiny objects — sparks, smoke, rain, stars — each with its own position, velocity, and lifetime.</p>
<p>The naive way: update particles on the CPU in JavaScript, upload positions every frame. Fine for a few hundred. Terrible for millions.</p>
<p>The GPU way: store all particle state in a <strong>texture</strong> (one texel = one particle's data). Each frame, a <em>compute pass</em> updates positions. A draw pass reads positions and renders points.</p>
<p>In pure fragment shaders (like here), we simulate particles <em>analytically</em> — computing where each particle <em>would be</em> at time T purely from math, with no state storage needed.</p>
<div class="tip">Analytical particles = "I don't store where you are, I CALCULATE where you must be right now from the laws of physics." Like knowing a ball thrown upward at speed V is at height V*t - 0.5*g*t² at any time. No simulation loop needed — just pure math!</div>
<div class="challenge">Modify the gravity constant (currently 0.4) to see particles arc differently. Try negative gravity for floating particles!</div>
`,
shader: `precision mediump float;
uniform vec2 u_resolution;
uniform float u_time;

// ── ANALYTICAL PARTICLE SYSTEM ──
// Each particle has: seed (for randomness), launch time
// Position is calculated PURELY from physics math.
// No CPU loop. No state. Just: where are you RIGHT NOW?

// Pseudo-random: unique number from a seed
float rand(float seed) {
  return fract(sin(seed * 127.1 + 311.7) * 43758.5);
}

// Physics: position of one particle at current time
// Launch angle, speed, and timing all come from its seed.
vec2 particlePos(float id, float t) {
  // Each particle gets unique properties from its ID
  float launchTime  = rand(id * 1.1) * 4.0;     // when it launches (0-4s)
  float angle       = rand(id * 2.3) * 6.28;    // launch direction (radians)
  float speed       = rand(id * 3.7) * 1.2 + 0.3; // launch speed

  // Age: how long since THIS particle launched
  // mod() makes it loop, so particles respawn
  float age = mod(t - launchTime, 5.0);

  // Physics: position = start + velocity*time + gravity*time²
  // (Classic kinematic equation — same as high school physics!)
  float gravity = 0.4;
  float x = cos(angle) * speed * age;
  float y = sin(angle) * speed * age - 0.5 * gravity * age * age;

  return vec2(x, y);
}

// Color: fade from bright to dim as particle ages
vec3 particleColor(float id, float age) {
  // Hue shift per particle using its ID
  float hue = rand(id * 5.1);
  vec3 hot  = vec3(1.0, 0.6 + hue*0.4, 0.1);  // young = hot/bright
  vec3 cool = vec3(0.3, 0.1, 0.5 * hue);       // old = cool/dim
  return mix(hot, cool, clamp(age / 3.0, 0.0, 1.0));
}

void main() {
  // Remap UV: center = (0,0), edges = ±1.5
  vec2 uv = (gl_FragCoord.xy / u_resolution) * 2.0 - 1.0;
  uv.x *= u_resolution.x / u_resolution.y;
  uv *= 1.8; // zoom out a bit

  vec3 color = vec3(0.03, 0.02, 0.08); // dark background

  // Emitter position: slowly drifts
  vec2 emitter = vec2(sin(u_time*0.3)*0.3, -0.5);

  // Draw N particles
  // (In real GPU particles you'd draw actual geometry quads;
  //  here we check every pixel against every particle)
  int N = 120;
  for (int i = 0; i < 120; i++) {
    float id = float(i);
    float launchTime = rand(id * 1.1) * 4.0;
    float age = mod(u_time - launchTime, 5.0);

    vec2 pos = emitter + particlePos(id, u_time);

    // Distance from this pixel to this particle center
    float dist = length(uv - pos);

    // Particle size: shrinks with age (fades out)
    float size = 0.04 * (1.0 - clamp(age/4.0, 0.0, 1.0));

    // Soft glow: bright core, soft falloff
    float glow = size / (dist + 0.001);
    glow = clamp(glow * 0.05, 0.0, 1.0);

    // Hard core dot
    float core = smoothstep(size*0.3, 0.0, dist);

    vec3 pColor = particleColor(id, age);
    color += pColor * (glow + core * 0.8);
  }

  // Tone-map: prevent blowout (HDR-style)
  color = color / (color + 1.0);
  // Gamma correction (makes colors look right on screen)
  color = pow(color, vec3(0.4545));

  gl_FragColor = vec4(color, 1.0);
}
`
},

// ─── 19 ───────────────────────────────────────────
{
title: "Vertex Shaders Deep Dive",
subtitle: "19 — Deform, Skin & Displace",
body: `
<p>The vertex shader runs <em>before</em> the fragment shader, once per vertex. Its main job: output <code>gl_Position</code> — the final 2D clip-space position of each vertex. But you can do so much more.</p>
<p><strong>Displacement</strong>: move vertices along their normal using a noise or texture value. Great for terrain, waves, cloth.</p>
<p><strong>Skinning</strong>: animate a mesh by multiplying each vertex by a blend of bone matrices. This is how every game character moves — each vertex is "pulled" by nearby skeleton joints.</p>
<p><strong>Varyings</strong>: pass any per-vertex data (color, UV, world position, normal) to the fragment shader where it gets smoothly interpolated across the triangle surface.</p>
<div class="tip">The vertex shader is the puppet master — it decides WHERE each point of your mesh ends up. The fragment shader just colors in the gaps. Displace vertices with a wave function and your flat plane becomes an ocean. No new geometry needed, just math applied to existing points!</div>
<div class="challenge">The wave height is controlled by the amplitude variable (currently 0.3). Try making it react to distance from center for a ripple effect!</div>
`,
shader: `// This fragment shader SIMULATES what a vertex shader
// displacement looks like, using raymarching.
// In real WebGL the VERTEX shader would run this math
// before the fragment shader ever executes.

precision mediump float;
uniform vec2 u_resolution;
uniform float u_time;

// ── WHAT THE VERTEX SHADER WOULD DO ──
// (shown as math we replicate in the ray scene)
//
// attribute vec3 a_position;  // mesh vertex
// attribute vec3 a_normal;    // which way it faces
// attribute vec2 a_uv;        // texture coords
// varying vec2 v_uv;          // pass UV → fragment shader
// varying vec3 v_worldPos;    // pass position → fragment shader
// uniform float u_time;
//
// void main() {
//   float wave = sin(a_position.x*4.0 + u_time*2.0)
//              * cos(a_position.z*4.0 + u_time*1.5) * 0.3;
//   // DISPLACE vertex along its normal
//   vec3 displaced = a_position + a_normal * wave;
//   v_uv = a_uv;
//   v_worldPos = displaced;
//   gl_Position = projectionMatrix * modelViewMatrix * vec4(displaced, 1.0);
// }

// ── SIMULATED DISPLACED SURFACE ──
// We show a flat grid displaced by a wave function —
// exactly what a vertex shader would produce.

float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5);}
float noise(vec2 p){vec2 i=floor(p);vec2 f=fract(p);vec2 u=f*f*(3.-2.*f);return mix(mix(hash(i),hash(i+vec2(1,0)),u.x),mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),u.x),u.y);}

// The displaced surface SDF
float displacedPlane(vec3 p) {
  // Base: flat plane at y=0
  // Displacement: wave function applied to XZ position
  float amplitude = 0.3;
  float wave = sin(p.x*3.0 + u_time*1.8)
             * cos(p.z*3.0 + u_time*1.3) * amplitude;
  // Add finer detail noise on top
  float detail = noise(p.xz*4.0 + u_time*0.5) * 0.08;
  // "Distance to the displaced surface" = how far Y is from the wave
  return p.y - wave - detail;
}

float scene(vec3 p){ return displacedPlane(p); }
vec3 getNormal(vec3 p){float e=0.003;return normalize(vec3(scene(p+vec3(e,0,0))-scene(p-vec3(e,0,0)),scene(p+vec3(0,e,0))-scene(p-vec3(0,e,0)),scene(p+vec3(0,0,e))-scene(p-vec3(0,0,e))));}

void main(){
  vec2 sc=(gl_FragCoord.xy/u_resolution)*2.0-1.0;
  sc.x*=u_resolution.x/u_resolution.y;

  // Low angle camera to see the waves nicely
  vec3 ro=vec3(sin(u_time*0.2)*1.5, 1.8, cos(u_time*0.2)*1.5+3.0);
  vec3 target=vec3(0.0,0.0,0.0);
  vec3 fwd=normalize(target-ro);
  vec3 right=normalize(cross(vec3(0,1,0),fwd));
  vec3 up=cross(fwd,right);
  vec3 rd=normalize(fwd*1.5+right*sc.x+up*sc.y);

  float t2=0.0; bool hit=false;
  for(int i=0;i<100;i++){
    float d=scene(ro+rd*t2);
    if(abs(d)<0.002){hit=true;break;}
    t2+=d*0.5; if(t2>15.0)break;
  }

  // Sky gradient
  float skyT = sc.y*0.5+0.5;
  vec3 color = mix(vec3(0.05,0.08,0.18), vec3(0.02,0.02,0.08), skyT);

  if(hit){
    vec3 p=ro+rd*t2;
    vec3 n=getNormal(p);
    vec3 L=normalize(vec3(1.0,2.0,0.5));
    float diff=max(dot(n,L),0.0);

    // Water-like color: dark below, bright reflections on top
    vec3 deep=vec3(0.02,0.08,0.22);
    vec3 shallow=vec3(0.1,0.5,0.7);
    vec3 waterColor=mix(deep,shallow,diff*0.8+0.1);

    // Fresnel: more reflective at glancing angles
    float fresnel=pow(1.0-max(dot(n,-rd),0.0),4.0);
    vec3 skyRefl=mix(vec3(0.05,0.08,0.18),vec3(0.6,0.8,1.0),fresnel);
    waterColor=mix(waterColor,skyRefl,fresnel*0.7);

    // Specular shimmer
    vec3 h=normalize(L-rd);
    waterColor+=0.6*pow(max(dot(n,h),0.0),128.0)*vec3(1.0,0.95,0.8);

    // Wireframe lines — shows mesh vertices
    vec2 grid=fract(p.xz*3.0);
    float wire=step(0.94,grid.x)+step(0.94,grid.y);
    wire=clamp(wire,0.0,1.0)*0.15;
    waterColor+=wire*vec3(0.3,0.8,1.0);

    color=waterColor;
    color=mix(color,vec3(0.05,0.08,0.18),t2*0.04);
  }
  gl_FragColor=vec4(color,1.0);
}
`
},

// ─── 20 ───────────────────────────────────────────
{
title: "Cellular Automata",
subtitle: "20 — Game of Life on GPU",
body: `
<p><strong>Cellular automata</strong>: each cell's next state depends only on its current neighbors. Conway's Game of Life uses four rules — yet produces gliders, oscillators, and self-replicating structures forever.</p>
<p>On the GPU this is a <strong>ping-pong texture</strong> operation — each frame, shader reads from texture A and writes to texture B, then they swap. Each pixel IS a cell. It's a full compute shader in a fragment shader.</p>
<p>The rules: a live cell with 2–3 live neighbors <em>survives</em>. A dead cell with exactly 3 live neighbors is <em>born</em>. Everything else dies or stays dead.</p>
<div class="tip">CA = "stupidly simple rules → insanely complex emergent behavior." Each cell only looks at 8 neighbors yet gliders emerge, travel, collide, and create new structures. Zero top-down design. Biologists think actual life might work this way!</div>
<div class="challenge">Change the birth threshold from step(2.5,nb)*step(nb,3.5) to step(1.5,nb)*step(nb,3.5) — that's B2/S23 "Gnarl". Or try step(2.5,nb)*step(nb,4.5) for HighLife. Tiny changes = totally different universes!</div>
`,
shader: `precision mediump float;
uniform vec2 u_resolution;
uniform float u_time;

// Deterministic hash: same seed always gives same result.
// This is how we simulate CA without ping-pong textures —
// each "generation" is computed from its own hash seed.
float hash(vec2 p){ return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5); }

void main(){
  vec2 uv   = gl_FragCoord.xy / u_resolution;
  float tick = floor(u_time * 2.0); // 2 generations per second

  // Which cell are we? (80x80 grid)
  vec2 cell = floor(uv * 80.0);

  // Current alive/dead state of THIS cell this generation
  float alive = step(0.52, hash(cell + tick * 0.13));

  // Count live neighbors (the 3x3 ring around this cell)
  float nb = 0.0;
  for(int dx=-1; dx<=1; dx++)
    for(int dy=-1; dy<=1; dy++){
      if(dx==0 && dy==0) continue; // skip self
      vec2 n = cell + vec2(float(dx), float(dy));
      nb += step(0.52, hash(n + tick * 0.13));
    }

  // Conway B3/S23 rule:
  // Born:    dead cell + exactly 3 neighbors
  // Survive: live cell + 2 or 3 neighbors
  float born  = (1.-alive) * step(2.5,nb)*step(nb,3.5);
  float surv  = alive      * step(1.5,nb)*step(nb,3.5);
  float life  = max(born, surv);

  // Previous tick state for color history effects
  float was   = step(0.52, hash(cell + (tick-1.)*0.13));
  float dying = was*(1.-life);    // was alive, now dead this tick
  float born2 = (1.-was)*life;   // was dead, now alive this tick

  // Colors:
  vec3 color = vec3(0.03,0.02,0.07);         // dead = dark
  color = mix(color, vec3(0.08,0.7,0.25), life);  // alive = green
  // Flash on birth/death (only visible for first ~25% of the tick)
  color = mix(color, vec3(0.9,0.95,0.2), born2  * step(fract(u_time*2.),0.25));
  color = mix(color, vec3(0.7,0.1,0.25), dying  * step(fract(u_time*2.),0.25));

  // Cell grid lines (visible on dead cells only)
  vec2 g = fract(uv*80.0);
  color += 0.04*(1.-life)*clamp(step(0.96,g.x)+step(0.96,g.y),0.,1.);

  // Alive cells pulse gently with time
  color += vec3(0.04,0.4,0.1)*life*(sin(u_time*6.28)*.5+.5)*0.12;

  gl_FragColor = vec4(clamp(color,0.,1.), 1.0);
}
`
},

// ─── 21 ───────────────────────────────────────────
{
title: "Boids — Flocking",
subtitle: "21 — Emergent Swarm Behavior",
body: `
<p><strong>Boids</strong> (Craig Reynolds, 1987): three rules only — <em>Separation</em> (don't crowd neighbors), <em>Alignment</em> (match their heading), <em>Cohesion</em> (steer toward center). Three rules → birds, fish, crowds.</p>
<p>On the GPU: store position+velocity per boid in a texture. Each frame, read all boids, compute the three forces, write new state. Same ping-pong as CA. Here we compute positions analytically to keep it single-shader.</p>
<p>Each boid is drawn as an elongated arrow pointing in its direction of travel. Connection lines appear between close neighbors — you can literally <em>see</em> the cohesion radius.</p>
<div class="tip">Boids is the poster child of emergent behavior. Nobody told the flock to form a V-shape. Three simple force rules and group intelligence appears. The flock is smarter than any individual bird. This is why game AI and crowd simulation still use it today!</div>
<div class="challenge">The cohesion mix value is 0.25. Try 0.7 — the whole flock collapses into a tight ball. Then try 0.05 — birds barely pull together. The tension between separation and cohesion IS the flock.</div>
`,
shader: `precision mediump float;
uniform vec2 u_resolution;
uniform float u_time;

float hash1(float n){ return fract(sin(n*127.1)*43758.5); }

// ── BOID SIMULATION ──
// Each boid orbits at its own radius/speed.
// Cohesion: pulled toward average radius (mix toward 0.42)
// Separation: staggered phase offset so they don't stack
// Alignment: shared angular velocity direction
vec2 boidPos(float id, float t){
  float baseR = 0.3 + hash1(id+5.)*0.35;
  float r     = mix(baseR, 0.42, 0.25);   // cohesion
  float speed = 0.8 + hash1(id+2.)*0.4;
  float sep   = id * 0.28;               // separation: phase stagger
  float a     = hash1(id)*6.28 + t*speed + sep;
  return vec2(cos(a)*r, sin(a)*r);
}
// Velocity = direction of travel
vec2 boidDir(float id, float t){
  return normalize(boidPos(id,t+.02) - boidPos(id,t-.02));
}

void main(){
  vec2 uv = (gl_FragCoord.xy/u_resolution)*2.-1.;
  uv.x   *= u_resolution.x/u_resolution.y;
  vec3 color = vec3(0.03,0.03,0.08);

  // ── DRAW BOIDS ──
  for(int i=0;i<40;i++){
    float fi  = float(i);
    vec2 pos  = boidPos(fi, u_time);
    vec2 vel  = boidDir(fi, u_time);
    vec2 tp   = uv - pos;

    // Project pixel onto forward and side axes of this boid
    float fwd = dot(tp, vel);
    float sid = dot(tp, vec2(-vel.y, vel.x));

    // Arrow body: elongated ellipse (longer forward than wide)
    float body = sqrt((fwd/0.036)*(fwd/0.036) + (sid/0.010)*(sid/0.010));
    float shape = smoothstep(1.2, 0.7, body);

    // Each boid has unique color from its ID
    vec3 bc = mix(vec3(0.2,0.6,1.0), vec3(1.0,0.6,0.1), hash1(fi));
    color = mix(color, bc, shape);

    // Velocity trail: phosphor afterglow
    float td = length(uv - (pos - vel*0.06));
    color += bc * 0.06 / (td*td*800. + 1.);
  }

  // ── CONNECTION LINES (shows cohesion radius) ──
  for(int i=0;i<40;i++)for(int j=0;j<40;j++){
    if(i>=j) continue;
    vec2 pi = boidPos(float(i),u_time);
    vec2 pj = boidPos(float(j),u_time);
    float d = length(pi-pj);
    if(d > 0.22) continue;  // only draw within cohesion radius

    // Closest point on segment pi→pj to this pixel
    vec2 ab = pj-pi;
    float t2 = clamp(dot(uv-pi,ab)/dot(ab,ab),0.,1.);
    float ld = length(uv - (pi+ab*t2));

    // Line fades as birds get farther apart
    color += vec3(0.1,0.4,0.8) * 0.0003/(ld*ld+0.00003) * (1.-d/0.22);
  }

  gl_FragColor = vec4(clamp(color,0.,1.), 1.0);
}
`
},
