<script>
'use strict';
window.addEventListener('error', e => { e.preventDefault(); return true; }, true);
window.addEventListener('unhandledrejection', e => e.preventDefault(), true);

// ─── CONSTANTS ───────────────────────────────────────────────────────────────
const LIME  = '#a8ff47', CYAN  = '#38d9f5', RED   = '#ff6060',
      AMBER = '#ffcc44', PURP  = '#cc66ff', PINK  = '#ff6699',
      DIM   = '#1a3a1a', EDGE  = '#2a6a2a', NODE  = '#0a1e0a';

// ─── ENGINE ──────────────────────────────────────────────────────────────────
const NAV_SECTIONS = {0:'FOUNDATIONS',4:'GRAPHS & PATHS',8:'ADVANCED',12:'FINISH LINE'};
let curLesson=0, animTimer=null, curViz=null;
const lessonText  = document.getElementById('lesson-text');
const lessonNav   = document.getElementById('lesson-nav');
const progressEl  = document.getElementById('progress');
const vizCanvas   = document.getElementById('viz-canvas');
const vizLabelEl  = document.getElementById('viz-label');
const vizStatusEl = document.getElementById('viz-status');
const codeEl      = document.getElementById('code-display');
const btnRun      = document.getElementById('btn-run');
const btnReset    = document.getElementById('btn-reset');
const speedSlider = document.getElementById('speed-slider');

LESSONS.forEach((L,i)=>{
  if(NAV_SECTIONS[i]){const d=document.createElement('span');d.className='nav-section';d.textContent=NAV_SECTIONS[i];lessonNav.appendChild(d);}
  const btn=document.createElement('button');btn.className='nav-btn';btn.textContent=L.subtitle;
  btn.addEventListener('click',()=>loadLesson(i));lessonNav.appendChild(btn);
});

const spd=()=>parseInt(speedSlider.value);
const ms =()=>Math.round(1100-spd()*100);
const W  =()=>vizCanvas.width;
const H  =()=>vizCanvas.height;
function stop(){if(animTimer){clearTimeout(animTimer);animTimer=null;}}

function loadLesson(i){
  stop(); curLesson=i;
  const L=LESSONS[i];
  progressEl.style.width=((i+1)/LESSONS.length*100).toFixed(1)+'%';
  document.querySelectorAll('.nav-btn').forEach((b,j)=>b.classList.toggle('active',j===i));
  lessonText.innerHTML='<div class="lesson-number">'+L.subtitle+'</div><div class="lesson-title">'+L.title+'</div><div class="lesson-body">'+L.body+'</div>';
  lessonText.scrollTop=0;
  codeEl.innerHTML=L.code;
  vizLabelEl.textContent='';
  vizStatusEl.textContent='press RUN';
  btnRun.textContent='▶ RUN';
  btnReset.textContent='RESET'; btnReset.onclick=null; btnReset._c=false;
  vizCanvas.onclick=vizCanvas.onmousedown=vizCanvas.onmousemove=vizCanvas.onmouseup=vizCanvas.onmouseleave=null;
  const ctx=vizCanvas.getContext('2d'); ctx.clearRect(0,0,W(),H());
  curViz=buildViz(L.viz); resize();
}
document.getElementById('copy-btn').addEventListener('click',function(){
  navigator.clipboard.writeText(codeEl.innerText||codeEl.textContent).then(()=>{this.textContent='COPIED';this.classList.add('done');setTimeout(()=>{this.textContent='COPY';this.classList.remove('done');},1500);});
});
btnRun.addEventListener('click',()=>{if(curViz&&curViz.run)curViz.run();});
btnReset.addEventListener('click',()=>{if(btnReset._c)return;stop();curViz=buildViz(LESSONS[curLesson].viz);resize();vizStatusEl.textContent='press RUN';});

// touch→mouse
function fwd(ev,type){const t=ev.changedTouches[0];vizCanvas.dispatchEvent(new MouseEvent(type,{bubbles:true,cancelable:true,view:window,clientX:t.clientX,clientY:t.clientY,shiftKey:ev.shiftKey,altKey:ev.altKey}));}
vizCanvas.addEventListener('touchstart', e=>{e.preventDefault();fwd(e,'mousedown');},{passive:false});
vizCanvas.addEventListener('touchmove',  e=>{e.preventDefault();fwd(e,'mousemove');},{passive:false});
vizCanvas.addEventListener('touchend',   e=>{e.preventDefault();fwd(e,'mouseup');fwd(e,'click');},{passive:false});
vizCanvas.addEventListener('touchcancel',e=>{e.preventDefault();fwd(e,'mouseup');},{passive:false});

function resize(){
  const a=document.getElementById('viz-area');
  vizCanvas.width=a.offsetWidth*devicePixelRatio; vizCanvas.height=a.offsetHeight*devicePixelRatio;
  if(curViz&&curViz.resize)curViz.resize(); else if(curViz&&curViz.draw)curViz.draw();
}
window.addEventListener('resize',resize);

function buildViz(type){
  const ctx=vizCanvas.getContext('2d');
  switch(type){
    case 'bigO':           return vBigO(ctx);
    case 'binarySearch':   return vBinarySearch(ctx);
    case 'sorting':        return vSorting(ctx);
    case 'dataStructures': return vDS(ctx);
    case 'graphViz':       return vGraph(ctx);
    case 'bfsDfs':         return vBfsDfs(ctx);
    case 'dijkstra':       return vDijkstra(ctx);
    case 'astar':          return vAstar(ctx);
    case 'dynamicProg':    return vDP(ctx);
    case 'greedyViz':      return vGreedy(ctx);
    case 'bstViz':         return vBST(ctx);
    case 'mcts':           return vMCTS(ctx);
    case 'nextSteps':      return vNextSteps(ctx);
    default: ctx.fillStyle='#000';ctx.fillRect(0,0,W(),H());return{draw(){}};
  }
}

// ─── SHARED HELPERS ──────────────────────────────────────────────────────────
function glow(ctx,col,r=18){ctx.shadowColor=col;ctx.shadowBlur=r;}
function noGlow(ctx){ctx.shadowColor='transparent';ctx.shadowBlur=0;}
function hex2rgb(h){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return[r,g,b];}
function rgba(col,a){const[r,g,b]=hex2rgb(col);return`rgba(${r},${g},${b},${a})`;}
function scanline(ctx,col,brightness=0.04){
  const w=W(),h=H();
  ctx.fillStyle=rgba(col,brightness);
  for(let y=0;y<h;y+=4){ctx.fillRect(0,y,w,1);}
}
function grid(ctx,col='#0a1a0a'){
  const w=W(),h=H(),s=Math.max(24,Math.min(40,w/24));
  ctx.strokeStyle=col;ctx.lineWidth=1;
  for(let x=0;x<w;x+=s){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,h);ctx.stroke();}
  for(let y=0;y<h;y+=s){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke();}
}
function label(ctx,txt,x,y,col=LIME,sz=9){
  ctx.fillStyle=col;ctx.font='bold '+sz*devicePixelRatio+'px Space Mono';ctx.textAlign='center';ctx.fillText(txt,x,y);
}
function node(ctx,x,y,r,fill,stroke,txt,txtcol,bold=false){
  ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);
  ctx.fillStyle=fill;ctx.fill();
  glow(ctx,stroke,12);ctx.strokeStyle=stroke;ctx.lineWidth=2;ctx.stroke();noGlow(ctx);
  if(txt!==undefined){
    ctx.fillStyle=txtcol||stroke;
    ctx.font=(bold?'bold ':'')+Math.min(12,r*0.72)*devicePixelRatio+'px Space Mono';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(txt,x,y);ctx.textBaseline='alphabetic';
  }
}
function hBar(ctx,x,y,w,h,col,gCol){
  ctx.fillStyle=rgba(col,0.15);ctx.fillRect(x,y,w,h);
  glow(ctx,gCol||col,8);ctx.strokeStyle=col;ctx.lineWidth=1;ctx.strokeRect(x,y,w,h);noGlow(ctx);
}

// ═══════════════════════════════════════════════════════════════════════════════
//  01 — BIG-O  (glowing curves on grid, live dot inspection)
// ═══════════════════════════════════════════════════════════════════════════════
function vBigO(ctx){
  vizLabelEl.textContent='▶ hover or tap to inspect — RUN to sweep';
  const curves=[
    {l:'O(1)',     col:CYAN,  fn:n=>1},
    {l:'O(log n)', col:LIME,  fn:n=>Math.log2(n+1)},
    {l:'O(n)',     col:'#88ff99',fn:n=>n},
    {l:'O(n log n)',col:AMBER, fn:n=>n*Math.log2(n+1)},
    {l:'O(n²)',    col:RED,   fn:n=>n*n},
  ];
  const N=100; let hx=null;
  const PAD={t:32,r:110,b:40,l:52};

  function pw(){return W()-PAD.l-PAD.r;}
  function ph(){return H()-PAD.t-PAD.b;}
  function sc(n,v){const my=curves[3].fn(N)*1.12;return[PAD.l+(n/N)*pw(),PAD.t+ph()-(Math.min(v,my)/my)*ph()];}

  function draw(){
    const w=W(),h=H();
    ctx.fillStyle='#000';ctx.fillRect(0,0,w,h);
    grid(ctx,'#071407');
    // Axis
    ctx.strokeStyle='#1a4a1a';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(PAD.l,PAD.t);ctx.lineTo(PAD.l,PAD.t+ph());ctx.lineTo(PAD.l+pw(),PAD.t+ph());ctx.stroke();
    // Grid ticks
    ctx.strokeStyle='#0e2e0e';ctx.lineWidth=1;
    [0.25,0.5,0.75,1].forEach(f=>{const y=PAD.t+ph()*(1-f);ctx.beginPath();ctx.moveTo(PAD.l,y);ctx.lineTo(PAD.l+pw(),y);ctx.stroke();});
    // Curves
    curves.forEach(cv=>{
      ctx.beginPath();
      glow(ctx,cv.col,16);
      ctx.strokeStyle=cv.col;ctx.lineWidth=2.5;
      for(let n=1;n<=N;n++){const[x,y]=sc(n,cv.fn(n));n===1?ctx.moveTo(x,y):ctx.lineTo(x,y);}
      ctx.stroke();noGlow(ctx);
      // End label
      const[lx,ly]=sc(N,cv.fn(N));
      ctx.fillStyle=cv.col;ctx.font='bold '+8.5*devicePixelRatio+'px Space Mono';ctx.textAlign='left';
      ctx.fillText(cv.l,lx+5,Math.max(PAD.t+9,Math.min(PAD.t+ph()-4,ly+4)));
    });
    // Hover line + dots
    if(hx!==null){
      const n=Math.round(((hx-PAD.l)/pw())*N);
      if(n>=1&&n<=N){
        const lx=PAD.l+(n/N)*pw();
        ctx.strokeStyle=rgba(LIME,0.3);ctx.lineWidth=1;ctx.setLineDash([4,4]);
        ctx.beginPath();ctx.moveTo(lx,PAD.t);ctx.lineTo(lx,PAD.t+ph());ctx.stroke();
        ctx.setLineDash([]);
        const flip=lx>PAD.l+pw()*0.55;
        curves.forEach((cv,ci)=>{
          const v=cv.fn(n),[cx2,cy2]=sc(n,v);
          glow(ctx,cv.col,14);
          ctx.beginPath();ctx.arc(cx2,cy2,5,0,Math.PI*2);ctx.fillStyle=cv.col;ctx.fill();
          noGlow(ctx);
          ctx.fillStyle=cv.col;ctx.font=8*devicePixelRatio+'px Space Mono';
          ctx.textAlign=flip?'right':'left';
          ctx.fillText(v<10000?v.toFixed(v<10?1:0):'>10k',flip?lx-7:lx+7,PAD.t+11+ci*13);
        });
        ctx.fillStyle=rgba(LIME,0.6);ctx.font=8*devicePixelRatio+'px Space Mono';ctx.textAlign='center';
        ctx.fillText('n='+n,lx,PAD.t+ph()+20);
      }
    }
    scanline(ctx,LIME,0.03);
  }

  vizCanvas.onmousemove=e=>{const r=vizCanvas.getBoundingClientRect();hx=(e.clientX-r.left)*devicePixelRatio;draw();};
  vizCanvas.onmouseleave=()=>{hx=null;draw();};
  vizCanvas.onclick=e=>{const r=vizCanvas.getBoundingClientRect();hx=(e.clientX-r.left)*devicePixelRatio;draw();};

  function run(){
    let n=1;
    function tick(){hx=PAD.l+(n/N)*pw();draw();n+=2;if(n<=N)animTimer=setTimeout(tick,ms()*0.3);else{hx=null;draw();vizStatusEl.textContent='hover to inspect';}}
    vizStatusEl.textContent='sweeping…';tick();
  }
  draw();return{draw,run};
}

// ═══════════════════════════════════════════════════════════════════════════════
//  02 — BINARY SEARCH  (large glowing bars, bracket, neon pointer)
// ═══════════════════════════════════════════════════════════════════════════════
function vBinarySearch(ctx){
  vizLabelEl.textContent='▶ binary search — RUN picks a random target';
  const N=32,arr=Array.from({length:N},(_,i)=>i*3+2);
  let lo=0,hi=N-1,mid=-1,found=-1,steps=0,done=false,target=arr[Math.floor(Math.random()*N)];

  function draw(){
    const w=W(),h=H();
    ctx.fillStyle='#000';ctx.fillRect(0,0,w,h);
    grid(ctx,'#060e06');
    const pad=28,bw=(w-pad*2)/N,bh=Math.min(60,h*0.32),by=h*0.42-bh/2;
    arr.forEach((v,i)=>{
      const inR=i>=lo&&i<=hi,isMid=i===mid,isFound=i===found,isOut=i<lo||i>hi;
      // Bar fill
      let fc='#0a180a';
      if(inR)fc='#0f2810';if(isMid||isFound)fc='#1e4a08';
      ctx.fillStyle=fc;ctx.fillRect(pad+i*bw+1,by,bw-2,bh);
      // Bar stroke / glow
      if(isMid||isFound){
        const col=isFound?CYAN:LIME;
        glow(ctx,col,20);
        ctx.strokeStyle=col;ctx.lineWidth=2;ctx.strokeRect(pad+i*bw+1,by,bw-2,bh);
        noGlow(ctx);
        // Top cap
        ctx.fillStyle=col;ctx.fillRect(pad+i*bw+1,by,bw-2,3);
      } else if(inR){
        ctx.strokeStyle='#1e4a1e';ctx.lineWidth=1;ctx.strokeRect(pad+i*bw+1,by,bw-2,bh);
      }
      // Value label
      if(bw>13||isMid||isFound){
        const col=isFound?CYAN:isMid?LIME:isOut?'#1a3a1a':'#2a6a2a';
        ctx.fillStyle=col;
        ctx.font=(isMid||isFound?'bold ':'')+Math.min(11,bw*0.65)*devicePixelRatio+'px Space Mono';
        ctx.textAlign='center';ctx.fillText(v,pad+i*bw+bw/2,by+bh/2+4);
      }
    });
    // Search space bracket
    if(!done&&lo<=hi){
      const bx=pad+lo*bw,ex=pad+(hi+1)*bw-2;
      glow(ctx,LIME,6);ctx.strokeStyle=LIME;ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(bx,by-11);ctx.lineTo(bx,by-4);ctx.moveTo(bx,by-7);ctx.lineTo(ex,by-7);ctx.moveTo(ex,by-4);ctx.lineTo(ex,by-11);ctx.stroke();noGlow(ctx);
    }
    // Pointer arrow
    if(mid>=0&&!done){
      const ax=pad+mid*bw+bw/2;
      glow(ctx,LIME,14);ctx.fillStyle=LIME;
      ctx.font='bold '+Math.min(18,bw*1.2)*devicePixelRatio+'px Space Mono';ctx.textAlign='center';
      ctx.fillText('▲',ax,Math.min(h-8,by+bh+24));noGlow(ctx);
    }
    // Target
    ctx.fillStyle='#2a6a2a';ctx.font='bold '+11*devicePixelRatio+'px Space Mono';ctx.textAlign='left';
    ctx.fillText('target: '+target,pad,by-24);
    if(done){
      glow(ctx,found>=0?LIME:RED,16);
      ctx.fillStyle=found>=0?LIME:RED;ctx.font='bold '+13*devicePixelRatio+'px Syne';ctx.textAlign='center';
      ctx.fillText(found>=0?'✓ found in '+steps+' steps':'✗ not found',w/2,h*0.82);noGlow(ctx);
    }
    scanline(ctx,LIME,0.025);
  }

  function step(){
    if(lo>hi||done){done=true;vizStatusEl.textContent=found>=0?'found in '+steps+' steps':'not found';return false;}
    mid=lo+((hi-lo)>>1);steps++;
    if(arr[mid]===target){found=mid;done=true;}else if(arr[mid]<target)lo=mid+1;else hi=mid-1;
    vizStatusEl.textContent='step '+steps+' — arr['+mid+'] = '+arr[mid];draw();return!done;
  }
  function run(){done=false;lo=0;hi=N-1;mid=-1;found=-1;steps=0;target=arr[Math.floor(Math.random()*N)];function tick(){if(step())animTimer=setTimeout(tick,ms());}tick();}
  draw();return{draw,run};
}

// ═══════════════════════════════════════════════════════════════════════════════
//  03 — SORTING  (three neon bar charts, race to the top)
// ═══════════════════════════════════════════════════════════════════════════════
function vSorting(ctx){
  vizLabelEl.textContent='▶ same data — three algorithms race';
  const N=40,COLS=[RED,LIME,CYAN],NAMES=['BUBBLE','MERGE','QUICK'];
  let arrays,ops,done,hi;
  function fresh(){return Array.from({length:N},()=>Math.floor(Math.random()*N)+2);}
  function init(){const b=fresh();arrays=[b.slice(),b.slice(),b.slice()];ops=[0,0,0];done=[false,false,false];hi=[[],[],[]];}
  init();

  function draw(){
    const w=W(),h=H();
    ctx.fillStyle='#000';ctx.fillRect(0,0,w,h);
    const cw=w/3,maxH=h-56,bw=(cw-14)/N;
    arrays.forEach((arr,ai)=>{
      const ox=ai*cw+7;
      arr.forEach((v,i)=>{
        const barH=(v/N)*maxH,isHi=hi[ai].includes(i);
        // Dark background slot
        ctx.fillStyle='#05100a';ctx.fillRect(ox+i*bw,h-42-maxH,bw-1,maxH);
        // Bar
        if(done[ai]){
          // Filled solid on completion
          glow(ctx,COLS[ai],isHi?16:4);
          ctx.fillStyle=done[ai]?rgba(COLS[ai],0.7):'#1a3a1a';
          ctx.fillRect(ox+i*bw,h-42-barH,bw-1,barH);
        } else {
          ctx.fillStyle=isHi?rgba(COLS[ai],0.8):'#0f2010';
          ctx.fillRect(ox+i*bw,h-42-barH,bw-1,barH);
          if(isHi){glow(ctx,COLS[ai],14);ctx.fillStyle=COLS[ai];ctx.fillRect(ox+i*bw,h-42-barH,bw-1,3);noGlow(ctx);}
        }
        noGlow(ctx);
      });
      // Divider
      if(ai<2){ctx.strokeStyle='#0e200e';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo((ai+1)*cw,0);ctx.lineTo((ai+1)*cw,h);ctx.stroke();}
      // Labels
      glow(ctx,COLS[ai],done[ai]?12:0);
      ctx.fillStyle=done[ai]?COLS[ai]:'#2a5a2a';
      ctx.font='bold '+9*devicePixelRatio+'px Space Mono';ctx.textAlign='center';
      ctx.fillText((done[ai]?'✓ ':'')+NAMES[ai],ox+(cw-14)/2,h-28);
      noGlow(ctx);
      ctx.fillStyle='#1a4a1a';ctx.font=8*devicePixelRatio+'px Space Mono';
      ctx.fillText(ops[ai]+' ops',ox+(cw-14)/2,h-14);
    });
    scanline(ctx,LIME,0.025);
  }

  function*bG(a,i){for(let x=0;x<a.length;x++)for(let j=0;j<a.length-x-1;j++){ops[i]++;hi[i]=[j,j+1];if(a[j]>a[j+1])[a[j],a[j+1]]=[a[j+1],a[j]];yield;}done[i]=true;hi[i]=[];}
  function*mG(a,i){function*ms(a,l,r){if(l>=r)return;const m=(l+r)>>1;yield*ms(a,l,m);yield*ms(a,m+1,r);const t=[];let p=l,q=m+1;while(p<=m&&q<=r){ops[i]++;hi[i]=[p,q];t.push(a[p]<=a[q]?a[p++]:a[q++]);yield;}while(p<=m)t.push(a[p++]);while(q<=r)t.push(a[q++]);for(let k=l;k<=r;k++){a[k]=t[k-l];hi[i]=[k];ops[i]++;yield;}}yield*ms(a,0,a.length-1);done[i]=true;hi[i]=[];}
  function*qG(a,i){function*qs(a,lo,hi2){if(lo>=hi2)return;const pv=a[hi2];let p=lo;for(let j=lo;j<hi2;j++){ops[i]++;hi[i]=[j,hi2];if(a[j]<=pv){[a[p],a[j]]=[a[j],a[p]];p++;}yield;}[a[p],a[hi2]]=[a[hi2],a[p]];hi[i]=[p];yield;yield*qs(a,lo,p-1);yield*qs(a,p+1,hi2);}yield*qs(a,0,a.length-1);done[i]=true;hi[i]=[];}

  function run(){init();const G=[bG(arrays[0],0),mG(arrays[1],1),qG(arrays[2],2)];function tick(){let any=false;G.forEach((g,i)=>{if(!done[i]){const r=g.next();if(!r.done)any=true;}});draw();if(any)animTimer=setTimeout(tick,Math.max(3,ms()*0.14));else vizStatusEl.textContent='bubble:'+ops[0]+' merge:'+ops[1]+' quick:'+ops[2];}tick();}
  draw();return{draw,run};
}

// ═══════════════════════════════════════════════════════════════════════════════
//  04 — DATA STRUCTURES  (centered, glowing, large)
// ═══════════════════════════════════════════════════════════════════════════════
function vDS(ctx){
  vizLabelEl.textContent='▶ tap canvas to switch · RUN to animate';
  let mode=0;const MODES=['STACK','QUEUE','MIN-HEAP','HASH MAP'],MCOLS=[LIME,CYAN,LIME,PURP];
  let stack=[],queue=[],heap=[],hmap={},lastOp='',hiIdx=-1;
  function hpush(v){heap.push(v);let i=heap.length-1;while(i>0){const p=(i-1)>>1;if(heap[p]<=heap[i])break;[heap[p],heap[i]]=[heap[i],heap[p]];i=p;}}
  function hpop(){if(!heap.length)return;[heap[0],heap[heap.length-1]]=[heap[heap.length-1],heap[0]];const t=heap.pop();let i=0;for(;;){const l=2*i+1,r=2*i+2;let m=i;if(l<heap.length&&heap[l]<heap[m])m=l;if(r<heap.length&&heap[r]<heap[m])m=r;if(m===i)break;[heap[i],heap[m]]=[heap[m],heap[i]];i=m;}return t;}
  vizCanvas.onclick=()=>{mode=(mode+1)%4;hiIdx=-1;lastOp='';draw();};
  const IH=46,IW=82,GAP=6,COL=()=>MCOLS[mode];

  function draw(){
    const w=W(),h=H(),cx=w/2,cy=h/2;
    ctx.fillStyle='#000';ctx.fillRect(0,0,w,h);
    grid(ctx,'#070d07');
    // Mode label — top center, large glowing
    glow(ctx,COL(),22);
    ctx.fillStyle=COL();ctx.font='bold '+18*devicePixelRatio+'px Syne';ctx.textAlign='center';ctx.fillText(MODES[mode],cx,30);
    noGlow(ctx);
    if(lastOp){ctx.fillStyle=COL();ctx.font='bold '+10*devicePixelRatio+'px Space Mono';ctx.textAlign='center';ctx.fillText(lastOp,cx,h-12);}

    if(mode===0){// STACK — vertical tower centered
      const n=stack.length,startY=cy+(n*(IH+GAP))/2-IH/2;
      if(!n){ctx.fillStyle=DIM;ctx.font=10*devicePixelRatio+'px Space Mono';ctx.textAlign='center';ctx.fillText('press RUN',cx,cy);}
      stack.forEach((v,i)=>{
        const y=startY-i*(IH+GAP),isHi=i===hiIdx;
        if(isHi)glow(ctx,LIME,16);
        ctx.fillStyle=isHi?'#1a3a08':'#0a1e0a';ctx.fillRect(cx-IW/2,y-IH/2,IW,IH);
        ctx.strokeStyle=isHi?LIME:EDGE;ctx.lineWidth=isHi?2:1;ctx.strokeRect(cx-IW/2,y-IH/2,IW,IH);
        noGlow(ctx);
        ctx.fillStyle=isHi?LIME:'#4aaa4a';ctx.font='bold '+13*devicePixelRatio+'px Space Mono';ctx.textAlign='center';ctx.fillText(v,cx,y+5);
      });
      if(n){ctx.fillStyle='#2a5a2a';ctx.font=9*devicePixelRatio+'px Space Mono';ctx.textAlign='left';ctx.fillText('← TOP',cx+IW/2+8,startY-n*(IH+GAP)+IH/2+5);}
    }
    else if(mode===1){// QUEUE — horizontal row centered
      const n=queue.length,startX=cx-(n*(IW+GAP))/2+IW/2;
      if(!n){ctx.fillStyle=DIM;ctx.font=10*devicePixelRatio+'px Space Mono';ctx.textAlign='center';ctx.fillText('press RUN',cx,cy);}
      queue.forEach((v,i)=>{
        const x=startX+i*(IW+GAP),isHi=i===hiIdx;
        if(isHi)glow(ctx,CYAN,16);
        ctx.fillStyle=isHi?'#081828':'#050e14';ctx.fillRect(x-IW/2,cy-IH/2,IW,IH);
        ctx.strokeStyle=isHi?CYAN:'#1a4a6a';ctx.lineWidth=isHi?2:1;ctx.strokeRect(x-IW/2,cy-IH/2,IW,IH);
        noGlow(ctx);
        ctx.fillStyle=isHi?CYAN:'#3a8aaa';ctx.font='bold '+13*devicePixelRatio+'px Space Mono';ctx.textAlign='center';ctx.fillText(v,x,cy+5);
      });
      if(n>0){ctx.fillStyle='#1a5a7a';ctx.font=9*devicePixelRatio+'px Space Mono';ctx.textAlign='center';ctx.fillText('FRONT',startX,cy-IH/2-8);}
      if(n>1) {ctx.fillStyle='#1a5a7a';ctx.font=9*devicePixelRatio+'px Space Mono';ctx.textAlign='center';ctx.fillText('BACK',startX+(n-1)*(IW+GAP),cy-IH/2-8);}
    }
    else if(mode===2){// HEAP — flat array with parent lines
      if(!heap.length){ctx.fillStyle=DIM;ctx.font=10*devicePixelRatio+'px Space Mono';ctx.textAlign='center';ctx.fillText('press RUN',cx,cy);return;}
      const bw=Math.min(68,(W()-32)/Math.max(heap.length,6)),tot=heap.length*bw,ox=cx-tot/2;
      heap.forEach((v,i)=>{
        const x=ox+i*bw,isHi=i===hiIdx,isMin=i===0;
        if(isHi||isMin)glow(ctx,LIME,14);
        ctx.fillStyle=isHi?'#1a3a08':'#0a1e0a';ctx.fillRect(x,cy-IH/2,bw-3,IH);
        ctx.strokeStyle=isHi?LIME:isMin?LIME:EDGE;ctx.lineWidth=isHi||isMin?2:1;ctx.strokeRect(x,cy-IH/2,bw-3,IH);
        noGlow(ctx);
        ctx.fillStyle=isHi||isMin?LIME:'#4aaa4a';ctx.font='bold '+11*devicePixelRatio+'px Space Mono';ctx.textAlign='center';ctx.fillText(v,x+(bw-3)/2,cy+4);
        if(i>0){const p=(i-1)>>1;ctx.strokeStyle='#1a3a1a';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(x+(bw-3)/2,cy-IH/2);ctx.lineTo(ox+p*bw+(bw-3)/2,cy-IH/2);ctx.stroke();}
      });
      ctx.fillStyle=LIME;ctx.font=10*devicePixelRatio+'px Space Mono';ctx.textAlign='center';ctx.fillText('min: '+heap[0],cx,cy+IH/2+18);
    }
    else{// HASH MAP — card grid
      const entries=Object.entries(hmap);
      if(!entries.length){ctx.fillStyle=DIM;ctx.font=10*devicePixelRatio+'px Space Mono';ctx.textAlign='center';ctx.fillText('press RUN',cx,cy);return;}
      const cols=Math.min(4,entries.length),cw2=Math.min(130,(W()-24)/cols),ch2=48,rows=Math.ceil(entries.length/cols),ox=cx-(cols*cw2)/2,oy=cy-(rows*ch2)/2;
      entries.forEach(([k,v],i)=>{
        const x=ox+(i%cols)*cw2+2,y=oy+Math.floor(i/cols)*ch2,isHi=k===String(hiIdx);
        if(isHi)glow(ctx,PURP,14);
        ctx.fillStyle=isHi?'#1a0a30':'#0a0618';ctx.fillRect(x,y,cw2-4,ch2-5);
        ctx.strokeStyle=isHi?PURP:'#2a1a4a';ctx.lineWidth=isHi?2:1;ctx.strokeRect(x,y,cw2-4,ch2-5);
        noGlow(ctx);
        ctx.fillStyle='#7a5aaa';ctx.font=8*devicePixelRatio+'px Space Mono';ctx.textAlign='left';ctx.fillText(k,x+6,y+15);
        ctx.fillStyle=isHi?PURP:'#ccaaff';ctx.font='bold '+11*devicePixelRatio+'px Space Mono';ctx.fillText('→ '+v,x+6,y+33);
      });
    }
    scanline(ctx,COL(),0.03);
  }

  const words=['apple','binary','cache','delta','echo','forest','grep','hash'];let stepN=0;
  function run(){stepN=0;stack=[];queue=[];heap=[];hmap={};hiIdx=-1;lastOp='';
    const vals=Array.from({length:10},()=>Math.floor(Math.random()*50)+1);
    function tick(){if(stepN>=20){vizStatusEl.textContent='done';draw();return;}
      const v=vals[stepN%10];
      if(mode===0){if(stepN<10){stack.push(v);hiIdx=stack.length-1;lastOp='push('+v+')';}else{const p=stack.pop();hiIdx=-1;lastOp='pop() → '+p;}}
      else if(mode===1){if(stepN<10){queue.push(v);hiIdx=queue.length-1;lastOp='enqueue('+v+')';}else{const d=queue.shift();hiIdx=-1;lastOp='dequeue() → '+d;}}
      else if(mode===2){if(stepN<10){hpush(v);hiIdx=0;lastOp='push('+v+') min='+heap[0];}else{const p=hpop();lastOp='pop() → '+p;}}
      else{const w=words[stepN%8],hash=w.split('').reduce((a,c)=>a+c.charCodeAt(0),0)%97;hmap[w]=hash;hiIdx=w;lastOp='set("'+w+'",'+hash+')';}
      vizStatusEl.textContent=lastOp;stepN++;draw();animTimer=setTimeout(tick,ms());}tick();}
  draw();return{draw,run};
}

// ═══════════════════════════════════════════════════════════════════════════════
//  05 — GRAPH  (glowing nodes, pulsing on hover)
// ═══════════════════════════════════════════════════════════════════════════════
function vGraph(ctx){
  vizLabelEl.textContent='▶ tap to add node · drag to connect · RUN traces';
  const nodes=[],edges=[];let drag=null,hiPath=[];let _w=0,_h=0;
  function mkDef(){
    nodes.length=0;edges.length=0;const cx=W()/2,cy=H()/2,r=Math.min(W(),H())*0.33;
    'ABCDEFG'.split('').forEach((l,i)=>{const a=(i/7)*Math.PI*2-Math.PI/2;nodes.push({id:l,x:cx+r*Math.cos(a),y:cy+r*Math.sin(a),label:l});});
    [[0,1,4],[0,2,2],[1,3,5],[1,4,3],[2,5,6],[3,6,2],[4,5,1],[5,6,4],[4,6,7]].forEach(([a,b,w])=>edges.push({a:nodes[a].id,b:nodes[b].id,w}));
    _w=W();_h=H();
  }
  mkDef();
  function nodeAt(x,y){return nodes.find(n=>Math.hypot(n.x-x,n.y-y)<22);}
  function resize(){const nw=W(),nh=H();if(_w&&_h){nodes.forEach(n=>{n.x=n.x*nw/_w;n.y=n.y*nh/_h;});}; _w=nw;_h=nh;draw();}

  function draw(){
    const w=W(),h=H();
    ctx.fillStyle='#000';ctx.fillRect(0,0,w,h);
    if(w>0&&h>0&&nodes.length>0&&nodes[0].x===0)mkDef();
    grid(ctx,'#060e06');
    edges.forEach(e=>{
      const a=nodes.find(n=>n.id===e.a),b=nodes.find(n=>n.id===e.b);if(!a||!b)return;
      const hi=hiPath.includes(e.a+'-'+e.b)||hiPath.includes(e.b+'-'+e.a);
      if(hi)glow(ctx,LIME,12);
      ctx.strokeStyle=hi?LIME:'#1a4a1a';ctx.lineWidth=hi?3:1.5;
      ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();noGlow(ctx);
      ctx.fillStyle=hi?LIME:'#2a5a2a';ctx.font=(hi?'bold ':'')+9*devicePixelRatio+'px Space Mono';ctx.textAlign='center';ctx.fillText(e.w,(a.x+b.x)/2,(a.y+b.y)/2-7);
    });
    nodes.forEach(n=>{
      const inH=hiPath.some(h=>h.startsWith(n.id+'-')||h.endsWith('-'+n.id));
      node(ctx,n.x,n.y,inH?20:16,inH?'#1a3a08':NODE,inH?LIME:EDGE,n.label,inH?LIME:'#6acc6a',true);
    });
    scanline(ctx,LIME,0.025);
  }
  vizCanvas.onmousedown=e=>{const r=vizCanvas.getBoundingClientRect(),x=(e.clientX-r.left)*devicePixelRatio,y=(e.clientY-r.top)*devicePixelRatio,n=nodeAt(x,y);if(n)drag=n;else{const id=String.fromCharCode(65+nodes.length%26);nodes.push({id,x,y,label:id});}draw();};
  vizCanvas.onmousemove=e=>{if(!drag)return;const r=vizCanvas.getBoundingClientRect();drag.x=(e.clientX-r.left)*devicePixelRatio;drag.y=(e.clientY-r.top)*devicePixelRatio;draw();};
  vizCanvas.onmouseup=e=>{if(drag){const r=vizCanvas.getBoundingClientRect(),x=(e.clientX-r.left)*devicePixelRatio,y=(e.clientY-r.top)*devicePixelRatio,n=nodeAt(x,y);if(n&&n!==drag&&!edges.find(ed=>(ed.a===drag.id&&ed.b===n.id)||(ed.a===n.id&&ed.b===drag.id)))edges.push({a:drag.id,b:n.id,w:Math.max(1,Math.round(Math.hypot(drag.x-n.x,drag.y-n.y)/18))});drag=null;draw();}};
  function run(){hiPath=[];if(nodes.length<2){draw();return;}const vis=new Set([nodes[0].id]);let cur=nodes[0].id;const path=[];for(let i=0;i<nodes.length-1;i++){const nb=edges.filter(e=>e.a===cur||e.b===cur).map(e=>e.a===cur?e.b:e.a).filter(x=>!vis.has(x));if(!nb.length)break;const next=nb[Math.floor(Math.random()*nb.length)];path.push(cur+'-'+next);vis.add(next);cur=next;}let i=0;function tick(){hiPath=path.slice(0,i+1);draw();if(i<path.length){i++;animTimer=setTimeout(tick,ms());}}tick();}
  draw();return{draw,run,resize};
}

// ═══════════════════════════════════════════════════════════════════════════════
//  06 — BFS/DFS  (grid with vivid wave colors)
// ═══════════════════════════════════════════════════════════════════════════════
function vBfsDfs(ctx){
  vizLabelEl.textContent='▶ tap: wall · RESET: BFS↔DFS · RUN: find path';
  const ROWS=16,COLS=24;let grid2=Array.from({length:ROWS},()=>Array(COLS).fill(0));
  let sR=1,sC=1,eR=ROWS-2,eC=COLS-2,mode='BFS';
  btnReset._c=true;btnReset.textContent='→ DFS';btnReset.onclick=()=>{mode=mode==='BFS'?'DFS':'BFS';btnReset.textContent='→ '+(mode==='BFS'?'DFS':'BFS');draw();};
  function cs(){return Math.min(W()/COLS,H()/ROWS);}
  function ox(){return(W()-COLS*cs())/2;}function oy(){return(H()-ROWS*cs())/2;}

  function draw(open=new Set(),closed=new Set(),pathS=new Set(),cur=null){
    const w=W(),h=H(),s=cs(),OX=ox(),OY=oy();
    ctx.fillStyle='#000';ctx.fillRect(0,0,w,h);
    const isBFS=mode==='BFS';
    for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
      const k=r+','+c,isSt=r===sR&&c===sC,isEn=r===eR&&c===eC;
      let fill='#060e06';
      if(grid2[r][c])fill='#4a2a08';
      if(open.has(k))fill=isBFS?'#0a2a6a':'#4a0a6a';
      if(closed.has(k))fill=isBFS?'#0a4a20':'#20086a';
      if(pathS.has(k))fill='#3a5208';
      if(k===cur)fill=isBFS?'#22cc44':'#aa22ff';
      if(isSt)fill='#085858';if(isEn)fill='#680808';
      ctx.fillStyle=fill;ctx.fillRect(OX+c*s+1,OY+r*s+1,s-2,s-2);
      if(pathS.has(k)){glow(ctx,LIME,8);ctx.strokeStyle=LIME;ctx.lineWidth=1.5;ctx.strokeRect(OX+c*s+1.5,OY+r*s+1.5,s-3,s-3);noGlow(ctx);}
      if(isSt||isEn){
        glow(ctx,isSt?CYAN:RED,12);
        ctx.fillStyle=isSt?CYAN:RED;ctx.font='bold '+s*0.6+'px Space Mono';ctx.textAlign='center';ctx.fillText(isSt?'S':'E',OX+c*s+s/2,OY+r*s+s*0.72);
        noGlow(ctx);
      }
    }
    ctx.fillStyle='#2a5a3a';ctx.font=9*devicePixelRatio+'px Space Mono';ctx.textAlign='left';ctx.fillText(mode,OX,OY-6);
    scanline(ctx,isBFS?CYAN:PURP,0.025);
  }

  vizCanvas.onmousedown=e=>{const r=vizCanvas.getBoundingClientRect(),s=cs(),OX=ox(),OY=oy();const co=Math.floor(((e.clientX-r.left)*devicePixelRatio-OX)/s),ro=Math.floor(((e.clientY-r.top)*devicePixelRatio-OY)/s);if(ro<0||ro>=ROWS||co<0||co>=COLS)return;if(e.shiftKey){sR=ro;sC=co;}else if(e.altKey){eR=ro;eC=co;}else grid2[ro][co]=grid2[ro][co]?0:1;draw();};

  function*bfsG(){const q=[[sR,sC]],vis=new Set([sR+','+sC]),par=new Map([[sR+','+sC,null]]);while(q.length){const[r,c]=q.shift(),k=r+','+c;if(r===eR&&c===eC){let c2=k;const p=[];while(c2){p.push(c2);c2=par.get(c2);}return p;}yield{vis,cur:k};for(const[dr,dc]of[[-1,0],[1,0],[0,-1],[0,1]]){const nr=r+dr,nc=c+dc,nk=nr+','+nc;if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS&&!grid2[nr][nc]&&!vis.has(nk)){vis.add(nk);par.set(nk,k);q.push([nr,nc]);}}}return null;}
  function*dfsG(){const stk=[[sR,sC]],vis=new Set(),par=new Map([[sR+','+sC,null]]);while(stk.length){const[r,c]=stk.pop(),k=r+','+c;if(vis.has(k))continue;vis.add(k);if(r===eR&&c===eC){let c2=k;const p=[];while(c2){p.push(c2);c2=par.get(c2);}return p;}yield{vis,cur:k};for(const[dr,dc]of[[-1,0],[1,0],[0,-1],[0,1]]){const nr=r+dr,nc=c+dc,nk=nr+','+nc;if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS&&!grid2[nr][nc]&&!vis.has(nk)){par.set(nk,k);stk.push([nr,nc]);}}}return null;}

  function run(){const gen=mode==='BFS'?bfsG():dfsG();let n=0;function tick(){const r=gen.next();if(r.done){const p=r.value;if(p){vizStatusEl.textContent='path: '+p.length+' steps, '+n+' explored';draw(new Set(),new Set(),new Set(p));}else{vizStatusEl.textContent='no path';draw();}return;}n++;vizStatusEl.textContent=mode+': '+n+' explored';draw(r.value.vis,new Set(),new Set(),r.value.cur);animTimer=setTimeout(tick,Math.max(4,ms()*0.28));}tick();}
  draw();return{draw,run};
}

// ═══════════════════════════════════════════════════════════════════════════════
//  07 — DIJKSTRA  (glowing graph, distance labels inside nodes)
// ═══════════════════════════════════════════════════════════════════════════════
function vDijkstra(ctx){
  vizLabelEl.textContent='▶ Dijkstra — cheapest unvisited node expands first';
  const ns=[],es=[];let dist=new Map(),vis=new Set(),inQ=new Set(),cur=-1,fp=[];let _w=0,_h=0;
  function build(){ns.length=0;es.length=0;const w=W(),h=H(),cols=6,rows=4;for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){ns.push({id:r*cols+c,x:62+c*(w-104)/(cols-1)+(Math.random()-.5)*18,y:52+r*(h-80)/(rows-1)+(Math.random()-.5)*18});}for(let i=0;i<ns.length;i++){const r=Math.floor(i/cols),c=i%cols;[[0,1],[1,0],[1,1],[-1,1]].forEach(([dr,dc])=>{const nr=r+dr,nc=c+dc,ni=nr*cols+nc;if(nr>=0&&nr<rows&&nc>=0&&nc<cols&&!es.find(e=>(e.a===i&&e.b===ni)||(e.a===ni&&e.b===i)))es.push({a:i,b:ni,w:Math.round(Math.hypot(ns[i].x-ns[ni].x,ns[i].y-ns[ni].y)/18)+Math.floor(Math.random()*4)+1});});} dist=new Map();vis=new Set();inQ=new Set();cur=-1;fp=[];_w=W();_h=H();}
  build();
  function resize(){const nw=W(),nh=H();if(_w&&_h)ns.forEach(n=>{n.x=n.x*nw/_w;n.y=n.y*nh/_h;});_w=nw;_h=nh;draw();}

  function draw(){
    const w=W(),h=H();ctx.fillStyle='#000';ctx.fillRect(0,0,w,h);
    if(w>0&&h>0&&ns.length>0&&ns[0].x<2)build();
    grid(ctx,'#060e06');
    const R=14;
    es.forEach(e=>{const a=ns[e.a],b=ns[e.b];if(!a||!b)return;const hi=fp.includes(e.a+'-'+e.b)||fp.includes(e.b+'-'+e.a);if(hi)glow(ctx,LIME,10);ctx.strokeStyle=hi?LIME:'#1a3a1a';ctx.lineWidth=hi?3:1;ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();noGlow(ctx);if(hi){ctx.fillStyle=LIME;ctx.font='bold '+9*devicePixelRatio+'px Space Mono';ctx.textAlign='center';ctx.fillText(e.w,(a.x+b.x)/2,(a.y+b.y)/2-5);}});
    ns.forEach((n,i)=>{const d=dist.get(i)??Infinity,isSt=i===0,isEn=i===ns.length-1,isV=vis.has(i),isQ=inQ.has(i),isC=i===cur;const col=isSt?CYAN:isEn?RED:isC?LIME:isV?'#4aaa4a':isQ?'#4a7aaa':EDGE;const fill=isSt?'#0a5050':isEn?'#600000':isC?'#204a10':isV?'#1a4a1a':isQ?'#1a2840':NODE;node(ctx,n.x,n.y,isC?R+3:R,fill,col,d===Infinity?'∞':d,isC?LIME:isV?'#88cc88':'#446644',isC);});
    ctx.font='bold '+11*devicePixelRatio+'px Space Mono';ctx.textAlign='center';
    glow(ctx,CYAN,8);ctx.fillStyle=CYAN;ctx.fillText('S',ns[0].x,ns[0].y-20);noGlow(ctx);
    glow(ctx,RED,8);ctx.fillStyle=RED;ctx.fillText('E',ns[ns.length-1].x,ns[ns.length-1].y-20);noGlow(ctx);
    scanline(ctx,LIME,0.025);
  }

  function run(){dist=new Map([[0,0]]);vis=new Set();inQ=new Set([0]);cur=-1;fp=[];ns.forEach((_,i)=>{if(i!==0)dist.set(i,Infinity);});const pq=[[0,0]],prev=new Map();function step(){if(!pq.length){vizStatusEl.textContent='done';draw();return;}pq.sort((a,b)=>a[0]-b[0]);const[d,u]=pq.shift();if(vis.has(u)){step();return;}vis.add(u);inQ.delete(u);cur=u;vizStatusEl.textContent='node '+u+' dist='+d;if(u===ns.length-1){let c2=u;while(prev.has(c2)){const p=prev.get(c2);fp.push(p+'-'+c2);c2=p;}vizStatusEl.textContent='✓ shortest path cost='+d;cur=-1;draw();return;}es.filter(e=>e.a===u||e.b===u).forEach(e=>{const v=e.a===u?e.b:e.a,alt=(dist.get(u)??Infinity)+e.w;if(alt<(dist.get(v)??Infinity)){dist.set(v,alt);prev.set(v,u);inQ.add(v);pq.push([alt,v]);}});draw();animTimer=setTimeout(step,ms());}step();}
  draw();return{draw,run,resize};
}

// ═══════════════════════════════════════════════════════════════════════════════
//  08 — A*  (bright vivid grid, centered)
// ═══════════════════════════════════════════════════════════════════════════════
function vAstar(ctx){
  vizLabelEl.textContent='▶ tap: wall · RESET: A*↔Dijkstra · RUN: search';
  const ROWS=16,COLS=24;let grid3=Array.from({length:ROWS},()=>Array(COLS).fill(0));
  let sR=1,sC=1,eR=ROWS-2,eC=COLS-2,useA=true;
  for(let r=3;r<ROWS-3;r++)grid3[r][Math.floor(COLS/2)]=1;grid3[Math.floor(ROWS/2)][Math.floor(COLS/2)]=0;
  btnReset._c=true;btnReset.textContent='→ DIJKSTRA';btnReset.onclick=()=>{useA=!useA;btnReset.textContent='→ '+(useA?'DIJKSTRA':'A*');draw();};
  function mh(r1,c1,r2,c2){return Math.abs(r1-r2)+Math.abs(c1-c2);}
  function cs(){return Math.min(W()/COLS,H()/ROWS);}
  function ox(){return(W()-COLS*cs())/2;}function oy(){return(H()-ROWS*cs())/2;}

  function draw(open=new Set(),closed=new Set(),pathS=new Set(),cur=null){
    const w=W(),h=H(),s=cs(),OX=ox(),OY=oy();
    ctx.fillStyle='#000';ctx.fillRect(0,0,w,h);
    for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
      const k=r+','+c,isSt=r===sR&&c===sC,isEn=r===eR&&c===eC;
      let fill='#060e06';
      if(grid3[r][c])fill='#4a2a08';
      if(open.has(k))  fill=useA?'#0a2a6a':'#0a4a20';
      if(closed.has(k))fill=useA?'#0a4a20':'#300870';
      if(pathS.has(k)) fill='#3a5208';
      if(k===cur)      fill=useA?'#22ee66':'#aaff44';
      if(isSt)fill='#085858';if(isEn)fill='#680808';
      ctx.fillStyle=fill;ctx.fillRect(OX+c*s+1,OY+r*s+1,s-2,s-2);
      if(pathS.has(k)){glow(ctx,LIME,8);ctx.strokeStyle=LIME;ctx.lineWidth=1.5;ctx.strokeRect(OX+c*s+1.5,OY+r*s+1.5,s-3,s-3);noGlow(ctx);}
      if(isSt||isEn){glow(ctx,isSt?CYAN:RED,12);ctx.fillStyle=isSt?CYAN:RED;ctx.font='bold '+s*0.6+'px Space Mono';ctx.textAlign='center';ctx.fillText(isSt?'S':'E',OX+c*s+s/2,OY+r*s+s*0.72);noGlow(ctx);}
    }
    ctx.fillStyle='#2a5a3a';ctx.font=9*devicePixelRatio+'px Space Mono';ctx.textAlign='left';ctx.fillText(useA?'A*':'DIJKSTRA',OX,OY-6);
    scanline(ctx,LIME,0.025);
  }

  vizCanvas.onmousedown=e=>{const r=vizCanvas.getBoundingClientRect(),s=cs(),OX=ox(),OY=oy();const co=Math.floor(((e.clientX-r.left)*devicePixelRatio-OX)/s),ro=Math.floor(((e.clientY-r.top)*devicePixelRatio-OY)/s);if(ro<0||ro>=ROWS||co<0||co>=COLS)return;if(e.shiftKey){sR=ro;sC=co;}else if(e.altKey){eR=ro;eC=co;}else grid3[ro][co]=grid3[ro][co]?0:1;draw();};

  function*sG(){const g=new Map([[sR+','+sC,0]]),open=new Map([[sR+','+sC,useA?mh(sR,sC,eR,eC):0]]),closed=new Set(),par=new Map();let ex=0;while(open.size){let c2=null,best=Infinity;for(const[k,fv]of open)if(fv<best){best=fv;c2=k;}if(!c2)break;open.delete(c2);closed.add(c2);ex++;if(c2===eR+','+eC){const p=[];let c3=c2;while(par.has(c3)){p.push(c3);c3=par.get(c3);}p.push(c3);return{path:p,ex};}const[r,c]=c2.split(',').map(Number);yield{open:new Set(open.keys()),closed,cur:c2,ex};for(const[dr,dc]of[[-1,0],[1,0],[0,-1],[0,1]]){const nr=r+dr,nc=c+dc,nk=nr+','+nc;if(nr<0||nr>=ROWS||nc<0||nc>=COLS||grid3[nr][nc]||closed.has(nk))continue;const ng=(g.get(c2)??Infinity)+1;if(ng<(g.get(nk)??Infinity)){g.set(nk,ng);open.set(nk,ng+(useA?mh(nr,nc,eR,eC):0));par.set(nk,c2);}}}return{path:null,ex};}

  function run(){const gen=sG();function tick(){const r=gen.next();if(r.done){const{path,ex}=r.value;if(path){vizStatusEl.textContent=(useA?'A*':'Dijkstra')+': '+path.length+' steps, '+ex+' explored';draw(new Set(),new Set(),new Set(path));}else{vizStatusEl.textContent='no path';draw();}return;}draw(r.value.open,r.value.closed,new Set(),r.value.cur);vizStatusEl.textContent=(useA?'A*':'Dijkstra')+' — '+r.value.ex+' explored';animTimer=setTimeout(tick,Math.max(4,ms()*0.26));}tick();}
  draw();return{draw,run};
}

// ═══════════════════════════════════════════════════════════════════════════════
//  09 — DP  (glowing table, heat-map coloring)
// ═══════════════════════════════════════════════════════════════════════════════
function vDP(ctx){
  vizLabelEl.textContent='▶ knapsack DP table — RUN fills cell by cell';
  const ITEMS=[{name:'gem',w:2,v:6},{name:'sword',w:3,v:8},{name:'potion',w:1,v:3},{name:'armour',w:4,v:9},{name:'scroll',w:2,v:5}],CAP=8;
  let dp=null,curI=-1,curC=-1;

  function draw(){
    const w=W(),h=H();ctx.fillStyle='#000';ctx.fillRect(0,0,w,h);grid(ctx,'#060e06');if(!dp)return;
    const rows=ITEMS.length+1,cols=CAP+1,lW=60,hH=28,pad=8;
    const cw=(w-lW-pad*2)/cols,ch=(h-hH-pad*2)/rows,ox=lW+pad,oy=hH+pad;
    for(let c=0;c<=CAP;c++){ctx.fillStyle='#2a5a2a';ctx.font='bold '+9*devicePixelRatio+'px Space Mono';ctx.textAlign='center';ctx.fillText(c,ox+c*cw+cw/2,oy-8);}
    ctx.fillStyle=DIM;ctx.font=8*devicePixelRatio+'px Space Mono';ctx.textAlign='right';ctx.fillText('cap →',ox-4,oy-8);
    dp.forEach((row,i)=>{
      ctx.fillStyle=i===0?'#2a5a2a':'#3a7a4a';ctx.font=9*devicePixelRatio+'px Space Mono';ctx.textAlign='right';ctx.fillText(i===0?'∅':ITEMS[i-1].name,ox-5,oy+i*ch+ch/2+3);
      row.forEach((v,c)=>{
        const x=ox+c*cw,y=oy+i*ch;
        const isCur=i===curI&&c===curC,imp=i>0&&c>=ITEMS[i-1].w&&dp[i-1][c-ITEMS[i-1].w]+ITEMS[i-1].v>dp[i-1][c];
        // Heat: value intensity
        const intensity=v/9;
        ctx.fillStyle=isCur?'#2a4012':imp&&i<=curI?`rgba(8,60,8,${0.4+intensity*0.4})`:'#070e07';
        ctx.fillRect(x+1,y+1,cw-2,ch-2);
        if(isCur)glow(ctx,LIME,12);
        ctx.strokeStyle=isCur?LIME:imp&&i<=curI?rgba(CYAN,0.6):'#0f1f0f';ctx.lineWidth=isCur?2:imp&&i<=curI?1:0.4;
        ctx.strokeRect(x+1,y+1,cw-2,ch-2);noGlow(ctx);
        if(v>0||i===0){ctx.fillStyle=isCur?LIME:imp&&i<=curI?CYAN:`rgba(90,160,90,${0.3+intensity*0.6})`;ctx.font=(v>0?'bold ':'')+Math.min(12,ch*0.56)*devicePixelRatio+'px Space Mono';ctx.textAlign='center';ctx.fillText(v,x+cw/2,y+ch/2+4);}
      });
    });
    if(curI>=ITEMS.length){let ri=ITEMS.length,rc=CAP;const sel=[];while(ri>0){if(dp[ri][rc]!==dp[ri-1][rc]){sel.push(ITEMS[ri-1].name);rc-=ITEMS[ri-1].w;}ri--;}glow(ctx,LIME,10);ctx.fillStyle=LIME;ctx.font='bold '+10*devicePixelRatio+'px Syne';ctx.textAlign='center';ctx.fillText('✓ '+sel.join(' + ')+' = '+dp[ITEMS.length][CAP],w/2,h-8);noGlow(ctx);}
    scanline(ctx,LIME,0.025);
  }

  function run(){dp=Array.from({length:ITEMS.length+1},()=>new Array(CAP+1).fill(0));let i=1;function sR(){if(i>ITEMS.length){curI=ITEMS.length;vizStatusEl.textContent='optimal: '+dp[ITEMS.length][CAP];draw();return;}const{w:iw,v:iv}=ITEMS[i-1];let c=0;function sC(){if(c>CAP){i++;animTimer=setTimeout(sR,ms());return;}dp[i][c]=dp[i-1][c];if(c>=iw)dp[i][c]=Math.max(dp[i][c],dp[i-1][c-iw]+iv);curI=i;curC=c;vizStatusEl.textContent=ITEMS[i-1].name+' @ cap='+c+' → '+dp[i][c];draw();c++;animTimer=setTimeout(sC,Math.max(12,ms()*0.38));}sC();}sR();}
  dp=Array.from({length:ITEMS.length+1},()=>new Array(CAP+1).fill(0));draw();return{draw,run};
}

// ═══════════════════════════════════════════════════════════════════════════════
//  10 — HUFFMAN  (tree grows from bottom, vivid nodes)
// ═══════════════════════════════════════════════════════════════════════════════
function vGreedy(ctx){
  vizLabelEl.textContent='▶ Huffman — RUN to watch the tree grow';
  const chars=[{c:'E',f:21},{c:'T',f:15},{c:'A',f:13},{c:'O',f:11},{c:'N',f:9},{c:'S',f:7},{c:'R',f:5},{c:'H',f:4}];
  let roots=[],lastNew=null,step2=0;
  function init(){roots=chars.map(ch=>({label:ch.c,freq:ch.f,left:null,right:null,isLeaf:true,x:0,y:0}));lastNew=null;step2=0;}

  function place(nd,cx,ty,hw){if(!nd)return;nd.x=cx;nd.y=ty;if(nd.left&&nd.right){place(nd.left,cx-hw/2,ty+64,hw/2);place(nd.right,cx+hw/2,ty+64,hw/2);}}

  function layout(){
    const w=W(),h=H();
    if(roots.length===1){function depth(nd){return(!nd||nd.isLeaf)?0:1+Math.max(depth(nd.left),depth(nd.right));}const d=depth(roots[0]),gap=Math.min(68,Math.max(44,(h-40)/(d+1))),treeH=(d+1)*gap,topY=(h-treeH)/2;place(roots[0],w/2,topY,w*0.44);}
    else{const n=roots.length,gap=w/(n+1),baseY=h*0.76;roots.forEach((nd,i)=>{function sd(n2){return(!n2||n2.isLeaf)?0:1+Math.max(sd(n2.left),sd(n2.right));}place(nd,gap*(i+1),baseY-sd(nd)*58,gap*0.44);});}
  }

  function drawNode(nd){
    if(!nd)return;
    const isNew=nd===lastNew;
    if(nd.left){if(isNew)glow(ctx,LIME,10);ctx.strokeStyle=isNew?LIME:'#2a6a2a';ctx.lineWidth=isNew?2.5:1.5;ctx.beginPath();ctx.moveTo(nd.x,nd.y);ctx.lineTo(nd.left.x,nd.left.y);ctx.stroke();noGlow(ctx);ctx.fillStyle=rgba(CYAN,0.8);ctx.font='bold '+9*devicePixelRatio+'px Space Mono';ctx.textAlign='center';ctx.fillText('0',(nd.x+nd.left.x)/2-8,(nd.y+nd.left.y)/2);}
    if(nd.right){if(isNew)glow(ctx,LIME,10);ctx.strokeStyle=isNew?LIME:'#2a6a2a';ctx.lineWidth=isNew?2.5:1.5;ctx.beginPath();ctx.moveTo(nd.x,nd.y);ctx.lineTo(nd.right.x,nd.right.y);ctx.stroke();noGlow(ctx);ctx.fillStyle=rgba(LIME,0.8);ctx.font='bold '+9*devicePixelRatio+'px Space Mono';ctx.textAlign='center';ctx.fillText('1',(nd.x+nd.right.x)/2+8,(nd.y+nd.right.y)/2);}
    drawNode(nd.left);drawNode(nd.right);
    const R=nd.isLeaf?18:13;
    if(isNew)glow(ctx,LIME,18);
    ctx.beginPath();ctx.arc(nd.x,nd.y,R,0,Math.PI*2);
    ctx.fillStyle=isNew?'#1e4000':nd.isLeaf?'#0e2808':'#071812';ctx.fill();
    ctx.strokeStyle=isNew?LIME:nd.isLeaf?'#5aaa2a':CYAN;ctx.lineWidth=isNew?2.5:2;ctx.stroke();noGlow(ctx);
    if(nd.isLeaf){ctx.fillStyle=LIME;ctx.font='bold '+11*devicePixelRatio+'px Syne';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(nd.label,nd.x,nd.y-3);ctx.textBaseline='alphabetic';ctx.fillStyle='#5aaa2a';ctx.font=8*devicePixelRatio+'px Space Mono';ctx.fillText(nd.freq,nd.x,nd.y+11);}
    else{ctx.fillStyle=isNew?LIME:CYAN;ctx.font='bold '+11*devicePixelRatio+'px Space Mono';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(nd.freq,nd.x,nd.y);ctx.textBaseline='alphabetic';}
  }

  function draw(){ctx.fillStyle='#000';ctx.fillRect(0,0,W(),H());grid(ctx,'#060e06');layout();roots.forEach(drawNode);ctx.fillStyle=rgba(CYAN,0.7);ctx.font='bold '+9*devicePixelRatio+'px Space Mono';ctx.textAlign='left';ctx.fillText('0 = left',4,H()-4);ctx.fillStyle=rgba(LIME,0.7);ctx.textAlign='right';ctx.fillText('right = 1',W()-4,H()-4);scanline(ctx,LIME,0.025);}

  function run(){init();draw();const pq=[...roots];let nextId=chars.length;function tick(){if(pq.length<=1){lastNew=null;vizStatusEl.textContent='✓ '+chars.length+' symbols encoded';draw();return;}pq.sort((a,b)=>a.freq-b.freq);const a=pq.shift(),b=pq.shift();roots=roots.filter(r=>r!==a&&r!==b);const par={label:'',freq:a.freq+b.freq,left:a,right:b,isLeaf:false,x:0,y:0};roots.push(par);pq.push(par);lastNew=par;step2++;vizStatusEl.textContent='merge '+(a.isLeaf?a.label:a.freq)+'['+a.freq+']+' +(b.isLeaf?b.label:b.freq)+'['+b.freq+']='+par.freq;draw();animTimer=setTimeout(tick,ms()*1.2);}tick();}
  init();draw();return{draw,run};
}

// ═══════════════════════════════════════════════════════════════════════════════
//  11 — BST  (in-order layout, glowing search path)
// ═══════════════════════════════════════════════════════════════════════════════
function vBST(ctx){
  vizLabelEl.textContent='▶ RUN inserts values · tap a node to search';
  let root=null,searchPath=[],searchTarget=-1,inserting=-1;
  function ins(nd,v){if(!nd)return{v,l:null,r:null,x:0,y:0,_rank:0};if(v<nd.v)nd.l=ins(nd.l,v);else if(v>nd.v)nd.r=ins(nd.r,v);return nd;}

  function layout(){
    if(!root)return;
    let rank=0;function inorder(nd){if(!nd)return;inorder(nd.l);nd._rank=rank++;inorder(nd.r);}inorder(root);
    function size(nd){if(!nd)return 0;return 1+size(nd.l)+size(nd.r);}
    const n=size(root),w=W(),pad=30;function applyX(nd){if(!nd)return;nd.x=pad+(nd._rank/(n-1||1))*(w-pad*2);applyX(nd.l);applyX(nd.r);}applyX(root);
    function maxD(nd){if(!nd)return 0;return 1+Math.max(maxD(nd.l),maxD(nd.r));}
    const d=maxD(root),h=H(),gap=Math.min(64,Math.max(34,(h-48)/Math.max(d,1))),treeH=d*gap,topY=(h-treeH)/2;
    function applyY(nd,depth){if(!nd)return;nd.y=topY+depth*gap;applyY(nd.l,depth+1);applyY(nd.r,depth+1);}applyY(root,0);
  }

  const R=16;
  function drawT(nd){
    if(!nd)return;
    [nd.l,nd.r].forEach(child=>{if(!child)return;const inP=searchPath.includes(nd.v)&&searchPath.includes(child.v)&&searchPath.indexOf(child.v)===searchPath.indexOf(nd.v)+1;if(inP)glow(ctx,LIME,10);ctx.strokeStyle=inP?LIME:'#2a6a2a';ctx.lineWidth=inP?3:1.5;ctx.beginPath();ctx.moveTo(nd.x,nd.y);ctx.lineTo(child.x,child.y);ctx.stroke();noGlow(ctx);});
    drawT(nd.l);drawT(nd.r);
    const inP=searchPath.includes(nd.v),hi=nd.v===searchTarget,isIns=nd.v===inserting;
    const col=hi?'#ffffff':inP?LIME:isIns?CYAN:'#6acc6a';
    const fill=hi?'#2a4a00':inP?'#1a3a08':isIns?'#003a20':NODE;
    const stroke=hi?'#fff':inP?LIME:isIns?CYAN:EDGE;
    node(ctx,nd.x,nd.y,hi?R+4:R,fill,stroke,nd.v,col,hi||inP);
    if(hi||isIns){noGlow(ctx);}
  }

  function draw(){
    const w=W(),h=H();ctx.fillStyle='#000';ctx.fillRect(0,0,w,h);grid(ctx,'#060e06');
    if(!root){glow(ctx,LIME,6);ctx.fillStyle='#3a7a3a';ctx.font='bold '+13*devicePixelRatio+'px Syne';ctx.textAlign='center';ctx.fillText('press RUN to build the BST',w/2,h/2-14);noGlow(ctx);ctx.fillStyle=DIM;ctx.font=10*devicePixelRatio+'px Space Mono';ctx.fillText('tap any node to trace search path',w/2,h/2+10);return;}
    layout();drawT(root);
    if(searchPath.length){const arrow=searchPath.join(' → ');glow(ctx,LIME,6);ctx.fillStyle=LIME;ctx.font='bold '+9*devicePixelRatio+'px Space Mono';ctx.textAlign='center';ctx.fillText(arrow.length<54?arrow:arrow.slice(0,51)+'…',w/2,h-8);noGlow(ctx);}
    scanline(ctx,LIME,0.025);
  }

  vizCanvas.onclick=e=>{if(!root)return;layout();const r2=vizCanvas.getBoundingClientRect(),x=(e.clientX-r2.left)*devicePixelRatio,y=(e.clientY-r2.top)*devicePixelRatio;function fnd(nd){if(!nd)return null;if(Math.hypot(nd.x-x,nd.y-y)<R+6)return nd;return fnd(nd.l)||fnd(nd.r);}const clicked=fnd(root);if(!clicked)return;searchTarget=clicked.v;searchPath=[];let c=root;while(c){searchPath.push(c.v);if(c.v===clicked.v)break;c=clicked.v<c.v?c.l:c.r;}vizStatusEl.textContent='found '+clicked.v+' in '+searchPath.length+' step'+(searchPath.length>1?'s':'');draw();};

  const vals=[15,8,20,5,12,18,25,3,7,10,14,17,22,28];let vidx=0;
  function run(){if(vidx>=vals.length){vidx=0;root=null;}searchPath=[];searchTarget=-1;inserting=-1;function tick(){if(vidx>=vals.length){inserting=-1;vizStatusEl.textContent='✓ done — tap any node to search';draw();return;}const v=vals[vidx];root=ins(root,v);inserting=v;vizStatusEl.textContent='inserted '+v;vidx++;draw();animTimer=setTimeout(tick,ms()*0.68);}tick();}
  draw();return{draw,run};
}

// ═══════════════════════════════════════════════════════════════════════════════
//  12 — MCTS  (tic-tac-toe with real X/O strokes, MCTS bars)
// ═══════════════════════════════════════════════════════════════════════════════
function vMCTS(ctx){
  vizLabelEl.textContent='▶ tap a square · you are X · AI uses MCTS';
  let board=Array(9).fill(0),tree=null,pturn=true,over=false;
  const WL=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
  function chk(b){for(const[a,c,d]of WL)if(b[a]&&b[a]===b[c]&&b[a]===b[d])return b[a];return b.every(v=>v)?3:0;}
  function rnd(b){const e=b.map((v,i)=>v?-1:i).filter(i=>i>=0);return e[Math.floor(Math.random()*e.length)]??-1;}
  function rollout(b,pl){let pb=[...b],t=pl;for(let i=0;i<9;i++){const m=rnd(pb);if(m<0)break;pb[m]=t;const r=chk(pb);if(r)return r;t=t===1?2:1;}return chk(pb);}
  class N2{constructor(b,par=null,mv=null){this.b=b;this.par=par;this.mv=mv;this.w=0;this.v=0;this.ch=[];this.u=b.map((x,i)=>x?-1:i).filter(i=>i>=0);}ucb(C=1.41){if(!this.v)return Infinity;return this.w/this.v+C*Math.sqrt(Math.log(this.par.v)/this.v);}}
  function ai(b){const root=new N2([...b]);root.v=1;for(let i=0;i<600;i++){let nd=root;while(!nd.u.length&&nd.ch.length)nd=nd.ch.reduce((a,b)=>b.ucb()>a.ucb()?b:a);if(nd.u.length){const mv=nd.u.splice(Math.floor(Math.random()*nd.u.length),1)[0];const nb=[...nd.b];nb[mv]=2;const child=new N2(nb,nd,mv);nd.ch.push(child);nd=child;}const res=rollout([...nd.b],2);let c=nd;while(c){c.v++;if(res===2)c.w+=1;else if(res!==1)c.w+=0.5;c=c.par;}}tree=root;return root.ch.reduce((a,b)=>b.v>a.v?b:a).mv;}

  function draw(){
    const w=W(),h=H();ctx.fillStyle='#000';ctx.fillRect(0,0,w,h);grid(ctx,'#060e06');
    const sz=Math.min(w*0.5,h*0.7),cs2=sz/3,ox2=Math.max(16,(w*0.46-sz)/2+8),oy2=(h-sz)/2;
    // Grid lines
    glow(ctx,EDGE,6);ctx.strokeStyle='#2a6a2a';ctx.lineWidth=2;
    for(let i=1;i<3;i++){ctx.beginPath();ctx.moveTo(ox2+i*cs2,oy2);ctx.lineTo(ox2+i*cs2,oy2+sz);ctx.stroke();ctx.beginPath();ctx.moveTo(ox2,oy2+i*cs2);ctx.lineTo(ox2+sz,oy2+i*cs2);ctx.stroke();}
    noGlow(ctx);
    // Cells
    for(let i=0;i<9;i++){
      const r=Math.floor(i/3),c=i%3,x=ox2+c*cs2,y=oy2+r*cs2;
      if(!board[i]&&!over&&pturn){ctx.fillStyle='#0a180a';ctx.fillRect(x+2,y+2,cs2-4,cs2-4);}
      if(board[i]===1){const p=cs2*0.24;glow(ctx,CYAN,16);ctx.strokeStyle=CYAN;ctx.lineWidth=cs2*0.13;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(x+p,y+p);ctx.lineTo(x+cs2-p,y+cs2-p);ctx.stroke();ctx.beginPath();ctx.moveTo(x+cs2-p,y+p);ctx.lineTo(x+p,y+cs2-p);ctx.stroke();ctx.lineCap='butt';noGlow(ctx);}
      if(board[i]===2){glow(ctx,RED,14);ctx.strokeStyle=RED;ctx.lineWidth=cs2*0.1;ctx.beginPath();ctx.arc(x+cs2/2,y+cs2/2,cs2*0.3,0,Math.PI*2);ctx.stroke();noGlow(ctx);}
    }
    const res=chk(board);
    const msg=res===1?'You win! 🎉':res===2?'AI wins!':res===3?'Draw!':pturn?'Your turn':'AI…';
    const col=res===1?CYAN:res===2?RED:res===3?AMBER:pturn?LIME:'#888';
    glow(ctx,col,res?16:0);
    ctx.fillStyle=col;ctx.font='bold '+12*devicePixelRatio+'px Syne';ctx.textAlign='center';ctx.fillText(msg,ox2+sz/2,oy2-14);noGlow(ctx);
    // MCTS bars
    if(tree&&tree.ch.length){const tw=w-ox2-sz-20,tx=ox2+sz+14;if(tw>50){const maxV=Math.max(...tree.ch.map(c=>c.v));ctx.fillStyle='#2a5a2a';ctx.font=8.5*devicePixelRatio+'px Space Mono';ctx.textAlign='left';ctx.fillText('AI searched:',tx,oy2+2);tree.ch.sort((a,b)=>b.v-a.v).slice(0,8).forEach((ch,i)=>{const bw=(ch.v/maxV)*(tw-40),y2=oy2+18+i*19;ctx.fillStyle='#0a180a';ctx.fillRect(tx,y2,tw-40,13);if(i===0)glow(ctx,LIME,6);ctx.fillStyle=i===0?LIME:'#2a5a2a';ctx.fillRect(tx,y2,bw,13);noGlow(ctx);ctx.fillStyle=i===0?LIME:'#4a8a4a';ctx.font=8*devicePixelRatio+'px Space Mono';ctx.textAlign='left';ctx.fillText('sq'+(ch.mv+1)+' '+(ch.w/ch.v*100).toFixed(0)+'%',tx+Math.max(bw+2,2),y2+10);});}}
    scanline(ctx,LIME,0.03);
  }

  vizCanvas.onclick=e=>{if(!pturn||over)return;const w2=W(),h2=H(),sz=Math.min(w2*0.5,h2*0.7),cs2=sz/3,ox2=Math.max(16,(w2*0.46-sz)/2+8),oy2=(h2-sz)/2;const r2=vizCanvas.getBoundingClientRect(),co=Math.floor(((e.clientX-r2.left)*devicePixelRatio-ox2)/cs2),ro=Math.floor(((e.clientY-r2.top)*devicePixelRatio-oy2)/cs2);if(co<0||co>2||ro<0||ro>2)return;const idx=ro*3+co;if(board[idx])return;board[idx]=1;pturn=false;const res=chk(board);if(res){over=true;vizStatusEl.textContent=res===1?'You win!':'Draw!';draw();return;}draw();animTimer=setTimeout(()=>{const mv=ai(board);if(mv>=0)board[mv]=2;pturn=true;const res2=chk(board);if(res2)over=true;vizStatusEl.textContent=res2===2?'AI wins!':res2===3?'Draw!':'Your turn';draw();},350);};
  function run(){board=Array(9).fill(0);tree=null;pturn=true;over=false;vizStatusEl.textContent='tap a square to play';draw();}
  draw();return{draw,run};
}

// ═══════════════════════════════════════════════════════════════════════════════
//  13 — NEXT STEPS  (lemur + confetti)
// ═══════════════════════════════════════════════════════════════════════════════
function vNextSteps(ctx){
  vizLabelEl.textContent='▶ press RUN to celebrate';
  let particles=[],rafId=null;
  function spawn(){particles=[];const w=W(),h=H();for(let i=0;i<90;i++)particles.push({x:Math.random()*w,y:-10-Math.random()*h*0.5,vx:(Math.random()-.5)*3.5,vy:1.8+Math.random()*3,sz:4+Math.random()*9,col:[LIME,CYAN,RED,AMBER,PURP][Math.floor(Math.random()*5)],rot:Math.random()*Math.PI*2,spin:(Math.random()-.5)*0.16,shape:Math.random()>.5?'rect':'circle'});}

  function drawLemur(cx,cy,sc){
    ctx.fillStyle='#2a2a2a';ctx.beginPath();ctx.ellipse(cx,cy+sc*.3,sc*.38,sc*.48,0,0,Math.PI*2);ctx.fill();
    for(let i=0;i<7;i++){ctx.strokeStyle=i%2?'#ddd':'#111';ctx.lineWidth=sc*.12;ctx.beginPath();ctx.arc(cx+sc*.35,cy+sc*.6-i*sc*.18,sc*.5-i*sc*.02,-Math.PI*.8,-Math.PI*.15);ctx.stroke();}
    ctx.fillStyle='#2a2a2a';ctx.beginPath();ctx.arc(cx,cy-sc*.28,sc*.3,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#e8e8e8';ctx.beginPath();ctx.ellipse(cx-sc*.09,cy-sc*.28,sc*.12,sc*.14,-.2,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(cx+sc*.09,cy-sc*.28,sc*.12,sc*.14,.2,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ff8800';ctx.beginPath();ctx.arc(cx-sc*.1,cy-sc*.3,sc*.065,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(cx+sc*.1,cy-sc*.3,sc*.065,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#111';ctx.beginPath();ctx.arc(cx-sc*.1,cy-sc*.3,sc*.032,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(cx+sc*.1,cy-sc*.3,sc*.032,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ddd';ctx.beginPath();ctx.ellipse(cx,cy-sc*.18,sc*.14,sc*.1,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#333';ctx.beginPath();ctx.arc(cx,cy-sc*.15,sc*.035,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#2a2a2a';ctx.beginPath();ctx.arc(cx-sc*.24,cy-sc*.48,sc*.1,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(cx+sc*.24,cy-sc*.48,sc*.1,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#2a2a2a';ctx.lineWidth=sc*.1;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(cx-sc*.3,cy);ctx.lineTo(cx-sc*.5,cy+sc*.2);ctx.stroke();ctx.beginPath();ctx.moveTo(cx+sc*.3,cy);ctx.lineTo(cx+sc*.5,cy+sc*.2);ctx.stroke();ctx.lineCap='butt';
  }

  function draw(){
    const w=W(),h=H(),cx=w/2,cy=h/2;
    ctx.fillStyle='#000';ctx.fillRect(0,0,w,h);grid(ctx,'#060e06');
    particles.forEach(p=>{ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);ctx.fillStyle=p.col;if(p.shape==='rect')ctx.fillRect(-p.sz/2,-p.sz/4,p.sz,p.sz/2);else{ctx.beginPath();ctx.arc(0,0,p.sz/2,0,Math.PI*2);ctx.fill();}ctx.restore();});
    const sc=Math.min(w,h)*0.22;
    drawLemur(cx,cy-sc*.1,sc);
    glow(ctx,LIME,14);ctx.fillStyle=LIME;ctx.font='bold '+15*devicePixelRatio+'px Syne';ctx.textAlign='center';ctx.fillText('you did it 🎉',cx,cy+sc*.9);noGlow(ctx);
    ctx.fillStyle='#2a5a2a';ctx.font=9*devicePixelRatio+'px Space Mono';ctx.fillText('12 algorithms. now go build something.',cx,cy+sc*1.08);
    scanline(ctx,LIME,0.03);
  }

  function animate(){particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.rot+=p.spin;if(p.y>H()+20){p.y=-10;p.x=Math.random()*W();}});draw();rafId=requestAnimationFrame(animate);}
  function run(){if(rafId)cancelAnimationFrame(rafId);spawn();animate();vizStatusEl.textContent='all 12 done — now go build something';}
  function resize(){draw();}
  draw();return{draw,run,resize};
}

// ─── HERO ─────────────────────────────────────────────────────────────────────
(function(){
  const hC=document.getElementById('hero'),hCtx=hC.getContext('2d');let hW,hH;
  function r(){hW=hC.width=hC.offsetWidth;hH=hC.height=hC.offsetHeight;}r();window.addEventListener('resize',r);
  const pts=Array.from({length:28},()=>({x:Math.random()*100,y:Math.random()*100,vx:(Math.random()-.5)*.28,vy:(Math.random()-.5)*.28}));
  function fr(){requestAnimationFrame(fr);hCtx.clearRect(0,0,hW,hH);pts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>100)p.vx*=-1;if(p.y<0||p.y>100)p.vy*=-1;});pts.forEach((a,i)=>pts.slice(i+1).forEach(b=>{const dx=(a.x-b.x)*hW/100,dy=(a.y-b.y)*hH/100,d=Math.hypot(dx,dy);if(d<hW*.21){hCtx.strokeStyle='rgba(168,255,71,'+(0.5*(1-d/(hW*.21)))+')';hCtx.lineWidth=.7;hCtx.beginPath();hCtx.moveTo(a.x*hW/100,a.y*hH/100);hCtx.lineTo(b.x*hW/100,b.y*hH/100);hCtx.stroke();}}));pts.forEach(p=>{hCtx.beginPath();hCtx.arc(p.x*hW/100,p.y*hH/100,1.8,0,Math.PI*2);hCtx.fillStyle='rgba(168,255,71,.7)';hCtx.fill();});}fr();
})();
