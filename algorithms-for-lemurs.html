code:"<span class=\"cm\">// Binary Search Tree: left &lt; root &lt; right (recursively).</span>\n<span class=\"cm\">// Balanced \u2192 O(log n) search/insert/delete.</span>\n<span class=\"kw\">class</span> BST {\n  #root = <span class=\"kw\">null</span>;\n  <span class=\"fn\">insert</span>(v, n=<span class=\"kw\">this</span>.#root) {\n    <span class=\"kw\">if</span>(!n) { <span class=\"kw\">const</span> nd={v,l:<span class=\"kw\">null</span>,r:<span class=\"kw\">null</span>}; <span class=\"kw\">if</span>(!<span class=\"kw\">this</span>.#root) <span class=\"kw\">this</span>.#root=nd; <span class=\"kw\">return</span> nd; }\n    <span class=\"kw\">if</span>(v &lt; n.v)       n.l = <span class=\"kw\">this</span>.<span class=\"fn\">insert</span>(v,n.l) || n.l;\n    <span class=\"kw\">else if</span>(v > n.v)  n.r = <span class=\"kw\">this</span>.<span class=\"fn\">insert</span>(v,n.r) || n.r;\n    <span class=\"kw\">return</span> n;\n  }\n  <span class=\"fn\">search</span>(v, n=<span class=\"kw\">this</span>.#root) {\n    <span class=\"kw\">if</span>(!n) <span class=\"kw\">return</span> <span class=\"kw\">null</span>;\n    <span class=\"kw\">if</span>(v===n.v) <span class=\"kw\">return</span> n;\n    <span class=\"kw\">return</span> v &lt; n.v ? <span class=\"kw\">this</span>.<span class=\"fn\">search</span>(v,n.l) : <span class=\"kw\">this</span>.<span class=\"fn\">search</span>(v,n.r);\n  }\n  *<span class=\"fn\">inOrder</span>(n=<span class=\"kw\">this</span>.#root) { <span class=\"cm\">// sorted output</span>\n    <span class=\"kw\">if</span>(!n) <span class=\"kw\">return</span>;\n    <span class=\"kw\">yield</span>* <span class=\"kw\">this</span>.<span class=\"fn\">inOrder</span>(n.l);\n    <span class=\"kw\">yield</span> n.v;\n    <span class=\"kw\">yield</span>* <span class=\"kw\">this</span>.<span class=\"fn\">inOrder</span>(n.r);\n  }\n}\n<span class=\"cm\">// Sorted insertion \u2192 linked list \u2192 O(n) search.</span>\n<span class=\"cm\">// Self-balancing (AVL/Red-Black) maintains O(log n).</span>\n\n<span class=\"cm\">// Trie: O(L) insert/search (L = word length)</span>\n<span class=\"kw\">class</span> Trie {\n  #r = {};\n  <span class=\"fn\">insert</span>(w) { <span class=\"kw\">let</span> n=<span class=\"kw\">this</span>.#r; <span class=\"kw\">for</span>(<span class=\"kw\">const</span> c <span class=\"kw\">of</span> w) n=(n[c]??={}); n.$=<span class=\"kw\">true</span>; }\n  <span class=\"fn\">has</span>(w)     { <span class=\"kw\">let</span> n=<span class=\"kw\">this</span>.#r; <span class=\"kw\">for</span>(<span class=\"kw\">const</span> c <span class=\"kw\">of</span> w) <span class=\"kw\">if</span>(!(n=n[c]))<span class=\"kw\">return</span> <span class=\"kw\">false</span>; <span class=\"kw\">return</span> !!n.$; }\n  <span class=\"fn\">prefix</span>(p)  { <span class=\"kw\">let</span> n=<span class=\"kw\">this</span>.#r; <span class=\"kw\">for</span>(<span class=\"kw\">const</span> c <span class=\"kw\">of</span> p) <span class=\"kw\">if</span>(!(n=n[c]))<span class=\"kw\">return</span> <span class=\"kw\">false</span>; <span class=\"kw\">return</span> <span class=\"kw\">true</span>; }\n}",
body:"<p>Your file system is a tree. The HTML of every webpage is a tree. The way your code gets parsed and compiled is a tree. Game AI decision logic: tree. JSON: tree. The React component hierarchy you've been staring at: tree. Trees are everywhere in computing and almost entirely invisible \u2014 you use them constantly through every piece of software without thinking about the structure underneath. The BST is the entry point: a sorted tree where the <em>shape</em> of the structure does the searching for you.</p>\n\n<div class=\"vocab\"><span class=\"vt\">\"Binary Search Tree (BST)\"</span> \u2014 a binary tree with one invariant: every value in the left subtree is less than the node's value; every value in the right is greater. This single rule makes search, insert, and delete all O(log n) on a balanced tree \u2014 you navigate left or right at each node, halving the remaining candidates, exactly like binary search. In-order traversal produces sorted output. The conceptual foundation of Java's TreeMap, C++'s std::map, and Python's SortedList.</div>\n\n<div class=\"vocab\"><span class=\"vt\">\"Self-Balancing Trees\"</span> \u2014 a BST built by inserting already-sorted values degrades to a linked list: every insert goes right, the tree becomes a straight line, and search is O(n). Self-balancing trees (AVL, Red-Black) prevent this through rotations on insert and delete, maintaining O(log n) height. Red-Black trees allow height up to 2 log n and require fewer rotations than AVL \u2014 which is why Java's TreeMap, C++'s std::map, and the Linux kernel's process scheduler all use Red-Black trees over AVL.</div>\n\n<div class=\"vocab\"><span class=\"vt\">\"Trie (Prefix Tree)\"</span> \u2014 a tree where edges represent characters and paths from root to node represent prefixes. Insert and search in O(L) where L = word length \u2014 independent of how many words are stored. Used for: autocomplete (search all words with this prefix), spell checking, IP routing tables (longest-prefix match), and any problem where you need to find strings by prefix. The root has 26 children (for lowercase letters), each of those has 26, etc. Pronounced \"try\" to distinguish from \"tree.\"</div>\n\n<div class=\"step-card\"><span class=\"step-num\">TREE TRAVERSAL \u2014 FOUR ORDERS, FOUR USE CASES</span>\n<strong>In-order</strong> (left \u2192 root \u2192 right): produces sorted output from a BST. If you need \"all values in order,\" in-order traversal is your O(n) answer.<br><br>\n<strong>Pre-order</strong> (root \u2192 left \u2192 right): serializes the tree \u2014 you can reconstruct the exact tree from pre-order output. Used for copying, for expression trees, for compilers serializing ASTs.<br><br>\n<strong>Post-order</strong> (left \u2192 right \u2192 root): processes children before parents. Used for deletion (delete children before the parent node), and for compilers evaluating expression trees (evaluate operands before the operator).<br><br>\n<strong>Level-order</strong> (BFS by depth): visits all nodes at depth 1 before depth 2. Used for \"find the shortest path to a leaf,\" for pretty-printing trees, for building complete binary heaps from sorted input.\n</div>\n\n<div class=\"step-card\"><span class=\"step-num\">WHEN TO USE BST VS HASH MAP</span>\nUse a <strong>Hash Map</strong> when: you need O(1) average lookup/insert/delete and don't need ordered access. JavaScript's <code>Map</code>. Most use cases.<br><br>\nUse a <strong>BST (TreeMap/TreeSet)</strong> when: you need sorted iteration + fast insert/delete/search. \"Find all items in range [a, b].\" \"Find the next larger element.\" \"Keep a sorted set and query it efficiently.\" Java's <code>TreeMap</code> and <code>TreeSet</code>. C++'s <code>std::map</code> and <code>std::set</code>.<br><br>\nThe sorted vs unsorted requirement is the primary decision factor. Hash maps are faster on average but give you nothing ordered. BSTs are O(log n) but give you range queries, predecessor/successor queries, and sorted iteration \"for free.\"\n</div>\n\n<div class=\"artists\">The DOM (Document Object Model) of every webpage is a tree \u2014 your browser does DFS to match CSS selectors against it, and events bubble up the tree from target to root (that's why it's called event bubbling \u2014 it's literally parent traversal). React's reconciliation algorithm (\"the virtual DOM diff\") is a tree comparison. Unreal Engine's behavior trees and Godot's scene tree are exactly what they say. Every file system folder structure: tree. Every XML or JSON document: tree. The syntax tree your code compiles to before it becomes machine instructions: tree. You work with trees every day; now you can build them.</div>\n\n<div class=\"spamton\">B-trees \u2014 the structure inside every relational database's index \u2014 are trees with hundreds of children per node instead of two, specifically designed so that a single node fits in one disk block. A B-tree search for one row in a table with a billion rows takes about 3\u20134 disk seeks (tree height), regardless of table size. Without this tree structure, a linear scan of a billion-row table would take minutes. <strong>Every SQL query you've ever run found its data through a B-tree.</strong></div>\n\n<div class=\"challenge\">Add search animation to the BST in the viz: click any node and watch the search path highlight from root to that node in sequence, showing the left/right decision at each step. Then try to insert a value and let it find its own position. This is how the O(log n) claim becomes visceral \u2014 you watch it ignore half the tree at every comparison.</div>\n\n<p class=\"tip\">Need sorted order AND fast insert/delete/search? That's a BST. Need O(1) average lookup and don't care about order? That's a hash map. Need both? Use a hash map for lookups and a separate sorted array for ordered iteration \u2014 rebuild the array when the set changes, or maintain both structures simultaneously. The sorted-vs-unsorted requirement is the primary decision factor between these two structures.</p>"
},

code:"<span class=\"cm\">// MCTS: UCB1 selection + random rollout.</span>\n<span class=\"cm\">// f = wins/visits + C*sqrt(ln(parent.visits)/visits)</span>\n<span class=\"cm\">// First term: exploit what works.</span>\n<span class=\"cm\">// Second term: explore the undervisited.</span>\n\n<span class=\"kw\">class</span> Node {\n  constructor(state, parent=<span class=\"kw\">null</span>, move=<span class=\"kw\">null</span>) {\n    <span class=\"kw\">this</span>.state=state; <span class=\"kw\">this</span>.parent=parent; <span class=\"kw\">this</span>.move=move;\n    <span class=\"kw\">this</span>.wins=<span class=\"nm\">0</span>; <span class=\"kw\">this</span>.visits=<span class=\"nm\">0</span>; <span class=\"kw\">this</span>.children=[];\n    <span class=\"kw\">this</span>.untried=<span class=\"fn\">legalMoves</span>(state);\n  }\n  <span class=\"fn\">ucb1</span>(C=Math.SQRT2) {\n    <span class=\"kw\">if</span>(!<span class=\"kw\">this</span>.visits) <span class=\"kw\">return</span> Infinity;\n    <span class=\"kw\">return</span> <span class=\"kw\">this</span>.wins/<span class=\"kw\">this</span>.visits\n      + C*Math.<span class=\"fn\">sqrt</span>(Math.<span class=\"fn\">log</span>(<span class=\"kw\">this</span>.parent.visits)/<span class=\"kw\">this</span>.visits);\n  }\n}\n\n<span class=\"kw\">function</span> <span class=\"fn\">mcts</span>(state, iters=<span class=\"nm\">500</span>) {\n  <span class=\"kw\">const</span> root=<span class=\"kw\">new</span> <span class=\"fn\">Node</span>(state); root.visits=<span class=\"nm\">1</span>;\n\n  <span class=\"kw\">for</span>(<span class=\"kw\">let</span> i=<span class=\"nm\">0</span>; i&lt;iters; i++) {\n    <span class=\"cm\">// 1. SELECT: max UCB1 to leaf</span>\n    <span class=\"kw\">let</span> nd=root;\n    <span class=\"kw\">while</span>(!nd.untried.length && nd.children.length)\n      nd=nd.children.<span class=\"fn\">reduce</span>((a,b)=>b.<span class=\"fn\">ucb1</span>()>a.<span class=\"fn\">ucb1</span>()?b:a);\n\n    <span class=\"cm\">// 2. EXPAND: one new child</span>\n    <span class=\"kw\">if</span>(nd.untried.length) {\n      <span class=\"kw\">const</span> mv=nd.untried.<span class=\"fn\">pop</span>();\n      nd=nd.children[nd.children.<span class=\"fn\">push</span>(\n        <span class=\"kw\">new</span> <span class=\"fn\">Node</span>(<span class=\"fn\">apply</span>(nd.state,mv),nd,mv))-<span class=\"nm\">1</span>];\n    }\n\n    <span class=\"cm\">// 3. SIMULATE: random rollout to terminal</span>\n    <span class=\"kw\">let</span> res=<span class=\"fn\">rollout</span>(nd.state);\n\n    <span class=\"cm\">// 4. BACKPROPAGATE: update ancestors</span>\n    <span class=\"kw\">while</span>(nd){nd.visits++;nd.wins+=res;nd=nd.parent;}\n  }\n\n  <span class=\"kw\">return</span> root.children.<span class=\"fn\">reduce</span>((a,b)=>b.visits>a.visits?b:a).move;\n}",
body:"<p>For thirty years, computers were terrible at Go. Chess they could brute-force \u2014 not Go. Too many moves, boards too complex to evaluate statically. Monte Carlo Tree Search cracked it by abandoning board evaluation entirely. Instead: simulate thousands of random games from each candidate move and trust the statistics. It sounds foolish. It beat the world champion. Now it's inside every game AI that needs to make decisions in a space too large to analyze completely \u2014 from board games to robotics to drug discovery.</p>\n\n<div class=\"vocab\"><span class=\"vt\">\"Game Tree\"</span> \u2014 a tree where nodes are game states and edges are legal moves. Root = current position, leaves = terminal states (win/loss/draw). Branching factor = average legal moves per position. Chess: ~35, so depth-10 search = 35\u00b9\u2070 \u2248 2.8 \u00d7 10\u00b9\u2075 states. Full enumeration is impossible for anything serious. MCTS avoids enumerating the full tree by sampling it statistically \u2014 visiting the most promising branches many times and ignoring the rest.</div>\n\n<div class=\"vocab\"><span class=\"vt\">\"UCB1 (Upper Confidence Bound)\"</span> \u2014 the formula that drives MCTS selection: <code>wins/visits + C \u00d7 \u221a(ln(parent_visits)/visits)</code>. First term: exploit \u2014 favor moves with high win rates. Second term: explore \u2014 favor moves tried rarely. C = \u221a2 is theoretically optimal. The balance between these two terms is the entire intelligence of MCTS: it automatically spends more time on promising moves while ensuring every option gets tried enough to rule it out.</div>\n\n<div class=\"vocab\"><span class=\"vt\">\"Multi-Armed Bandit\"</span> \u2014 the abstract problem underlying UCB1: k slot machines with unknown payout rates, maximize total reward over N pulls. Focus on one machine and you miss better ones. Try every machine equally and you waste pulls on bad ones. UCB1 solves this optimally in theory \u2014 upper confidence bounds ensure you systematically explore uncertain options while exploiting known-good ones. MCTS applies this principle recursively at every node in the game tree.</div>\n\n<div class=\"step-card\"><span class=\"step-num\">THE FOUR PHASES \u2014 EACH ITERATION</span>\n<strong>Selection:</strong> starting from the root, follow the child with highest UCB1 score at each node, until you reach a node with unexplored moves or a terminal state.<br><br>\n<strong>Expansion:</strong> add one new child node for one unexplored move from the selected node.<br><br>\n<strong>Simulation (rollout):</strong> from the new node, play random moves to game end. Record win/loss/draw.<br><br>\n<strong>Backpropagation:</strong> walk back up to root, updating visit count and win count at every node on the path.<br><br>\nAfter thousands of iterations, the most-visited child of root is the best move. Not highest win rate \u2014 most visits. High win rate with few samples is less trustworthy than moderate win rate with many.\n</div>\n\n<div class=\"step-card\"><span class=\"step-num\">UCB1 IN CODE \u2014 EXACTLY AS IMPLEMENTED</span>\n<code>ucb1(parentVisits, C = 1.41) {<br>\n&nbsp;&nbsp;if (this.visits === 0) return Infinity; // always explore unvisited<br>\n&nbsp;&nbsp;const exploit = this.wins / this.visits;<br>\n&nbsp;&nbsp;const explore = C * Math.sqrt(Math.log(parentVisits) / this.visits);<br>\n&nbsp;&nbsp;return exploit + explore;<br>\n}</code><br><br>\nThe C constant controls the exploration-exploitation tradeoff. Lower C (0.5\u20131.0): trust what you know, exploit aggressively. Higher C (1.5\u20132.5): keep exploring uncertain options longer. C = \u221a2 \u2248 1.41 is the theoretical optimum for the classic bandit problem \u2014 but game-specific tuning often beats it.\n</div>\n\n<div class=\"artists\">AlphaGo's early versions were pure MCTS \u2014 thousands of random game simulations, UCB1 selection, win rate statistics. AlphaZero replaced the random rollouts with a neural network that evaluated board positions directly, removing the \"random\" from Monte Carlo. The MCTS skeleton stayed identical; the simulation step got smarter. Every procedural game that generates intelligent opponent behavior \u2014 Civilization's unit AI, the director AI in Left 4 Dead, behavior trees in The Last of Us \u2014 has MCTS or a close relative driving the decision-making. The viz in this lesson plays the same game as the AI that beat the world's best Go player. Same algorithm, 600 simulations instead of millions.</div>\n\n<div class=\"spamton\">In 2016, AlphaGo beat Lee Sedol 4-1 in Go. Lee was one of the highest-ranked players alive. Move 37 in game 2 \u2014 a move AlphaGo played that no human would have considered \u2014 was initially derided by commentators as a mistake. It was the decisive move. An algorithm built on random game simulations played a move that permanently changed Go theory and that human experts had never conceived of in a game played for 2,500 years. <strong>MCTS found a move that was invisible to human intuition.</strong></div>\n\n<div class=\"challenge\">The viz lets you play against MCTS tic-tac-toe. Play three games straight. Then open the console and log the visit counts of the AI's top moves before it plays. You'll see the exploration-exploitation dynamic in the numbers: early in the game, the visits are more spread out (exploring). Later, when the position is clearer, they concentrate on the best line (exploiting). That shift in distribution is UCB1 working in real time.</div>\n\n<p class=\"tip\">MCTS generalizes beyond games: drug discovery (exploring molecule space), neural architecture search (exploring network designs), robotic motion planning (exploring trajectory spaces), and compiler optimization (exploring instruction orderings). Any decision problem where the search space is too large to enumerate and you can simulate outcomes can be attacked with MCTS. The \"game\" just becomes whatever process you're optimizing.</p>"
},
{"subtitle": "13 \u2014 What Now?", "title": "You Built the Map. Now Use It.", "viz": "nextSteps", "code": "<span class=\"cm\">// Full-stack algorithm cheat sheet:</span>\n\n<span class=\"cm\">// Sort a list of objects by property</span>\narr.<span class=\"fn\">sort</span>((a,b) => a.score - b.score);   <span class=\"cm\">// O(n log n)</span>\n\n<span class=\"cm\">// Remove duplicates instantly</span>\n<span class=\"kw\">const</span> unique = [...<span class=\"kw\">new</span> <span class=\"fn\">Set</span>(arr)];          <span class=\"cm\">// O(n)</span>\n\n<span class=\"cm\">// Count occurrences</span>\n<span class=\"kw\">const</span> freq = <span class=\"kw\">new</span> <span class=\"fn\">Map</span>();\narr.<span class=\"fn\">forEach</span>(x => freq.<span class=\"fn\">set</span>(x, (freq.<span class=\"fn\">get</span>(x) || <span class=\"nm\">0</span>) + <span class=\"nm\">1</span>));\n\n<span class=\"cm\">// BFS from a node</span>\n<span class=\"kw\">const</span> visited = <span class=\"kw\">new</span> <span class=\"fn\">Set</span>([start]);\n<span class=\"kw\">const</span> queue = [start];\n<span class=\"kw\">while</span> (queue.length) {\n  <span class=\"kw\">const</span> node = queue.<span class=\"fn\">shift</span>();\n  <span class=\"kw\">for</span> (<span class=\"kw\">const</span> nb <span class=\"kw\">of</span> graph[node]) {\n    <span class=\"kw\">if</span> (!visited.<span class=\"fn\">has</span>(nb)) { visited.<span class=\"fn\">add</span>(nb); queue.<span class=\"fn\">push</span>(nb); }\n  }\n}\n\n<span class=\"cm\">// Memoize any function</span>\n<span class=\"kw\">const</span> memo = <span class=\"kw\">new</span> <span class=\"fn\">Map</span>();\n<span class=\"kw\">function</span> <span class=\"fn\">solve</span>(n) {\n  <span class=\"kw\">if</span> (memo.<span class=\"fn\">has</span>(n)) <span class=\"kw\">return</span> memo.<span class=\"fn\">get</span>(n);\n  <span class=\"kw\">const</span> result = <span class=\"cm\">/* your recursion */</span>;\n  memo.<span class=\"fn\">set</span>(n, result);\n  <span class=\"kw\">return</span> result;\n}", "body": "<p>You made it through twelve lessons. You now understand how computers think about problems \u2014 the shapes of time, the logic of search, the greed of greedy, the patience of DP, the cleverness of A*. That is not a small thing. Most people who build creative tools, games, and interactive art have never had this conversation. You have.</p>\n\n<div class=\"step-card\"><span class=\"step-num\">WHAT TO DO NEXT \u2014 IN ORDER</span>\n<strong>1. Build something with a graph.</strong> Draw a node graph in Canvas or SVG. Make nodes draggable. Run BFS on click. This is the single most transferable skill from this series.<br><br>\n<strong>2. Add pathfinding to a game.</strong> Grid-based A* takes a weekend and works in every game engine. Unity, Godot, and Phaser all have tutorials. Once you've done it yourself you'll understand every game map you'll ever make.<br><br>\n<strong>3. Learn Big-O for your own code.</strong> Profile something you've built. Find the loop inside the loop. Replace a <code>includes()</code> call with a <code>Set</code>. Watch it get fast.<br><br>\n<strong>4. Touch LeetCode once.</strong> Do 10 \"Easy\" problems. Not to get a job \u2014 to see the patterns naked. Array + hash map. Sliding window. Two pointers. These are the moves that unlock everything else.\n</div>\n\n<div class=\"artists\">The tools artists use are built on everything in this series. TouchDesigner's node graph is a DAG with topological evaluation. Max/MSP's scheduler is a priority queue. JUCE audio processing is DSP on top of data structures. Unreal's behavior trees are literally trees. Blender's geometry nodes run a topological sort on every update. If you now see the algorithm underneath the tool, this worked.</div>\n\n<div class=\"spamton\">The entire field of computer graphics \u2014 ray tracing, path tracing, global illumination, the images in every Pixar film and game \u2014 is A* and Monte Carlo sampling (a cousin of MCTS) applied to light. Rendering is literally: given a grid of pixels, find the paths of light that contribute most to each pixel's color, using heuristics to sample intelligently rather than compute every path. <strong>You now understand, at least in spirit, how Pixar movies are made.</strong></div>\n\n<div class=\"challenge\">Pick one algorithm from this series and implement it from scratch in whatever language or environment you work in most. Not to look it up \u2014 to rebuild it from memory, from the shape of it. You don't need to get it right the first time. The moment it works is the moment it becomes yours. Then explain it to someone else. That's when you actually know it.</div>\n\n<p class=\"tip\">You don't need to memorize all of this. You need to know that these tools exist and roughly what they're good for. When you encounter a performance problem, a graph problem, a search problem \u2014 you'll remember there's a name for it, and you'll know where to look. That recognition is the whole point.</p>"},

body:"<p>You made it through twelve lessons. Not as a spectator \u2014 you watched the algorithms run, you built walls for A* to navigate, you played tic-tac-toe against MCTS. That's different from reading about them. You have the shape of these things in your head now, which means you can recognize them in the wild: in the tools you use, in the systems you build, in the performance problems you'll eventually hit.</p>\n\n<div class=\"step-card\"><span class=\"step-num\">WHAT TO ACTUALLY DO NEXT \u2014 IN ORDER</span>\n<strong>1. Profile something you've built.</strong> Open any project. Find a loop. Ask: what's inside it? If there's another loop or an <code>includes()</code>, that's your complexity cliff. Fix it. Make it measurably faster. This is when Big-O stops being abstract.<br><br>\n<strong>2. Build a pathfinder.</strong> Grid-based A* from scratch. Any environment \u2014 Canvas, Unity, Godot, Phaser. Once you've implemented it yourself, every game map you ever make becomes legible. You'll see the edges and weights everywhere.<br><br>\n<strong>3. Build something with a graph.</strong> Node editor, dependency visualizer, connected-rooms dungeon. BFS for connectivity checks. DFS for traversal. The graph data structure is the most transferable thing in this series.<br><br>\n<strong>4. Touch LeetCode once.</strong> Ten Easy problems, not for a job \u2014 to see the canonical patterns raw: array+hashmap, sliding window, two pointers. These moves recur constantly in real code.\n</div>\n\n<div class=\"artists\">The tools artists use are built on everything in this series. TouchDesigner evaluates its node graph in topological sort order every frame \u2014 that's lesson 5. Max/MSP's audio scheduler is a priority queue \u2014 lesson 4. Blender's geometry nodes run a topological sort on the dependency graph before every update. Unreal's behavior trees are literally trees \u2014 lesson 11. JUCE audio processing chains are directed graphs. If you can now see the algorithm underneath a tool you already use \u2014 if you look at Blender's node editor and think \"directed acyclic graph with topological evaluation\" \u2014 then this series worked exactly the way it was supposed to.</div>\n\n<div class=\"spamton\">The entire field of computer graphics \u2014 ray tracing, path tracing, global illumination, every Pixar film, every game with realistic lighting \u2014 is Monte Carlo sampling and heuristic-guided search applied to light. A renderer asks: for this pixel, which paths of light contribute most to its color? It simulates thousands of random light paths (Monte Carlo) and uses heuristics to sample important directions more than unimportant ones (importance sampling, a cousin of A*). The mathematically correct answer to \"how do you render a Pixar film?\" involves every major algorithm in this series. <strong>You now understand, in rough outline, how Pixar movies are made.</strong></div>\n\n<div class=\"challenge\">Pick the one algorithm from this series that felt the most slippery \u2014 the one where you could follow it in the viz but couldn't quite hold the whole thing in your head. Implement it from scratch, without looking it up, in whatever language you're most comfortable in. Get it wrong first. Debug it. Get it right. Run it on test cases. The moment it works is the moment it becomes yours. Then, if you want to really know it: explain it to someone else who doesn't code.</div>\n\n<p class=\"tip\">You don't need to have all of this memorized. You need to know that these tools exist and roughly what shape of problem each one solves. When you hit a performance problem: is it a loop-inside-a-loop? Big-O problem, fix it with a hash map. Is it a \"find the best path\" problem? BFS, Dijkstra, or A* depending on weights. Is it a \"what's the optimal selection from these options\" problem? Greedy if you can prove it, DP if you can't. The pattern recognition is the skill. Everything else you can look up.</p>"
}
