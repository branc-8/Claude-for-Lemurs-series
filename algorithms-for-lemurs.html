<script>
const LESSONS=[
{
subtitle:"01 \u2014 Complexity",
title:"How Bad Can It Get?",
viz:"bigO",
code:"<span class=\"cm\">// Big-O: how runtime grows with input size n.</span>\n<span class=\"cm\">// Drop constants \u2014 only the curve shape matters.</span>\n\n<span class=\"cm\">// O(1)</span>     <span class=\"kw\">const</span> v = arr[<span class=\"nm\">0</span>];\n<span class=\"cm\">// O(log n)</span>  binary search \u2014 halves each step\n<span class=\"cm\">// O(n)</span>      arr.<span class=\"fn\">reduce</span>((a,b)=>a+b, <span class=\"nm\">0</span>)\n<span class=\"cm\">// O(n log n)</span> arr.<span class=\"fn\">sort</span>((a,b)=>a-b)\n<span class=\"cm\">// O(n\u00b2)</span>\n<span class=\"kw\">for</span>(<span class=\"kw\">let</span> i=<span class=\"nm\">0</span>;i&lt;arr.length;i++)\n  <span class=\"kw\">for</span>(<span class=\"kw\">let</span> j=<span class=\"nm\">0</span>;j&lt;arr.length;j++)\n    <span class=\"cm\">/* every pair */</span>\n\n<span class=\"cm\">// O(2\u207f) \u2014 recursive without memoization</span>\n<span class=\"kw\">function</span> <span class=\"fn\">badFib</span>(n) {\n  <span class=\"kw\">return</span> n&lt;=<span class=\"nm\">1</span> ? n : <span class=\"fn\">badFib</span>(n-<span class=\"nm\">1</span>) + <span class=\"fn\">badFib</span>(n-<span class=\"nm\">2</span>);\n}\n<span class=\"cm\">// badFib(40) makes 331 million calls.</span>\n\n<span class=\"cm\">// Amortized O(1): dynamic array push</span>\n<span class=\"cm\">// Occasionally O(n) resize, but averaged over</span>\n<span class=\"cm\">// n pushes: total O(n), so O(1) per push.</span>",
body:"<p>Your code works on 100 items. Then someone loads 100,000 and it locks up for 40 seconds. You didn't write a bug \u2014 you wrote a <strong>complexity cliff</strong>. Big-O is the vocabulary for describing that cliff before you fall off it. It tells you the <em>shape</em> of how your code behaves as input grows \u2014 not how fast it is today, but how it scales.</p>\n\n<div class=\"vocab\"><span class=\"vt\">\"Big-O Notation\"</span> \u2014 a way of describing how runtime (or memory) grows relative to input size <em>n</em>. We drop constants and small terms: O(3n + 50) is just O(n). We don't care about exact numbers \u2014 only the curve. O(n\u00b2) means: if n doubles, runtime roughly quadruples. The shape of the function is everything.</div>\n\n<div class=\"vocab\"><span class=\"vt\">\"Time vs Space Complexity\"</span> \u2014 time complexity is how runtime scales with n. Space complexity is how much memory you use. They trade off constantly: hash tables use extra space to make lookups O(1). Sorting algorithms use O(n) extra space to avoid O(n\u00b2) comparisons. When someone says an algorithm is \"fast,\" always ask: what did it cost in memory?</div>\n\n<div class=\"vocab\"><span class=\"vt\">\"Amortized Complexity\"</span> \u2014 the average cost per operation across a sequence, even if individual operations vary wildly. JavaScript's <code>array.push()</code> is O(1) amortized: most pushes are instant, but occasionally it has to copy everything to a larger buffer \u2014 that copy is O(n), but spread across n pushes, the average cost per push is still O(1). Amortized analysis gives you the honest number.</div>\n\n<div class=\"step-card\"><span class=\"step-num\">THE COMPLEXITY LADDER</span>\n<strong>O(1)</strong> \u2014 array index, hash lookup. Input size doesn't matter.<br>\n<strong>O(log n)</strong> \u2014 binary search, balanced tree ops. Double n, add one step.<br>\n<strong>O(n)</strong> \u2014 single loop over all items. Minimum to touch every element.<br>\n<strong>O(n log n)</strong> \u2014 efficient sorting. The sweet spot for comparison-based work.<br>\n<strong>O(n\u00b2)</strong> \u2014 loop inside a loop over the same data. Fine at 1k, painful at 100k, catastrophic at 1M.<br>\n<strong>O(2\u207f)</strong> \u2014 exponential recursion without caching. Works for n \u2264 20, laughable beyond.<br>\n<strong>O(n!)</strong> \u2014 trying every permutation. n=12 is already 479 million. Don't.<br><br>\nThe viz shows all five practical curves. Notice how O(n log n) stays close to O(n) for a long time \u2014 that's why efficient sort <em>feels</em> fast even though it's technically worse than linear.\n</div>\n\n<div class=\"step-card\"><span class=\"step-num\">WHEN CONSTANTS ACTUALLY WIN</span>\nO(n) with a constant of 10,000 is slower than O(n\u00b2) with a constant of 0.001 \u2014 up until n \u2248 10 million. For small n, the \"worse\" algorithm wins. Database query planners choose algorithmically \"worse\" methods for small tables because the constants dominate. Big-O is about <em>asymptotic</em> behavior \u2014 it only becomes the full story at scale. The lesson isn't \"always pick the best Big-O.\" It's: understand which regime you're in.\n</div>\n\n<div class=\"artists\">Every Spotify recommendation, TikTok For You feed, and e-commerce search result is a sort + filter pipeline running against millions of items. The reason results appear in milliseconds is that everything is pre-sorted and pre-indexed \u2014 lookups are O(log n) against a B-tree, not O(n) against a raw list. When a game has \"one frame where everything lags,\" that's almost always a hidden O(n\u00b2) loop that someone's data finally pushed past the threshold. Complexity is invisible until it isn't.</div>\n\n<div class=\"spamton\">A developer found a <strong>single nested loop</strong> in a social notification system causing multi-minute delays for users with large friend graphs. The outer loop: friends. The inner loop: scanning for duplicates. A hash set would have made it O(n). It had been in production for <strong>four years</strong>. Invisible at 50 friends. 90 seconds at 2,000. <strong>Big-O debt compounds silently at scale.</strong></div>\n\n<div class=\"challenge\">Open any project you've worked on and find one place where you're using <code>array.includes()</code> or <code>array.find()</code> inside a loop. That's O(n\u00b2). Refactor it to use a <code>Set</code> or <code>Map</code> to make it O(n). Run both versions on 10,000 items and time them. The difference is the complexity cliff in person.</div>\n\n<p class=\"tip\">The most common O(n\u00b2) in the wild: <code>for each item, loop through another array to check membership</code>. The fix is always the same \u2014 build a Set or Map from the second array first, then do O(1) lookups. One extra line of code, potentially orders-of-magnitude faster.</p>"
},
{
subtitle:"02 \u2014 Search",
title:"Finding Things Without Looking at Everything",
viz:"binarySearch",
code:"<span class=\"cm\">// Binary search: O(log n) on a sorted array.</span>\n<span class=\"kw\">function</span> <span class=\"fn\">binarySearch</span>(arr, target) {\n  <span class=\"kw\">let</span> lo=<span class=\"nm\">0</span>, hi=arr.length-<span class=\"nm\">1</span>;\n  <span class=\"kw\">while</span>(lo &lt;= hi) {\n    <span class=\"cm\">// Avoids overflow vs (lo+hi)/2</span>\n    <span class=\"kw\">const</span> mid = lo + ((hi-lo)>><span class=\"nm\">1</span>);\n    <span class=\"kw\">if</span>     (arr[mid]===target) <span class=\"kw\">return</span> mid;\n    <span class=\"kw\">else if</span>(arr[mid] &lt; target) lo=mid+<span class=\"nm\">1</span>;\n    <span class=\"kw\">else</span>                        hi=mid-<span class=\"nm\">1</span>;\n  }\n  <span class=\"kw\">return</span> -<span class=\"nm\">1</span>;\n}\n\n<span class=\"cm\">// Binary search on the answer space.</span>\n<span class=\"cm\">// Works on any monotone predicate.</span>\n<span class=\"cm\">// \"What is the minimum X where feasible(X) = true?\"</span>\n<span class=\"kw\">function</span> <span class=\"fn\">findMin</span>(lo, hi, <span class=\"fn\">feasible</span>) {\n  <span class=\"kw\">while</span>(lo &lt; hi) {\n    <span class=\"kw\">const</span> mid = lo + ((hi-lo)>><span class=\"nm\">1</span>);\n    <span class=\"fn\">feasible</span>(mid) ? hi=mid : lo=mid+<span class=\"nm\">1</span>;\n  }\n  <span class=\"kw\">return</span> lo;\n}\n\n<span class=\"cm\">// git bisect is literally findMin on commit history.</span>",
body:"<p>A million items. You could check each one \u2014 that's a million comparisons. Or you could ask: is the target in the left half or the right half? Discard the loser. Repeat. Twenty questions later you've narrowed a million items to one. That's binary search. It works because the array is <em>sorted</em> \u2014 and sorted data is the gift that keeps giving. Every sorted structure in computing runs on this idea.</p>\n\n<div class=\"vocab\"><span class=\"vt\">\"Binary Search\"</span> \u2014 on a sorted array, compare the target to the middle element. If smaller, search the left half. If larger, search the right. Each comparison halves the remaining search space. After 30 steps you've covered 2\u00b3\u2070 = 1 billion elements. O(log n). Every database index, every autocomplete, every sorted lookup is binary search or a close cousin.</div>\n\n<div class=\"vocab\"><span class=\"vt\">\"Invariant\"</span> \u2014 a condition that stays true throughout a loop or recursive process. Binary search's invariant: <em>the target, if it exists, is always within [lo, hi]</em>. If you maintain this invariant every iteration, the algorithm is correct. Invariants are how you reason about whether a loop actually works \u2014 and why binary search implementations fail when the invariant breaks at the boundary.</div>\n\n<div class=\"vocab\"><span class=\"vt\">\"Binary Search on the Answer\"</span> \u2014 the technique generalizes beyond sorted arrays. Any yes/no question with a monotone answer (\"is X feasible at this threshold?\") can be binary searched. \"What's the minimum buffer size where the task fits?\" Binary search over buffer sizes. Turns \"find the optimal value\" into \"check feasibility at a given value\" \u2014 which is usually much simpler. Used in resource allocation, scheduling, and optimization everywhere.</div>\n\n<div class=\"step-card\"><span class=\"step-num\">GETTING IT RIGHT \u2014 THE BUGS LIVE AT THE EDGES</span>\nBinary search is notorious for off-by-one errors. Three specific bugs eat implementations:<br><br>\n<strong>Loop condition:</strong> <code>lo &lt;= hi</code> (inclusive) vs <code>lo &lt; hi</code> (exclusive). The wrong choice skips the last element or loops forever.<br>\n<strong>Midpoint overflow:</strong> <code>(lo + hi) / 2</code> overflows 32-bit integers with large arrays. Always use <code>lo + ((hi - lo) >> 1)</code>.<br>\n<strong>Update step:</strong> after a failed comparison, update to <code>mid + 1</code> or <code>mid - 1</code> \u2014 not just <code>mid</code>, or you loop forever.<br><br>\nJon Bentley found that most professional programmers couldn't write a correct binary search from scratch in a timed study. The bug lived in Java's standard library for <strong>20 years</strong>, found in 2006.\n</div>\n\n<div class=\"step-card\"><span class=\"step-num\">THE CANONICAL IMPLEMENTATION</span>\n<code>function binarySearch(arr, target) {<br>\n&nbsp;&nbsp;let lo = 0, hi = arr.length - 1;<br>\n&nbsp;&nbsp;while (lo &lt;= hi) {<br>\n&nbsp;&nbsp;&nbsp;&nbsp;const mid = lo + ((hi - lo) >> 1);<br>\n&nbsp;&nbsp;&nbsp;&nbsp;if (arr[mid] === target) return mid;<br>\n&nbsp;&nbsp;&nbsp;&nbsp;if (arr[mid] &lt; target) lo = mid + 1;<br>\n&nbsp;&nbsp;&nbsp;&nbsp;else hi = mid - 1;<br>\n&nbsp;&nbsp;}<br>\n&nbsp;&nbsp;return -1;<br>\n}</code><br><br>\nMemorize this shape. The invariant: target is in [lo, hi] if it exists. When lo > hi, the range is empty \u2014 not found.\n</div>\n\n<div class=\"artists\"><code>git bisect</code> is binary search over your commit history. Mark a \"good\" commit and a \"bad\" commit; git checks out the midpoint; you test and mark it; git halves the range. O(log n) steps to find the exact commit that introduced a bug, through potentially thousands of commits. Every version control system's \"find the regression\" workflow is binary search in disguise.</div>\n\n<div class=\"spamton\">JavaScript's <code>Array.sort().indexOf()</code> is O(n) \u2014 it scans from the beginning every time. If you're searching a sorted array more than once, you're paying O(n) when you could pay O(log n). At 10,000 elements that's 10,000 comparisons vs 14. At 1,000,000 it's 1,000,000 vs 20. <strong>The savings grow with the problem.</strong> If your data is sorted and you're using indexOf, you're leaving performance on the table every single call.</div>\n\n<div class=\"challenge\">Write a function that finds the first element in a sorted array that is greater than or equal to a target (lower bound search). It's binary search with a twist: instead of returning on an exact match, you track the best candidate seen so far and keep narrowing. This variant shows up constantly in real problems \u2014 range queries, scheduling, coordinate compression.</div>\n\n<p class=\"tip\">If you're searching a sorted collection more than once in a loop, binary search. If you're searching an unsorted collection more than once, sort it first and then binary search \u2014 O(n log n) sort + O(log n) per query beats O(n) per query after enough queries. The crossover point is roughly log(n) queries.</p>"
},
{
subtitle:"03 \u2014 Sorting",
title:"Order From Chaos",
viz:"sorting",
code:"<span class=\"cm\">// Three sorts. Same result, very different paths.</span>\n\n<span class=\"cm\">// Bubble sort \u2014 O(n\u00b2). Educational only.</span>\n<span class=\"kw\">function</span> <span class=\"fn\">bubble</span>(a) {\n  <span class=\"kw\">for</span>(<span class=\"kw\">let</span> i=<span class=\"nm\">0</span>;i&lt;a.length;i++)\n    <span class=\"kw\">for</span>(<span class=\"kw\">let</span> j=<span class=\"nm\">0</span>;j&lt;a.length-i-<span class=\"nm\">1</span>;j++)\n      <span class=\"kw\">if</span>(a[j]>a[j+<span class=\"nm\">1</span>])[a[j],a[j+<span class=\"nm\">1</span>]]=[a[j+<span class=\"nm\">1</span>],a[j]];\n}\n\n<span class=\"cm\">// Merge sort \u2014 O(n log n). Stable. Good for linked lists.</span>\n<span class=\"kw\">function</span> <span class=\"fn\">merge</span>(a) {\n  <span class=\"kw\">if</span>(a.length &lt;= <span class=\"nm\">1</span>) <span class=\"kw\">return</span> a;\n  <span class=\"kw\">const</span> m=a.length>><span class=\"nm\">1</span>;\n  <span class=\"kw\">const</span> L=<span class=\"fn\">merge</span>(a.slice(<span class=\"nm\">0</span>,m)), R=<span class=\"fn\">merge</span>(a.slice(m));\n  <span class=\"kw\">const</span> out=[]; <span class=\"kw\">let</span> i=<span class=\"nm\">0</span>,j=<span class=\"nm\">0</span>;\n  <span class=\"kw\">while</span>(i&lt;L.length && j&lt;R.length)\n    out.<span class=\"fn\">push</span>(L[i]&lt;=R[j] ? L[i++] : R[j++]);\n  <span class=\"kw\">return</span> out.<span class=\"fn\">concat</span>(L.slice(i), R.slice(j));\n}\n\n<span class=\"cm\">// Quick sort \u2014 O(n log n) avg, O(n\u00b2) worst.</span>\n<span class=\"cm\">// Fast in practice. In-place. Unstable.</span>\n<span class=\"kw\">function</span> <span class=\"fn\">quick</span>(a, lo=<span class=\"nm\">0</span>, hi=a.length-<span class=\"nm\">1</span>) {\n  <span class=\"kw\">if</span>(lo >= hi) <span class=\"kw\">return</span>;\n  <span class=\"kw\">const</span> pivot=a[hi]; <span class=\"kw\">let</span> p=lo;\n  <span class=\"kw\">for</span>(<span class=\"kw\">let</span> i=lo;i&lt;hi;i++)\n    <span class=\"kw\">if</span>(a[i]&lt;=pivot) [a[p],a[i]]=[a[i],a[p++]];\n  [a[p],a[hi]]=[a[hi],a[p]];\n  <span class=\"fn\">quick</span>(a,lo,p-<span class=\"nm\">1</span>); <span class=\"fn\">quick</span>(a,p+<span class=\"nm\">1</span>,hi);\n}\n\n<span class=\"cm\">// The one you actually ship:</span>\n<span class=\"cm\">// arr.sort((a, b) => a - b)  \u2190 ALWAYS with comparator</span>",
body:"<p>Sorting is invisible infrastructure. Every leaderboard, every feed, every file browser, every search result: sorted. Your music library ordered by date added \u2014 sorted. The autocomplete suggestions ranked by relevance \u2014 sorted. You interact with sorting hundreds of times a day without noticing. This lesson is about what's actually happening, and why three algorithms that all produce the same result can differ by orders of magnitude in how they get there.</p>\n\n<div class=\"vocab\"><span class=\"vt\">\"Stable Sort\"</span> \u2014 preserves the relative order of equal elements. If two records share a sort key, their order after sorting matches before. Merge sort is stable. Quick sort (standard) isn't. Stability matters when sorting by multiple fields: sort a playlist by play count, then by date \u2014 a stable sort keeps same-count tracks in their original date order. Unstable means that guarantee disappears.</div>\n\n<div class=\"vocab\"><span class=\"vt\">\"The O(n log n) Floor\"</span> \u2014 any algorithm that sorts by comparing pairs of elements needs at least O(n log n) comparisons. This is a mathematical proof, not an engineering limitation: to sort n items you must distinguish among n! possible orderings; each comparison gives one bit of information; log\u2082(n!) \u2248 n log n. You cannot beat this with a comparison sort. Radix sort bypasses it \u2014 but only by exploiting the structure of the data itself.</div>\n\n<div class=\"vocab\"><span class=\"vt\">\"Timsort\"</span> \u2014 the sort running on most of the world's computers right now. Used by Python, Java (objects), V8's <code>Array.sort()</code>, and Android. A hybrid of merge sort and insertion sort that detects natural runs \u2014 already-sorted subsequences \u2014 in real data. Near O(n) on nearly-sorted input, O(n log n) on random. Stable, adaptive, and quietly excellent. Tim Peters wrote it in 2002 for Python and it spread everywhere.</div>\n\n<div class=\"step-card\"><span class=\"step-num\">WHAT THE THREE ALGORITHMS ACTUALLY DO</span>\n<strong>Bubble sort</strong> \u2014 repeatedly scan the array, swapping adjacent elements that are out of order. Each full scan \"bubbles\" the largest unsorted element to the end. O(n\u00b2) comparisons, O(1) space. Never use in production. The value is understanding \"what does sorted mean?\" \u2014 bubbling is the most literal answer.<br><br>\n<strong>Merge sort</strong> \u2014 divide the array in half recursively until you have single-element arrays (trivially sorted), then merge sorted halves back together. O(n log n) always. Stable. Uses O(n) extra memory. The right choice for linked lists and any situation requiring stability.<br><br>\n<strong>Quick sort</strong> \u2014 pick a pivot element, partition the array so everything smaller is left and everything larger is right, recursively sort both sides. O(n log n) average, O(n\u00b2) worst case (bad pivots). In-place. Not stable. Faster in practice than merge sort due to cache behavior \u2014 which is why it's the default in most languages.\n</div>\n\n<div class=\"step-card\"><span class=\"step-num\">PRACTICAL JAVASCRIPT SORTING</span>\n<code>// Sort numbers (comparator REQUIRED \u2014 default is string sort)<br>\narr.sort((a, b) => a - b);  // ascending<br>\narr.sort((a, b) => b - a);  // descending<br><br>\n// Sort objects by property<br>\npeople.sort((a, b) => a.age - b.age);<br><br>\n// Sort strings (locale-aware)<br>\nwords.sort((a, b) => a.localeCompare(b));<br><br>\n// Multi-key sort: primary by score desc, secondary by name asc<br>\nitems.sort((a, b) => b.score - a.score || a.name.localeCompare(b.name));</code><br><br>\nThe <code>.sort((a, b) => a - b)</code> comparator is the single most Googled JS snippet. Now you won't need to Google it.\n</div>\n\n<div class=\"artists\">Timsort was designed specifically because real data isn't random. Music libraries, contact lists, game leaderboards \u2014 all have natural runs of already-sorted data. The sort in your DAW's timeline view, the sort in your photo library by date, the sort on every e-commerce site: all Timsort or Timsort derivatives. When you drag a clip to reorder it in Premiere, a sort ran. When Spotify recalculates your Discover Weekly overnight, billions of scores get sorted. The algorithm that handles it was written by one person for Python and quietly conquered everything.</div>\n\n<div class=\"spamton\">JavaScript's <code>[1, 10, 2, 20].sort()</code> returns <code>[1, 10, 2, 20]</code> \u2014 because the default sort converts to strings and compares lexicographically. \"10\" comes before \"2\" because \"1\" < \"2\". This bug has bitten every JavaScript developer at least once. It's been in the spec since 1997. <strong>Always pass a comparator. Always.</strong></div>\n\n<div class=\"challenge\">Implement merge sort from scratch without looking it up. The signature: <code>function mergeSort(arr)</code>. The shape: base case if length \u2264 1, split in half, recursively sort both halves, merge. Writing the merge step cleanly \u2014 two pointers, one result array \u2014 is where understanding either clicks or doesn't. Run it on 1000 random numbers and verify the output is sorted.</div>\n\n<p class=\"tip\"><code>arr.sort((a, b) => a - b)</code> for numbers. Every time. Without the comparator, JavaScript sorts by string representation and your numbers come out wrong. This is the #1 silent sort bug in JavaScript codebases. The two seconds it takes to type the comparator has saved thousands of hours of debugging.</p>"

code:"<span class=\"cm\">// Four structures that cover 90% of real cases.</span>\n\n<span class=\"cm\">// Stack \u2014 LIFO. O(1) push/pop. Undo, DFS, call stack.</span>\n<span class=\"kw\">class</span> Stack {\n  #s=[];\n  <span class=\"fn\">push</span>(v){<span class=\"kw\">this</span>.#s.<span class=\"fn\">push</span>(v);}\n  <span class=\"fn\">pop</span>() {<span class=\"kw\">return</span> <span class=\"kw\">this</span>.#s.<span class=\"fn\">pop</span>();}\n  <span class=\"fn\">peek</span>(){<span class=\"kw\">return</span> <span class=\"kw\">this</span>.#s.at(-<span class=\"nm\">1</span>);}\n}\n\n<span class=\"cm\">// Queue \u2014 FIFO. O(1) with head/tail index trick.</span>\n<span class=\"cm\">// Array.shift() is O(n) \u2014 never use as a queue.</span>\n<span class=\"kw\">class</span> Queue {\n  #b={}; #h=<span class=\"nm\">0</span>; #t=<span class=\"nm\">0</span>;\n  <span class=\"fn\">enqueue</span>(v) {<span class=\"kw\">this</span>.#b[<span class=\"kw\">this</span>.#t++]=v;}\n  <span class=\"fn\">dequeue</span>()  {<span class=\"kw\">return</span> <span class=\"kw\">this</span>.#b[<span class=\"kw\">this</span>.#h++];}\n  get <span class=\"fn\">size</span>()  {<span class=\"kw\">return</span> <span class=\"kw\">this</span>.#t-<span class=\"kw\">this</span>.#h;}\n}\n\n<span class=\"cm\">// Min-Heap \u2014 O(1) peek min, O(log n) push/pop.</span>\n<span class=\"cm\">// Heap invariant: arr[i] &lt;= arr[2i+1] and arr[2i+2]</span>\n<span class=\"kw\">class</span> MinHeap {\n  #h=[];\n  <span class=\"fn\">push</span>(v){\n    <span class=\"kw\">this</span>.#h.<span class=\"fn\">push</span>(v); <span class=\"kw\">let</span> i=<span class=\"kw\">this</span>.#h.length-<span class=\"nm\">1</span>;\n    <span class=\"kw\">while</span>(i><span class=\"nm\">0</span>){\n      <span class=\"kw\">const</span> p=(i-<span class=\"nm\">1</span>)>><span class=\"nm\">1</span>;\n      <span class=\"kw\">if</span>(<span class=\"kw\">this</span>.#h[p]&lt;=<span class=\"kw\">this</span>.#h[i])<span class=\"kw\">break</span>;\n      [<span class=\"kw\">this</span>.#h[p],<span class=\"kw\">this</span>.#h[i]]=[<span class=\"kw\">this</span>.#h[i],<span class=\"kw\">this</span>.#h[p]];\n      i=p;\n    }\n  }\n  <span class=\"fn\">peek</span>(){<span class=\"kw\">return</span> <span class=\"kw\">this</span>.#h[<span class=\"nm\">0</span>];}\n  get <span class=\"fn\">size</span>(){<span class=\"kw\">return</span> <span class=\"kw\">this</span>.#h.length;}\n}\n\n<span class=\"cm\">// Hash Map \u2014 O(1) avg insert/lookup/delete.</span>\n<span class=\"cm\">// Turns O(n\u00b2) \"have we seen this?\" into O(n).</span>\n<span class=\"kw\">const</span> seen = <span class=\"kw\">new</span> <span class=\"fn\">Map</span>();\nseen.<span class=\"fn\">set</span>(<span class=\"st\">'key'</span>, <span class=\"nm\">42</span>); seen.<span class=\"fn\">has</span>(<span class=\"st\">'key'</span>); <span class=\"cm\">// O(1)</span>",
body:"<p>The algorithm decides the approach. The data structure decides whether that approach is actually possible efficiently. You can write a perfect algorithm and tank it completely with the wrong container. An array where you needed a set. A queue built on an array instead of a proper deque. A heap problem solved with repeated sorting. The four structures in this lesson cover 90% of what you'll ever need \u2014 the skill is knowing which one to reach for and exactly when.</p>\n\n<div class=\"vocab\"><span class=\"vt\">\"Stack (LIFO)\"</span> \u2014 Last In, First Out. O(1) push and pop from one end. The call stack in your JavaScript runtime is literally a stack \u2014 when a function calls another, a new frame is pushed; when it returns, the frame is popped. Used for: undo/redo history, DFS traversal, bracket/paren matching, expression evaluation, any \"reverse the order\" problem. JavaScript's <code>array.push()</code> and <code>array.pop()</code> give you a stack for free.</div>\n\n<div class=\"vocab\"><span class=\"vt\">\"Priority Queue / Min-Heap\"</span> \u2014 like a queue, but instead of dequeuing in insertion order, you always dequeue the minimum (or maximum) element. Backed by a binary heap: a complete binary tree stored in an array where every parent is \u2264 its children. O(log n) push and pop, O(1) peek. The structure that powers Dijkstra, A*, and every \"always process the cheapest/most urgent thing first\" problem. JavaScript has no built-in heap \u2014 you implement it yourself or reach for a library.</div>\n\n<div class=\"vocab\"><span class=\"vt\">\"Hash Table\"</span> \u2014 maps keys to values in O(1) average time by hashing the key to an array index. JavaScript's <code>Map</code> and <code>Set</code> are hash tables. The structure that turns \"have we seen this before?\" from O(n) to O(1), converting O(n\u00b2) loops into O(n) single passes. The most performance-critical structure to learn to reach for instinctively. When in doubt: could a Map or Set help here?</div>\n\n<div class=\"step-card\"><span class=\"step-num\">THE DECISION TREE</span>\n<strong>Need to process in reverse?</strong> Stack.<br>\n<strong>Need to process in arrival order?</strong> Queue (real deque, not array.shift).<br>\n<strong>Need the min or max, repeatedly?</strong> Heap.<br>\n<strong>Need O(1) lookup by key?</strong> Hash map.<br>\n<strong>Need sorted order AND fast insert/delete?</strong> Balanced BST (lesson 11).<br><br>\nThe escalation pattern: start with an array. The moment you're searching it repeatedly, upgrade to a Map or Set. The moment you need the min or max after every mutation, upgrade to a heap. Reach for the simplest structure that gives you the operations you need at the complexity you can afford.\n</div>\n\n<div class=\"step-card\"><span class=\"step-num\">THE TRAP: array.shift() IS NOT A QUEUE</span>\n<code>array.shift()</code> removes the first element by copying every remaining element down one slot. It's O(n). BFS implemented with <code>push()</code> + <code>shift()</code> runs in O(V + E\u00b2) instead of O(V + E). At 10,000 nodes with 50,000 edges, that's milliseconds vs <strong>minutes</strong>.<br><br>\nA real O(1) queue in JavaScript uses a head/tail index trick:<br>\n<code>const queue = [], head = 0;<br>\nqueue.push(value);          // enqueue: O(1)<br>\nconst val = queue[head++];  // dequeue: O(1)</code><br><br>\nThe array grows but head just advances. Memory isn't freed, but for short-lived traversals this is fast and simple.\n</div>\n\n<div class=\"artists\">Every game inventory is a hash map (item ID \u2192 quantity). Every undo history is a stack. Every task scheduler \u2014 from operating system process queues to audio plugin processing order in a DAW \u2014 uses a priority queue. The browser's event loop is itself a queue. React's state update batching is a queue. You interact with these four structures constantly through every piece of software you've ever used; now you understand what's underneath.</div>\n\n<div class=\"spamton\">JavaScript's <code>Map</code> preserves insertion order and accepts any type as a key \u2014 even objects. But <code>{}</code> (plain object) coerces all keys to strings, so <code>obj[{x:1}]</code> and <code>obj[{x:2}]</code> are <em>the same key</em> (<code>\"[object Object]\"</code>). This silent coercion has caused more subtle bugs than almost any other JavaScript behavior. <strong>If your keys aren't strings, use Map. Always.</strong></div>\n\n<div class=\"challenge\">Implement a min-heap from scratch: <code>push(value)</code> and <code>pop()</code> (returns minimum). The array representation: index 0 is the root, index i's children are at 2i+1 and 2i+2, parent is at (i-1)>>1. Push: add to end, then \"bubble up\" by swapping with parent while smaller. Pop: swap root with last, remove last, then \"bubble down\" by swapping with smaller child while larger. Test: push [5,3,8,1,4], pop three times should give [1,3,4].</div>\n\n<p class=\"tip\"><code>array.shift()</code> is O(n). It copies the entire array. Never use it as a queue in any performance-sensitive code. The head-index trick above is two lines and genuinely O(1). If you're implementing BFS and your queue is <code>array.push()</code> + <code>array.shift()</code>, that's why it feels slow on large graphs.</p>"

code:"<span class=\"cm\">// Graph representations \u2014 choose based on density</span>\n\n<span class=\"cm\">// Adjacency list \u2014 O(V+E) space. Best for sparse graphs.</span>\n<span class=\"kw\">const</span> graph = {\n  A: [{node:<span class=\"st\">'B'</span>,w:<span class=\"nm\">4</span>}, {node:<span class=\"st\">'C'</span>,w:<span class=\"nm\">2</span>}],\n  B: [{node:<span class=\"st\">'D'</span>,w:<span class=\"nm\">5</span>}],\n  C: [{node:<span class=\"st\">'D'</span>,w:<span class=\"nm\">1</span>}],\n  D: [],\n};\n\n<span class=\"cm\">// BFS vs DFS \u2014 one line apart</span>\n<span class=\"kw\">function</span> <span class=\"fn\">traverse</span>(graph, start, bfs=<span class=\"kw\">true</span>) {\n  <span class=\"kw\">const</span> visited  = <span class=\"kw\">new</span> <span class=\"fn\">Set</span>();\n  <span class=\"kw\">const</span> frontier = [start];\n  <span class=\"kw\">while</span>(frontier.length) {\n    <span class=\"kw\">const</span> node = bfs\n      ? frontier.<span class=\"fn\">shift</span>()  <span class=\"cm\">// BFS: queue</span>\n      : frontier.<span class=\"fn\">pop</span>();   <span class=\"cm\">// DFS: stack</span>\n    <span class=\"kw\">if</span>(visited.<span class=\"fn\">has</span>(node)) <span class=\"kw\">continue</span>;\n    visited.<span class=\"fn\">add</span>(node);\n    graph[node].<span class=\"fn\">forEach</span>(nb => frontier.<span class=\"fn\">push</span>(nb.node));\n  }\n}\n\n<span class=\"cm\">// Topological sort (Kahn's) \u2014 build order, task scheduling</span>\n<span class=\"kw\">function</span> <span class=\"fn\">topoSort</span>(graph) {\n  <span class=\"kw\">const</span> inDeg=<span class=\"kw\">new</span> <span class=\"fn\">Map</span>();\n  <span class=\"kw\">for</span>(<span class=\"kw\">const</span> [n,edges] <span class=\"kw\">of</span> <span class=\"fn\">Object</span>.<span class=\"fn\">entries</span>(graph)){\n    <span class=\"kw\">if</span>(!inDeg.<span class=\"fn\">has</span>(n)) inDeg.<span class=\"fn\">set</span>(n,<span class=\"nm\">0</span>);\n    edges.<span class=\"fn\">forEach</span>(e=>inDeg.<span class=\"fn\">set</span>(e.node,(inDeg.<span class=\"fn\">get</span>(e.node)||<span class=\"nm\">0</span>)+<span class=\"nm\">1</span>));\n  }\n  <span class=\"kw\">const</span> q=[...[...inDeg].<span class=\"fn\">filter</span>(([,d])=>d===<span class=\"nm\">0</span>).<span class=\"fn\">map</span>(([n])=>n)];\n  <span class=\"kw\">const</span> out=[];\n  <span class=\"kw\">while</span>(q.length){\n    <span class=\"kw\">const</span> n=q.<span class=\"fn\">shift</span>(); out.<span class=\"fn\">push</span>(n);\n    graph[n].<span class=\"fn\">forEach</span>(e=>{\n      inDeg.<span class=\"fn\">set</span>(e.node, inDeg.<span class=\"fn\">get</span>(e.node)-<span class=\"nm\">1</span>);\n      <span class=\"kw\">if</span>(inDeg.<span class=\"fn\">get</span>(e.node)===<span class=\"nm\">0</span>) q.<span class=\"fn\">push</span>(e.node);\n    });\n  }\n  <span class=\"kw\">return</span> out;\n}",
body:"<p>You already work with graphs. You just didn't know the name. Blender's node editor: graph. TouchDesigner: graph. Max/MSP: graph. Your package.json dependency tree: directed acyclic graph. Every game level with connected rooms: graph. The internet itself \u2014 routers connected by cables, each router a node \u2014 is one enormous graph. Once you see what the word means, you realize the entire discipline of computer science is largely the study of graphs and what you can do with them.</p>\n\n<div class=\"vocab\"><span class=\"vt\">\"Graph\"</span> \u2014 nodes (also called vertices) connected by edges. Directed means edges have direction (A\u2192B doesn't imply B\u2192A). Undirected means edges go both ways. Weighted means edges have costs. A tree is a special graph: connected, no cycles, exactly one path between any two nodes. A DAG (Directed Acyclic Graph) is directed with no cycles \u2014 used for dependency modeling everywhere, from package managers to shader graphs.</div>\n\n<div class=\"vocab\"><span class=\"vt\">\"Adjacency List\"</span> \u2014 the standard representation. Each node stores a list of its neighbors. <code>{ A: ['B','C'], B: ['A','D'], C: ['A'] }</code>. O(V+E) space. Iterating a node's neighbors is O(degree). Best for sparse graphs \u2014 which is most real graphs (roads, social networks, game maps). The alternative, an adjacency matrix (V\u00d7V boolean grid), uses O(V\u00b2) space and is only better for very dense graphs or when you need O(1) edge existence checks.</div>\n\n<div class=\"vocab\"><span class=\"vt\">\"Topological Sort\"</span> \u2014 an ordering of a DAG's nodes where every directed edge A\u2192B has A appearing before B in the output. Only possible on acyclic graphs. Used by: npm to install packages in dependency order, build systems to compile files in the right sequence, Blender's geometry nodes to evaluate the graph in data-flow order, TypeScript to resolve type definitions before using them. When a package manager detects a circular dependency, it's detecting that no topological sort is possible.</div>\n\n<div class=\"step-card\"><span class=\"step-num\">BUILDING A GRAPH IN CODE</span>\n<code>// Adjacency list \u2014 use this for almost everything<br>\nconst graph = new Map();<br>\nfunction addEdge(u, v, weight = 1) {<br>\n&nbsp;&nbsp;if (!graph.has(u)) graph.set(u, []);<br>\n&nbsp;&nbsp;if (!graph.has(v)) graph.set(v, []);<br>\n&nbsp;&nbsp;graph.get(u).push({ node: v, weight });<br>\n&nbsp;&nbsp;graph.get(v).push({ node: u, weight }); // omit for directed<br>\n}<br><br>\n// Get all neighbors of node u<br>\nconst neighbors = graph.get(u) || [];</code><br><br>\nFor unweighted graphs, store arrays of node IDs directly. Add weight only when needed.\n</div>\n\n<div class=\"step-card\"><span class=\"step-num\">PROPERTIES THAT CHANGE YOUR ALGORITHM</span>\n<strong>Cyclic vs Acyclic:</strong> Cycles require explicit visited tracking. DAGs support topological sort and are simpler to reason about.<br>\n<strong>Connected vs Disconnected:</strong> BFS/DFS from one node won't reach everything in a disconnected graph. Need to restart from unvisited nodes for full coverage.<br>\n<strong>Sparse vs Dense:</strong> Most real-world graphs are sparse (far fewer than V\u00b2 edges). Adjacency list + heap-based Dijkstra is O((V+E) log V) \u2014 much better than O(V\u00b2) on sparse graphs.<br>\n<strong>Directed vs Undirected:</strong> A road network is mostly undirected. A dependency graph is directed. Twitter follows: directed. Facebook friends: undirected. The direction determines whether edge (u,v) implies edge (v,u).\n</div>\n\n<div class=\"artists\">Procedural generation tools like Spelunky and Dwarf Fortress use graph algorithms to guarantee every generated level is fully connected \u2014 no unreachable rooms. The algorithm runs a connectivity check (essentially BFS) on the generated map and regenerates if it fails. Blender's geometry nodes, Max/MSP, TouchDesigner, and Pure Data are all literal graphs you draw by hand \u2014 nodes and edges that you connect with cables. The dependency graph in a DAW that determines which audio plugins process in which order is a directed acyclic graph evaluated in topological order on every frame. You've been building graphs this whole time.</div>\n\n<div class=\"spamton\">The entire World Wide Web is a directed graph \u2014 pages are nodes, hyperlinks are edges. Google's original PageRank algorithm ranked pages by how many other pages linked to them, weighted by how important those linking pages were. This is eigenvector centrality on a graph with billions of nodes. <strong>The entire early history of Google is one graph algorithm.</strong></div>\n\n<div class=\"challenge\">Build a graph visualizer in Canvas: click to add nodes, drag between nodes to connect them. Then implement a simple DFS that highlights the traversal order \u2014 starting from the most recently added node, light up each visited node in sequence with a small delay. This is the project that makes graphs click. Once you've built the data structure yourself and watched it traverse, the abstraction becomes real.</div>\n\n<p class=\"tip\">When you're not sure if your problem is a graph problem: ask \"are there entities with relationships between them?\" If yes, it's a graph. The next question: are the relationships directed? Weighted? Cyclic? Those answers determine which algorithm applies. Most of the time you want BFS or DFS \u2014 the others are specializations.</p>"
},

title:"Flood Fill the World",
viz:"bfsDfs",
code:"<span class=\"cm\">// BFS \u2014 queue \u2014 level by level \u2014 shortest path (unweighted)</span>\n<span class=\"kw\">function</span> <span class=\"fn\">bfs</span>(graph, start, goal) {\n  <span class=\"kw\">const</span> queue  = [start];\n  <span class=\"kw\">const</span> visited= <span class=\"kw\">new</span> <span class=\"fn\">Set</span>([start]);\n  <span class=\"kw\">const</span> parent = <span class=\"kw\">new</span> <span class=\"fn\">Map</span>([[start, <span class=\"kw\">null</span>]]);\n  <span class=\"kw\">while</span>(queue.length) {\n    <span class=\"kw\">const</span> node = queue.<span class=\"fn\">shift</span>();\n    <span class=\"kw\">if</span>(node===goal) <span class=\"kw\">return</span> <span class=\"fn\">buildPath</span>(parent, goal);\n    <span class=\"kw\">for</span>(<span class=\"kw\">const</span> nb <span class=\"kw\">of</span> graph[node]) {\n      <span class=\"kw\">if</span>(!visited.<span class=\"fn\">has</span>(nb)) {\n        visited.<span class=\"fn\">add</span>(nb); <span class=\"cm\">// \u2190 mark at PUSH, not pop</span>\n        parent.<span class=\"fn\">set</span>(nb, node);\n        queue.<span class=\"fn\">push</span>(nb);\n      }\n    }\n  }\n  <span class=\"kw\">return</span> <span class=\"kw\">null</span>;\n}\n\n<span class=\"cm\">// DFS \u2014 recursive (call stack is the stack)</span>\n<span class=\"kw\">function</span> <span class=\"fn\">dfs</span>(graph, node, goal, vis=<span class=\"kw\">new</span> <span class=\"fn\">Set</span>()) {\n  <span class=\"kw\">if</span>(node===goal) <span class=\"kw\">return</span> <span class=\"kw\">true</span>;\n  vis.<span class=\"fn\">add</span>(node);\n  <span class=\"kw\">for</span>(<span class=\"kw\">const</span> nb <span class=\"kw\">of</span> graph[node])\n    <span class=\"kw\">if</span>(!vis.<span class=\"fn\">has</span>(nb) && <span class=\"fn\">dfs</span>(graph,nb,goal,vis))\n      <span class=\"kw\">return</span> <span class=\"kw\">true</span>;\n  <span class=\"kw\">return</span> <span class=\"kw\">false</span>;\n}\n\n<span class=\"cm\">// Flood fill \u2014 BFS on a 2D grid</span>\n<span class=\"kw\">function</span> <span class=\"fn\">flood</span>(grid,r,c,fill,orig=grid[r][c]) {\n  <span class=\"kw\">if</span>(grid[r]?.[c] !== orig) <span class=\"kw\">return</span>;\n  grid[r][c] = fill;\n  [[-<span class=\"nm\">1</span>,<span class=\"nm\">0</span>],[<span class=\"nm\">1</span>,<span class=\"nm\">0</span>],[<span class=\"nm\">0</span>,-<span class=\"nm\">1</span>],[<span class=\"nm\">0</span>,<span class=\"nm\">1</span>]].\n    <span class=\"fn\">forEach</span>(([dr,dc])=><span class=\"fn\">flood</span>(grid,r+dr,c+dc,fill,orig));\n}",
body:"<p>Two algorithms enter a maze. BFS takes one step in every possible direction simultaneously, like a ripple expanding in water. DFS picks one path and sprints \u2014 turning back only when it hits a wall. BFS guarantees the shortest route but searches broadly. DFS may wander but uses less memory and finds <em>something</em> faster. One queue, one stack. That swap \u2014 literally one word of code \u2014 produces entirely different exploration behavior.</p>\n\n<div class=\"vocab\"><span class=\"vt\">\"BFS (Breadth-First Search)\"</span> \u2014 explores all nodes at distance 1 from the start before any at distance 2, all distance-2 before distance-3. Uses a queue (FIFO). O(V+E) time and space. The critical property: in an unweighted graph, BFS always finds the <em>shortest path</em> from start to any reachable node. The step at which BFS first reaches a node equals its shortest distance from the start.</div>\n\n<div class=\"vocab\"><span class=\"vt\">\"DFS (Depth-First Search)\"</span> \u2014 explores one branch as deep as possible before backtracking to try the next. Uses a stack or recursion. O(V+E) time, O(V) space for visited plus O(depth) call stack. Does not find shortest paths. Does find: whether a path exists, cycles, topological order, connected components, and all solutions to a constraint problem (when you need to backtrack and try alternatives).</div>\n\n<div class=\"vocab\"><span class=\"vt\">\"Flood Fill\"</span> \u2014 BFS or DFS from a starting cell on a 2D grid, visiting all connected cells that match a condition. The paint bucket tool in every image editor \u2014 it's exactly flood fill. Island counting in grid problems. Connected component labeling in computer vision. The algorithm is identical to graph traversal: the grid is a graph where each cell connects to its up/down/left/right neighbors.</div>\n\n<div class=\"step-card\"><span class=\"step-num\">BFS IN 12 LINES \u2014 THE EXACT PATTERN</span>\n<code>function bfs(graph, start, target) {<br>\n&nbsp;&nbsp;const visited = new Set([start]);<br>\n&nbsp;&nbsp;const queue = [start];<br>\n&nbsp;&nbsp;const parent = new Map([[start, null]]);<br>\n&nbsp;&nbsp;while (queue.length) {<br>\n&nbsp;&nbsp;&nbsp;&nbsp;const node = queue.shift(); // use head-index trick for speed<br>\n&nbsp;&nbsp;&nbsp;&nbsp;if (node === target) return reconstructPath(parent, target);<br>\n&nbsp;&nbsp;&nbsp;&nbsp;for (const neighbor of graph.get(node) || []) {<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;if (!visited.has(neighbor)) {<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;visited.add(neighbor);<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;parent.set(neighbor, node);<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;queue.push(neighbor);<br>\n&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;}<br>\n&nbsp;&nbsp;&nbsp;&nbsp;}<br>\n&nbsp;&nbsp;}<br>\n&nbsp;&nbsp;return null;<br>\n}</code><br><br>\nDFS: replace <code>queue.shift()</code> with <code>queue.pop()</code>. The queue becomes a stack. That is the <em>entire</em> algorithmic difference.\n</div>\n\n<div class=\"step-card\"><span class=\"step-num\">WHEN TO USE WHICH</span>\n<strong>Use BFS when:</strong> you need the shortest path (fewest hops) in an unweighted graph. Level-order traversal of a tree. Finding all nodes within k steps. \"What's the minimum number of moves to reach X?\"<br><br>\n<strong>Use DFS when:</strong> checking whether a path exists. Detecting cycles. Topological sort. Finding all possible solutions (backtracking). Tree traversal where you process parents before children or children before parents. DFS uses less queue memory on wide graphs.<br><br>\n<strong>The big trap:</strong> marking nodes visited when you pop them instead of when you push them. Push-when-visit is correct \u2014 it prevents the same node from being queued multiple times. Pop-when-visit will add duplicate entries and potentially visit nodes many more times than necessary.\n</div>\n\n<div class=\"artists\">Pac-Man's original ghost AI used different traversal strategies. Blinky (red) tracked Pac-Man's current position directly. Pinky targeted four tiles ahead of his facing direction. Inky used a vector from Blinky through that point doubled. Clyde ran away when close. These aren't random \u2014 they're four distinct pursuit algorithms running simultaneously on the same graph, each with their own heuristic about where Pac-Man will be. The emergent behavior of four simple graph traversals produced one of the most analyzed game AI systems ever written.</div>\n\n<div class=\"spamton\">The \"six degrees of separation\" claim \u2014 that any two people on Earth are connected by at most six mutual acquaintances \u2014 is a BFS claim on the social graph. A 2011 Facebook study found the average distance between two users was 4.74 hops. Microsoft Research found it was 6.6 on the full public internet. BFS from any node on this planet terminates within <strong>roughly six steps</strong>. The entire human social graph has a diameter of six. That's absurd and it's true.</div>\n\n<div class=\"challenge\">Implement flood fill on a 2D grid: given a grid of 0s and 1s, a starting cell, and a target value, fill all connected cells of the starting value with the target. Then extend it to count the number of distinct \"islands\" (connected groups of 1s) in the grid \u2014 run a BFS/DFS from each unvisited 1-cell, marking the whole island as visited, counting how many separate BFS/DFS operations you needed.</div>\n\n<p class=\"tip\">The most common BFS bug: marking nodes visited when you <em>pop</em> them from the queue instead of when you <em>push</em> them. If you mark on pop, the same node can be added to the queue many times before it's processed \u2014 blowing up your memory and time. Mark on push. Always add to visited the moment you add to the queue.</p>"
},

code:"<span class=\"cm\">// Dijkstra: single-source shortest path.</span>\n<span class=\"cm\">// No negative edge weights. O((V+E) log V) with a heap.</span>\n<span class=\"kw\">function</span> <span class=\"fn\">dijkstra</span>(graph, start) {\n  <span class=\"kw\">const</span> dist = <span class=\"kw\">new</span> <span class=\"fn\">Map</span>();\n  <span class=\"kw\">const</span> prev = <span class=\"kw\">new</span> <span class=\"fn\">Map</span>();\n  <span class=\"kw\">const</span> pq   = <span class=\"kw\">new</span> <span class=\"fn\">MinHeap</span>(); <span class=\"cm\">// [cost, node]</span>\n\n  <span class=\"kw\">for</span>(<span class=\"kw\">const</span> n <span class=\"kw\">of</span> graph.<span class=\"fn\">keys</span>()) dist.<span class=\"fn\">set</span>(n, Infinity);\n  dist.<span class=\"fn\">set</span>(start, <span class=\"nm\">0</span>);\n  pq.<span class=\"fn\">push</span>([<span class=\"nm\">0</span>, start]);\n\n  <span class=\"kw\">while</span>(pq.size) {\n    <span class=\"kw\">const</span> [d, u] = pq.<span class=\"fn\">pop</span>();\n    <span class=\"cm\">// Stale entry \u2014 already found shorter path</span>\n    <span class=\"kw\">if</span>(d > dist.<span class=\"fn\">get</span>(u)) <span class=\"kw\">continue</span>;\n\n    <span class=\"kw\">for</span>(<span class=\"kw\">const</span> {node:v, w} <span class=\"kw\">of</span> graph.<span class=\"fn\">get</span>(u)) {\n      <span class=\"kw\">const</span> alt = d + w;   <span class=\"cm\">// tentative cost through u</span>\n      <span class=\"kw\">if</span>(alt &lt; dist.<span class=\"fn\">get</span>(v)) {\n        dist.<span class=\"fn\">set</span>(v, alt);\n        prev.<span class=\"fn\">set</span>(v, u);\n        pq.<span class=\"fn\">push</span>([alt, v]);\n      }\n    }\n  }\n  <span class=\"kw\">return</span> {dist, prev};\n}\n\n<span class=\"cm\">// Reconstruct path from prev map</span>\n<span class=\"kw\">function</span> <span class=\"fn\">getPath</span>(prev, target) {\n  <span class=\"kw\">const</span> path=[];\n  <span class=\"kw\">let</span> cur=target;\n  <span class=\"kw\">while</span>(cur !== <span class=\"kw\">undefined</span>) {\n    path.<span class=\"fn\">unshift</span>(cur);\n    cur = prev.<span class=\"fn\">get</span>(cur);\n  }\n  <span class=\"kw\">return</span> path;\n}",
body:"<p>BFS counts hops. But every road has a different travel time, every flight has a different cost, every network link has a different latency. \"Fewest edges\" and \"cheapest path\" are different questions. Dijkstra answers the second one. It's the algorithm in your GPS, in every internet routing protocol, in every \"find the cheapest connection\" system ever built. Remarkably simple once you see the idea. Everywhere once you know to look.</p>\n\n<div class=\"vocab\"><span class=\"vt\">\"Relaxation\"</span> \u2014 the core operation of Dijkstra. When you visit node u, check each neighbor v: is dist[u] + weight(u\u2192v) smaller than your current best estimate for dist[v]? If yes, update dist[v] \u2014 you've found a cheaper path to v through u. The name \"relaxation\" comes from an analogy: distances start tense (overestimated at infinity) and relax down to their true values as better paths are discovered.</div>\n\n<div class=\"vocab\"><span class=\"vt\">\"Why Negative Weights Break It\"</span> \u2014 Dijkstra makes a greedy assumption: once a node is popped from the priority queue (committed to), no cheaper path to it will ever be found. With negative weights, a long path with a large negative edge could be cheaper \u2014 but Dijkstra has already committed to the short positive-weight path. It's not that Dijkstra has a bug; it's that the greedy assumption is wrong when edges can subtract from the cost. Use Bellman-Ford for negative weights.</div>\n\n<div class=\"vocab\"><span class=\"vt\">\"Lazy Deletion\"</span> \u2014 the standard Dijkstra trick: when a better path to a node is found, don't remove the old heap entry \u2014 just push a new one with the lower distance. When the old entry is eventually popped, check if its stored distance matches the current known best; if not, skip it. More entries in the heap, but no complex heap update operation. Still O((V+E) log V) overall.</div>\n\n<div class=\"step-card\"><span class=\"step-num\">THE ALGORITHM IN PLAIN ENGLISH</span>\n1. Set dist[start] = 0, dist[everything else] = \u221e.<br>\n2. Push start onto a min-heap with priority 0.<br>\n3. Pop the node with smallest current distance. If already visited, skip it.<br>\n4. Mark it visited. For each unvisited neighbor: if dist[current] + edge_weight &lt; dist[neighbor], update dist[neighbor] and push it to the heap.<br>\n5. Repeat until the heap is empty or you've popped the target node.<br><br>\nThe invariant: when a node is popped from the heap, its stored distance is its true shortest distance from the start (assuming no negative weights).\n</div>\n\n<div class=\"step-card\"><span class=\"step-num\">DIJKSTRA VS BFS \u2014 WHEN TO USE WHICH</span>\n<strong>BFS:</strong> unweighted graphs. Every edge costs the same. Finds shortest path by hop count in O(V+E).<br>\n<strong>Dijkstra:</strong> weighted graphs with non-negative weights. Finds shortest path by total cost in O((V+E) log V).<br>\n<strong>Bellman-Ford:</strong> weighted graphs with possible negative weights. O(VE) \u2014 much slower. Use only when you can't avoid negative edges.<br>\n<strong>A*:</strong> Dijkstra + a heuristic guiding toward the goal. Same correctness guarantees, often much faster in practice. Next lesson.\n</div>\n\n<div class=\"artists\">OSRM (Open Source Routing Machine) and Valhalla are open-source routing engines built on OpenStreetMap data \u2014 the same map data that powers many navigation apps. They run Dijkstra (actually a variant called contraction hierarchies, a preprocessed Dijkstra on a hierarchical graph) to route cross-country trips in under 10ms. Every time you ask Google Maps for directions, some variant of this algorithm runs on a graph with hundreds of millions of nodes. Your car's offline GPS stores a compressed version of this graph on a chip smaller than your thumbnail.</div>\n\n<div class=\"spamton\">The Border Gateway Protocol (BGP) \u2014 the routing protocol that determines how data travels between internet service providers \u2014 is a path-finding algorithm on a graph of roughly 900,000 network prefixes, updated in real time. Every time a major ISP has an outage or misconfigures a router, BGP reconverges \u2014 running Dijkstra-adjacent logic across the entire internet. In 2010, a Pakistani ISP accidentally advertised that it owned YouTube's IP range. BGP believed it. <strong>YouTube was unreachable for most of the world for two hours.</strong> One bad path update. One graph algorithm propagated it everywhere.</div>\n\n<div class=\"challenge\">Add Dijkstra to the graph visualizer from lesson 5. Click two nodes to set start and end. Run Dijkstra and animate the exploration: highlight visited nodes as they're committed, show the current distance label inside each node, and at the end highlight the shortest path. The distance label updating in real time \u2014 numbers decreasing as cheaper paths are found \u2014 is what makes relaxation click.</div>\n\n<p class=\"tip\">The most common Dijkstra bug: forgetting the stale-entry check. When you pop a node from the heap, compare its stored distance to <code>dist[node]</code>. If they differ, a shorter path was found after this entry was pushed \u2014 skip it. Without this check, the algorithm still produces correct results but processes stale entries unnecessarily, blowing up your runtime on graphs with many edge updates.</p>"
},

subtitle:"08 \u2014 A*",
title:"Guided Search With a Heuristic",
viz:"astar",
code:"<span class=\"cm\">// A* = Dijkstra + heuristic guide toward the goal.</span>\n<span class=\"cm\">// f(n) = g(n) + h(n)</span>\n<span class=\"cm\">// g = actual cost from start. h = estimated remaining.</span>\n\n<span class=\"cm\">// Heuristics for 2D grids:</span>\n<span class=\"kw\">const</span> manhattan = (a,b) =>\n  Math.<span class=\"fn\">abs</span>(a.r-b.r) + Math.<span class=\"fn\">abs</span>(a.c-b.c);\n\n<span class=\"kw\">function</span> <span class=\"fn\">aStar</span>(grid, start, goal) {\n  <span class=\"kw\">const</span> g    = <span class=\"kw\">new</span> <span class=\"fn\">Map</span>([[<span class=\"fn\">k</span>(start), <span class=\"nm\">0</span>]]);\n  <span class=\"kw\">const</span> open  = <span class=\"kw\">new</span> <span class=\"fn\">MinHeap</span>(); <span class=\"cm\">// [f, node]</span>\n  <span class=\"kw\">const</span> prev  = <span class=\"kw\">new</span> <span class=\"fn\">Map</span>();\n  <span class=\"kw\">const</span> closed= <span class=\"kw\">new</span> <span class=\"fn\">Set</span>();\n  open.<span class=\"fn\">push</span>([<span class=\"fn\">manhattan</span>(start,goal), start]);\n\n  <span class=\"kw\">while</span>(open.size) {\n    <span class=\"kw\">const</span> [,cur] = open.<span class=\"fn\">pop</span>();\n    <span class=\"kw\">if</span>(<span class=\"fn\">same</span>(cur,goal)) <span class=\"kw\">return</span> <span class=\"fn\">buildPath</span>(prev,goal);\n    <span class=\"kw\">if</span>(closed.<span class=\"fn\">has</span>(<span class=\"fn\">k</span>(cur))) <span class=\"kw\">continue</span>;\n    closed.<span class=\"fn\">add</span>(<span class=\"fn\">k</span>(cur));\n    <span class=\"kw\">for</span>(<span class=\"kw\">const</span> nb <span class=\"kw\">of</span> <span class=\"fn\">neighbors</span>(grid,cur)) {\n      <span class=\"kw\">const</span> ng = (g.<span class=\"fn\">get</span>(<span class=\"fn\">k</span>(cur))??Infinity) + <span class=\"nm\">1</span>;\n      <span class=\"kw\">if</span>(ng &lt; (g.<span class=\"fn\">get</span>(<span class=\"fn\">k</span>(nb))??Infinity)) {\n        g.<span class=\"fn\">set</span>(<span class=\"fn\">k</span>(nb), ng);\n        prev.<span class=\"fn\">set</span>(<span class=\"fn\">k</span>(nb), cur);\n        open.<span class=\"fn\">push</span>([ng + <span class=\"fn\">manhattan</span>(nb,goal), nb]);\n      }\n    }\n  }\n  <span class=\"kw\">return</span> <span class=\"kw\">null</span>;\n}\n\n<span class=\"cm\">// Weighted A*: f = g + w*h.</span>\n<span class=\"cm\">// w=0 \u2192 Dijkstra. w=1 \u2192 optimal A*. w=1.5 \u2192 fast/near-optimal.</span>",
body:"<p>Dijkstra is brilliant and oblivious. It expands outward in all directions equally, not caring that the goal is right over there, just to the right, obvious to anyone glancing at the map. A* fixes this with one addition: a guess about how far the goal is. That guess \u2014 called a heuristic \u2014 biases the search toward promising directions. With a good heuristic, A* finds the optimal path while looking at a tiny fraction of what Dijkstra examines. It's the pathfinding algorithm in basically every game ever shipped.</p>\n\n<div class=\"vocab\"><span class=\"vt\">\"Heuristic\"</span> \u2014 a function h(n) that estimates the cost from node n to the goal. A* uses f(n) = g(n) + h(n): actual cost from start (g) plus estimated remaining cost (h). An <em>admissible</em> heuristic never overestimates \u2014 this guarantees A* finds the optimal path. An inadmissible one finds a path faster but may miss the optimum. Games often deliberately use inadmissible heuristics for speed, accepting slightly suboptimal paths.</div>\n\n<div class=\"vocab\"><span class=\"vt\">\"Manhattan Distance\"</span> \u2014 for a 4-directional grid, |\u0394row| + |\u0394col| between two cells. Always \u2264 true path length (admissible) because walls can only add detours, never reduce them. Named after Manhattan's grid streets. For 8-directional movement: Chebyshev distance, max(|\u0394row|, |\u0394col|). For continuous 2D/3D space: Euclidean distance. For abstract spaces (word ladders, puzzle states): problem-specific functions.</div>\n\n<div class=\"vocab\"><span class=\"vt\">\"Weighted A*\"</span> \u2014 f = g + w \u00d7 h. w=0 gives Dijkstra (no guidance, explores everything). w=1 gives standard A* (optimal). w > 1 is greedier: it explores toward the goal faster but may find a path that costs up to w\u00d7 the optimal. w=1.1 to 1.5 is the game pathfinding sweet spot \u2014 near-optimal paths with a fraction of the computation. The viz lets you compare A* vs Dijkstra directly on the same grid.</div>\n\n<div class=\"step-card\"><span class=\"step-num\">CHOOSING YOUR HEURISTIC</span>\n<strong>4-directional grid:</strong> Manhattan distance \u2014 <code>Math.abs(dx) + Math.abs(dy)</code><br>\n<strong>8-directional grid:</strong> Chebyshev \u2014 <code>Math.max(Math.abs(dx), Math.abs(dy))</code><br>\n<strong>Free movement / 3D space:</strong> Euclidean \u2014 <code>Math.sqrt(dx*dx + dy*dy)</code><br>\n<strong>Road network:</strong> straight-line distance between GPS coordinates<br>\n<strong>Puzzle state:</strong> number of pieces out of place, or sum of Manhattan distances of each piece<br><br>\nRule: if you're not sure whether your heuristic is admissible, scale it down \u2014 <code>h * 0.9</code> guarantees admissibility at a tiny performance cost. An inadmissible heuristic is a correctness bug, not just a performance issue.\n</div>\n\n<div class=\"step-card\"><span class=\"step-num\">A* VS DIJKSTRA \u2014 THE NUMBERS</span>\nOn a clear 1000\u00d71000 grid, start to opposite corner:<br>\n<strong>Dijkstra:</strong> explores ~500,000 cells<br>\n<strong>A* (Manhattan):</strong> explores ~50,000\u2013100,000 cells (10\u201320%)<br>\n<strong>A* (perfect heuristic):</strong> explores only the optimal path cells<br>\n<strong>Jump Point Search (grid A* variant):</strong> 10\u201340\u00d7 fewer cells than A* by skipping symmetric paths<br><br>\nThe gap grows as maps get larger. On a 1M-node road network, Dijkstra vs A* is the difference between routing in 10ms and routing in 0.1ms. This is why navigation apps feel instant.\n</div>\n\n<div class=\"artists\">Every major game engine \u2014 Unity, Unreal, Godot \u2014 has A* built in or available as a first-class navigation system. Left 4 Dead's AI Director uses A* to model where survivors will walk through each level, then places infected accordingly to create tension. Hades uses it for all NPC navigation in the procedurally generated rooms. Civilization uses weighted A* to route units across terrain with different movement costs. The \"movement cost\" weight on terrain tiles \u2014 forest is 2, road is 0.5, mountain is 5 \u2014 is a direct A* edge weight. Every time a unit takes the most sensible-looking path across a game map, A* ran.</div>\n\n<div class=\"spamton\">NASA's Mars rovers use A* variants to plan safe paths across terrain they've never traversed. The rover receives a terrain map from orbital imagery, runs A* with a heuristic based on terrain slope and rock density, and follows the planned path autonomously. When the path changes \u2014 unexpected obstacle, updated terrain model \u2014 it reruns A* in real time on a computer with less processing power than your phone. <strong>A* is driving robots on another planet right now.</strong></div>\n\n<div class=\"challenge\">Add wall drawing and a toggle between A* and Dijkstra to your pathfinding visualizer. Draw a maze with a narrow corridor. Run both algorithms and count cells explored. Then make the heuristic inadmissible (multiply by 2) and compare the path cost vs the optimal. This is how you physically feel the trade-off between speed and optimality \u2014 the moment you understand why game devs deliberately break admissibility.</div>\n\n<p class=\"tip\">The most common A* mistake: using Euclidean distance as a heuristic on a 4-directional grid. It underestimates correctly (admissible) but barely \u2014 the algorithm degrades toward Dijkstra because diagonal distances aren't achievable on the grid. Use Manhattan distance for 4-directional grids. It's tighter \u2014 closer to the true cost \u2014 so A* can prune more aggressively and run faster.</p>"
},

title:"Never Solve the Same Problem Twice",

code:"<span class=\"cm\">// DP: memoize overlapping subproblems.</span>\n\n<span class=\"cm\">// Fibonacci: O(2\u207f) naive \u2192 O(n) with memo</span>\n<span class=\"kw\">const</span> memo = <span class=\"kw\">new</span> <span class=\"fn\">Map</span>();\n<span class=\"kw\">function</span> <span class=\"fn\">fib</span>(n) {\n  <span class=\"kw\">if</span>(n &lt;= <span class=\"nm\">1</span>) <span class=\"kw\">return</span> n;\n  <span class=\"kw\">if</span>(memo.<span class=\"fn\">has</span>(n)) <span class=\"kw\">return</span> memo.<span class=\"fn\">get</span>(n);\n  <span class=\"kw\">const</span> r = <span class=\"fn\">fib</span>(n-<span class=\"nm\">1</span>) + <span class=\"fn\">fib</span>(n-<span class=\"nm\">2</span>);\n  memo.<span class=\"fn\">set</span>(n, r);\n  <span class=\"kw\">return</span> r;\n}\n\n<span class=\"cm\">// 0/1 Knapsack \u2014 bottom-up tabulation</span>\n<span class=\"cm\">// dp[i][c] = max value, first i items, capacity c</span>\n<span class=\"kw\">function</span> <span class=\"fn\">knapsack</span>(items, cap) {\n  <span class=\"kw\">const</span> n = items.length;\n  <span class=\"kw\">const</span> dp = <span class=\"fn\">Array</span>.<span class=\"fn\">from</span>({length:n+<span class=\"nm\">1</span>},\n    () => <span class=\"kw\">new</span> <span class=\"fn\">Array</span>(cap+<span class=\"nm\">1</span>).<span class=\"fn\">fill</span>(<span class=\"nm\">0</span>));\n  <span class=\"kw\">for</span>(<span class=\"kw\">let</span> i=<span class=\"nm\">1</span>; i&lt;=n; i++) {\n    <span class=\"kw\">const</span> {w, v} = items[i-<span class=\"nm\">1</span>];\n    <span class=\"kw\">for</span>(<span class=\"kw\">let</span> c=<span class=\"nm\">0</span>; c&lt;=cap; c++) {\n      dp[i][c] = dp[i-<span class=\"nm\">1</span>][c];           <span class=\"cm\">// skip item</span>\n      <span class=\"kw\">if</span>(c &gt;= w)\n        dp[i][c] = Math.<span class=\"fn\">max</span>(dp[i][c],\n          dp[i-<span class=\"nm\">1</span>][c-w] + v);          <span class=\"cm\">// take item</span>\n    }\n  }\n  <span class=\"kw\">return</span> dp[n][cap];\n}\n\n<span class=\"cm\">// LCS \u2014 git diff, DNA alignment, spell check</span>\n<span class=\"kw\">function</span> <span class=\"fn\">lcs</span>(a, b) {\n  <span class=\"kw\">const</span> dp = <span class=\"fn\">Array</span>.<span class=\"fn\">from</span>({length:a.length+<span class=\"nm\">1</span>},\n    () => <span class=\"kw\">new</span> <span class=\"fn\">Array</span>(b.length+<span class=\"nm\">1</span>).<span class=\"fn\">fill</span>(<span class=\"nm\">0</span>));\n  <span class=\"kw\">for</span>(<span class=\"kw\">let</span> i=<span class=\"nm\">1</span>; i&lt;=a.length; i++)\n    <span class=\"kw\">for</span>(<span class=\"kw\">let</span> j=<span class=\"nm\">1</span>; j&lt;=b.length; j++)\n      dp[i][j] = a[i-<span class=\"nm\">1</span>]===b[j-<span class=\"nm\">1</span>]\n        ? dp[i-<span class=\"nm\">1</span>][j-<span class=\"nm\">1</span>]+<span class=\"nm\">1</span>\n        : Math.<span class=\"fn\">max</span>(dp[i-<span class=\"nm\">1</span>][j], dp[i][j-<span class=\"nm\">1</span>]);\n  <span class=\"kw\">return</span> dp[a.length][b.length];\n}",
body:"<p>Computing fib(40) with na\u00efve recursion calls itself 331 million times. Add one rule \u2014 cache the result the first time, return the cache every subsequent time \u2014 and it makes 79 calls. That's the entire idea. Dynamic programming is the discipline of <em>never solving the same subproblem twice</em>. The rest is just recognizing which problems have subproblems worth caching, and figuring out the right shape of the cache.</p>\n\n<div class=\"vocab\"><span class=\"vt\">\"Overlapping Subproblems\"</span> \u2014 the first DP signal. A problem has overlapping subproblems if the same sub-computation appears multiple times in the recursion tree. fib(n) needs fib(n-2) both directly and via fib(n-1). The knapsack problem needs the same (items, capacity) sub-state repeatedly. Merge sort does NOT \u2014 each element is in exactly one subarray. Without overlap, caching doesn't help. With it, caching changes the game.</div>\n\n<div class=\"vocab\"><span class=\"vt\">\"Optimal Substructure\"</span> \u2014 the second DP signal. The optimal solution to the whole problem is built from optimal solutions to its subproblems. Shortest path: shortest A\u2192C through B = shortest A\u2192B + shortest B\u2192C. Knapsack: best value with capacity W and items 1..n = max(skip item n, take item n + best value with W minus item n's weight and items 1..n-1). Both signals together are the DP fingerprint. Neither alone is sufficient.</div>\n\n<div class=\"vocab\"><span class=\"vt\">\"Memoization vs Tabulation\"</span> \u2014 two implementation styles, same correctness. Memoization (top-down): write the recursion naturally, add a cache. Only computes needed subproblems. Easier to reason about. Tabulation (bottom-up): fill a table iteratively from base cases, no recursion. Better cache performance, no stack overflow risk on deep recursion, easier to optimize for space. Start with memoization. Optimize to tabulation if needed.</div>\n\n<div class=\"step-card\"><span class=\"step-num\">HOW TO THINK ABOUT ANY DP PROBLEM</span>\n1. <strong>Define the subproblem</strong> \u2014 what does dp[i] answer? \"Maximum value using items 1..i with capacity exactly j.\" This step is the whole game.<br>\n2. <strong>Write the recurrence</strong> \u2014 how does dp[i] relate to smaller subproblems? \"dp[i][j] = max(dp[i-1][j], dp[i-1][j-w[i]] + v[i]) if j \u2265 w[i].\"<br>\n3. <strong>Identify base cases</strong> \u2014 what are the smallest subproblems with known answers? dp[0][*] = 0 (no items, any capacity).<br>\n4. <strong>Fill in order</strong> \u2014 which subproblems must be solved before which? Usually left to right, top to bottom.<br>\n5. <strong>Read the answer</strong> \u2014 dp[n][W]? min(dp[n][*])? The recurrence determines this.<br><br>\nStep 1 is always the hard part. Get the subproblem definition wrong and everything downstream fails.\n</div>\n\n<div class=\"step-card\"><span class=\"step-num\">SPACE OPTIMIZATION \u2014 THE ROLLING ARRAY TRICK</span>\nMany DP tables only look at the previous row to compute the current row. Knapsack is one: dp[i][j] depends only on dp[i-1][*]. This means you can replace the full n\u00d7W table with two 1D arrays (previous row, current row), or even one if you iterate in the right direction. Reduces space from O(n\u00d7W) to O(W). For large inputs this is the difference between \"fits in memory\" and \"out of memory.\"<br><br>\n<code>// 1D knapsack \u2014 iterate capacity backwards<br>\nconst dp = new Array(CAP + 1).fill(0);<br>\nfor (const item of items)<br>\n&nbsp;&nbsp;for (let c = CAP; c >= item.w; c--)<br>\n&nbsp;&nbsp;&nbsp;&nbsp;dp[c] = Math.max(dp[c], dp[c - item.w] + item.v);</code>\n</div>\n\n<div class=\"artists\">The autocorrect on your phone uses edit distance \u2014 a DP algorithm \u2014 to find the closest word to what you typed. Every time it corrects \"teh\" to \"the,\" that's Levenshtein distance DP. Video compression (H.264, H.265, AV1) uses DP to decide which frames to encode as full images vs changes from the previous frame. Git's diff algorithm (Myers diff) is a DP problem over two sequences. Shazam's audio fingerprinting uses DP-based sequence matching. VSCO and Lightroom's auto-tone adjustments optimize over parameters using DP variants. Every \"smart\" feature in creative software has DP somewhere underneath.</div>\n\n<div class=\"spamton\">The Needleman-Wunsch algorithm, developed in 1970 to align DNA sequences, is O(nm) DP \u2014 the same structure as edit distance. Every genetic comparison, every BLAST database query, every COVID genome sequencing pipeline runs this algorithm. Bioinformatics is largely applied dynamic programming on strings. The same conceptual structure that finds the best knapsack packing also <strong>maps the human genome</strong>.</div>\n\n<div class=\"challenge\">Implement the longest common subsequence (LCS) of two strings. Given strings A and B, find the longest sequence of characters that appears in both (not necessarily contiguous). dp[i][j] = LCS length of A[0..i] and B[0..j]. If A[i] === B[j], dp[i][j] = dp[i-1][j-1] + 1. Otherwise, max(dp[i-1][j], dp[i][j-1]). This is the algorithm inside <code>git diff</code> \u2014 the diff output you see every day is this DP table reconstructed.</div>\n\n<p class=\"tip\">If the recursive solution with memoization is hitting a stack overflow on large inputs, switch to tabulation. The algorithmic logic is identical \u2014 you're just filling a table instead of recursing. The tabulation order follows the same dependency direction as the recursion: if the recursive call goes to smaller n, fill the table from small n to large n.</p>"
},

code:"<span class=\"cm\">// Greedy: locally optimal choice at each step.</span>\n<span class=\"cm\">// Works when: greedy choice property + optimal substructure.</span>\n\n<span class=\"cm\">// Huffman coding \u2014 optimal prefix-free encoding.</span>\n<span class=\"cm\">// Greedy: merge the two lowest-frequency nodes.</span>\n<span class=\"kw\">function</span> <span class=\"fn\">huffman</span>(freqs) {\n  <span class=\"kw\">const</span> pq = <span class=\"kw\">new</span> <span class=\"fn\">MinHeap</span>(); <span class=\"cm\">// keyed by frequency</span>\n  <span class=\"kw\">for</span>(<span class=\"kw\">const</span> [sym,freq] <span class=\"kw\">of</span> <span class=\"fn\">Object</span>.<span class=\"fn\">entries</span>(freqs))\n    pq.<span class=\"fn\">push</span>({freq, sym, left:<span class=\"kw\">null</span>, right:<span class=\"kw\">null</span>});\n  <span class=\"kw\">while</span>(pq.size > <span class=\"nm\">1</span>) {\n    <span class=\"kw\">const</span> a = pq.<span class=\"fn\">pop</span>(); <span class=\"cm\">// lowest freq</span>\n    <span class=\"kw\">const</span> b = pq.<span class=\"fn\">pop</span>(); <span class=\"cm\">// second lowest</span>\n    pq.<span class=\"fn\">push</span>({freq:a.freq+b.freq, left:a, right:b});\n  }\n  <span class=\"kw\">return</span> pq.<span class=\"fn\">pop</span>(); <span class=\"cm\">// Huffman tree root</span>\n}\n\n<span class=\"cm\">// Interval scheduling \u2014 max non-overlapping.</span>\n<span class=\"cm\">// Greedy: always pick the one ending earliest.</span>\n<span class=\"kw\">function</span> <span class=\"fn\">schedule</span>(intervals) {\n  intervals.<span class=\"fn\">sort</span>((a,b)=>a.end-b.end);\n  <span class=\"kw\">const</span> result = [intervals[<span class=\"nm\">0</span>]];\n  <span class=\"kw\">for</span>(<span class=\"kw\">let</span> i=<span class=\"nm\">1</span>; i&lt;intervals.length; i++)\n    <span class=\"kw\">if</span>(intervals[i].start >= result.at(-<span class=\"nm\">1</span>).end)\n      result.<span class=\"fn\">push</span>(intervals[i]);\n  <span class=\"kw\">return</span> result;\n}\n\n<span class=\"cm\">// Coin change \u2014 greedy FAILS for {1,5,6} at 10.</span>\n<span class=\"cm\">// Greedy: 6+1+1+1+1 = 5 coins.</span>\n<span class=\"cm\">// Optimal: 5+5 = 2 coins. Use DP.</span>",
body:"<p>Some problems are nice to you. They let you grab the best available option at every step and it always works out perfectly \u2014 no backtracking, no table, no regret. Huffman coding is this. Kruskal's minimum spanning tree is this. Dijkstra's selection of the cheapest node is this. The challenge isn't implementing a greedy algorithm \u2014 they're usually simpler than DP. The challenge is <em>knowing when greedy is actually correct</em> versus when it's wrong in a way that looks right until your edge case arrives.</p>\n\n<div class=\"vocab\"><span class=\"vt\">\"Greedy Choice Property\"</span> \u2014 a problem has this property if there always exists an optimal solution that includes the locally optimal (greedy) choice. Proven by the exchange argument: assume an optimal solution doesn't include the greedy choice; show you can swap it in without making things worse; therefore some optimal solution includes the greedy choice. This is the standard proof technique. If you can't construct this argument, greedy probably isn't correct.</div>\n\n<div class=\"vocab\"><span class=\"vt\">\"When Greedy Fails\"</span> \u2014 coins {1, 5, 6}, target 10. Greedy takes 6, then four 1s = 5 coins. Optimal: two 5s = 2 coins. Greedy failed because taking the largest coin foreclosed the globally better option. The 0/1 knapsack is greedy-hard: the item with the best value/weight ratio may leave capacity that nothing fills well. Fractional knapsack (you can split items) is greedy-correct. The difference between these two problems \u2014 split vs no-split \u2014 determines whether greedy works.</div>\n\n<div class=\"vocab\"><span class=\"vt\">\"Huffman Coding\"</span> \u2014 assign shorter bit codes to more frequent symbols, longer codes to rare ones. Greedy rule: always merge the two lowest-frequency nodes. The resulting tree assigns codes: left=0, right=1. Produces the provably optimal prefix-free encoding. No lossless code can do better with whole bits per symbol. This is inside ZIP, PNG, gzip, HTTP/2 header compression, and DEFLATE. Every download you've ever made was decoded by Huffman.</div>\n\n<div class=\"step-card\"><span class=\"step-num\">HOW TO CHECK IF GREEDY WORKS \u2014 THE EXCHANGE ARGUMENT</span>\nBefore implementing a greedy algorithm, try to prove it:<br><br>\n1. <strong>Assume</strong> an optimal solution exists that does NOT include your greedy choice at step 1.<br>\n2. <strong>Swap</strong> your greedy choice into that solution in place of whatever it chose instead.<br>\n3. <strong>Show</strong> the swapped solution is no worse.<br>\n4. <strong>Conclude</strong> some optimal solution includes the greedy choice \u2014 so being greedy from step 1 is safe.<br><br>\nIf you can construct this argument: greedy is correct. If you can't, or you find a counterexample in step 3: use DP.\n</div>\n\n<div class=\"step-card\"><span class=\"step-num\">THE HUFFMAN TREE STEP BY STEP</span>\nGiven frequencies: E=21, T=15, A=13, O=11, N=9, S=7, R=5, H=4 (total 85)<br><br>\nRound 1: merge R(5) + H(4) \u2192 node(9). Queue: E=21,T=15,A=13,O=11,N=9,node=9,S=7<br>\nRound 2: merge S(7) + node(9) \u2192 node(16). And so on until one root remains.<br><br>\nResult: E gets 2 bits (most common), H gets 5 bits (rarest). Average bits/symbol \u2248 3.1 vs 3 bits with fixed-width encoding. That's a real compression gain \u2014 every bit saved multiplied across billions of transmissions every day.\n</div>\n\n<div class=\"artists\">JPEG, MP3, ZIP, PNG, FLAC, WebP, HEIC, and AVIF all use Huffman coding as their entropy coding stage \u2014 the last compression step that squeezes the final redundancy out. HTTP/2's header compression (HPACK) uses a static Huffman table compiled from a massive sample of HTTP traffic. Brotli, used by modern web servers for everything you download, uses Huffman coding at its core. Every image you've edited, every audio file you've exported, every web page you've loaded: Huffman decoded it. The tree you watch grow in this viz is the structure that compresses the internet.</div>\n\n<div class=\"spamton\">Huffman coding is provably optimal for symbol-by-symbol coding. But arithmetic coding, developed later, can get arbitrarily close to the theoretical entropy limit by encoding entire sequences rather than individual symbols. It's slightly slower but produces smaller files. Modern codecs like H.265 and AV1 use arithmetic coding precisely because JPEG and MP3 used Huffman and left <strong>a few percent of compression on the table</strong>. The quest to squeeze one more bit out of every file has been running for 70 years and is still going.</div>\n\n<div class=\"challenge\">Implement a complete Huffman encoder: take a string, count character frequencies, build the tree using a min-heap (the greedy step), generate the bit codes by traversing the tree, encode the string to a bit sequence, and report the compression ratio vs fixed-width ASCII. Compare the output size for a repetitive string (\"aaaaabbbcc\") vs a random string. The difference in compression ratio demonstrates exactly why frequency-adaptive coding works.</div>\n\n<p class=\"tip\">Before writing DP for a new problem, try the exchange argument for greedy first. If you can show that swapping in the greedy choice never makes things worse, greedy is simpler, faster, and just as correct. The coin change problem is a good calibration tool: it's greedy-correct for standard currency denominations (1,5,10,25) but greedy-wrong for arbitrary denominations. Understanding why the exchange argument works for one and fails for the other is the core intuition.</p>"
},
